<!DOCTYPE html>
<html>
<head>

<title>Create User - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.card{
background:white;
padding:30px;
width:420px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
margin-bottom:20px;
color:#1f3c88;
}

input,select{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
background:#1f3c88;
color:white;
border:none;
padding:11px;
width:100%;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#162f6d;
}

.message{
margin-top:15px;
font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<h2>Create User</h2>

<input id="name" placeholder="Full Name">

<input id="email" placeholder="Email">

<input id="password" placeholder="Password">

<select id="role">

<option value="admin">Admin</option>

<option value="manager">Manager</option>

<option value="operator">Operator</option>

<option value="accounts">Accounts</option>

<option value="customer">Customer</option>

</select>

<button onclick="createUser()">Create User</button>

<div id="msg" class="message"></div>

</div>

<script>

const supabase = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"PASTE_SERVICE_ROLE_KEY_HERE"
)

async function createUser(){

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let password=document.getElementById("password").value
let role=document.getElementById("role").value

document.getElementById("msg").innerText="Creating user..."

try{

/* CREATE AUTH USER */

const {data,error}=await supabase.auth.admin.createUser({

email:email,
password:password,
email_confirm:true

})

if(error){

document.getElementById("msg").innerText=error.message
return

}

let userId=data.user.id

/* GET ROLE ID */

const {data:roleData,error:roleError}=await supabase
.from("roles")
.select("*")
.eq("role_name",role)
.single()

if(roleError){

document.getElementById("msg").innerText="Role not found"
return

}

/* INSERT USER ROLE */

await supabase
.from("user_roles")
.insert({

user_id:userId,
role_id:roleData.id

})

/* CREATE TRANSPORTER RECORD IF CUSTOMER */

if(role==="customer"){

await supabase
.from("transporters")
.insert({

transporter_name:name,
auth_id:userId

})

}

/* SUCCESS */

document.getElementById("msg").innerText="User created successfully"

}
catch(err){

document.getElementById("msg").innerText="Error creating user"

}

}

</script>

</body>
</html>
