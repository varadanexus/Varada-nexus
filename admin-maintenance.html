<!DOCTYPE html>
<html>

<head>

<title>System Maintenance Control - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>

<style>
/* GLOBAL */
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0a0f1c;
color:#e5e7eb;
}

/* MAIN */
.main{
margin-left:220px;
padding:24px;
}

/* HEADINGS */
h2{
margin-bottom:18px;
font-weight:600;
color:#e5e7eb;
}

/* CARD */
.card{
background:#111827;
padding:20px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.04);
max-width:600px;
}

/* INPUT + TEXTAREA */
input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.08);
background:#0f172a;
color:#e5e7eb;
outline:none;
font-size:13px;
}

/* CHECKBOX LABEL */
label{
display:flex;
align-items:center;
gap:10px;
font-size:14px;
}

/* BUTTON */
button{
margin-top:12px;
padding:10px 14px;
background:#3b82f6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.2s;
font-size:13px;
}

button:hover{
background:#2563eb;
}

/* STATUS TEXT */
.status{
margin-top:12px;
font-weight:600;
font-size:14px;
}

/* SPACING FIX */
.card br{
display:none;
}
</style>

</head>

<body>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{

document.getElementById("sidebar-container").innerHTML = data

const sidebar = document.getElementById("sidebar")
if(sidebar) sidebar.style.display="none"

setTimeout(async()=>{

if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}

await initSidebar()
setActiveMenu()

if(sidebar) sidebar.style.display="block"

},200)

})

function setActiveMenu(){

let currentPage = window.location.pathname.split("/").pop()

document.querySelectorAll("#sidebar a").forEach(link=>{

    let page = link.getAttribute("data-page")

    if(page === currentPage){
        link.classList.add("active")
    }

})

}
/* 🔥 DO NOT DECLARE supabaseClient AGAIN */

/* RBAC FUNCTION */
async function enforceAccess(){

try{

const page = window.location.pathname.split("/").pop()
console.log("PAGE:", page)

/* SESSION */
const { data:{session} } = await supabaseClient.auth.getSession()

if(!session){
window.location.href="login.html"
return
}

const authId = session.user.id

/* USER */
const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user){
window.location.href="login.html"
return
}

/* ROLES */
const {data:userRoles} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)

if(!userRoles || userRoles.length===0){
window.location.href="dashboard.html"
return
}

let roleIds = userRoles.map(r=>r.role_id)

/* PERMISSIONS */
const {data:permissions} = await supabaseClient
.from("role_permissions")
.select("page_name")
.in("role_id",roleIds)
.eq("can_access",true)

/* SAFE */
let allowedPages = (permissions || []).map(p=>p.page_name.trim())

console.log("ALLOWED:", allowedPages)

/* 🚨 BLOCK */
if(!allowedPages.includes(page)){
alert("Access Denied")
window.location.href="dashboard.html"
return
}

/* ✅ ALLOWED */
await loadSettings()

}catch(err){

console.log("RBAC ERROR:", err)
window.location.href="dashboard.html"

}

}

/* RUN AFTER LOAD */
window.addEventListener("DOMContentLoaded", enforceAccess)

</script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

await initSidebar()

if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}

/* 🔥 SHOW SIDEBAR ONLY AFTER RBAC */
document.getElementById("sidebar").style.display="block"

})
</script>

<div class="main">

<h2>System Maintenance Control</h2>

<div class="card">

<label>
<input type="checkbox" id="maintenanceToggle">
 Enable Maintenance Mode
</label>

<div class="status" id="statusText"></div>

<br>

<label>Maintenance Message</label>
<textarea id="message" rows="4"></textarea>

<button onclick="saveMaintenance()">Save Settings</button>

<br><br>

<button onclick="forceLogout()">Force Logout All Users</button>

</div>

</div>

<script>

/* LOAD SETTINGS */

async function loadSettings(){

console.log("LOADING SETTINGS")

const {data}=await supabaseClient
.from("system_settings")
.select("*")
.eq("id",1)
.single()

if(!data) return

maintenanceToggle.checked = data.maintenance_mode
message.value = data.message || ""

updateStatus(data.maintenance_mode)

}

function updateStatus(mode){
statusText.innerText = mode
? "⚠️ Maintenance Mode ACTIVE"
: "✅ System Running Normally"
}

maintenanceToggle.addEventListener("change", function(){
updateStatus(this.checked)
})

async function saveMaintenance(){

await supabaseClient
.from("system_settings")
.update({
maintenance_mode:maintenanceToggle.checked,
message:message.value
})
.eq("id",1)

alert("Settings Updated")

}

async function forceLogout(){

if(!confirm("Logout ALL users?")) return

const {data}=await supabaseClient
.from("system_settings")
.select("maintenance_version")
.eq("id",1)
.single()

let newVersion = Number(data.maintenance_version || 0) + 1

await supabaseClient
.from("system_settings")
.update({
maintenance_version:newVersion
})
.eq("id",1)

alert("All users logged out")

}

</script>

<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
