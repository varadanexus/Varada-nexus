<!DOCTYPE html>
<html>

<head>

<title>System Maintenance Control - Varada Nexus ERP</title>
<link rel="icon" type="image/png" sizes="32x32" href="/images/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/logo.png">

  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>
<script src="supabase-client.js"></script>
<script src="menu-rbac.js"></script>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0a0f1c;
color:#e5e7eb;
}

.main{
margin-left:220px;
padding:24px;
}

h2{
margin-bottom:18px;
font-weight:600;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.04);
max-width:600px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.08);
background:#0f172a;
color:#e5e7eb;
}

label{
display:flex;
align-items:center;
gap:10px;
}

button{
margin-top:12px;
padding:10px 14px;
background:#3b82f6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.status{
margin-top:12px;
font-weight:600;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
/* LOAD SIDEBAR (ONLY ONCE) */
async function loadSidebar(){
try{

const res = await fetch("sidebar.html")
const html = await res.text()

document.getElementById("sidebar-container").innerHTML = html

/* USER NAME */
const {data:{session}} = await supabaseClient.auth.getSession()
if(session){
document.getElementById("userName").innerText =
session.user.email.split("@")[0]
}

/* RBAC */
if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}

/* ACTIVE MENU */
let currentPage = window.location.pathname.split("/").pop()

document.querySelectorAll("#sidebar a").forEach(link=>{
if(link.getAttribute("data-page") === currentPage){
link.classList.add("active")
}
})

console.log("✅ Sidebar loaded")

}catch(err){
console.error("Sidebar error:", err)
}
}

/* RBAC FUNCTION */
async function enforceAccess(){

try{

const page = window.location.pathname.split("/").pop()

const { data:{session} } = await supabaseClient.auth.getSession()

if(!session){
window.location.href="login.html"
return
}

const authId = session.user.id

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user){
window.location.href="login.html"
return
}

const {data:userRoles} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)

if(!userRoles || userRoles.length===0){
window.location.href="dashboard.html"
return
}

let roleIds = userRoles.map(r=>r.role_id)

const {data:permissions} = await supabaseClient
.from("role_permissions")
.select("page_name")
.in("role_id",roleIds)
.eq("can_access",true)

let allowedPages = (permissions || []).map(p=>p.page_name.trim())

if(!allowedPages.includes(page)){
alert("Access Denied")
window.location.href="dashboard.html"
return
}

/* LOAD PAGE DATA */
await loadSettings()

}catch(err){
console.log("RBAC ERROR:", err)
window.location.href="dashboard.html"
}

}

/* RUN */
window.addEventListener("DOMContentLoaded", async ()=>{
await loadSidebar()
await enforceAccess()
})
</script>

<div class="main">

<h2>System Maintenance Control</h2>

<div class="card">

<label>
<input type="checkbox" id="maintenanceToggle">
Enable Maintenance Mode
</label>

<div class="status" id="statusText"></div>

<label>Maintenance Message</label>
<textarea id="message" rows="4"></textarea>

<button onclick="saveMaintenance()">Save Settings</button>

<button onclick="forceLogout()">Force Logout All Users</button>

</div>

</div>

<script>
async function loadSettings(){

const {data}=await supabaseClient
.from("system_settings")
.select("*")
.eq("id",1)
.single()

if(!data) return

maintenanceToggle.checked = data.maintenance_mode
message.value = data.message || ""

updateStatus(data.maintenance_mode)
}

function updateStatus(mode){
statusText.innerText = mode
? "⚠️ Maintenance Mode ACTIVE"
: "✅ System Running Normally"
}

maintenanceToggle.addEventListener("change", function(){
updateStatus(this.checked)
})

async function saveMaintenance(){

await supabaseClient
.from("system_settings")
.update({
maintenance_mode:maintenanceToggle.checked,
message:message.value
})
.eq("id",1)

alert("Settings Updated")
}

async function forceLogout(){

if(!confirm("Logout ALL users?")) return

const {data}=await supabaseClient
.from("system_settings")
.select("maintenance_version")
.eq("id",1)
.single()

let newVersion = Number(data.maintenance_version || 0) + 1

await supabaseClient
.from("system_settings")
.update({
maintenance_version:newVersion
})
.eq("id",1)

alert("All users logged out")
}
</script>

<script src="global-logout.js"></script>

</body>
</html>
