<!DOCTYPE html>
<html>

<head>

<title>System Maintenance Control - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9; display:none;}
.main{margin-left:220px;padding:30px;}
.card{background:white;padding:25px;border-radius:8px;max-width:600px;}
h2{color:#1f3c88;}
input,textarea{width:100%;padding:10px;margin-top:10px;border:1px solid #ccc;border-radius:4px;}
button{margin-top:15px;padding:10px 14px;background:#1f3c88;color:white;border:none;border-radius:4px;}
.status{margin-top:10px;font-weight:bold;}
</style>

</head>

<body>

<script>

/* SUPABASE */

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

/* 🔥 HARD RBAC (INLINE — NO DEPENDENCY) */

async function enforceAccess(){

const page = window.location.pathname.split("/").pop()

const { data:{session} } = await supabaseClient.auth.getSession()

if(!session){
window.location.href="login.html"
return
}

const authId = session.user.id

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user){
window.location.href="login.html"
return
}

const {data:userRoles} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)

let roleIds = userRoles.map(r=>r.role_id)

const {data:permissions} = await supabaseClient
.from("role_permissions")
.select("page_name")
.in("role_id",roleIds)
.eq("can_access",true)

let allowedPages = permissions.map(p=>p.page_name.trim())

/* 🚨 BLOCK HERE */

if(!allowedPages.includes(page)){
alert("Access Denied")
window.location.href="dashboard.html"
return
}

/* ✅ ALLOWED → SHOW PAGE */
document.body.style.display="block"

}

/* RUN IMMEDIATELY */
enforceAccess()

</script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>

fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

await new Promise(r => setTimeout(r, 200))

if(typeof applyMenuRBAC==="function"){
applyMenuRBAC()
}

})

</script>

<div class="main">

<h2>System Maintenance Control</h2>

<div class="card">

<label>
<input type="checkbox" id="maintenanceToggle">
 Enable Maintenance Mode
</label>

<div class="status" id="statusText"></div>

<br>

<label>Maintenance Message</label>
<textarea id="message" rows="4"></textarea>

<button onclick="saveMaintenance()">Save Settings</button>

<br><br>

<button onclick="forceLogout()">Force Logout All Users</button>

</div>

</div>

<script>

/* LOAD SETTINGS */

async function loadSettings(){

const {data}=await supabaseClient
.from("system_settings")
.select("*")
.eq("id",1)
.single()

if(!data) return

maintenanceToggle.checked = data.maintenance_mode
message.value = data.message || ""

updateStatus(data.maintenance_mode)

}

function updateStatus(mode){
statusText.innerText = mode
? "⚠️ Maintenance Mode ACTIVE"
: "✅ System Running Normally"
}

maintenanceToggle.addEventListener("change", function(){
updateStatus(this.checked)
})

async function saveMaintenance(){

await supabaseClient
.from("system_settings")
.update({
maintenance_mode:maintenanceToggle.checked,
message:message.value
})
.eq("id",1)

alert("Settings Updated")

}

async function forceLogout(){

if(!confirm("Logout ALL users?")) return

const {data}=await supabaseClient
.from("system_settings")
.select("maintenance_version")
.eq("id",1)
.single()

let newVersion = Number(data.maintenance_version || 0) + 1

await supabaseClient
.from("system_settings")
.update({
maintenance_version:newVersion
})
.eq("id",1)

alert("All users logged out")

}

/* LOAD AFTER ACCESS */
setTimeout(loadSettings,300)

</script>

<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
