<div class="main">

<h2>System Maintenance Control</h2>

<div class="card">

<label class="toggle">

<input type="checkbox" id="maintenanceToggle">

 Enable Maintenance Mode

</label>

<div class="status" id="statusText"></div>

<br>

<label>Maintenance Message</label>

<textarea id="message" rows="4"></textarea>

<br>

<button onclick="saveMaintenance()">Save Settings</button>

<br><br>

<button onclick="forceLogout()">Force Logout All Users</button>

</div>

</div>


<script>

loadSettings()

async function loadSettings(){

const {data}=await supabaseClient
.from("system_settings")
.select("*")
.eq("id",1)
.single()

if(!data) return

document.getElementById("maintenanceToggle").checked = data.maintenance_mode

document.getElementById("message").value = data.message || ""

updateStatus(data.maintenance_mode)

}

function updateStatus(mode){

document.getElementById("statusText").innerText = mode
? "Maintenance Mode ACTIVE"
: "System Running Normally"

}

document.getElementById("maintenanceToggle").addEventListener("change", function(){

updateStatus(this.checked)

})


async function saveMaintenance(){

let mode=document.getElementById("maintenanceToggle").checked

let message=document.getElementById("message").value

await supabaseClient
.from("system_settings")
.update({

maintenance_mode:mode,
message:message

})
.eq("id",1)

alert("Maintenance Settings Updated")

}


async function forceLogout(){

if(!confirm("This will log out ALL users. Continue?")) return

const {data}=await supabaseClient
.from("system_settings")
.select("maintenance_version")
.eq("id",1)
.single()

let newVersion = Number(data.maintenance_version) + 1

await supabaseClient
.from("system_settings")
.update({
maintenance_version:newVersion
})
.eq("id",1)

alert("All users logged out successfully")

}

</script>
