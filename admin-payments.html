<!DOCTYPE html>
<html>

<head>
<title>Transporter Payments - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

select,input{
padding:10px;margin:5px;border:1px solid #ccc;border-radius:4px;
}

button{
padding:10px 14px;background:#1f3c88;color:white;border:none;border-radius:4px;
}

.trip-list{
max-height:250px;overflow-y:auto;border:1px solid #ddd;padding:10px;
}

table{
width:100%;border-collapse:collapse;background:white;
}

th,td{
padding:10px;border-bottom:1px solid #ddd;text-align:left;
}

th{background:#eee;}
</style>

</head>

<body>

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
document.getElementById("sidebar").style.display="block"
})
</script>

<div class="main">

<h2>Transporter Payments</h2>

<div class="card">

<h3>Select Transporter</h3>

<select id="transporterSelect" onchange="loadTrips()"></select>

<div class="trip-list">

<div>
<input type="checkbox" onclick="toggleAll(this)"> <b>Select All</b>
</div>

<table>
<thead>
<tr>
<th>Select</th>
<th>Trip</th>
<th>Balance</th>
</tr>
</thead>

<tbody id="tripTable"></tbody>

</table>

</div>

</div>

<!-- ✅ NEW: INVOICE SECTION -->
<div class="card">

<h3>Generate Invoice</h3>

<button onclick="generateInvoice()">Generate Invoice</button>

<p id="invoicePreview"></p>

<button onclick="saveInvoice()">Save Invoice</button>

</div>

<div class="card">

<h3>Payment</h3>

Invoice Amount:
<input id="totalAmount" readonly>

Enter Payment:
<input id="paidAmount">

<input type="date" id="paymentDate">

<select id="paymentMethod">
<option value="">Method</option>
<option>Cash</option>
<option>Bank Transfer</option>
<option>UPI</option>
</select>

<input id="remarks" placeholder="Remarks">

<button onclick="savePayment()">Save Payment</button>

</div>

<div class="card">

<h3>Payment History</h3>

<table>
<thead>
<tr>
<th>Date</th>
<th>Invoice</th>
<th>Amount</th>
<th>Method</th>
<th>Remarks</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>
</table>

</div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

let transporters=[], trips=[], payments=[]
let selectedTrips=[]
let invoiceAmount=0
let currentInvoice=null

init()

async function init(){
await loadTransporters()
await loadPayments()
}

/* LOAD TRANSPORTERS */
async function loadTransporters(){
const {data}=await supabaseClient.from("transporters").select("*")

transporters=data||[]

let html='<option value="">Select Transporter</option>'

transporters.forEach(t=>{
html+=`<option value="${t.id}">${t.transporter_name}</option>`
})

transporterSelect.innerHTML=html
}

/* LOAD TRIPS */
async function loadTrips(){

let id=transporterSelect.value
if(!id) return

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",id)

trips=data||[]

renderTrips()
}

/* RENDER TRIPS */
function renderTrips(){

let html=""

trips.forEach(t=>{

let freight=(t.weight_kg/1000)*(t.transporter_rate||0)

html+=`
<tr>
<td><input type="checkbox" value="${t.id}"></td>
<td>${t.trip_no}</td>
<td>₹${freight.toFixed(0)}</td>
</tr>
`
})

tripTable.innerHTML=html
}

/* SELECT ALL */
function toggleAll(cb){
document.querySelectorAll("#tripTable input").forEach(c=>c.checked=cb.checked)
}

/* GENERATE INVOICE */
function generateInvoice(){

let checked=document.querySelectorAll("#tripTable input:checked")

if(checked.length==0){
alert("Select trips")
return
}

selectedTrips=[]
let total=0

checked.forEach(c=>{
let trip=trips.find(t=>t.id==c.value)
selectedTrips.push(trip)

let freight=(trip.weight_kg/1000)*(trip.transporter_rate||0)
total+=freight
})

invoiceAmount=total
totalAmount.value=total.toFixed(0)

invoicePreview.innerHTML=`
Trips : ${selectedTrips.map(t=>t.trip_no).join(", ")}<br>
<b>Invoice Amount : ₹${total}</b>
`

}

/* SAVE INVOICE */
function generateInvoiceNo(){
return "TINV-"+Math.floor(Math.random()*100000)
}

async function saveInvoice(){

if(selectedTrips.length==0){
alert("Generate invoice first")
return
}

const {data}=await supabaseClient.from("transporter_invoices").insert({
invoice_no:generateInvoiceNo(),
transporter_id:transporterSelect.value,
trip_ids:selectedTrips.map(t=>t.id).join(","),
total_amount:invoiceAmount,
balance_amount:invoiceAmount
}).select().single()

currentInvoice=data

alert("Invoice Created ✅")

}

/* SAVE PAYMENT */
async function savePayment(){

if(!currentInvoice){
alert("Create invoice first")
return
}

let amount=Number(paidAmount.value)
let date=paymentDate.value
let method=paymentMethod.value

if(!amount||!date||!method){
alert("Fill all fields")
return
}

await supabaseClient.from("transporter_payments").insert({
invoice_id:currentInvoice.id,
amount:amount,
payment_date:date,
payment_method:method,
remarks:remarks.value
})

let newPaid=(currentInvoice.paid_amount||0)+amount
let newBalance=currentInvoice.total_amount-newPaid

await supabaseClient.from("transporter_invoices")
.update({
paid_amount:newPaid,
balance_amount:newBalance,
status:newBalance<=0?"Paid":"Partial"
})
.eq("id",currentInvoice.id)

alert("Payment Saved ✅")

}

/* HISTORY */
async function loadPayments(){

const {data}=await supabaseClient
.from("transporter_payments")
.select("*, transporter_invoices(invoice_no)")
.order("created_at",{ascending:false})

let html=""

data?.forEach(p=>{
html+=`
<tr>
<td>${p.payment_date}</td>
<td>${p.transporter_invoices?.invoice_no||""}</td>
<td>₹${p.amount}</td>
<td>${p.payment_method}</td>
<td>${p.remarks||""}</td>
</tr>
`
})

historyTable.innerHTML=html

}

</script>

</body>
</html>
