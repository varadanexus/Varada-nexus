<!DOCTYPE html>
<html>

<head>
<title>Transporter Payments - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}
.card{background:white;padding:20px;border-radius:8px;margin-bottom:20px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
input,select{padding:10px;margin:5px;border:1px solid #ccc;border-radius:4px;}
button{padding:10px 14px;background:#1f3c88;color:white;border:none;border-radius:4px;cursor:pointer;}
.trip-list{max-height:220px;overflow-y:auto;border:1px solid #ddd;padding:10px;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;text-align:left;}
</style>

</head>

<body>

<script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data
await initSidebar()
if(typeof applyMenuRBAC==="function"){ await applyMenuRBAC() }
document.getElementById("sidebar").style.display="block"
})

async function initSidebar(){
const {data:{session}} = await supabaseClient.auth.getSession()
if(!session){ window.location.href="login.html"; return }

const email=session.user.email
document.getElementById("userName").innerText=email.split("@")[0]

window.logout=async()=>{
await supabaseClient.auth.signOut()
window.location.href="login.html"
}
}
</script>

<div class="main">

<h2>Transporter Payments</h2>

<!-- 🔥 SELECT TRANSPORTER -->
<div class="card">

<h3>Select Transporter</h3>

<select id="transporterSelect" onchange="loadTrips()"></select>

<div class="trip-list">

<label>
<input type="checkbox" onclick="toggleAllTrips(this)">
<b>Select All Trips</b>
</label>

<div id="tripList"></div>

</div>

</div>

<!-- 🔥 PAYMENT SECTION -->
<div class="card">

<h3>Record Payment</h3>

<!-- TOTAL AUTO -->
<input id="totalAmount" placeholder="Total Selected Amount" readonly>

<!-- USER INPUT -->
<input id="paymentAmount" placeholder="Enter Payment Amount">

<input type="date" id="paymentDate">
<select id="paymentMethod">
<option value="">Method</option>
<option>Cash</option>
<option>Bank Transfer</option>
<option>UPI</option>
</select>

<input id="remarks" placeholder="Remarks">

<button onclick="savePayment()">Save Payment</button>

</div>

<!-- 🔥 HISTORY -->
<div class="card">

<h3>Payment History</h3>

<table>
<thead>
<tr>
<th>Date</th>
<th>Trip</th>
<th>Transporter</th>
<th>Amount</th>
<th>Method</th>
<th>Remarks</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>
</table>

</div>

</div>

<script>

let transporters=[]
let trips=[]
let payments=[]

init()

async function init(){
await loadTransporters()
await loadPayments()
}

/* LOAD TRANSPORTERS */
async function loadTransporters(){
const {data}=await supabaseClient.from("transporters").select("*")

transporters=data||[]

let html='<option value="">Select Transporter</option>'

transporters.forEach(t=>{
html+=`<option value="${t.id}">${t.transporter_name}</option>`
})

transporterSelect.innerHTML=html
}

/* LOAD TRIPS */
async function loadTrips(){

let transporterId=transporterSelect.value
if(!transporterId) return

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporterId)

trips=data||[]

let html=""

trips.forEach(t=>{
html+=`
<div>
<input type="checkbox" value="${t.id}">
${t.trip_no} | ${t.route} | ${t.truck}
</div>`
})

tripList.innerHTML=html
}

/* AUTO TOTAL */
function updateTotal(){

let total=0

document.querySelectorAll("#tripList input:checked").forEach(c=>{

let trip=trips.find(t=>t.id==c.value)

if(trip){
let freight=(trip.weight_kg/1000)*(trip.transporter_rate||0)
total+=freight
}

})

totalAmount.value=total.toFixed(0)
}

/* SELECT ALL */
function toggleAllTrips(cb){
document.querySelectorAll("#tripList input").forEach(c=>c.checked=cb.checked)
updateTotal()
}

/* EVENT LISTENER */
document.addEventListener("change",e=>{
if(e.target.closest("#tripList")){
updateTotal()
}
})

/* SAVE PAYMENT */
async function savePayment(){

let selected=document.querySelectorAll("#tripList input:checked")
let amount=Number(paymentAmount.value)
let date=paymentDate.value
let method=paymentMethod.value

if(selected.length==0){ alert("Select trips"); return }
if(!amount||!date||!method){ alert("Enter all fields"); return }

let perTrip=amount/selected.length

for(let c of selected){

await supabaseClient.from("transporter_payments").insert({
trip_id:c.value,
amount:perTrip,
payment_date:date,
payment_method:method,
remarks:remarks.value
})

}

alert("Payment Saved ✅")
loadPayments()
}

/* LOAD HISTORY */
async function loadPayments(){

const {data}=await supabaseClient
.from("transporter_payments")
.select("*, trips(trip_no, transporters(transporter_name))")
.order("created_at",{ascending:false})

payments=data||[]

let html=""

payments.forEach(p=>{
html+=`
<tr>
<td>${p.payment_date}</td>
<td>${p.trips?.trip_no||""}</td>
<td>${p.trips?.transporters?.transporter_name||""}</td>
<td>₹${p.amount}</td>
<td>${p.payment_method||""}</td>
<td>${p.remarks||""}</td>
</tr>`
})

historyTable.innerHTML=html
}

</script>

</body>
</html>
