<!DOCTYPE html>
<html>

<head>
<title>Transporter Payments - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}
.card{
background:white;padding:20px;border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
select,input{
padding:10px;margin:5px;border:1px solid #ccc;border-radius:4px;
}
button{
padding:10px 14px;background:#1f3c88;color:white;
border:none;border-radius:4px;cursor:pointer;
}
.trip-list{
max-height:200px;overflow-y:auto;
border:1px solid #ddd;padding:10px;
}
table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;text-align:left;}
.deleteBtn{background:#d9534f;}
</style>
</head>

<body>

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data
await initSidebar()
document.getElementById("sidebar").style.display="block"
})

async function initSidebar(){
const {data:{session}} = await supabaseClient.auth.getSession()
if(!session){ window.location.href="login.html"; return }

document.getElementById("userName").innerText=session.user.email.split("@")[0]

window.logout=async()=>{
await supabaseClient.auth.signOut()
window.location.href="login.html"
}
}
</script>

<div class="main">

<h2>Transporter Payments</h2>

<!-- 🔥 SELECT TRANSPORTER + TRIPS -->
<div class="card">

<h3>Select Transporter</h3>

<select id="transporterSelect" onchange="loadTrips()"></select>

<div class="trip-list">

<div>
<input type="checkbox" onclick="toggleAllTrips(this)">
<b>Select All Trips</b>
</div>

<div id="tripList"></div>

</div>

</div>

<!-- 🔥 PAYMENT SECTION -->
<div class="card">

<h3>Record Payment</h3>

<input id="paymentAmount" placeholder="Amount">
<input type="date" id="paymentDate">

<select id="paymentMethod">
<option value="">Method</option>
<option>Cash</option>
<option>Bank Transfer</option>
<option>UPI</option>
</select>

<input id="remarks" placeholder="Remarks">

<button onclick="savePayment()">Save Payment</button>

</div>

<!-- 🔥 PAYMENT HISTORY -->
<div class="card">

<h3>Payment History</h3>

<table>
<thead>
<tr>
<th>Date</th>
<th>Trip</th>
<th>Transporter</th>
<th>Amount</th>
<th>Method</th>
<th>Remarks</th>
<th>Action</th>
</tr>
</thead>

<tbody id="paymentTable"></tbody>

</table>

</div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

let trips=[], selectedTrips=[], payments=[]

init()

async function init(){
await loadTransporters()
await loadPayments()
}

/* LOAD TRANSPORTERS */
async function loadTransporters(){
const {data}=await supabaseClient.from("transporters").select("*")
let html='<option value="">Select Transporter</option>'
data?.forEach(t=>{
html+=`<option value="${t.id}">${t.transporter_name}</option>`
})
transporterSelect.innerHTML=html
}

/* LOAD TRIPS */
async function loadTrips(){

let id=transporterSelect.value
if(!id) return

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",id)
.eq("status","Completed")

trips=data||[]

let html=""

trips.forEach(t=>{
html+=`
<div>
<input type="checkbox" value="${t.id}">
${t.trip_no} | ${t.route} | ${t.truck}
</div>`
})

tripList.innerHTML=html
}

/* SELECT ALL */
function toggleAllTrips(cb){
document.querySelectorAll("#tripList input").forEach(c=>c.checked=cb.checked)
}

/* SAVE PAYMENT */
async function savePayment(){

let selected=document.querySelectorAll("#tripList input:checked")
let amount=Number(paymentAmount.value)
let date=paymentDate.value
let method=paymentMethod.value
let remark=remarks.value
let transporterId=transporterSelect.value

if(selected.length===0){ alert("Select trips"); return }
if(!amount||!date||!method){ alert("Fill all fields"); return }

let splitAmount = amount / selected.length

for(const c of selected){

await supabaseClient.from("transporter_payments").insert({
trip_id:c.value,
amount:splitAmount,
payment_date:date,
payment_method:method,
remarks:remark
})

await supabaseClient.from("transporter_ledger").insert({
transporter_id: transporterId,
trip_id:c.value,
amount:splitAmount,
type:"DEBIT",
remarks:"Payment"
})

}

alert("Payment Saved ✅")
loadPayments()
}

/* LOAD HISTORY */
async function loadPayments(){

const {data}=await supabaseClient
.from("transporter_payments")
.select("*, trips(trip_no,transporters(transporter_name))")
.order("created_at",{ascending:false})

payments=data||[]
renderPayments()
}

/* RENDER HISTORY */
function renderPayments(){

let html=""

payments.forEach(p=>{
html+=`
<tr>
<td>${p.payment_date||""}</td>
<td>${p.trips?.trip_no||""}</td>
<td>${p.trips?.transporters?.transporter_name||""}</td>
<td>₹${p.amount}</td>
<td>${p.payment_method||""}</td>
<td>${p.remarks||""}</td>
<td><button class="deleteBtn" onclick="deletePayment('${p.id}')">Delete</button></td>
</tr>
`
})

paymentTable.innerHTML=html
}

/* DELETE */
async function deletePayment(id){
if(!confirm("Delete?")) return
await supabaseClient.from("transporter_payments").delete().eq("id",id)
loadPayments()
}

</script>

</body>
</html>
