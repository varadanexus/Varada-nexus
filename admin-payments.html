<!DOCTYPE html>  
<html>  

<head>  
<title>Admin Payments - Varada Nexus</title> 

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>  
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>  

<style>  

body{margin:0;font-family:Arial;background:#f4f6f9;}  
.main{margin-left:220px;padding:30px;}  

h2{color:#1f3c88;}  

.cards{display:flex;gap:15px;margin-bottom:20px;}

.card{
background:white;padding:15px;border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);min-width:180px;
}

.filters{margin-bottom:15px;}
.filters input,.filters select{padding:6px;margin-right:8px;}

table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;}

.trip-list{
max-height:200px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-top:10px;
}

</style>  
</head>  

<body>  

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML = data
await initSidebar()
if(typeof applyMenuRBAC === "function"){ await applyMenuRBAC() }
document.getElementById("sidebar").style.display = "block"
})

async function initSidebar(){
const {data:{session}} = await supabaseClient.auth.getSession()
if(!session){ window.location.href="login.html"; return }

const email=session.user.email
document.getElementById("userName").innerText=email.split("@")[0]

window.logout=async()=>{
await supabaseClient.auth.signOut()
window.location.href="login.html"
}
}
</script>

<div class="main">  

<h2>Admin Payments Dashboard</h2>  

<button onclick="downloadPDF()">Download PDF</button>  

<div class="cards">  
<div class="card"><h4>Total Freight</h4><h2 id="totalFreight">₹0</h2></div>  
<div class="card"><h4>Total Paid</h4><h2 id="totalPaid">₹0</h2></div>  
<div class="card"><h4>Outstanding</h4><h2 id="totalBalance">₹0</h2></div>  
<div class="card"><h4>Collection %</h4><h2 id="collectionPercent">0%</h2></div>  
</div>  

<!-- 🔥 NEW TRANSPORTER PAYMENT (LIKE CLIENT BILLING) -->
<div class="card">

<h3>Transporter Payment</h3>

<select id="transporterSelect" onchange="loadTripsByTransporter()">
<option value="">Select Transporter</option>
</select>

<div class="trip-list">

<div>
<input type="checkbox" id="selectAllTrips" onclick="toggleAllTrips()">
<b>Select All</b>
</div>

<div id="tripList"></div>

</div>

<br>

<input type="date" id="paymentDate">

<select id="paymentMethod">
<option value="">Method</option>
<option>Cash</option>
<option>Bank Transfer</option>
<option>UPI</option>
</select>

<input id="paymentRemarks" placeholder="Remarks">

<p id="paymentPreview"></p>

<button onclick="saveTransporterPayment()">Save Payment</button>

</div>

<!-- 🔥 YOUR EXISTING BULK PAYMENT (UNCHANGED) -->
<div class="card">

<h3>Bulk Payment</h3>

<label><input type="checkbox" onclick="toggleAll(this)"> Select All</label>

<br><br>

Total Amount:
<input id="bulkAmount" readonly>

<input type="date" id="bulkDate">

<select id="bulkMethod">
<option value="">Method</option>
<option>Cash</option>
<option>Bank Transfer</option>
<option>UPI</option>
</select>

<input id="bulkRemarks" placeholder="Remarks">

<button onclick="saveBulkPayment()">Save Payment</button>

</div>

<table>  
<thead>  
<tr>
<th>Select</th>
<th>Transporter</th>
<th>Trip</th>
<th>Freight</th>
<th>Expenses</th>
<th>Paid</th>
<th>Balance</th>
<th>Status</th>
<th>Progress</th>
</tr>
</thead>  
<tbody id="paymentTable"></tbody>  
</table>  

</div>  

<script>  

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

let fullData=[],filteredData=[],paymentsData=[],expenseMap={}
let page=1,pageSize=12

/* 🔥 NEW VARIABLES */
let transporters=[]
let transporterTrips=[]
let selectedTrips=[]
let totalAmount=0

init()

async function init(){

const {data:trips=[]}=await supabaseClient
.from("trips").select("*, transporters(transporter_name)")

const {data:payments=[]}=await supabaseClient
.from("transporter_payments").select("*")

paymentsData=payments

let paymentMap={}
payments.forEach(p=>{
if(!paymentMap[p.trip_id]) paymentMap[p.trip_id]=0
paymentMap[p.trip_id]+=Number(p.amount||0)
})

fullData=trips.map(t=>{
let freight=(t.weight_kg/1000)*(t.transporter_rate||0)
let paid=paymentMap[t.id]||0
let balance=freight-paid

return {...t,freight,paid,balance}
})

filteredData=[...fullData]

renderTable()

loadTransporters()
}

/* TABLE */
function renderTable(){

let html=""

filteredData.forEach(t=>{
html+=`
<tr>
<td><input type="checkbox" class="tripCheck"
value="${t.id}" data-balance="${t.balance}"
onchange="updateBulkTotal()"></td>

<td>${t.transporters?.transporter_name||"-"}</td>
<td>${t.trip_no}</td>
<td>₹ ${t.freight.toFixed(0)}</td>
<td>-</td>
<td>₹ ${t.paid.toFixed(0)}</td>
<td>₹ ${t.balance.toFixed(0)}</td>
<td>-</td>
<td>-</td>
</tr>`
})

paymentTable.innerHTML=html
}

/* 🔥 TRANSPORTER DROPDOWN */
async function loadTransporters(){

const {data}=await supabaseClient.from("transporters").select("*")

transporters=data||[]

let html='<option value="">Select Transporter</option>'

transporters.forEach(t=>{
html+=`<option value="${t.id}">${t.transporter_name}</option>`
})

transporterSelect.innerHTML=html
}

/* 🔥 LOAD TRIPS */
async function loadTripsByTransporter(){

let id=transporterSelect.value
if(!id) return

const {data:trips}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",id)

transporterTrips=trips

let html=""

trips.forEach(t=>{
let freight=(t.weight_kg/1000)*(t.transporter_rate||0)
html+=`
<div>
<input type="checkbox" value="${t.id}" data-amount="${freight}">
${t.trip_no} | ₹${freight.toFixed(0)}
</div>`
})

tripList.innerHTML=html
}

/* 🔥 TOTAL */
function generatePayment(){

let checked=document.querySelectorAll("#tripList input:checked")

selectedTrips=[]
totalAmount=0

checked.forEach(c=>{
let trip=transporterTrips.find(t=>t.id==c.value)
selectedTrips.push(trip)
totalAmount+=Number(c.dataset.amount||0)
})

paymentPreview.innerHTML=`Total: ₹${totalAmount}`
}

document.addEventListener("change",e=>{
if(e.target.closest("#tripList")) generatePayment()
})

function toggleAllTrips(){
let checked=selectAllTrips.checked
document.querySelectorAll("#tripList input").forEach(c=>c.checked=checked)
generatePayment()
}

/* 🔥 SAVE */
async function saveTransporterPayment(){

let date=paymentDate.value
let method=paymentMethod.value

if(selectedTrips.length===0){ alert("Select trips"); return }

for(let t of selectedTrips){

let freight=(t.weight_kg/1000)*(t.transporter_rate||0)

await supabaseClient.from("transporter_payments").insert({
trip_id:t.id,
amount:freight,
payment_date:date,
payment_method:method
})

}

alert("Payment Saved ✅")
init()
}

/* 🔥 EXISTING BULK */
function toggleAll(cb){
document.querySelectorAll(".tripCheck").forEach(c=>c.checked=cb.checked)
updateBulkTotal()
}

function updateBulkTotal(){
let total=0
document.querySelectorAll(".tripCheck:checked").forEach(c=>{
total+=Number(c.dataset.balance||0)
})
bulkAmount.value=total.toFixed(0)
}

async function saveBulkPayment(){
let selected=document.querySelectorAll(".tripCheck:checked")
for(const c of selected){
await supabaseClient.from("transporter_payments").insert({
trip_id:c.value,
amount:Number(c.dataset.balance||0)
})
}
alert("Saved")
init()
}

</script>  

</body>  
</html>
