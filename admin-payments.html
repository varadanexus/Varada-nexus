<!DOCTYPE html>
<html>

<head>
<title>Transporter Payments - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

select,input{
padding:10px;margin:5px;border:1px solid #ccc;border-radius:4px;
}

button{
padding:10px 14px;background:#1f3c88;color:white;border:none;border-radius:4px;
margin-right:5px;
}

.deleteBtn{background:#d9534f;}

table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;}

.status-paid{color:green;font-weight:bold;}
.status-pending{color:red;font-weight:bold;}
.status-partial{color:orange;font-weight:bold;}
</style>

</head>

<body>

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
document.getElementById("sidebar").style.display="block"
})
</script>

<div class="main">

<h2>Transporter Payments</h2>

<div class="card">
<h3>Select Transporter</h3>
<select id="transporterSelect" onchange="loadTrips()"></select>
</div>

<div class="card">
<h3>Select Trips</h3>

<label><input type="checkbox" onclick="toggleAll(this)"> Select All</label>

<table>
<thead>
<tr>
<th>Select</th>
<th>Trip</th>
<th>Weight (KG)</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="tripTable"></tbody>
</table>
</div>

<div class="card">
<h3>Create Invoice</h3>

<button onclick="generateInvoice()">Generate Invoice</button>
<p id="invoicePreview"></p>

<button onclick="saveInvoice()">Save Invoice</button>
</div>

<div class="card">
<h3>Payment</h3>

Invoice Amount:
<input id="totalAmount" readonly>

Enter Payment:
<input id="paidAmount">

<input type="date" id="paymentDate">

<select id="paymentMethod">
<option value="">Method</option>
<option>Cash</option>
<option>Bank Transfer</option>
<option>UPI</option>
</select>

<button onclick="savePayment()">Save Payment</button>
</div>

<div class="card">

<h3>Invoices</h3>

<input id="searchInvoice" placeholder="Search Invoice" oninput="searchInvoices()">

<table>
<thead>
<tr>
<th>Invoice</th>
<th>Trips</th>
<th>Weight</th>
<th>Amount</th>
<th>Paid</th>
<th>Balance</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="invoiceTable"></tbody>

</table>

</div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

let transporters=[], trips=[], invoices=[]
let selectedTrips=[]
let invoiceAmount=0
let currentInvoice=null

init()

async function init(){
await loadTransporters()
await loadInvoices()
}

async function loadTransporters(){
const {data}=await supabaseClient.from("transporters").select("*")
transporterSelect.innerHTML='<option value="">Select</option>'+
data.map(t=>`<option value="${t.id}">${t.transporter_name}</option>`).join("")
}

async function loadTrips(){

let id=transporterSelect.value
if(!id) return

const {data:tripData}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",id)

const {data:inv}=await supabaseClient
.from("transporter_invoices")
.select("trip_ids")

let usedTrips=[]
inv?.forEach(i=>{
i.trip_ids?.split(",").forEach(t=>usedTrips.push(t.trim()))
})

trips = tripData
.filter(t=>!usedTrips.includes(t.id))
.sort((a,b)=> new Date(b.created_at)-new Date(a.created_at))

renderTrips()
}

function renderTrips(){

tripTable.innerHTML = trips.map(t=>{
let amt=(t.weight_kg/1000)*(t.transporter_rate||0)

return `
<tr>
<td><input type="checkbox" class="tripCheck" value="${t.id}"></td>
<td>${t.trip_no} | ${t.route||"-"} | ${t.truck||"-"} | ${t.trip_date||"-"}</td>
<td>${t.weight_kg||0}</td>
<td>₹${amt.toFixed(0)}</td>
</tr>
`
}).join("")
}

function toggleAll(cb){
document.querySelectorAll(".tripCheck").forEach(c=>c.checked=cb.checked)
}

function generateInvoice(){

let checked=document.querySelectorAll(".tripCheck:checked")

if(!checked.length){
alert("Select trips")
return
}

selectedTrips=[]
let total=0, weight=0

checked.forEach(c=>{
let t=trips.find(x=>x.id==c.value)
selectedTrips.push(t)

total += (t.weight_kg/1000)*(t.transporter_rate||0)
weight += Number(t.weight_kg||0)
})

invoiceAmount=total
totalAmount.value=total.toFixed(0)

invoicePreview.innerHTML=`
Trips: ${selectedTrips.map(t=>t.trip_no).join(", ")}<br>
Total Weight: ${weight} KG<br>
<b>Amount: ₹${total}</b>
`
}

async function saveInvoice(){

const {data}=await supabaseClient.from("transporter_invoices").insert({
invoice_no:"TINV-"+Math.floor(Math.random()*100000),
transporter_id:transporterSelect.value,
trip_ids:selectedTrips.map(t=>t.id).join(","),
total_amount:invoiceAmount,
balance_amount:invoiceAmount,
paid_amount:0,
status:"Pending"
}).select().single()

currentInvoice=data

alert("Invoice Created")

loadTrips()
loadInvoices()
}

async function savePayment(){

let amount=Number(paidAmount.value)

if(!currentInvoice){
alert("Select invoice")
return
}

await supabaseClient.from("transporter_payments").insert({
invoice_id:currentInvoice.id,
amount,
payment_date:paymentDate.value,
payment_method:paymentMethod.value
})

let paid=(currentInvoice.paid_amount||0)+amount
let balance=currentInvoice.total_amount-paid

let status="Pending"
if(balance<=0) status="Paid"
else if(paid>0) status="Partial"

await supabaseClient.from("transporter_invoices")
.update({
paid_amount:paid,
balance_amount:balance,
status
})
.eq("id",currentInvoice.id)

alert("Payment Saved")

loadInvoices()
}

async function loadInvoices(){

const {data}=await supabaseClient
.from("transporter_invoices")
.select("*")
.order("created_at",{ascending:false})

invoices=data||[]

await renderInvoices(invoices)
}

/* 🔥 FIXED PART */
async function renderInvoices(data){

let html=""

for(let i of data){

let tripIds=i.trip_ids.split(",")

const {data:tripData}=await supabaseClient
.from("trips")
.select("trip_no,route,truck,trip_date,weight_kg")
.in("id",tripIds)

let tripDetails = tripData.map(t=>`
${t.trip_no} | ${t.route||"-"} | ${t.truck||"-"} | ${t.trip_date||"-"} | ${t.weight_kg||0} KG
`).join("<br>")

let totalWeight = tripData.reduce((s,t)=>s+Number(t.weight_kg||0),0)

let statusClass =
i.status==="Paid"?"status-paid":
i.status==="Partial"?"status-partial":"status-pending"

html+=`
<tr onclick="selectInvoice('${i.id}')">
<td>${i.invoice_no}</td>
<td>${tripDetails}</td>
<td>${totalWeight} KG</td>
<td>₹${i.total_amount}</td>
<td>₹${i.paid_amount||0}</td>
<td>₹${i.balance_amount}</td>
<td class="${statusClass}">${i.status}</td>
<td>
<button onclick="downloadInvoice('${i.id}',event)">PDF</button>
<button onclick="editPayment('${i.id}',event)">Edit</button>
<button class="deleteBtn" onclick="deletePayment('${i.id}',event)">Delete</button>
</td>
</tr>
`
}

invoiceTable.innerHTML=html
}

function searchInvoices(){
let q=searchInvoice.value.toLowerCase()
let filtered=invoices.filter(i=>i.invoice_no.toLowerCase().includes(q))
renderInvoices(filtered)
}

function selectInvoice(id){
currentInvoice=invoices.find(i=>i.id==id)
totalAmount.value=currentInvoice.total_amount
}

async function editPayment(id,e){

e.stopPropagation()

let val=prompt("Enter new paid amount")
if(!val) return

let inv=invoices.find(i=>i.id==id)

let paid=Number(val)
let balance=inv.total_amount-paid

let status="Pending"
if(balance<=0) status="Paid"
else if(paid>0) status="Partial"

await supabaseClient
.from("transporter_invoices")
.update({
paid_amount:paid,
balance_amount:balance,
status
})
.eq("id",id)

alert("Updated")

loadInvoices()
}

async function deletePayment(id,e){

e.stopPropagation()

if(!confirm("Delete payment?")) return

await supabaseClient
.from("transporter_payments")
.delete()
.eq("invoice_id",id)

await supabaseClient
.from("transporter_invoices")
.update({
paid_amount:0,
balance_amount:0,
status:"Pending"
})
.eq("id",id)

alert("Deleted")

loadInvoices()
}

async function downloadInvoice(id,e){

e.stopPropagation()

const { jsPDF } = window.jspdf
let inv=invoices.find(i=>i.id==id)

/* 🔥 GET TRIP DETAILS */
let tripIds = inv.trip_ids.split(",")

const {data:tripData}=await supabaseClient
.from("trips")
.select("trip_no,route,truck,trip_date,weight_kg,transporter_rate")
.in("id",tripIds)

/* CALCULATIONS */
let totalWeight = 0
let tableRows = []

tripData.forEach(t=>{
let mt = (t.weight_kg||0)/1000
let amount = mt * (t.transporter_rate||0)

totalWeight += mt

tableRows.push([
t.trip_no,
t.route || "-",
t.truck || "-",
t.trip_date || "-",
(mt.toFixed(2)),
("₹ "+amount.toFixed(2))
])
})

/* PDF START */
let doc=new jsPDF()

/* 🔥 LOGO (PUT logo.png in same folder) */
doc.addImage("images/logo.png","PNG",15,10,20,20)

/* HEADER */
doc.setFont("helvetica","bold")
doc.setFontSize(16)
doc.text("VARADA NEXUS PRIVATE LIMITED",40,18)

doc.setFont("helvetica","normal")
doc.setFontSize(11)
doc.text("Transporter Invoice",40,25)

/* INVOICE INFO */
doc.text("Invoice No : "+inv.invoice_no,15,40)
doc.text("Status     : "+inv.status,15,47)

/* TABLE HEADER */
let startY = 60

doc.autoTable({
startY: startY,
head: [["Trip","Route","Truck","Date","Weight (MT)","Amount"]],
body: tableRows,
theme: "grid",
styles: {fontSize:10}
})

/* TOTALS */
let finalY = doc.lastAutoTable.finalY + 10

doc.setFont("helvetica","bold")

doc.text("Total Weight (MT) : "+ totalWeight.toFixed(2),15,finalY)
doc.text("Total Amount      : ₹ "+ Number(inv.total_amount).toFixed(2),15,finalY+7)
doc.text("Paid              : ₹ "+ Number(inv.paid_amount||0).toFixed(2),15,finalY+14)
doc.text("Balance           : ₹ "+ Number(inv.balance_amount).toFixed(2),15,finalY+21)

/* FOOTER */
doc.setFont("helvetica","normal")
doc.setFontSize(10)
doc.text("This is a system generated invoice.",15,finalY+35)

doc.save(inv.invoice_no+".pdf")
}
</script>

</body>
</html>
