function setActiveMenu(){

let currentPage = window.location.pathname.split("/").pop()

document.querySelectorAll("#sidebar a").forEach(link=>{

    let page = link.getAttribute("data-page")

    if(page === currentPage){
        link.classList.add("active")
    }

})

}

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const authId = session.user.id
const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

/* LOGOUT */

window.logout = async function(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}

async function loadTrips(){

let id=transporterSelect.value
if(!id) return

const { data: tripData } = await supabaseClient
  .from('trips')
  .select(`
    id,
    trip_no,
    transporter_rate,
    weight_kg,
    truck_id,
    created_at,
    expenses ( amount )
  `)
  .eq("transporter_id", id)

const {data:inv}=await supabaseClient
.from("transporter_invoices")
.select("trip_ids")

let usedTrips=[]
inv?.forEach(i=>{
i.trip_ids?.split(",").forEach(t=>usedTrips.push(t.trim()))
})

trips = (tripData || [])
.filter(t=>!usedTrips.includes(String(t.id)))
.sort((a,b)=> new Date(b.created_at)-new Date(a.created_at))

renderTrips()
}

function renderTrips(){

tripTable.innerHTML = trips.map(t=>{

const mt = (t.weight_kg || 0) / 1000

const tripAmount = mt * (t.transporter_rate || 0)

// ✅ calculate expenses
const totalExpenses = (t.expenses || []).reduce(
  (sum, e) => sum + (e.amount || 0),
  0
)

// ✅ FINAL amount after deduction
const netAmount = tripAmount - totalExpenses

return `
<tr>
<td><input type="checkbox" class="tripCheck" value="${t.id}"></td>
<td>${t.trip_no}</td>
<td>${t.weight_kg}</td>
<td>₹${formatCurrency(tripAmount)}</td>
<td>₹${formatCurrency(totalExpenses)}</td>
<td>₹${formatCurrency(netAmount)}</td>
</tr>
`
}).join("")
}

let checked=document.querySelectorAll(".tripCheck:checked")

alert("Select trips")
return

let total=0, weight=0

checked.forEach(c=>{
let t=trips.find(x=>x.id==c.value)
selectedTrips.push(t)

const mt = (t.weight_kg || 0) / 1000

const tripAmount = mt * (t.transporter_rate || 0)

// ✅ expenses
const totalExpenses = (t.expenses || []).reduce(
  (sum, e) => sum + (e.amount || 0),
  0
)

// ✅ net payable
const netAmount = tripAmount - totalExpenses

total += round2(netAmount)
weight += Number(t.weight_kg||0)
})

invoiceAmount=total


invoicePreview.innerHTML=`
Trips: ${selectedTrips.map(t=>t.trip_no).join(", ")}<br>
Total Weight: ${weight} KG<br>
<b>Amount: ₹${formatCurrency(total)}</b>
`
}

async function generateTransporterInvoiceNo(){

let today = new Date()

let yy = String(today.getFullYear()).slice(-2)
let mm = String(today.getMonth()+1).padStart(2,'0')
let dd = String(today.getDate()).padStart(2,'0')

let prefix = `TSTAT${yy}${mm}${dd}`

/* 🔥 GET TODAY'S INVOICES */
const { data } = await supabaseClient
.from("transporter_invoices")
.select("invoice_no")
.ilike("invoice_no", prefix + "%")

let max = 0

data?.forEach(i=>{
let num = parseInt(i.invoice_no.slice(-3)) || 0
if(num > max) max = num
})

let next = max + 1
let seq = String(next).padStart(3,'0')

return prefix + seq
}

async function renderInvoices(data){

let html=""

for(let i of data){

let tripIds=i.trip_ids.split(",")

const {data:tripData}=await supabaseClient
.from("trips")
.select("trip_no,route,truck,trip_date,weight_kg")
.in("id",tripIds)

let tripDetails = tripData.map(t=>`
${t.trip_no} | ${t.route||"-"} | ${t.truck||"-"} | ${t.trip_date||"-"} | ${t.weight_kg||0} KG
`).join("<br>")

let totalWeight = tripData.reduce((s,t)=>s+Number(t.weight_kg||0),0)

let statusClass =
i.status==="Paid"?"status-paid":
i.status==="Partial"?"status-partial":"status-pending"

html+=`
<tr>
<td>${i.invoice_no}</td>
<td>${tripDetails}</td>
<td>${totalWeight} KG</td>
<td>₹${i.total_amount}</td>
<td>₹${i.paid_amount||0}</td>
<td>₹${i.balance_amount}</td>
<td class="${statusClass}">${i.status}</td>
<td>
<button onclick="downloadInvoice('${i.id}',event)">PDF</button>
<button onclick="editPayment('${i.id}',event)">Edit</button>
<button class="deleteBtn" onclick="deletePayment('${i.id}',event)">Delete</button>
</td>
</tr>
`
}

invoiceTable.innerHTML=html
}

}

async function editPayment(id,e){

e.stopPropagation()

let val=prompt("Enter new paid amount")
if(!val) return

let inv=invoices.find(i=>i.id==id)

let paid = round2(Number(val || 0))
let balance = round2(inv.total_amount - paid)

let status = "Pending"

if(balance <= 0.01){
    balance = 0
    status = "Paid"
}
else if(paid > 0){
    status = "Partial"
}

await supabaseClient
.from("transporter_invoices")
.update({
paid_amount:paid,
balance_amount:balance,
status
})
.eq("id",id)

alert("Updated")

loadInvoices()

function round2(num){
return Math.round((num + Number.EPSILON) * 100) / 100
}

async function recalculateInvoice(invoiceId){

/* GET INVOICE */
const {data:inv} = await supabaseClient
.from("transporter_invoices")
.select("trip_ids, paid_amount")
.eq("id", invoiceId)
.single()

if(!inv) return

let tripIds = inv.trip_ids.split(",")

/* GET TRIPS */
const {data:tripData} = await supabaseClient
.from("trips")
.select(`
weight_kg,
transporter_rate,
expenses ( amount )
`)
.in("id", tripIds)

/* BASE TOTAL */
let total = 0

tripData.forEach(t=>{

let mt = (t.weight_kg || 0) / 1000
let gross = mt * (t.transporter_rate || 0)

let exp = (t.expenses || []).reduce((s,e)=>s+(e.amount||0),0)

let net = gross - exp

total += round2(net)
})

/* GET ADJUSTMENTS */
const {data:adj} = await supabaseClient
.from("transporter_adjustments")
.select("amount,type")
.eq("invoice_id", invoiceId)

/* APPLY ADJUSTMENTS */
let adjTotal = 0

adj?.forEach(a=>{
if(a.type === "Penalty"){
adjTotal -= Number(a.amount || 0)
}else{
adjTotal += Number(a.amount || 0)
}
})

let finalAmount = round2(total + adjTotal)

let paid = inv.paid_amount || 0
let balance = round2(finalAmount - paid)

/* UPDATE INVOICE */
await supabaseClient
.from("transporter_invoices")
.update({
total_amount: finalAmount,
balance_amount: balance
})
.eq("id", invoiceId)

}
