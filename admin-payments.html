<script>

/* ✅ STANDARD SIDEBAR (FIXED) */

fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{

document.getElementById("sidebar-container").innerHTML = data

const sidebar = document.getElementById("sidebar")

/* 🔥 HIDE FIRST */
if(sidebar){
    sidebar.style.display = "none"
}

setTimeout(async ()=>{

    /* ✅ RBAC FIRST */
    if(typeof applyMenuRBAC === "function"){
        await applyMenuRBAC()
    }

    /* ✅ USER INIT */
    await initSidebar()

    /* ✅ ACTIVE MENU */
    setActiveMenu()

    /* ✅ ICON FIX */
    if(window.lucide){
        lucide.createIcons()
    }

    /* ✅ SHOW AFTER EVERYTHING */
    if(sidebar){
        sidebar.style.display = "block"
    }

},200)

})

function setActiveMenu(){

let currentPage = window.location.pathname.split("/").pop()

document.querySelectorAll("#sidebar a").forEach(link=>{

    let page = link.getAttribute("data-page")

    if(page === currentPage){
        link.classList.add("active")
    }

})

}

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const authId = session.user.id
const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

/* LOGOUT */

window.logout = async function(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}

</script>

let transporters=[], trips=[], invoices=[]

async function loadTransporters(){
const {data}=await supabaseClient.from("transporters").select("*")
transporterSelect.innerHTML='<option value="">Select</option>'+
data.map(t=>`<option value="${t.id}">${t.transporter_name}</option>`).join("")
}

async function loadTrips(){

let id=transporterSelect.value
if(!id) return

const { data: tripData } = await supabaseClient
  .from('trips')
  .select(`
    id,
    trip_no,
    transporter_rate,
    weight_kg,
    truck_id,
    created_at,
    expenses ( amount )
  `)
  .eq("transporter_id", id)

const {data:inv}=await supabaseClient
.from("transporter_invoices")
.select("trip_ids")

let usedTrips=[]
inv?.forEach(i=>{
i.trip_ids?.split(",").forEach(t=>usedTrips.push(t.trim()))
})

trips = (tripData || [])
.filter(t=>!usedTrips.includes(String(t.id)))
.sort((a,b)=> new Date(b.created_at)-new Date(a.created_at))

renderTrips()
}

function renderTrips(){

tripTable.innerHTML = trips.map(t=>{

const mt = (t.weight_kg || 0) / 1000

const tripAmount = mt * (t.transporter_rate || 0)

// ✅ calculate expenses
const totalExpenses = (t.expenses || []).reduce(
  (sum, e) => sum + (e.amount || 0),
  0
)

// ✅ FINAL amount after deduction
const netAmount = tripAmount - totalExpenses

return `
<tr>
<td><input type="checkbox" class="tripCheck" value="${t.id}"></td>
<td>${t.trip_no}</td>
<td>${t.weight_kg}</td>
<td>₹${tripAmount.toFixed(0)}</td>
<td>₹${totalExpenses.toFixed(0)}</td>
<td>₹${netAmount.toFixed(0)}</td>
</tr>
`
}).join("")
}

function toggleAll(cb){
document.querySelectorAll(".tripCheck").forEach(c=>c.checked=cb.checked)
}

function generateInvoice(){

let checked=document.querySelectorAll(".tripCheck:checked")

if(!checked.length){
alert("Select trips")
return
}

selectedTrips=[]
let total=0, weight=0

checked.forEach(c=>{
let t=trips.find(x=>x.id==c.value)
selectedTrips.push(t)

const mt = (t.weight_kg || 0) / 1000

const tripAmount = mt * (t.transporter_rate || 0)

// ✅ expenses
const totalExpenses = (t.expenses || []).reduce(
  (sum, e) => sum + (e.amount || 0),
  0
)

// ✅ net payable
const netAmount = tripAmount - totalExpenses

total += netAmount
weight += Number(t.weight_kg||0)
})

invoiceAmount=total
totalAmount.value=total.toFixed(0)

invoicePreview.innerHTML=`
Trips: ${selectedTrips.map(t=>t.trip_no).join(", ")}<br>
Total Weight: ${weight} KG<br>
<b>Amount: ₹${total}</b>
`
}

async function saveInvoice(){

trip_ids:selectedTrips.map(t=>t.id).join(","),
total_amount:invoiceAmount,
balance_amount:invoiceAmount,
paid_amount:0,
status:"Pending"
}).select().single()

currentInvoice=data

alert("Invoice Created")

loadTrips()
loadInvoices()
}

.single()

.from("transporter_invoices")

.from("user_roles")
.select("user_id")
.eq("role_id", managerRole.id)

}

const {data:managerPhones} = await supabaseClient
.from("user_contacts")

managerPhones?.forEach(p=>{
if(p.phone) phones.push(p.phone)

/* 🔹 REMOVE DUPLICATES */

/* 🔥 FIXED PART */
async function renderInvoices(data){

let html=""

for(let i of data){

let tripIds=i.trip_ids.split(",")

const {data:tripData}=await supabaseClient
.from("trips")
.select("trip_no,route,truck,trip_date,weight_kg")
.in("id",tripIds)

let tripDetails = tripData.map(t=>`
${t.trip_no} | ${t.route||"-"} | ${t.truck||"-"} | ${t.trip_date||"-"} | ${t.weight_kg||0} KG
`).join("<br>")

let totalWeight = tripData.reduce((s,t)=>s+Number(t.weight_kg||0),0)

let statusClass =
i.status==="Paid"?"status-paid":
i.status==="Partial"?"status-partial":"status-pending"

html+=`
<tr>
<td>${i.invoice_no}</td>
<td>${tripDetails}</td>
<td>${totalWeight} KG</td>
<td>₹${i.total_amount}</td>

<td class="${statusClass}">${i.status}</td>

<button onclick="editPayment('${i.id}',event)">Edit</button>
<button class="deleteBtn" onclick="deletePayment('${i.id}',event)">Delete</button>
</td>
</tr>
`
}

invoiceTable.innerHTML=html
}

async function editPayment(id,e){

let inv=invoices.find(i=>i.id==id)

let paid=Number(val)
let balance=inv.total_amount-paid

let status="Pending"
if(balance<=0) status="Paid"
else if(paid>0) status="Partial"

await supabaseClient
.from("transporter_invoices")
.update({
paid_amount:paid,
balance_amount:balance,
status
})
.eq("id",id)

alert("Updated")

loadInvoices()
}

async function deletePayment(id,e){

.from("transporter_payments")
.delete()
.eq("invoice_id",id)

.from("transporter_invoices")
.delete()
.eq("id",id)

/* 3. REFRESH */
loadTrips()

}

// Text above line
doc.setFontSize(9)
doc.text("Authorized Signatory", 162, signY - 3, { align: "center" })
  
/* FOOTER */
doc.setFont("helvetica","normal")
doc.setFontSize(10)
doc.setFontSize(9)
doc.text("This is a system generated document. No signature required.",15,285)
doc.text("Payment has been processed successfully.",15,292)

// 🔷 QR CODE (Payment Proof)
let qrData = `INV:${inv.invoice_no} | AMT:${inv.total_amount} | PAID:${inv.paid_amount || 0} | STATUS:${inv.status}`

let qrDiv = document.createElement("div")

new QRCode(qrDiv, {
text: qrData,
width: 80,
height: 80
})

// ⏳ Wait for QR to render
setTimeout(() => {

let qrCanvas = qrDiv.querySelector("canvas")

if(qrCanvas){
let qrImg = qrCanvas.toDataURL()
doc.addImage(qrImg, "PNG", 155, 65, 35, 35)
}

// ✅ SAVE ONLY AFTER QR IS READY
doc.save(inv.invoice_no + ".pdf")

}, 300)

// 🚫 STOP function here
return
}
</script>
