<!DOCTYPE html>  
<html>  

<head>  
<title>Admin Payments - Varada Nexus</title> 

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>  
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>  

<style>  

body{margin:0;font-family:Arial;background:#f4f6f9;}  
.main{margin-left:220px;padding:30px;}  

h2{color:#1f3c88;}  

.cards{display:flex;gap:15px;margin-bottom:20px;}

.card{
background:white;padding:15px;border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);min-width:180px;
}

.filters{margin-bottom:15px;}
.filters input,.filters select{padding:6px;margin-right:8px;}

table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;}

.paid{color:green;font-weight:bold;}
.pending{color:red;font-weight:bold;}

.progress-bar{height:6px;background:#ddd;border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:green;}

.overdue{background:#ffe6e6;}

.popup{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;background:rgba(0,0,0,0.5);
}

.popup-content{
background:white;width:400px;margin:120px auto;
padding:20px;border-radius:6px;
}

</style>  
</head>  

<body>  

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML = data
await initSidebar()
if(typeof applyMenuRBAC === "function"){ await applyMenuRBAC() }
document.getElementById("sidebar").style.display = "block"
})

async function initSidebar(){
const {data:{session}} = await supabaseClient.auth.getSession()
if(!session){ window.location.href="login.html"; return }

const email=session.user.email
document.getElementById("userName").innerText=email.split("@")[0]

window.logout=async()=>{
await supabaseClient.auth.signOut()
window.location.href="login.html"
}
}
</script>

<div class="main">  

<h2>Admin Payments Dashboard</h2>  

<button onclick="downloadPDF()">Download PDF</button>  

<div class="cards">  
<div class="card"><h4>Total Freight</h4><h2 id="totalFreight">₹0</h2></div>  
<div class="card"><h4>Total Paid</h4><h2 id="totalPaid">₹0</h2></div>  
<div class="card"><h4>Outstanding</h4><h2 id="totalBalance">₹0</h2></div>  
<div class="card"><h4>Collection %</h4><h2 id="collectionPercent">0%</h2></div>  
</div>  

<!-- 🔥 BULK PAYMENT -->
<div class="card">

<h3>Bulk Payment</h3>

<label><input type="checkbox" onclick="toggleAll(this)"> Select All</label>

<br><br>

Total Amount:
<input id="bulkAmount" readonly>

<input type="date" id="bulkDate">

<select id="bulkMethod">
<option value="">Method</option>
<option>Cash</option>
<option>Bank Transfer</option>
<option>UPI</option>
</select>

<input id="bulkRemarks" placeholder="Remarks">

<button onclick="saveBulkPayment()">Save Payment</button>

</div>

<div class="filters">  

From <input type="date" id="fromDate">  
To <input type="date" id="toDate">  

<select id="statusFilter">  
<option value="">All</option>  
<option value="Paid">Paid</option>  
<option value="Pending">Pending</option>  
</select>  

<label><input type="checkbox" id="unpaidOnly"> Unpaid Only</label>  

<select id="pageSize" onchange="changePageSize()">  
<option value="12">12</option>
<option value="25">25</option>
<option value="50">50</option>
<option value="100">100</option>
</select>  

<button onclick="applyFilter()">Search</button>  
<button onclick="clearFilter()">Clear</button>  

</div>  

<table>  
<thead>  
<tr>
<th>Select</th>
<th>Transporter</th>
<th>Trip</th>
<th>Freight</th>
<th>Expenses</th>
<th>Paid</th>
<th>Balance</th>
<th>Status</th>
<th>Progress</th>
</tr>
</thead>  
<tbody id="paymentTable"></tbody>  
</table>  

</div>  

<div id="popup" class="popup">  
<div class="popup-content">  
<h3 id="popupTitle"></h3>  
<div id="popupBody"></div>  
<button onclick="closePopup()">Close</button>
</div>
</div>  

<script>  

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

let fullData=[],filteredData=[],paymentsData=[],expenseMap={}
let page=1,pageSize=12

init()

async function init(){

const {data:trips=[]}=await supabaseClient
.from("trips").select("*, transporters(transporter_name)")

trips.sort((a,b)=> new Date(b.created_at||b.trip_date)-new Date(a.created_at||a.trip_date))

let tripIds=trips.map(t=>t.id)

const {data:payments=[]}=await supabaseClient
.from("transporter_payments").select("*").in("trip_id",tripIds)

paymentsData=payments

const {data:expenses=[]}=await supabaseClient.from("expenses").select("*")

expenses.forEach(e=>{
if(!expenseMap[e.trip_id]) expenseMap[e.trip_id]=0
expenseMap[e.trip_id]+=Number(e.amount||0)
})

let paymentMap={}
payments.forEach(p=>{
if(!paymentMap[p.trip_id]) paymentMap[p.trip_id]=0
paymentMap[p.trip_id]+=Number(p.amount||0)
})

let totalFreight=0,totalPaid=0,totalBalance=0

fullData=trips.map(t=>{
let freight=(t.weight_kg/1000)*(t.transporter_rate||0)
let expense=expenseMap[t.id]||0
let net=freight-expense
let paid=paymentMap[t.id]||0
let balance=net-paid

totalFreight+=net
totalPaid+=paid
totalBalance+=balance

return {...t,freight,expense,paid,balance,status:paid>=net?"Paid":"Pending"}
})

filteredData=[...fullData]

document.getElementById("totalFreight").innerText="₹ "+totalFreight.toFixed(0)
document.getElementById("totalPaid").innerText="₹ "+totalPaid.toFixed(0)
document.getElementById("totalBalance").innerText="₹ "+totalBalance.toFixed(0)
document.getElementById("collectionPercent").innerText=
((totalPaid/totalFreight)*100).toFixed(1)+"%"

renderTable()
}

/* TABLE */
function renderTable(){

let data=filteredData.slice((page-1)*pageSize,page*pageSize)
let html=""

data.forEach(t=>{
let net=t.freight-t.expense
let percent=net>0?(t.paid/net)*100:0

html+=`
<tr>
<td><input type="checkbox" class="tripCheck"
value="${t.id}" data-balance="${t.balance}"
onchange="updateBulkTotal()"></td>

<td>${t.transporters?.transporter_name||"-"}</td>
<td>${t.trip_no}</td>
<td>₹ ${t.freight.toFixed(0)}</td>
<td>₹ ${t.expense.toFixed(0)}</td>
<td>₹ ${t.paid.toFixed(0)}</td>
<td>₹ ${t.balance.toFixed(0)}</td>
<td>${t.status}</td>
<td>${percent.toFixed(0)}%</td>
</tr>`
})

paymentTable.innerHTML=html
}

/* 🔥 BULK FUNCTIONS */

function toggleAll(cb){
document.querySelectorAll(".tripCheck").forEach(c=>c.checked=cb.checked)
updateBulkTotal()
}

function updateBulkTotal(){
let total=0
document.querySelectorAll(".tripCheck:checked").forEach(c=>{
total+=Number(c.dataset.balance||0)
})
bulkAmount.value=total.toFixed(0)
}

async function saveBulkPayment(){

let selected=document.querySelectorAll(".tripCheck:checked")
let date=bulkDate.value
let method=bulkMethod.value

if(selected.length===0){ alert("Select trips"); return }
if(!date||!method){ alert("Enter date & method"); return }

for(const c of selected){
await supabaseClient.from("transporter_payments").insert({
trip_id:c.value,
amount:Number(c.dataset.balance||0),
payment_date:date,
payment_method:method
})
}

alert("Payment Saved ✅")
init()
}

/* OTHER FUNCTIONS (UNCHANGED) */
function applyFilter(){}
function clearFilter(){}
function changePageSize(){}
function nextPage(){}
function prevPage(){}
function closePopup(){}
function downloadPDF(){}

</script>  

</body>  
</html>
