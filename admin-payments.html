async function loadTrips(){

let id=transporterSelect.value
if(!id) return

const { data: tripData } = await supabaseClient
  .from('trips')
  .select(`
    id,
    trip_no,
    transporter_rate,
    weight_kg,
    truck_id,
    created_at,
    expenses ( amount )
  `)
  .eq("transporter_id", id)

const {data:inv}=await supabaseClient
.from("transporter_invoices")
.select("trip_ids")

let usedTrips=[]
inv?.forEach(i=>{
i.trip_ids?.split(",").forEach(t=>usedTrips.push(t.trim()))
})

trips = (tripData || [])
.filter(t=>!usedTrips.includes(String(t.id)))
.sort((a,b)=> new Date(b.created_at)-new Date(a.created_at))

renderTrips()
}

function renderTrips(){

tripTable.innerHTML = trips.map(t=>{

const mt = (t.weight_kg || 0) / 1000

const tripAmount = mt * (t.transporter_rate || 0)

// ✅ calculate expenses
const totalExpenses = (t.expenses || []).reduce(
  (sum, e) => sum + (e.amount || 0),
  0
)

// ✅ FINAL amount after deduction
const netAmount = tripAmount - totalExpenses

return `
<tr>
<td><input type="checkbox" class="tripCheck" value="${t.id}"></td>
<td>${t.trip_no}</td>
<td>${t.weight_kg}</td>
<td>₹${formatCurrency(tripAmount)}</td>
<td>₹${formatCurrency(totalExpenses)}</td>
<td>₹${formatCurrency(netAmount)}</td>
</tr>
`
}).join("")
}

function toggleAll(cb){
document.querySelectorAll(".tripCheck").forEach(c=>c.checked=cb.checked)

function generateInvoice(){

let checked=document.querySelectorAll(".tripCheck:checked")

if(!checked.length){
alert("Select trips")
return
}

selectedTrips=[]
let total=0, weight=0

checked.forEach(c=>{
let t=trips.find(x=>x.id==c.value)
selectedTrips.push(t)

const mt = (t.weight_kg || 0) / 1000

const tripAmount = mt * (t.transporter_rate || 0)

// ✅ expenses
const totalExpenses = (t.expenses || []).reduce(
  (sum, e) => sum + (e.amount || 0),
  0
)

// ✅ net payable
const netAmount = tripAmount - totalExpenses

total += round2(netAmount)
weight += Number(t.weight_kg||0)
})

invoiceAmount=total


invoicePreview.innerHTML=`
Trips: ${selectedTrips.map(t=>t.trip_no).join(", ")}<br>
Total Weight: ${weight} KG<br>
<b>Amount: ₹${formatCurrency(total)}</b>
`
}

async function generateTransporterInvoiceNo(){

let today = new Date()

let yy = String(today.getFullYear()).slice(-2)
let mm = String(today.getMonth()+1).padStart(2,'0')
let dd = String(today.getDate()).padStart(2,'0')

let prefix = `TSTAT${yy}${mm}${dd}`

/* 🔥 GET TODAY'S INVOICES */
const { data } = await supabaseClient
.from("transporter_invoices")
.select("invoice_no")
.ilike("invoice_no", prefix + "%")

let max = 0

data?.forEach(i=>{
let num = parseInt(i.invoice_no.slice(-3)) || 0
if(num > max) max = num
})

let next = max + 1
let seq = String(next).padStart(3,'0')

return prefix + seq
}

async function renderInvoices(data){

let html=""

for(let i of data){

let tripIds=i.trip_ids.split(",")

const {data:tripData}=await supabaseClient
.from("trips")
.select("trip_no,route,truck,trip_date,weight_kg")
.in("id",tripIds)

let tripDetails = tripData.map(t=>`
${t.trip_no} | ${t.route||"-"} | ${t.truck||"-"} | ${t.trip_date||"-"} | ${t.weight_kg||0} KG
`).join("<br>")

let totalWeight = tripData.reduce((s,t)=>s+Number(t.weight_kg||0),0)

let statusClass =
i.status==="Paid"?"status-paid":
i.status==="Partial"?"status-partial":"status-pending"

html+=`
<tr>
<td>${i.invoice_no}</td>
<td>${tripDetails}</td>
<td>${totalWeight} KG</td>
<td>₹${i.total_amount}</td>
<td>₹${i.paid_amount||0}</td>
<td>₹${i.balance_amount}</td>
<td class="${statusClass}">${i.status}</td>
<td>
<button onclick="downloadInvoice('${i.id}',event)">PDF</button>
<button onclick="editPayment('${i.id}',event)">Edit</button>
<button class="deleteBtn" onclick="deletePayment('${i.id}',event)">Delete</button>
</td>
</tr>
`
}

invoiceTable.innerHTML=html
}

function searchInvoices(){

let filtered=invoices.filter(i=>i.invoice_no.toLowerCase().includes(q))

}

function round2(num){
return Math.round((num + Number.EPSILON) * 100) / 100
}

async function recalculateInvoice(invoiceId){

/* GET INVOICE */
const {data:inv} = await supabaseClient
.from("transporter_invoices")
.select("trip_ids, paid_amount")
.eq("id", invoiceId)
.single()

if(!inv) return

let tripIds = inv.trip_ids.split(",")

/* GET TRIPS */
const {data:tripData} = await supabaseClient
.from("trips")
.select(`
weight_kg,
transporter_rate,
expenses ( amount )
`)
.in("id", tripIds)

/* BASE TOTAL */
let total = 0

tripData.forEach(t=>{

let mt = (t.weight_kg || 0) / 1000
let gross = mt * (t.transporter_rate || 0)

let exp = (t.expenses || []).reduce((s,e)=>s+(e.amount||0),0)

let net = gross - exp

total += round2(net)
})

/* GET ADJUSTMENTS */
const {data:adj} = await supabaseClient
.from("transporter_adjustments")
.select("amount,type")
.eq("invoice_id", invoiceId)

/* APPLY ADJUSTMENTS */
let adjTotal = 0

adj?.forEach(a=>{
if(a.type === "Penalty"){
adjTotal -= Number(a.amount || 0)
}else{
adjTotal += Number(a.amount || 0)
}
})

let finalAmount = round2(total + adjTotal)

let paid = inv.paid_amount || 0
let balance = round2(finalAmount - paid)

/* UPDATE INVOICE */
await supabaseClient
.from("transporter_invoices")
.update({
total_amount: finalAmount,
balance_amount: balance
})
.eq("id", invoiceId)
    
await syncTransporterStatement(invoiceId)

}

async function syncTransporterStatement(invoiceId){

  try{

    console.log("⚡ Syncing transporter statement:", invoiceId)

    __AUTO_SYNC_RUNNING = true

await regenerateTransporterStatement(invoiceId)

__AUTO_SYNC_RUNNING = false

    await loadInvoices()

    console.log("✅ Sync complete")

  }catch(err){

    console.error("❌ Sync failed:", err)

    // retry once
    try{
      await regenerateTransporterStatement(invoiceId)
    }catch(e){
      alert("Sync failed. Retry manually.")
    }

  }

}

async function uploadTransporterStatement(data){

  if(__UPLOAD_IN_PROGRESS){
    console.log("⛔ Upload already running, skipping duplicate")
    return
  }

  __UPLOAD_IN_PROGRESS = true

  try{

    const { data: { session } } = await supabaseClient.auth.getSession()

    if(!session){
      console.error("❌ No session")
      return
    }

    const formData = new FormData()

    formData.append("file", data.blob)
    formData.append("file_name", data.fileName)
    formData.append("transporter_name", data.transporterName)
    formData.append("statement_date", new Date(data.statementDate).toISOString())

    const res = await fetch(
      "https://ticsgbtxfhhihamejiss.supabase.co/functions/v1/upload-transporter-statement",
      {
        method:"POST",
        headers:{
          Authorization:`Bearer ${session.access_token}`
        },
        body: formData
      }
    )

    let result

try {
  result = await res.json()
} catch (e) {
  const text = await res.text()
  console.error("❌ RAW RESPONSE:", text)
  throw new Error("Invalid JSON from server")
}

    if(result.success){

      await supabaseClient
      .from("transporter_invoices")
      .update({
        drive_file_id: result.fileId,
        drive_link: result.fileUrl
      })
      .eq("id", data.invoiceId)

      console.log("✅ Transporter statement uploaded")

    }else{
      console.error("❌ FULL ERROR:", result)
      alert("Upload failed: " + result.error)
    }

  }catch(err){
    console.error("❌ Upload error:", err)
  }finally{
    __UPLOAD_IN_PROGRESS = false
  }
}
