<!DOCTYPE html>
<html>

<head>
<title>Transporter Payments - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}

.card{
background:white;padding:20px;border-radius:8px;margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select{padding:10px;margin:5px;border:1px solid #ccc;border-radius:4px;}

button{
padding:10px 14px;background:#1f3c88;color:white;border:none;border-radius:4px;
margin-right:5px;
}

.deleteBtn{background:#d9534f;}

table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;}

.status-paid{color:green;font-weight:bold;}
.status-pending{color:red;font-weight:bold;}
.status-partial{color:orange;font-weight:bold;}

.print-box{
display:none;
background:white;
padding:30px;
}
</style>

</head>

<body>

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
document.getElementById("sidebar").style.display="block"
})
</script>

<div class="main">

<h2>Transporter Payments</h2>

<!-- SEARCH -->
<div class="card">
<input id="searchInvoice" placeholder="Search Invoice No" oninput="searchInvoices()">
</div>

<!-- SELECT TRANSPORTER -->
<div class="card">
<h3>Select Transporter</h3>
<select id="transporterSelect" onchange="loadTrips()"></select>
</div>

<!-- TRIPS -->
<div class="card">
<h3>Select Trips</h3>
<label><input type="checkbox" onclick="toggleAll(this)"> Select All</label>

<table>
<thead>
<tr>
<th>Select</th>
<th>Trip</th>
<th>Weight (KG)</th>
<th>Amount</th>
</tr>
</thead>
<tbody id="tripTable"></tbody>
</table>
</div>

<!-- INVOICE -->
<div class="card">
<h3>Create Invoice</h3>
<button onclick="generateInvoice()">Generate Invoice</button>
<p id="invoicePreview"></p>
<button onclick="saveInvoice()">Save Invoice</button>
</div>

<!-- PAYMENT -->
<div class="card">
<h3>Payment</h3>

Invoice Amount:
<input id="totalAmount" readonly>

Enter Payment:
<input id="paidAmount">

<input type="date" id="paymentDate">

<select id="paymentMethod">
<option value="">Method</option>
<option>Cash</option>
<option>Bank Transfer</option>
<option>UPI</option>
</select>

<button onclick="savePayment()">Save Payment</button>
</div>

<!-- INVOICE LIST -->
<div class="card">
<h3>Invoices</h3>

<table>
<thead>
<tr>
<th>Invoice</th>
<th>Trips</th>
<th>Weight</th>
<th>Amount</th>
<th>Paid</th>
<th>Balance</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="invoiceTable"></tbody>
</table>

</div>

</div>

<!-- PRINT -->
<div id="printBox" class="print-box"></div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

let transporters=[], trips=[], invoices=[]
let selectedTrips=[]
let invoiceAmount=0
let currentInvoice=null

init()

async function init(){
await loadTransporters()
await loadInvoices()
}

/* TRANSPORTERS */
async function loadTransporters(){
const {data}=await supabaseClient.from("transporters").select("*")
transporters=data||[]

transporterSelect.innerHTML='<option value="">Select</option>'+
transporters.map(t=>`<option value="${t.id}">${t.transporter_name}</option>`).join("")
}

/* TRIPS */
async function loadTrips(){

let id=transporterSelect.value
if(!id) return

const {data}=await supabaseClient.from("trips").select("*").eq("transporter_id",id)

trips=data.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))

renderTrips()
}

function renderTrips(){

tripTable.innerHTML=trips.map(t=>{
let amt=(t.weight_kg/1000)*(t.transporter_rate||0)
return `
<tr>
<td><input type="checkbox" value="${t.id}"></td>
<td>${t.trip_no}</td>
<td>${t.weight_kg||0}</td>
<td>₹${amt.toFixed(0)}</td>
</tr>`
}).join("")
}

/* INVOICE */
function generateInvoice(){

let checked=document.querySelectorAll("#tripTable input:checked")
if(checked.length==0){alert("Select trips");return}

selectedTrips=[]
let total=0, totalWeight=0

checked.forEach(c=>{
let t=trips.find(x=>x.id==c.value)
selectedTrips.push(t)

let amt=(t.weight_kg/1000)*(t.transporter_rate||0)
total+=amt
totalWeight+=Number(t.weight_kg||0)
})

invoiceAmount=total
totalAmount.value=total.toFixed(0)

invoicePreview.innerHTML=`
Trips: ${selectedTrips.map(t=>t.trip_no).join(", ")}<br>
Weight: ${totalWeight} KG<br>
<b>Amount: ₹${total}</b>
`
}

async function saveInvoice(){

const {data}=await supabaseClient.from("transporter_invoices").insert({
invoice_no:"TINV-"+Math.floor(Math.random()*100000),
transporter_id:transporterSelect.value,
trip_ids:selectedTrips.map(t=>t.id).join(","),
total_amount:invoiceAmount,
balance_amount:invoiceAmount,
paid_amount:0,
status:"Pending"
}).select().single()

currentInvoice=data
loadInvoices()
}

/* PAYMENT */
async function savePayment(){

let amount=Number(paidAmount.value)

await supabaseClient.from("transporter_payments").insert({
invoice_id:currentInvoice.id,
amount
})

let paid=(currentInvoice.paid_amount||0)+amount
let balance=currentInvoice.total_amount-paid

let status="Pending"
if(balance<=0) status="Paid"
else if(paid>0) status="Partial"

await supabaseClient.from("transporter_invoices")
.update({paid_amount:paid,balance_amount:balance,status})
.eq("id",currentInvoice.id)

loadInvoices()
}

/* LOAD INVOICES */
async function loadInvoices(){

const {data}=await supabaseClient.from("transporter_invoices").select("*")
invoices=data||[]

renderInvoices(invoices)
}

function renderInvoices(data){

let html=""

data.forEach(i=>{

let statusClass =
i.status==="Paid"?"status-paid":
i.status==="Partial"?"status-partial":"status-pending"

html+=`
<tr onclick="selectInvoice('${i.id}')">
<td>${i.invoice_no}</td>
<td>${i.trip_ids}</td>
<td>-</td>
<td>₹${i.total_amount}</td>
<td>₹${i.paid_amount||0}</td>
<td>₹${i.balance_amount}</td>
<td class="${statusClass}">${i.status}</td>
<td>
<button onclick="downloadInvoice('${i.id}',event)">PDF</button>
<button onclick="editPayment('${i.id}',event)">Edit</button>
<button class="deleteBtn" onclick="deletePayment('${i.id}',event)">Delete</button>
</td>
</tr>`
})

invoiceTable.innerHTML=html
}

/* SEARCH */
function searchInvoices(){
let q=searchInvoice.value.toLowerCase()
renderInvoices(invoices.filter(i=>i.invoice_no.toLowerCase().includes(q)))
}

/* EDIT */
async function editPayment(id,e){
e.stopPropagation()

let val=prompt("Enter new paid amount")
if(!val) return

let inv=invoices.find(i=>i.id==id)

let balance=inv.total_amount-Number(val)

let status="Pending"
if(balance<=0) status="Paid"
else if(val>0) status="Partial"

await supabaseClient.from("transporter_invoices")
.update({
paid_amount:Number(val),
balance_amount:balance,
status
})
.eq("id",id)

loadInvoices()
}

/* DELETE */
async function deletePayment(id,e){
e.stopPropagation()

await supabaseClient.from("transporter_invoices")
.update({paid_amount:0,balance_amount:0,status:"Pending"})
.eq("id",id)

loadInvoices()
}

/* SELECT */
function selectInvoice(id){
currentInvoice=invoices.find(i=>i.id==id)
totalAmount.value=currentInvoice.total_amount
}

/* PDF */
function downloadInvoice(id,e){
e.stopPropagation()

const { jsPDF } = window.jspdf
let inv=invoices.find(i=>i.id==id)

let doc=new jsPDF()

doc.setFontSize(16)
doc.text("Varada Nexus Private Limited",20,20)

doc.setFontSize(12)
doc.text("Invoice: "+inv.invoice_no,20,40)
doc.text("Amount: ₹"+inv.total_amount,20,50)
doc.text("Paid: ₹"+(inv.paid_amount||0),20,60)
doc.text("Balance: ₹"+inv.balance_amount,20,70)
doc.text("Status: "+inv.status,20,80)

doc.save(inv.invoice_no+".pdf")
}

</script>

</body>
</html>
