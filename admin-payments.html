<!DOCTYPE html>
<html>

<head>
<title>Transporter Payments - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

select,input{
padding:10px;margin:5px;border:1px solid #ccc;border-radius:4px;
}

button{
padding:10px 14px;background:#1f3c88;color:white;border:none;border-radius:4px;
}

.trip-list{
max-height:250px;overflow-y:auto;border:1px solid #ddd;padding:10px;
}

table{
width:100%;border-collapse:collapse;background:white;
}

th,td{
padding:10px;border-bottom:1px solid #ddd;text-align:left;
}

th{background:#eee;}
</style>

</head>

<body>

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
document.getElementById("sidebar").style.display="block"
})
</script>

<div class="main">

<h2>Transporter Payments</h2>

<div class="card">

<h3>Select Transporter</h3>

<select id="transporterSelect" onchange="loadTrips()"></select>

<div class="trip-list">

<div>
<input type="checkbox" onclick="toggleAll(this)"> <b>Select All</b>
</div>

<table>
<thead>
<tr>
<th>Select</th>
<th>Trip</th>
<th>Balance</th>
<th>Pay Amount</th>
<th>Remaining</th>
</tr>
</thead>

<tbody id="tripTable"></tbody>

</table>

</div>

</div>

<div class="card">

<h3>Payment</h3>

Total Selected:
<input id="totalAmount" readonly>

Enter Payment:
<input id="paidAmount" oninput="autoDistribute()">

<input type="date" id="paymentDate">

<select id="paymentMethod">
<option value="">Method</option>
<option>Cash</option>
<option>Bank Transfer</option>
<option>UPI</option>
</select>

<input id="remarks" placeholder="Remarks">

<button onclick="savePayment()">Save Payment</button>

</div>

<div class="card">

<h3>Payment History</h3>

<table>
<thead>
<tr>
<th>Date</th>
<th>Trip</th>
<th>Transporter</th>
<th>Amount</th>
<th>Method</th>
<th>Remarks</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>
</table>

</div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

let transporters=[], trips=[], payments=[]

init()

async function init(){
await loadTransporters()
await loadPayments()
}

/* LOAD TRANSPORTERS */
async function loadTransporters(){
const {data}=await supabaseClient.from("transporters").select("*")

transporters=data||[]

let html='<option value="">Select Transporter</option>'

transporters.forEach(t=>{
html+=`<option value="${t.id}">${t.transporter_name}</option>`
})

transporterSelect.innerHTML=html
}

/* LOAD TRIPS */
async function loadTrips(){

let id=transporterSelect.value
if(!id) return

const {data:tripData}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",id)

const {data:payData}=await supabaseClient
.from("transporter_payments")
.select("*")

payments=payData||[]

trips=tripData||[]

renderTrips()

}

/* RENDER TRIPS */
function renderTrips(){

let html=""
let total=0

trips.forEach(t=>{

let freight=(t.weight_kg/1000)*(t.transporter_rate||0)

let paid = payments
.filter(p=>p.trip_id==t.id)
.reduce((s,p)=>s+Number(p.amount||0),0)

let balance=freight-paid

if(balance<=0) return

total+=balance

html+=`
<tr>
<td><input type="checkbox" value="${t.id}" onchange="updateTotal()"></td>
<td>${t.trip_no}</td>
<td>₹${balance.toFixed(0)}</td>
<td><input type="number" class="payInput" data-balance="${balance}" value="${balance}" oninput="updateRemaining(this)"></td>
<td class="remain">${balance.toFixed(0)}</td>
</tr>
`
})

tripTable.innerHTML=html

}

/* SELECT ALL */
function toggleAll(cb){
document.querySelectorAll("#tripTable input[type=checkbox]").forEach(c=>c.checked=cb.checked)
updateTotal()
}

/* TOTAL */
function updateTotal(){

let total=0

document.querySelectorAll("#tripTable input[type=checkbox]:checked").forEach(c=>{
let row=c.closest("tr")
let amt=row.querySelector(".payInput").value
total+=Number(amt||0)
})

totalAmount.value=total.toFixed(0)

}

/* AUTO DISTRIBUTE */
function autoDistribute(){

let amount=Number(paidAmount.value||0)

let selected=[...document.querySelectorAll("#tripTable input[type=checkbox]:checked")]

selected.forEach(c=>{
let row=c.closest("tr")
let balance=Number(row.querySelector(".payInput").dataset.balance)

let pay=Math.min(balance,amount)

row.querySelector(".payInput").value=pay

updateRemaining(row.querySelector(".payInput"))

amount-=pay
})

updateTotal()

}

/* REMAINING */
function updateRemaining(input){

let balance=Number(input.dataset.balance)
let val=Number(input.value||0)

let remain=balance-val

input.closest("tr").querySelector(".remain").innerText=remain.toFixed(0)

updateTotal()

}

/* SAVE */
async function savePayment(){

let date=paymentDate.value
let method=paymentMethod.value

if(!date||!method){ alert("Enter date & method"); return }

let rows=document.querySelectorAll("#tripTable tr")

for(let r of rows){

let cb=r.querySelector("input[type=checkbox]")
if(!cb.checked) continue

let amount=r.querySelector(".payInput").value

await supabaseClient.from("transporter_payments").insert({
trip_id:cb.value,
amount:Number(amount),
payment_date:date,
payment_method:method,
remarks:remarks.value
})

/* LEDGER ENTRY */
await supabaseClient.from("transporter_ledger").insert({
trip_id:cb.value,
amount:Number(amount),
type:"DEBIT",
remarks:"Payment"
})

}

alert("Payment Saved")

loadTrips()
loadPayments()

}

/* HISTORY */
async function loadPayments(){

const {data}=await supabaseClient
.from("transporter_payments")
.select("*, trips(trip_no), transporters(transporter_name)")
.order("created_at",{ascending:false})

let html=""

data?.forEach(p=>{
html+=`
<tr>
<td>${p.payment_date}</td>
<td>${p.trips?.trip_no||""}</td>
<td>${p.transporters?.transporter_name||""}</td>
<td>₹${p.amount}</td>
<td>${p.payment_method}</td>
<td>${p.remarks||""}</td>
</tr>
`
})

historyTable.innerHTML=html

}

</script>

</body>
</html>
