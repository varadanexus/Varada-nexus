<script>

let transporters=[]
let trips=[]
let expenses=[]
let payments=[]
let allEntries = []
let currentPage = 1

async function init(){
  await loadTransporters()
}

/* LOAD TRANSPORTERS */

async function loadTransporters(){

const {data, error} = await window.supabaseClient
.from("transporters")
.select("*")

if(error){
  console.error("Transporter load error:", error)
  alert("Error loading transporters")
  return
}

transporters=data || []

let html='<option value="">Select Transporter</option>'

transporters.forEach(t=>{
html+=`<option value="${t.id}">${t.transporter_name}</option>`
})

document.getElementById("transporterSelect").innerHTML=html
}

/* LOAD LEDGER */

async function loadLedger(){

 currentPage = 1
  
let transporterId=document.getElementById("transporterSelect").value

if(!transporterId){
alert("Select transporter")
return
}

/* TRIPS */
const {data:tripData}=await window.supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporterId)

/* EXPENSES */
const {data:expenseData}=await window.supabaseClient
.from("expenses")
.select("*")

/* PAYMENTS */

// get invoices
const {data:invoiceData} = await window.supabaseClient
.from("transporter_invoices")
.select("id")
.eq("transporter_id", transporterId)

let invoiceIds = invoiceData?.map(i => i.id) || []

// get payments
let paymentData = []

if(invoiceIds.length){
  const res = await window.supabaseClient
  .from("transporter_payments")
  .select("*")
  .in("invoice_id", invoiceIds)

  paymentData = res.data || []
}

/* SAFE ASSIGN */
trips=tripData || []
expenses=expenseData || []
payments=paymentData || []

let entries=[]

/* TRIPS */
trips.forEach(t=>{

let weightMT=(t.weight_kg || 0)/1000
let gross=(t.transporter_rate || 0)*weightMT

let tripExpenses=expenses
.filter(e=>e.trip_id==t.id)
.reduce((sum,e)=>sum+Number(e.amount || 0),0)

let net=gross-tripExpenses

entries.push({
date:t.trip_date || t.created_at,
type:"Trip",
ref:t.trip_no,
debit:net,
credit:0
})

})

/* PAYMENTS */
payments.forEach(p=>{

entries.push({
date:p.payment_date || p.created_at,
type:"Payment",
ref:p.transaction_id || "Payment",
debit:0,
credit:Number(p.amount || 0)
})

})

/* SORT */
entries.sort((a,b)=>{
let da = new Date(a.date)
let db = new Date(b.date)

if(isNaN(da)) return 1
if(isNaN(db)) return -1

return da - db
})

/* FINAL */
allEntries = entries
currentPage = 1

renderLedger()

}

function renderLedger(){



let search = document.getElementById("searchBox").value.toLowerCase()
let pageSize = Number(document.getElementById("pageSize").value)

let fromDate = document.getElementById("fromDate").value
let toDate = document.getElementById("toDate").value

let filtered = allEntries.filter(e => {

let matchesSearch =
(e.ref || "").toLowerCase().includes(search) ||
(e.type || "").toLowerCase().includes(search)

let entryDate = e.date ? new Date(e.date) : null

if(!entryDate || isNaN(entryDate)) return false

let matchesFrom = fromDate ? entryDate >= new Date(fromDate) : true
let to = toDate ? new Date(toDate) : null
if(to) to.setHours(23,59,59,999)

let matchesTo = to ? entryDate <= to : true

return matchesSearch && matchesFrom && matchesTo
})

let start = (currentPage - 1) * pageSize
let paginated = filtered.slice(start, start + pageSize)

// 🔥 correct running balance
let balance = 0
filtered.slice(0, start).forEach(e=>{
balance += e.debit
balance -= e.credit
})

let html = ""

paginated.forEach(e=>{
balance += e.debit
balance -= e.credit

html += `
<tr>
<td>${e.date ? new Date(e.date).toLocaleDateString("en-IN") : ""}</td>
<td>${e.type}</td>
<td>${e.ref}</td>
<td>${e.debit ? "₹"+e.debit.toFixed(0) : ""}</td>
<td>${e.credit ? "₹"+e.credit.toFixed(0) : ""}</td>
<td>₹${balance.toFixed(0)}</td>
</tr>
`
})

let totalDebit = filtered.reduce((s,e)=>s+e.debit,0)
let totalCredit = filtered.reduce((s,e)=>s+e.credit,0)

html += `
<tr class="total-row">
<td colspan="3">Total</td>
<td>₹${totalDebit.toFixed(0)}</td>
<td>₹${totalCredit.toFixed(0)}</td>
<td></td>
</tr>
`
  
document.getElementById("ledgerTable").innerHTML = html
}

function downloadLedgerPDF(){

const { jsPDF } = window.jspdf
let doc = new jsPDF()

doc.setFontSize(14)
doc.text("Transporter Ledger", 14, 15)

let fromDate = document.getElementById("fromDate").value
let toDate = document.getElementById("toDate").value

doc.text(`From: ${fromDate || "-"}  To: ${toDate || "-"}`, 14, 22)
  
let search = document.getElementById("searchBox").value.toLowerCase()

let filtered = allEntries.filter(e => {

let matchesSearch =
(e.ref || "").toLowerCase().includes(search) ||
(e.type || "").toLowerCase().includes(search)

let entryDate = e.date ? new Date(e.date) : null
if(!entryDate || isNaN(entryDate)) return false

let matchesFrom = fromDate ? entryDate >= new Date(fromDate) : true

let to = toDate ? new Date(toDate) : null
if(to) to.setHours(23,59,59,999)

let matchesTo = to ? entryDate <= to : true

return matchesSearch && matchesFrom && matchesTo
})

let rows = filtered.map(e=>[
e.date || "",
e.type,
e.ref,
e.debit || "",
e.credit || ""
])

doc.autoTable({
startY: 28,
head: [["Date","Type","Ref","Debit","Credit"]],
body: rows
})

doc.save("ledger.pdf")
}

function nextPage(){

let pageSize = Number(document.getElementById("pageSize").value)

let search = document.getElementById("searchBox").value.toLowerCase()
let fromDate = document.getElementById("fromDate").value
let toDate = document.getElementById("toDate").value

let filtered = allEntries.filter(e=>{
let entryDate = e.date ? new Date(e.date) : null
if(!entryDate || isNaN(entryDate)) return false

let matchesSearch =
(e.ref || "").toLowerCase().includes(search) ||
(e.type || "").toLowerCase().includes(search)

let matchesFrom = fromDate ? entryDate >= new Date(fromDate) : true

let to = toDate ? new Date(toDate) : null
if(to) to.setHours(23,59,59,999)

let matchesTo = to ? entryDate <= to : true

return matchesSearch && matchesFrom && matchesTo
})

let maxPage = Math.ceil(filtered.length / pageSize)

if(currentPage < maxPage){
currentPage++
renderLedger()
}

}

function prevPage(){
if(currentPage>1) currentPage--
renderLedger()
}

window.onload = function(){
  init()
}

</script>
