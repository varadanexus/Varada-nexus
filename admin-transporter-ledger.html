<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>

/* ✅ STANDARD SIDEBAR (same as dashboard) */

fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data
await initSidebar()
})

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const authId = session.user.id
const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

/* LOGOUT */

window.logout = async function(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}

<div class="main">

<h2>Transporter Ledger</h2>

<div class="card">

<select id="transporterSelect"></select>

<button onclick="loadLedger()">Load Ledger</button>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Reference</th>
<th>Debit</th>
<th>Credit</th>
<th>Balance</th>
</tr>
</thead>

<tbody id="ledgerTable"></tbody>

</table>

</div>

</div>

<script>

let transporters=[]
let trips=[]
let expenses=[]
let payments=[]

init()

async function init(){
await loadTransporters()
}

/* LOAD TRANSPORTERS */

async function loadTransporters(){

const {data}=await supabaseClient
.from("transporters")
.select("*")

transporters=data || []

let html='<option value="">Select Transporter</option>'

transporters.forEach(t=>{
html+=`<option value="${t.id}">${t.transporter_name}</option>`
})

document.getElementById("transporterSelect").innerHTML=html

}

/* LOAD LEDGER */

async function loadLedger(){

let transporterId=document.getElementById("transporterSelect").value

if(!transporterId){
alert("Select transporter")
return
}

/* TRIPS */

const {data:tripData}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporterId)

/* EXPENSES */

const {data:expenseData}=await supabaseClient
.from("expenses")
.select("*")

/* PAYMENTS */

let transporterName=transporters.find(x=>x.id==transporterId)?.transporter_name

const {data:paymentData}=await supabaseClient
.from("transporter_payments")
.select("*")
.eq("transporter_name",transporterName)

trips=tripData || []
expenses=expenseData || []
payments=paymentData || []

let entries=[]

/* TRIP DEBIT */

trips.forEach(t=>{

let weightMT=(t.weight_kg || 0)/1000
let gross=(t.transporter_rate || 0)*weightMT

let tripExpenses=expenses
.filter(e=>e.trip_id==t.id)
.reduce((sum,e)=>sum+Number(e.amount||0),0)

let net=gross-tripExpenses

entries.push({
date:t.trip_date || t.created_at,
type:"Trip",
ref:t.trip_no,
debit:net,
credit:0
})

})

/* PAYMENT CREDIT */

payments.forEach(p=>{

entries.push({
date:p.payment_date || p.created_at,
type:"Payment",
ref:p.transaction_id || "Payment",
debit:0,
credit:Number(p.amount || 0)
})

})

/* SORT */

entries.sort((a,b)=> new Date(a.date)-new Date(b.date))

/* BALANCE */

let balance=0
let html=""

entries.forEach(e=>{

balance+=e.debit
balance-=e.credit

html+=`
<tr>
<td>${e.date || ""}</td>
<td>${e.type}</td>
<td>${e.ref}</td>
<td>${e.debit || ""}</td>
<td>${e.credit || ""}</td>
<td>${balance}</td>
</tr>`
})

document.getElementById("ledgerTable").innerHTML=html

}

</script>
