<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{

document.getElementById("sidebar-container").innerHTML = data

const sidebar = document.getElementById("sidebar")
if(sidebar) sidebar.style.display="none"

setTimeout(async()=>{

if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}

await initSidebar()
setActiveMenu()

if(sidebar) sidebar.style.display="block"

},200)

})

function setActiveMenu(){

let currentPage = window.location.pathname.split("/").pop()

document.querySelectorAll("#sidebar a").forEach(link=>{

    let page = link.getAttribute("data-page")

    if(page === currentPage){
        link.classList.add("active")
    }

})

}

async function initSidebar(){
const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId = session.user.id
const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

window.logout = async function(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}
}
</script>

<div class="main">

<h2>Users</h2>

<div class="form-box">
<h3>Create User</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<select id="role"></select>
<button onclick="createUser()">Create User</button>
</div>

<table>
<thead>
<tr>
<th>Email</th>
<th>Role</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="usersTable"></tbody>
</table>

</div>

<script>

const EDGE_FUNCTION =
"https://ticsgbtxfhhihamejiss.supabase.co/functions/v1/create-user"

const ADMIN_FN =
"https://ticsgbtxfhhihamejiss.supabase.co/functions/v1/admin-user-actions"

/* LOAD ROLES */
async function loadRoles(){
const {data,error}=await supabaseClient.from("roles").select("*")

if(error){
console.log(error)
return
}

let html=""
data.forEach(role=>{
html+=`<option value="${role.id}">${role.role_name}</option>`
})

document.getElementById("role").innerHTML=html
}

/* LOAD USERS */
async function loadUsers(){

const {data:users,error:usersError}=await supabaseClient.from("users").select("*")
if(usersError){ console.log(usersError); return }

const {data:userRoles}=await supabaseClient.from("user_roles").select("*")
const {data:roles}=await supabaseClient.from("roles").select("*")

let html=""

if(!users || users.length===0){
document.getElementById("usersTable").innerHTML="<tr><td colspan='3'>No users found</td></tr>"
return
}

users.forEach(user=>{

let roleId=null
let ur=userRoles.find(r=>String(r.user_id)===String(user.id))

if(ur){
let role=roles.find(r=>String(r.id)===String(ur.role_id))
if(role){ roleId=role.id }
}

html+=`
<tr>
<td>${user.email}</td>

<td>
<select id="role-${user.id}">
${roles.map(r=>`<option value="${r.id}" ${r.id===roleId?"selected":""}>${r.role_name}</option>`).join("")}
</select>
</td>

<td>
<div style="display:flex; flex-wrap:wrap; gap:6px;">
<button class="edit-btn" onclick="updateRole('${user.id}')">Save</button>
<button onclick="resetPassword('${user.auth_id}')">Reset</button>
<button onclick="disableUser('${user.auth_id}')">Disable</button>
<button onclick="enableUser('${user.auth_id}')">Enable</button>
<button class="delete-btn" onclick="deleteUser('${user.id}')">Delete</button>
</div>
</td>
</tr>
`
})

document.getElementById("usersTable").innerHTML=html
}

/* CREATE USER */
async function createUser(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let role=document.getElementById("role").value

if(!email || !password){
alert("Enter email and password")
return
}

const { data: { session } } = await supabaseClient.auth.getSession()

if (!session) {
  alert("Session expired. Login again ❌")
  return
}

let res = await fetch(EDGE_FUNCTION, {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + session.access_token   // 🔥 THIS FIXES EVERYTHING
  },
body: JSON.stringify({
  email,
  password,
  role_id: parseInt(role)
})
})
let data = await res.json()
console.log("CREATE USER RESPONSE:", data)

if(!res.ok){
  alert(data.error || JSON.stringify(data))
  console.log("FULL ERROR:", data)
  return
}

alert("User created ✅")
loadUsers()
}

/* UPDATE ROLE */
async function updateRole(userId){

let roleId = parseInt(document.getElementById("role-"+userId).value)

const { error } = await supabaseClient
.from("user_roles")
.upsert({
  user_id: userId,
  role_id: roleId
}, { onConflict: "user_id" })

if(error){
  console.error(error)
  alert("Update failed ❌")
  return
}

alert("Role updated ✅")
loadUsers()
}

/* DELETE USER */
async function deleteUser(id){
if(!confirm("Delete user?")) return

await supabaseClient.from("user_roles").delete().eq("user_id",id)
await supabaseClient.from("users").delete().eq("id",id)

loadUsers()
}

/* RESET PASSWORD */
async function resetPassword(userId){

  let newPass = prompt("Enter new password")
  if(!newPass) return

  const { data: { session } } = await supabaseClient.auth.getSession()

  let res = await fetch(ADMIN_FN,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": `Bearer ${session.access_token}` // ✅ IMPORTANT
    },
    body:JSON.stringify({
      action:"reset_password",
      user_id:userId,
      password:newPass
    })
  })

  let data = await res.json()

  if(!res.ok){
    alert(data.error || "Failed ❌")
    console.log("RESET ERROR:", data)
    return
  }

  alert("Password updated ✅")
}

/* DISABLE USER */
async function disableUser(userId){

  const { data: { session } } = await supabaseClient.auth.getSession()

  let res = await fetch(ADMIN_FN,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": `Bearer ${session.access_token}` // ✅ IMPORTANT
    },
    body:JSON.stringify({
      action:"disable",
      user_id:userId
    })
  })

  let data = await res.json()

  if(!res.ok){
    alert(data.error || "Failed ❌")
    console.log("DISABLE ERROR:", data)
    return
  }

  alert("User disabled 🚫")
}

/* ENABLE USER */
async function enableUser(userId){

  const { data: { session } } = await supabaseClient.auth.getSession()

  let res = await fetch(ADMIN_FN,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": `Bearer ${session.access_token}` // ✅ IMPORTANT
    },
    body:JSON.stringify({
      action:"enable",
      user_id:userId
    })
  })

  let data = await res.json()

  if(!res.ok){
    alert(data.error || "Failed ❌")
    console.log("ENABLE ERROR:", data)
    return
  }

  alert("User enabled ✅")
}

/* INIT */
loadRoles()
loadUsers()

</script>
