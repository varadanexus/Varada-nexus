<!DOCTYPE html>
<html>

<head>

<title>Users - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>

<script src="menu-rbac.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

h2{
color:#1f3c88;
}

.form-box{
background:white;
padding:20px;
border-radius:6px;
width:420px;
margin-bottom:25px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:5px;
}

button:hover{
background:#162c66;
}

.edit-btn{
background:#f0ad4e;
}

.delete-btn{
background:#d9534f;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

</style>

</head>

<body>

<script>



</script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>

/* ✅ STANDARD SIDEBAR (same as dashboard) */

fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

await initSidebar()

if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}

/* 🔥 SHOW SIDEBAR ONLY AFTER RBAC */
document.getElementById("sidebar").style.display="block"

})
async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const authId = session.user.id
const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

/* GLOBAL LOGOUT */

window.logout = async function(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}

</script>

<div class="main">

<h2>Users</h2>

<div class="form-box">

<h3>Create User</h3>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<select id="role"></select>

<button onclick="createUser()">Create User</button>

</div>

<table>

<thead>
<tr>
<th>Email</th>
<th>Role</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

<script>

const EDGE_FUNCTION =
"https://ticsgbtxfhhihamejiss.supabase.co/functions/v1/create-user"

const ADMIN_FN =
"https://ticsgbtxfhhihamejiss.supabase.co/functions/v1/admin-user-actions"

/* LOAD ROLES */

async function loadRoles(){

const {data,error}=await supabaseClient
.from("roles")
.select("*")

if(error){
console.log(error)
return
}

let html=""

data.forEach(role=>{
html+=`<option value="${role.id}">${role.role_name}</option>`
})

document.getElementById("role").innerHTML=html

}

/* LOAD USERS */

async function loadUsers(){

/* STAFF USERS */
const {data:users}=await supabaseClient.from("users").select("*")

/* ROLES */
const {data:userRoles}=await supabaseClient.from("user_roles").select("*")
const {data:roles}=await supabaseClient.from("roles").select("*")

/* AGENTS */
const {data:agents}=await supabaseClient
.from("commission_agents")
.select("id,name,email")

/* TRANSPORTERS */
const {data:transporters}=await supabaseClient
.from("transporters")
.select("id,name,email")

let html=""

/* ===== STAFF USERS ===== */

users.forEach(user=>{

let roleName="Not Assigned"
let roleId=null

let ur=userRoles.find(r=>String(r.user_id)===String(user.id))

if(ur){
let role=roles.find(r=>String(r.id)===String(ur.role_id))
if(role){
roleName=role.role_name
roleId=role.id
}
}

html+=`
<tr>
<td>${user.email}</td>

<td>
<select id="role-${user.id}">
${roles.map(r=>`<option value="${r.id}" ${r.id===roleId?"selected":""}>${r.role_name}</option>`).join("")}
</select>
</td>

<td>
<button class="edit-btn" onclick="updateRole('${user.id}')">Save</button>

<button onclick="resetPassword('${user.auth_id}')">Reset</button>

<button onclick="disableUser('${user.auth_id}')">Disable</button>

<button onclick="enableUser('${user.auth_id}')">Enable</button>

<button class="delete-btn" onclick="deleteUser('${user.id}')">Delete</button>
</td>

</tr>
`

})

/* ===== AGENTS (READ ONLY) ===== */

agents?.forEach(a=>{

html+=`
<tr style="background:#f9fafb;">
<td>${a.email || a.name}</td>

<td>
<span style="color:#16a34a;font-weight:bold;">Agent</span>
</td>

<td>
<span style="color:gray;">Managed in Agent Panel</span>
</td>

</tr>
`

})

/* ===== TRANSPORTERS (READ ONLY) ===== */

transporters?.forEach(t=>{

html+=`
<tr style="background:#f1f5f9;">
<td>${t.email || t.name}</td>

<td>
<span style="color:#2563eb;font-weight:bold;">Customer</span>
</td>

<td>
<span style="color:gray;">Managed in Customer Panel</span>
</td>

</tr>
`

})

document.getElementById("usersTable").innerHTML=html

}

/* CREATE USER */

async function createUser(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let role=document.getElementById("role").value

if(!email || !password){
alert("Enter email and password")
return
}

let res=await fetch(EDGE_FUNCTION,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:password,
role_id:role
})
})

let data = await res.json()

let data = await res.json()

if(!res.ok){
  alert(data.error || JSON.stringify(data))
  console.log("FULL ERROR:", data)
  return
}

if(data.success){
  alert("User created ✅")
}else{
  alert("Something went wrong ❌")
}

loadUsers()

}

/* UPDATE ROLE */

async function updateRole(userId){

let roleId=document.getElementById("role-"+userId).value

await supabaseClient
.from("user_roles")
.update({role_id:roleId})
.eq("user_id",userId)

alert("Role updated")

loadUsers()

}

/* DELETE USER */

async function deleteUser(id){

if(!confirm("Delete user?")) return

await supabaseClient.from("user_roles").delete().eq("user_id",id)
await supabaseClient.from("users").delete().eq("id",id)

loadUsers()

}

/* RESET PASSWORD */
async function resetPassword(userId){

let newPass = prompt("Enter new password")
if(!newPass) return

await fetch(ADMIN_FN,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"reset_password",
user_id:userId,
password:newPass
})
})

alert("Password updated ✅")
}

/* DISABLE USER */
async function disableUser(userId){

await fetch(ADMIN_FN,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"disable",
user_id:userId
})
})

alert("User disabled 🚫")
}

/* ENABLE USER */
async function enableUser(userId){

await fetch(ADMIN_FN,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"enable",
user_id:userId
})
})

alert("User enabled ✅")
}
  
/* INIT */

loadRoles()
loadUsers()

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
