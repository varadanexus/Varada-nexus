<!DOCTYPE html>
<html>

<head>

<title>Users - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

h2{
color:#1f3c88;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

button{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
}

.delete{
background:#d9534f;
color:white;
}

.reset{
background:#1f3c88;
color:white;
}

</style>

</head>

<body>

<h2>Users</h2>

<table>

<thead>

<tr>

<th>Email</th>
<th>Role</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="usersTable"></tbody>

</table>

<script>

const supabase = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"PASTE_SERVICE_ROLE_KEY_HERE"
)

loadUsers()

async function loadUsers(){

const {data:users}=await supabase.auth.admin.listUsers()

const {data:userRoles}=await supabase
.from("user_roles")
.select(`
user_id,
roles(role_name)
`)

let html=""

users.users.forEach(u=>{

let role=userRoles.find(r=>r.user_id===u.id)

let roleName=role ? role.roles.role_name : "Unknown"

html+=`

<tr>

<td>${u.email}</td>

<td>${roleName}</td>

<td>

<button class="reset" onclick="resetPassword('${u.id}')">Reset Password</button>

<button class="delete" onclick="deleteUser('${u.id}')">Delete</button>

</td>

</tr>

`

})

document.getElementById("usersTable").innerHTML=html

}

/* RESET PASSWORD */

async function resetPassword(userId){

let newPassword=prompt("Enter new password")

if(!newPassword) return

await supabase.auth.admin.updateUserById(userId,{

password:newPassword

})

alert("Password updated")

}

/* DELETE USER */

async function deleteUser(userId){

if(!confirm("Delete this user?")) return

await supabase.auth.admin.deleteUser(userId)

await supabase
.from("user_roles")
.delete()
.eq("user_id",userId)

alert("User deleted")

loadUsers()

}

</script>

</body>

</html>
