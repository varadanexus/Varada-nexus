<!DOCTYPE html>
<html>

<head>

<title>Users - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

h2{
color:#1f3c88;
}

/* FORM */

.form-box{
background:white;
padding:20px;
border-radius:6px;
width:420px;
margin-bottom:30px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#162c66;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>

<div class="main">

<h2>Users</h2>

<div class="form-box">

<h3>Create User</h3>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<select id="role">

<option value="admin">Admin</option>
<option value="manager">Manager</option>
<option value="operator">Operator</option>
<option value="accounts">Accounts</option>
<option value="customer">Customer</option>

</select>

<button onclick="createUser()">Create User</button>

</div>

<table>

<thead>
<tr>
<th>Email</th>
<th>Role</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"YOUR_ANON_KEY"
)

/* LOAD USERS */

loadUsers()

async function loadUsers(){

const {data,error}=await supabaseClient
.from("users")
.select(`
email,
user_roles(
roles(role_name)
)
`)

if(error){
console.log(error)
return
}

let html=""

data.forEach(u=>{

let role="Not Assigned"

if(u.user_roles.length>0){
role=u.user_roles[0].roles.role_name
}

html+=`
<tr>
<td>${u.email}</td>
<td>${role}</td>
</tr>
`

})

document.getElementById("usersTable").innerHTML=html

}

/* CREATE USER */

async function createUser(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let role=document.getElementById("role").value

if(!email || !password){
alert("Enter email and password")
return
}

/* CREATE AUTH USER */

const {data,error}=await supabaseClient.auth.signUp({

email:email,
password:password

})

if(error){
alert(error.message)
return
}

let authId=data.user.id

/* INSERT INTO USERS TABLE */

const {data:userData}=await supabaseClient
.from("users")
.insert({
email:email,
auth_id:authId
})
.select()
.single()

/* GET ROLE ID */

const {data:roleData}=await supabaseClient
.from("roles")
.select("id")
.eq("role_name",role)
.single()

/* INSERT USER ROLE */

await supabaseClient
.from("user_roles")
.insert({
user_id:userData.id,
role_id:roleData.id
})

alert("User Created")

loadUsers()

}

</script>

</body>

</html>
