<!DOCTYPE html>
<html>

<head>

<title>Users - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* PAGE LAYOUT */

.main{
margin-left:220px;
padding:30px;
}

h2{
color:#1f3c88;
}

/* CREATE USER FORM */

.form-box{
background:white;
padding:20px;
border-radius:6px;
margin-top:20px;
width:420px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#162c66;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:25px;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>

<div class="main">

<h2>Users</h2>

<!-- CREATE USER -->

<div class="form-box">

<h3>Create User</h3>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<select id="role">
<option value="admin">Admin</option>
<option value="manager">Manager</option>
<option value="operator">Operator</option>
<option value="accounts">Accounts</option>
<option value="customer">Customer</option>
</select>

<button onclick="createUser()">Create User</button>

</div>

<!-- USERS TABLE -->

<table>

<thead>
<tr>
<th>Email</th>
<th>Role</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

<script>

/* SUPABASE CONNECTION */

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"YOUR_ANON_PUBLIC_KEY"
)

/* LOAD USERS */

loadUsers()

async function loadUsers(){

const {data,error}=await supabaseClient
.from("user_roles")
.select(`
user_id,
users(email),
roles(role_name)
`)

if(error){
console.log(error)
return
}

let html=""

data.forEach(u=>{

html+=`
<tr>
<td>${u.users.email}</td>
<td>${u.roles.role_name}</td>
</tr>
`

})

document.getElementById("usersTable").innerHTML=html

}


/* CREATE USER */

async function createUser(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let role=document.getElementById("role").value

if(!email || !password){
alert("Enter email and password")
return
}

/* CREATE AUTH USER */

const {data,error}=await supabaseClient.auth.signUp({

email:email,
password:password

})

if(error){
alert(error.message)
return
}

let userId=data.user.id

/* INSERT INTO USERS TABLE */

await supabaseClient
.from("users")
.insert({
id:userId,
email:email
})

/* GET ROLE ID */

const {data:roleData}=await supabaseClient
.from("roles")
.select("id")
.eq("role_name",role)
.single()

/* INSERT USER ROLE */

await supabaseClient
.from("user_roles")
.insert({
user_id:userId,
role_id:roleData.id
})

alert("User Created")

loadUsers()

}

</script>

</body>
</html>
