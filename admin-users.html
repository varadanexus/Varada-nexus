<!DOCTYPE html>
<html>

<head>

<title>Users - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

h2{
color:#1f3c88;
}

/* form */

.form-box{
background:white;
padding:20px;
border-radius:6px;
width:420px;
margin-bottom:25px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#162c66;
}

/* table */

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>

<div class="main">

<h2>Users</h2>

<div class="form-box">

<h3>Create User</h3>

<input type="email" id="email" placeholder="Email">

<select id="role"></select>

<button onclick="createUser()">Create User</button>

</div>

<table>

<thead>
<tr>
<th>Email</th>
<th>Role</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

/* LOAD ROLES */

async function loadRoles(){

const {data}=await supabaseClient
.from("roles")
.select("*")

let html=""

data.forEach(r=>{
html+=`<option value="${r.id}">${r.role_name}</option>`
})

document.getElementById("role").innerHTML=html

}

/* LOAD USERS */

async function loadUsers(){

const {data,error}=await supabaseClient
.from("users")
.select(`
id,
email,
user_roles(
roles(role_name)
)
`)

if(error){
console.log(error)
return
}

let html=""

data.forEach(u=>{

let role="Not Assigned"

if(u.user_roles.length>0){
role=u.user_roles[0].roles.role_name
}

html+=`
<tr>
<td>${u.email}</td>
<td>${role}</td>
</tr>
`

})

document.getElementById("usersTable").innerHTML=html

}

/* CREATE USER */

async function createUser(){

let email=document.getElementById("email").value
let roleId=document.getElementById("role").value

if(!email){
alert("Enter email")
return
}

/* insert user */

const {data,error}=await supabaseClient
.from("users")
.insert({
email:email
})
.select()
.single()

if(error){
alert(error.message)
return
}

/* assign role */

await supabaseClient
.from("user_roles")
.insert({
user_id:data.id,
role_id:roleId
})

alert("User Added")

loadUsers()

}

/* INIT */

loadRoles()
loadUsers()

</script>

</body>
</html>
