<!DOCTYPE html>
<html>

<head>

<title>Users - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

h2{
color:#1f3c88;
}

.form-box{
background:white;
padding:20px;
border-radius:6px;
width:420px;
margin-bottom:25px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#162c66;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

.delete-btn{
background:#d9534f;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>

<div class="main">

<h2>Users</h2>

<div class="form-box">

<h3>Create User</h3>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<select id="role"></select>

<button onclick="createUser()">Create User</button>

</div>

<table>

<thead>
<tr>
<th>Email</th>
<th>Role</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

<script>

/* SUPABASE */

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

/* EDGE FUNCTION */

const EDGE_FUNCTION =
"https://ticsgbtxfhhihamejiss.supabase.co/functions/v1/create-user"


/* LOAD ROLES */

async function loadRoles(){

const {data,error} = await supabaseClient
.from("roles")
.select("*")

if(error){
console.log(error)
return
}

let html=""

data.forEach(role=>{
html+=`<option value="${role.id}">${role.role_name}</option>`
})

document.getElementById("role").innerHTML=html

}


/* LOAD USERS */

async function loadUsers(){

const {data:users} = await supabaseClient
.from("users")
.select("*")

const {data:userRoles} = await supabaseClient
.from("user_roles")
.select("*")

const {data:roles} = await supabaseClient
.from("roles")
.select("*")

let html=""

users.forEach(user=>{

let roleName="Not Assigned"

let ur=userRoles.find(r=>r.user_id===user.id)

if(ur){

let role=roles.find(r=>r.id===ur.role_id)

if(role) roleName=role.role_name

}

html+=`
<tr>
<td>${user.email}</td>
<td>${roleName}</td>
<td>
<button class="delete-btn" onclick="deleteUser('${user.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("usersTable").innerHTML=html

}


/* CREATE USER */

async function createUser(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let role=document.getElementById("role").value

if(!email || !password){
alert("Enter email and password")
return
}

let res=await fetch(EDGE_FUNCTION,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:password,
role_id:role
})
})

let data=await res.json()

if(!res.ok){
alert(data.error)
return
}

alert("User created")

loadUsers()

}


/* DELETE USER */

async function deleteUser(id){

if(!confirm("Delete user?")) return

await supabaseClient
.from("user_roles")
.delete()
.eq("user_id",id)

await supabaseClient
.from("users")
.delete()
.eq("id",id)

loadUsers()

}


/* INIT */

loadRoles()
loadUsers()

</script>

</body>

</html>
