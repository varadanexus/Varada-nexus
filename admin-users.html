<!DOCTYPE html>
<html>

<head>
<title>Users - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

h2{
color:#1f3c88;
}

/* CREATE USER FORM */

.form-box{
background:white;
padding:20px;
border-radius:6px;
width:420px;
margin-bottom:25px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#162c66;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

.delete-btn{
background:#d9534f;
margin-left:5px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>

<div class="main">

<h2>Users</h2>

<div class="form-box">

<h3>Create User</h3>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<select id="role"></select>

<button onclick="createUser()">Create User</button>

</div>

<table>

<thead>
<tr>
<th>Email</th>
<th>Role</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

<script>

/* SUPABASE CLIENT */

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"YOUR_ANON_PUBLIC_KEY"   // replace with your anon key
)

/* EDGE FUNCTION URL */

const EDGE_FUNCTION_URL = 
"https://ticsgbtxfhhihamejiss.supabase.co/functions/v1/create-user" 
// replace if your function name is different


/* LOAD ROLES */

async function loadRoles(){

const {data,error} = await supabaseClient
.from("roles")
.select("*")

if(error){
console.log(error)
return
}

let html=""

data.forEach(r=>{
html += `<option value="${r.id}">${r.role_name}</option>`
})

document.getElementById("role").innerHTML = html

}


/* LOAD USERS */

async function loadUsers(){

const {data,error} = await supabaseClient
.from("users")
.select(`
id,
email,
user_roles (
roles (
role_name
)
)
`)

if(error){
console.log(error)
return
}

let html=""

data.forEach(u=>{

let role="Not Assigned"

if(u.user_roles.length>0){
role = u.user_roles[0].roles.role_name
}

html += `
<tr>
<td>${u.email}</td>
<td>${role}</td>
<td>
<button class="delete-btn" onclick="deleteUser('${u.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("usersTable").innerHTML = html

}


/* CREATE USER USING EDGE FUNCTION */

async function createUser(){

let email = document.getElementById("email").value
let password = document.getElementById("password").value
let roleId = document.getElementById("role").value

if(!email || !password){
alert("Enter email and password")
return
}

const response = await fetch(EDGE_FUNCTION_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:password,
role_id:roleId
})
})

const result = await response.json()

if(!response.ok){
alert(result.error || "Error creating user")
return
}

alert("User Created")

loadUsers()

}


/* DELETE USER */

async function deleteUser(id){

if(!confirm("Delete user?")) return

await supabaseClient
.from("user_roles")
.delete()
.eq("user_id",id)

await supabaseClient
.from("users")
.delete()
.eq("id",id)

loadUsers()

}


/* INIT */

loadRoles()
loadUsers()

</script>

</body>
</html>
