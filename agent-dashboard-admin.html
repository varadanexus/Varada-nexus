<!-- SIDEBAR -->

<div class="main">

<h2>Agent Financial Dashboard</h2>

<div class="card">

<select id="agentSelect"></select>

<input type="date" id="fromDate">
<input type="date" id="toDate">

<button onclick="loadSummary()">Load</button>
<button onclick="payFull()">💎 Pay Full Balance</button>
<button onclick="exportCSV()">📥 Export CSV</button>

</div>

<div id="alertBox" style="color:red;font-weight:bold;"></div>

<div class="summary">

<div class="box earn">
Total Earned<br>
₹ <span id="totalEarned">0</span>
</div>

<div class="box paid">
Total Paid<br>
₹ <span id="totalPaid">0</span>
</div>

<div class="box balance">
Balance<br>
₹ <span id="balance">0</span>
</div>

</div>

<div class="card">
<canvas id="financeChart"></canvas>
</div>

<div class="card">
<h3>🏆 Top Agents</h3>
<ul id="leaderboard"></ul>
</div>

</div>

<script>

let agents=[]
let chartInstance=null
let currentBalance=0

window.onload = async ()=>{
await loadAgents()
await loadLeaderboard()
}

async function loadAgents(){
const {data,error} = await supabaseClient
.from("commission_agents")
.select(`
id,
agents(name)
`)

if(error){
console.error(error)
return
}

agents = data || []

let html='<option value="">Select Agent</option>'

agents.forEach(a=>{
html += `<option value="${a.id}">
${a.agents?.name || "No Name"}
</option>`
})

document.getElementById("agentSelect").innerHTML = html

}

async function loadSummary(){

let agentId=document.getElementById("agentSelect").value
let from=document.getElementById("fromDate").value
let to=document.getElementById("toDate").value

if(!agentId){alert("Select agent");return}

/* FILTER QUERY */
let tripQuery = supabaseClient.from("trips").select("*").eq("agent_id",agentId)
let payQuery = supabaseClient.from("agent_payments").select("*").eq("agent_id",agentId)

if(from){tripQuery=tripQuery.gte("created_at",from); payQuery=payQuery.gte("created_at",from)}
if(to){tripQuery=tripQuery.lte("created_at",to); payQuery=payQuery.lte("created_at",to)}

const {data:trips}=await tripQuery
const {data:payments}=await payQuery

let totalEarned=trips?.reduce((s,t)=>s+Number(t.commission_amount||0),0)||0
let totalPaid=payments?.reduce((s,p)=>s+Number(p.amount||0),0)||0

let balance=totalEarned-totalPaid
currentBalance=balance

document.getElementById("totalEarned").innerText=totalEarned.toFixed(2)
document.getElementById("totalPaid").innerText=totalPaid.toFixed(2)
document.getElementById("balance").innerText=balance.toFixed(2)

/* ALERT */
document.getElementById("alertBox").innerText = balance > 50000 ? `⚠ Agent pending ₹ ${balance.toFixed(2)}` : ""

/* CHART */
let monthly={}
trips?.forEach(t=>{
let d=new Date(t.created_at)
let k=d.getFullYear()+"-"+(d.getMonth()+1)
monthly[k]=monthly[k]||{e:0,p:0}
monthly[k].e+=Number(t.commission_amount||0)
})
payments?.forEach(p=>{
let d=new Date(p.created_at)
let k=d.getFullYear()+"-"+(d.getMonth()+1)
monthly[k]=monthly[k]||{e:0,p:0}
monthly[k].p+=Number(p.amount||0)
})

let labels=Object.keys(monthly)
let earned=labels.map(k=>monthly[k].e)
let paid=labels.map(k=>monthly[k].p)

if(chartInstance){chartInstance.destroy()}

chartInstance=new Chart(document.getElementById("financeChart"),{
type:"bar",
data:{
labels:labels,
datasets:[
{label:"Earned",data:earned,backgroundColor:"#28a745"},
{label:"Paid",data:paid,backgroundColor:"#dc3545"}
]
}
})

}

/* 💎 PAY FULL */
async function payFull(){

let agentId=document.getElementById("agentSelect").value
if(!agentId){alert("Select agent");return}
if(currentBalance<=0){alert("No balance");return}

await supabaseClient.from("agent_payments").insert({
agent_id:agentId,
amount:currentBalance,
payment_mode:"Auto",
remarks:"Full settlement"
})

alert("Full payment done ✅")
loadSummary()
}

/* 🏆 LEADERBOARD */
async function loadLeaderboard(){

const {data}=await supabaseClient.from("trips").select("agent_id,commission_amount")

let map={}
data?.forEach(t=>{
map[t.agent_id]=(map[t.agent_id]||0)+Number(t.commission_amount||0)
})

let sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5)

let html=""
sorted.forEach(([id,val])=>{
let agent = agents.find(a=>a.id==id)
let name = agent?.agents?.name || "Unknown"
html+=`<li>${name} — ₹ ${val.toFixed(2)}</li>`
})

document.getElementById("leaderboard").innerHTML=html
}

/* 📥 EXPORT */
function exportCSV(){

let rows=[
["Metric","Value"],
["Earned",document.getElementById("totalEarned").innerText],
["Paid",document.getElementById("totalPaid").innerText],
["Balance",document.getElementById("balance").innerText]
]

let csv=rows.map(r=>r.join(",")).join("\n")
let blob=new Blob([csv])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="agent-report.csv"
a.click()
}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
