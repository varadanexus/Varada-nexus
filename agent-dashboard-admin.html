<div class="main">

<h2>Agent Financial Dashboard</h2>

<div class="card">

<select id="agentSelect"></select>

<input type="date" id="fromDate">
<input type="date" id="toDate">

<button onclick="loadSummary()">Load</button>
<button onclick="payFull()">💎 Pay Full Balance</button>
<button onclick="exportCSV()">📥 Export CSV</button>

<div id="alertBox" style="
margin:10px 0;
padding:10px;
border-radius:8px;
font-weight:600;

<h2 id="totalPaid">₹ 0</h2>
</div>

<script>

let agents=[]
let chartInstance=null
let currentBalance=0

window.onload = async ()=>{
await loadAgents()
await loadLeaderboard()
}

async function loadAgents(){
const {data,error} = await supabaseClient
.from("agents")
.select("id,name")

if(error){
console.error(error)
return
}

agents = data || []

let html='<option value="">Select Agent</option>'

agents.forEach(a=>{
html += `<option value="${a.id}">
${a.name || "No Name"}
</option>`
})

document.getElementById("agentSelect").innerHTML = html

}

async function loadSummary(){

let agentId=document.getElementById("agentSelect").value
let from=document.getElementById("fromDate").value
let to=document.getElementById("toDate").value

if(!agentId){alert("Select agent");return}

/* FILTER QUERY */
let ledgerQuery = supabaseClient
.from("agent_trip_ledger")
.select("*")
.eq("agent_id", agentId)

if(from){
ledgerQuery = ledgerQuery.gte("created_at", from)
}
if(to){
ledgerQuery = ledgerQuery.lte("created_at", to + "T23:59:59")
}

const {data:ledgerData, error} = await ledgerQuery

if(error){
console.error(error)
return
}

let totalEarned = ledgerData?.reduce((s,l)=>s+Number(l.commission_amount||0),0) || 0
let totalPaid   = ledgerData?.reduce((s,l)=>s+Number(l.paid_amount||0),0) || 0

let balance=totalEarned-totalPaid
currentBalance=balance

document.getElementById("totalEarned").innerText = "₹ " + totalEarned.toFixed(2)
document.getElementById("totalPaid").innerText = "₹ " + totalPaid.toFixed(2)


/* BALANCE COLOR */
let balEl = document.getElementById("balance")
balEl.innerText = "₹ " + balance.toFixed(2)
balEl.style.color = balance >= 0 ? "#16a34a" : "#dc2626"

/* ALERT */
let alertBox = document.getElementById("alertBox")

if(balance > 50000){
alertBox.style.display = "block"
alertBox.style.background = "rgba(239,68,68,0.15)"
alertBox.style.color = "#ef4444"
alertBox.style.border = "1px solid rgba(239,68,68,0.3)"
alertBox.innerText = `⚠ High pending: ₹ ${balance.toFixed(2)}`
}else{
alertBox.style.display = "none"
}

/* CHART */
let monthly={}

ledgerData?.forEach(l=>{
let d=new Date(l.created_at)
let k=d.getFullYear()+"-"+(d.getMonth()+1)

monthly[k]=monthly[k]||{e:0,p:0}

monthly[k].e += Number(l.commission_amount || 0)
monthly[k].p += Number(l.paid_amount || 0)
})

let labels=Object.keys(monthly)
let earned=labels.map(k=>monthly[k].e)
let paid=labels.map(k=>monthly[k].p)

if(chartInstance){chartInstance.destroy()}

if(!labels.length){
document.getElementById("financeChart").style.display="none"
return
}

chartInstance=new Chart(document.getElementById("financeChart"),{
type:"bar",
data:{
labels:labels,
datasets:[
{label:"Earned",data:earned,backgroundColor:"#22c55e"},
{label:"Paid",data:paid,backgroundColor:"#ef4444"}
]
},
options:{
plugins:{
legend:{
labels:{ color:"#e5e7eb" }
}
},
scales:{
x:{ ticks:{ color:"#9ca3af" } },
y:{ ticks:{ color:"#9ca3af" } }
}
}
})

}

/* 💎 PAY FULL */
async function payFull(){

let agentId=document.getElementById("agentSelect").value
if(!agentId){alert("Select agent");return}
if(currentBalance<=0){alert("No balance");return}

if(!confirm(`Pay ₹${currentBalance.toFixed(2)} to this agent?`)){
return
}

await supabaseClient.from("agent_trip_ledger").insert({
agent_id: agentId,
commission_amount: 0,
paid_amount: currentBalance,
created_at: new Date().toISOString()
})
alert("Full payment done ✅")
loadSummary()
}

/* 🏆 LEADERBOARD */
async function loadLeaderboard(){
if(!agents || agents.length === 0){
await loadAgents()
}
const {data, error} = await supabaseClient
.from("agent_trip_ledger")
.select("agent_id, commission_amount")

if(error){
console.error(error)
return
}

let map = {}

data?.forEach(l=>{
map[l.agent_id] = (map[l.agent_id] || 0) + Number(l.commission_amount || 0)
})

let sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5)

let html=""

if(!data || data.length === 0){
document.getElementById("leaderboard").innerHTML = "<li>No data available</li>"
return
}
sorted.forEach(([id,val])=>{
let agent = agents.find(a=>a.id==id)
let name = agent?.name || "Unknown"
html+=`<li>${name} — ₹ ${val.toFixed(2)}</li>`
})

document.getElementById("leaderboard").innerHTML=html
}

/* 📥 EXPORT */
function exportCSV(){

let rows=[
["Metric","Value"],
["Earned",document.getElementById("totalEarned").innerText],
["Paid",document.getElementById("totalPaid").innerText],
["Balance",document.getElementById("balance").innerText]
]

let csv=rows.map(r=>r.join(",")).join("\n")
let blob=new Blob([csv])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="agent-report.csv"
a.click()
}

</script>
