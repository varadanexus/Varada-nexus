<th>Commission</th>
</tr>
</thead>

<script>

let ledger=[]
  
init()

async function init(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session){
window.location="login.html"
return
}

/* ✅ DEFINE authId FIRST */
const authId = session.user.id

/* ✅ GET AGENT FROM agents TABLE */
const {data:agent, error} = await supabaseClient
.from("agents")
.select("id,name")
.eq("auth_id", authId)
.single()

if(error || !agent){
console.error(error)
alert("Agent not found")
return
}



/* GET LEDGER */
const {data:ledgerData} = await supabaseClient
.from("agent_trip_ledger")
.select(`
  *,
  trips (trip_no, route, truck, weight_kg, trip_date)
`)
.eq("agent_id", agent.id)

ledger = ledgerData || []

/* ✅ SORT BY TRIP NUMBER ASC (OLD → NEW) */
ledger.sort((a, b) => {

  let aNum = parseInt((a.trips?.trip_no || "").replace(/\D/g,'')) || 0
  let bNum = parseInt((b.trips?.trip_no || "").replace(/\D/g,'')) || 0

  return aNum - bNum
})

render()
}

function render(){

let totalCommission = 0
let totalPaid = 0

let html=""

ledger?.forEach(l=>{

/* 🔥 ADD THIS LINE HERE */
if(!l.trip_id && l.paid_amount){
  return   // skip payment rows
}

let t = l.trips || {}

let weight = (t.weight_kg || 0) / 1000
let commission = Number(l.commission_amount || 0)

html += `
<tr>
<td>${t.trip_no || "-"}</td>
<td>${t.route || "-"}</td>
<td>${t.truck || "-"}</td>
<td>${formatDate(t.trip_date)}</td>
<td>${weight ? weight.toFixed(2) : "-"}</td>
<td class="profit">${commission ? "₹ "+commission.toFixed(2) : "-"}</td>
</tr>`
})
/* LEDGER CALCULATION */
ledger?.forEach(l=>{
totalCommission += Number(l.commission_amount || 0)
totalPaid += Number(l.paid_amount || 0)
})

let balance = totalCommission - totalPaid

tripTable.innerHTML = html

let tripCount = ledger.filter(l => l.trip_id).length
document.getElementById("totalTrips").innerText = tripCount
document.getElementById("totalCommission").innerText = "₹ " + totalCommission.toFixed(2)
document.getElementById("totalPaid").innerText = "₹ " + totalPaid.toFixed(2)

let balEl = document.getElementById("balance")
balEl.innerText = "₹ " + balance.toFixed(2)
balEl.style.color = balance >= 0 ? "green" : "red"
if(balance > 0){
  balEl.innerText += " (Pending)"
}

} 
  
function formatDate(d){
if(!d) return "-"
return new Date(d).toLocaleDateString("en-GB")
}

/* NAVIGATION */

function goLedger(){
window.location.href="agent-my-ledger.html"
}

function goWithdraw(){
window.location.href="agent-withdraw.html"
}

function goSummary(){
window.location.href="agent-financial-dashboard.html"
}

</script>
