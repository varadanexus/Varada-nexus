<!-- ✅ GLOBAL LOGOUT (LOAD BEFORE SIDEBAR) -->
<script src="agent-global.js"></script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("agent-sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

/* LOAD AGENT NAME */

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const {data:agent} = await supabaseClient
.from("agents")
.select("name")
.eq("auth_id", session.user.id)
.single()

const el = document.getElementById("userName")
if(el && agent) el.innerText = agent.name
})
</script>

<div class="main">

<h2>Agent Summary</h2>

<div class="summary">

<div class="box earn">
Total Earned<br>
₹ <span id="earned">0</span>
</div>

<div class="box paid">
Total Paid<br>
₹ <span id="paid">0</span>
</div>

<div class="box balance">
Balance<br>
₹ <span id="balance">0</span>
</div>

</div>

</div>



<script>

init()

async function init(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session){
window.location="login.html"
return
}

const authId = session.user.id

/* GET AGENT */
const {data:agent, error} = await supabaseClient
.from("agents")
.select("id")
.eq("auth_id", authId)
.single()

if(error || !agent){
console.log("Agent not found")
return
}

/* ✅ USE LEDGER (SOURCE OF TRUTH) */
const {data:ledger} = await supabaseClient
.from("agent_trip_ledger")
.select("commission_amount, paid_amount")
.eq("agent_id", agent.id)

let earned = ledger?.reduce((s,l)=>s+Number(l.commission_amount||0),0) || 0
let paid   = ledger?.reduce((s,l)=>s+Number(l.paid_amount||0),0) || 0

let balance = Math.max(0, earned - paid)

document.getElementById("earned").innerText = earned.toFixed(2)
document.getElementById("paid").innerText = paid.toFixed(2)
document.getElementById("balance").innerText = balance.toFixed(2)

}

</script>
