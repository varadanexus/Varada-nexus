<!DOCTYPE html>
<html>

<head>

<title>Agent Ledger - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>
<script src="menu-rbac.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}
.card{background:white;padding:20px;border-radius:8px;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;}
</style>

</head>

<body>

<script>
const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"YOUR_ANON_KEY"
)
</script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

await initSidebar()

if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}

document.getElementById("sidebar").style.display="block"
})

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const email = session.user.email
document.getElementById("userName").innerText = email.split("@")[0]

window.logout = async ()=>{
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}
</script>

<div class="main">

<h2>Agent Ledger</h2>

<div class="card">
<select id="agentSelect"></select>
<button onclick="loadLedger()">Load Ledger</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Reference</th>
<th>Debit (Earned)</th>
<th>Credit (Paid)</th>
<th>Balance</th>
</tr>
</thead>
<tbody id="ledgerTable"></tbody>
</table>
</div>

</div>

<script>

let agents=[]

window.onload = async ()=>{
await loadAgents()
}

/* LOAD AGENTS */
async function loadAgents(){

const {data} = await supabaseClient
.from("commission_agents")
.select("*")

agents = data || []

let html='<option value="">Select Agent</option>'

agents.forEach(a=>{
html += `<option value="${a.id}">${a.name}</option>`
})

document.getElementById("agentSelect").innerHTML = html
}

/* LOAD LEDGER */
async function loadLedger(){

let agentId = document.getElementById("agentSelect").value

if(!agentId){
alert("Select agent")
return
}

/* GET TRIPS (COMMISSION) */
const {data:tripData} = await supabaseClient
.from("trips")
.select("*")
.eq("agent_id",agentId)

/* GET PAYMENTS */
const {data:paymentData} = await supabaseClient
.from("agent_payments")
.select("*")
.eq("agent_id",agentId)

let entries=[]

/* EARNINGS */
tripData?.forEach(t=>{
entries.push({
date:t.trip_date || t.created_at,
type:"Trip",
ref:t.trip_no,
debit:Number(t.commission_amount || 0),
credit:0
})
})

/* PAYMENTS */
paymentData?.forEach(p=>{
entries.push({
date:p.created_at,
type:"Payment",
ref:"Agent Payment",
debit:0,
credit:Number(p.amount || 0)
})
})

/* SORT */
entries.sort((a,b)=> new Date(a.date) - new Date(b.date))

/* BALANCE */
let balance=0
let html=""

entries.forEach(e=>{
balance = balance + Number(e.debit || 0)
balance = balance - Number(e.credit || 0)

html += `
<tr>
<td>${(e.date || "").split("T")[0]}</td>
<td>${e.type}</td>
<td>${e.ref}</td>
<td>${e.debit ? e.debit.toFixed(2) : ""}</td>
<td>${e.credit ? e.credit.toFixed(2) : ""}</td>
<td>${balance.toFixed(2)}</td>
</tr>
`
})

document.getElementById("ledgerTable").innerHTML = html

}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
