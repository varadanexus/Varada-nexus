<script>

let agents=[]
let allEntries=[]
let currentView = []
let currentPage = 1
let rowsPerPage = parseInt(localStorage.getItem("rowsPerPage")) || 50

  
window.onload = async ()=>{
await loadAgents()
document.getElementById("rowsPerPage").value = rowsPerPage
}

/* LOAD AGENTS */
async function loadAgents(){

const {data,error} = await supabaseClient
.from("agents")
.select("id,name")

if(error){
console.error(error)
return
}

agents = data || []

let html='<option value="">Select Agent</option>'

agents.forEach(a=>{
html += `<option value="${a.id}">
${a.name || "No Name"}
</option>`
})

document.getElementById("agentSelect").innerHTML = html
document.getElementById("payAgent").innerHTML = html

} // ✅ correct closing of function

/* LOAD LEDGER */
async function loadLedger(){

let agentId = document.getElementById("agentSelect").value
currentPage = 1
  
if(!agentId){
alert("Select agent")
return
}

/* GET LEDGER (EARNINGS) */
const {data:ledgerData} = await supabaseClient
.from("agent_trip_ledger")
.select(`
*,
trips (
  trip_no
)
`)
.eq("agent_id",agentId)



/* EARNINGS */
allEntries = []

ledgerData?.forEach(l=>{
allEntries.push({
date: l.created_at || new Date().toISOString(),
type: l.paid_amount > 0 ? "Payment" : "Trip Commission",
ref: l.paid_amount > 0 
      ? "Payment"
      : (l.trips?.trip_no || "Trip"),
debit:Number(l.commission_amount || 0),
credit:Number(l.paid_amount || 0)
})
})
let entries = [...allEntries]

  
if(entries.length === 0){

document.getElementById("ledgerTable").innerHTML =
`<tr><td colspan="6" style="text-align:center;">No records found</td></tr>`

// 🔥 CLEAR KPI + CHART
document.getElementById("kpiCards").innerHTML = `
<div class="card" style="width:100%; text-align:center; opacity:0.7;">
Select an agent to view ledger
</div>
`

if(chartInstance){
chartInstance.destroy()
}

return
}

renderFiltered(entries)

}

function applySearch(){

let search = document.getElementById("searchInput").value.toLowerCase()

let entries = allEntries.filter(e =>
(e.ref || "").toLowerCase().includes(search)
)
currentPage = 1

renderFiltered(entries)
}

function nextPage(){

let search = document.getElementById("searchInput").value.toLowerCase()

let filtered = allEntries.filter(e =>
(e.ref || "").toLowerCase().includes(search)
)

let totalPages = Math.ceil(filtered.length / rowsPerPage)

if(currentPage < totalPages){
currentPage++
if(document.getElementById("searchInput").value){
  applySearch()
}else{
  loadLedger()
}
}
}

function prevPage(){

if(currentPage > 1){
currentPage--
if(document.getElementById("searchInput").value){
  applySearch()
}else{
  loadLedger()
}
}
}

function changeRowsPerPage(){
  rowsPerPage = parseInt(document.getElementById("rowsPerPage").value)
  currentPage = 1

  localStorage.setItem("rowsPerPage", rowsPerPage)

  if(document.getElementById("searchInput").value){
    applySearch()
  }else{
    loadLedger()
  }
}

function applyDateFilter(){

let from = document.getElementById("fromDate").value
let to = document.getElementById("toDate").value

let entries = allEntries.filter(e => {

let d = new Date(e.date)

if(from && d < new Date(from)) return false
if(to){
let end = new Date(to)
end.setHours(23,59,59,999)
if(d > end) return false
}

return true
})

currentPage = 1

renderFiltered(entries)
}

function renderFiltered(entries){

currentView = entries
  
if(entries.length > 0){

document.getElementById("chartContainer").style.display = "block"

renderKPIs(entries)
renderChart(entries)

}else{

document.getElementById("chartContainer").style.display = "none"

}
  
if(entries.length === 0){

document.getElementById("kpiCards").innerHTML = `
<div class="card" style="width:100%; text-align:center;">
No data available
</div>
`

if(chartInstance){
chartInstance.destroy()
}

ledgerTable.innerHTML =
`<tr><td colspan="6" style="text-align:center;">No records found</td></tr>`

return
}

/* SORT */
entries.sort((a,b)=> new Date(a.date) - new Date(b.date))

let start = (currentPage - 1) * rowsPerPage
let end = start + rowsPerPage

let balance = entries
.slice(0, start)
.reduce((acc,e)=> acc + e.debit - e.credit, 0)

let html=""

let pageEntries = entries.slice(start, end)

pageEntries.forEach(e=>{
balance += e.debit
balance -= e.credit

html += `
<tr>
<td>${new Date(e.date).toLocaleDateString()}</td>
<td>${e.type}</td>
<td>${e.ref}</td>
<td>${e.debit ? e.debit.toFixed(2) : ""}</td>
<td>${e.credit ? e.credit.toFixed(2) : ""}</td>
<td style="font-weight:bold;color:${balance>=0?'green':'red'}">
${balance.toFixed(2)}
</td>
</tr>`
})

html += `
<tr style="font-weight:600;background:#0b1220;color:#e5e7eb;">
<td colspan="3">Total</td>
<td>${entries.reduce((s,e)=>s+e.debit,0).toFixed(2)}</td>
<td>${entries.reduce((s,e)=>s+e.credit,0).toFixed(2)}</td>
<td>${entries.reduce((s,e)=>s + e.debit - e.credit,0).toFixed(2)}</td>
</tr>`

document.getElementById("ledgerTable").innerHTML = html

let totalPages = Math.ceil(entries.length / rowsPerPage)
  
document.getElementById("pageInfo").innerText =
`Page ${currentPage} of ${totalPages}`
}

function renderKPIs(entries){

let totalEarned = entries.reduce((s,e)=>s+e.debit,0)
let totalPaid = entries.reduce((s,e)=>s+e.credit,0)
let balance = totalEarned - totalPaid

document.getElementById("kpiCards").innerHTML = `
<div class="card" style="flex:1; min-width:200px;">
  <h3>💰 Earned</h3>
  <h2 style="color:#16a34a;">₹${totalEarned.toFixed(2)}</h2>
</div>

<div class="card" style="flex:1; min-width:200px;">
  <h3>💸 Paid</h3>
  <h2 style="color:#dc2626;">₹${totalPaid.toFixed(2)}</h2>
</div>

<div class="card" style="flex:1; min-width:200px;">
  <h3>📊 Balance</h3>
  <h2 style="color:${balance>=0 ? '#16a34a' : '#dc2626'};">
    ₹${balance.toFixed(2)}
  </h2>
</div>
`
}

let chartInstance = null

function renderChart(entries){

if(entries.length === 0) return

let grouped = {}

entries.forEach(e=>{
let d = new Date(e.date).toISOString().split("T")[0]

if(!grouped[d]){
grouped[d] = 0
}

grouped[d] += e.debit - e.credit
})

let labels = Object.keys(grouped)
let data = Object.values(grouped)

if(chartInstance){
chartInstance.destroy()
}

let ctx = document.getElementById("ledgerChart")

chartInstance = new Chart(ctx, {
type: 'line',
data: {
labels: labels,
datasets: [{
label: 'Balance Trend',
data: data,
borderWidth: 2,
tension: 0.3
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
})
}
  
/* ✅ ADD PDF FUNCTION HERE — EXACTLY HERE */
function downloadPDF(){

let rows = document.querySelectorAll("#ledgerTable tr")

let select = document.getElementById("agentSelect")

let agentName = select.value 
? select.selectedOptions[0].text 
: "All Agents"

let content = `
<h2>Agent Ledger Report</h2>
<h3>Agent: ${agentName}</h3>
<p>Date: ${new Date().toLocaleDateString()}</p>

<p><b>Total Earned:</b> ₹${currentView.reduce((s,e)=>s+e.debit,0).toFixed(2)}</p>
<p><b>Total Paid:</b> ₹${currentView.reduce((s,e)=>s+e.credit,0).toFixed(2)}</p>
<p><b>Balance:</b> ₹${currentView.reduce((s,e)=>s+e.debit-e.credit,0).toFixed(2)}</p>

<br>

<table border="1" cellspacing="0" cellpadding="5">
<tr>
<th>Date</th>
<th>Type</th>
<th>Reference</th>
<th>Debit</th>
<th>Credit</th>
<th>Balance</th>
</tr>
`

rows.forEach(r=>{
content += r.outerHTML
})

content += "</table>"

let win = window.open("", "", "width=900,height=700")
win.document.write(content)
win.document.close()
win.print()
}
async function savePayment(){

let agentId = document.getElementById("payAgent").value
let amount = document.getElementById("payAmount").value

if(!agentId || !amount){
alert("Enter agent and amount")
return
}

const {error} = await supabaseClient
.from("agent_trip_ledger")
.insert({
agent_id: agentId,
commission_amount: 0,
paid_amount: amount,
created_at: new Date().toISOString()
})

if(error){
console.error(error)
alert("Error saving payment ❌")
return
}

alert("Payment saved ✅")

document.getElementById("payAmount").value=""

/* reload ledger */
loadLedger()
}
  
</script>
