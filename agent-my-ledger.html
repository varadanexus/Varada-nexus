<div class="main">

<h2>My Earnings Ledger</h2>

<div id="kpiCards" style="display:flex; gap:15px; margin-bottom:20px; flex-wrap:wrap;"></div>

<canvas id="ledgerChart" height="100" style="margin-bottom:20px;"></canvas>

<div class="card">

<table>

<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Reference</th>
<th>Earned</th>
<th>Paid</th>
<th>Balance</th>
</tr>
</thead>

<tbody id="ledgerTable"></tbody>

</table>

</div>

</div>

<script>

let agentId=null

init()

async function init(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session){
window.location.href="login.html"
return
}

/* GET AGENT */



const {data:agent,error} = await supabaseClient
.from("agents")
.select("id")
.eq("auth_id", session.user.id)
.single()

if(error || !agent){
console.error(error)
alert("Agent not found ❌")
return
}

agentId = agent.id

loadLedger()
}

/* LOAD LEDGER */

async function loadLedger(){

const {data:trips,error:tripError} = await supabaseClient
.from("trips")
.select("*")
.eq("agent_id", agentId)

const {data:payments,error:payError} = await supabaseClient
.from("agent_payments")
.select("*")
.eq("agent_id", agentId)

if(tripError) console.error(tripError)
if(payError) console.error(payError)

let entries=[]

/* EARNINGS */
trips?.forEach(t=>{
entries.push({
date:t.trip_date || t.created_at,
type:"Trip",
ref:t.trip_no,
credit:Number(t.commission_amount || 0),
debit:0
})
})

/* PAYMENTS */
payments?.forEach(p=>{
entries.push({
date:p.created_at,
type:"Payment",
ref:"Payment",
credit:0,
debit:Number(p.amount || 0)
})
})

/* SORT */
entries.sort((a,b)=> new Date(a.date)-new Date(b.date))
renderKPIs(entries)
renderChart(entries)

/* BALANCE */
let balance=0
let html=""

entries.forEach(e=>{

balance += e.credit
balance -= e.debit

html += `
<tr>
<td>${(e.date || "").split("T")[0]}</td>
<td>${e.type}</td>
<td>${e.ref}</td>
<td style="color:green">₹ ${e.credit ? e.credit.toFixed(2) : ""}</td>
<td style="color:red">₹ ${e.debit ? e.debit.toFixed(2) : ""}</td>
<td><b>₹ ${balance.toFixed(2)}</b></td>
</tr>
`
})

document.getElementById("ledgerTable").innerHTML = html

}

let chartInstance = null

function renderKPIs(entries){

let totalEarned = entries.reduce((s,e)=>s+e.credit,0)
let totalPaid = entries.reduce((s,e)=>s+e.debit,0)
let balance = totalEarned - totalPaid

document.getElementById("kpiCards").innerHTML = `
<div class="card" style="flex:1; min-width:200px;">
  <h3>💰 Earned</h3>
  <h2 style="color:#16a34a;">₹${totalEarned.toFixed(2)}</h2>
</div>

<div class="card" style="flex:1; min-width:200px;">
  <h3>💸 Paid</h3>
  <h2 style="color:#dc2626;">₹${totalPaid.toFixed(2)}</h2>
</div>

<div class="card" style="flex:1; min-width:200px;">
  <h3>📊 Balance</h3>
  <h2 style="color:${balance>=0 ? '#16a34a' : '#dc2626'};">
    ₹${balance.toFixed(2)}
  </h2>
</div>
`
}

function renderChart(entries){

let grouped = {}

entries.forEach(e=>{
let d = new Date(e.date).toLocaleDateString()

if(!grouped[d]){
grouped[d] = 0
}

grouped[d] += e.credit - e.debit
})

let labels = Object.keys(grouped)
let data = Object.values(grouped)

if(chartInstance){
chartInstance.destroy()
}

let ctx = document.getElementById("ledgerChart")

chartInstance = new Chart(ctx, {
type: 'line',
data: {
labels: labels,
datasets: [{
label: 'Balance Trend',
data: data,
borderWidth: 2,
tension: 0.3
}]
}
})
}
  
</script>

</body>
