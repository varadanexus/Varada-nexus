<div class="main">

<h2>My Earnings Ledger</h2>

<div class="card">

<table>

<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Reference</th>
<th>Earned</th>
<th>Paid</th>
<th>Balance</th>
</tr>
</thead>

<tbody id="ledgerTable"></tbody>

</table>

</div>

</div>

<script>

let agentId=null

init()

async function init(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session){
window.location.href="login.html"
return
}

/* GET AGENT */



const {data:agent,error} = await supabaseClient
.from("agents")
.select("id")
.eq("auth_id", session.user.id)
.single()

if(error || !agent){
console.error(error)
alert("Agent not found ❌")
return
}

agentId = agent.id

loadLedger()
}

/* LOAD LEDGER */

async function loadLedger(){

const {data:trips,error:tripError} = await supabaseClient
.from("trips")
.select("*")
.eq("agent_id", agentId)

const {data:payments,error:payError} = await supabaseClient
.from("agent_payments")
.select("*")
.eq("agent_id", agentId)

if(tripError) console.error(tripError)
if(payError) console.error(payError)

let entries=[]

/* EARNINGS */
trips?.forEach(t=>{
entries.push({
date:t.trip_date || t.created_at,
type:"Trip",
ref:t.trip_no,
credit:Number(t.commission_amount || 0),
debit:0
})
})

/* PAYMENTS */
payments?.forEach(p=>{
entries.push({
date:p.created_at,
type:"Payment",
ref:"Payment",
credit:0,
debit:Number(p.amount || 0)
})
})

/* SORT */
entries.sort((a,b)=> new Date(a.date)-new Date(b.date))

/* BALANCE */
let balance=0
let html=""

entries.forEach(e=>{

balance += e.credit
balance -= e.debit

html += `
<tr>
<td>${(e.date || "").split("T")[0]}</td>
<td>${e.type}</td>
<td>${e.ref}</td>
<td style="color:green">₹ ${e.credit ? e.credit.toFixed(2) : ""}</td>
<td style="color:red">₹ ${e.debit ? e.debit.toFixed(2) : ""}</td>
<td><b>₹ ${balance.toFixed(2)}</b></td>
</tr>
`
})

document.getElementById("ledgerTable").innerHTML = html

}

</script>
