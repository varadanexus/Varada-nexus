document.getElementById("sidebar-container").innerHTML=data

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId = session.user.id
const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

window.logout = async ()=>{
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}

<div class="main">

<h2>Agent Payments</h2>

<!-- PAYMENT FORM -->
<div class="card">

<select id="agentSelect"></select>

<!-- 🔥 ADD THIS LINE -->
<button onclick="settleAgent()">Settle Full</button>

<input id="amount" placeholder="Amount">

<select id="mode">
<option>Cash</option>
<option>Bank</option>
<option>UPI</option>
</select>

<input id="remarks" placeholder="Remarks">

<button onclick="savePayment()">Pay</button>

</div>

<!-- PAYMENT TABLE -->
<div class="card">

<table>

<thead>
<tr>
<th>Date</th>
<th>Agent</th>
<th>Amount</th>
<th>Mode</th>
<th>Remarks</th>
</tr>
</thead>

<tbody id="paymentTable"></tbody>

</table>

</div>

<script>

let agents=[]
let payments=[]

init()

async function init(){
await loadAgents()
await loadPayments()
}

/* LOAD AGENTS */

async function loadAgents(){

const {data} = await supabaseClient
.from("commission_agents")
.select("*")

agents = data || []
console.log("Agents loaded:", agents)

let html='<option value="">Select Agent</option>'

agents.forEach(a=>{
html += `<option value="${a.id}">
${a.name || "No Name"} (${a.phone || "-"})
</option>`
})

document.getElementById("agentSelect").innerHTML = html

}

  window.onload = async () => {
  await loadAgents()
  await loadPayments()
}
  
/* SAVE PAYMENT */

async function savePayment(){

let agentId = document.getElementById("agentSelect").value
let amount = document.getElementById("amount").value

if(!agentId || !amount){
alert("Enter details")
return
}

const {error} = await supabaseClient
.from("agent_payments")
.insert({
agent_id: agentId,
amount: amount,
payment_mode: document.getElementById("mode").value,
remarks: document.getElementById("remarks").value
})

if(error){
console.error(error)
alert("Error saving ❌")
return
}

alert("Payment saved ✅")

document.getElementById("amount").value=""
document.getElementById("remarks").value=""

loadPayments()
}

/* LOAD PAYMENTS */

async function loadPayments(){

const {data} = await supabaseClient
.from("agent_payments")
.select("*")
.order("created_at",{ascending:false})

payments = data || []

let html=""

payments.forEach(p=>{

let agent = agents.find(a=>a.id==p.agent_id)

html += `
<tr>
<td>${(p.created_at || "").split("T")[0]}</td>
<td>${agent?.name || "-"}</td>
<td>₹ ${p.amount}</td>
<td>${p.payment_mode}</td>
<td>${p.remarks || ""}</td>
</tr>
`

})

document.getElementById("paymentTable").innerHTML = html

}

async function settleAgent(){

let agentId = document.getElementById("agentSelect").value

if(!agentId){
alert("Select agent")
return
}

/* GET TOTAL EARNED */
const {data:trips} = await supabaseClient
.from("trips")
.select("commission_amount")
.eq("agent_id",agentId)

/* GET TOTAL PAID */
const {data:payments} = await supabaseClient
.from("agent_payments")
.select("amount")
.eq("agent_id",agentId)

let earned = (trips || []).reduce((s,t)=>s+Number(t.commission_amount||0),0)
let paid = (payments || []).reduce((s,p)=>s+Number(p.amount||0),0)

let balance = earned - paid

if(balance <= 0){
alert("No pending amount")
return
}

/* INSERT PAYMENT */
await supabaseClient.from("agent_payments").insert({
agent_id:agentId,
amount:balance,
payment_mode:"Auto Settlement",
remarks:"Full settlement"
})

alert("Settled ₹ " + balance.toFixed(2))

loadPayments()
}

</script>
