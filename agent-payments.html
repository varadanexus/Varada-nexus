function setActiveMenu(){

let currentPage = window.location.pathname.split("/").pop()

document.querySelectorAll("#sidebar a").forEach(link=>{

    let page = link.getAttribute("data-page")

    if(page === currentPage){
        link.classList.add("active")
    }

})

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId = session.user.id
const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

window.logout = async ()=>{
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}

<div class="main">

<h2>Agent Payments</h2>

<!-- PAYMENT FORM -->

<select id="agentSelect"></select>

<!-- 🔥 ADD THIS LINE -->
<button onclick="settleAgent()">Settle Full</button>

<input id="amount" placeholder="Amount">

<select id="mode">
<option>Cash</option>
<option>Bank</option>
<option>UPI</option>
</select>

<input id="remarks" placeholder="Remarks">

<button onclick="savePayment()">Pay</button>

</div>

<!-- PAYMENT TABLE -->
<div class="card">

<table>

<thead>
<tr>
<th>Date</th>
<th>Agent</th>
<th>Amount</th>
<th>Mode</th>
<th>Remarks</th>
</tr>
</thead>

<tbody id="paymentTable"></tbody>

</table>

</div>

</div>

<script>

let agents=[]
let payments=[]



/* LOAD AGENTS */

async function loadAgents(){

const {data,error} = await supabaseClient
.from("agents")
.select("id,name,phone")

if(error){
console.error(error)
return
}

agents = data || []

let html='<option value="">Select Agent</option>'

agents.forEach(a=>{
html += `<option value="${a.id}">
${a.name || "No Name"} (${a.phone || "-"})
</option>`
})

document.getElementById("agentSelect").innerHTML = html

}

  window.onload = async () => {
  await loadAgents()
  await loadPayments()
}
  
/* SAVE PAYMENT */

async function savePayment(){

let agentId = document.getElementById("agentSelect").value
let amount = Number(document.getElementById("amount").value)

if(!agentId || !amount){
alert("Enter details")
return
}

await supabaseClient.from("agent_trip_ledger").insert({
agent_id: agentId,
commission_amount: 0,
paid_amount: amount,
created_at: new Date().toISOString()
})

alert("Payment saved ✅")

document.getElementById("amount").value=""
document.getElementById("remarks").value=""

await loadPayments()
}

/* LOAD PAYMENTS */

async function loadPayments(){

const {data} = await supabaseClient
.from("agent_trip_ledger")
.select("*")
.gt("paid_amount",0)
.order("created_at",{ascending:false})

payments = data || []

let html=""

payments.forEach(p=>{

let agent = agents.find(a=>a.id==p.agent_id)
let name = agent?.name || "-"

html += `
<tr>
<td>${(p.created_at || "").split("T")[0]}</td>
<td>${name}</td>
<td>₹ ${p.paid_amount}</td>
<td>-</td>
<td>-</td>
</tr>
`

})

document.getElementById("paymentTable").innerHTML = html
}

async function settleAgent(){

let agentId = document.getElementById("agentSelect").value

if(!agentId){
alert("Select agent")
return
}

/* ✅ GET LEDGER DATA */
const {data:ledger} = await supabaseClient
.from("agent_trip_ledger")
.select("*")
.eq("agent_id",agentId)

let earned = (ledger || []).reduce((s,l)=>s+Number(l.commission_amount||0),0)
let paid   = (ledger || []).reduce((s,l)=>s+Number(l.paid_amount||0),0)

let balance = earned - paid

if(balance <= 0){
alert("No pending amount")
return
}

/* ✅ INSERT PAYMENT INTO LEDGER */
await supabaseClient.from("agent_trip_ledger").insert({
agent_id: agentId,
commission_amount: 0,
paid_amount: balance,
created_at: new Date().toISOString()
})

alert("Settled ₹ " + balance.toFixed(2))

await loadPayments()
}

</script>
