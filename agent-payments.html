<!DOCTYPE html>
<html>
<head>

<title>Agent Payments</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}
.card{background:white;padding:20px;border-radius:8px;margin-bottom:20px;}
input,select{padding:8px;margin:5px;}
button{padding:8px 14px;background:#1f3c88;color:white;border:none;border-radius:4px;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;}
</style>

</head>

<body>

<!-- 🔥 SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

await initSidebar()

if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}

document.getElementById("sidebar").style.display="block"
})

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId = session.user.id
const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

window.logout = async ()=>{
await supabaseClient.auth.signOut()
window.location.href="login.html"
}
}
</script>

<div class="main">

<h2>Agent Payments</h2>

<div class="card">

<select id="agentDropdown"></select>
<input id="amount" placeholder="Amount">

<select id="mode">
<option>Cash</option>
<option>Bank</option>
<option>UPI</option>
</select>

<input id="remarks" placeholder="Remarks">

<button onclick="pay()">Pay Agent</button>

</div>

<table>
<thead>
<tr>
<th>Agent</th>
<th>Amount</th>
<th>Mode</th>
<th>Date</th>
</tr>
</thead>
<tbody id="paymentTable"></tbody>
</table>

</div>

<script>

/* 🔥 SUPABASE */
const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"PASTE_YOUR_ANON_KEY_HERE"
)

let agents=[]

window.onload = async ()=>{
await loadAgents()
await loadPayments()
}

/* LOAD AGENTS */
async function loadAgents(){

const {data,error} = await supabaseClient
.from("commission_agents")
.select("*")

if(error){
console.error(error)
return
}

agents = data || []

let dd = '<option value="">Select Agent</option>'

agents.forEach(a=>{
dd += `<option value="${a.id}">${a.name}</option>`
})

document.getElementById("agentDropdown").innerHTML = dd
}

/* ADD PAYMENT */
async function pay(){

let agentId = document.getElementById("agentDropdown").value
let amount = document.getElementById("amount").value

if(!agentId || !amount){
alert("Fill details")
return
}

const {error} = await supabaseClient
.from("agent_payments")
.insert({
agent_id: agentId,
amount: amount,
payment_mode: document.getElementById("mode").value,
remarks: document.getElementById("remarks").value
})

if(error){
console.error(error)
alert("Error saving payment ❌")
return
}

alert("Payment saved ✅")

document.getElementById("amount").value=""
document.getElementById("remarks").value=""

loadPayments()
}

/* LOAD PAYMENTS */
async function loadPayments(){

const {data,error} = await supabaseClient
.from("agent_payments")
.select("*")
.order("created_at",{ascending:false})

if(error){
console.error(error)
return
}

let html=""

data?.forEach(p=>{

let agent = agents.find(a=>a.id==p.agent_id)

html+=`
<tr>
<td>${agent?.name || "-"}</td>
<td>₹ ${p.amount}</td>
<td>${p.payment_mode}</td>
<td>${p.created_at?.split("T")[0]}</td>
</tr>`
})

document.getElementById("paymentTable").innerHTML = html
}

</script>

<!-- 🔥 REQUIRED SCRIPTS -->
<script src="session-check.js"></script>
<script src="menu-rbac.js"></script>
<script src="rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
