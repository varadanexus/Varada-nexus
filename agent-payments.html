<!DOCTYPE html>
<html>
<head>
<title>Agent Payments</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}
.card{background:white;padding:20px;border-radius:8px;margin-bottom:20px;}
input,select{padding:8px;margin:5px;}
button{padding:8px 14px;background:#1f3c88;color:white;border:none;border-radius:4px;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;}
</style>

</head>

<body>

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>

<div class="main">

<h2>Agent Payments</h2>

<div class="card">

<select id="agentDropdown"></select>
<input id="amount" placeholder="Amount">

<select id="mode">
<option>Cash</option>
<option>Bank</option>
<option>UPI</option>
</select>

<input id="remarks" placeholder="Remarks">

<button onclick="pay()">Pay Agent</button>

</div>

<table>
<thead>
<tr>
<th>Agent</th>
<th>Amount</th>
<th>Mode</th>
<th>Date</th>
</tr>
</thead>
<tbody id="paymentTable"></tbody>
</table>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"YOUR_ANON_KEY"
)

let agents=[]

init()

async function init(){
await loadAgents()
await loadPayments()
}

async function loadAgents(){

const {data} = await supabaseClient
.from("commission_agents")
.select("*")

agents = data || []

let dd = '<option value="">Select Agent</option>'

agents.forEach(a=>{
dd += `<option value="${a.id}">${a.name}</option>`
})

document.getElementById("agentDropdown").innerHTML = dd
}

async function pay(){

let agentId = document.getElementById("agentDropdown").value
let amount = document.getElementById("amount").value

if(!agentId || !amount){
alert("Fill details")
return
}

await supabaseClient.from("agent_payments").insert({
agent_id: agentId,
amount: amount,
payment_mode: document.getElementById("mode").value,
remarks: document.getElementById("remarks").value
})

alert("Payment saved ✅")

document.getElementById("amount").value=""
document.getElementById("remarks").value=""

loadPayments()
}

async function loadPayments(){

const {data} = await supabaseClient
.from("agent_payments")
.select("*")
.order("created_at",{ascending:false})

let html=""

data?.forEach(p=>{

let agent = agents.find(a=>a.id==p.agent_id)

html+=`
<tr>
<td>${agent?.name || "-"}</td>
<td>₹ ${p.amount}</td>
<td>${p.payment_mode}</td>
<td>${p.payment_date}</td>
</tr>`
})

paymentTable.innerHTML = html
}

</script>

</body>
</html>
