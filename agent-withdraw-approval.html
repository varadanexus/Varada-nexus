<div class="main">

<h2>Withdraw Approvals</h2>

<table>
<thead>
<tr>
<th>Agent</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<script>

let agents=[]

init()

async function init(){

const {data:a}=await supabaseClient.from("agents").select("id,name")
agents=a||[]

loadRequests()
}

async function loadRequests(){

const {data}=await supabaseClient
.from("agent_withdraw_requests")
.select("*")
.order("requested_at",{ascending:false})

let html=""

data?.forEach(r=>{

let agent=agents.find(a=>a.id==r.agent_id)

html+=`
<tr>
<td>${agent?.name || "-"}</td>
<td>₹ ${r.amount}</td>
<td>${r.status}</td>
<td>
<button onclick="approve('${r.id}','${r.agent_id}',${r.amount})">Approve</button>
<button onclick="reject('${r.id}')">Reject</button>
</td>
</tr>
`
})

table.innerHTML=html
}

async function approve(id,agentId,amount){

/* INSERT PAYMENT */

await supabaseClient.from("agent_payments").insert({
agent_id:agentId,
amount:amount,
payment_mode:"Auto",
remarks:"Withdraw Approved"
})

/* UPDATE STATUS */

await supabaseClient
.from("agent_withdraw_requests")
.update({status:"approved",processed_at:new Date()})
.eq("id",id)

loadRequests()
}

async function reject(id){

await supabaseClient
.from("agent_withdraw_requests")
.update({status:"rejected"})
.eq("id",id)

loadRequests()
}

</script>
