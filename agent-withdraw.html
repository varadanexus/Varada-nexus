<script>    

let agentId=null    
let currentBalance=0    
let pendingAmount=0    

init()    

async function init(){    

const {data:{session}} = await supabaseClient.auth.getSession()    

if(!session){
window.location="login.html"
return
}

const {data:agent} = await supabaseClient    
.from("agents")    
.select("*")    
.eq("auth_id",session.user.id)    
.single() 

if(!agent){
alert("Agent not found")
return
}

agentId = agent.id    

await loadBalance()
await loadRequests()    
}    

/* ✅ FIXED BALANCE (LEDGER BASED) */

async function loadBalance(){

const {data:ledger} = await supabaseClient
.from("agent_trip_ledger")
.select("commission_amount, paid_amount")
.eq("agent_id",agentId)

const {data:requests} = await supabaseClient
.from("agent_withdraw_requests")
.select("amount,status")
.eq("agent_id",agentId)

/* CALC */

let earned = ledger?.reduce((s,t)=>s+Number(t.commission_amount||0),0)||0

let paid = ledger?.reduce((s,t)=>s+Number(t.paid_amount||0),0)||0

pendingAmount = requests
?.filter(r=>r.status==="pending")
.reduce((s,r)=>s+Number(r.amount||0),0) || 0

currentBalance = Math.max(0, earned - paid - pendingAmount)

document.getElementById("earned").innerText = earned.toFixed(2)
document.getElementById("paid").innerText = paid.toFixed(2)
document.getElementById("balance").innerText = currentBalance.toFixed(2)
let btn = document.querySelector("button[onclick='withdrawFull()']")
if(btn){
btn.disabled = currentBalance <= 0
}
}

/* REQUEST */

async function requestWithdraw(){    

let amt = Number(document.getElementById("amount").value)
amt = Math.round(amt * 100) / 100    

if(!amt){    
alert("Enter amount")    
return    
}    

if(pendingAmount > 0){
alert("Pending request already exists ❌")
return
}

if(amt > currentBalance){
alert("Insufficient balance ❌")
return
}

await supabaseClient.from("agent_withdraw_requests")
.insert({    
agent_id:agentId,    
amount:amt,
status:"pending",
requested_at:new Date().toISOString()
})

alert("Request sent ✅")    

document.getElementById("amount").value=""

await loadBalance()
loadRequests()    
}    


          
/* TABLE */

async function loadRequests(){    

const {data} = await supabaseClient    
.from("agent_withdraw_requests")    
.select("*")    
.eq("agent_id",agentId)    
.order("requested_at",{ascending:false})    

let html=""    

data?.forEach(r=>{    

let cls = r.status==="approved" ? "status-approved" :
          r.status==="rejected" ? "status-rejected" : "status-pending"

html+=`    
<tr>    
<td>${(r.requested_at || "").split("T")[0]}</td>    
<td>₹ ${Number(r.amount).toFixed(2)}</td>    
<td class="${cls}">${r.status}</td>    
</tr>`    
})    

reqTable.innerHTML=html    
}    

function withdrawFull(){  
document.getElementById("amount").value = currentBalance.toFixed(2)  
}  

</script>
