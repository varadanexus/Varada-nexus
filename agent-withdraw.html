<div id="sidebar-container"></div>  

<script>  
fetch("agent-sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

/* 🔥 LOAD AGENT NAME */

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

<div class="main">  

<h2>Withdraw Request</h2>  

<!-- ✅ NEW: BALANCE CARD -->
<div class="card">

<div><b>Total Earned:</b> ₹ <span id="earned">0</span></div>
<div><b>Total Paid:</b> ₹ <span id="paid">0</span></div>
<div><b>Available Balance:</b> ₹ <span id="balance">0</span></div>

<br>

<button onclick="withdrawFull()">Withdraw Full Balance</button>

</div>

<div class="card">  

<input id="amount" placeholder="Enter amount">  
<button onclick="requestWithdraw()">Request</button>  

</div>  

<div class="card">  

<h3>My Requests</h3>  
<table>  
<thead>  
<tr>  
<th>Date</th>  
<th>Amount</th>  
<th>Status</th>  
</tr>  
</thead>  
<tbody id="reqTable"></tbody>  
</table>  

</div>  

</div>  

<script>  

let agentId=null  
let currentBalance=0  

init()  

async function init(){  

const {data:{session}} = await supabaseClient.auth.getSession()  

if(!session){
window.location="login.html"
return
}

const {data:agent} = await supabaseClient  
.from("commission_agents")  
.select("*")  
.eq("auth_id",session.user.id)  
.single()  

if(!agent){
alert("Agent not found")
return
}

agentId = agent.id  

await loadBalance()
await loadRequests()  
}  

/* ✅ NEW: LOAD BALANCE */

async function loadBalance(){

/* EARNED */
const {data:trips} = await supabaseClient
.from("trips")
.select("commission_amount")
.eq("agent_id",agentId)

/* PAID */
const {data:payments} = await supabaseClient
.from("agent_payments")
.select("amount")
.eq("agent_id",agentId)

let earned = trips?.reduce((s,t)=>s+Number(t.commission_amount||0),0)||0
let paid = payments?.reduce((s,p)=>s+Number(p.amount||0),0)||0

currentBalance = earned - paid

document.getElementById("earned").innerText = earned.toFixed(2)
document.getElementById("paid").innerText = paid.toFixed(2)
document.getElementById("balance").innerText = currentBalance.toFixed(2)

}

/* ✅ UPDATED: VALIDATION ADDED */

async function requestWithdraw(){  

let amt = Number(document.getElementById("amount").value)  

if(!amt){  
alert("Enter amount")  
return  
}  

if(amt > currentBalance){
alert("Insufficient balance ❌")
return
}

await supabaseClient.from("agent_withdraw_requests").insert({  
agent_id:agentId,  
amount:amt  
})  

alert("Request sent ✅")  

document.getElementById("amount").value=""

await loadBalance()
loadRequests()  
}  

/* LOAD REQUESTS */

async function loadRequests(){  

const {data} = await supabaseClient  
.from("agent_withdraw_requests")  
.select("*")  
.eq("agent_id",agentId)  
.order("requested_at",{ascending:false})  

let html=""  

data?.forEach(r=>{  
html+=`  
<tr>  
<td>${(r.requested_at || "").split("T")[0]}</td>  
<td>₹ ${Number(r.amount).toFixed(2)}</td>  
<td>${r.status}</td>  
</tr>`  
})  

reqTable.innerHTML=html  
}  

/* ✅ NEW: FULL WITHDRAW BUTTON */

function withdrawFull(){
document.getElementById("amount").value = currentBalance.toFixed(2)
}

</script>  

</body>  
</html>
