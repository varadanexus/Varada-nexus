</head>

<script src="agent-global.js"></script>

<div id="sidebar-container"></div>  

<script>  
fetch("agent-sidebar.html")
.then(res=>res.text())

const {data:{session}} = await supabaseClient.auth.getSession()

<div class="main">  

<h2>Withdraw Request</h2>  

<!-- BALANCE -->
<div class="card">
<div><b>Total Earned:</b> ₹ <span id="earned">0</span></div>
<div><b>Total Paid:</b> ₹ <span id="paid">0</span></div>
<div><b>Available Balance:</b> ₹ <span id="balance">0</span></div>
<br>
<button onclick="withdrawFull()">Withdraw Full Balance</button>
</div>

<!-- FORM -->
<div class="card">  
<input id="amount" placeholder="Enter amount">  
<button onclick="requestWithdraw()">Request</button>  
</div>  

<!-- TABLE -->
<div class="card">  
<h3>My Requests</h3>  
<table>  
<thead>  
<tr>  
<th>Date</th>  
<th>Amount</th>  
<th>Status</th>  
</tr>  
</thead>  
<tbody id="reqTable"></tbody>  
</table>  
</div>  

</div>  

<script>  

let agentId=null  
let currentBalance=0  

init()  

async function init(){  

const {data:{session}} = await supabaseClient.auth.getSession()  

if(!session){
window.location="login.html"
return
}

/* ✅ FIX: use agents table */
const {data:agent} = await supabaseClient  
.from("agents")  
.select("*")  
.eq("auth_id",session.user.id)  
.single()  

if(!agent){
alert("Agent not found")
return
}

agentId = agent.id  

await loadBalance()
await loadRequests()  
}  

/* ✅ FIX: USE LEDGER ONLY */

async function loadBalance(){

const {data:ledger} = await supabaseClient
.from("agent_trip_ledger")
.select("commission_amount, paid_amount")
.eq("agent_id",agentId)

let earned = ledger?.reduce((s,e)=>s+Number(e.commission_amount||0),0)||0
let paid = ledger?.reduce((s,e)=>s+Number(e.paid_amount||0),0)||0

currentBalance = earned - paid

document.getElementById("earned").innerText = earned.toFixed(2)
document.getElementById("paid").innerText = paid.toFixed(2)
document.getElementById("balance").innerText = currentBalance.toFixed(2)

}

/* REQUEST */

async function requestWithdraw(){  

let amt = Number(document.getElementById("amount").value)  

if(!amt){  
alert("Enter amount")  
return  
}  

if(amt > currentBalance){
alert("Insufficient balance ❌")
return
}

/* ✅ INSERT REQUEST */

await supabaseClient.from("agent_withdraw_requests").insert({  
agent_id:agentId,  
amount:amt  
})  

alert("Request sent ✅")  

document.getElementById("amount").value=""

await loadBalance()
loadRequests()  
}  

/* TABLE */

async function loadRequests(){  

const {data} = await supabaseClient  
.from("agent_withdraw_requests")  
.select("*")  
.eq("agent_id",agentId)  
.order("requested_at",{ascending:false})  

let html=""  

data?.forEach(r=>{  
html+=`  
<tr>  
<td>${(r.requested_at || "").split("T")[0]}</td>  
<td>₹ ${Number(r.amount).toFixed(2)}</td>  
<td>${r.status}</td>  
</tr>`  
})  

document.getElementById("reqTable").innerHTML=html  
}  

/* FULL WITHDRAW */

function withdrawFull(){
document.getElementById("amount").value = currentBalance.toFixed(2)
}

</script>  

</body>  
</html>
