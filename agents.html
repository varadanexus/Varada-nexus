<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>

/* LOAD SIDEBAR + INIT */
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{

document.getElementById("sidebar-container").innerHTML = data

const sidebar = document.getElementById("sidebar")
if(sidebar) sidebar.style.display="none"

setTimeout(async()=>{

if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}

await initSidebar()
setActiveMenu()

if(sidebar) sidebar.style.display="block"

},200)

})

function setActiveMenu(){

let currentPage = window.location.pathname.split("/").pop()

document.querySelectorAll("#sidebar a").forEach(link=>{

    let page = link.getAttribute("data-page")

    if(page === currentPage){
        link.classList.add("active")
    }

})

}

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId = session.user.id
const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

window.logout = async function(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}

</script>
<div class="main">

<h2>Agents</h2>

<div class="form-box">
<h3>Create Agent</h3>

<input type="text" id="name" placeholder="Agent Name">
<input type="text" id="phone" placeholder="Phone">
<input type="email" id="email" placeholder="Email">

<button onclick="createAgent()">Create Agent</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Name</th>

<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="agentsTable"></tbody>
</table>

</div>

<script>


/* LOAD AGENTS */
async function loadAgents(){

const {data,error} = await supabaseClient
.from("agents")
.select("*")
.order("created_at",{ascending:false})

if(error){ console.log(error); return }

let html=""

data.forEach(a=>{
html+=`
<tr>
<td><input value="${a.name}" id="name-${a.id}"></td>
<td><input value="${a.phone||""}" id="phone-${a.id}"></td>
<td><input value="${a.email||""}" id="email-${a.id}"></td>

<td class="${a.is_active ? 'status-active' : 'status-disabled'}">
${a.is_active ? "Active" : "Disabled"}
</td>

<td>
<button class="edit-btn" onclick="updateAgent('${a.id}')">Save</button>
<button onclick="resetPassword('${a.auth_id}')">Reset Password</button>
<button onclick="toggleAgent('${a.id}', ${a.is_active})">
${a.is_active ? "Disable Agent" : "Enable Agent"}
</button>
<button class="delete-btn" onclick="deleteAgent('${a.id}')">Delete</button>
</td>
</tr>
`
})

document.getElementById("agentsTable").innerHTML = html
}

/* CREATE */
/* CREATE */
async function createAgent(){

let name = document.getElementById("name").value
let phone = document.getElementById("phone").value
let email = document.getElementById("email").value
let password = prompt("Enter password for agent")

if(!name || !email || !password){
alert("Name, email & password required")
return
}

/* 🔥 GET SESSION */
const { data: { session } } = await supabaseClient.auth.getSession()

if(!session){
  window.location.href = "login.html"
  return
}

/* 🔥 ADD THIS BLOCK EXACTLY HERE */
const {data:agent} = await supabaseClient
.from("agents")
.select("is_active")
.eq("auth_id", session.user.id)
.single()

if(agent && !agent.is_active){
  alert("Account disabled. Contact admin ❌")
  await supabaseClient.auth.signOut()
  window.location = "login.html"
  return
}

/* 🔥 CREATE AUTH USER VIA EDGE FUNCTION */
let res = await fetch(
"https://ticsgbtxfhhihamejiss.supabase.co/functions/v1/create-user",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization": "Bearer " + session.access_token
},
body: JSON.stringify({
email: email,
password: password,
role: "agent"
})
})

let result = await res.json()

if(!res.ok){
alert(result.error || "User creation failed")
console.log(result)
return
}

/* 🔥 SAVE IN AGENTS TABLE */
const { error } = await supabaseClient
.from("agents")
.insert({
name,
phone,
email,
auth_id: result.user_id,   // 🔥 IMPORTANT
is_active: true
})

if(error){
alert(error.message)
return
}

alert("Agent created with login ✅")
loadAgents()
}

/* UPDATE */
async function updateAgent(id){

let name=document.getElementById("name-"+id).value
let phone=document.getElementById("phone-"+id).value
let email=document.getElementById("email-"+id).value

const {error} = await supabaseClient
.from("agents")
.update({ name, phone, email })
.eq("id",id)

if(error){
alert(error.message)
return
}

alert("Updated ✅")
}

/* DELETE */
async function deleteAgent(id){

if(!confirm("Delete agent?")) return

const {error} = await supabaseClient
.from("agents")
.delete()
.eq("id",id)

if(error){
alert(error.message)
return
}

loadAgents()
}

/* RESET PASSWORD */
async function resetPassword(authId){

let newPass = prompt("Enter new password")
if(!newPass) return

const { data: { session } } = await supabaseClient.auth.getSession()

let res = await fetch(
"https://ticsgbtxfhhihamejiss.supabase.co/functions/v1/admin-user-actions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization": "Bearer " + session.access_token
},
body: JSON.stringify({
action:"reset_password",
user_id: authId,
password: newPass
})
})

let data = await res.json()

if(!res.ok){
alert(data.error || "Failed ❌")
return
}

alert("Password updated ✅")
}


/* ENABLE / DISABLE */
async function toggleAgent(agentId, currentStatus){

let newStatus = !currentStatus

if(!confirm(`${newStatus ? "Enable" : "Disable"} this agent?`)){
  return
}

const {error} = await supabaseClient
.from("agents")
.update({ is_active: newStatus })
.eq("id", agentId)

if(error){
  alert("Error updating status ❌")
  console.error(error)
  return
}

alert(newStatus ? "Agent Enabled ✅" : "Agent Disabled 🚫")

loadAgents()
}

/* INIT */
loadAgents()

</script>
