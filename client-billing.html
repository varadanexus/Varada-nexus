<!DOCTYPE html>
<html>

<head>

<title>Client Billing - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}
.card{background:white;padding:20px;border-radius:8px;margin-bottom:20px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
select,input{padding:10px;margin:5px;border:1px solid #ccc;border-radius:4px;}
button{padding:10px 14px;background:#1f3c88;color:white;border:none;border-radius:4px;cursor:pointer;}
.deleteBtn{background:#d9534f;}
.trip-list{max-height:200px;overflow-y:auto;border:1px solid #ddd;padding:10px;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;text-align:left;}
</style>

</head>

<body>

<script>
const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
)
</script>

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data
await initSidebar()
if(typeof applyMenuRBAC==="function"){await applyMenuRBAC()}
document.getElementById("sidebar").style.display="block"
})

async function initSidebar(){
const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return
document.getElementById("userName").innerText = session.user.email.split("@")[0]
window.logout=async()=>{
await supabaseClient.auth.signOut()
window.location.href="login.html"
}
}
</script>

<div class="main">

<h2>Client Billing</h2>

<div class="card">
<h3>Create Invoice</h3>

<select id="clientSelect" onchange="loadTripsByClient()"></select>

<div class="trip-list">
<div>
<input type="checkbox" id="selectAll" onclick="toggleAllTrips()">
<b>Select All</b>
</div>
<div id="tripList"></div>
</div>

<br>

<button onclick="generateInvoice()">Generate Invoice</button>
<p id="invoicePreview"></p>
<button onclick="saveInvoice()">Save Invoice</button>

</div>

<div class="card">

<h3>Invoices</h3>

<table>
<thead>
<tr>
<th>Invoice No</th>
<th>Trips</th>
<th>Client</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="invoiceTable"></tbody>
</table>

</div>

</div>

<script>

let clients=[], trips=[], invoices=[], selectedTrips=[], invoiceAmount=0

init()

async function init(){
await loadClients()
await loadInvoices()
}

async function loadClients(){
const {data}=await supabaseClient.from("clients").select("*")
clients=data||[]
let html='<option value="">Select Client</option>'
clients.forEach(c=>{
html+=`<option value="${c.company}">${c.company}</option>`
})
document.getElementById("clientSelect").innerHTML=html
}

/* ✅ FIXED */
async function loadTripsByClient(){

let client=document.getElementById("clientSelect").value
if(!client) return

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("client_name",client)
.eq("status","Completed")

const {data:inv}=await supabaseClient
.from("client_invoices")
.select("id")
.eq("client_name",client)

let invoicedTrips=[]

if(inv && inv.length){
let ids=inv.map(i=>i.id)

const {data:breakdown}=await supabaseClient
.from("invoice_trip_breakdown")
.select("trip_no")
.in("invoice_id",ids)

breakdown?.forEach(b=>invoicedTrips.push(b.trip_no))
}

/* FILTER + SORT */
trips=data
.filter(t=>!invoicedTrips.includes(t.trip_no))
.sort((a,b)=> b.trip_no.localeCompare(a.trip_no))

let html=""
trips.forEach(t=>{
html+=`
<div>
<input type="checkbox" value="${t.id}">
${t.trip_no} | ${t.route} | ${t.truck}
</div>`
})

document.getElementById("tripList").innerHTML=html
}

async function generateInvoice(){

let checked=document.querySelectorAll("#tripList input:checked")

if(!checked.length){
alert("Select trips")
return
}

selectedTrips=[]

checked.forEach(c=>{
selectedTrips.push(trips.find(t=>t.id==c.value))
})

let totalFreight=0,totalFuel=0

for(let t of selectedTrips){

let mt=t.weight_kg/1000
let freight=mt*t.company_rate
totalFreight+=freight

const {data:exp}=await supabaseClient
.from("expenses")
.select("amount")
.eq("trip_id",t.id)
.eq("expense_type","Fuel")

exp?.forEach(e=>totalFuel+=Number(e.amount))
}

invoiceAmount=totalFreight-totalFuel

invoicePreview.innerHTML=`
Client : ${selectedTrips[0].client_name}<br>
Trips : ${selectedTrips.map(t=>t.trip_no).join(", ")}<br>
Total Freight : ₹${totalFreight}<br>
Fuel Deduction : ₹${totalFuel}<br>
<b>Invoice Amount : ₹${invoiceAmount}</b>
`
}

function generateInvoiceNo(){
return "INV-"+new Date().getFullYear()+"-"+Math.floor(Math.random()*9000+1000)
}

async function saveInvoice(){

if(!selectedTrips.length){
alert("Generate invoice first")
return
}

let invoiceNo=generateInvoiceNo()

const {data:newInvoice}=await supabaseClient
.from("client_invoices")
.insert({
invoice_no:invoiceNo,
trip_no:selectedTrips.map(t=>t.trip_no).join(", "),
client_name:selectedTrips[0].client_name,
invoice_amount:invoiceAmount,
amount_paid:0,
balance_amount:invoiceAmount,
payment_status:"Pending"
})
.select().single()

for(let t of selectedTrips){

let mt=t.weight_kg/1000
let freight=mt*t.company_rate

const {data:exp}=await supabaseClient
.from("expenses")
.select("amount")
.eq("trip_id",t.id)
.eq("expense_type","Fuel")

let fuel=0
exp?.forEach(e=>fuel+=Number(e.amount))

await supabaseClient.from("invoice_trip_breakdown").insert({
invoice_id:newInvoice.id,
trip_no:t.trip_no,
amount:freight-fuel
})
}

alert("Invoice Saved")
loadInvoices()
loadTripsByClient()
}

async function loadInvoices(){
const {data}=await supabaseClient
.from("client_invoices")
.select("*")
.order("created_at",{ascending:false})
invoices=data||[]
renderInvoices(invoices)
}

function renderInvoices(data){
invoiceTable.innerHTML=data.map(i=>`
<tr>
<td>${i.invoice_no}</td>
<td>${i.trip_no}</td>
<td>${i.client_name}</td>
<td>₹${i.invoice_amount}</td>
<td>${i.payment_status}</td>
<td>
<button onclick="downloadClientInvoice('${i.id}',event)">PDF</button>
<button onclick="deleteInvoice('${i.id}')">Delete</button>
</td>
</tr>`).join("")
}

async function deleteInvoice(id){
if(!confirm("Delete invoice?")) return
await supabaseClient.from("invoice_trip_breakdown").delete().eq("invoice_id",id)
await supabaseClient.from("client_invoices").delete().eq("id",id)
loadInvoices()
loadTripsByClient()
}

/* 🔥 PDF FUNCTION */
async function downloadClientInvoice(id,e){

e.stopPropagation()

const { jsPDF } = window.jspdf
let inv=invoices.find(i=>i.id==id)

const {data:breakdown}=await supabaseClient
.from("invoice_trip_breakdown")
.select("*")
.eq("invoice_id",id)

let tripNos=breakdown.map(b=>b.trip_no)

const {data:tripData}=await supabaseClient
.from("trips")
.select("*")
.in("trip_no",tripNos)

const tripIds=tripData.map(t=>t.id)

const {data:exp}=await supabaseClient
.from("expenses")
.select("trip_id,amount")
.in("trip_id",tripIds)
.eq("expense_type","Fuel")

let fuelMap={}
exp?.forEach(e=>{
fuelMap[e.trip_id]=(fuelMap[e.trip_id]||0)+Number(e.amount)
})

let rows=[],tw=0,tf=0,tfuel=0

tripData.forEach(t=>{
let mt=t.weight_kg/1000
let fr=mt*t.company_rate
let fuel=fuelMap[t.id]||0

tw+=mt; tf+=fr; tfuel+=fuel

rows.push([
t.trip_no,t.route||"-",t.truck||"-",t.trip_date||"-",
mt.toFixed(2),fr.toFixed(2),fuel.toFixed(2),(fr-fuel).toFixed(2)
])
})

let doc=new jsPDF()

doc.addImage("images/logo.png","PNG",15,10,20,20)

doc.setFontSize(14)
doc.text("VARADA NEXUS PRIVATE LIMITED",40,18)
doc.setFontSize(10)
doc.text("Client Invoice",40,25)

doc.text("Invoice:",140,40)
doc.text(inv.invoice_no,170,40)

doc.text("Client:",15,55)
doc.text(inv.client_name,40,55)

doc.autoTable({
startY:70,
head:[["Trip","Route","Truck","Date","MT","Freight","Fuel","Net"]],
body:rows
})

let y=doc.lastAutoTable.finalY+10

doc.text(`Total Freight: ₹${Math.round(tf)}`,15,y)
doc.text(`Fuel: ₹${Math.round(tfuel)}`,15,y+10)
doc.text(`Net: ₹${Math.round(tf-tfuel)}`,15,y+20)

doc.save(inv.invoice_no+".pdf")
}

function toggleAllTrips(){
let checked=document.getElementById("selectAll").checked
document.querySelectorAll("#tripList input").forEach(c=>c.checked=checked)
generateInvoice()
}

document.addEventListener("change",e=>{
if(e.target.closest("#tripList")) generateInvoice()
})

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
