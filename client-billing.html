<!DOCTYPE html>
<html>

<head>

<title>Client Billing - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

.card{

border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

select,input{
padding:10px;
margin:5px;
border:1px solid #ccc;

}

padding:10px 14px;
background:#1f3c88;
color:white;

border-radius:4px;
cursor:pointer;
}

.deleteBtn{
background:#d9534f;
}

.trip-list{
max-height:200px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
text-align:left;
}

</style>

</head>

<body>

)

<div id="sidebar-container"></div>

<script>

fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})

</script>

<div class="main">

<h2>Client Billing</h2>

<div class="card">

<h3>Create Invoice</h3>

<select id="clientSelect" onchange="loadTripsByClient()"></select>

<div class="trip-list" id="tripList"></div>

<br>

<button onclick="generateInvoice()">Generate Invoice</button>

<p id="invoicePreview"></p>

<button onclick="saveInvoice()">Save Invoice</button>

</div>

<div class="card">

<h3>Invoices</h3>

<input id="searchClient" placeholder="Search Client">
<input id="searchInvoice" placeholder="Search Invoice No">

<button onclick="searchInvoices()">Search</button>
<button onclick="clearSearch()">Clear</button>

<table>

<thead>

<tr>
<th>Invoice No</th>
<th>Trips</th>
<th>Client</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="invoiceTable"></tbody>

</table>

</div>

</div>

<script>

let clients=[]
let trips=[]
let invoices=[]
let selectedTrips=[]
let invoiceAmount=0

init()

async function init(){

await loadClients()
await loadInvoices()

}

async function loadClients(){

const {data}=await supabaseClient
.from("clients")
.select("*")

clients=data||[]

let html='<option value="">Select Client</option>'

clients.forEach(c=>{
html+=`<option value="${c.company}">${c.company}</option>`
})

document.getElementById("clientSelect").innerHTML=html

}

async function loadTripsByClient(){

let client=document.getElementById("clientSelect").value

if(!client) return

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("client_name",client)
.eq("status","Completed")
.order("trip_no",{ascending:false})   // ✅ FIX: Latest trips first

trips=data

let html=""

data.forEach(t=>{

html+=`
<div>
<input type="checkbox" value="${t.id}">
${t.trip_no} | ${t.route} | ${t.truck}
</div>
`

})

document.getElementById("tripList").innerHTML=html

}

async function generateInvoice(){

let checked=document.querySelectorAll("#tripList input:checked")

if(checked.length==0){
alert("Select trips")
return
}

selectedTrips=[]

checked.forEach(c=>{
let trip=trips.find(t=>t.id==c.value)
selectedTrips.push(trip)
})

let totalFreight=0
let totalFuel=0

for(let trip of selectedTrips){

let mt=trip.weight_kg/1000
let base=mt*trip.company_rate

totalFreight+=base

const {data:expenses}=await supabaseClient
.from("expenses")
.select("*")
.eq("trip_id",trip.id)
.eq("expense_type","Fuel")

let fuel=0

expenses.forEach(e=>{
fuel+=Number(e.amount)
})

totalFuel+=fuel

}

invoiceAmount=totalFreight-totalFuel

document.getElementById("invoicePreview").innerHTML=`

Client : ${selectedTrips[0].client_name} <br>

Trips : ${selectedTrips.map(t=>t.trip_no).join(", ")} <br>

Total Freight : ₹${totalFreight} <br>

Fuel Deduction : ₹${totalFuel} <br>

<b>Invoice Amount : ₹${invoiceAmount}</b>

`

}

function generateInvoiceNo(){

let now=new Date()
let year=now.getFullYear()
let rand=Math.floor(Math.random()*9000)+1000

return "INV-"+year+"-"+rand

}

async function saveInvoice(){

if(selectedTrips.length==0){
alert("Generate invoice first")
return
}

let invoiceNo=generateInvoiceNo()

await supabaseClient
.from("client_invoices")
.insert({

invoice_no:invoiceNo,
trip_no:selectedTrips.map(t=>t.trip_no).join(", "),
client_name:selectedTrips[0].client_name,
invoice_amount:invoiceAmount,

amount_paid:0,
balance_amount:invoiceAmount,
payment_status:"Pending"

})

alert("Invoice Saved")

loadInvoices()

}

async function loadInvoices(){

const {data}=await supabaseClient
.from("client_invoices")
.select("*")
.order("created_at",{ascending:false})

invoices=data

renderInvoices(invoices)

}

function renderInvoices(data){

let html=""

data.forEach(i=>{

html+=`
<tr>

<td>${i.invoice_no}</td>

<td>${i.trip_no}</td>

<td>${i.client_name}</td>

<td>₹${i.invoice_amount}</td>

<td>${i.payment_status || "Pending"}</td>

<td>

<button onclick="downloadInvoice('${i.id}')">PDF</button>

<button class="deleteBtn" onclick="deleteInvoice('${i.id}')">Delete</button>

</td>

</tr>
`

})

document.getElementById("invoiceTable").innerHTML=html

}

function searchInvoices(){

let client=document.getElementById("searchClient").value.toLowerCase()
let invoice=document.getElementById("searchInvoice").value.toLowerCase()

let filtered=invoices.filter(i=>{

return(
(!client || i.client_name?.toLowerCase().includes(client)) &&
(!invoice || i.invoice_no?.toLowerCase().includes(invoice))
)

})

renderInvoices(filtered)

}

function clearSearch(){

document.getElementById("searchClient").value=""
document.getElementById("searchInvoice").value=""

renderInvoices(invoices)

}

async function deleteInvoice(id){

if(!confirm("Delete invoice?")) return

await supabaseClient
.from("client_invoices")
.delete()
.eq("id",id)

loadInvoices()

}

function downloadInvoice(id){

const { jsPDF } = window.jspdf

let invoice=invoices.find(x=>x.id==id)

let doc=new jsPDF()

doc.text("Varada Nexus Private Limited",20,20)

doc.text("Invoice No : "+invoice.invoice_no,20,40)

doc.text("Client : "+invoice.client_name,20,50)

doc.text("Trips : "+invoice.trip_no,20,60)

doc.text("Amount : ₹"+invoice.invoice_amount,20,70)

doc.save(invoice.invoice_no+".pdf")

}

</script>

</body>
</html>
