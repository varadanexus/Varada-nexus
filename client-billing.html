<html>

</head>

<body>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
)

</script>

<div id="sidebar-container"></div>

<script>

fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data
await initSidebar()
if(typeof applyMenuRBAC==="function"){await applyMenuRBAC()}
document.getElementById("sidebar").style.display="block"
})

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

document.getElementById("userName").innerText = session.user.email.split("@")[0]

window.logout = async function(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}

</script>

<div class="main">

<h2>Client Billing</h2>

<div class="card">

<h3>Create Invoice</h3>

<select id="clientSelect" onchange="loadTripsByClient()"></select>

<div class="trip-list">

<div>
<input type="checkbox" id="selectAll" onclick="toggleAllTrips()">
<b>Select All</b>
</div>

<div id="tripList"></div>

</div>

<br>

<button onclick="generateInvoice()">Generate Invoice</button>

<p id="invoicePreview"></p>

<button onclick="saveInvoice()">Save Invoice</button>

</div>

<div class="card">

<h3>Invoices</h3>

<input id="searchClient" placeholder="Search Client">
<input id="searchInvoice" placeholder="Search Invoice No">

<button onclick="searchInvoices()">Search</button>
<button onclick="clearSearch()">Clear</button>

<table>

<thead>
<tr>
<th>Invoice No</th>
<th>Trips</th>
<th>Client</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="invoiceTable"></tbody>

</table>

</div>

</div>

<script>

let clients=[], trips=[], invoices=[], selectedTrips=[], invoiceAmount=0

init()

async function init(){
await loadClients()
await loadInvoices()
}

async function loadClients(){
const {data}=await supabaseClient.from("clients").select("*")
clients=data||[]
let html='<option value="">Select Client</option>'
clients.forEach(c=>{
html+=`<option value="${c.company}">${c.company}</option>`
})
document.getElementById("clientSelect").innerHTML=html
}

async function loadTripsByClient(){

let client=document.getElementById("clientSelect").value
if(!client) return

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("client_name",client)
.eq("status","Completed")

/* ✅ FIX: USE NEW TABLE */
const {data:breakdown}=await supabaseClient
.from("invoice_trip_breakdown")
.select("trip_no")

let invoicedTrips=[]

breakdown?.forEach(b=>{
invoicedTrips.push(b.trip_no)
})

trips=data.filter(t=>!invoicedTrips.includes(t.trip_no))

let html=""

trips.forEach(t=>{
html+=`
<div>
<input type="checkbox" value="${t.id}">
${t.trip_no} | ${t.route} | ${t.truck}
</div>`
})

document.getElementById("tripList").innerHTML=html

}

async function generateInvoice(){

let checked=document.querySelectorAll("#tripList input:checked")

if(checked.length==0){
alert("Select trips")
return
}

selectedTrips=[]

checked.forEach(c=>{
let trip=trips.find(t=>t.id==c.value)
selectedTrips.push(trip)
})

let totalFreight=0
let totalFuel=0

for(let trip of selectedTrips){

let mt=trip.weight_kg/1000
let base=mt*trip.company_rate

totalFreight+=base

const {data:expenses}=await supabaseClient
.from("expenses")
.select("*")
.eq("trip_id",trip.id)
.eq("expense_type","Fuel")

let fuel=0
expenses?.forEach(e=>fuel+=Number(e.amount))

totalFuel+=fuel

}

invoiceAmount=totalFreight-totalFuel

document.getElementById("invoicePreview").innerHTML=`
Client : ${selectedTrips[0].client_name}<br>
Trips : ${selectedTrips.map(t=>t.trip_no).join(", ")}<br>
Total Freight : ₹${totalFreight}<br>
Fuel Deduction : ₹${totalFuel}<br>
<b>Invoice Amount : ₹${invoiceAmount}</b>
`

}

function generateInvoiceNo(){
let now=new Date()
return "INV-"+now.getFullYear()+"-"+Math.floor(Math.random()*9000+1000)
}

/* ✅🔥 FULL FIXED FUNCTION */
async function saveInvoice(){

if(selectedTrips.length==0){
alert("Generate invoice first")
return
}

let invoiceNo = generateInvoiceNo()

const {data:newInvoice,error} = await supabaseClient
.from("client_invoices")
.insert({
invoice_no:invoiceNo,
trip_no:selectedTrips.map(t=>t.trip_no).join(", "),
client_name:selectedTrips[0].client_name,
invoice_amount:invoiceAmount,
amount_paid:0,
balance_amount:invoiceAmount,
payment_status:"Pending"
})
.select()
.single()

if(error){
alert("Error saving invoice")
return
}

/* 🔥 STORE PER TRIP */
for(let trip of selectedTrips){

let mt = (trip.weight_kg||0)/1000
let freight = mt * (trip.company_rate||0)

const {data:expenses} = await supabaseClient
.from("expenses")
.select("amount")
.eq("trip_id",trip.id)
.eq("expense_type","Fuel")

let fuel = 0
expenses?.forEach(e=> fuel += Number(e.amount||0))

let finalAmount = freight - fuel

await supabaseClient.from("invoice_trip_breakdown").insert({
invoice_id:newInvoice.id,
trip_no:trip.trip_no,
amount:finalAmount
})

}

alert("Invoice Saved")
loadInvoices()

}

async function loadInvoices(){
const {data}=await supabaseClient
.from("client_invoices")
.select("*")
.order("created_at",{ascending:false})
invoices=data||[]
renderInvoices(invoices)
}

function renderInvoices(data){
let html=""
data.forEach(i=>{
html+=`
<tr>
<td>${i.invoice_no}</td>
<td>${i.trip_no}</td>
<td>${i.client_name}</td>
<td>₹${i.invoice_amount}</td>
<td>${i.payment_status}</td>
<td>
<button onclick="downloadClientInvoice('${i.id}',event)">PDF</button>
<button class="deleteBtn" onclick="deleteInvoice('${i.id}')">Delete</button>
</td>
</tr>`
})
document.getElementById("invoiceTable").innerHTML=html
}

async function deleteInvoice(id){

if(!confirm("Delete invoice?")) return

/* 🔥 DELETE BREAKDOWN ALSO */
await supabaseClient.from("invoice_trip_breakdown").delete().eq("invoice_id",id)

await supabaseClient.from("client_invoices").delete().eq("id",id)

loadInvoices()

}

function toggleAllTrips(){
let checked=document.getElementById("selectAll").checked
document.querySelectorAll("#tripList input").forEach(c=>c.checked=checked)
generateInvoice()
}

document.addEventListener("change",e=>{
if(e.target.closest("#tripList")){
generateInvoice()
}
})

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
