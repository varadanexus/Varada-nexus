<script>

/* YOUR EXISTING LOGIC — UNCHANGED */

let clients=[], trips=[], invoices=[], selectedTrips=[], invoiceAmount=0

init()

async function init(){
await loadClients()
await loadInvoices()
}

async function loadClients(){
const {data}=await supabaseClient.from("clients").select("*")
clients=data||[]
let html='<option value="">Select Client</option>'
clients.forEach(c=>{
html+=`<option value="${c.company}">${c.company}</option>`
})
document.getElementById("clientSelect").innerHTML=html
}

async function loadTripsByClient(){

let client=document.getElementById("clientSelect").value
if(!client) return

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("client_name",client)
.eq("status","Completed")

const {data:inv}=await supabaseClient.from("client_invoices").select("trip_no")

let invoicedTrips=[]

inv?.forEach(i=>{
if(i.trip_no){
i.trip_no.split(",").forEach(t=>{
invoicedTrips.push(t.trim())
})
}
})

trips=data.filter(t=>!invoicedTrips.includes(t.trip_no))

let html=""

trips.forEach(t=>{
html+=`
<div>
<input type="checkbox" value="${t.id}">
${t.trip_no} | ${t.route} | ${t.truck}
</div>`
})

document.getElementById("tripList").innerHTML=html

}

async function generateInvoice(){

let checked=document.querySelectorAll("#tripList input:checked")

if(checked.length==0){
alert("Select trips")
return
}

selectedTrips=[]

checked.forEach(c=>{
let trip=trips.find(t=>t.id==c.value)
selectedTrips.push(trip)
})

let totalFreight=0
let totalFuel=0

for(let trip of selectedTrips){

let mt=trip.weight_kg/1000
let base=mt*trip.company_rate

totalFreight+=base

const {data:expenses}=await supabaseClient
.from("expenses")
.select("*")
.eq("trip_id",trip.id)
.eq("expense_type","Fuel")

let fuel=0
expenses?.forEach(e=>fuel+=Number(e.amount))

totalFuel+=fuel

}

invoiceAmount=totalFreight-totalFuel

document.getElementById("invoicePreview").innerHTML=`
Client : ${selectedTrips[0].client_name}<br>
Trips : ${selectedTrips.map(t=>t.trip_no).join(", ")}<br>
Total Freight : ₹${totalFreight}<br>
Fuel Deduction : ₹${totalFuel}<br>
<b>Invoice Amount : ₹${invoiceAmount}</b>
`

}

function generateInvoiceNo(){
let now=new Date()
return "INV-"+now.getFullYear()+"-"+Math.floor(Math.random()*9000+1000)
}

async function saveInvoice(){

if(selectedTrips.length==0){
alert("Generate invoice first")
return
}

await supabaseClient.from("client_invoices").insert({
invoice_no:generateInvoiceNo(),
trip_no:selectedTrips.map(t=>t.trip_no).join(", "),
client_name:selectedTrips[0].client_name,
invoice_amount:invoiceAmount,
amount_paid:0,
balance_amount:invoiceAmount,
payment_status:"Pending"
})

alert("Invoice Saved")
loadInvoices()

}

async function loadInvoices(){
const {data}=await supabaseClient
.from("client_invoices")
.select("*")
.order("created_at",{ascending:false})
invoices=data||[]
renderInvoices(invoices)
}

function renderInvoices(data){
let html=""
data.forEach(i=>{
html+=`
<tr>
<td>${i.invoice_no}</td>
<td>${i.trip_no}</td>
<td>${i.client_name}</td>
<td>₹${i.invoice_amount}</td>
<td>${i.payment_status}</td>
<td>
<button onclick="downloadClientInvoice('${i.id}',event)">PDF</button>
<button class="deleteBtn" onclick="deleteInvoice('${i.id}')">Delete</button>
</td>
</tr>`
})
document.getElementById("invoiceTable").innerHTML=html
}

async function deleteInvoice(id){
if(!confirm("Delete invoice?")) return
await supabaseClient.from("client_invoices").delete().eq("id",id)
loadInvoices()
}

async function downloadClientInvoice(id,e){

e.stopPropagation()

const { jsPDF } = window.jspdf

let inv = invoices.find(i=>i.id==id)

/* GET TRIPS */
let tripNos = inv.trip_no.split(",").map(t=>t.trim())

const {data:tripData} = await supabaseClient
.from("trips")
.select("trip_no,route,truck,trip_date,weight_kg,client_rate")
.in("trip_no",tripNos)

/* CREATE PDF */
let doc = new jsPDF()

/* LOGO */
try{
doc.addImage("images/logo.png","PNG",15,10,20,20)
}catch{}

/* COMPANY NAME */
doc.setFontSize(16)
doc.setFont("helvetica","bold")
doc.text("VARADA NEXUS PRIVATE LIMITED",40,20)

doc.setFontSize(11)
doc.setFont("helvetica","normal")
doc.text("Client Invoice",40,27)

/* INVOICE DETAILS */
doc.setFontSize(11)
doc.text(`Invoice No : ${inv.invoice_no}`,15,45)
doc.text(`Status     : ${inv.payment_status}`,15,52)

/* TABLE */
let rows=[]
let totalWeight=0

tripData.forEach(t=>{

let weightMT = (t.weight_kg||0)/1000
let amount = weightMT*(t.client_rate||0)

totalWeight += weightMT

rows.push([
t.trip_no,
t.route||"-",
t.truck||"-",
t.trip_date||"-",
weightMT.toFixed(2),
amount.toFixed(2)
])

})

doc.autoTable({
startY:60,
head:[["Trip","Route","Truck","Date","Weight (MT)","Amount"]],
body:rows,
theme:"grid",
styles:{fontSize:9},
headStyles:{fillColor:[41,128,185]}
})

/* TOTALS */
let finalY = doc.lastAutoTable.finalY + 10

doc.setFont("helvetica","bold")
doc.text(`Total Weight (MT): ${totalWeight.toFixed(2)}`,15,finalY)

doc.text(`Total Amount: ${Number(inv.invoice_amount).toFixed(2)}`,15,finalY+10)
doc.text(`Paid: ${Number(inv.amount_paid||0).toFixed(2)}`,15,finalY+20)
doc.text(`Balance: ${Number(inv.balance_amount).toFixed(2)}`,15,finalY+30)

/* FOOTER */
doc.setFont("helvetica","normal")
doc.setFontSize(9)
doc.text("This is a system generated invoice.",15,finalY+45)

/* SAVE */
doc.save(inv.invoice_no + ".pdf")
}

function toggleAllTrips(){
let checked=document.getElementById("selectAll").checked
document.querySelectorAll("#tripList input").forEach(c=>c.checked=checked)
generateInvoice()
}

document.addEventListener("change",e=>{
if(e.target.closest("#tripList")){
generateInvoice()
}
})

</script>
