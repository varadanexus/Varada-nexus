<script>

let clients=[], trips=[], invoices=[], payments=[], selectedTrips=[], invoiceAmount=0

init()

async function init(){
await loadClients()
await loadInvoices()
await loadPayments()
}

async function loadClients(){
const {data}=await supabaseClient.from("clients").select("*")
let html='<option>Select Client</option>'
data.forEach(c=> html+=`<option value="${c.company}">${c.company}</option>`)
clientSelect.innerHTML=html
}

async function loadTripsByClient(){

let client=clientSelect.value

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("client_name",client)
.eq("status","Completed")

const {data:inv}=await supabaseClient
.from("client_invoices")
.select("id")
.eq("client_name",client)

let used=[]

if(inv){
const {data:bd}=await supabaseClient
.from("invoice_trip_breakdown")
.select("trip_no")
.in("invoice_id",inv.map(i=>i.id))

bd?.forEach(b=>used.push(b.trip_no))
}

trips=data.filter(t=>!used.includes(t.trip_no))
.sort((a,b)=>b.trip_no.localeCompare(a.trip_no))

tripList.innerHTML=trips.map(t=>`
<div>
<input type="checkbox" value="${t.id}">
${t.trip_no} | ${t.route}
</div>
`).join("")
}

async function generateInvoice(){

let checked=document.querySelectorAll("#tripList input:checked")

selectedTrips=[]
let totalFreight=0,totalFuel=0

for(let c of checked){

let trip=trips.find(t=>t.id==c.value)
selectedTrips.push(trip)

let mt=trip.weight_kg/1000
let freight=mt*trip.company_rate

const {data:exp}=await supabaseClient
.from("expenses")
.select("amount")
.eq("trip_id",trip.id)
.eq("expense_type","Fuel")

let fuel=0
exp?.forEach(e=>fuel+=e.amount)

totalFreight+=freight
totalFuel+=fuel
}

invoiceAmount=totalFreight-totalFuel

invoicePreview.innerHTML=`
Trips: ${selectedTrips.map(t=>t.trip_no)}<br>
Amount: ₹${invoiceAmount}
`
}

async function generateClientInvoiceNo(){

let today = new Date()

let yy = String(today.getFullYear()).slice(-2)
let mm = String(today.getMonth()+1).padStart(2,'0')
let dd = String(today.getDate()).padStart(2,'0')

let prefix = `INVC${yy}${mm}${dd}`

/* 🔥 GET LAST TODAY INVOICE */
const { data } = await supabaseClient
.from("client_invoices")
.select("invoice_no")
.ilike("invoice_no", prefix + "%")
.order("created_at", { ascending: false })
.limit(1)

let nextNumber = 1

if(data && data.length > 0){
let last = data[0].invoice_no
let lastSeq = parseInt(last.slice(-3))
nextNumber = lastSeq + 1
}

let seq = String(nextNumber).padStart(3,'0')

return prefix + seq
}

async function saveInvoice(){

if(selectedTrips.length === 0){
    alert("Generate invoice first")
    return
}

/* 🔥 GENERATE CLEAN INVOICE */
let invoiceNo = await generateClientInvoiceNo()
console.log("✅ NEW INVOICE:", invoiceNo)

/* 🔥 INSERT */
let {data:inv, error} = await supabaseClient
.from("client_invoices")
.insert({
    invoice_no: invoiceNo,
    trip_no: selectedTrips.map(t=>t.trip_no).join(","),
    client_name: selectedTrips[0].client_name,
    invoice_amount: Number(invoiceAmount.toFixed(2)),
    balance_amount: Number(invoiceAmount.toFixed(2)),
    payment_status:"Pending"
})
.select()
.single()

if(error){
    console.error(error)
    alert("Invoice save failed")
    return
}

/* 🔥 BREAKDOWN */
for(let t of selectedTrips){

let mt = t.weight_kg / 1000
let freight = mt * t.company_rate

const {data:exp} = await supabaseClient
.from("expenses")
.select("amount")
.eq("trip_id",t.id)
.eq("expense_type","Fuel")

let fuel = 0
exp?.forEach(e=> fuel += Number(e.amount || 0))

await supabaseClient.from("invoice_trip_breakdown").insert({
    invoice_id: inv.id,
    trip_no: t.trip_no,
    amount: freight - fuel
})
}

alert("Invoice Saved ✅")

/* RESET */
selectedTrips = []
invoicePreview.innerHTML = ""

/* REFRESH */
await loadInvoices()
await loadTripsByClient()
}

function setActiveMenu(){

    let currentPage = window.location.pathname.split("/").pop()

    document.querySelectorAll("#sidebar a").forEach(link=>{

        let page = link.getAttribute("data-page")

        if(page === currentPage){
            link.classList.add("active")
        }

    })

}


function formatINR(val){
  return Number(val || 0).toLocaleString("en-IN", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  })
}
    
  
/* 🔥 TRANSPORTER STYLE PDF */
async function downloadClientInvoice(id,e){

e.stopPropagation()

const { jsPDF } = window.jspdf
let inv=invoices.find(i=>i.id==id)

/* 🔥 GET BREAKDOWN */
const {data:bd}=await supabaseClient
.from("invoice_trip_breakdown")
.select("*")
.eq("invoice_id",id)

let tripNos=bd.map(b=>b.trip_no)

/* 🔥 GET TRIPS */
const {data:tripData}=await supabaseClient
.from("trips")
.select(`
id,
trip_no,
route,
truck,
trip_date,
weight_kg,
company_rate
`)
.in("trip_no",tripNos)

/* 🔥 EXPENSES */
const {data:exp}=await supabaseClient
.from("expenses")
.select("trip_id,amount")
.in("trip_id",tripData.map(t=>t.id))
.eq("expense_type","Fuel")

let fuelMap={}
exp?.forEach(e=>{
if(!fuelMap[e.trip_id]) fuelMap[e.trip_id]=0
fuelMap[e.trip_id]+=Number(e.amount||0)
})

/* 🔥 CALCULATIONS */
let rows=[]
let totalWeight=0
let totalFreight=0
let totalFuel=0

tripData.forEach(t=>{

let mt=(t.weight_kg||0)/1000
let freight=mt*(t.company_rate||0)
let fuel=fuelMap[t.id]||0
let net=freight-fuel

totalWeight+=mt
totalFreight+=freight
totalFuel+=fuel

rows.push([
t.trip_no,
t.route||"-",
t.truck||"-",
t.trip_date||"-",
mt.toFixed(2),
freight.toFixed(2),
fuel.toFixed(2),
net.toFixed(2)
])

})

/* ================= PREMIUM PDF ================= */

let doc=new jsPDF()

/* 🔷 WATERMARK */
doc.setGState(new doc.GState({opacity:0.05}))
doc.addImage("images/logo.png","PNG",40,80,120,120)
doc.setGState(new doc.GState({opacity:1}))

/* 🔷 LOGO */
doc.addImage("images/logo.png","PNG",15,10,20,20)

/* 🔷 HEADER */
doc.setFont("helvetica","bold")
doc.setFontSize(14)
doc.text("VARADA NEXUS PRIVATE LIMITED",40,18)

doc.setFont("helvetica","normal")
doc.setFontSize(10)
doc.text("Client Invoice",40,25)

doc.setFontSize(9)
doc.text("GST: 37AAKCV7495B1ZV",40,31)

/* 🔷 VERIFIED */
doc.setTextColor(0,120,0)
doc.text("✔ Digitally Verified",150,18)
doc.setTextColor(0,0,0)

/* 🔷 RIGHT PANEL */
doc.setFont("helvetica","bold")
doc.text("Invoice No:",140,40)
doc.setFont("helvetica","normal")
doc.text(inv.invoice_no,170,40)

doc.setFont("helvetica","bold")
doc.text("Status:",140,47)
doc.setFont("helvetica","normal")
doc.text(inv.payment_status,170,47)

doc.setFont("helvetica","bold")
doc.text("Date:",140,54)
doc.setFont("helvetica","normal")
doc.text(new Date().toLocaleDateString("en-IN"),170,54)

/* 🔷 CLIENT BLOCK */
doc.setFont("helvetica","bold")
doc.text("Client Details",15,55)

doc.setFont("helvetica","normal")
doc.text("Name:",15,63)
doc.text(inv.client_name,40,63)

doc.setDrawColor(200)
doc.line(15,75,195,75)

/* 🔷 TABLE */
doc.autoTable({
startY:80,
head:[["Trip","Route","Truck","Date","Weight (MT)","Freight","Fuel","Net"]],
body:rows,
theme:"grid",
headStyles:{ fillColor:[22,160,133], textColor:255 },
styles:{ fontSize:9 }
})

/* 🔷 SUMMARY */
let summaryY=doc.lastAutoTable.finalY+10

doc.autoTable({
startY:summaryY,
margin:{left:110},
tableWidth:85,
head:[["Summary",""]],
body:[
["Total Weight", totalWeight.toFixed(2) + " MT"],
["Total Amount", "Rs. " + formatINR(totalFreight)],
["Expenses", "Rs. " + formatINR(totalFuel)],
["Paid", "Rs. " + formatINR(inv.amount_paid || 0)],
["Balance", "Rs. " + formatINR(inv.balance_amount)]
],
theme:"grid",
headStyles:{ fillColor:[0,102,204], textColor:255 }
})

/* 🔷 BANK */
let bankY=summaryY+5

doc.setDrawColor(180)
doc.rect(15,bankY,90,40)

doc.setFontSize(10)
doc.text("Bank Details",20,bankY+7)

doc.setFontSize(9)
doc.text("Bank: Axis Bank",20,bankY+14)
doc.text("A/C No: 924020062188598",20,bankY+20)
doc.text("IFSC: UTIB0000107",20,bankY+26)
doc.text("Branch: Rajahmundry, AP",20,bankY+32)

/* 🔷 PAID STAMP (FIXED POSITION LIKE TRANSPORTER) */
if((inv.amount_paid||0)>=inv.invoice_amount){

let rectY = bankY + 48

doc.setTextColor(0,150,0)
doc.setFontSize(28)
doc.setGState(new doc.GState({opacity:0.25}))

doc.text("PAID",60,rectY,{angle:20})

doc.setGState(new doc.GState({opacity:1}))
doc.setTextColor(0,0,0)
}

/* 🔷 SIGNATURE (FIXED SIZE + CLEAN LOOK) */

doc.setFont("helvetica","normal")
doc.setFontSize(9)   // 🔥 control size here

let signY = 270

doc.line(130, signY, 195, signY)

doc.text("Authorized Signatory", 162, signY - 3, {
  align: "center"
})

/* 🔷 FOOTER */
doc.setFontSize(9)
doc.text("This is a system generated document.",15,285)
doc.text("Thank you for doing business with Varada Nexus.",15,292)

/* 🔷 QR */
let qrDiv=document.createElement("div")

new QRCode(qrDiv,{
text:`INV:${inv.invoice_no}|AMT:${inv.invoice_amount}`,
width:80,height:80
})

setTimeout(()=>{
let qr=qrDiv.querySelector("canvas")
if(qr){
/* 🔷 QR POSITION FIX (BOTTOM LEFT LIKE IMAGE) */

let qrX = 20        // left side
let qrY = bankY + 55   // just below bank box

// safety: don’t go beyond page
if(qrY > 240){
    qrY = 240
}

doc.addImage(qr.toDataURL(),"PNG", qrX, qrY, 45, 45)
}
doc.save(inv.invoice_no+".pdf")
},300)

}
async function loadInvoices(){

const {data}=await supabaseClient.from("client_invoices").select("*")
invoices=data||[]

/* 🔷 TABLE */
invoiceTable.innerHTML=invoices.map(i=>`
<tr>
<td>${i.invoice_no}</td>
<td>${i.trip_no}</td>
<td>${i.client_name}</td>
<td>${i.invoice_amount}</td>
<td>${i.payment_status}</td>
<td>
<button onclick="downloadClientInvoice('${i.id}',event)">PDF</button>
<button onclick="deleteInvoice('${i.id}')">Delete</button>
</td>
</tr>
`).join("")

/* 🔥🔥🔥 THIS IS STEP 5 — ADD HERE 🔥🔥🔥 */

/* PAYMENT DROPDOWN */
let dropdown='<option value="">Select Invoice</option>'

invoices
.filter(i => Number(i.balance_amount) > 0)
.forEach(i=>{
dropdown+=`
<option value="${i.id}">
${i.invoice_no} | ${i.client_name} | ₹${i.balance_amount}
</option>`
})

document.getElementById("invoiceSelect").innerHTML = dropdown

}

async function loadPayments(){

const {data}=await supabaseClient
.from("client_payments")
.select("*")
.order("created_at",{ascending:false})

payments=data || []

let html=""

payments.forEach(p=>{
html+=`
<tr>
<td>${p.payment_date || ""}</td>
<td>${p.invoice_no}</td>
<td>${p.client_name}</td>
<td>₹${p.amount}</td>
<td>${p.payment_method}</td>
<td>${p.remarks || ""}</td>
<td>
<button onclick="deletePayment('${p.id}')">Delete</button>
</td>
</tr>`
})

document.getElementById("paymentTable").innerHTML=html
}

async function deleteInvoice(id){
await supabaseClient.from("invoice_trip_breakdown").delete().eq("invoice_id",id)
await supabaseClient.from("client_invoices").delete().eq("id",id)
loadInvoices()
}

function toggleAllTrips(){
document.querySelectorAll("#tripList input").forEach(c=>c.checked=selectAll.checked)
}

async function savePayment(){

let invoiceId=document.getElementById("invoiceSelect").value
let amount=Number(document.getElementById("amount").value)
let date=document.getElementById("paymentDate").value
let method=document.getElementById("method").value
let remarks=document.getElementById("remarks").value

if(!invoiceId || !amount || !method){
alert("Fill all fields")
return
}

let invoice=invoices.find(x=>x.id==invoiceId)

let newPaid=(invoice.amount_paid || 0) + amount
let balance=invoice.invoice_amount - newPaid

let status="Pending"

if(balance<=0){
status="Paid"
balance=0
}else if(newPaid>0){
status="Partially Paid"
}

await supabaseClient.from("client_payments").insert({
invoice_id:invoiceId,
invoice_no:invoice.invoice_no,
client_name:invoice.client_name,
amount:amount,
payment_date:date,
payment_method:method,
remarks:remarks
})

await supabaseClient.from("client_invoices").update({
amount_paid:newPaid,
balance_amount:balance,
payment_status:status
}).eq("id",invoiceId)

alert("Payment Recorded ✅")

document.getElementById("amount").value=""
document.getElementById("remarks").value=""
document.getElementById("paymentDate").value=""

await loadInvoices()
await loadPayments()
}

async function deletePayment(id){

if(!confirm("Delete this payment?")) return

const {data:payment}=await supabaseClient
.from("client_payments")
.select("*")
.eq("id",id)
.single()

if(!payment) return

let invoiceId=payment.invoice_id

await supabaseClient.from("client_payments").delete().eq("id",id)

const {data:allPayments}=await supabaseClient
.from("client_payments")
.select("amount")
.eq("invoice_id",invoiceId)

let totalPaid=0
allPayments?.forEach(p=>totalPaid+=Number(p.amount))

const {data:invoice}=await supabaseClient
.from("client_invoices")
.select("*")
.eq("id",invoiceId)
.single()

let balance = invoice.invoice_amount - totalPaid

let status="Pending"

if(totalPaid===0){
balance=invoice.invoice_amount
}
else if(balance<=0){
status="Paid"
balance=0
}
else{
status="Partially Paid"
}

await supabaseClient.from("client_invoices").update({
amount_paid:totalPaid,
balance_amount:balance,
payment_status:status
}).eq("id",invoiceId)

alert("Payment Deleted")

await loadInvoices()
await loadPayments()
}
    
</script>
