<script>

function setActiveMenu(){

let currentPage = window.location.pathname.split("/").pop()

document.querySelectorAll("#sidebar a").forEach(link=>{

    let page = link.getAttribute("data-page")

    if(page === currentPage){
        link.classList.add("active")
    }

})

}
  
async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const authId = session.user.id
const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

/* LOGOUT */

window.logout = async function(){

window.location.href="login.html"

<div class="main">

<h2>Client Ledger</h2>

<div class="card">

<select id="clientSelect"></select>

<!-- 🔥 GST TOGGLE -->

<option value="non_gst">NON-GST</option>
<option value="gst">GST</option>
</select>

<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Reference</th>
<th>Debit</th>
<th>Credit</th>
<th>Balance</th>
</tr>
</thead>

<tbody id="ledgerTable"></tbody>

</table>

</div>

<script>

let invoices=[]
let payments=[]
let clients=[]

init()

async function init(){
await loadClients()
}

/* LOAD CLIENTS */

async function loadClients(){

const {data}=await supabaseClient
.from("client_invoices")
.select("client_name")

let unique=[...new Set((data || []).map(x=>x.client_name))]

clients=unique

let html='<option value="">Select Client</option>'

unique.forEach(c=>{
html+=`<option value="${c}">${c}</option>`
})

document.getElementById("clientSelect").innerHTML=html

}

/* LOAD LEDGER */

async function loadLedger(){

let client=document.getElementById("clientSelect").value

let gstType = document.getElementById("gstType").value
    
if(!client){
alert("Select client")
return
}

/* INVOICES */

let inv = []

if(gstType === "gst"){
    const {data} = await supabaseClient
    .from("client_invoices_gst")
    .select("*")
    .eq("client_name", client)

    inv = data || []
}else{
    const {data} = await supabaseClient
    .from("client_invoices")
    .select("*")
    .eq("client_name", client)

    inv = data || []
}

/* PAYMENTS */

const {data:pay}=await supabaseClient
.from("client_payments")
.select("*")
.eq("client_name",client)
.eq("billing_type", gstType)   // 🔥 IMPORTANT

let entries=[]

;(inv || []).forEach(i=>{
entries.push({
date:i.invoice_date || i.created_at,
type: i.is_gst ? "Invoice (GST)" : "Invoice (NON-GST)",
ref:i.invoice_no,
debit:Number(i.invoice_amount || 0),
credit:0
})
})

;(pay || []).forEach(p=>{
entries.push({
date:p.payment_date || p.created_at,
type:"Payment",
ref:p.invoice_no,
debit:0,
credit:Number(p.amount || 0)
})
})

entries.sort((a,b)=> new Date(a.date) - new Date(b.date))

let balance=0
let html=""

entries.forEach(e=>{

balance += e.debit
balance -= e.credit

html+=`
<tr>
<td>${e.date || ""}</td>
<td>${e.type}</td>
<td>${e.ref}</td>
<td>${e.debit || ""}</td>
<td>${e.credit || ""}</td>
<td>${balance}</td>
</tr>`
})

document.getElementById("ledgerTable").innerHTML=html

}

</script>
