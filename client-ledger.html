<div class="main">

<div class="card">

<table>

<thead>

<tr>
<th>Date</th>
<th>Type</th>
<th>Reference</th>
<th>Debit</th>
<th>Credit</th>
<th>Balance</th>
</tr>

</thead>

<script>

let invoices=[]
let payments=[]
let clients=[]

init()

async function init(){

await loadClients()

}


async function loadClients(){

const {data}=await supabaseClient
.from("client_invoices")
.select("client_name")

let unique=[...new Set(data.map(x=>x.client_name))]

clients=unique

let html='<option value="">Select Client</option>'

unique.forEach(c=>{
html+=`<option value="${c}">${c}</option>`
})

document.getElementById("clientSelect").innerHTML=html

}


async function loadLedger(){

let client=document.getElementById("clientSelect").value

if(!client){
alert("Select client")
return
}


/* LOAD INVOICES */

const {data:inv}=await supabaseClient
.from("client_invoices")
.select("*")
.eq("client_name",client)


/* LOAD PAYMENTS */

const {data:pay}=await supabaseClient
.from("client_payments")
.select("*")
.eq("client_name",client)


let entries=[]


inv.forEach(i=>{

entries.push({

date:i.invoice_date,
type:"Invoice",
ref:i.invoice_no,
debit:i.invoice_amount,
credit:0

})

})


pay.forEach(p=>{

entries.push({

date:p.payment_date,
type:"Payment",
ref:p.invoice_no,
debit:0,
credit:p.amount

})

})


entries.sort((a,b)=> new Date(a.date) - new Date(b.date))


let balance=0
let html=""

entries.forEach(e=>{

balance += e.debit
balance -= e.credit

html+=`

<tr>

<td>${e.date}</td>

<td>${e.type}</td>

<td>${e.ref}</td>

<td>${e.debit || ""}</td>

<td>${e.credit || ""}</td>

<td>${balance}</td>

</tr>

`

})

document.getElementById("ledgerTable").innerHTML=html

}

</script>
