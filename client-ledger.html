function setActiveMenu(){

async function initSidebar(){

const authId = session.user.id

.from("users")
.select("id")
.eq("auth_id",authId)
.single()

.from("user_roles")
.select("role_id")

.from("roles")
.select("role_name")

<script>

let invoices=[]
let payments=[]
let clients=[]

init()

async function init(){
await loadClients()
}
console.log("INIT RUNNING")
/* LOAD CLIENTS */

async function loadClients(){

const clientSelect = document.getElementById("clientSelect")

/* 🔥 GET NON-GST CLIENTS */
const {data:nonGst} = await supabaseClient
.from("client_invoices")
.select("client_name")

/* 🔥 GET GST CLIENTS */
const {data:gst} = await supabaseClient
.from("client_invoices_gst")
.select("client_name")

/* 🔥 MERGE */
let all = [
...(nonGst || []),
...(gst || [])
]

/* 🔥 UNIQUE */
let unique = [...new Set(all.map(x => x.client_name).filter(Boolean))]

/* 🔥 FALLBACK (VERY IMPORTANT) */
if(unique.length === 0){
    clientSelect.innerHTML = `<option value="">No Clients Found</option>`
    return
}

/* 🔥 BUILD DROPDOWN */
let html = `<option value="">Select Client</option>`

unique.forEach(c=>{
    html += `<option value="${c}">${c}</option>`
})

clientSelect.innerHTML = html
console.log("CLIENTS:", unique)
}

function formatDate(date){
    if(!date) return ""

    let d = new Date(date)

    let day = String(d.getDate()).padStart(2,'0')
    let month = String(d.getMonth()+1).padStart(2,'0')
    let year = d.getFullYear()

    return `${day}-${month}-${year}`
}

function formatAmount(val){
    return Number(val || 0).toFixed(2)
}
    
/* LOAD LEDGER */
    
async function loadLedger(){

let client = document.getElementById("clientSelect").value
let gstType = document.getElementById("gstType").value
    
if(!client){
alert("Select client")
return
}

/* =========================
   🔥 INVOICES
========================= */

let inv = []

if(gstType === "gst"){
    const {data} = await supabaseClient
    .from("client_invoices_gst")
    .select("*")
    .eq("client_name", client)

    inv = data || []
}else{
    const {data} = await supabaseClient
    .from("client_invoices")
    .select("*")
    .eq("client_name", client)

    inv = data || []
}

/* =========================
   🔥 PAYMENTS (FIXED)
========================= */

let pay = []

if(gstType === "gst"){
    const {data} = await supabaseClient
    .from("gst_payments")
    .select("*")
    .eq("client_name", client)

    pay = data || []
}else{
    const {data} = await supabaseClient
    .from("client_payments")
    .select("*")
    .eq("client_name", client)

    pay = data || []
}

/* =========================
   🔥 MERGE ENTRIES
========================= */

/* INVOICES */
inv.forEach(i=>{
entries.push({
date: i.created_at,
type: gstType === "gst" ? "GST Invoice" : "Invoice",
ref: i.invoice_no,
debit: Number(i.invoice_amount || 0),
credit: 0
})
})

/* PAYMENTS */
pay.forEach(p=>{
entries.push({
date: p.payment_date || p.created_at,
type: "Payment",
ref: p.invoice_no,
debit: 0,
credit: Number(p.amount || 0)
})
})

/* =========================
   🔥 SORT + RUNNING BALANCE
========================= */

// 🔥 GROUP BY INVOICE
let grouped = {}

/* ADD INVOICES FIRST */
inv.forEach(i=>{
let key = i.invoice_no

if(!grouped[key]){
    grouped[key] = {
        invoice: null,
        payments: []
    }
}

grouped[key].invoice = {
    date: i.created_at,
    type: gstType === "gst" ? "GST Invoice" : "Invoice",
    ref: i.invoice_no,
    debit: Number(i.invoice_amount || 0),
    credit: 0
}
})

/* ADD PAYMENTS */
pay.forEach(p=>{
let key = p.invoice_no

if(!grouped[key]){
    grouped[key] = {
        invoice: null,
        payments: []
    }
}

grouped[key].payments.push({
    date: p.payment_date || p.created_at,
    type: "Payment",
    ref: p.invoice_no,
    debit: 0,
    credit: Number(p.amount || 0)
})
})

/* 🔥 SORT INVOICES BY DATE */
let sortedKeys = Object.keys(grouped).sort((a,b)=>{
let d1 = new Date(grouped[a].invoice?.date || 0)
let d2 = new Date(grouped[b].invoice?.date || 0)
return d1 - d2
})

/* 🔥 BUILD FINAL ENTRIES */
let entries = []

sortedKeys.forEach(key=>{

let g = grouped[key]

/* 1️⃣ INVOICE FIRST */
if(g.invoice){
    entries.push(g.invoice)
}

/* 2️⃣ PAYMENTS AFTER */
g.payments
.sort((a,b)=> new Date(a.date) - new Date(b.date))
.forEach(p=>{
    entries.push(p)
})

})

let balance = 0
let html = ""

entries.forEach(e=>{

balance += e.debit
balance -= e.credit

html += `
<tr>
<td>${formatDate(e.date)}</td>
<td>${e.type === "Payment" ? "💰 Payment" : "📄 " + e.type}</td>
<td>${e.ref}</td>
<td>${e.debit ? formatAmount(e.debit) : ""}</td>
<td>${e.credit ? formatAmount(e.credit) : ""}</td>
<td>${formatAmount(balance)}</td>
</tr>`
})

document.getElementById("ledgerTable").innerHTML = html

}

    
</script>
