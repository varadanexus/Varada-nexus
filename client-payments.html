async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const authId = session.user.id
const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

/* LOGOUT */

window.logout = async function(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}

<div class="main">

<h3>Payment History</h3>

<table>

<thead>

<th>Client</th>

<th>Method</th>
<th>Remarks</th>
<th>Action</th>
</tr>
</thead>

<tbody id="paymentTable"></tbody>

</table>

</div>

<script>

let invoices=[]
let payments=[]

init()

async function init(){
await loadInvoices()
await loadPayments()
}

/* LOAD INVOICES */

async function loadInvoices(){

const {data}=await supabaseClient
.from("client_invoices")
.select("*")

invoices=data || []

let pendingInvoices = invoices.filter(i => Number(i.balance_amount) > 0)

let html='<option value="">Select Invoice</option>'

pendingInvoices.forEach(i=>{
html+=`
<option value="${i.id}">
${i.invoice_no} | ${i.client_name} | Balance ₹${i.balance_amount}
</option>`
})

document.getElementById("invoiceSelect").innerHTML=html
}

function setActiveMenu(){

let currentPage = window.location.pathname.split("/").pop()

document.querySelectorAll("#sidebar a").forEach(link=>{

    let page = link.getAttribute("data-page")

    if(page === currentPage){
        link.classList.add("active")
    }

})

}
  
/* SAVE PAYMENT */

async function savePayment(){

let invoiceId=document.getElementById("invoiceSelect").value
let amount=Number(document.getElementById("amount").value)
let date=document.getElementById("paymentDate").value
let method=document.getElementById("method").value
let remarks=document.getElementById("remarks").value

if(!invoiceId || !amount){
alert("Enter invoice and amount")
return
}

let invoice=invoices.find(x=>x.id==invoiceId)

let newPaid=(invoice.amount_paid || 0) + amount
let balance=invoice.invoice_amount - newPaid

let status="Pending"

if(balance<=0){
status="Paid"
balance=0
}else if(newPaid>0){
status="Partially Paid"
}

await supabaseClient.from("client_payments").insert({
invoice_id:invoiceId,
invoice_no:invoice.invoice_no,
client_name:invoice.client_name,
amount:amount,
payment_date:date,
payment_method:method,
remarks:remarks
})

await supabaseClient.from("client_invoices").update({
amount_paid:newPaid,
balance_amount:balance,
payment_status:status
}).eq("id",invoiceId)

alert("Payment Recorded")

document.getElementById("amount").value=""
document.getElementById("remarks").value=""

await loadInvoices()
await loadPayments()
}

/* LOAD PAYMENTS */

async function loadPayments(){

const {data}=await supabaseClient
.from("client_payments")
.select("*")
.order("created_at",{ascending:false})

payments=data || []

let html=""

payments.forEach(p=>{
html+=`
<tr>
<td>${p.payment_date || ""}</td>
<td>${p.invoice_no}</td>
<td>${p.client_name}</td>
<td>₹${p.amount}</td>
<td>${p.payment_method}</td>
<td>${p.remarks || ""}</td>
<td>
<button class="deleteBtn" onclick="deletePayment('${p.id}')">Delete</button>
</td>
</tr>`
})

document.getElementById("paymentTable").innerHTML=html
}

/* DELETE */

async function deletePayment(id){

if(!confirm("Delete this payment?")) return

const {data:payment}=await supabaseClient
.from("client_payments")
.select("*")
.eq("id",id)
.single()

if(!payment) return

let invoiceId=payment.invoice_id

await supabaseClient.from("client_payments").delete().eq("id",id)

const {data:allPayments}=await supabaseClient
.from("client_payments")
.select("amount")
.eq("invoice_id",invoiceId)

let totalPaid=0
allPayments?.forEach(p=>totalPaid+=Number(p.amount))

const {data:invoice}=await supabaseClient
.from("client_invoices")
.select("*")
.eq("id",invoiceId)
.single()

let balance = invoice.invoice_amount - totalPaid

let status="Pending"

if(totalPaid===0){
balance=invoice.invoice_amount
}
else if(balance<=0){
status="Paid"
balance=0
}
else{
status="Partially Paid"
}

await supabaseClient.from("client_invoices").update({
amount_paid:totalPaid,
balance_amount:balance,
payment_status:status
}).eq("id",invoiceId)

await loadInvoices()
await loadPayments()
}

</script>
