</head>

<!-- SIDEBAR -->

setTimeout(()=>{

<div class="main">

<h2>Client Payments</h2>


<div class="card">

<h3>Record Payment</h3>

<select id="invoiceSelect"></select>

<input id="amount" placeholder="Amount">

<input type="date" id="paymentDate">

<select id="method">

<option value="Cash">Cash</option>
<option value="Bank Transfer">Bank Transfer</option>
<option value="UPI">UPI</option>

</select>

<input id="remarks" placeholder="Remarks">

<button onclick="savePayment()">Save Payment</button>

</div>


<div class="card">

<h3>Payment History</h3>

<table>

<thead>

<tr>
<th>Date</th>
<th>Invoice</th>
<th>Client</th>
<th>Amount</th>
<th>Method</th>
<th>Remarks</th>
</tr>

</thead>

<tbody id="paymentTable"></tbody>

</table>

</div>

</div>


<script>

let invoices=[]
let payments=[]

init()

async function init(){

await loadInvoices()
await loadPayments()

}


/* LOAD INVOICES */

async function loadInvoices(){

const {data}=await supabaseClient
.from("client_invoices")
.select("*")
.in("payment_status",["Pending","Partially Paid"])

invoices=data || []

let html='<option value="">Select Invoice</option>'

invoices.forEach(i=>{

html+=`
<option value="${i.id}">
${i.invoice_no} | ${i.client_name} | Balance ₹${i.balance_amount}
</option>
`

})

document.getElementById("invoiceSelect").innerHTML=html

}


/* SAVE PAYMENT */

async function savePayment(){

let invoiceId=document.getElementById("invoiceSelect").value
let amount=Number(document.getElementById("amount").value)
let date=document.getElementById("paymentDate").value
let method=document.getElementById("method").value
let remarks=document.getElementById("remarks").value

if(!invoiceId || !amount){
alert("Enter invoice and amount")
return
}

let invoice=invoices.find(x=>x.id==invoiceId)

let newPaid=(invoice.amount_paid || 0) + amount
let balance=invoice.invoice_amount - newPaid

let status="Pending"

if(balance<=0){
status="Paid"
balance=0
}
else if(newPaid>0){
status="Partially Paid"
}


/* INSERT PAYMENT */

await supabaseClient
.from("client_payments")
.insert({

invoice_id:invoiceId,
invoice_no:invoice.invoice_no,
client_name:invoice.client_name,
amount:amount,
payment_date:date,
payment_method:method,
remarks:remarks

})


/* UPDATE INVOICE */

await supabaseClient
.from("client_invoices")
.update({

amount_paid:newPaid,
balance_amount:balance,
payment_status:status

})
.eq("id",invoiceId)

alert("Payment Recorded")

document.getElementById("amount").value=""
document.getElementById("remarks").value=""

loadInvoices()
loadPayments()

}


/* LOAD PAYMENTS */

async function loadPayments(){

const {data}=await supabaseClient
.from("client_payments")
.select("*")
.order("created_at",{ascending:false})

payments=data || []

let html=""

payments.forEach(p=>{

html+=`
<tr>

<td>${p.payment_date || ""}</td>

<td>${p.invoice_no}</td>

<td>${p.client_name}</td>

<td>₹${p.amount}</td>

<td>${p.payment_method}</td>

<td>${p.remarks || ""}</td>

</tr>
`

})

document.getElementById("paymentTable").innerHTML=html

}

</script>


<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>

</body>

</html>
