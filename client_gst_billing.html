<!DOCTYPE html>
<html>

<head>
<title>Client GST Billing - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0a0f1c;
color:#e5e7eb;
}

.main{
margin-left:220px;
padding:24px;
}

.card{
background:#111827;
padding:16px;
border-radius:12px;
margin-bottom:16px;
}

select,input{
padding:10px;
margin:5px;
border-radius:8px;
background:#0f172a;
color:white;
border:1px solid rgba(255,255,255,0.1);
}

button{
padding:8px 14px;
background:#3b82f6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="main">

<h2>Client GST Billing</h2>

<div class="card">

<select id="clientSelect" onchange="loadTripsByClient()"></select>

<div id="tripList"></div>

<br>

<!-- GST CONTROLS -->
<div style="margin-top:10px;">

<label>GST Type:</label>
<select id="gstType">
<option value="excluded">Excluded (GST extra)</option>
<option value="included">Included (GST inside)</option>
</select>

<label>GST On:</label>
<select id="gstOn">
<option value="margin">On Margin</option>
<option value="total">On Total</option>
</select>

<label>GST %:</label>
<input type="number" id="gstPercent" value="18" style="width:80px;">

</div>  
  
<button onclick="generateGSTInvoice()">Generate Invoice</button>

<div id="preview"></div>

<br>
<button onclick="saveGSTInvoice()">Save GST Invoice</button>
  
<button onclick="generatePDF()">Download GST Invoice PDF</button>

<button onclick="loadGSTReport()">GST Report</button>
</div>

<div class="card">

<h3>GST Invoices</h3>

<table style="width:100%; border-collapse: collapse;">
<thead>
<tr style="text-align:left; border-bottom:1px solid #333;">
<th>Invoice</th>
<th>Trips</th>
<th>Client</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>

<tbody id="gstInvoiceTable"></tbody>

</table>

</div>
  
</div>

<script>
const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

let trips=[]
let selectedTrips=[]

let totalExpenseAll = 0
let totalContract=0
let totalFreight=0
let totalMargin=0
let totalGST=0
let totalInvoice=0

init()

async function init(){
await loadClients()
await loadGSTInvoices()
}

async function loadClients(){

const {data}=await supabaseClient.from("clients").select("*")

let html='<option>Select Client</option>'

data.forEach(c=>{
html+=`<option value="${c.company}">${c.company}</option>`
})

clientSelect.innerHTML=html
}

async function loadTripsByClient(){

let client = document.getElementById("clientSelect").value

/* 1️⃣ GET TRIPS */
const {data} = await supabaseClient
.from("trips")
.select("*")
.eq("client_name", client)
.in("status", ["Completed","Paid"])

/* 2️⃣ REMOVE ALREADY INVOICED (GST + OLD BOTH) */

// OLD invoices
const {data:oldInv} = await supabaseClient
.from("client_invoices")
.select("id")
.eq("client_name", client)

let usedTrips = []

if(oldInv?.length){
const {data:bd} = await supabaseClient
.from("invoice_trip_breakdown")
.select("trip_no")
.in("invoice_id", oldInv.map(i=>i.id))

bd?.forEach(b=>usedTrips.push(b.trip_no))
}

// NEW GST invoices
const {data:newInv} = await supabaseClient
.from("client_invoices_gst")
.select("id")
.eq("client_name", client)

if(newInv?.length){
const {data:bd2} = await supabaseClient
.from("invoice_trip_breakdown_gst")
.select("trip_no")
.in("invoice_id", newInv.map(i=>i.id))

bd2?.forEach(b=>usedTrips.push(b.trip_no))
}

/* 3️⃣ FILTER UNUSED TRIPS */
trips = (data || [])
.filter(t => 
    !usedTrips.includes(t.trip_no) && 
    t.billing_status !== "Billed"
)

/* 4️⃣ SORT — LATEST FIRST */
.sort((a,b)=> b.trip_no.localeCompare(a.trip_no))

/* 5️⃣ RENDER */
document.getElementById("tripList").innerHTML = trips.map(t=>`
<div>
<input type="checkbox" value="${t.id}">
${t.trip_no} | ${t.route || ""}
</div>
`).join("")

}

async function generateGSTInvoice(){
  
let gstRate = Number(document.getElementById("gstPercent").value || 18) / 100
let gstType = document.getElementById("gstType").value
let gstOn = document.getElementById("gstOn").value
let checked = document.querySelectorAll("#tripList input:checked")

if(!checked || checked.length === 0){
    alert("Select at least one trip")
    return
}
  
totalContract = 0
totalFreight = 0
totalExpenseAll = 0
totalMargin = 0
totalGST = 0

selectedTrips = []

for(let c of checked){

let t = trips.find(x => x.id == c.value)
if(!t) continue

selectedTrips.push(t)

let mt = (t.weight_kg || 0) / 1000

let contract = mt * (t.company_rate || 0)
  
let freight = mt * (t.transporter_rate || 0)

/* EXPENSES (CLIENT PAID DIRECTLY) */
const {data:exp} = await supabaseClient
.from("expenses")
.select("amount")
.eq("trip_id", t.id)

let totalExpense = 0
exp?.forEach(e=>{
totalExpense += Number(e.amount || 0)
})

totalExpenseAll += totalExpense

/* 🔥 TRANSPORTER PAYABLE */
let transporterPayable = freight - totalExpense

/* 🔥 YOUR MARGIN (PURE) */
let margin = contract - freight

let gst = 0

if(gstOn === "margin"){

    if(gstType === "excluded"){
        gst = margin * gstRate
    }

    if(gstType === "included"){
        let base = margin / (1 + gstRate)
        gst = margin - base
        margin = base
    }

}

if(gstOn === "total"){

    let netBilling = contract - totalExpense

    if(gstType === "excluded"){
        gst = netBilling * gstRate
    }

    if(gstType === "included"){
        let base = netBilling / (1 + gstRate)
        gst = netBilling - base
    }

}


/* TOTALS */
totalContract += contract
totalFreight += transporterPayable
totalMargin += margin
totalGST += gst
}

let netBillingTotal = totalContract - totalExpenseAll

if(gstType === "excluded"){
    totalInvoice = netBillingTotal + totalGST
}else{
    totalInvoice = netBillingTotal   // ✅ GST already inside
}

document.getElementById("preview").innerHTML = `
Total Contract: ₹${totalContract.toFixed(2)} <br>
Less Expenses (Client Paid): ₹${totalExpenseAll.toFixed(2)} <br>
Net Billing: ₹${netBillingTotal.toFixed(2)} <br>

Transporter Payable: ₹${totalFreight.toFixed(2)} <br>

Your Margin: ₹${totalMargin.toFixed(2)} <br>
${gstType === "excluded" 
  ? `GST (${(gstRate*100).toFixed(0)}%): ₹${totalGST.toFixed(2)}`
  : `GST Included: ₹${totalGST.toFixed(2)}`
} <br>

<hr>
<b>Total Invoice: ₹${totalInvoice.toFixed(2)}</b>
${gstType === "included" ? "<br><i>(GST included in total)</i>" : ""}
`
}


async function saveGSTInvoice(){

if(selectedTrips.length === 0){
    alert("Generate invoice first")
    return
}

let client = document.getElementById("clientSelect").value
let gstType = document.getElementById("gstType").value
let gstOn = document.getElementById("gstOn").value
let gstPercent = Number(document.getElementById("gstPercent").value || 18)

/* 🔥 GENERATE INVOICE NUMBER */
let invoiceNo = "GST-" + Date.now()

/* 🔥 CALCULATE FINAL VALUES */
let netBillingTotal = totalContract - totalExpenseAll

let invoiceAmount = (gstType === "excluded")
    ? netBillingTotal + totalGST
    : netBillingTotal

/* 🔥 1️⃣ INSERT MAIN INVOICE */
const { data:inv, error:invError } = await supabaseClient
.from("client_invoices_gst")
.insert([{
    invoice_no: invoiceNo,
    client_name: client,
    total_contract_val: totalContract,
    total_freight: totalFreight,
    total_margin: totalMargin,
    gst_total: totalGST,
    invoice_amount: invoiceAmount,
    balance_amount: invoiceAmount,
    gst_type: gstType,
    gst_on: gstOn,
    total_expense: totalExpenseAll,
    net_billing: netBillingTotal,
    gst_percent: gstPercent
}])
.select()
.single()

if(invError){
    alert("Error saving invoice")
    console.log(invError)
    return
}

/* ✅ Ledger MUST be here */
await supabaseClient
.from("client_ledger")
.insert([{
    client_name: client,
    type: "Invoice",
    reference_no: invoiceNo,
    debit: invoiceAmount,
    credit: 0,
    balance: invoiceAmount,
    remarks: "GST Invoice Generated"
}])
  

/* 🔥 2️⃣ SAVE TRIP BREAKDOWN */

for(let t of selectedTrips){

let mt = (t.weight_kg || 0) / 1000

let contract = mt * (t.company_rate || 0)
let freight = mt * (t.transporter_rate || 0)

/* EXPENSE */
const {data:exp} = await supabaseClient
.from("expenses")
.select("amount")
.eq("trip_id", t.id)

let expense = 0
exp?.forEach(e=>{
    expense += Number(e.amount || 0)
})

let margin = contract - freight
let gst = 0

let gstRate = gstPercent / 100

if(gstOn === "margin"){

    if(gstType === "excluded"){
        gst = margin * gstRate
    }

    if(gstType === "included"){
        let base = margin / (1 + gstRate)
        gst = margin - base
        margin = base
    }
}



if(gstOn === "total"){

    let netBilling = contract - expense

    if(gstType === "excluded"){
        gst = netBilling * gstRate
    }

    if(gstType === "included"){
        let base = netBilling / (1 + gstRate)
        gst = netBilling - base
    }

}

/* INSERT BREAKDOWN */
const { error:bdError } = await supabaseClient
.from("invoice_trip_breakdown_gst")
.insert([{
    invoice_id: inv.id,
    trip_id: t.id,
    trip_no: t.trip_no,
    contract_rate: t.company_rate,
    transporter_rate: t.transporter_rate,
    contract_value: contract,
    freight_cost: freight,
    margin: margin,
    gst: gst
}])

if(bdError){
    console.log("Breakdown error:", bdError)
}

/* LOCK TRIP */
const { error:lockError } = await supabaseClient
.from("trips")
.update({ billing_status: "Billed" })
.eq("id", t.id)

if(lockError){
    console.log("Trip lock error:", lockError)
}
  
}

alert("GST Invoice Saved ✅")

/* OPTIONAL: REFRESH */
loadTripsByClient()
selectedTrips = []
document.getElementById("preview").innerHTML = ""
loadGSTInvoices()
}


function generatePDF(){

let cgst = totalGST / 2
let sgst = totalGST / 2

let content = `
<h2>VARADA NEXUS PRIVATE LIMITED</h2>

<p><b>Client:</b> ${document.getElementById("clientSelect").value}</p>

<p><b>Total Contract:</b> ₹${totalContract.toFixed(2)}</p>
<p><b>Expenses:</b> ₹${totalExpenseAll.toFixed(2)}</p>
<p><b>Net Billing:</b> ₹${(totalContract - totalExpenseAll).toFixed(2)}</p>
<p><b>GST Type:</b> ${document.getElementById("gstType").value}</p>
<p><b>GST On:</b> ${document.getElementById("gstOn").value}</p>
${document.getElementById("gstType").value === "excluded" 
? `<p><b>CGST:</b> ₹${cgst.toFixed(2)}</p>
   <p><b>SGST:</b> ₹${sgst.toFixed(2)}</p>`
: `<p><b>Included GST:</b> CGST ₹${cgst.toFixed(2)} | SGST ₹${sgst.toFixed(2)}</p>`
}

<h3>Total Invoice: ₹${totalInvoice.toFixed(2)}</h3>
`

let win = window.open("", "", "width=800,height=600")
win.document.write(content)
win.document.close()
win.print()
}

async function loadGSTInvoices(){

const { data, error } = await supabaseClient
.from("client_invoices_gst")
.select("*")
.order("created_at", { ascending: false })

if(error){
console.log(error)
return
}

let rows = ""

for(let inv of data){

const { data:trips } = await supabaseClient
.from("invoice_trip_breakdown_gst")
.select("trip_no")
.eq("invoice_id", inv.id)

let tripList = trips?.map(t => t.trip_no).join(", ") || "-"

rows += `
<tr style="border-bottom:1px solid #222;">
<td>${inv.invoice_no}</td>
<td>${tripList}</td>
<td>${inv.client_name}</td>
<td>₹${Number(inv.invoice_amount).toFixed(2)}</td>
<td>${inv.balance_amount == 0 ? "Paid" : "Pending"}</td>
</tr>
`
}

document.getElementById("gstInvoiceTable").innerHTML = rows
}
  
</script>

</body>
</html>
