const authId = session.user.id

.from("users")
.select("id")
.eq("auth_id",authId)
.single()

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")

async function editCreditNote(id){

const { data:c } = await supabaseClient
.from("gst_credit_notes")
.select("*")
.eq("id", id)
.single()

if(!c){
alert("Credit note not found")
return
}

let newAmount = Number(prompt("Edit Amount", c.amount))
let newReason = prompt("Edit Reason", c.reason || "")

if(!newAmount || newAmount <= 0){
alert("Invalid amount")
return
}

/* 🔥 GET INVOICE */
const { data:inv } = await supabaseClient
.from("client_invoices_gst")
.select("*")
.eq("id", c.invoice_id)
.single()

let diff = newAmount - c.amount

/* 🔥 UPDATE CREDIT NOTE */
await supabaseClient
.from("gst_credit_notes")
.update({
amount: newAmount,
reason: newReason
})
.eq("id", id)

/* 🔥 FIX INVOICE BALANCE */
let newBalance = Number(inv.balance_amount) - diff

if(newBalance < 0) newBalance = 0

await supabaseClient
.from("client_invoices_gst")
.update({
balance_amount: newBalance
})
.eq("id", c.invoice_id)

/* 🔥 UPDATE COMPANY LEDGER (simple replace) */
// 🔥 DELETE OLD ENTRY (SAFE)
await supabaseClient
.from("company_ledger")
.delete()
.eq("reference_no", c.credit_note_no)
.eq("entry_type", "Credit Note")
.eq("credit", c.amount)

// 🔥 GET LAST BALANCE AGAIN
const { data:lastEntryArr } = await supabaseClient
.from("company_ledger")
.select("balance")
.order("created_at", { ascending:false })
.limit(1)

let lastBalance = lastEntryArr?.[0]?.balance || 0

// 🔥 NEW BALANCE (credit note reduces balance)
let newLedgerBalance = lastBalance - newAmount

// 🔥 INSERT UPDATED ENTRY
await supabaseClient
.from("company_ledger")
.insert([{
entry_type: "Credit Note",
reference_no: c.credit_note_no,
party: c.client_name,
debit: 0,
credit: newAmount,
balance: newLedgerBalance,
remarks: "Credit Note Edited"
}])

await supabaseClient
.from("company_ledger")
.insert([{
entry_type: "Credit Note",
reference_no: c.credit_note_no,
party: c.client_name,
debit: 0,
credit: newAmount,
remarks: "Credit Note Edited"
}])

alert("Credit Note Updated ✅")

loadCreditNotes()
loadGSTInvoices()
}

async function deleteCreditNote(id){

if(!confirm("Delete this credit note?")) return

const { data:c } = await supabaseClient
.from("gst_credit_notes")
.select("*")
.eq("id", id)
.single()

if(!c){
alert("Not found")
return
}

/* 🔥 RESTORE INVOICE BALANCE */
const { data:inv } = await supabaseClient
.from("client_invoices_gst")
.select("*")
.eq("id", c.invoice_id)
.single()

let newBalance = Number(inv.balance_amount) + Number(c.amount)

await supabaseClient
.from("client_invoices_gst")
.update({
balance_amount: newBalance
})
.eq("id", c.invoice_id)

/* 🔥 DELETE CREDIT NOTE */
await supabaseClient
.from("gst_credit_notes")
.delete()
.eq("id", id)

/* 🔥 DELETE LEDGER */
await supabaseClient
.from("company_ledger")
.delete()
.eq("reference_no", c.credit_note_no)

/* 🔥 CLIENT LEDGER */
await supabaseClient
.from("client_ledger")
.delete()
.eq("reference_no", c.credit_note_no)

alert("Credit Note Deleted ✅")

loadCreditNotes()
loadGSTInvoices()
}

async function loadTripsByClient(){

let client = document.getElementById("clientSelect").value

if(!client){
    document.getElementById("tripList").innerHTML = ""
    return
}

/* 1️⃣ GET TRIPS */
const {data} = await supabaseClient
.from("trips")
.select("*")
.eq("client_name", client)
.in("status", ["Completed","Paid"])

/* 2️⃣ REMOVE ALREADY INVOICED (GST + OLD BOTH) */

// OLD invoices
const {data:oldInv} = await supabaseClient
.from("client_invoices")
.select("id")
.eq("client_name", client)

let usedTrips = []

if(oldInv?.length){
const {data:bd} = await supabaseClient
.from("invoice_trip_breakdown")
.select("trip_no")
.in("invoice_id", oldInv.map(i=>i.id))

bd?.forEach(b=>usedTrips.push(b.trip_no))
}

// NEW GST invoices
const {data:newInv} = await supabaseClient
.from("client_invoices_gst")
.select("id")
.eq("client_name", client)

if(newInv?.length){
const {data:bd2} = await supabaseClient
.from("invoice_trip_breakdown_gst")
.select("trip_no")
.in("invoice_id", newInv.map(i=>i.id))

bd2?.forEach(b=>usedTrips.push(b.trip_no))
}

/* 3️⃣ FILTER UNUSED TRIPS */
trips = (data || [])
.filter(t => 
    !usedTrips.includes(t.trip_no)
)

/* 4️⃣ SORT — LATEST FIRST */
.sort((a,b)=> b.trip_no.localeCompare(a.trip_no))

/* 5️⃣ RENDER */
document.getElementById("tripList").innerHTML = trips.map(t=>`
<div>
<input type="checkbox" value="${t.id}">
${t.trip_no} | ${t.route || ""}
</div>
`).join("")

}

async function generateGSTInvoice(){
  
let gstRate = Number(document.getElementById("gstPercent").value || 18) / 100
let gstType = document.getElementById("gstType").value
let gstOn = document.getElementById("gstOn").value
let checked = document.querySelectorAll("#tripList input:checked")

if(!checked || checked.length === 0){
    alert("Select at least one trip")
    return
}
  
totalContract = 0
totalFreight = 0
totalExpenseAll = 0
totalMargin = 0
totalGST = 0

selectedTrips = []

for(let c of checked){

let t = trips.find(x => x.id == c.value)
if(!t) continue

selectedTrips.push(t)

let mt = (t.weight_kg || 0) / 1000

let contract = mt * (t.company_rate || 0)
  
let freight = mt * (t.transporter_rate || 0)

/* EXPENSES (CLIENT PAID DIRECTLY) */
const {data:exp} = await supabaseClient
.from("expenses")
.select("amount")
.eq("trip_id", t.id)

let totalExpense = 0
exp?.forEach(e=>{
totalExpense += Number(e.amount || 0)
})

totalExpenseAll += totalExpense

/* 🔥 TRANSPORTER PAYABLE */
let transporterPayable = freight - totalExpense

/* 🔥 YOUR MARGIN (PURE) */
let margin = contract - freight

let gst = 0

if(gstOn === "margin"){

    if(gstType === "excluded"){
        gst = margin * gstRate
    }

    if(gstType === "included"){
        let base = margin / (1 + gstRate)
        gst = margin - base
        margin = base
    }

}

if(gstOn === "total"){

    let netBilling = contract - totalExpense

    if(gstType === "excluded"){
        gst = netBilling * gstRate
    }

    if(gstType === "included"){
        let base = netBilling / (1 + gstRate)
        gst = netBilling - base
    }

}


/* TOTALS */
totalContract += contract
totalFreight += transporterPayable
totalMargin += margin
totalGST += gst
}

let netBillingTotal = totalContract - totalExpenseAll

if(gstType === "excluded"){
    totalInvoice = netBillingTotal + totalGST
}else{
    totalInvoice = netBillingTotal   // ✅ GST already inside
}

document.getElementById("preview").innerHTML = `
Total Contract: ₹${totalContract.toFixed(2)} <br>
Less Expenses (Client Paid): ₹${totalExpenseAll.toFixed(2)} <br>
Net Billing: ₹${netBillingTotal.toFixed(2)} <br>

Transporter Payable: ₹${totalFreight.toFixed(2)} <br>

Service Charges: ₹${totalMargin.toFixed(2)} <br>
${gstType === "excluded" 
  ? `GST (${(gstRate*100).toFixed(0)}%): ₹${totalGST.toFixed(2)}`
  : `GST Included: ₹${totalGST.toFixed(2)}`
} <br>

<hr>
<b>Total Invoice: ₹${totalInvoice.toFixed(2)}</b>
${gstType === "included" ? "<br><i>(GST included in total)</i>" : ""}
`
}

async function generateGSTInvoiceNo(){

let today = new Date()

let year = today.getFullYear()
let month = today.getMonth() + 1   // Jan = 1

/* 🔥 FINANCIAL YEAR LOGIC */
let startYear, endYear

if(month >= 4){
    // April → December
    startYear = year
    endYear = year + 1
}else{
    // Jan → March
    startYear = year - 1
    endYear = year
}

/* LAST 2 DIGITS */
let fy = String(startYear).slice(-2) + "-" + String(endYear).slice(-2)

/* PREFIX */
let prefix = `INVGB/${fy}/`

/* 🔥 GET EXISTING INVOICES FOR SAME FY */
const { data } = await supabaseClient
.from("client_invoices_gst")
.select("invoice_no")
.ilike("invoice_no", prefix + "%")

let max = 0

data?.forEach(i=>{
    let num = parseInt(i.invoice_no.split("/").pop()) || 0
    if(num > max) max = num
})

let next = max + 1

/* SERIAL FORMAT (001, 002...) */
let seq = String(next).padStart(3,'0')

return prefix + seq
}
  
async function saveGSTInvoice(){

document.getElementById("saveBtn").disabled = true
  
if(selectedTrips.length === 0){
    alert("Generate invoice first")
    document.getElementById("saveBtn").disabled = false
    return
}

alert("Processing invoice...")

let client = document.getElementById("clientSelect").value

const { data:clientData, error:clientErr } = await supabaseClient
.from("clients")
.select("gst_no")
.eq("company", client)
.maybeSingle()

if(clientErr){
    console.log("Client fetch error:", clientErr)
}

let clientGST = clientData?.gst_no || ""
  
let gstType = document.getElementById("gstType").value
let gstOn = document.getElementById("gstOn").value
let gstPercent = Number(document.getElementById("gstPercent").value || 18)

/* 🔥 GENERATE INVOICE NUMBER */
let invoiceNo = await generateGSTInvoiceNo()
console.log("GST INVOICE:", invoiceNo)

/* 🔥 CALCULATE FINAL VALUES */
let netBillingTotal = totalContract - totalExpenseAll

let serviceCharges = totalMargin

let invoiceAmount = netBillingTotal + totalGST

/* 🔥 1️⃣ INSERT MAIN INVOICE */
const { data:inv, error:invError } = await supabaseClient
.from("client_invoices_gst")
.insert([{
    invoice_no: invoiceNo,
    client_name: client,
    gst_no: clientGST,
    total_contract_val: totalContract,
    total_freight: totalFreight,
    total_margin: totalMargin,
    gst_total: totalGST,
    invoice_amount: invoiceAmount,
    balance_amount: invoiceAmount,
    gst_type: gstType,
    gst_on: gstOn,
    total_expense: totalExpenseAll,
    net_billing: netBillingTotal,
    gst_percent: gstPercent
}])
.select()
.single()

if(invError || !inv){
    console.log("❌ Invoice Save Error:", invError)
    alert("Invoice failed. Check console.")
    document.getElementById("saveBtn").disabled = false
    return
}

/* ✅ Ledger MUST be here */
await supabaseClient
.from("client_ledger")
.insert([{
    client_name: client,
    type: "Invoice",
    reference_no: invoiceNo,
    debit: invoiceAmount,
    credit: 0,
    balance: invoiceAmount,
    remarks: "GST Invoice Generated"
}])


/* 🔥 2️⃣ SAVE TRIP BREAKDOWN */

for(let t of selectedTrips){

let mt = (t.weight_kg || 0) / 1000

let contract = mt * (t.company_rate || 0)
let freight = mt * (t.transporter_rate || 0)

/* EXPENSE */
const {data:exp} = await supabaseClient
.from("expenses")
.select("amount")
.eq("trip_id", t.id)

let expense = 0
exp?.forEach(e=>{
    expense += Number(e.amount || 0)
})

let margin = contract - freight
let gst = 0

let gstRate = gstPercent / 100

if(gstOn === "margin"){

    if(gstType === "excluded"){
        gst = margin * gstRate
    }

    if(gstType === "included"){
        let base = margin / (1 + gstRate)
        gst = margin - base
        margin = base
    }
}



if(gstOn === "total"){

    let netBilling = contract - expense

    if(gstType === "excluded"){
        gst = netBilling * gstRate
    }

    if(gstType === "included"){
        let base = netBilling / (1 + gstRate)
        gst = netBilling - base
    }

}

/* INSERT BREAKDOWN */
const { error:bdError } = await supabaseClient
.from("invoice_trip_breakdown_gst")
.insert([{
    invoice_id: inv.id,
    trip_id: t.id,
    trip_no: t.trip_no,
    truck_no: t.truck || "",   // ✅ ADD THIS
    contract_rate: t.company_rate,
    transporter_rate: t.transporter_rate,
    contract_value: contract,
    freight_cost: freight,
    margin: margin,
    gst: gst
}])

if(bdError){
    console.log("Breakdown error:", bdError)
}

/* LOCK TRIP */
const { error:lockError } = await supabaseClient
.from("trips")
.update({ billing_status: "Billed" })
.eq("id", t.id)

if(lockError){
    console.log("Trip lock error:", lockError)
}
  
}

alert("GST Invoice Saved ✅")
document.getElementById("clientSelect").value = ""

/* OPTIONAL: REFRESH */
loadTripsByClient()
selectedTrips = []
document.getElementById("preview").innerHTML = ""

document.getElementById("saveBtn").disabled = false
  
loadGSTInvoices()
}


async function generatePDF(invoiceId){

const { jsPDF } = window.jspdf

/* 1️⃣ GET INVOICE */
const { data:inv } = await supabaseClient
.from("client_invoices_gst")
.select("*")
.eq("id", invoiceId)
.single()

if(!inv){
alert("Invoice not found")
return
}

/* 🔥 GET CREDIT NOTES */
const { data:creditNotes } = await supabaseClient
.from("gst_credit_notes")
.select("*")
.eq("invoice_id", invoiceId)

let totalCredit = 0
creditNotes?.forEach(c=>{
    totalCredit += Number(c.amount || 0)
})
  
/* 2️⃣ GET TRIPS */
const { data:bd } = await supabaseClient
.from("invoice_trip_breakdown_gst")
.select("*")
.eq("invoice_id", invoiceId)

/* 3️⃣ BUILD TABLE */
let rows = []

bd.forEach(t=>{
rows.push([
t.trip_no,
t.truck_no || "-",   // ✅ NEW COLUMN
Number(t.contract_value || 0).toFixed(2),
Number(t.freight_cost || 0).toFixed(2),
Number(t.margin || 0).toFixed(2),
Number(t.gst || 0).toFixed(2)
])
})

/* 4️⃣ PDF START */
let doc = new jsPDF()

/* 🔷 WATERMARK */
doc.setGState(new doc.GState({opacity:0.05}))
try{
doc.addImage("images/logo.png","PNG",40,80,120,120)
}catch(e){}
doc.setGState(new doc.GState({opacity:1}))

/* 🔷 LOGO */
try{

async function generateCreditNoteNo(){

let prefix = "CN/"

const { data } = await supabaseClient
.from("gst_credit_notes")
.select("credit_note_no")
.ilike("credit_note_no", prefix + "%")

let max = 0

data?.forEach(i=>{
    let num = parseInt(i.credit_note_no.replace(prefix,"")) || 0
    if(num > max) max = num
})

return prefix + String(max + 1).padStart(3,'0')
}

async function createCreditNote(){

let invoiceId = document.getElementById("creditInvoiceSelect").value
let amount = Number(document.getElementById("creditAmount").value || 0)
let reason = document.getElementById("creditReason").value

if(!invoiceId || !amount){
    alert("Fill all details")
    return
}

/* 🔥 GET INVOICE */
const { data:inv } = await supabaseClient
.from("client_invoices_gst")
.select("*")
.eq("id", invoiceId)
.single()

if(!inv){
    alert("Invoice not found")
    return
}

if(amount > inv.balance_amount){
    alert("Credit exceeds balance")
    return
}

/* 🔥 GENERATE CN NO */
let cnNo = await generateCreditNoteNo()

/* 🔥 SAVE CREDIT NOTE */
await supabaseClient
.from("gst_credit_notes")
.insert([{
    invoice_id: inv.id,
    invoice_no: inv.invoice_no,
    credit_note_no: cnNo,
    client_name: inv.client_name,
    amount: amount,
    reason: reason
}])

/* 🔥 UPDATE INVOICE */
let newBalance = Number(inv.balance_amount) - amount

await supabaseClient
.from("client_invoices_gst")
.update({
    balance_amount: newBalance
})
.eq("id", invoiceId)

/* 🔥 COMPANY LEDGER (REVERSAL) */
// GET LAST BALANCE
const { data:lastEntryArr } = await supabaseClient
.from("company_ledger")
.select("balance")
.order("created_at", { ascending:false })
.limit(1)

let lastBalance = lastEntryArr?.[0]?.balance || 0

let newLedgerBalance = lastBalance - amount

await supabaseClient
.from("company_ledger")
.insert([{
    entry_type: "Credit Note",
    reference_no: cnNo,
    party: inv.client_name,
    debit: 0,
    credit: amount,
    balance: newLedgerBalance,
    remarks: "GST Credit Note Issued"
}])

/* 🔥 CLIENT LEDGER */
await supabaseClient
.from("client_ledger")
.insert([{
client_name: inv.client_name,
type: "Credit Note",
reference_no: cnNo,
debit: 0,
credit: amount,
balance: 0,
remarks: reason || "Credit Note"
}])

alert("Credit Note Issued ✅")

/* RESET */
document.getElementById("creditAmount").value=""
document.getElementById("creditReason").value=""
document.getElementById("creditInvoiceSelect").value=""

loadGSTInvoices()
}
  
async function deleteGSTInvoice(id){

if(!confirm("Delete this invoice?")) return

alert("Deleting...")

/* unlock trips first */
const { data:trips } = await supabaseClient
.from("invoice_trip_breakdown_gst")
.select("trip_id")
.eq("invoice_id", id)

for(let t of (trips || [])){
await supabaseClient
.from("trips")
.update({ billing_status: null })
.eq("id", t.trip_id)
}

/* delete breakdown */
await supabaseClient
.from("invoice_trip_breakdown_gst")
.delete()
.eq("invoice_id", id)

/* 🔥 GET INVOICE DETAILS FOR LEDGER DELETE */
const { data:invData } = await supabaseClient
.from("client_invoices_gst")
.select("invoice_no, client_name")
.eq("id", id)
.single()

if(invData){

/* 🔥 DELETE COMPANY LEDGER */
await supabaseClient
.from("company_ledger")
.delete()
.eq("reference_no", invData.invoice_no)
.eq("party", invData.client_name)

/* 🔥 DELETE CLIENT LEDGER */
await supabaseClient
.from("client_ledger")
.delete()
.eq("reference_no", invData.invoice_no)
.eq("client_name", invData.client_name)

/* 🔥 DELETE GST PAYMENT HISTORY (VERY IMPORTANT) */
await supabaseClient
.from("gst_payments")
.delete()
.eq("invoice_id", id)
  
}
  
/* delete invoice */
await supabaseClient
.from("client_invoices_gst")
.delete()
.eq("id", id)

alert("Deleted")

loadGSTInvoices()
}

async function addGSTPayment(invoiceId, amount){

alert("Processing payment...")
  
/* get invoice */
const { data:inv } = await supabaseClient
.from("client_invoices_gst")
.select("*")
.eq("id", invoiceId)
.single()

if(!inv){
alert("Invoice not found")
return
}
  
let balance = Number(inv.balance_amount || 0).toFixed(2)
balance = Number(balance)

amount = Number(amount.toFixed(2))

if(amount > balance){
    alert("Amount exceeds balance")
    return
}

let newInvoiceBalance = balance - amount
newInvoiceBalance = Number(newInvoiceBalance.toFixed(2))

if(newInvoiceBalance < 0.01) newInvoiceBalance = 0

/* update invoice */
await supabaseClient
.from("client_invoices_gst")
.update({
balance_amount: newInvoiceBalance
})
.eq("id", invoiceId)

/* 🔥 COMPANY LEDGER ENTRY (GST PAYMENT RECEIVED) */
// 🔥 GET LAST BALANCE
const { data:lastEntry } = await supabaseClient
.from("company_ledger")
.select("balance")
.order("created_at", { ascending:false })
.limit(1)
.single()

let lastBalance = lastEntry?.balance || 0

let newBalance = lastBalance + amount

const { error:ledgerError } = await supabaseClient
.from("company_ledger")
.insert([{
    entry_type: "GST Payment",
    reference_no: inv.invoice_no,
    party: inv.client_name,
    debit: 0,
    credit: amount,
    balance: newBalance,
    payment_method: "Manual",
    transaction_id: "N/A",
    payment_date: new Date().toISOString(),
    remarks: "GST Payment Received"
}])

if(ledgerError){
    console.log("❌ LEDGER ERROR:", ledgerError)
    alert("Ledger insert failed")
}
  
/* ledger entry */
await supabaseClient
.from("client_ledger")
.insert([{
client_name: inv.client_name,
type: "Payment",
reference_no: inv.invoice_no,
debit: 0,
credit: amount,
balance: 0, // temporary (ledger calc later)
remarks: "GST Payment Received"
}])

  
alert("Payment added")

loadGSTInvoices()
}

async function saveGSTPayment(){

let invoiceId = document.getElementById("gstInvoiceSelect").value
let amount = Number(document.getElementById("gstPaidAmount").value || 0)
let method = document.getElementById("gstPaymentMethod").value
let txnId = document.getElementById("gstTxnId").value
let date = document.getElementById("gstPaymentDate").value

if(!invoiceId || !amount || !method){
alert("Fill all details")
return
}

/* 🔥 GET INVOICE */
const { data:inv } = await supabaseClient
.from("client_invoices_gst")
.select("*")
.eq("id", invoiceId)
.single()

if(!inv){
alert("Invoice not found")
return
}

let balance = Number(inv.balance_amount || 0).toFixed(2)
balance = Number(balance)

amount = Number(amount.toFixed(2))

if(amount > balance){
    alert("Amount exceeds balance")
    return
}

/* 🔥 UPDATE BALANCE + STATUS */
let newInvoiceBalance = balance - amount
newInvoiceBalance = Number(newInvoiceBalance.toFixed(2))

let status = "Pending"

if(newInvoiceBalance < 0.01){
    newInvoiceBalance = 0
    status = "Paid"
}

await supabaseClient
.from("client_invoices_gst")
.update({
    balance_amount: newInvoiceBalance,
    payment_status: status
})
.eq("id", invoiceId)

// 🔥 GET LAST BALANCE
const { data:lastEntryArr } = await supabaseClient
.from("company_ledger")
.select("balance")
.order("created_at", { ascending:false })
.limit(1)

let lastBalance = lastEntryArr?.[0]?.balance || 0

// 🔥 CALCULATE NEW BALANCE (PAYMENT = MONEY IN)
let newBalance = lastBalance + amount

/* 🔥 SAVE PAYMENT HISTORY */
await supabaseClient
.from("gst_payments")
.insert([{
    invoice_id: inv.id,
    invoice_no: inv.invoice_no,
    client_name: inv.client_name,
    amount: amount,
    payment_method: method,
    transaction_id: txnId,
    payment_date: date ? new Date(date).toISOString() : new Date().toISOString()
}])
  
/* 🔥 COMPANY LEDGER ENTRY */
const { error:ledgerError } = await supabaseClient
.from("company_ledger")
.insert([{
    entry_type: "GST Payment",
    reference_no: inv.invoice_no,
    party: inv.client_name,
    debit: 0,
    credit: amount,
    balance: newBalance,
    payment_method: method || "N/A",
    transaction_id: txnId || "N/A",        
    payment_date: date ? new Date(date).toISOString() : new Date().toISOString(),
    remarks: "GST Payment Received"
}])

if(ledgerError){
    console.log("❌ LEDGER ERROR:", ledgerError)
    alert("Ledger insert failed")
}

/* 🔥 CLIENT LEDGER */
await supabaseClient
.from("client_ledger")
.insert([{
client_name: inv.client_name,
type: "Payment",
reference_no: inv.invoice_no,
debit: 0,
credit: amount,
balance: 0,
remarks: "GST Payment Received"
}])

alert("Payment Recorded ✅")

/* RESET */
document.getElementById("gstPaidAmount").value=""
document.getElementById("gstPaymentMethod").value=""
document.getElementById("gstTxnId").value=""
document.getElementById("gstPaymentDate").value=""

loadGSTInvoices()
loadPaymentHistory()
document.getElementById("gstInvoiceSelect").value = ""
}

async function editGSTPayment(id){

const { data:p } = await supabaseClient
.from("gst_payments")
.select("*")
.eq("id", id)
.single()

if(!p){
alert("Payment not found")
return
}

/* INPUT NEW VALUES */
let newAmount = Number(prompt("Edit Amount", p.amount))
let newMethod = prompt("Edit Method", p.payment_method)
let newTxn = prompt("Edit Transaction ID", p.transaction_id || "")

if(!newAmount || newAmount <= 0){
alert("Invalid amount")
return
}

/* 🔥 DIFFERENCE CALCULATION */
let diff = newAmount - p.amount

/* 🔥 UPDATE PAYMENT TABLE */
await supabaseClient
.from("gst_payments")
.update({
amount: newAmount,
payment_method: newMethod,
transaction_id: newTxn
})
.eq("id", id)

/* 🔥 UPDATE INVOICE BALANCE */
const { data:inv } = await supabaseClient
.from("client_invoices_gst")
.select("*")
.eq("id", p.invoice_id)
.single()

let newBalance = Number(inv.balance_amount) - diff

if(newBalance < 0) newBalance = 0

await supabaseClient
.from("client_invoices_gst")
.update({
balance_amount: newBalance,
payment_status: newBalance === 0 ? "Paid" : "Pending"
})
.eq("id", p.invoice_id)

/* 🔥 LEDGER UPDATE (OPTIONAL SIMPLE WAY) */
/* easiest: delete old + reinsert new */

await supabaseClient
.from("company_ledger")
.delete()
.eq("reference_no", p.invoice_no)
.eq("entry_type", "GST Payment")
.eq("credit", p.amount)

// GET LAST BALANCE AGAIN
const { data:lastEntryArr } = await supabaseClient
.from("company_ledger")
.select("balance")
.order("created_at", { ascending:false })
.limit(1)

let lastBalance = lastEntryArr?.[0]?.balance || 0

let updatedBalance = lastBalance + newAmount

await supabaseClient
.from("company_ledger")
.insert([{
entry_type: "GST Payment",
reference_no: p.invoice_no,
party: p.client_name,
debit: 0,
credit: newAmount,
balance: updatedBalance,
remarks: "GST Payment Edited"
}])

alert("Payment Updated ✅")

loadGSTInvoices()
loadPaymentHistory()
}

}
