<!DOCTYPE html>
<html>

<head>
<title>Client GST Billing - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0a0f1c;
color:#e5e7eb;
}

.main{
margin-left:220px;
padding:24px;
}

.card{
background:#111827;
padding:16px;
border-radius:12px;
margin-bottom:16px;
}

select,input{
padding:10px;
margin:5px;
border-radius:8px;
background:#0f172a;
color:white;
border:1px solid rgba(255,255,255,0.1);
}

button{
padding:8px 14px;
background:#3b82f6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="main">

<h2>Client GST Billing</h2>

<div class="card">

<select id="clientSelect" onchange="loadTripsByClient()"></select>

<div id="tripList"></div>

<br>

<!-- GST CONTROLS -->
<div style="margin-top:10px;">

<label>GST Type:</label>
<select id="gstType">
<option value="excluded">Excluded (GST extra)</option>
<option value="included">Included (GST inside)</option>
</select>

<label>GST On:</label>
<select id="gstOn">
<option value="margin">On Margin</option>
<option value="total">On Total</option>
</select>

</div>  
  
<button onclick="generateGSTInvoice()">Generate Invoice</button>

<div id="preview"></div>

<br>
<button onclick="saveGSTInvoice()">Save GST Invoice</button>

</div>

</div>

<script>
const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

let trips=[]
let selectedTrips=[]

let totalContract=0
let totalFreight=0
let totalMargin=0
let totalGST=0
let totalInvoice=0

init()

async function init(){
await loadClients()
}

async function loadClients(){

const {data}=await supabaseClient.from("clients").select("*")

let html='<option>Select Client</option>'

data.forEach(c=>{
html+=`<option value="${c.company}">${c.company}</option>`
})

clientSelect.innerHTML=html
}

async function loadTripsByClient(){

let client = document.getElementById("clientSelect").value

/* 1️⃣ GET TRIPS */
const {data} = await supabaseClient
.from("trips")
.select("*")
.eq("client_name", client)
.eq("status", "Completed")

/* 2️⃣ REMOVE ALREADY INVOICED (GST + OLD BOTH) */

// OLD invoices
const {data:oldInv} = await supabaseClient
.from("client_invoices")
.select("id")
.eq("client_name", client)

let usedTrips = []

if(oldInv?.length){
const {data:bd} = await supabaseClient
.from("invoice_trip_breakdown")
.select("trip_no")
.in("invoice_id", oldInv.map(i=>i.id))

bd?.forEach(b=>usedTrips.push(b.trip_no))
}

// NEW GST invoices
const {data:newInv} = await supabaseClient
.from("client_invoices_gst")
.select("id")
.eq("client_name", client)

if(newInv?.length){
const {data:bd2} = await supabaseClient
.from("invoice_trip_breakdown_gst")
.select("trip_no")
.in("invoice_id", newInv.map(i=>i.id))

bd2?.forEach(b=>usedTrips.push(b.trip_no))
}

/* 3️⃣ FILTER UNUSED TRIPS */
trips = (data || [])

/* 4️⃣ SORT — LATEST FIRST */
.sort((a,b)=> b.trip_no.localeCompare(a.trip_no))

/* 5️⃣ RENDER */
document.getElementById("tripList").innerHTML = trips.map(t=>`
<div>
<input type="checkbox" value="${t.id}">
${t.trip_no} | ${t.route || ""}
</div>
`).join("")

}

async function generateGSTInvoice(){


let gstType = document.getElementById("gstType").value
let gstOn = document.getElementById("gstOn").value
let checked = document.querySelectorAll("#tripList input:checked")

totalContract = 0
totalFreight = 0
totalMargin = 0
totalGST = 0

selectedTrips = []

for(let c of checked){

let t = trips.find(x => x.id == c.value)
if(!t) continue

selectedTrips.push(t)

let mt = (t.weight_kg || 0) / 1000

let contract = mt * (t.company_rate || 0)
let freight = mt * (t.transporter_rate || 0)

/* 🔥 EXPENSE FETCH (CRITICAL FIX) */
const {data:exp} = await supabaseClient
.from("expenses")
.select("amount")
.eq("trip_id", t.id)

let totalExpense = 0
exp?.forEach(e=>{
totalExpense += Number(e.amount || 0)
})


/* 🔥 CORRECT FREIGHT AFTER EXPENSE */
let netFreight = freight - totalExpense

let margin = contract - netFreight

let gst = 0

/* 🔥 GST CALCULATION ENGINE */

if(gstOn === "margin"){

    if(gstType === "excluded"){
        gst = margin * 0.18
    }

    if(gstType === "included"){
        let base = margin / 1.18
        gst = margin - base
        margin = base
    }

}

if(gstOn === "total"){

    if(gstType === "excluded"){
        gst = contract * 0.18
    }

    if(gstType === "included"){
        let base = contract / 1.18
        gst = contract - base
    }

}

/* TOTALS */
totalContract += contract
totalFreight += netFreight
totalMargin += margin
totalGST += gst
}

if(gstOn === "margin"){
    totalInvoice = totalMargin + totalGST
}else{
    totalInvoice = totalContract + totalGST
}

document.getElementById("preview").innerHTML = `
Contract Value: ₹${totalContract.toFixed(2)} <br>
Freight: ₹${totalFreight.toFixed(2)} <br>
Service Charges (Margin): ₹${totalMargin.toFixed(2)} <br>
GST (18%): ₹${totalGST.toFixed(2)} <br>
<hr>
<b>Total Invoice: ₹${totalInvoice.toFixed(2)}</b>
`
}

  
</script>

</body>
</html>
