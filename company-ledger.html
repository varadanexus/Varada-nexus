<!DOCTYPE html>
<html>

<head>
<title>Company Ledger - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>
<script src="menu-rbac.js"></script>
  
<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0a0f1c;
color:#e5e7eb;
}

.main{
margin-left:220px;
padding:24px;
max-width: calc(100vw - 220px);
overflow-x: auto;
}
  

table{
width:100%;
border-collapse:collapse;
min-width:900px;   /* ✅ prevents crush */
}
  
.card{
background:#111827;
padding:16px;
border-radius:12px;
margin-bottom:16px;
}

input,select{
padding:8px;
margin:5px;
border-radius:8px;
background:#0f172a;
color:white;
border:1px solid rgba(255,255,255,0.1);
}

button{
padding:8px 14px;
background:#3b82f6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.card b {
color: #93c5fd;
}
  
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

th{
color:#9ca3af;
text-align:left;
}

</style>
</head>

<body>

<div id="sidebar-container"></div>

<script>

/* ✅ SAME STRUCTURE AS DASHBOARD */

fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{

document.getElementById("sidebar-container").innerHTML = data

const sidebar = document.getElementById("sidebar")
if(sidebar){
    sidebar.style.display = "none"
}

setTimeout(async ()=>{

    /* ✅ RBAC FIRST */
    if(typeof applyMenuRBAC === "function"){
        await applyMenuRBAC()
    }

    /* ✅ USER INIT */
    await initSidebar()

    /* ✅ ACTIVE MENU */
    setActiveMenu()

    /* ✅ ICON FIX */
    if(window.lucide){
        lucide.createIcons()
    }

    /* ✅ SHOW SIDEBAR */
    if(sidebar){
        sidebar.style.display = "block"
    }

},200)

})

function setActiveMenu(){

let currentPage = window.location.pathname.split("/").pop()

document.querySelectorAll("#sidebar a").forEach(link=>{
    let page = link.getAttribute("data-page")
    if(page === currentPage){
        link.classList.add("active")
    }
})

}

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId = session.user.id
const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

/* LOGOUT */
window.logout = async function(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}
}

</script>
  
<div class="main">

<div id="bankView">

<div style="margin-bottom:15px;">
<button onclick="switchView('bank')">Bank</button>
<button onclick="switchView('client')">Client</button>
<button onclick="switchView('transporter')">Transporter</button>
</div>
  
<h2>Company Ledger</h2>

<div class="card">

<!-- FILTERS -->
<input type="date" id="fromDate">
<input type="date" id="toDate">

<select id="typeFilter">
<option value="">All Types</option>
<option value="GST Invoice">GST Invoice</option>
<option value="Client Payment">Client Payment</option>
<option value="TRANSPORTER_PAYMENT">Transporter Payment</option>
<option value="Credit Note">Credit Note</option>
</select>

<select id="partyFilter">
<option value="">All Clients</option>
</select>

<button onclick="loadLedger()">Apply Filter</button>

</div>

<div class="card">

<h3>Ledger Entries</h3>

<div style="overflow-x:auto;">
  
<table>
<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Reference</th>
<th>Party</th>
<th>Debit</th>
<th>Credit</th>
<th>Net Position (Business)</th>
<th>Bank Balance (Cash)</th>
<th>Method</th>
<th>Txn ID</th>
</tr>
</thead>

<tbody id="ledgerTable"></tbody>

</table>
</div>
</div> <!-- CLOSE Ledger Entries CARD -->

<div class="card">
<h3>Monthly Summary</h3>
<div id="monthlySummary"></div>
</div>
  
</div> <!-- END BANK VIEW -->

<div id="clientView" style="display:none;">
<h3>Client Ledger</h3>
<div id="clientLedger"></div>
</div>

<div id="transporterView" style="display:none;">
<h3>Transporter Ledger</h3>
<div id="transporterLedger"></div>
</div>
  
</div>


</div>

<script>

function switchView(type){

document.getElementById("bankView").style.display = "none"
document.getElementById("clientView").style.display = "none"
document.getElementById("transporterView").style.display = "none"

if(type === "bank"){
    document.getElementById("bankView").style.display = "block"
}
if(type === "client"){
    document.getElementById("clientView").style.display = "block"
    loadClientLedger()
}
if(type === "transporter"){
    document.getElementById("transporterView").style.display = "block"
    loadTransporterLedger()
}

}



async function loadClientLedger(){

const {data:invoices} = await supabaseClient
.from("client_invoices")
.select("client_name,total_amount")

const {data:payments} = await supabaseClient
.from("client_payments")
.select("client_name,amount")

let map = {}

/* INVOICES */
invoices?.forEach(i=>{
if(!map[i.client_name]) map[i.client_name] = 0
map[i.client_name] += Number(i.total_amount || 0)
})

/* PAYMENTS */
payments?.forEach(p=>{
if(!map[p.client_name]) map[p.client_name] = 0
map[p.client_name] -= Number(p.amount || 0)
})

let html = `<table>
<tr><th>Client</th><th>Outstanding</th></tr>`

Object.keys(map).forEach(c=>{
html += `
<tr>
<td>${c}</td>
<td style="color:${map[c]>0?'#ef4444':'#22c55e'}">
₹${map[c].toFixed(2)}
</td>
</tr>`
})

html += `</table>`

document.getElementById("clientLedger").innerHTML = html
}

async function loadTransporterLedger(){

const {data:invoices} = await supabaseClient
.from("transporter_invoices")
.select("transporter_id,total_amount,paid_amount")

const {data:transporters} = await supabaseClient
.from("transporters")
.select("id, transporter_name")

let nameMap = {}
transporters?.forEach(t=>{
nameMap[t.id] = t.transporter_name
})

let map = {}

invoices?.forEach(i=>{
if(!map[i.transporter_id]) map[i.transporter_id] = 0

let payable = Number(i.total_amount || 0) - Number(i.paid_amount || 0)

map[i.transporter_id] += payable
})

let html = `<table>
<tr><th>Transporter</th><th>Payable</th></tr>`

Object.keys(map).forEach(t=>{
html += `
<tr>
<td>${nameMap[t] || "Transporter"}</td>
<td style="color:${map[t]>0?'#ef4444':'#22c55e'}">
₹${map[t].toFixed(2)}
</td>
</tr>`
})

html += `</table>`

document.getElementById("transporterLedger").innerHTML = html
}
  
async function loadClientsDropdown(){

const { data, error } = await supabaseClient
.from("clients")
.select("company")

if(error){
console.log("Client dropdown error:", error)
return
}

let html = `<option value="">All Clients</option>`

data
.sort((a,b)=>a.company.localeCompare(b.company))
.forEach(c=>{
html += `<option value="${c.company}">${c.company}</option>`
})

document.getElementById("partyFilter").innerHTML = html
}
  
async function loadLedger(){

let fromDate = document.getElementById("fromDate").value
let toDate = document.getElementById("toDate").value
let type = document.getElementById("typeFilter").value
let party = document.getElementById("partyFilter").value

let query = supabaseClient
.from("company_ledger")
.select("*")
.order("created_at", { ascending:true })
.order("id", { ascending:true })

if(fromDate){
query = query.gte("created_at", fromDate + "T00:00:00")
}

if(toDate){
query = query.lte("created_at", toDate + "T23:59:59.999")
}

if(type){
query = query.eq("entry_type", type)
}

if(party){
query = query.or(
`party.ilike.*${party.replace(/,/g,"")}*,party_name.ilike.*${party.replace(/,/g,"")}*`
)
}

const { data, error } = await query

if(error){
console.log("❌ FULL ERROR:", error)
alert(error.message)
return
}

renderTable(data)
renderMonthly(data)
}

function renderTable(data){

let rows = ""
let netBalance = 0
let bankBalance = 0  // ✅ ONLY THIS LINE

data.forEach(r=>{

let debit = Number(r.debit || 0)
let credit = Number(r.credit || 0)
let type = (r.entry_type || "").toUpperCase()

// NET POSITION (all entries)
netBalance += debit - credit

// BANK BALANCE (cash only)
let type = (r.entry_type || "").toUpperCase()

if(type === "CLIENT PAYMENT"){
    bankBalance += credit
}
else if(type === "TRANSPORTER_PAYMENT"){
    bankBalance -= debit
}

rows += `
<tr>
<td>${new Date(r.created_at).toLocaleDateString("en-IN")}</td>
<td>${r.entry_type || r.type || "-"}</td>
<td>${r.reference_no || "-"}</td>
<td>${r.party || r.party_name || "-"}</td>
<td style="color:#22c55e;">₹${debit.toFixed(2)}</td>
<td style="color:#ef4444;">₹${credit.toFixed(2)}</td>
<td>₹${netBalance.toFixed(2)}</td>
<td style="color:${bankBalance >= 0 ? '#22c55e' : '#ef4444'}">
₹${bankBalance.toFixed(2)}
</td>
<td>${r.payment_method || "-"}</td>
<td>${r.transaction_id || "-"}</td>
</tr>
`
})

document.getElementById("ledgerTable").innerHTML = rows

if(!data || data.length === 0){
document.getElementById("ledgerTable").innerHTML = `
<tr><td colspan="10" style="text-align:center;">No data found</td></tr>
`
}
}

function renderMonthly(data){

let map = {}

data.forEach(r=>{

    let entryType = (r.entry_type || r.type || "").toUpperCase()

    let month = new Date(r.created_at).toLocaleString('en-IN',{
        month:'short',
        year:'numeric'
    })

    // ✅ INIT ONLY ONCE
    if(!map[month]){
        map[month] = {
            payment:0,
            transporter:0
        }
    }

    // ✅ CLIENT PAYMENT
    if(entryType === "CLIENT PAYMENT"){
        map[month].payment += Number(r.credit || 0)
    }

    // ✅ TRANSPORTER PAYMENT
    if(entryType === "TRANSPORTER_PAYMENT"){
        map[month].transporter += Number(r.debit || 0)
    }

})

let html = ""

Object.keys(map)
.sort((a,b)=>{
    const [ma, ya] = a.split(" ")
    const [mb, yb] = b.split(" ")

    const monthMap = {
        Jan:0, Feb:1, Mar:2, Apr:3, May:4, Jun:5,
        Jul:6, Aug:7, Sep:8, Oct:9, Nov:10, Dec:11
    }

    return (ya - yb) || (monthMap[ma] - monthMap[mb])
})
.forEach(m=>{

    let netPos = map[m].payment - map[m].transporter

html += `
<div style="
margin-bottom:20px;
padding:15px;
background:#0f172a;
border-radius:10px;
line-height:1.6;
">

<b style="font-size:16px;">${m}</b><br><br>

<div>
<b>Cash Flow</b><br>
Collections: ₹${map[m].payment.toFixed(2)}<br>
Transporter Paid: ₹${map[m].transporter.toFixed(2)}
</div>

<br>

<div>
<b>Bank Position</b><br>
₹<span style="color:${netPos >= 0 ? '#22c55e' : '#ef4444'}">
${netPos.toFixed(2)}
</span>
</div>

</div>
`
})

document.getElementById("monthlySummary").innerHTML = html

if(Object.keys(map).length === 0){
    document.getElementById("monthlySummary").innerHTML = "No data"
}

}

function reconcileGST(ledgerData, gstTotal){

let ledgerGST = 0
  
ledgerData.forEach(r=>{
    if((r.entry_type || "").toUpperCase() === "CLIENT PAYMENT"){
        ledgerGST += Number(r.credit || 0)
    }
})

let diff = ledgerGST - gstTotal
let absDiff = Math.abs(diff)

let status = "MATCHED"

if(absDiff >= 1){
    status = diff > 0 ? "OVER COLLECTED" : "UNDER COLLECTED"
}

return {
    ledgerGST,
    diff,
    absDiff,
    status
}
}
  
/* AUTO LOAD */
loadClientsDropdown()
loadLedger()


  
</script>

</body>
</html>
