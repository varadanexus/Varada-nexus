</script><div class="main"><h1>Dashboard</h1><div class="card-container"><div class="card">
<h3>Total Trips</h3>
<p id="totalTrips">0</p>
</div><div class="card">
<h3>Total Company Amount</h3>
<p id="totalRevenue">0</p>
</div><div class="card">
<h3>Total Transporter Amount</h3>
<p id="totalCost">0</p>
</div><div class="card">
<h3>Total Profit</h3>
<p id="totalProfit">0</p>
</div></div><div class="widget"><h3>Profit by Route</h3><table>
<thead>
<tr>
<th>Route</th>
<th>Profit</th>
</tr>
</thead><tbody id="routeProfit"></tbody></table></div><div class="widget"><h3>Profit by Truck</h3><table>
<thead>
<tr>
<th>Truck</th>
<th>Profit</th>
</tr>
</thead><tbody id="truckProfit"></tbody></table></div><div class="widget"><h3>Monthly Profit</h3><table>
<thead>
<tr>
<th>Month</th>
<th>Profit</th>
</tr>
</thead><tbody id="monthlyProfit"></tbody></table></div></div><script>

loadDashboard()

async function loadDashboard(){

const {data:trips}=await supabaseClient
.from("trips")
.select("*")

const {data:expenses}=await supabaseClient
.from("expenses")
.select("*")

let totalTrips = trips.length
let totalRevenue = 0
let totalCost = 0
let totalProfit = 0

let expenseMap={}

expenses.forEach(e=>{
if(!expenseMap[e.trip_id]) expenseMap[e.trip_id]=0
expenseMap[e.trip_id]+=Number(e.amount)
})

let routeMap={}
let truckMap={}
let monthMap={}

trips.forEach(trip=>{

let mt = trip.weight_kg / 1000
let expense = expenseMap[trip.id] || 0

let companyAmount = (trip.company_rate * mt) - expense
let transporterAmount = (trip.transporter_rate * mt) - expense

let profit = companyAmount - transporterAmount

totalRevenue += companyAmount
totalCost += transporterAmount
totalProfit += profit

if(!routeMap[trip.route]) routeMap[trip.route]=0
routeMap[trip.route]+=profit

if(!truckMap[trip.truck]) truckMap[trip.truck]=0
truckMap[trip.truck]+=profit

if(trip.trip_date){

let month = trip.trip_date.substring(0,7)

if(!monthMap[month]) monthMap[month]=0
monthMap[month]+=profit

}

})

document.getElementById("totalTrips").innerText = totalTrips
document.getElementById("totalRevenue").innerText = "₹ "+ totalRevenue.toLocaleString()
document.getElementById("totalCost").innerText = "₹ "+ totalCost.toLocaleString()
document.getElementById("totalProfit").innerText = "₹ "+ totalProfit.toLocaleString()

let routeHTML=""

Object.keys(routeMap).forEach(route=>{
routeHTML+=`
<tr>
<td>${route}</td>
<td>₹ ${routeMap[route].toLocaleString()}</td>
</tr>
`
})

document.getElementById("routeProfit").innerHTML=routeHTML

let truckHTML=""

Object.keys(truckMap).forEach(truck=>{
truckHTML+=`
<tr>
<td>${truck}</td>
<td>₹ ${truckMap[truck].toLocaleString()}</td>
</tr>
`
})

document.getElementById("truckProfit").innerHTML=truckHTML

let monthHTML=""

Object.keys(monthMap).forEach(month=>{
monthHTML+=`
<tr>
<td>${month}</td>
<td>₹ ${monthMap[month].toLocaleString()}</td>
</tr>
`
})

document.getElementById("monthlyProfit").innerHTML=monthHTML

}

</script></body></html>
