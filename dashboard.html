<!DOCTYPE html><html><head><title>Dashboard - Varada Nexus ERP</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

.card-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
font-size:18px;
}

.card p{
font-size:26px;
margin-top:10px;
font-weight:bold;
}

</style></head><body><!-- GLOBAL SIDEBAR --><div id="sidebar-container"></div><script>

fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})

</script><div class="main"><h1>Dashboard</h1><div class="card-container"><div class="card">
<h3>Total Trips</h3>
<p id="totalTrips">0</p>
</div><div class="card">
<h3>Total Revenue</h3>
<p id="totalRevenue">0</p>
</div><div class="card">
<h3>Total Transport Cost</h3>
<p id="totalCost">0</p>
</div><div class="card">
<h3>Total Profit</h3>
<p id="totalProfit">0</p>
</div></div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

loadDashboard()



async function loadDashboard(){

/* LOAD TRIPS */

const {data:trips}=await supabaseClient
.from("trips")
.select("*")

/* LOAD EXPENSES */

const {data:expenses}=await supabaseClient
.from("expenses")
.select("*")



let totalTrips = trips.length

let totalRevenue = 0
let totalCost = 0
let totalProfit = 0



/* CREATE EXPENSE MAP */

let expenseMap = {}

expenses.forEach(e=>{

if(!expenseMap[e.trip_id]) expenseMap[e.trip_id]=0

expenseMap[e.trip_id]+=Number(e.amount)

})



/* CALCULATE FINANCIALS */

trips.forEach(trip=>{

let mt = trip.weight_kg / 1000

let revenue = trip.company_rate * mt

let cost = trip.transporter_rate * mt

let expense = expenseMap[trip.id] || 0

let profit = revenue - cost - expense


totalRevenue += revenue
totalCost += cost
totalProfit += profit

})



/* DISPLAY */

document.getElementById("totalTrips").innerText = totalTrips

document.getElementById("totalRevenue").innerText =
"₹ "+ totalRevenue.toLocaleString()

document.getElementById("totalCost").innerText =
"₹ "+ totalCost.toLocaleString()

document.getElementById("totalProfit").innerText =
"₹ "+ totalProfit.toLocaleString()

}

</script></body></html>
