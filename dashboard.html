<!DOCTYPE html><html><head><title>Varada Nexus Transport ERP</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#1f3c88;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#162c66;
}

.main{
margin-left:220px;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
font-size:18px;
color:#777;
}

.card p{
font-size:28px;
margin-top:10px;
}

.table{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style></head><body><div class="sidebar"><h2>Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="tms.html">Trips</a>
<a href="#">Trucks</a>
<a href="#">Routes</a>
<a href="#">Expenses</a>
<a href="#">Client Payments</a>
<a href="#">Transporter Payments</a>

</div><div class="main"><h1>Dashboard</h1><div class="cards"><div class="card">
<h3>Total Trips</h3>
<p id="tripCount">0</p>
</div><div class="card">
<h3>Total Weight</h3>
<p id="totalWeight">0</p>
</div><div class="card">
<h3>Total Profit</h3>
<p id="profit">0</p>
</div></div><div class="table"><h2>Recent Trips</h2><div id="recentTrips"></div></div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

async function loadDashboard(){

const { data } = await supabaseClient
.from("trips")
.select("*")

document.getElementById("tripCount").innerText=data.length

let weight=0

data.forEach(trip=>{
weight+=Number(trip.weight_kg||0)
})

document.getElementById("totalWeight").innerText=weight

let html=""

data.slice(0,5).forEach(trip=>{

html+=`

<p>
${trip.commodity} - ${trip.weight_kg} KG
</p>

`

})

document.getElementById("recentTrips").innerHTML=html

}

loadDashboard()

</script></body></html>
