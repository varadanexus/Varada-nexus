<!DOCTYPE html>
<html>

<head>

<title>Dashboard - Varada Nexus ERP</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#1f3c88;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#162c66;
}

.main{
margin-left:220px;
padding:30px;
}

.card-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
font-size:18px;
}

.card p{
font-size:24px;
margin-top:10px;
}

</style>

</head>

<body>


<div class="sidebar">

<h2>Varada Nexus</h2>

<a href="dashboard.html">Dashboard</a>

<a href="trips.html">Trips</a>

<a href="expenses.html">Expenses</a>

<a href="master-data.html">Master Data</a>

<a href="rate-entry.html">Rates</a>

</div>



<div class="main">

<h1>Dashboard</h1>

<div class="card-container">

<div class="card">
<h3>Total Trips</h3>
<p id="totalTrips">0</p>
</div>

<div class="card">
<h3>Total Revenue</h3>
<p id="totalRevenue">0</p>
</div>

<div class="card">
<h3>Total Transport Cost</h3>
<p id="totalCost">0</p>
</div>

<div class="card">
<h3>Total Profit</h3>
<p id="totalProfit">0</p>
</div>

</div>

</div>

</body>

</html>
