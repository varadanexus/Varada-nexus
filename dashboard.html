padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<script>

/* MAIN SUPABASE CLIENT */

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

</script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN -->
<div class="main">

<h1>Dashboard</h1>

<div class="card-container">

<div class="card">
<h3>Total Trips</h3>
<p id="totalTrips">0</p>
</div>

<div class="card">
<h3>Total Company Amount</h3>
<p id="totalRevenue">0</p>
</div>

<div class="card">
<h3>Total Transporter Amount</h3>
<p id="totalCost">0</p>
</div>

<div class="card">
<h3>Total Profit</h3>
<p id="totalProfit">0</p>
</div>

</div>

</div>

<script>

/* LOAD SIDEBAR + RBAC */

fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

/* WAIT FOR DOM */
await new Promise(r => setTimeout(r, 200))

await initSidebar()

/* APPLY MENU RBAC */
if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}
})

/* SIDEBAR USER + ROLE */

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const authId = session.user.id
const email = session.user.email

/* NAME */
document.getElementById("userName").innerText = email.split("@")[0]

/* USER */
const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

/* MULTI ROLE */
const {data:userRoles} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)

if(!userRoles || userRoles.length===0) return

let roleId = userRoles[0].role_id

/* ROLE NAME */
const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",roleId)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

/* LOGOUT */
window.logout = async function(){
await supabaseClient.auth.signOut()
localStorage.clear()
window.location.href="login.html"
}

}

/* DASHBOARD DATA */

async function loadDashboard(){

try{

const {data:trips} = await supabaseClient
.from("trips")
.select("*")

const {data:expenses} = await supabaseClient
.from("expenses")
.select("*")

let tripsData = trips || []
let expensesData = expenses || []

let totalTrips = tripsData.length
let totalRevenue = 0
let totalCost = 0
let totalProfit = 0

let expenseMap = {}

expensesData.forEach(e=>{
if(!expenseMap[e.trip_id]) expenseMap[e.trip_id]=0
expenseMap[e.trip_id]+=Number(e.amount || 0)
})

tripsData.forEach(trip=>{

let mt = (trip.weight_kg || 0)/1000
let expense = expenseMap[trip.id] || 0

let companyAmount = (Number(trip.company_rate || 0)*mt) - expense
let transporterAmount = (Number(trip.transporter_rate || 0)*mt) - expense

let profit = companyAmount - transporterAmount

totalRevenue += companyAmount
totalCost += transporterAmount
totalProfit += profit

})

document.getElementById("totalTrips").innerText = totalTrips
document.getElementById("totalRevenue").innerText = "₹ "+Math.round(totalRevenue)
document.getElementById("totalCost").innerText = "₹ "+Math.round(totalCost)
document.getElementById("totalProfit").innerText = "₹ "+Math.round(totalProfit)

}catch(err){
console.log(err)
}

}

loadDashboard()

</script>

<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>
<script src="rbac.js"></script>
</body>
</html>
