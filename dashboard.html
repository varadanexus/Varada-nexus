<!DOCTYPE html><html><head><title>Dashboard - Varada Nexus ERP</title><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

.card-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
font-size:18px;
}

.card p{
font-size:24px;
margin-top:10px;
}

</style></head><body><!-- Sidebar Loader --><div id="sidebar-container"></div><script>
fetch("sidebar.html")
.then(res => res.text())
.then(data => {
document.getElementById("sidebar-container").innerHTML = data
})
</script><div class="main"><h1>Dashboard</h1><div class="card-container"><div class="card">
<h3>Total Trips</h3>
<p id="totalTrips">0</p>
</div><div class="card">
<h3>Total Revenue</h3>
<p id="totalRevenue">0</p>
</div><div class="card">
<h3>Total Transport Cost</h3>
<p id="totalCost">0</p>
</div><div class="card">
<h3>Total Profit</h3>
<p id="totalProfit">0</p>
</div></div></div></body></html>
