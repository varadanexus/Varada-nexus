async function loadExpenses(){

const {data}=await supabaseClient
.from("expenses")
.select("*")
.order("created_at",{ascending:false})

let html=""

data.forEach(e=>{
html+=`
<tr>
<td>${e.expense_id}</td>
<td>${e.trip_id}</td>
<td>${e.expense_type}</td>
<td>${e.amount}</td>
</tr>
`
})

document.getElementById("expenseTable").innerHTML=html

}
