<!DOCTYPE html><html>
<head><title>Trip Expenses</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

body{margin:0;font-family:Arial;background:#f4f6f9;}

.sidebar{
position:fixed;
width:220px;
height:100%;
background:#1f3c88;
color:white;
padding-top:20px;
}

.sidebar a{
display:block;
padding:12px 20px;
color:white;
text-decoration:none;
}

.sidebar a:hover{background:#162c66;}

.main{margin-left:220px;padding:30px;}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{background:#eee;}

</style></head><body><div class="sidebar"><h2 style="padding-left:20px;">Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>

</div><div class="main"><h2>Trip Expenses</h2><div class="card"><select id="tripSelect"></select>

<select id="expenseType"><option>Fuel</option>
<option>Toll</option>
<option>Driver</option>
<option>Repair</option></select><input id="amount" placeholder="Amount"><button onclick="addExpense()">Add Expense</button>

</div><table><thead><tr><th>Trip</th>
<th>Type</th>
<th>Amount</th></tr></thead><tbody id="expenseTable"></tbody></table></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

let currentTrip=null

init()



function getTripFromURL(){

const params=new URLSearchParams(window.location.search)

return params.get("trip")

}



async function init(){

const {data:trips}=await supabaseClient
.from("trips")
.select("*")

let html=""

trips.forEach(t=>{

html+=`<option value="${t.id}">${t.trip_no}</option>`

})

document.getElementById("tripSelect").innerHTML=html


const trip=getTripFromURL()

if(trip){

document.getElementById("tripSelect").value=trip

loadExpenses(trip)

}

}



async function loadExpenses(tripId){

const {data}=await supabaseClient
.from("expenses")
.select("*")
.eq("trip_id",tripId)

let html=""

data.forEach(e=>{

html+=`

<tr>

<td>${tripId}</td>
<td>${e.expense_type}</td>
<td>${e.amount}</td>

</tr>

`

})

document.getElementById("expenseTable").innerHTML=html

}



async function addExpense(){

let tripId=document.getElementById("tripSelect").value

let type=document.getElementById("expenseType").value

let amount=document.getElementById("amount").value

await supabaseClient.from("expenses").insert({

trip_id:tripId,
expense_type:type,
amount:amount

})

loadExpenses(tripId)

}

</script></body>
</html>
