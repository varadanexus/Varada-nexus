<!DOCTYPE html><html>
<head><title>Trip Expenses</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

body{margin:0;font-family:Arial;background:#f4f6f9;}

.sidebar{
position:fixed;width:220px;height:100%;
background:#1f3c88;color:white;padding-top:20px;
}

.sidebar a{
display:block;color:white;padding:12px 20px;text-decoration:none;
}

.sidebar a:hover{background:#162c66;}

.main{margin-left:220px;padding:30px;}

table{width:100%;border-collapse:collapse;background:white;}

th,td{padding:10px;border-bottom:1px solid #ddd;}

th{background:#eee;}

input,select{padding:6px;margin:5px;}

button{
padding:6px 12px;background:#1f3c88;color:white;border:none;
}

</style></head><body><div class="sidebar"><h2 style="padding-left:20px;">Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>

</div><div class="main"><h2>Trip Expenses</h2><select id="tripSelect"></select>

<select id="expenseType">
<option>Fuel</option>
<option>Toll</option>
<option>Driver</option>
<option>Repair</option>
</select><input id="amount" placeholder="Amount"><button onclick="addExpense()">Add Expense</button>

<table><thead><tr><th>Trip</th>
<th>Type</th>
<th>Amount</th></tr></thead><tbody id="expenseTable"></tbody></table></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

let tripNoMap={}

init()


function getTripFromURL(){

const params=new URLSearchParams(window.location.search)

return params.get("trip")

}


async function init(){

const {data:trips}=await supabaseClient
.from("trips")
.select("*")


let html=""

trips.forEach(t=>{

tripNoMap[t.id]=t.trip_no

html+=`<option value="${t.id}">${t.trip_no}</option>`

})

document.getElementById("tripSelect").innerHTML=html


const trip=getTripFromURL()

if(trip){

document.getElementById("tripSelect").value=trip

loadExpenses(trip)

}

}



async function loadExpenses(tripId){

const {data}=await supabaseClient
.from("expenses")
.select("*")
.eq("trip_id",tripId)

let html=""

data.forEach(e=>{

html+=`

<tr>

<td>${tripNoMap[e.trip_id]}</td>

<td>${e.expense_type}</td>

<td>${e.amount}</td>

</tr>

`

})

document.getElementById("expenseTable").innerHTML=html

}



async function addExpense(){

let tripId=document.getElementById("tripSelect").value
let type=document.getElementById("expenseType").value
let amount=document.getElementById("amount").value

await supabaseClient.from("expenses").insert({

trip_id:tripId,
expense_type:type,
amount:amount

})

loadExpenses(tripId)

}

</script></body>
</html>
