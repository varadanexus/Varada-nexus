<!DOCTYPE html><html><head><title>Trip Expenses</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/><script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script><script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#1f3c88;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#162c66;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:6px;
margin-bottom:20px;
}

input,select{
padding:8px;
margin:5px;
width:200px;
}

button{
padding:8px 12px;
background:#1f3c88;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
}

</style></head><body><div class="sidebar"><h2>Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>

</div><div class="main"><h1>Trip Expenses</h1><div class="card"><h3>Add Expense</h3><select id="tripSelect" style="width:250px"></select>

<select id="type">
<option>Fuel</option>
<option>Toll</option>
<option>Driver Advance</option>
<option>Maintenance</option>
</select><input id="amount" placeholder="Amount"><button onclick="addExpense()">Add Expense</button>

</div><table><thead>
<tr>
<th>Trip</th>
<th>Type</th>
<th>Amount</th>
</tr>
</thead><tbody id="expenseTable"></tbody></table></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

async function loadTrips(){

const { data } = await supabaseClient
.from("trips")
.select("id,trip_no")
.order("created_at",{ascending:false})

let html=""

data.forEach(trip=>{
html+=`<option value="${trip.id}">${trip.trip_no}</option>`
})

document.getElementById("tripSelect").innerHTML=html

$('#tripSelect').select2({
placeholder:"Search Trip ID"
})

}

async function loadExpenses(){

const { data } = await supabaseClient
.from("expenses")
.select("*,trips(trip_no)")
.order("created_at",{ascending:false})

let html=""

data.forEach(exp=>{

html+=`
<tr>
<td>${exp.trips?.trip_no || "-"}</td>
<td>${exp.expense_type}</td>
<td>${exp.amount}</td>
</tr>
`

})

document.getElementById("expenseTable").innerHTML=html

}

async function addExpense(){

const tripUUID=document.getElementById("tripSelect").value
const expenseType=document.getElementById("type").value
const amount=document.getElementById("amount").value

const { error } = await supabaseClient
.from("expenses")
.insert([
{
trip_id: tripUUID,
expense_type: expenseType,
amount:Number(amount),
expense_date:new Date().toISOString()
}
])

if(error){
alert(error.message)
return
}

alert("Expense Added")

loadExpenses()

}

loadTrips()
loadExpenses()

</script></body></html>
