<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>

/* LOAD SIDEBAR + INIT */

fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

/* WAIT FOR SIDEBAR RENDER */
await new Promise(r => setTimeout(r, 200))

/* LOAD USER + ROLE */
await initSidebar()

/* APPLY RBAC */
if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}
})

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId = session.user.id
const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

/* LOGOUT */

window.logout = async function(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}

</script>

<div class="main">

<h1>Trip Expenses</h1>

<div class="card">

<h3>Add Expense</h3>

<div class="form-grid">

<select id="trip"></select>

<select id="type">
<option>Fuel</option>
<option>Toll</option>
<option>Driver</option>
<option>Maintenance</option>
<option>Other</option>
</select>

<input id="amount" placeholder="Amount">

<button onclick="saveExpense()">Add Expense</button>

</div>

</div>

<div class="card">

<input id="searchTrip" placeholder="Search Trip No">

<select id="filterType">
<option value="">All Types</option>
<option>Fuel</option>
<option>Toll</option>
<option>Driver</option>
<option>Maintenance</option>
<option>Other</option>
</select>

<button onclick="applyFilter()">Filter</button>
<button onclick="clearFilter()">Clear</button>

</div>

<table>

<thead>
<tr>
<th>Expense ID</th>
<th>Trip</th>
<th>Type</th>
<th>Amount</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="expenseTable"></tbody>

</table>

<br>

<button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<script>

let trips=[]
let expenses=[]
let filtered=[]

let page=1
let pageSize=10

init()

async function init(){
await loadTrips()
await loadExpenses()
}

/* LOAD TRIPS */

async function loadTrips(){

const {data}=await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

trips=data || []

let html='<option value="">Select Trip</option>'

trips.forEach(t=>{
html+=`<option value="${t.id}">${t.trip_no}</option>`
})

document.getElementById("trip").innerHTML=html

}

/* GENERATE ID */

async function generateExpenseId(){

const now=new Date()

let year=now.getFullYear().toString().slice(-2)
let month=("0"+(now.getMonth()+1)).slice(-2)

const {data}=await supabaseClient
.from("expenses")
.select("expense_id")
.ilike("expense_id","EXP"+year+month+"%")

let seq=(data?.length || 0)+1

return "EXP"+year+month+seq.toString().padStart(4,"0")

}

/* SAVE */

async function saveExpense(){

let tripId=document.getElementById("trip").value
let type=document.getElementById("type").value
let amount=document.getElementById("amount").value

if(!tripId || !amount){
alert("Enter Trip and Amount")
return
}

let expenseId=await generateExpenseId()

await supabaseClient.from("expenses").insert({
expense_id:expenseId,
trip_id:tripId,
expense_type:type,
amount:amount,
expense_date:new Date()
})

document.getElementById("trip").value=""
document.getElementById("amount").value=""

loadExpenses()

}

/* LOAD */

async function loadExpenses(){

const {data}=await supabaseClient
.from("expenses")
.select("*")
.order("created_at",{ascending:false})

expenses=data || []
filtered=expenses

renderTable()

}

/* RENDER */

function renderTable(){

let start=(page-1)*pageSize
let rows=filtered.slice(start,start+pageSize)

let html=""

rows.forEach(e=>{

let trip=trips.find(t=>t.id==e.trip_id)

html+=`
<tr>
<td>${e.expense_id || ""}</td>
<td>${trip ? trip.trip_no : ""}</td>
<td>${e.expense_type}</td>
<td>${e.amount}</td>
<td>${e.expense_date || ""}</td>
<td>
<button class="editBtn" onclick="editExpense('${e.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteExpense('${e.id}')">Delete</button>
</td>
</tr>
`
})

document.getElementById("expenseTable").innerHTML=html

}

/* EDIT */

function editExpense(id){

let e=expenses.find(x=>x.id==id)

let val=prompt("Edit Amount",e.amount)
if(val===null) return

supabaseClient.from("expenses")
.update({amount:val})
.eq("id",id)
.then(()=>loadExpenses())

}

/* DELETE */

async function deleteExpense(id){

if(!confirm("Delete?")) return

await supabaseClient.from("expenses")
.delete()
.eq("id",id)

loadExpenses()

}

/* PAGINATION */

function nextPage(){
if(page*pageSize >= filtered.length) return
page++
renderTable()
}

function prevPage(){
if(page>1){page--;renderTable()}
}

/* FILTER */

function applyFilter(){

let tripSearch=document.getElementById("searchTrip").value.toLowerCase()
let typeFilter=document.getElementById("filterType").value

filtered=expenses.filter(e=>{

let trip=trips.find(t=>t.id==e.trip_id)

return (
(!tripSearch || (trip && trip.trip_no.toLowerCase().includes(tripSearch))) &&
(!typeFilter || e.expense_type===typeFilter)
)

})

page=1
renderTable()

}

function clearFilter(){

document.getElementById("searchTrip").value=""
document.getElementById("filterType").value=""

filtered=expenses
page=1
renderTable()

}

/* PDF */

function downloadPDF(){

const { jsPDF } = window.jspdf
let doc=new jsPDF()

let rows=[]

filtered.forEach(e=>{
let trip=trips.find(t=>t.id==e.trip_id)
rows.push([e.expense_id,trip?.trip_no||"",e.expense_type,e.amount,e.expense_date])
})

doc.autoTable({
head:[["Expense ID","Trip","Type","Amount","Date"]],
body:rows
})

doc.save("trip_expenses.pdf")

}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
