<style>

/* GLOBAL */

margin:0;

background:#0a0f1c;
color:#e5e7eb;

/* MAIN */
.main{
margin-left:220px;

/* MOBILE FIX */

}

/* HEADER */

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;

.title{font-size:20px;font-weight:600;}

.health{

/* BOX */

padding:12px;
border-radius:8px;
}

/* ACTION PANEL */
.action{
background:#1f2937;
padding:10px;
border-radius:6px;
margin-bottom:8px;
font-size:13px;
cursor:pointer;
}

/* TABLE */
table{
width:100%;
font-size:12px;
border-collapse:collapse;
}

td{
padding:6px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

<script>

window.onload=init

async function init(){

const [
{data:trips},
{data:expenses},
{data:invoices},
{data:clientPayments},
{data:transporterPayments},
{data:transporters}
] = await Promise.all([
supabaseClient.from("trips").select("*"),
supabaseClient.from("expenses").select("*"),
supabaseClient.from("client_invoices").select("*"),
supabaseClient.from("client_payments").select("*"),
supabaseClient.from("transporter_payments").select("*"),
supabaseClient.from("transporters").select("*")
])

process(trips||[],expenses||[],invoices||[],clientPayments||[],transporterPayments||[],transporters||[])

}

function process(trips,expenses,invoices,clientPayments,transporterPayments,transporters){

let revenue=0, paid=0, transporterCost=0, transporterPaid=0

let expenseMap={}
expenses.forEach(e=>{
expenseMap[e.trip_id]=(expenseMap[e.trip_id]||0)+(+e.amount||0)
})

invoices.forEach(i=>revenue+=+i.invoice_amount||0)
clientPayments.forEach(p=>paid+=+p.amount||0)
transporterPayments.forEach(p=>transporterPaid+=+p.amount||0)

let profits=[]
let labels=[]
let transporterMap={}

trips.forEach(t=>{
let mt=(t.weight_kg||0)/1000
let cost=(t.transporter_rate||0)*mt
let exp=expenseMap[t.id]||0
let net=cost-exp

transporterCost+=net

let rev=(t.company_rate||0)*mt
let profit=rev-net

profits.push(profit)
labels.push(t.trip_no)

if(!transporterMap[t.transporter_id]) transporterMap[t.transporter_id]=0
transporterMap[t.transporter_id]+=net
})

transporterPayments.forEach(p=>{
transporterMap[p.transporter_id]-=(+p.amount||0)
})

let outstanding=revenue-paid
let payable=transporterCost-transporterPaid
let profit=revenue-transporterCost

set("revenue",revenue)
set("outstanding",outstanding)
set("payable",payable)
set("profit",profit)

/* HEALTH */
let health=document.getElementById("health")
if(profit<0){health.className="health bad";health.innerText="CRITICAL"}
else if(outstanding>50000){health.className="health warn";health.innerText="RISK"}
else{health.className="health good";health.innerText="HEALTHY"}

/* FORECAST */
let avg=profits.reduce((a,b)=>a+b,0)/profits.length||0
document.getElementById("forecast").innerHTML=
`7 Days: ₹ ${Math.round(avg*7)}<br>30 Days: ₹ ${Math.round(avg*30)}`

/* ACTIONS */
let actions=""
if(outstanding>20000) actions+=`<div class="action" onclick="remindClients()">Send Payment Reminders</div>`
if(payable>20000) actions+=`<div class="action">Schedule Transporter Payments</div>`
document.getElementById("actions").innerHTML=actions

/* PAYOUT TABLE */
let payoutHTML=""
transporters.forEach(t=>{
payoutHTML+=`<tr><td>${t.transporter_name}</td><td>₹ ${Math.round(transporterMap[t.id]||0)}</td></tr>`
})
document.getElementById("payoutTable").innerHTML=payoutHTML

/* CHART */
new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:labels,datasets:[{label:"Profit",data:profits}]}
})

}

/* REMINDER */
function remindClients(){
alert("Reminder: Please clear outstanding payments.")
}

function set(id,val){
document.getElementById(id).innerText="₹ "+Math.round(val).toLocaleString()
}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
