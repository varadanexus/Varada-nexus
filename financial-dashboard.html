<!DOCTYPE html>
<html>
<head>

<title>Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="session-check.js"></script>
<script src="menu-rbac.js"></script>
<script src="rbac.js"></script>
<script src="global-logout.js"></script>

<style>
body{margin:0;font-family:'Inter',sans-serif;background:#0a0f1c;color:#e5e7eb;}
.main{margin-left:220px;padding:25px;}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.title{font-size:22px;font-weight:600;}
.badge{background:#22c55e;padding:6px 12px;border-radius:20px;font-size:12px;}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;margin-bottom:20px;
}

.card{background:#111827;padding:15px;border-radius:10px;}

.kpi-title{font-size:12px;color:#9ca3af;}
.kpi-value{font-size:18px;font-weight:600;margin-top:5px;}

.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.chart-box{
background:#111827;
padding:15px;
border-radius:10px;
height:300px;
}

.chart-box canvas{
height:100% !important;
width:100% !important;
}

.section{background:#111827;padding:15px;border-radius:10px;margin-bottom:20px;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:8px;border-bottom:1px solid rgba(255,255,255,0.05);}
th{color:#9ca3af;}

.heat-high{background:#7f1d1d;}
.heat-mid{background:#78350f;}
.heat-low{background:#14532d;}

@media(max-width:768px){
.main{margin-left:0;padding:10px;}
.charts{grid-template-columns:1fr;}
}
</style>

</head>

<div class="main">

<div class="header">
<div class="title">Executive Control System</div>
<div class="badge">LIVE</div>
</div>

<div class="cards">
<div class="card"><div class="kpi-title">Trips</div><div id="totalTrips"></div></div>
<div class="card"><div class="kpi-title">Client Gross</div><div id="clientGross"></div></div>
<div class="card"><div class="kpi-title">Invoiced</div><div id="invoiced"></div></div>
<div class="card"><div class="kpi-title">Outstanding</div><div id="outstanding"></div></div>
<div class="card"><div class="kpi-title">Profit</div><div id="profit"></div></div>
</div>

<div class="charts">

</div>

<div class="section">
<h3>Trips</h3>
<table>

</div>

<!-- POPUP -->
<div id="popup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;">
<div style="background:#111827;padding:20px;border-radius:10px;width:300px;">
<h3>Trip Breakdown</h3>
<div id="popupContent"></div>
<br>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>

let profitChart, clientChart, cashflowChart

window.onload=init

async function init(){

const [
{data:trips},
{data:expenses},
{data:invoices},
{data:breakdown},
{data:clientPayments}
] = await Promise.all([
supabaseClient.from("trips").select("*"),
supabaseClient.from("expenses").select("*"),
supabaseClient.from("client_invoices").select("*"),
supabaseClient.from("invoice_trip_breakdown").select("*"),
supabaseClient.from("client_payments").select("*")
])

process(trips||[],expenses||[],invoices||[],breakdown||[],clientPayments||[])

}

function process(trips,expenses,invoices,breakdown,clientPayments){

let expenseMap={}
expenses.forEach(e=>{
expenseMap[e.trip_id]=(expenseMap[e.trip_id]||0)+(+e.amount||0)
})

let invoiceMap={}
breakdown.forEach(b=>{
invoiceMap[b.trip_no]=(invoiceMap[b.trip_no]||0)+(+b.amount||0)
})

let totalTrips=trips.length
let clientGross=0, invoiced=0, paid=0
let profitTotal=0

invoices.forEach(i=>invoiced+=+i.invoice_amount||0)
clientPayments.forEach(p=>paid+=+p.amount||0)

let tripHTML=""
let clientProfitMap={}
let profitArr=[],labels=[]

trips.forEach(t=>{

let mt=(t.weight_kg||0)/1000
let exp=expenseMap[t.id]||0

let clientFinal=(t.company_rate*mt)-exp
let transporterFinal=(t.transporter_rate*mt)-exp
let profit=clientFinal-transporterFinal

clientGross+=clientFinal
profitTotal+=profit

clientProfitMap[t.client_name]=(clientProfitMap[t.client_name]||0)+profit

let heat="heat-low"
if(profit>2000) heat="heat-high"
else if(profit>1000) heat="heat-mid"

tripHTML+=`
<tr class="${heat}" onclick='showBreakdown(${JSON.stringify({
trip:t.trip_no,profit
}).replace(/'/g,"")})'>
<td>${t.trip_no}</td>
<td>₹ ${Math.round(profit)}</td>
<td>${profit>1500?"🔥 High":"OK"}</td>
</tr>`

profitArr.push(profit)
labels.push(t.trip_no)

})

tripTable.innerHTML=tripHTML

set("totalTrips",totalTrips)
set("clientGross",clientGross)
set("invoiced",invoiced)
set("outstanding",invoiced-paid)
set("profit",profitTotal)

/* DESTROY OLD CHARTS */
if(profitChart) profitChart.destroy()
if(clientChart) clientChart.destroy()
if(cashflowChart) cashflowChart.destroy()

/* PROFIT CHART */
profitChart=new Chart(document.getElementById("profitChart"),{
type:"line",
data:{labels:labels,datasets:[{label:"Profit",data:profitArr}]}
})

/* CLIENT CHART (TOP 5) */
let sortedClients=Object.entries(clientProfitMap).sort((a,b)=>b[1]-a[1]).slice(0,5)

clientChart=new Chart(document.getElementById("clientChart"),{
type:"bar",
data:{
labels:sortedClients.map(x=>x[0]),
datasets:[{label:"Top Clients",data:sortedClients.map(x=>x[1])}]
}
})

/* CASHFLOW */
cashflowChart=new Chart(document.getElementById("cashflowChart"),{
type:"doughnut",
data:{
labels:["Received","Outstanding"],
datasets:[{
data:[paid,invoiced-paid]
}]
}
})

}

function set(id,val){
document.getElementById(id).innerText="₹ "+Math.round(val).toLocaleString()
}

function showBreakdown(d){
popup.style.display="flex"
popupContent.innerHTML=`
Trip: ${d.trip}<br>
Profit: ₹${Math.round(d.profit)}
`
}

function closePopup(){
popup.style.display="none"
}

</script>

</body>
</html>
