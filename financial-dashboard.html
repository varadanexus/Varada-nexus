<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0a0f1c;

padding:15px;
border-radius:10px;
margin-bottom:20px;
}

table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:8px;border-bottom:1px solid rgba(255,255,255,0.05);}

</table>
</div>

<div class="section">
<h3>Transporter Pending</h3>
<table>
<thead><tr><th>Transporter</th><th>Pending</th></tr></thead>
<tbody id="transporterTable"></tbody>
</table>
</div>

</div>

<script>

window.onload=init

async function init(){

const [
{data:trips},
{data:expenses},
{data:invoices},
{data:clientPayments},
{data:transporterPayments},
{data:transporters},
{data:agentLedger}
] = await Promise.all([
supabaseClient.from("trips").select("*"),
supabaseClient.from("expenses").select("*"),
supabaseClient.from("client_invoices").select("*"),
supabaseClient.from("client_payments").select("*"),
supabaseClient.from("transporter_payments").select("*"),
supabaseClient.from("transporters").select("*"),
supabaseClient.from("agent_trip_ledger").select("*")
])

process(trips||[],expenses||[],invoices||[],clientPayments||[],transporterPayments||[],transporters||[],agentLedger||[])

}

function process(trips,expenses,invoices,clientPayments,transporterPayments,transporters,agentLedger){

let totalTrips = trips.length
let totalMT = 0

let invoiced=0, paid=0
let transporterCost=0, transporterPaid=0
let clientGross=0
let companyProfit=0

let agentTotal=0, agentPaid=0

let expenseMap={}
expenses.forEach(e=>{
expenseMap[e.trip_id]=(expenseMap[e.trip_id]||0)+(+e.amount||0)
})

invoices.forEach(i=>invoiced+=+i.invoice_amount||0)
clientPayments.forEach(p=>paid+=+p.amount||0)
transporterPayments.forEach(p=>transporterPaid+=+p.amount||0)

agentLedger.forEach(a=>{
agentTotal+=+a.commission_amount||0
agentPaid+=+a.paid_amount||0
})

let tripHTML=""
let transporterMap={}
let profitData=[]
let labels=[]

trips.forEach(t=>{

let mt=(t.weight_kg||0)/1000
totalMT+=mt

let gross=(t.company_rate||0)*mt
clientGross+=gross

let cost=(t.transporter_rate||0)*mt
let exp=expenseMap[t.id]||0

let netTransporter=cost-exp
transporterCost+=netTransporter

let profit=((t.company_rate||0)-(t.transporter_rate||0))*mt
companyProfit+=profit

profitData.push(profit)
labels.push(t.trip_no)

tripHTML+=`<tr><td>${t.trip_no}</td><td>₹ ${Math.round(profit)}</td></tr>`

if(!transporterMap[t.transporter_id]) transporterMap[t.transporter_id]=0
transporterMap[t.transporter_id]+=netTransporter

})

document.getElementById("tripTable").innerHTML=tripHTML

transporterPayments.forEach(p=>{
transporterMap[p.transporter_id]=(transporterMap[p.transporter_id]||0)-(+p.amount||0)
})

let transporterHTML=""
transporters.forEach(t=>{
transporterHTML+=`<tr><td>${t.transporter_name}</td><td>₹ ${Math.round(transporterMap[t.id]||0)}</td></tr>`
})

document.getElementById("transporterTable").innerHTML=transporterHTML

let outstanding=invoiced-paid
let transporterPayable=transporterCost-transporterPaid
let agentBalance=agentTotal-agentPaid

let netProfit=companyProfit-agentTotal

set("totalTrips",totalTrips)
set("totalMT",totalMT)

set("clientGross",clientGross)
set("invoiced",invoiced)
set("paid",paid)
set("outstanding",outstanding)

set("transporterCost",transporterCost)
set("transporterPaid",transporterPaid)
set("transporterPayable",transporterPayable)

set("companyProfit",companyProfit)

set("agentTotal",agentTotal)
set("agentPaid",agentPaid)
set("agentBalance",agentBalance)

set("profit",netProfit)

/* ALERTS */
let alertHTML=""
if(outstanding>50000) alertHTML+=`<div class="alert red">High Client Outstanding</div>`
if(transporterPayable>50000) alertHTML+=`<div class="alert yellow">High Transporter Payable</div>`
if(netProfit<0) alertHTML+=`<div class="alert red">Company in Loss</div>`

document.getElementById("alerts").innerHTML=alertHTML

new Chart(document.getElementById("monthlyChart"),{
type:"line",
data:{labels:labels,datasets:[{label:"Profit",data:profitData}]}
})

new Chart(document.getElementById("profitChart"),{
type:"bar",
data:{labels:labels,datasets:[{label:"Profit/Trip",data:profitData}]}
})

}

function set(id,val){
document.getElementById(id).innerText="₹ "+Math.round(val).toLocaleString()
}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
