<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

/* WAIT FOR SIDEBAR RENDER */
await new Promise(r => setTimeout(r, 200))

/* LOAD USER + ROLE */
await initSidebar()

/* APPLY RBAC */
if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}
})

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId=session.user.id
const email=session.user.email

document.getElementById("userName").innerText=email.split("@")[0]

const {data:user}=await supabaseClient
.from("users").select("id").eq("auth_id",authId).single()

if(!user) return

const {data:userRole}=await supabaseClient
.from("user_roles").select("role_id").eq("user_id",user.id).single()

if(!userRole) return

const {data:role}=await supabaseClient
.from("roles").select("role_name").eq("id",userRole.role_id).single()

if(role){
document.getElementById("userRole").innerText=role.role_name
}

if(typeof applyMenuRBAC==="function"){
applyMenuRBAC()
}

window.logout=async()=>{
await supabaseClient.auth.signOut()
window.location="login.html"
}
}
</script>

<div class="main">

<h2>Financial Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Total Client Revenue</h3>
<p id="revenue">₹0</p>
</div>

<div class="card">
<h3>Transporter Cost</h3>
<p id="transporterCost">₹0</p>
</div>

<div class="card">
<h3>Total Expenses</h3>
<p id="expenses">₹0</p>
</div>

<div class="card">
<h3>Net Profit</h3>
<p id="profit">₹0</p>
</div>

<div class="card">
<h3>Client Outstanding</h3>
<p id="clientOutstanding">₹0</p>
</div>

<div class="card">
<h3>Transporter Payable</h3>
<p id="transporterPayable">₹0</p>
</div>

</div>

</div>

<script>

window.onload = init

async function init(){

try{

const [
{data:invoices},
{data:trips},
{data:expenses},
{data:payments}
] = await Promise.all([

supabaseClient.from("client_invoices").select("*"),
supabaseClient.from("trips").select("*"),
supabaseClient.from("expenses").select("*"),
supabaseClient.from("transporter_payments").select("*")

])

calculate(invoices||[], trips||[], expenses||[], payments||[])

}catch(err){
console.error("Load Error:",err)
}

}

function calculate(invoices,trips,expenses,payments){

let revenue=0
let clientOutstanding=0
let transporterCost=0
let totalExpenses=0
let paid=0

/* EXPENSE MAP */

let expenseMap={}

expenses.forEach(e=>{
totalExpenses+=Number(e.amount||0)
if(!expenseMap[e.trip_id]) expenseMap[e.trip_id]=0
expenseMap[e.trip_id]+=Number(e.amount||0)
})

/* REVENUE */

invoices.forEach(i=>{
revenue+=Number(i.invoice_amount||0)
clientOutstanding+=Number(i.balance_amount||0)
})

/* TRANSPORTER COST */

trips.forEach(t=>{
let mt=(Number(t.weight_kg)||0)/1000
let gross=(Number(t.transporter_rate)||0)*mt
let tripExpense=expenseMap[t.id]||0
transporterCost+=(gross-tripExpense)
})

/* PAYMENTS */

payments.forEach(p=>{
paid+=Number(p.amount||0)
})

let transporterPayable=transporterCost-paid
let profit=revenue-transporterCost

/* UI */

revenueEl.innerText="₹ "+Math.round(revenue).toLocaleString()
transporterCostEl.innerText="₹ "+Math.round(transporterCost).toLocaleString()
expensesEl.innerText="₹ "+Math.round(totalExpenses).toLocaleString()
profitEl.innerText="₹ "+Math.round(profit).toLocaleString()
clientOutstandingEl.innerText="₹ "+Math.round(clientOutstanding).toLocaleString()
transporterPayableEl.innerText="₹ "+Math.round(transporterPayable).toLocaleString()

}

/* SHORTCUT ELEMENTS */

const revenueEl=document.getElementById("revenue")
const transporterCostEl=document.getElementById("transporterCost")
const expensesEl=document.getElementById("expenses")
const profitEl=document.getElementById("profit")
const clientOutstandingEl=document.getElementById("clientOutstanding")
const transporterPayableEl=document.getElementById("transporterPayable")

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
