<!DOCTYPE html>
<html>
<head>

<title>Executive Intelligence Dashboard - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="session-check.js"></script>
<script src="menu-rbac.js"></script>

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0b1220;
color:#e5e7eb;
}

.main{
margin-left:220px;
padding:25px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{font-size:22px;font-weight:600;}
.status{background:#16a34a;padding:5px 12px;border-radius:20px;font-size:12px;}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:translateY(-3px);
}

.kpi-title{font-size:12px;color:#9ca3af;}
.kpi-value{font-size:20px;font-weight:600;margin-top:5px;}

/* ALERTS */
.alerts{
margin-bottom:20px;
}

.alert{
padding:10px;
border-radius:6px;
margin-bottom:8px;
font-size:13px;
}

.alert.red{background:#7f1d1d;}
.alert.yellow{background:#78350f;}
.alert.green{background:#14532d;}

/* CHART GRID */
.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.chart-box{
background:#111827;
padding:15px;
border-radius:10px;
}

/* TABLE */
.section{
background:#111827;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

</style>

</head>

<body>

<script>
const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"YOUR_FULL_ANON_KEY"
)
</script>

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data
await initSidebar()
if(typeof applyMenuRBAC==="function"){await applyMenuRBAC()}
document.getElementById("sidebar").style.display="block"
})

async function initSidebar(){
const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

document.getElementById("userName").innerText=session.user.email.split("@")[0]

window.logout=async()=>{
await supabaseClient.auth.signOut()
window.location="login.html"
}
}
</script>

<div class="main">

<div class="header">
<div class="title">Executive Intelligence Dashboard</div>
<div class="status">LIVE</div>
</div>

<!-- ALERTS -->
<div class="alerts" id="alerts"></div>

<!-- KPI -->
<div class="cards">

<div class="card" onclick="go('client-ledger.html')"><div class="kpi-title">Client Invoiced</div><div id="invoiced" class="kpi-value"></div></div>
<div class="card" onclick="go('client-payments.html')"><div class="kpi-title">Client Paid</div><div id="paid" class="kpi-value"></div></div>
<div class="card" onclick="go('billing.html')"><div class="kpi-title">To Be Billed</div><div id="tobebilled" class="kpi-value"></div></div>
<div class="card" onclick="go('client-ledger.html')"><div class="kpi-title">Outstanding</div><div id="outstanding" class="kpi-value"></div></div>

<div class="card" onclick="go('transporter-ledger.html')"><div class="kpi-title">Transporter Cost</div><div id="transporterCost" class="kpi-value"></div></div>
<div class="card" onclick="go('transporter-payments.html')"><div class="kpi-title">Transporter Paid</div><div id="transporterPaid" class="kpi-value"></div></div>
<div class="card" onclick="go('transporter-ledger.html')"><div class="kpi-title">Transporter Payable</div><div id="transporterPayable" class="kpi-value"></div></div>

<div class="card"><div class="kpi-title">Net Profit</div><div id="profit" class="kpi-value"></div></div>

</div>

<!-- CHARTS -->
<div class="charts">

<div class="chart-box">
<canvas id="revenueChart" height="120"></canvas>
</div>

<div class="chart-box">
<canvas id="profitChart" height="120"></canvas>
</div>

</div>

<!-- TABLE -->
<div class="section">
<h3>Top Profitable Trips</h3>
<table>
<thead><tr><th>Trip</th><th>Profit</th></tr></thead>
<tbody id="tripTable"></tbody>
</table>
</div>

</div>

<script>

window.onload=init

async function init(){

const [
{data:trips},
{data:expenses},
{data:invoices},
{data:clientPayments},
{data:transporterPayments}
] = await Promise.all([
supabaseClient.from("trips").select("*"),
supabaseClient.from("expenses").select("*"),
supabaseClient.from("client_invoices").select("*"),
supabaseClient.from("client_payments").select("*"),
supabaseClient.from("transporter_payments").select("*")
])

calculate(trips||[],expenses||[],invoices||[],clientPayments||[],transporterPayments||[])

}

function calculate(trips,expenses,invoices,clientPayments,transporterPayments){

let invoiced=0, paid=0, transporterCost=0, transporterPaid=0

let expenseMap={}
expenses.forEach(e=>{
expenseMap[e.trip_id]=(expenseMap[e.trip_id]||0)+(+e.amount||0)
})

invoices.forEach(i=>invoiced+=+i.invoice_amount||0)
clientPayments.forEach(p=>paid+=+p.amount||0)
transporterPayments.forEach(p=>transporterPaid+=+p.amount||0)

let tripHTML=""
let profits=[]
let labels=[]

trips.forEach(t=>{
let mt=(t.weight_kg||0)/1000
let cost=(t.transporter_rate||0)*mt
let exp=expenseMap[t.id]||0
let net=cost-exp

transporterCost+=net

let revenue=(t.company_rate||0)*mt
let profit=revenue-net

profits.push(profit)
labels.push(t.trip_no)

tripHTML+=`<tr><td>${t.trip_no}</td><td>₹ ${Math.round(profit)}</td></tr>`
})

document.getElementById("tripTable").innerHTML=tripHTML

let outstanding=invoiced-paid
let payable=transporterCost-transporterPaid
let profit=invoiced-transporterCost

set("invoiced",invoiced)
set("paid",paid)
set("tobebilled",0)
set("outstanding",outstanding)
set("transporterCost",transporterCost)
set("transporterPaid",transporterPaid)
set("transporterPayable",payable)
set("profit",profit)

/* ALERTS */
let alertHTML=""
if(outstanding>50000) alertHTML+=`<div class="alert red">⚠ High Client Outstanding</div>`
if(profit<0) alertHTML+=`<div class="alert red">⚠ Company Running in Loss</div>`
if(payable>50000) alertHTML+=`<div class="alert yellow">⚠ High Transporter Payable</div>`

document.getElementById("alerts").innerHTML=alertHTML

/* CHARTS */

new Chart(document.getElementById("revenueChart"),{
type:"line",
data:{
labels:labels,
datasets:[
{label:"Profit",data:profits}
]
}
})

new Chart(document.getElementById("profitChart"),{
type:"bar",
data:{
labels:labels,
datasets:[
{label:"Profit per Trip",data:profits}
]
}
})

}

function set(id,val){
document.getElementById(id).innerText="₹ "+Math.round(val).toLocaleString()
}

function go(page){
window.location.href=page
}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
