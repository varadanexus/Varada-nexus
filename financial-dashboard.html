<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0a0f1c;
color:#e5e7eb;
}

.main{
margin-left:220px;
padding:25px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:22px;
font-weight:600;
}

.badge{
background:#22c55e;
padding:6px 12px;
border-radius:20px;
font-size:12px;
}

/* KPI GRID */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:translateY(-3px);
}

.kpi-title{
font-size:12px;
color:#9ca3af;
}

.kpi-value{
font-size:20px;
font-weight:600;
margin-top:5px;
}

/* ALERTS */
.alerts{
margin-bottom:15px;
}

.alert{
padding:10px;
border-radius:6px;
margin-bottom:6px;
font-size:13px;
}

.red{background:#7f1d1d;}
.yellow{background:#78350f;}
.green{background:#14532d;}

/* CHARTS */
.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.chart-box{
background:#111827;
padding:15px;
border-radius:10px;
}

/* TABLE */
.section{
background:#111827;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

th{
color:#9ca3af;
}

</style>

</head>

<div class="main">

<div class="card" onclick="go('client-payments.html')"><div class="kpi-title">Client Paid</div><div id="paid" class="kpi-value"></div></div>

<div class="section">
<h3>Top Profitable Trips</h3>
<table>
<thead><tr><th>Trip</th><th>Profit</th></tr></thead>
<tbody id="tripTable"></tbody>
</table>
</div>

<div class="section">
<h3>Transporter Pending</h3>
<table>
<thead><tr><th>Transporter</th><th>Pending</th></tr></thead>
<tbody id="transporterTable"></tbody>
</table>
</div>

</div>

<script>

window.onload=init

async function init(){

const [
{data:trips},
{data:expenses},
{data:invoices},
{data:clientPayments},
{data:transporterPayments},
{data:transporters}
] = await Promise.all([
supabaseClient.from("trips").select("*"),
supabaseClient.from("expenses").select("*"),
supabaseClient.from("client_invoices").select("*"),
supabaseClient.from("client_payments").select("*"),
supabaseClient.from("transporter_payments").select("*"),
supabaseClient.from("transporters").select("*")
])

process(trips||[],expenses||[],invoices||[],clientPayments||[],transporterPayments||[],transporters||[])

}

function process(trips,expenses,invoices,clientPayments,transporterPayments,transporters){

let invoiced=0, paid=0, transporterCost=0, transporterPaid=0

let expenseMap={}
expenses.forEach(e=>{
expenseMap[e.trip_id]=(expenseMap[e.trip_id]||0)+(+e.amount||0)
})

invoices.forEach(i=>invoiced+=+i.invoice_amount||0)
clientPayments.forEach(p=>paid+=+p.amount||0)
transporterPayments.forEach(p=>transporterPaid+=+p.amount||0)

let tripHTML=""
let transporterMap={}
let profitData=[]
let labels=[]

trips.forEach(t=>{
let mt=(t.weight_kg||0)/1000
let cost=(t.transporter_rate||0)*mt
let exp=expenseMap[t.id]||0
let net=cost-exp

transporterCost+=net

let revenue=(t.company_rate||0)*mt
let profit=revenue-net

profitData.push(profit)
labels.push(t.trip_no)

tripHTML+=`<tr><td>${t.trip_no}</td><td>₹ ${Math.round(profit)}</td></tr>`

if(!transporterMap[t.transporter_id]) transporterMap[t.transporter_id]=0
transporterMap[t.transporter_id]+=net
})

document.getElementById("tripTable").innerHTML=tripHTML

transporterPayments.forEach(p=>{
transporterMap[p.transporter_id]=(transporterMap[p.transporter_id]||0)-(+p.amount||0)
})

let transporterHTML=""
transporters.forEach(t=>{
transporterHTML+=`<tr><td>${t.transporter_name}</td><td>₹ ${Math.round(transporterMap[t.id]||0)}</td></tr>`
})

document.getElementById("transporterTable").innerHTML=transporterHTML

let outstanding=invoiced-paid
let payable=transporterCost-transporterPaid
let profit=invoiced-transporterCost

set("invoiced",invoiced)
set("paid",paid)
set("outstanding",outstanding)
set("transporterCost",transporterCost)
set("transporterPayable",payable)
set("profit",profit)

/* ALERTS */
let alertHTML=""
if(outstanding>50000) alertHTML+=`<div class="alert red">High Client Outstanding</div>`
if(payable>50000) alertHTML+=`<div class="alert yellow">High Transporter Payable</div>`
if(profit<0) alertHTML+=`<div class="alert red">Company in Loss</div>`

document.getElementById("alerts").innerHTML=alertHTML

/* CHARTS */

new Chart(document.getElementById("monthlyChart"),{
type:"line",
data:{labels:labels,datasets:[{label:"Profit",data:profitData}]}
})

new Chart(document.getElementById("profitChart"),{
type:"bar",
data:{labels:labels,datasets:[{label:"Profit/Trip",data:profitData}]}
})

}

function set(id,val){
document.getElementById(id).innerText="₹ "+Math.round(val).toLocaleString()
}

function go(page){
window.location.href=page
}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
