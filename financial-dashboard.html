<!DOCTYPE html>
<html>

<head>
<title>Executive Dashboard - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#fff;
}

.main{
margin-left:220px;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.status{
background:#22c55e;
padding:6px 14px;
border-radius:20px;
font-size:12px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
padding:18px;
border-radius:16px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
font-size:12px;
color:#94a3b8;
margin:0;
}

.card p{
margin-top:10px;
font-size:24px;
font-weight:700;
}

.green{border-left:4px solid #22c55e;}
.red{border-left:4px solid #ef4444;}
.blue{border-left:4px solid #3b82f6;}
.orange{border-left:4px solid #f59e0b;}

/* SECTION */
.section{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:16px;
margin-bottom:25px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

th{color:#94a3b8;}

.alert{
padding:12px;
border-radius:10px;
margin-bottom:10px;
background:#ef444420;
border-left:4px solid #ef4444;
}
</style>
</head>

<div class="main">

<div class="header">
<h2>Executive Dashboard</h2>
<span class="status">● LIVE</span>
</div>

<!-- KPI -->
<div class="cards">
<div class="card blue"><h3>Revenue</h3><p id="revenue"></p></div>
<div class="card green"><h3>Client Paid</h3><p id="paid"></p></div>
<div class="card orange"><h3>Outstanding</h3><p id="outstanding"></p></div>
<div class="card orange"><h3>To Be Billed</h3><p id="tobebilled"></p></div>

<div class="card orange"><h3>Transporter Cost</h3><p id="cost"></p></div>
<div class="card green"><h3>Transporter Paid</h3><p id="tpaid"></p></div>
<div class="card red"><h3>Transporter Payable</h3><p id="tpay"></p></div>

<div class="card green"><h3>Net Profit</h3><p id="profit"></p></div>
</div>

<!-- ALERTS -->
<div class="section">
<h3>⚠️ Alerts</h3>
<div id="alerts"></div>
</div>

<!-- CHART -->
<div class="section">
<h3>📈 Revenue vs Cost</h3>
<canvas id="chart1"></canvas>
</div>

<!-- MONTHLY -->
<div class="section">
<h3>📊 Monthly Trend</h3>
<canvas id="chart2"></canvas>
</div>

</div>

<script>

window.onload=init
setInterval(init,30000)

async function init(){

const [
{data:trips},
{data:expenses},
{data:payments},
{data:invoices},
{data:clientPayments}
] = await Promise.all([
supabaseClient.from("trips").select("*"),
supabaseClient.from("expenses").select("*"),
supabaseClient.from("transporter_payments").select("*"),
supabaseClient.from("client_invoices").select("*"),
supabaseClient.from("client_payments").select("*")
])

calculate(trips,expenses,payments,invoices,clientPayments)
}

function calculate(trips,expenses,payments,invoices,clientPayments){

let expMap={},totalExp=0
expenses.forEach(e=>{
totalExp+=Number(e.amount||0)
expMap[e.trip_id]=(expMap[e.trip_id]||0)+Number(e.amount||0)
})

let cost=0,alertsHTML=""
trips.forEach(t=>{
let mt=(t.weight_kg||0)/1000
let gross=(t.transporter_rate||0)*mt
let net=gross-(expMap[t.id]||0)
cost+=net

if(net<0){
alertsHTML+=`<div class="alert">Loss Trip: ${t.trip_no} (₹ ${Math.round(net)})</div>`
}
})

let revenue=0,outstanding=0
invoices.forEach(i=>{
revenue+=Number(i.invoice_amount||0)
outstanding+=Number(i.balance_amount||0)
})

let paid=0
clientPayments.forEach(p=>paid+=Number(p.amount||0))

let tpaid=0
payments.forEach(p=>tpaid+=Number(p.amount||0))

let tpay=cost-tpaid
let profit=revenue-cost

/* TO BE BILLED */
let billedIds=invoices.map(i=>i.trip_id)
let tobebilled=0

trips.forEach(t=>{
if(!billedIds.includes(t.id)){
let mt=(t.weight_kg||0)/1000
tobebilled+=(t.company_rate||0)*mt
}
})

/* UI */
set("revenue",revenue)
set("paid",paid)
set("outstanding",outstanding)
set("tobebilled",tobebilled)
set("cost",cost)
set("tpaid",tpaid)
set("tpay",tpay)
set("profit",profit)

document.getElementById("profit").style.color=profit>=0?"#22c55e":"#ef4444"
document.getElementById("alerts").innerHTML=alertsHTML||"No issues"

/* CHART 1 */
new Chart(document.getElementById("chart1"),{
type:'bar',
data:{
labels:["Revenue","Cost"],
datasets:[{data:[revenue,cost]}]
}
})

/* MONTHLY */
let monthMap={}
trips.forEach(t=>{
let m=(t.trip_date||"").slice(0,7)
let mt=(t.weight_kg||0)/1000
let gross=(t.transporter_rate||0)*mt
monthMap[m]=(monthMap[m]||0)+gross
})

new Chart(document.getElementById("chart2"),{
type:'line',
data:{
labels:Object.keys(monthMap),
datasets:[{data:Object.values(monthMap)}]
}
})

}

function set(id,val){
document.getElementById(id).innerText="₹ "+Math.round(val).toLocaleString()
}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
