<!DOCTYPE html>
<html>

<head>
<title>Varada Nexus V5 AI System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Inter;
background:#0b1220;
color:#e2e8f0;
}

.main{
margin-left:220px;
padding:30px;

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

.card{

padding:20px;

.card:hover{
transform:translateY(-5px);
}

.card h3{
font-size:12px;
color:#94a3b8;

}

.card p{
font-size:26px;
margin-top:10px;
font-weight:700;
}

/* SECTION */
.section{
background:#111827;
padding:20px;
border-radius:16px;
margin-bottom:25px;
}

/* AI BOX */
.ai-box{
display:flex;
gap:10px;
margin-top:10px;
}

.ai-box input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
outline:none;
}

.ai-box button{
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.ai-response{
margin-top:15px;
background:#1f2937;
padding:15px;
border-radius:10px;
}

</style>
</head>

<div class="main">

<h2>🧠 V5 AI Business System</h2>

<!-- KPI -->
<div class="cards">
<div class="card"><h3>Revenue</h3><p id="rev"></p></div>
<div class="card"><h3>Profit</h3><p id="profit"></p></div>
<div class="card"><h3>Transport Cost</h3><p id="cost"></p></div>
<div class="card"><h3>Outstanding</h3><p id="outstanding"></p></div>
</div>

<!-- AI ASSISTANT -->
<div class="section">
<h3>🤖 AI Assistant</h3>

<div class="ai-box">
<input id="aiInput" placeholder="Ask about your business...">
<button onclick="runAI()">Ask</button>
</div>

<div id="aiResponse" class="ai-response">Ask something like: "Why is profit low?"</div>

</div>

<!-- CLIENT TABLE -->
<div class="section">
<h3>📊 Client Profitability</h3>
<table id="clientTable"></table>
</div>

<!-- TRANSPORTER -->
<div class="section">
<h3>🚚 Transporter Analysis</h3>
<table id="transporterTable"></table>
</div>

<!-- CHART -->
<div class="section">
<h3>📈 Revenue vs Cost</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>

let GLOBAL_DATA={}

window.onload=init

async function init(){

const [
{data:trips},
{data:expenses},
{data:invoices},
{data:payments}
]=await Promise.all([
supabaseClient.from("trips").select("*"),
supabaseClient.from("expenses").select("*"),
supabaseClient.from("client_invoices").select("*"),
supabaseClient.from("transporter_payments").select("*")
])

process(trips,expenses,invoices,payments)

GLOBAL_DATA={trips,expenses,invoices,payments}
}

function process(trips,expenses,invoices,payments){

let expMap={}
expenses.forEach(e=>{
expMap[e.trip_id]=(expMap[e.trip_id]||0)+Number(e.amount||0)
})

let revenue=0,cost=0,outstanding=0

let clientMap={}
let transporterMap={}

trips.forEach(t=>{
let mt=(t.weight_kg||0)/1000

let company=(t.company_rate||0)*mt
let transport=(t.transporter_rate||0)*mt
let exp=expMap[t.id]||0

let profit=company-(transport+exp)

cost+=transport+exp

let client=t.client_name||"Unknown"
clientMap[client]=(clientMap[client]||0)+profit

let tr=t.transporter_name||"Unknown"
transporterMap[tr]=(transporterMap[tr]||0)+(transport+exp)
})

invoices.forEach(i=>{
revenue+=Number(i.invoice_amount||0)
outstanding+=Number(i.balance_amount||0)
})

let profit=revenue-cost

set("rev",revenue)
set("profit",profit)
set("cost",cost)
set("outstanding",outstanding)

/* TABLES */
renderTable("clientTable",clientMap,"Profit")
renderTable("transporterTable",transporterMap,"Cost")

/* CHART */
new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Revenue","Cost"],
datasets:[{data:[revenue,cost]}]
}
})

}

/* AI LOGIC */
function runAI(){

let q=document.getElementById("aiInput").value.toLowerCase()
let {trips,expenses,invoices,payments}=GLOBAL_DATA

let response=""

/* PROFIT */
let revenue=invoices.reduce((s,i)=>s+Number(i.invoice_amount||0),0)
let cost=0

let expMap={}
expenses.forEach(e=>{
expMap[e.trip_id]=(expMap[e.trip_id]||0)+Number(e.amount||0)
})

trips.forEach(t=>{
let mt=(t.weight_kg||0)/1000
cost+=(t.transporter_rate||0)*mt+(expMap[t.id]||0)
})

let profit=revenue-cost

if(q.includes("profit")){
response=`Profit is ₹${Math.round(profit)}`
}

else if(q.includes("loss")){
response = profit<0 ? "Business is in loss" : "Business is profitable"
}

else if(q.includes("transporter")){
response="Top transporter cost analysis shown above"
}

else if(q.includes("client")){
response="Client profitability table is shown above"
}

else if(q.includes("why")){
if(profit<0){
response="Profit is low due to high transporter cost or expenses"
}else{
response="Profit is stable"
}
}

else{
response="Try asking: profit, loss, transporter, client"
}

document.getElementById("aiResponse").innerText=response
}

/* HELPERS */
function set(id,val){
document.getElementById(id).innerText="₹ "+Math.round(val)
}

function renderTable(id,data,label){
let html=`<tr><th>Name</th><th>${label}</th></tr>`
Object.entries(data).forEach(([k,v])=>{
html+=`<tr><td>${k}</td><td>₹${Math.round(v)}</td></tr>`
})
document.getElementById(id).innerHTML=html
}

</script>

</body>
</html>
