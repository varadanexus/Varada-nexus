<!-- SIDEBAR -->

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

await initSidebar()

if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}

})

async function initSidebar(){

const {data:{session}} = await window.supabaseClient.auth.getSession()
if(!session) return

const authId=session.user.id
const email=session.user.email

document.getElementById("userName").innerText=email.split("@")[0]

const {data:user}=await window.supabaseClient
.from("users").select("id").eq("auth_id",authId).single()

if(!user) return

const {data:userRole}=await window.supabaseClient
.from("user_roles").select("role_id").eq("user_id",user.id).single()

if(!userRole) return

const {data:role}=await window.supabaseClient
.from("roles").select("role_name").eq("id",userRole.role_id).single()

if(role){
document.getElementById("userRole").innerText=role.role_name
}

window.logout=async()=>{
await window.supabaseClient.auth.signOut()
window.location="login.html"
}
}
</script>

<div class="main">

<h2>Financial Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Total Revenue</h3>
<p id="revenue">₹0</p>
</div>

<div class="card">
<h3>Transporter Cost</h3>
<p id="transporterCost">₹0</p>
</div>

<div class="card">
<h3>Total Expenses</h3>
<p id="expenses">₹0</p>
</div>

<div class="card">
<h3>Net Profit</h3>
<p id="profit">₹0</p>
</div>

<div class="card">
<h3>Transporter Paid</h3>
<p id="paid">₹0</p>
</div>

<div class="card">
<h3>Transporter Payable</h3>
<p id="payable">₹0</p>
</div>

</div>

</div>

<script>

window.onload = init

async function init(){

try{

const [
{data:clientPayments},
{data:trips},
{data:expenses},
{data:transporterPayments}
] = await Promise.all([

window.supabaseClient.from("client_payments").select("*"),
window.supabaseClient.from("trips").select("*"),
window.supabaseClient.from("expenses").select("*"),
window.supabaseClient.from("transporter_payments").select("*")

])

calculate(
clientPayments||[],
trips||[],
expenses||[],
transporterPayments||[]
)

}catch(err){
console.error("Load Error:",err)
}

}

function calculate(clientPayments,trips,expenses,transporterPayments){

let revenue=0
let transporterCost=0
let totalExpenses=0
let transporterPaid=0

/* EXPENSE MAP */
let expenseMap={}

expenses.forEach(e=>{
totalExpenses += Number(e.amount||0)

if(!expenseMap[e.trip_id]) expenseMap[e.trip_id]=0
expenseMap[e.trip_id]+=Number(e.amount||0)
})

/* ✅ REAL REVENUE (CLIENT PAYMENTS) */
clientPayments.forEach(p=>{
revenue += Number(p.amount||0)
})

/* ✅ TRANSPORTER COST */
trips.forEach(t=>{
let mt=(Number(t.weight_kg)||0)/1000
let gross=(Number(t.transporter_rate)||0)*mt
let tripExpense=expenseMap[t.id]||0

transporterCost += (gross - tripExpense)
})

/* ✅ TRANSPORTER PAID */
transporterPayments.forEach(p=>{
transporterPaid += Number(p.amount||0)
})

/* ✅ PAYABLE */
let transporterPayable = transporterCost - transporterPaid

/* ✅ PROFIT */
let profit = revenue - transporterPaid - totalExpenses

/* UI */
document.getElementById("revenue").innerText="₹ "+Math.round(revenue).toLocaleString()
document.getElementById("transporterCost").innerText="₹ "+Math.round(transporterCost).toLocaleString()
document.getElementById("expenses").innerText="₹ "+Math.round(totalExpenses).toLocaleString()
document.getElementById("profit").innerText="₹ "+Math.round(profit).toLocaleString()
document.getElementById("paid").innerText="₹ "+Math.round(transporterPaid).toLocaleString()
document.getElementById("payable").innerText="₹ "+Math.round(transporterPayable).toLocaleString()

}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
