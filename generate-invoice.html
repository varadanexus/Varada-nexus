<div class="main">

<h2>Generate Client Invoice</h2>

<div class="card">

<select id="clientSelect"></select>

<button onclick="loadTrips()">Load Trips</button>

</div>


<div class="card">

<table>

<thead>

<tr>
<th>Select</th>
<th>Trip</th>
<th>Date</th>
<th>Weight MT</th>
<th>Rate</th>
<th>Amount</th>
</tr>

</thead>

<tbody id="tripTable"></tbody>

</table>

<br>

<div class="summary">
Total Amount: ₹ <span id="totalAmount">0</span>
</div>

<br>

<button onclick="generateInvoice()">Generate Invoice</button>

<button onclick="downloadInvoice()">Download PDF</button>

</div>

</div>


<script>

let trips=[]
let selectedTrips=[]


init()

async function init(){

const {data}=await supabaseClient
.from("trips")
.select("client_name")
.not("client_name","is",null)

let clients=[...new Set(data.map(x=>x.client_name))]

let html='<option value="">Select Client</option>'

clients.forEach(c=>{
html+=`<option value="${c}">${c}</option>`
})

document.getElementById("clientSelect").innerHTML=html

}



/* LOAD TRIPS */

async function loadTrips(){

let client=document.getElementById("clientSelect").value

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("client_name",client)
.is("invoice_id",null)
.order("trip_no",{ascending:false})

trips=data || []

let html=""

trips.forEach(t=>{

let mt=t.weight_kg/1000
let amount=t.company_rate*mt

html+=`

<tr>

<td><input type="checkbox" value="${t.id}" onchange="calculateTotal()"></td>

<td>${t.trip_no}</td>

<td>${t.trip_date}</td>

<td>${mt.toFixed(2)}</td>

<td>${t.company_rate}</td>

<td>${amount.toFixed(2)}</td>

</tr>

`

})

document.getElementById("tripTable").innerHTML=html

}



/* CALCULATE TOTAL */

function calculateTotal(){

let checked=document.querySelectorAll("#tripTable input:checked")

let total=0
selectedTrips=[]

checked.forEach(c=>{

let trip=trips.find(t=>t.id==c.value)

let mt=trip.weight_kg/1000
let amount=trip.company_rate*mt

total+=amount

selectedTrips.push(trip)

})

document.getElementById("totalAmount").innerText=total.toFixed(2)

}



/* GENERATE INVOICE */

async function generateInvoice(){

if(selectedTrips.length==0){
alert("Select trips")
return
}

let invoiceNo="INV"+Date.now()

let total=Number(document.getElementById("totalAmount").innerText)

const {data}=await supabaseClient
.from("client_invoices")
.insert({

invoice_no:invoiceNo,
client_name:document.getElementById("clientSelect").value,
invoice_amount:total,
amount_paid:0,
balance_amount:total,
payment_status:"Pending"

})
.select()
.single()

for(let trip of selectedTrips){

await supabaseClient
.from("trips")
.update({invoice_id:data.id})
.eq("id",trip.id)

}

alert("Invoice Generated")

loadTrips()

}



/* DOWNLOAD PDF */

function downloadInvoice(){

if(selectedTrips.length==0){
alert("Generate invoice first")
return
}

const { jsPDF } = window.jspdf

let doc=new jsPDF()

doc.text("VARADA NEXUS PRIVATE LIMITED",20,20)

doc.text("Client: "+document.getElementById("clientSelect").value,20,30)

let rows=[]

selectedTrips.forEach(t=>{

let mt=t.weight_kg/1000
let amount=t.company_rate*mt

rows.push([
t.trip_no,
t.trip_date,
mt.toFixed(2),
t.company_rate,
amount.toFixed(2)
])

})

doc.autoTable({

head:[["Trip","Date","Weight MT","Rate","Amount"]],
body:rows,
startY:40

})

doc.text("Total: ₹ "+document.getElementById("totalAmount").innerText,20,doc.lastAutoTable.finalY+10)

doc.save("invoice.pdf")

}

</script>
