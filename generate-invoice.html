<!-- SIDEBAR -->

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data
await initSidebar()
})

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId=session.user.id
const email=session.user.email

document.getElementById("userName").innerText=email.split("@")[0]

const {data:user}=await supabaseClient
.from("users").select("id").eq("auth_id",authId).single()

if(!user) return

const {data:userRole}=await supabaseClient
.from("user_roles").select("role_id").eq("user_id",user.id).single()

if(!userRole) return

const {data:role}=await supabaseClient
.from("roles").select("role_name").eq("id",userRole.role_id).single()

if(role){
document.getElementById("userRole").innerText=role.role_name
}

if(typeof applyMenuRBAC==="function"){
applyMenuRBAC()
}

window.logout=async()=>{
await supabaseClient.auth.signOut()
window.location="login.html"
}

<div class="main">

<h2>Generate Client Invoice</h2>

<div class="card">
<select id="clientSelect"></select>
<button onclick="loadTrips()">Load Trips</button>
</div>

<div class="card">

<table>
<thead>
<tr>
<th>Select</th>
<th>Trip</th>
<th>Date</th>
<th>Weight MT</th>
<th>Rate</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="tripTable"></tbody>
</table>

<div class="summary">
Total Amount: ₹ <span id="totalAmount">0</span>
</div>

<br>

<button onclick="generateInvoice()">Generate Invoice</button>
<button onclick="downloadInvoice()">Download PDF</button>

</div>

</div>

<script>

let trips=[]
let selectedTrips=[]

window.onload = init

async function init(){

const {data}=await supabaseClient
.from("trips")
.select("client_name")

let clients=[...new Set((data||[]).map(x=>x.client_name).filter(Boolean))]

clientSelect.innerHTML='<option value="">Select Client</option>' +
clients.map(c=>`<option value="${c}">${c}</option>`).join("")

}

/* LOAD TRIPS */

async function loadTrips(){

let client=clientSelect.value

if(!client){
alert("Select client")
return
}

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("client_name",client)
.is("invoice_id",null)
.order("trip_no",{ascending:false})

trips=data||[]

renderTrips()

}

/* RENDER */

function renderTrips(){

let html=""

trips.forEach(t=>{

let mt=(Number(t.weight_kg)||0)/1000
let rate=Number(t.company_rate)||0
let amount=mt*rate

html+=`
<tr>
<td><input type="checkbox" value="${t.id}" onchange="calculateTotal()"></td>
<td>${t.trip_no}</td>
<td>${t.trip_date||""}</td>
<td>${mt.toFixed(2)}</td>
<td>${rate}</td>
<td>${amount.toFixed(2)}</td>
</tr>
`

})

tripTable.innerHTML=html

}

/* TOTAL */

function calculateTotal(){

let checked=document.querySelectorAll("#tripTable input:checked")

let total=0
selectedTrips=[]

checked.forEach(c=>{

let t=trips.find(x=>x.id==c.value)

let mt=(Number(t.weight_kg)||0)/1000
let amount=mt*(Number(t.company_rate)||0)

total+=amount
selectedTrips.push(t)

})

totalAmount.innerText=total.toFixed(2)

}

/* GENERATE */

async function generateInvoice(){

if(selectedTrips.length===0){
alert("Select trips")
return
}

try{

let invoiceNo="INV-"+Date.now()

let total=Number(totalAmount.innerText)

const {data,error}=await supabaseClient
.from("client_invoices")
.insert({
invoice_no:invoiceNo,
client_name:clientSelect.value,
invoice_amount:total,
amount_paid:0,
balance_amount:total,
payment_status:"Pending"
})
.select()
.single()

if(error) throw error

for(let t of selectedTrips){

await supabaseClient
.from("trips")
.update({invoice_id:data.id})
.eq("id",t.id)

}

alert("Invoice Generated")

selectedTrips=[]
totalAmount.innerText="0"
tripTable.innerHTML=""

}catch(err){
console.error(err)
alert("Error generating invoice")
}

}

/* PDF */

function downloadInvoice(){

if(selectedTrips.length===0){
alert("Generate invoice first")
return
}

const { jsPDF } = window.jspdf
let doc=new jsPDF()

doc.text("VARADA NEXUS PRIVATE LIMITED",20,20)
doc.text("Client: "+clientSelect.value,20,30)

let rows=[]

selectedTrips.forEach(t=>{
let mt=(Number(t.weight_kg)||0)/1000
let amount=mt*(Number(t.company_rate)||0)

rows.push([
t.trip_no,
t.trip_date,
mt.toFixed(2),
t.company_rate,
amount.toFixed(2)
])
})

doc.autoTable({
head:[["Trip","Date","Weight MT","Rate","Amount"]],
body:rows,
startY:40
})

doc.text("Total: ₹ "+totalAmount.innerText,20,doc.lastAutoTable.finalY+10)

doc.save("invoice.pdf")

}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
