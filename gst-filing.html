<!DOCTYPE html>
<html>

<head>
<title>GST Filing - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0a0f1c;
color:#e5e7eb;
}

.main{
margin-left:240px;
padding:24px;
}

.card{
background:#111827;
padding:16px;
border-radius:12px;
margin-bottom:16px;
}

input{
padding:8px;
border-radius:8px;
background:#0f172a;
color:white;
border:1px solid rgba(255,255,255,0.1);
}

button{
padding:8px 14px;
background:#3b82f6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

th{
color:#9ca3af;
text-align:left;
}
</style>
</head>

<body>

<div class="main">

<h2>GST Filing (CA Ready)</h2>

<div class="card">

<input type="month" id="monthFilter">

<button onclick="loadGST()">Load</button>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="exportJSON()">Export JSON</button>

</div>

<div class="card">
<h3>GST Data</h3>
<table>
<thead>
<tr>
<th>Invoice</th>
<th>Client</th>
<th>GSTIN</th>
<th>Type</th>
<th>Taxable</th>
<th>CGST</th>
<th>SGST</th>
<th>Total GST</th>
<th>Invoice</th>
</tr>
</thead>
<tbody id="gstTable"></tbody>
</table>
</div>

<div class="card">
<h3>Summary</h3>
<div id="summary"></div>
</div>

</div>

<script>

let globalData = []

async function loadGST(){

let month = document.getElementById("monthFilter").value

if(!month){
alert("Select month")
return
}

let start = new Date(month + "-01")
let end = new Date(start)
end.setMonth(end.getMonth()+1)

/* 🔥 FETCH INVOICES */
const { data:invoices } = await supabaseClient
.from("client_invoices_gst")
.select("*")
.gte("created_at", start.toISOString())
.lt("created_at", end.toISOString())

/* 🔥 FETCH CLIENTS */
const { data:clients } = await supabaseClient
.from("clients")
.select("company,gst_no")

let rows = ""

let totalTaxable=0,totalGST=0,totalInvoice=0
let b2b=0,b2c=0

globalData = []

for(let inv of (invoices || [])){

let client = clients.find(c=>c.company===inv.client_name)

let gstin = client?.gst_no || ""
let type = gstin ? "B2B" : "B2C"

let taxable = Number(inv.total_margin || 0)
let gst = Number(inv.gst_total || 0)

let cgst = gst/2
let sgst = gst/2

totalTaxable += taxable
totalGST += gst
totalInvoice += Number(inv.invoice_amount || 0)

if(type==="B2B") b2b+=taxable
else b2c+=taxable

/* STORE FOR EXPORT */
globalData.push({
invoice: inv.invoice_no,
client: inv.client_name,
gstin,
type,
taxable,
cgst,
sgst,
gst,
invoice_value: inv.invoice_amount
})

rows += `
<tr>
<td>${inv.invoice_no}</td>
<td>${inv.client_name}</td>
<td>${gstin || "-"}</td>
<td>${type}</td>
<td>₹${taxable.toFixed(2)}</td>
<td>₹${cgst.toFixed(2)}</td>
<td>₹${sgst.toFixed(2)}</td>
<td>₹${gst.toFixed(2)}</td>
<td>₹${Number(inv.invoice_amount).toFixed(2)}</td>
</tr>
`
}

document.getElementById("gstTable").innerHTML = rows

document.getElementById("summary").innerHTML = `
Total Taxable: ₹${totalTaxable.toFixed(2)} <br>
Total GST: ₹${totalGST.toFixed(2)} <br>
Total Invoice: ₹${totalInvoice.toFixed(2)} <br><br>

B2B Sales: ₹${b2b.toFixed(2)} <br>
B2C Sales: ₹${b2c.toFixed(2)}
`
}

/* 🔥 EXPORT EXCEL */
function exportExcel(){

let csv = "Invoice,Client,GSTIN,Type,Taxable,CGST,SGST,Total GST,Invoice Value\n"

globalData.forEach(r=>{
csv += `${r.invoice},${r.client},${r.gstin},${r.type},${r.taxable},${r.cgst},${r.sgst},${r.gst},${r.invoice_value}\n`
})

let blob = new Blob([csv], {type:"text/csv"})
let url = URL.createObjectURL(blob)

let a = document.createElement("a")
a.href = url
a.download = "GST_Report.csv"
a.click()
}

/* 🔥 EXPORT JSON (GSTR-1 STYLE) */
function exportJSON(){

let b2bMap = {}
let b2cTotal = 0

globalData.forEach(r=>{

/* 🔥 B2B */
if(r.gstin){

if(!b2bMap[r.gstin]){
b2bMap[r.gstin] = {
ctin: r.gstin,
inv: []
}
}

b2bMap[r.gstin].inv.push({
inum: r.invoice,
idt: new Date().toLocaleDateString("en-GB"),
val: r.invoice_value,
pos: "37", // Andhra Pradesh
rchrg: "N",
inv_typ: "R",
itms: [{
num: 1,
itm_det: {
txval: r.taxable,
rt: 18,
camt: r.cgst,
samt: r.sgst,
csamt: 0
}
}]
})

}

/* 🔥 B2C */
else{
b2cTotal += r.taxable
}

})

/* 🔥 FINAL STRUCTURE */
let finalJSON = {
gstin: "37AAKCV7495B1ZV",   // YOUR GSTIN
fp: document.getElementById("monthFilter").value.replace("-", ""),
version: "GST1.0",

b2b: Object.values(b2bMap),

b2cs: [{
sply_ty: "INTRA",
txval: b2cTotal,
rt: 18,
camt: b2cTotal * 0.09,
samt: b2cTotal * 0.09,
csamt: 0
}]

}

/* DOWNLOAD */
let blob = new Blob([JSON.stringify(finalJSON,null,2)], {type:"application/json"})
let url = URL.createObjectURL(blob)

let a = document.createElement("a")
a.href = url
a.download = "GSTR1_Final.json"
a.click()
}

</script>

</body>
</html>
