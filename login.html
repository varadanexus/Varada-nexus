<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

/* ================= BODY ================= */
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(-45deg,#0f172a,#1e3a8a,#0ea5e9,#020617);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ================= NAVBAR ================= */
header{
position:sticky;
top:0;
z-index:1000;
background:rgba(10,15,30,0.6);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.06);
}

.nav-container{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
}

.nav-left{
display:flex;
align-items:center;
gap:12px;
}

.logo{
height:44px;
}

.brand-name{
font-size:20px;
font-weight:600;
}

.brand-sub{
font-size:11px;
opacity:0.6;
}

/* ================= MAIN ================= */
main{
display:flex;
justify-content:center;
align-items:center;
height:85vh;
}

/* ================= CARD ================= */
.login-card{
position:relative;
background:rgba(15,23,42,0.65);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.08);
padding:45px 35px;
border-radius:18px;
width:380px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* FIX CLICK ISSUE */
.login-card::before{
pointer-events:none;
}

/* ================= TEXT ================= */
.brand h2{
margin:0;
font-size:22px;
}

.brand p{
font-size:13px;
color:#cbd5f5;
margin-bottom:25px;
}

/* ================= FLOATING FIELD ================= */
.field{
position:relative;
margin-bottom:18px;
}

.field input,
.field select{
width:100%;
height:50px;
padding:18px 40px 0 40px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.10);
color:white;
font-size:14px;
box-sizing:border-box;
}

/* ICON */
.field .icon{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
font-size:14px;
opacity:0.6;
}

/* FLOAT LABEL */
.field label{
position:absolute;
left:40px;
top:50%;
transform:translateY(-50%);
font-size:13px;
color:#94a3b8;
transition:0.3s;
pointer-events:none;
}

/* ACTIVE STATE */
.field input:focus + label,
.field input:not(:placeholder-shown) + label{
top:8px;
font-size:11px;
color:#93c5fd;
}

.field input:focus{
outline:1px solid rgba(99,102,241,0.6);
background:rgba(255,255,255,0.16);
}

/* PASSWORD SHOW */
.show-password{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
font-size:12px;
cursor:pointer;
color:#93c5fd;
}

/* ================= BUTTON ================= */
button{
width:100%;
height:46px;
border-radius:10px;
border:none;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 8px 20px rgba(99,102,241,0.4);
}

/* ERROR */
.error{
color:#f87171;
margin-top:10px;
}

</style>
</head>

<body>

<header>
<div class="nav-container">
<div class="nav-left">
<img src="images/logo.png" class="logo">
<div>
<div class="brand-name">Varada Nexus</div>
<div class="brand-sub">Private Limited</div>
</div>
</div>
</div>
</header>

<main>
<div class="login-card">

<div class="brand">
<h2>Welcome Back</h2>
<p>Secure access to Varada Nexus ERP</p>
</div>

<!-- LOGIN TYPE -->
<div class="field">
<span class="icon">👤</span>
<select id="loginType">
<option value="staff">Staff Login</option>
<option value="transporter">Customer Login</option>
</select>
</div>

<!-- EMAIL -->
<div class="field">
<span class="icon">📧</span>
<input type="email" id="email" placeholder=" " required>
<label>Email</label>
</div>

<!-- PASSWORD -->
<div class="field">
<span class="icon">🔒</span>
<input type="password" id="password" placeholder=" " required>
<label>Password</label>
<span class="show-password" onclick="togglePassword()">Show</span>
</div>

<button id="loginBtn" onclick="login()">Login</button>

<div id="error" class="error"></div>

</div>
</main>

<script>

/* PASSWORD */
function togglePassword(){
let p=document.getElementById("password");
p.type=p.type==="password"?"text":"password";
}

/* SUPABASE */
const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
);

/* LOGIN */
async function login(){
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

const {data,error}=await supabaseClient.auth.signInWithPassword({
email,password
});

if(error){
document.getElementById("error").innerText=error.message;
return;
}

alert("Login success");
}

</script>

</body>
</html>
