<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Varada Nexus</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  
<style>

.login-container{
display:flex;
justify-content:center;
align-items:center;
padding:80px 20px;
}

.login-card{
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 8px 22px rgba(0,0,0,0.12);
width:380px;
text-align:center;
}

.login-card h2{
color:#1f3c88;
margin-bottom:25px;
}

.login-card select,
.login-card input{
width:100%;
box-sizing:border-box;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
font-size:14px;
}

.password-wrapper{
position:relative;
width:100%;
margin-bottom:15px;
}

.password-wrapper input{
width:100%;
box-sizing:border-box;
padding-right:60px;
margin-bottom:0;
}

.show-password{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:13px;
color:#1f3c88;
}

.login-card button{
width:100%;
padding:11px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
font-size:15px;
cursor:pointer;
}

.login-card button:hover{
background:#162f6d;
}

.error{
color:#d9534f;
margin-top:12px;
}

</style>

</head>

<body>

<header>

<div class="logo-wrapper">
<img src="images/logo.png" alt="Varada Nexus Logo" class="logo">
<h1>Varada Nexus Private Limited</h1>
</div>

<nav>
<a href="index.html">Home</a>
<a href="founder.html">Founder</a>
<a href="services.html">Services</a>
<a href="contact.html">Contact</a>
<a href="login.html">Login</a>
</nav>

</header>

<main>

<div class="login-container">

<div class="login-card">

<h2>Portal Login</h2>

<select id="loginType">
<option value="staff">Staff Login</option>
<option value="transporter">Customer Login</option>
</select>

<input type="email" id="email" placeholder="Email">

<div class="password-wrapper">

<input type="password" id="password" placeholder="Password">

<span class="show-password" onclick="togglePassword()">Show</span>

</div>

<button onclick="login()">Login</button>

<div id="error" class="error"></div>

</div>

</div>

</main>

<footer>
&copy; 2025 Varada Nexus Private Limited
</footer>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

/* SHOW PASSWORD */

function togglePassword(){

let pass=document.getElementById("password")
let btn=document.querySelector(".show-password")

if(pass.type==="password"){
pass.type="text"
btn.innerText="Hide"
}else{
pass.type="password"
btn.innerText="Show"
}

}

/* LOGIN */

async function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let loginType=document.getElementById("loginType").value

document.getElementById("error").innerText=""

/* AUTH LOGIN */

const {data,error}=await supabaseClient.auth.signInWithPassword({
email:email,
password:password
})

if(error){
document.getElementById("error").innerText=error.message
return
}

let authId=data.user.id

/* FIND USER */

const {data:dbUser,error:userError}=await supabaseClient
.from("users")
.select("*")
.eq("auth_id",authId)
.single()

if(userError || !dbUser){

// 🔥 CHECK TRANSPORTER
const {data:transporter} = await supabaseClient
.from("transporters")
.select("*")
.eq("auth_id", authId)
.maybeSingle()

if(transporter){
window.location.href = "transporter-dashboard.html"
return
}

// 🔥 CHECK AGENT
const {data:agent} = await supabaseClient
.from("agents")
.select("*")
.eq("auth_id", authId)
.maybeSingle()

if(agent){
window.location.href = "agent-dashboard.html"
return
}

// ❌ NOT FOUND ANYWHERE
document.getElementById("error").innerText="User not registered in ERP"
return
}

/* GET ROLE */

const {data:userRoles,error:roleError}=await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",dbUser.id)

if(roleError || !userRoles || userRoles.length===0){
document.getElementById("error").innerText="User role not assigned"
return
}

let roleId=userRoles[0].role_id

/* GET ROLE NAME */

const {data:role}=await supabaseClient
.from("roles")
.select("role_name")
.eq("id",roleId)
.single()

let roleName = (role?.role_name || "").toLowerCase().trim()

console.log("ROLE DETECTED:", roleName)

/* SESSION TOKEN */

let sessionToken = crypto.randomUUID()

await supabaseClient
.from("users")
.update({session_token:sessionToken})
.eq("id",dbUser.id)

localStorage.setItem("erp_session_token",sessionToken)

/* FLEXIBLE ROLE CHECK */

const isTransporter =  
roleName === "customer" ||  
roleName === "transporter" ||  
roleName.includes("customer") ||  
roleName.includes("transporter")

const isAgent =
roleName === "agent" ||
roleName.includes("agent")

/* LOGIN TYPE VALIDATION */

if(loginType==="transporter" && !isTransporter){

document.getElementById("error").innerText="This account is not a customer"

await supabaseClient.auth.signOut()
return
}

if(loginType==="staff" && isTransporter){

document.getElementById("error").innerText="Customers must use customer login"

await supabaseClient.auth.signOut()
return
}

/* REDIRECT */

/* 🔥 PRIORITY BASED REDIRECT */

if(agent){
  window.location.href="agent-dashboard.html"
  return
}

if(isTransporter){
  window.location.href="transporter-dashboard.html"
  return
}

window.location.href="dashboard.html" // staff/admin
}


</script>

</body>
</html>
