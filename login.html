<!DOCTYPE html>
<html>
<head>
<title>Varada Nexus Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-card{
background:white;
padding:35px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
width:360px;
text-align:center;
}

h2{
margin-bottom:25px;
color:#1f3c88;
}

select,input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
font-size:14px;
}

button{
width:100%;
padding:10px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#162f6d;
}

.error{
color:#d9534f;
margin-top:12px;
font-size:14px;
}

</style>
</head>

<body>

<div class="login-card">

<h2>Varada Nexus Login</h2>

<select id="loginType">
<option value="staff">Staff Login</option>
<option value="transporter">Customer Login</option>
</select>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="error" class="error"></div>

</div>

<script>

/* SUPABASE CONNECTION */

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

async function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let loginType=document.getElementById("loginType").value

document.getElementById("error").innerText=""

/* LOGIN */

const {data,error}=await supabaseClient.auth.signInWithPassword({
email:email,
password:password
})

if(error){

document.getElementById("error").innerText=error.message
return

}

let authId=data.user.id

/* GET ROLE FROM user_roles */

const {data:userRole,error:roleError}=await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",authId)
.single()

if(roleError || !userRole){

document.getElementById("error").innerText="User role not assigned"
return

}

/* GET ROLE NAME */

const {data:role}=await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

let roleName=role.role_name.toLowerCase()

/* VALIDATE LOGIN TYPE */

if(loginType==="transporter" && roleName!=="transporter"){

document.getElementById("error").innerText="This account is not a customer"

await supabaseClient.auth.signOut()

return

}

if(loginType==="staff" && roleName==="transporter"){

document.getElementById("error").innerText="Customers must use customer login"

await supabaseClient.auth.signOut()

return

}

/* REDIRECT */

if(roleName==="transporter"){

window.location.href="transporter-dashboard.html"

}else{

window.location.href="dashboard.html"

}

}

</script>

</body>
</html>
