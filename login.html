<!DOCTYPE html><html><head><title>Varada Nexus Login</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-card{
background:white;
padding:35px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
width:350px;
text-align:center;
}

h2{
margin-bottom:25px;
}

select,input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
}

</style></head><body><div class="login-card"><h2>Varada Nexus Login</h2><select id="loginType">
<option value="staff">Staff Login</option>
<option value="transporter">Transporter Login</option>
</select><input type="email" id="email" placeholder="Email"><input type="password" id="password" placeholder="Password"><button onclick="login()">Login</button>

<div id="error" class="error"></div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"YOUR_ANON_KEY"
)

async function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let loginType=document.getElementById("loginType").value

const {data,error}=await supabaseClient.auth.signInWithPassword({
email:email,
password:password
})

if(error){
document.getElementById("error").innerText="Invalid email or password"
return
}

let authId=data.user.id

/* GET USER */

const {data:user}=await supabaseClient
.from("users")
.select("*")
.eq("auth_id",authId)
.single()

if(!user){
document.getElementById("error").innerText="User not registered"
return
}

/* GET ROLE */

const {data:roleData}=await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

/* GET ROLE NAME */

const {data:role}=await supabaseClient
.from("roles")
.select("role_name")
.eq("id",roleData.role_id)
.single()

let roleName=role.role_name.toLowerCase()

/* VALIDATE LOGIN TYPE */

if(loginType==="transporter" && roleName!=="transporter"){
document.getElementById("error").innerText="Not a transporter account"
return
}

/* REDIRECT */

if(roleName==="transporter"){
window.location.href="transporter-dashboard.html"
}else{
window.location.href="dashboard.html"
}

}

</script></body>
</html>
