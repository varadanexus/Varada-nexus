<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Varada Nexus</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

/* 🔥 ANIMATED BACKGROUND */
body{
margin:0;
font-family:'Inter',sans-serif;
height:100vh;
background:linear-gradient(-45deg,#0f172a,#1e3a8a,#0ea5e9,#020617);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* HEADER */
/* HEADER */
header{
display:flex;
align-items:center;
padding:16px 30px;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.05);
}

header::after{
content:"";
position:absolute;
left:0;
bottom:0;
width:100%;
height:2px;
background:linear-gradient(90deg,#3b82f6,#6366f1,#0ea5e9);
background-size:200% 100%;
opacity:0.6;
animation:headerFlow 6s linear infinite;
}

@keyframes headerFlow{
0%{background-position:0%}
100%{background-position:200%}
}
  
/* WRAPPER */
.logo-wrapper{
display:flex;
align-items:center;
gap:12px;
}

/* LOGO */
.logo::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.35),
transparent
);
animation:shine 3s infinite;
}

@keyframes shine{
0%{left:-100%}
100%{left:150%}
}

/* TEXT BLOCK */
.brand-text{
display:flex;
flex-direction:column;
justify-content:center;
line-height:1.15;
}

/* TITLE */
.brand-text h1{
margin:0;
font-size:17px;
font-weight:600;
letter-spacing:0.4px;

background: linear-gradient(90deg,#ffffff,#cbd5f5);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

/* TAGLINE */
.brand-text p{
margin:4px 0 0 0;
font-size:10.5px;
color:#cbd5f5;
letter-spacing:1.2px;
opacity:0.9;
text-transform:uppercase;
font-weight:500;
}

/* 🔥 SUBTLE PREMIUM GLOW */
@keyframes logoGlow{
0%{
filter: drop-shadow(0 0 4px rgba(255,215,150,0.15));
transform:scale(1);
}
100%{
filter: drop-shadow(0 0 14px rgba(255,215,150,0.35));
transform:scale(1.02);
}
}
/* MAIN */
main{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

/* 🔥 GLASS CARD */
.login-card{
background:rgba(15,23,42,0.75);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.08);
padding:40px 32px;
border-radius:16px;
width:380px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
text-align:center;
}

/* 🔥 BRAND SECTION */
.brand{
margin-bottom:20px;
}

.brand img{
height:60px;
width:auto;
object-fit:contain;
display:block;
margin:0 auto 12px auto;
}

.brand h2{
margin:0;
font-size:20px;
}

.brand p{
font-size:13px;
color:#cbd5f5;
}

/* INPUTS FIXED */

/* 🔥 UNIFORM FIELD SYSTEM */
.field{
position:relative;
width:100%;
height:44px;
margin-bottom:15px;
display:block;
}

.field input,
.field select{
box-sizing:border-box; 
width:100%;
height:100%;
padding:0 12px;
border-radius:8px;
border:none;
outline:none;
background:rgba(255,255,255,0.12);
color:white;
font-size:14px;
}

/* FOCUS */
.field input:focus,
.field select:focus{
outline:1px solid rgba(99,102,241,0.6);
background:rgba(255,255,255,0.16);
}

/* PLACEHOLDER */
.field input::placeholder{
color:#94a3b8;
}

/* PASSWORD BUTTON */
.show-password{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
font-size:12px;
color:#93c5fd;
cursor:pointer;
}
  
.login-card input:focus,
.login-card select:focus{
outline:1px solid rgba(99,102,241,0.6);
background:rgba(255,255,255,0.16);
}
  
/* PLACEHOLDER */
.login-card input::placeholder{
color:#94a3b8;
}

/* SELECT TEXT ALIGN */
.login-card select{
color:#e2e8f0;
}


/* BUTTON */
.field button{
width:100%;
height:100%;
border-radius:8px;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:#f1f5f9;
font-weight:600;
border:none;
cursor:pointer;
transition:0.3s;
}

.login-card button{
width:100%;
height:44px;
box-sizing:border-box;   /* 🔥 SAME FIX */
border-radius:8px;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:#f1f5f9;
font-weight:600;
border:none;
cursor:pointer;
transition:0.3s;
}

.field{
max-width:100%;
}
  
/* ERROR */
.error{
color:#f87171;
margin-top:10px;
}

/* FOOTER */
footer{
text-align:center;
padding:10px;
font-size:13px;
color:#cbd5f5;
}

</style>

</head>

<body>

<header>
<div class="logo-wrapper">

<img src="images/logo.png" class="logo">

<div class="brand-text">
<h1>Varada Nexus Private Limited</h1>
<p>Integrated Solutions. Scalable Across Industries.</p>
</div>

</div>
</header>

<main>

<div class="login-card">

<!-- 🔥 BRANDING -->
<div class="brand">
<img src="images/logo.png" style="max-height:50px;">
<h2>Welcome Back</h2>
<p>Secure access to Varada Nexus ERP</p>
</div>

<div class="field">
<select id="loginType">
<option value="staff">Staff Login</option>
<option value="transporter">Customer Login</option>
</select>
</div>

<div class="field">
<input type="email" id="email" placeholder="Email">
</div>

<div class="field">
<input type="password" id="password" placeholder="Password">
<span class="show-password" onclick="togglePassword()">Show</span>
</div>

<div class="field">
<button id="loginBtn" onclick="login()">Login</button>
</div>

<div id="error" class="error"></div>

</div>

</main>

<footer>
© 2025 Varada Nexus Private Limited
</footer>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

/* TOGGLE PASSWORD */
function togglePassword(){
let pass=document.getElementById("password")
pass.type = pass.type==="password" ? "text" : "password"
}

/* LOGIN (UNCHANGED LOGIC) */
async function login(){

let btn = document.getElementById("loginBtn")

if(btn.disabled) return   // 🚫 PREVENT DOUBLE CLICK

btn.disabled = true
btn.innerText = "Logging in..."

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let loginType = document.getElementById("loginType").value

document.getElementById("error").innerText=""

const {data,error}=await supabaseClient.auth.signInWithPassword({
email,password
})

if(error){
document.getElementById("error").innerText=error.message
btn.disabled = false
btn.innerText = "Login"
return
}

let authId=data.user.id

/* CUSTOMER LOGIN */
if(loginType === "transporter"){

  const {data:agentCheck} = await supabaseClient
  .from("agents")
  .select("id, is_active")
  .eq("auth_id", authId)
  .maybeSingle()

  if(agentCheck){
    if(agentCheck.is_active === false){
      document.getElementById("error").innerText = "Agent account is inactive"
      return
    }
    window.location.href="agent-dashboard.html"
    return
  }

  const {data:transporter} = await supabaseClient
  .from("transporters")
  .select("id")
  .eq("auth_id", authId)
  .maybeSingle()

  if(transporter){
    window.location.href="transporter-dashboard.html"
    return
  }

document.getElementById("error").innerText="Customer not registered"
btn.disabled = false
btn.innerText = "Login"
return
}

/* STAFF LOGIN */
const {data:dbUser,error:userError}=await supabaseClient
.from("users")
.select("*")
.eq("auth_id",authId)
.single()

if(userError || !dbUser){
document.getElementById("error").innerText="User not registered in ERP"
btn.disabled = false
btn.innerText = "Login"
return
}

const {data:userRoles}=await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",dbUser.id)

const {data:role}=await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRoles[0].role_id)
.single()

let roleName = (role?.role_name || "").toLowerCase()

/* ✅ FIXED SESSION TOKEN */
let existingToken = localStorage.getItem("erp_session_token")

let token = existingToken || crypto.randomUUID()

await supabaseClient
.from("users")
.update({session_token:token})
.eq("id",dbUser.id)

localStorage.setItem("erp_session_token",token)

/* REDIRECT */
if(roleName.includes("admin") || roleName.includes("manager")){
    window.location.href="financial-dashboard.html"
}else{
    window.location.href="dashboard.html"
}

}

</script>

</body>
</html>
