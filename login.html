<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Varada Nexus</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

/* 🔥 ANIMATED BACKGROUND */
body{
margin:0;
font-family:'Inter',sans-serif;
height:100vh;
background:linear-gradient(-45deg,#0f172a,#1e3a8a,#0ea5e9,#020617);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* HEADER */
header{
display:flex;
align-items:center;
padding:15px 30px;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo-wrapper{
display:flex;
align-items:center;
gap:10px;
}

.logo{
height:40px;
}

header h1{
font-size:18px;
color:white;
}

/* MAIN */
main{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

/* 🔥 GLASS CARD */
.login-card{
background:rgba(15,23,42,0.75);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.08);
padding:40px;
border-radius:16px;
width:380px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
text-align:center;
}

/* 🔥 BRAND SECTION */
.brand{
margin-bottom:20px;
}

.brand img{
height:60px;
width:auto;
object-fit:contain;
display:block;
margin:0 auto 12px auto;
}

.brand h2{
margin:0;
font-size:20px;
}

.brand p{
font-size:13px;
color:#cbd5f5;
}

/* INPUTS */
.login-card select,
.login-card input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:none;
outline:none;
background:rgba(255,255,255,0.12);
color:white;
}

/* PASSWORD */
.password-wrapper{
position:relative;
}

.show-password{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:12px;
color:#93c5fd;
}

/* BUTTON */
.login-card button{
width:100%;
padding:12px;
background:linear-gradient(135deg,#3b82f6,#6366f1);
border:none;
border-radius:8px;
color:white;
cursor:pointer;
transition:0.3s;
font-weight:600;
}

.login-card button:hover{
transform:translateY(-1px);
box-shadow:0 10px 25px rgba(59,130,246,0.4);
}

.login-card button:hover{
background:#2563eb;
}

/* ERROR */
.error{
color:#f87171;
margin-top:10px;
}

/* FOOTER */
footer{
text-align:center;
padding:10px;
font-size:13px;
color:#cbd5f5;
}

</style>

</head>

<body>

<header>
<div class="logo-wrapper">
<img src="images/logo.png" class="logo">
<h1>Varada Nexus</h1>
</div>
</header>

<main>

<div class="login-card">

<!-- 🔥 BRANDING -->
<div class="brand">
<img src="images/logo.png" style="max-height:50px;">
<h2>Welcome Back</h2>
<p>Secure access to Varada Nexus ERP</p>
</div>

<select id="loginType">
<option value="staff">Staff Login</option>
<option value="transporter">Customer Login</option>
</select>

<input type="email" id="email" placeholder="Email">

<div class="password-wrapper">
<input type="password" id="password" placeholder="Password">
<span class="show-password" onclick="togglePassword()">Show</span>
</div>

<button onclick="login()">Login</button>

<div id="error" class="error"></div>

</div>

</main>

<footer>
© 2025 Varada Nexus Private Limited
</footer>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"YOUR_KEY_HERE"
)

/* TOGGLE PASSWORD */
function togglePassword(){
let pass=document.getElementById("password")
pass.type = pass.type==="password" ? "text" : "password"
}

/* LOGIN (UNCHANGED LOGIC) */
async function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let loginType = document.getElementById("loginType").value

document.getElementById("error").innerText=""

const {data,error}=await supabaseClient.auth.signInWithPassword({
email,password
})

if(error){
document.getElementById("error").innerText=error.message
return
}

let authId=data.user.id

/* CUSTOMER LOGIN */
if(loginType === "transporter"){

  const {data:agentCheck} = await supabaseClient
  .from("agents")
  .select("id, is_active")
  .eq("auth_id", authId)
  .maybeSingle()

  if(agentCheck){
    if(agentCheck.is_active === false){
      document.getElementById("error").innerText = "Agent account is inactive"
      return
    }
    window.location.href="agent-dashboard.html"
    return
  }

  const {data:transporter} = await supabaseClient
  .from("transporters")
  .select("id")
  .eq("auth_id", authId)
  .maybeSingle()

  if(transporter){
    window.location.href="transporter-dashboard.html"
    return
  }

  document.getElementById("error").innerText="Customer not registered"
  return
}

/* STAFF LOGIN */
const {data:dbUser,error:userError}=await supabaseClient
.from("users")
.select("*")
.eq("auth_id",authId)
.single()

if(userError || !dbUser){
document.getElementById("error").innerText="User not registered in ERP"
return
}

const {data:userRoles}=await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",dbUser.id)

const {data:role}=await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRoles[0].role_id)
.single()

let roleName = (role?.role_name || "").toLowerCase()

if(roleName.includes("admin") || roleName.includes("manager")){
    window.location.href="financial-dashboard.html"
}else{
    window.location.href="dashboard.html"
}

}

</script>

</body>
</html>
