<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ================= BODY ================= */
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(-45deg,#0f172a,#1e3a8a,#0ea5e9,#020617);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ================= NAVBAR ================= */
header{
position:sticky;
top:0;
z-index:1000;
background:rgba(10,15,30,0.6);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}

header.scrolled{
background:rgba(10,15,30,0.9);
backdrop-filter:blur(28px);
}

.nav-container{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
}

/* LEFT */
.nav-left{
display:flex;
align-items:center;
gap:12px;
}

.logo{
height:44px;
}

.brand-block{
display:flex;
flex-direction:column;
line-height:1.1;
}

.brand-name{
font-size:20px;
font-weight:600;
}

.brand-sub{
font-size:11px;
opacity:0.6;
}

/* LINKS */
.nav-links{
display:flex;
gap:28px;
align-items:center;
}

.nav-links a{
text-decoration:none;
color:#cbd5f5;
font-size:14px;
position:relative;
transition:0.3s;
}

.nav-links a:hover{
color:white;
text-shadow:0 0 8px rgba(99,102,241,0.6);
}

.nav-links a.active{
color:white;
}

.nav-links a::after{
content:"";
position:absolute;
left:0;
bottom:-6px;
width:0%;
height:2px;
background:linear-gradient(90deg,#3b82f6,#6366f1);
transition:0.3s;
}

.nav-links a:hover::after,
.nav-links a.active::after{
width:100%;
}

/* MOBILE */
.hamburger{
display:none;
flex-direction:column;
gap:5px;
cursor:pointer;
}

.hamburger div{
width:24px;
height:2px;
background:white;
}

.mobile-menu{
display:none;
flex-direction:column;
gap:16px;
padding:20px;
background:rgba(10,15,30,0.95);
}

.mobile-menu.active{
display:flex;
}

/* ================= MAIN ================= */
main{
display:flex;
justify-content:center;
align-items:center;
height:85vh;
}

/* ================= CARD ================= */
.login-card{
position:relative;
background:rgba(15,23,42,0.65);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.08);
padding:45px 35px;
border-radius:18px;
width:380px;
text-align:center;
box-shadow:
0 20px 60px rgba(0,0,0,0.6),
0 0 40px rgba(59,130,246,0.15);
}

/* FIX CLICK BUG */
.login-card::before{
pointer-events:none;
}

/* TEXT */
.brand h2{
margin:0;
font-size:22px;
}

.brand p{
font-size:13px;
color:#cbd5f5;
margin-bottom:25px;
}

/* ================= INPUTS ================= */
.field{
position:relative;
margin-bottom:18px;
}

.field input,
.field select{
width:100%;
height:50px;
padding:18px 40px 0 40px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.10);
color:white;
font-size:14px;
box-sizing:border-box;
}

/* ICON */
.icon{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
font-size:14px;
opacity:0.6;
}

/* LABEL */
.field label{
position:absolute;
left:40px;
top:50%;
transform:translateY(-50%);
font-size:13px;
color:#94a3b8;
transition:0.3s;
pointer-events:none;
}

/* FLOAT */
.field input:focus + label,
.field input:not(:placeholder-shown) + label{
top:8px;
font-size:11px;
color:#93c5fd;
}

.field input:focus{
outline:1px solid rgba(99,102,241,0.6);
background:rgba(255,255,255,0.16);
}

/* PASSWORD */
.show-password{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
font-size:12px;
cursor:pointer;
}

/* BUTTON */
button{
width:100%;
height:46px;
border-radius:10px;
border:none;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
box-shadow:0 8px 20px rgba(99,102,241,0.4);
}

/* ERROR */
.error{
color:#f87171;
margin-top:10px;
}

/* RESPONSIVE */
@media(max-width:768px){

.nav-links{
display:none;
}

.hamburger{
display:flex;
}

}

</style>
</head>

<body>

<header>
<div class="nav-container">

<div class="nav-left">
<img src="images/logo.png" class="logo">
<div class="brand-block">
<span class="brand-name">Varada Nexus</span>
<span class="brand-sub">Private Limited</span>
</div>
</div>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="founder.html">Founder</a>
<a href="services.html">Services</a>
<a href="contact.html">Contact</a>
<a href="login.html">Login</a>
</nav>

<div class="hamburger" onclick="toggleMenu()">
<div></div>
<div></div>
<div></div>
</div>

</div>

<div class="mobile-menu" id="mobileMenu">
<a href="index.html">Home</a>
<a href="founder.html">Founder</a>
<a href="services.html">Services</a>
<a href="contact.html">Contact</a>
<a href="login.html">Login</a>
</div>

</header>

<main>
<div class="login-card">

<div class="brand">
<h2>Welcome Back</h2>
<p>Secure access to Varada Nexus ERP</p>
</div>

<div class="field">
<span class="icon">👤</span>
<select id="loginType">
<option value="staff">Staff Login</option>
<option value="transporter">Customer Login</option>
</select>
</div>

<div class="field">
<span class="icon">📧</span>
<input type="email" id="email" placeholder=" " required>
<label>Email</label>
</div>

<div class="field">
<span class="icon">🔒</span>
<input type="password" id="password" placeholder=" " required>
<label>Password</label>
<span class="show-password" onclick="togglePassword()">Show</span>
</div>

<button onclick="login()">Login</button>

<div id="error" class="error"></div>

</div>
</main>

<script>

/* ACTIVE LINK */
const links=document.querySelectorAll(".nav-links a,.mobile-menu a");
const current=location.pathname.split("/").pop();

links.forEach(link=>{
if(link.getAttribute("href")===current){
link.classList.add("active");
}
});

/* MOBILE MENU */
function toggleMenu(){
document.getElementById("mobileMenu").classList.toggle("active");
}

/* SCROLL */
window.addEventListener("scroll",()=>{
document.querySelector("header").classList.toggle("scrolled",window.scrollY>20);
});

/* PASSWORD */
function togglePassword(){
let p=document.getElementById("password");
p.type=p.type==="password"?"text":"password";
}

/* SUPABASE */
const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
);

/* LOGIN */
async function login(){
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

const {error}=await supabaseClient.auth.signInWithPassword({email,password});

if(error){
document.getElementById("error").innerText=error.message;
return;
}

alert("Login success");
}

</script>

</body>
</html>
