<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

/* ================= BODY ================= */
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(-45deg,#0f172a,#1e3a8a,#0ea5e9,#020617);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ================= NAVBAR ================= */
header{
position:sticky;
top:0;
z-index:1000;

background:rgba(10,15,30,0.55);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.06);
transition:all 0.35s ease;
}

header.scrolled{
background:rgba(10,15,30,0.9);
backdrop-filter:blur(28px);
}

/* NAV CONTAINER */
.nav-container{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 20px;
}

/* LEFT */
.nav-left{
display:flex;
align-items:flex-start; /* 🔥 key */
gap:10px;
}

/* LOGO */
.logo{
height:42px;
transform:translateY(4px); /* 🔥 optical alignment */
}

/* BRAND */
.brand-block{
display:flex;
flex-direction:column;
margin-top:6px; /* 🔥 optical balance */
line-height:1.05;
}

.brand-name{
font-size:17px;
font-weight:600;
background: linear-gradient(90deg,#fff,#e2e8f0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.brand-sub{
font-size:10px;
opacity:0.6;
}

/* NAV LINKS */
.nav-links{
display:flex;
gap:28px;
align-items:center;
}

.nav-links a{
text-decoration:none;
color:#cbd5f5;
font-size:14px;
position:relative;
transition:0.3s;
}

.nav-links a:hover{
color:white;
text-shadow:0 0 8px rgba(99,102,241,0.6);
}

.nav-links a.active{
color:white;
}

/* underline */
.nav-links a::after{
content:"";
position:absolute;
left:0;
bottom:-6px;
width:0%;
height:2px;
background:linear-gradient(90deg,#3b82f6,#6366f1);
transition:0.3s;
}

.nav-links a:hover::after,
.nav-links a.active::after{
width:100%;
}

/* ================= MOBILE ================= */
.hamburger{
display:none;
flex-direction:column;
cursor:pointer;
gap:5px;
}

.hamburger div{
width:24px;
height:2px;
background:white;
}

/* MOBILE MENU */
.mobile-menu{
display:none;
flex-direction:column;
gap:18px;
padding:20px;
background:rgba(10,15,30,0.95);
}

.mobile-menu a{
color:#cbd5f5;
text-decoration:none;
}

/* ================= MAIN ================= */
main{
display:flex;
justify-content:center;
align-items:center;
height:85vh;
}

/* ================= LOGIN CARD ================= */
.login-card{
position:relative;
background:rgba(15,23,42,0.65);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.08);
padding:45px 35px;
border-radius:18px;
width:380px;
text-align:center;

/* 🔥 glow */
box-shadow:
0 20px 60px rgba(0,0,0,0.6),
0 0 40px rgba(59,130,246,0.15);
}

/* subtle gradient border */
.login-card::before{
content:"";
position:absolute;
inset:0;
border-radius:18px;
padding:1px;
background:linear-gradient(135deg,#3b82f6,#6366f1,transparent);
-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);
-webkit-mask-composite: xor;
mask-composite: exclude;
}

/* TEXT */
.brand h2{
margin:0;
font-size:22px;
}

.brand p{
font-size:13px;
color:#cbd5f5;
margin-bottom:20px;
}

/* INPUTS */
.field{
margin-bottom:14px;
position:relative;
}

.field input,
.field select{
width:100%;
height:44px;
border-radius:8px;
border:none;
padding:0 12px;
background:rgba(255,255,255,0.12);
color:white;
}

.field input:focus,
.field select:focus{
outline:1px solid rgba(99,102,241,0.6);
background:rgba(255,255,255,0.18);
}

.show-password{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
font-size:12px;
cursor:pointer;
}

/* BUTTON */
button{
width:100%;
height:44px;
border-radius:8px;
border:none;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 8px 20px rgba(99,102,241,0.4);
}

/* ERROR */
.error{
color:#f87171;
margin-top:10px;
}

/* FOOTER */
footer{
text-align:center;
padding:10px;
font-size:13px;
color:#cbd5f5;
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){

.nav-links{
display:none;
}

.hamburger{
display:flex;
}

.mobile-menu.active{
display:flex;
}

}

</style>
</head>

<body>

<header>
<div class="nav-container">

<div class="nav-left">
<img src="images/logo.png" class="logo">
<div class="brand-block">
<span class="brand-name">Varada Nexus</span>
<span class="brand-sub">Private Limited</span>
</div>
</div>

<nav class="nav-links" id="navLinks">
<a href="index.html">Home</a>
<a href="founder.html">Founder</a>
<a href="services.html">Services</a>
<a href="contact.html">Contact</a>
<a href="login.html">Login</a>
</nav>

<div class="hamburger" onclick="toggleMenu()">
<div></div>
<div></div>
<div></div>
</div>

</div>

<div class="mobile-menu" id="mobileMenu">
<a href="index.html">Home</a>
<a href="founder.html">Founder</a>
<a href="services.html">Services</a>
<a href="contact.html">Contact</a>
<a href="login.html">Login</a>
</div>

</header>

<main>
<div class="login-card">

<div class="brand">
<h2>Welcome Back</h2>
<p>Secure access to Varada Nexus ERP</p>
</div>

<div class="field">
<select id="loginType">
<option value="staff">Staff Login</option>
<option value="transporter">Customer Login</option>
</select>
</div>

<div class="field">
<input type="email" id="email" placeholder="Email">
</div>

<div class="field">
<input type="password" id="password" placeholder="Password">
<span class="show-password" onclick="togglePassword()">Show</span>
</div>

<div class="field">
<button id="loginBtn" onclick="login()">Login</button>
</div>

<div id="error" class="error"></div>

</div>
</main>

<footer>
© 2025 Varada Nexus Private Limited
</footer>

<script>

/* NAV ACTIVE AUTO */
const links = document.querySelectorAll(".nav-links a, .mobile-menu a");
const current = location.pathname.split("/").pop();

links.forEach(link=>{
if(link.getAttribute("href") === current){
link.classList.add("active");
}
});

/* MOBILE MENU */
function toggleMenu(){
document.getElementById("mobileMenu").classList.toggle("active");
}

/* SCROLL EFFECT */
window.addEventListener("scroll",()=>{
document.querySelector("header").classList.toggle("scrolled",window.scrollY>20);
});

/* PASSWORD */
function togglePassword(){
let p=document.getElementById("password");
p.type=p.type==="password"?"text":"password";
}

);

</script>

</body>
</html>
