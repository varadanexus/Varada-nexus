<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Varada Nexus</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

/* 🔥 ANIMATED BACKGROUND */
body{
margin:0;
font-family:'Inter',sans-serif;
height:100vh;
background:linear-gradient(-45deg,#020617,#0f172a,#1e3a8a,#020617);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle, rgba(59,130,246,0.18), transparent 70%);
top:0;
left:50%;
transform:translateX(-50%);
filter:blur(120px);
z-index:-1;
}
  
/* HEADER */
header{
position:sticky;
top:0;
z-index:1000;
background:rgba(10,15,30,0.55);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

body{
position:relative;
overflow-x:hidden;
}

@keyframes headerFlow{
0%{background-position:0%}
100%{background-position:200%}
}
  


/* LOGO */
.logo{
height:48px;
width:auto;
object-fit:contain;
display:block;
}
  

/* 🔥 NAV CONTAINER */
.nav-container{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 20px;
}

.nav-left{
display:flex;
align-items:center;
gap:14px;
height:48px;
}


.nav-left{
align-items:center;
height:48px;
}
  
.brand-block{
display:flex;
flex-direction:column;
justify-content:center;
white-space:nowrap;   /* 🔥 THIS FIXES LINE BREAK */
}

.logo:hover{
filter:drop-shadow(0 0 10px rgba(255,215,150,0.6));
transform:scale(1.05);
}
  
.brand-name{
font-size:19px;
font-weight:600;
}

.brand-sub{
font-size:10px;
color:#94a3b8;
margin-top:2px;
}

.nav-links{
display:flex;
gap:28px;
}

.nav-links a{
color:#cbd5f5;
text-decoration:none;
font-size:14px;
}

.nav-links a:hover,
.nav-links a.active{
color:white;
}


/* 🔥 SUBTLE PREMIUM GLOW */
@keyframes logoGlow{
0%{
filter: drop-shadow(0 0 4px rgba(255,215,150,0.15));
transform:scale(1);
}
100%{
filter: drop-shadow(0 0 14px rgba(255,215,150,0.35));
transform:scale(1.02);
}
}
/* MAIN */
main{
display:flex;
justify-content:center;
align-items:center;
min-height:calc(100vh - 100px);
padding:40px 20px;
}

/* 🔥 GLASS CARD */
.login-card{
background:rgba(15,23,42,0.75);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.08);
padding:40px 32px;
border-radius:16px;
width:380px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
text-align:center;
}

/* 🔥 BRAND SECTION */
.brand{
margin-bottom:20px;
}

.brand img{
height:60px;
width:auto;
object-fit:contain;
display:block;
margin:0 auto 12px auto;
}

.brand h2{
margin:0;
font-size:20px;
}

.brand p{
font-size:13px;
color:#cbd5f5;
}

header{
position:sticky;
top:0;
z-index:1000;
}
  
/* INPUTS FIXED */

/* 🔥 UNIFORM FIELD SYSTEM */
.field{
position:relative;
width:100%;
height:44px;
margin-bottom:15px;
display:block;
}

.field input,
.field select{
box-sizing:border-box; 
width:100%;
height:100%;
padding:0 12px;
border-radius:8px;
border:none;
outline:none;
background:rgba(255,255,255,0.12);
color:white;
font-size:14px;
}

/* FOCUS */
.field input:focus,
.field select:focus{
outline:1px solid rgba(99,102,241,0.6);
background:rgba(255,255,255,0.16);
}

/* PLACEHOLDER */
.field input::placeholder{
color:#94a3b8;
}

/* PASSWORD BUTTON */
.show-password{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
font-size:12px;
color:#93c5fd;
cursor:pointer;
}
  
.login-card input:focus,
.login-card select:focus{
outline:1px solid rgba(99,102,241,0.6);
background:rgba(255,255,255,0.16);
}
  
/* PLACEHOLDER */
.login-card input::placeholder{
color:#94a3b8;
}

/* SELECT TEXT ALIGN */
.login-card select{
color:#e2e8f0;
}


/* BUTTON */
.field button{
width:100%;
height:100%;
border-radius:8px;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:#f1f5f9;
font-weight:600;
border:none;
cursor:pointer;
transition:0.3s;
}

.login-card button{
width:100%;
height:44px;
box-sizing:border-box;   /* 🔥 SAME FIX */
border-radius:8px;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:#f1f5f9;
font-weight:600;
border:none;
cursor:pointer;
transition:0.3s;
}

.field{
max-width:100%;
}
  
/* ERROR */
.error{
color:#f87171;
margin-top:10px;
}

/* FOOTER */
footer{
text-align:center;
padding:10px;
font-size:13px;
color:#cbd5f5;
}

@media (max-width:768px){

.nav-container{
flex-direction:column;
gap:12px;
}

.nav-links{
flex-wrap:wrap;
justify-content:center;
gap:14px;
}

.login-card{
padding:30px 20px;
}

}

header.shrink{
padding:6px 20px !important;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(18px);
transition:0.3s;
}
  
</style>

</head>

<body>

<header>

<div class="nav-container">

    <div class="nav-left">
        <img src="images/logo.png" class="logo">
        <div class="brand-block">
            <span class="brand-name">Varada Nexus</span>
            <span class="brand-sub">Private Limited</span>
        </div>
    </div>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="founder.html">Founder</a>
<a href="services.html">Services</a>
<a href="team.html">Team</a>
<a href="contact.html">Contact</a>
<a href="login.html" class="active">Login</a>
</nav>

</div>

</header>
<main>

<div class="login-card">

<!-- 🔥 BRANDING -->
<div class="brand">
<h2>Welcome Back</h2>
<p>Secure access to Varada Nexus ERP</p>
</div>

<div class="field">
<select id="loginType">
<option value="staff">Staff Login</option>
<option value="transporter">Customer Login</option>
</select>
</div>

<div class="field">
<input type="email" id="email" placeholder="Email">
</div>

<div class="field">
<input type="password" id="password" placeholder="Password">
<span class="show-password" onclick="togglePassword()">Show</span>
</div>

<div class="field">
<button id="loginBtn" onclick="login()">Login</button>
</div>

<div id="error" class="error"></div>

</div>

</main>

<footer>
© 2025 Varada Nexus Private Limited
</footer>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

/* TOGGLE PASSWORD */
function togglePassword(){
let pass=document.getElementById("password")
pass.type = pass.type==="password" ? "text" : "password"
}

/* LOGIN (UNCHANGED LOGIC) */
async function login(){

let btn = document.getElementById("loginBtn")

if(btn.disabled) return   // 🚫 PREVENT DOUBLE CLICK

btn.disabled = true
btn.innerText = "Logging in..."

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let loginType = document.getElementById("loginType").value

if(!email || !password){
  document.getElementById("error").innerText = "Enter email & password"
  btn.disabled = false
  btn.innerText = "Login"
  return
}
  
document.getElementById("error").innerText=""

const {data,error}=await supabaseClient.auth.signInWithPassword({
email,password
})

if(error){
document.getElementById("error").innerText=error.message
btn.disabled = false
btn.innerText = "Login"
return
}

let authId=data.user.id

/* CUSTOMER LOGIN */
if(loginType === "transporter"){

  const {data:dbUser} = await supabaseClient
  .from("users")
  .select("id")
  .eq("auth_id", authId)
  .maybeSingle()

// ✅ CHECK AGENT FIRST (MOVE THIS UP)
const {data:agentCheckStaff} = await supabaseClient
.from("agents")
.select("id")
.eq("auth_id", authId)
.maybeSingle()

if(agentCheck){
  if(agentCheck.is_active === false){
    document.getElementById("error").innerText = "Agent account is inactive"
    btn.disabled = false
    btn.innerText = "Login"
    return
  }

  window.location.href = "agent-dashboard.html"
  return
}
  
  if(dbUser){

    const {data:userRole} = await supabaseClient
    .from("user_roles")
    .select("role_id")
    .eq("user_id", dbUser.id)
    .maybeSingle()

    if(userRole){

      const {data:role} = await supabaseClient
      .from("roles")
      .select("role_name")
      .eq("id", userRole.role_id)
      .single()

      let roleName = (role?.role_name || "").toLowerCase().trim()

      // 🚫 BLOCK STAFF HERE
      if(
        roleName.includes("admin") ||
        roleName.includes("manager") ||
        roleName.includes("operator") ||
        roleName.includes("accounts")
      ){
        document.getElementById("error").innerText = "Use Staff Login"
        btn.disabled = false
        btn.innerText = "Login"
        return
      }

// ✅ CUSTOMER ROLE
if(roleName.includes("customer")){
  window.location.href = "transporter-dashboard.html"
  return
}

       }
    }
  }

  document.getElementById("error").innerText="Customer not registered"
  btn.disabled = false
  btn.innerText = "Login"
  return
}

/* STAFF LOGIN */

// ❌ BLOCK customers trying staff login
const {data:agentCheck} = await supabaseClient
.from("agents")
.select("id")
.eq("auth_id", authId)
.maybeSingle()

const {data:transporterCheck} = await supabaseClient
.from("transporters")
.select("id")
.eq("auth_id", authId)
.maybeSingle()

if(agentCheckStaff || transporterCheck){
  document.getElementById("error").innerText = "Use Customer Login"
  btn.disabled = false
  btn.innerText = "Login"
  return
}
  
const {data:dbUser,error:userError}=await supabaseClient
.from("users")
.select("*")
.eq("auth_id",authId)
.single()

if(userError || !dbUser){
document.getElementById("error").innerText="User not registered in ERP"
btn.disabled = false
btn.innerText = "Login"
return
}

const {data:userRoles, error:roleError} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id", dbUser.id)

if(roleError || !userRoles || userRoles.length === 0){
  document.getElementById("error").innerText="Role not assigned"
  btn.disabled = false
  btn.innerText = "Login"
  return
}

// 👉 take first role safely
let roleId = userRoles[0].role_id

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id", roleId)
.single()

let roleName = (role?.role_name || "").toLowerCase()

if(roleName.includes("customer")){
  document.getElementById("error").innerText = "Use Customer Login"
  btn.disabled = false
  btn.innerText = "Login"
  return
}
  
/* ✅ FIXED SESSION TOKEN */
let existingToken = localStorage.getItem("erp_session_token")
let token = crypto.randomUUID()

await supabaseClient
.from("users")
.update({session_token:token})
.eq("id",dbUser.id)

localStorage.setItem("erp_session_token",token)

/* REDIRECT */
if(roleName.includes("admin") || roleName.includes("manager")){
    window.location.href="financial-dashboard.html"
}else{
    window.location.href="dashboard.html"
}

}

</script>

<script>
window.addEventListener("scroll",()=>{
const header=document.querySelector("header");

if(window.scrollY > 50){
header.classList.add("shrink");
}else{
header.classList.remove("shrink");
}
});
</script>
  
</body>
</html>
