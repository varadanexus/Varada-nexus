<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Varada Nexus</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
.login-container{
display:flex;
justify-content:center;
align-items:center;
padding:80px 20px;
}

.login-card{
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 8px 22px rgba(0,0,0,0.12);
width:380px;
text-align:center;
}

.login-card h2{
color:#1f3c88;
margin-bottom:25px;
}

.login-card select,
.login-card input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

.password-wrapper{
position:relative;
}

.show-password{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:13px;
color:#1f3c88;
}

.login-card button{
width:100%;
padding:11px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
}
</style>

</head>

<body>

<header>
<div class="logo-wrapper">
<img src="images/logo.png" class="logo">
<h1>Varada Nexus Private Limited</h1>
</div>
</header>

<main>

<div class="login-container">

<div class="login-card">

<h2>Portal Login</h2>

<select id="loginType">
<option value="staff">Staff Login</option>
<option value="transporter">Customer Login</option>
</select>

<input type="email" id="email" placeholder="Email">

<div class="password-wrapper">
<input type="password" id="password" placeholder="Password">
<span class="show-password" onclick="togglePassword()">Show</span>
</div>

<button onclick="login()">Login</button>

<div id="error" class="error"></div>

</div>

</div>

</main>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

/* TOGGLE PASSWORD */
function togglePassword(){
let pass=document.getElementById("password")
pass.type = pass.type==="password" ? "text" : "password"
}

/* LOGIN */
async function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

document.getElementById("error").innerText=""

/* AUTH */
const {data,error}=await supabaseClient.auth.signInWithPassword({
email,password
})

if(error){
document.getElementById("error").innerText=error.message
return
}

let authId=data.user.id

/* 🔥 AUTO LINK AGENT */
const {data:agentAuto} = await supabaseClient
.from("agents")
.select("id")
.eq("auth_id", authId)
.maybeSingle()

if(agentAuto){
  const {data:existing} = await supabaseClient
  .from("commission_agents")
  .select("id, auth_id")
  .eq("agent_id", agentAuto.id)
  .maybeSingle()

  if(existing && !existing.auth_id){
    await supabaseClient
    .from("commission_agents")
    .update({ auth_id: authId })
    .eq("agent_id", agentAuto.id)
  }
}

/* 🔥 AGENT LOGIN */
const {data:agentCheck} = await supabaseClient
.from("commission_agents")
.select("id")
.eq("auth_id", authId)
.maybeSingle()

if(agentCheck){
window.location.href="agent-dashboard.html"
return
}

/* 🔥 TRANSPORTER LOGIN */
const {data:transporter} = await supabaseClient
.from("transporters")
.select("id")
.eq("auth_id", authId)
.maybeSingle()

if(transporter){
window.location.href="transporter-dashboard.html"
return
}

/* 🔥 STAFF LOGIN */
const {data:dbUser,error:userError}=await supabaseClient
.from("users")
.select("*")
.eq("auth_id",authId)
.single()

if(userError || !dbUser){
document.getElementById("error").innerText="User not registered in ERP"
return
}

const {data:userRoles}=await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",dbUser.id)

if(!userRoles || userRoles.length===0){
document.getElementById("error").innerText="User role not assigned"
return
}

const {data:role}=await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRoles[0].role_id)
.single()

let roleName = (role?.role_name || "").toLowerCase()

/* SESSION */
let token = crypto.randomUUID()

await supabaseClient
.from("users")
.update({session_token:token})
.eq("id",dbUser.id)

localStorage.setItem("erp_session_token",token)

/* REDIRECT */
if(roleName.includes("transporter") || roleName.includes("customer")){
window.location.href="transporter-dashboard.html"
}else{
window.location.href="dashboard.html"
}

}

</script>

</body>
</html>
