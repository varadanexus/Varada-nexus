<!DOCTYPE html>
<html>
<head>

<title>Varada Nexus Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* Login Card */

.login-card{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.12);
width:380px;
text-align:center;
}

/* Title */

h2{
margin-bottom:25px;
color:#1f3c88;
font-weight:600;
}

/* Inputs */

select,
input{
width:100%;
padding:11px;
margin-bottom:16px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
transition:0.2s;
}

/* Input focus */

select:focus,
input:focus{
border-color:#1f3c88;
outline:none;
box-shadow:0 0 4px rgba(31,60,136,0.3);
}

/* Password container */

.password-wrapper{
position:relative;
}

.password-wrapper input{
margin-bottom:0;
}

/* Show password button */

.show-password{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:13px;
color:#1f3c88;
user-select:none;
}

/* Button */

button{
width:100%;
padding:12px;
background:#1f3c88;
color:white;
border:none;
border-radius:5px;
font-size:15px;
cursor:pointer;
margin-top:15px;
transition:0.2s;
}

button:hover{
background:#162f6d;
}

/* Error */

.error{
color:#d9534f;
margin-top:14px;
font-size:14px;
}

</style>

</head>

<body>

<div class="login-card">

<h2>Varada Nexus Login</h2>

<select id="loginType">
<option value="staff">Staff Login</option>
<option value="transporter">Customer Login</option>
</select>

<input type="email" id="email" placeholder="Email">

<div class="password-wrapper">

<input type="password" id="password" placeholder="Password">

<span class="show-password" onclick="togglePassword()">Show</span>

</div>

<button onclick="login()">Login</button>

<div id="error" class="error"></div>

</div>

<script>

/* SUPABASE CONNECTION */

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

/* SHOW PASSWORD */

function togglePassword(){

let pass=document.getElementById("password")
let btn=document.querySelector(".show-password")

if(pass.type==="password"){
pass.type="text"
btn.innerText="Hide"
}else{
pass.type="password"
btn.innerText="Show"
}

}

async function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let loginType=document.getElementById("loginType").value

document.getElementById("error").innerText=""

/* LOGIN */

const {data,error}=await supabaseClient.auth.signInWithPassword({
email:email,
password:password
})

if(error){

document.getElementById("error").innerText=error.message
return

}

let authId=data.user.id

/* GET ROLE */

const {data:userRole,error:roleError}=await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",authId)
.single()

if(roleError || !userRole){

document.getElementById("error").innerText="User role not assigned"
return

}

/* GET ROLE NAME */

const {data:role}=await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

let roleName=role.role_name.toLowerCase()

/* VALIDATE LOGIN TYPE */

if(loginType==="transporter" && roleName!=="transporter"){

document.getElementById("error").innerText="This account is not a customer"

await supabaseClient.auth.signOut()

return

}

if(loginType==="staff" && roleName==="transporter"){

document.getElementById("error").innerText="Customers must use customer login"

await supabaseClient.auth.signOut()

return

}

/* REDIRECT */

if(roleName==="transporter"){

window.location.href="transporter-dashboard.html"

}else{

window.location.href="dashboard.html"

}

}

</script>

</body>
</html>
