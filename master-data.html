<!DOCTYPE html>
<html>

<head>

<title>Master Data - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>
<script src="menu-rbac.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}
.card{background:white;padding:20px;border-radius:8px;margin-bottom:20px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
input,select{padding:10px;margin:5px;border:1px solid #ccc;border-radius:4px;}
button{padding:8px 12px;background:#1f3c88;color:white;border:none;border-radius:4px;cursor:pointer;}
.editBtn{background:#5bc0de;}
.deleteBtn{background:#d9534f;}
.saveBtn{background:#5cb85c;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;}
</style>

</head>

<body>

<script>
const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"YOUR_KEY"
)
</script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data
await initSidebar()
})

async function initSidebar(){
const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

document.getElementById("userName").innerText = session.user.email.split("@")[0]

window.logout = async ()=>{
await supabaseClient.auth.signOut()
window.location="login.html"
}
}
</script>

<div class="main">

<h2>Master Data</h2>

<!-- ADD SECTION -->
<div class="card">

<h3>Add Data</h3>

<select id="type">
<option value="routes">Route</option>
<option value="trucks">Truck</option>
<option value="commodities">Commodity</option>
<option value="clients">Client</option>
</select>

<input id="value" placeholder="Enter value">

<button onclick="addData()">Add</button>

</div>

<!-- SEARCH -->
<div class="card">

<input id="search" placeholder="Search...">
<button onclick="applySearch()">Search</button>
<button onclick="clearSearch()">Clear</button>

</div>

<!-- TABLE -->
<table>

<thead>
<tr>
<th>Value</th>
<th>Action</th>
</tr>
</thead>

<tbody id="dataTable"></tbody>

</table>

<br>

<button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>

</div>

<script>

let dataList=[]
let filtered=[]
let page=1
let pageSize=10
let currentType="routes"

init()

async function init(){
await loadData()
}

/* LOAD DATA */

async function loadData(){

currentType=document.getElementById("type").value

let {data}=await supabaseClient.from(currentType).select("*")

dataList=data || []
filtered=dataList

renderTable()

}

/* ADD */

async function addData(){

let val=document.getElementById("value").value
let type=document.getElementById("type").value

if(!val){
alert("Enter value")
return
}

let obj={}

if(type==="routes") obj={route_code:val}
if(type==="trucks") obj={truck_number:val}
if(type==="commodities") obj={name:val}
if(type==="clients") obj={company:val}

await supabaseClient.from(type).insert(obj)

document.getElementById("value").value=""

loadData()

}

/* RENDER */

function renderTable(){

let start=(page-1)*pageSize
let end=start+pageSize

let rows=filtered.slice(start,end)

let html=""

rows.forEach(r=>{

let value = r.route_code || r.truck_number || r.name || r.company

html+=`
<tr id="row_${r.id}">
<td>${value}</td>
<td>
<button class="editBtn" onclick="editRow('${r.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteRow('${r.id}')">Delete</button>
</td>
</tr>`
})

document.getElementById("dataTable").innerHTML=html

}

/* EDIT */

function editRow(id){

let row=document.getElementById("row_"+id)
let item=dataList.find(x=>x.id==id)

let value = item.route_code || item.truck_number || item.name || item.company

row.innerHTML=`
<td><input id="edit_${id}" value="${value}"></td>
<td>
<button class="saveBtn" onclick="saveEdit('${id}')">Save</button>
</td>
`

}

async function saveEdit(id){

let val=document.getElementById("edit_"+id).value

let obj={}

if(currentType==="routes") obj={route_code:val}
if(currentType==="trucks") obj={truck_number:val}
if(currentType==="commodities") obj={name:val}
if(currentType==="clients") obj={company:val}

await supabaseClient.from(currentType).update(obj).eq("id",id)

loadData()

}

/* DELETE */

async function deleteRow(id){

if(!confirm("Delete?")) return

await supabaseClient.from(currentType).delete().eq("id",id)

loadData()

}

/* SEARCH */

function applySearch(){

let q=document.getElementById("search").value.toLowerCase()

filtered=dataList.filter(r=>{

let value = r.route_code || r.truck_number || r.name || r.company
return value.toLowerCase().includes(q)

})

page=1
renderTable()

}

function clearSearch(){
filtered=dataList
page=1
renderTable()
}

/* PAGINATION */

function nextPage(){
if(page*pageSize >= filtered.length) return
page++
renderTable()
}

function prevPage(){
if(page>1){
page--
renderTable()
}
}

document.getElementById("type").addEventListener("change",()=>{
page=1
loadData()
})

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
