<script>

/* CLIENT SECTION */

let clients=[]
let allClients=[]
let clientPage=1
const clientPageSize=10

async function loadClients(){

const {data,error}=await supabaseClient
.from("clients")
.select("*")

if(error){
console.log(error)
return
}

clients=data
allClients=data

renderClients()

}

function renderClients(){

let start=(clientPage-1)*clientPageSize
let page=clients.slice(start,start+clientPageSize)

let html=""

page.forEach(c=>{

html+=`
<tr>

<td>${c.client_name}</td>
<td>${c.company || ""}</td>
<td>${c.phone || ""}</td>
<td>${c.email || ""}</td>

<td>
<button class="deleteBtn" onclick="deleteClient('${c.id}')">Delete</button>
</td>

</tr>
`

})

document.getElementById("clientTable").innerHTML=html

}

async function addClient(){

let name=document.getElementById("clientName").value
let company=document.getElementById("clientCompany").value
let phone=document.getElementById("clientPhone").value
let email=document.getElementById("clientEmail").value

if(!name){
alert("Enter client name")
return
}

await supabaseClient
.from("clients")
.insert({
client_name:name,
company:company,
phone:phone,
email:email
})

document.getElementById("clientName").value=""
document.getElementById("clientCompany").value=""
document.getElementById("clientPhone").value=""
document.getElementById("clientEmail").value=""

loadClients()

}

function searchClients(){

let val=document.getElementById("clientSearch").value.toLowerCase()

clients=allClients.filter(c=>
c.client_name.toLowerCase().includes(val) ||
(c.company||"").toLowerCase().includes(val)
)

clientPage=1
renderClients()

}

function nextClient(){
clientPage++
renderClients()
}

function prevClient(){
if(clientPage>1){
clientPage--
renderClients()
}
}

async function deleteClient(id){

if(!confirm("Delete client?")) return

await supabaseClient
.from("clients")
.delete()
.eq("id",id)

loadClients()

}


/* LOAD DATA */

loadClients()

</script>
