<!DOCTYPE html>
<html>

<head>

<title>Master Data</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>
<script src="menu-rbac.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}
.card{background:white;padding:20px;border-radius:8px;margin-bottom:20px;}
input,select{padding:6px;border:1px solid #ccc;border-radius:4px;margin:4px;}
button{padding:6px 12px;background:#1f3c88;color:white;border:none;border-radius:4px;}
.deleteBtn{background:#d9534f;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;}
.pagination{margin-top:10px;}
/* 🔥 POPUP */
.popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
z-index:2000;
}

.popup-content{
background:white;
width:400px;
margin:80px auto;
padding:20px;
border-radius:8px;
}
</style>

</head>

<body>

<script>
const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)
</script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

await initSidebar()

if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}

/* 🔥 SHOW SIDEBAR ONLY AFTER RBAC */
document.getElementById("sidebar").style.display="block"

})
async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const authId = session.user.id
const email = session.user.email

/* SHOW USER NAME */
document.getElementById("userName").innerText = email.split("@")[0]

/* GET USER ID FROM TABLE */
const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

/* GET ROLE */
const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

/* SHOW ROLE */
if(role){
document.getElementById("userRole").innerText = role.role_name
}

/* APPLY RBAC */
if(typeof applyMenuRBAC==="function"){
applyMenuRBAC()
}

/* LOGOUT */
window.logout = async ()=>{
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}
</script>

<div class="main">

<h1>Master Data</h1>

<!-- CLIENTS -->
<div class="card">
<h3>Clients</h3>

<input id="clientCompany" placeholder="Company">
<input id="clientPhone" placeholder="Phone">
<input id="clientEmail" placeholder="Email">

<button onclick="addClient()">Add Client</button>

<table>
<thead>
<tr><th>Company</th><th>Phone</th><th>Email</th><th>Action</th></tr>
</thead>
<tbody id="clientTable"></tbody>
</table>

<div class="pagination">
<button onclick="prevClient()">Prev</button>
<button onclick="nextClient()">Next</button>
</div>
</div>

<!-- TRANSPORTERS -->
<div class="card">
<h3>Transporters</h3>

<input id="searchTransporter" placeholder="Search..." oninput="filterTransporters()">

<input id="tName" placeholder="Name">
<input id="tPhone" placeholder="Phone">
<input id="tGST" placeholder="GST Number">
<input id="tAddress" placeholder="Address">
<input id="tPAN" placeholder="PAN">
<input id="tAadhar" placeholder="Aadhar Number">

<input id="tBank" placeholder="Bank Name">
<input id="tAccount" placeholder="Account Number">
<input id="tIFSC" placeholder="IFSC Code">

<select id="tStatus">
<option value="Active">Active</option>
<option value="Inactive">Inactive</option>
</select>

<button onclick="addTransporter()">Add</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>GST</th>
<th>Status</th>
<th>Created</th>
<th>Trucks</th>
<th>Action</th>
</tr>
</thead>
<tbody id="transporterTable"></tbody>
</table>
</div>

<!-- ROUTES -->
<div class="card">
<h3>Routes</h3>

<input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination">
<input id="routeCode" placeholder="Auto Code" readonly>

<button onclick="addRoute()">Add Route</button>

<table>
<thead>
<tr><th>Origin</th><th>Destination</th><th>Code</th><th>Action</th></tr>
</thead>
<tbody id="routeTable"></tbody>
</table>
</div>

<!-- TRUCKS -->
<div class="card">
<h3>Trucks</h3>

<input id="truckNumber" placeholder="Truck Number">
<input id="truckId" placeholder="Auto ID" readonly>

<select id="truckTransporter"></select>

<button onclick="addTruck()">Add Truck</button>

<table>
<thead>
<tr><th>Truck</th><th>Transporter</th><th>Action</th></tr>
</thead>
<tbody id="truckTable"></tbody>
</table>
</div>

<!-- COMMODITIES -->
<div class="card">
<h3>Commodities</h3>

<input id="commodityName" placeholder="Commodity">

<button onclick="addCommodity()">Add</button>

<table>
<thead>
<tr><th>Name</th><th>Action</th></tr>
</thead>
<tbody id="commodityTable"></tbody>
</table>
</div>

</div>

<script>

/* PAGINATION */
let clientPage=0
const pageSize=10

/* ROUTE AUTO */
origin.oninput = destination.oninput = ()=>{
if(origin.value && destination.value){
routeCode.value =
origin.value.slice(0,4).toUpperCase()+"-"+
destination.value.slice(0,4).toUpperCase()
}
}

/* TRUCK AUTO */
truckNumber.oninput = ()=>{
let val=truckNumber.value.toUpperCase()
let match=val.match(/[A-Z]{2}\d{4}$/)
truckId.value = match ? match[0].replace(/([A-Z]{2})(\d{4})/,"$1-$2") : ""
}

/* ADD */

async function addClient(){
await supabaseClient.from("clients").insert({
company:clientCompany.value,
phone:clientPhone.value,
email:clientEmail.value
})
clientCompany.value=""
clientPhone.value=""
clientEmail.value=""
loadClients()
}

async function addTransporter(){

let name = tName.value.trim()
let phone = tPhone.value.trim()
let gst = document.getElementById("tGST").value.trim()

/* VALIDATION */
if(!name){
alert("Enter transporter name")
return
}

if(phone && !/^[0-9]{10}$/.test(phone)){
alert("Invalid phone")
return
}

if(gst && !/^[0-9A-Z]{15}$/.test(gst)){
alert("Invalid GST")
return
}

/* DUPLICATE CHECK */
const {data:exists} = await supabaseClient
.from("transporters")
.select("*")
.eq("transporter_name",name)

if(exists && exists.length){
alert("Transporter already exists")
return
}

/* 🔥 INSERT WITH ERROR CHECK */
const {error} = await supabaseClient
.from("transporters")
.insert({
transporter_name:name,
phone:phone,
gst_number:document.getElementById("tGST").value,
address:document.getElementById("tAddress").value,
pan:document.getElementById("tPAN").value,
aadhar_number:document.getElementById("tAadhar").value,
bank_name:document.getElementById("tBank").value,
account_number:document.getElementById("tAccount").value,
ifsc_code:document.getElementById("tIFSC").value,
status:document.getElementById("tStatus").value
})

/* 🔥 HANDLE ERROR */
if(error){
console.error(error)
alert("Error: " + error.message)
return
}

/* SUCCESS */
alert("Saved ✅")

/* CLEAR */
tName.value=""
tPhone.value=""
tGST.value=""
tAddress.value=""
tPAN.value=""
tAadhar.value=""
tBank.value=""
tAccount.value=""
tIFSC.value=""
document.getElementById("tStatus").value="Active"

loadTransporters()
}

async function addRoute(){
if(!origin.value || !destination.value){
alert("Enter both fields")
return
}
await supabaseClient.from("routes").insert({
origin:origin.value,
destination:destination.value,
route_code:routeCode.value
})
origin.value=""
destination.value=""
routeCode.value=""
loadRoutes()
}

async function addTruck(){
await supabaseClient.from("trucks").insert({
truck_number:truckNumber.value,
transporter_id:truckTransporter.value
})
truckNumber.value=""
truckId.value=""
loadTrucks()
}

async function addCommodity(){
await supabaseClient.from("commodities").insert({
name:commodityName.value
})
commodityName.value=""
loadCommodities()
}

/* LOAD */

async function loadClients(){

const {data}=await supabaseClient
.from("clients")
.select("*")
.range(clientPage*pageSize,(clientPage+1)*pageSize-1)

let html=""

data?.forEach(c=>{
html+=`
<tr>
<td>${c.company}</td>
<td>${c.phone||""}</td>
<td>${c.email||""}</td>
<td><button class="deleteBtn" onclick="deleteClient('${c.id}')">Delete</button></td>
</tr>`
})

clientTable.innerHTML=html
}

function nextClient(){clientPage++;loadClients()}
function prevClient(){if(clientPage>0){clientPage--;loadClients()}}

async function loadTransporters(){

const {data}=await supabaseClient
.from("transporters")
.select("*")
.order("created_at",{ascending:false})

transporterData = data || []

let html="",dd='<option>Select</option>'

for(let t of (data || [])){

/* TRUCK COUNT */
const {count} = await supabaseClient
.from("trucks")
.select("*",{count:"exact",head:true})
.eq("transporter_id",t.id)

html+=`
<tr>
<td>${t.transporter_name}</td>
<td>${t.phone||""}</td>
<td>${t.gst_number||"-"}</td>
<td>${t.status||"Active"}</td>
<td>${t.created_at?.split("T")[0]}</td>
<td>${count||0}</td>

<td>
<button onclick="editTransporter('${t.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTransporter('${t.id}')">Delete</button>
</td>
</tr>
`

/* DROPDOWN IMPROVED */
dd+=`<option value="${t.id}">
${t.transporter_name} (${t.phone||"-"} | ${t.gst_number||"No GST"})
</option>`
}

transporterTable.innerHTML=html
truckTransporter.innerHTML=dd

}

let transporterData=[]

function filterTransporters(){

let q = document.getElementById("searchTransporter").value.toLowerCase()

let filtered = transporterData.filter(t=>
(t.transporter_name||"").toLowerCase().includes(q) ||
(t.phone||"").includes(q) ||
(t.gst_number||"").toLowerCase().includes(q) ||
(t.status||"").toLowerCase().includes(q)
)

renderFilteredTransporters(filtered)
}

function renderFilteredTransporters(data){

let html=""

data.forEach(t=>{
html+=`
<tr>
<td>${t.transporter_name}</td>
<td>${t.phone||""}</td>
<td>${t.gst_number||"-"}</td>
<td>${t.status||"Active"}</td>
<td>${t.created_at?.split("T")[0]}</td>
<td>-</td>

<td>
<button onclick="editTransporter('${t.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTransporter('${t.id}')">Delete</button>
</td>
</tr>`
})

document.getElementById("transporterTable").innerHTML=html
}
  
async function loadRoutes(){
const {data}=await supabaseClient.from("routes").select("*")
let html=""
data?.forEach(r=>{
html+=`
<tr>
<td>${r.origin}</td>
<td>${r.destination}</td>
<td>${r.route_code}</td>
<td><button class="deleteBtn" onclick="deleteRoute('${r.id}')">Delete</button></td>
</tr>`
})
routeTable.innerHTML=html
}

async function loadTrucks(){
const {data:trucks}=await supabaseClient.from("trucks").select("*")
const {data:trs}=await supabaseClient.from("transporters").select("*")

let html=""
trucks?.forEach(t=>{
let name=trs.find(x=>x.id==t.transporter_id)?.transporter_name || ""
html+=`
<tr>
<td>${t.truck_number}</td>
<td>${name}</td>
<td><button class="deleteBtn" onclick="deleteTruck('${t.id}')">Delete</button></td>
</tr>`
})
truckTable.innerHTML=html
}

async function loadCommodities(){
const {data}=await supabaseClient.from("commodities").select("*")
let html=""
data?.forEach(c=>{
html+=`
<tr>
<td>${c.name}</td>
<td><button class="deleteBtn" onclick="deleteCommodity('${c.id}')">Delete</button></td>
</tr>`
})
commodityTable.innerHTML=html
}

/* DELETE */

async function deleteClient(id){await supabaseClient.from("clients").delete().eq("id",id);loadClients()}
async function deleteTransporter(id){

if(!confirm("Delete transporter?")) return

/* CHECK USAGE */
const {count:truckCount} = await supabaseClient
.from("trucks")
.select("*",{count:"exact",head:true})
.eq("transporter_id",id)

if(truckCount > 0){
alert("Cannot delete: transporter has trucks")
return
}

/* DELETE */
await supabaseClient
.from("transporters")
.delete()
.eq("id",id)

alert("Deleted ✅")

loadTransporters()
}
async function deleteRoute(id){await supabaseClient.from("routes").delete().eq("id",id);loadRoutes()}
async function deleteTruck(id){await supabaseClient.from("trucks").delete().eq("id",id);loadTrucks()}
async function deleteCommodity(id){await supabaseClient.from("commodities").delete().eq("id",id);loadCommodities()}

let editId = null

async function editTransporter(id){

editId = id

const {data:t} = await supabaseClient
.from("transporters")
.select("*")
.eq("id",id)
.single()

/* FILL FORM */
eName.value = t.transporter_name || ""
ePhone.value = t.phone || ""
eGST.value = t.gst_number || ""
eAddress.value = t.address || ""
ePAN.value = t.pan || ""
eAadhar.value = t.aadhar_number || ""
eBank.value = t.bank_name || ""
eAccount.value = t.account_number || ""
eIFSC.value = t.ifsc_code || ""
eStatus.value = t.status || "Active"

/* SHOW POPUP */
document.getElementById("editPopup").style.display="block"
}

async function updateTransporter(){

if(!editId) return

/* VALIDATION */
if(ePhone.value && !/^[0-9]{10}$/.test(ePhone.value)){
alert("Invalid phone")
return
}

if(eGST.value && !/^[0-9A-Z]{15}$/.test(eGST.value)){
alert("Invalid GST")
return
}

function closePopup(){
document.getElementById("editPopup").style.display="none"
editId = null
}
  
/* UPDATE */
await supabaseClient
.from("transporters")
.update({
transporter_name:eName.value,
phone:ePhone.value,
gst_number:eGST.value,
address:eAddress.value,
pan:ePAN.value,
aadhar_number:eAadhar.value,
bank_name:eBank.value,
account_number:eAccount.value,
ifsc_code:eIFSC.value,
status:eStatus.value
})
.eq("id",editId)

alert("Updated ✅")

closePopup()
loadTransporters()
}
  
/* INIT */

window.onload=async ()=>{
await loadClients()
await loadTransporters()
await loadRoutes()
await loadTrucks()
await loadCommodities()
}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>
<!-- 🔥 EDIT TRANSPORTER POPUP -->
<div id="editPopup" class="popup">
  <div class="popup-content">

    <h3>Edit Transporter</h3>

    <input id="eName" placeholder="Name">
    <input id="ePhone" placeholder="Phone">
    <input id="eGST" placeholder="GST">
    <input id="eAddress" placeholder="Address">
    <input id="ePAN" placeholder="PAN">
    <input id="eAadhar" placeholder="Aadhar">

    <input id="eBank" placeholder="Bank Name">
    <input id="eAccount" placeholder="Account Number">
    <input id="eIFSC" placeholder="IFSC">

    <select id="eStatus">
      <option value="Active">Active</option>
      <option value="Inactive">Inactive</option>
    </select>

    <br><br>

    <button onclick="updateTransporter()">Update</button>
    <button class="deleteBtn" onclick="closePopup()">Cancel</button>

  </div>
</div>
</body>
</html>
