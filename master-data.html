<!DOCTYPE html><html>
<head>
<title>Master Data</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

body{

background:#f4f6f9;

}

</style></head><body><div id="sidebar-container"></div><script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script><div class="main"><h2>Master Data Management</h2><!-- COMMODITY --><div class="card"><h3>Add Commodity</h3><input id="commodityName" placeholder="Commodity Name"><button class="saveBtn" onclick="addCommodity()">Save</button>

<input id="commoditySearch" placeholder="Search Commodity" onkeyup="searchTable('commodityTable',this.value)"><table><thead>
<tr>
<th>Commodity</th>
<th>Action</th>
</tr>
</thead><tbody id="commodityTable"></tbody></table><div class="pagination">
<button onclick="prevPage('commodity')">Prev</button>
<span id="commodityPage"></span>
<button onclick="nextPage('commodity')">Next</button>
</div></div><!-- ROUTE --><div class="card"><h3>Add Route</h3><input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination"><button class="saveBtn" onclick="addRoute()">Save</button>

<input placeholder="Search Route" onkeyup="searchTable('routeTable',this.value)"><table><thead>
<tr>
<th>Code</th>
<th>Origin</th>
<th>Destination</th>
<th>Action</th>
</tr>
</thead><tbody id="routeTable"></tbody></table><div class="pagination">
<button onclick="prevPage('route')">Prev</button>
<span id="routePage"></span>
<button onclick="nextPage('route')">Next</button>
</div></div><!-- CLIENT --><div class="card"><h3>Add Client</h3><input id="clientName" placeholder="Client Name">
<input id="clientCompany" placeholder="Company">
<input id="clientPhone" placeholder="Phone">
<input id="clientEmail" placeholder="Email"><button class="saveBtn" onclick="addClient()">Save</button>

<input placeholder="Search Client" onkeyup="searchTable('clientTable',this.value)"><table><thead>
<tr>
<th>Name</th>
<th>Company</th>
<th>Phone</th>
<th>Email</th>
<th>Action</th>
</tr>
</thead><tbody id="clientTable"></tbody></table><div class="pagination">
<button onclick="prevPage('client')">Prev</button>
<span id="clientPage"></span>
<button onclick="nextPage('client')">Next</button>
</div></div><!-- TRANSPORTER --><div class="card"><h3>Add Transporter</h3><input id="transporterName" placeholder="Owner Name">
<input id="transporterCompany" placeholder="Company">
<input id="transporterPhone" placeholder="Phone"><button class="saveBtn" onclick="addTransporter()">Save</button>

<input placeholder="Search Transporter" onkeyup="searchTable('transporterTable',this.value)"><table><thead>
<tr>
<th>Name</th>
<th>Company</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead><tbody id="transporterTable"></tbody></table><div class="pagination">
<button onclick="prevPage('transporter')">Prev</button>
<span id="transporterPage"></span>
<button onclick="nextPage('transporter')">Next</button>
</div></div><!-- TRUCK --><div class="card"><h3>Add Truck</h3><select id="ownerSelect">
<option value="">Select Owner</option>
</select><input id="truckNumber" placeholder="Truck Number"><input id="driverName" placeholder="Driver Name"><input id="driverPhone" placeholder="Driver Phone"><button class="saveBtn" onclick="addTruck()">Save</button>

<input placeholder="Search Truck" onkeyup="searchTable('truckTable',this.value)"><table><thead>
<tr>
<th>Truck ID</th>
<th>Truck</th>
<th>Owner</th>
<th>Driver</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead><tbody id="truckTable"></tbody></table><div class="pagination">
<button onclick="prevPage('truck')">Prev</button>
<span id="truckPage"></span>
<button onclick="nextPage('truck')">Next</button>
</div></div></div><script>

const supabaseClient=supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

let pageSize=10
let pages={commodity:1,route:1,client:1,transporter:1,truck:1}

window.onload=init


async function init(){

loadCommodities()
loadRoutes()
loadClients()
loadTransporters()
loadOwners()
loadTrucks()

}



/* PAGINATION */

function paginate(data,type){

let start=(pages[type]-1)*pageSize
let end=start+pageSize

return data.slice(start,end)

}

function nextPage(type){pages[type]++;reload(type)}
function prevPage(type){if(pages[type]>1)pages[type]--;reload(type)}

function reload(type){

if(type=="commodity")loadCommodities()
if(type=="route")loadRoutes()
if(type=="client")loadClients()
if(type=="transporter")loadTransporters()
if(type=="truck")loadTrucks()

}



function searchTable(table,input){

let filter=input.toLowerCase()

let rows=document.querySelectorAll(`#${table} tr`)

rows.forEach(r=>{
let txt=r.innerText.toLowerCase()
r.style.display=txt.includes(filter)?"":"none"
})

}



/* COMMODITIES */

async function addCommodity(){

await supabaseClient.from("commodities")
.insert({name:commodityName.value})

commodityName.value=""

loadCommodities()

}

async function loadCommodities(){

let {data}=await supabaseClient.from("commodities").select("*")

let rows=paginate(data,"commodity")

let html=""

rows.forEach(c=>{

html+=`
<tr>
<td>${c.name}</td>
<td>
<button class="editBtn" onclick="editCommodity('${c.id}','${c.name}')">Edit</button>
<button class="deleteBtn" onclick="deleteCommodity('${c.id}')">Delete</button>
</td>
</tr>`

})

commodityTable.innerHTML=html
commodityPage.innerText="Page "+pages.commodity

}

async function editCommodity(id,name){

let newName=prompt("Edit Commodity",name)

await supabaseClient.from("commodities")
.update({name:newName})
.eq("id",id)

loadCommodities()

}

async function deleteCommodity(id){

if(!confirm("Delete?"))return

await supabaseClient.from("commodities")
.delete()
.eq("id",id)

loadCommodities()

}



/* ROUTES */

async function addRoute(){

let o=origin.value
let d=destination.value

let code=o.substring(0,4).toUpperCase()+"-"+d.substring(0,4).toUpperCase()

await supabaseClient.from("routes")
.insert({route_code:code,origin:o,destination:d})

loadRoutes()

}

async function loadRoutes(){

let {data}=await supabaseClient.from("routes").select("*")

let rows=paginate(data,"route")

let html=""

rows.forEach(r=>{

html+=`
<tr>
<td>${r.route_code}</td>
<td>${r.origin}</td>
<td>${r.destination}</td>
<td>
<button class="editBtn" onclick="editRoute('${r.id}','${r.origin}','${r.destination}')">Edit</button>
<button class="deleteBtn" onclick="deleteRoute('${r.id}')">Delete</button>
</td>
</tr>`

})

routeTable.innerHTML=html
routePage.innerText="Page "+pages.route

}

async function editRoute(id,o,d){

let newOrigin=prompt("Origin",o)
let newDest=prompt("Destination",d)

let code=newOrigin.substring(0,4).toUpperCase()+"-"+newDest.substring(0,4).toUpperCase()

await supabaseClient.from("routes")
.update({origin:newOrigin,destination:newDest,route_code:code})
.eq("id",id)

loadRoutes()

}

async function deleteRoute(id){

await supabaseClient.from("routes")
.delete()
.eq("id",id)

loadRoutes()

}



/* CLIENT */

async function addClient(){

await supabaseClient.from("clients").insert({
client_name:clientName.value,
company:clientCompany.value,
phone:clientPhone.value,
email:clientEmail.value
})

loadClients()

}

async function loadClients(){

let {data}=await supabaseClient.from("clients").select("*")

let rows=paginate(data,"client")

let html=""

rows.forEach(c=>{

html+=`
<tr>
<td>${c.client_name}</td>
<td>${c.company}</td>
<td>${c.phone}</td>
<td>${c.email}</td>
<td>
<button class="editBtn" onclick="editClient('${c.id}','${c.client_name}','${c.company}','${c.phone}','${c.email}')">Edit</button>
<button class="deleteBtn" onclick="deleteClient('${c.id}')">Delete</button>
</td>
</tr>`

})

clientTable.innerHTML=html
clientPage.innerText="Page "+pages.client

}

async function editClient(id,n,c,p,e){

let name=prompt("Name",n)
let comp=prompt("Company",c)
let ph=prompt("Phone",p)
let em=prompt("Email",e)

await supabaseClient.from("clients")
.update({client_name:name,company:comp,phone:ph,email:em})
.eq("id",id)

loadClients()

}

async function deleteClient(id){

await supabaseClient.from("clients")
.delete()
.eq("id",id)

loadClients()

}



/* TRANSPORTERS */

async function addTransporter(){

await supabaseClient.from("transporters").insert({
transporter_name:transporterName.value,
company:transporterCompany.value,
phone:transporterPhone.value
})

loadTransporters()
loadOwners()

}

async function loadTransporters(){

let {data}=await supabaseClient.from("transporters").select("*")

let rows=paginate(data,"transporter")

let html=""

rows.forEach(t=>{

html+=`
<tr>
<td>${t.transporter_name}</td>
<td>${t.company}</td>
<td>${t.phone}</td>
<td>
<button class="editBtn" onclick="editTransporter('${t.id}','${t.transporter_name}','${t.company}','${t.phone}')">Edit</button>
<button class="deleteBtn" onclick="deleteTransporter('${t.id}')">Delete</button>
</td>
</tr>`

})

transporterTable.innerHTML=html
transporterPage.innerText="Page "+pages.transporter

}

async function editTransporter(id,n,c,p){

let name=prompt("Name",n)
let comp=prompt("Company",c)
let ph=prompt("Phone",p)

await supabaseClient.from("transporters")
.update({transporter_name:name,company:comp,phone:ph})
.eq("id",id)

loadTransporters()

}

async function deleteTransporter(id){

await supabaseClient.from("transporters")
.delete()
.eq("id",id)

loadTransporters()

}



/* OWNER DROPDOWN */

async function loadOwners(){

let {data}=await supabaseClient.from("transporters").select("*")

ownerSelect.innerHTML='<option value="">Select Owner</option>'

data.forEach(o=>{
let opt=document.createElement("option")
opt.value=o.id
opt.text=o.transporter_name
ownerSelect.appendChild(opt)
})

}



/* TRUCK */

async function addTruck(){

let number=truckNumber.value.toUpperCase()

let letters=number.match(/[A-Z]{2}/)[0]
let last4=number.slice(-4)

let id=letters+"-"+last4


let {data:existing}=await supabaseClient
.from("trucks")
.select("*")
.eq("truck_number",number)

if(existing.length){
alert("Truck already exists")
return
}

await supabaseClient.from("trucks").insert({
truck_id:id,
truck_number:number,
transporter_id:ownerSelect.value,
driver_name:driverName.value,
driver_phone:driverPhone.value
})

loadTrucks()

}



async function loadTrucks(){

let {data}=await supabaseClient
.from("trucks")
.select(`
truck_id,
truck_number,
driver_name,
driver_phone,
transporters(transporter_name)
`)

let rows=paginate(data,"truck")

let html=""

rows.forEach(t=>{

html+=`
<tr>
<td>${t.truck_id}</td>
<td>${t.truck_number}</td>
<td>${t.transporters.transporter_name}</td>
<td>${t.driver_name}</td>
<td>${t.driver_phone}</td>
<td>
<button class="editBtn" onclick="editTruck('${t.truck_id}','${t.driver_name}','${t.driver_phone}')">Edit</button>
<button class="deleteBtn" onclick="deleteTruck('${t.truck_id}')">Delete</button>
</td>
</tr>`

})

truckTable.innerHTML=html
truckPage.innerText="Page "+pages.truck

}



async function editTruck(id,d,p){

let driver=prompt("Driver",d)
let phone=prompt("Phone",p)

await supabaseClient.from("trucks")
.update({driver_name:driver,driver_phone:phone})
.eq("truck_id",id)

loadTrucks()

}

async function deleteTruck(id){

if(!confirm("Delete truck?"))return

await supabaseClient.from("trucks")
.delete()
.eq("truck_id",id)

loadTrucks()

}

</script></body>
</html>
