</script><div class="main"><h1>Master Data</h1><!-- ROUTES --><div class="card"><h3>Routes</h3><input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination">
<input id="routeCode" placeholder="Route Code" readonly><button onclick="generateRoute()">Generate</button>
<button onclick="addRoute()">Add Route</button>

<table><thead>
<tr>
<th>Origin</th>
<th>Destination</th>
<th>Code</th>
<th>Action</th>
</tr>
</thead><tbody id="routeTable"></tbody></table></div><!-- TRANSPORTERS --><div class="card"><h3>Transporters</h3><input id="tName" placeholder="Name">
<input id="tPhone" placeholder="Phone">
<input id="tCompany" placeholder="Company">
<input id="tPAN" placeholder="PAN"><button onclick="addTransporter()">Add Transporter</button>

<table><thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Company</th>
<th>PAN</th>
<th>Action</th>
</tr>
</thead><tbody id="transporterTable"></tbody></table></div><!-- TRUCKS --><div class="card"><h3>Trucks</h3><input id="truckNumber" placeholder="Truck Number"><select id="truckTransporter"></select>

<button onclick="addTruck()">Add Truck</button>

<table><thead>
<tr>
<th>Truck</th>
<th>Transporter</th>
<th>Action</th>
</tr>
</thead><tbody id="truckTable"></tbody></table></div><!-- COMMODITIES --><div class="card"><h3>Commodities</h3><input id="commodityName" placeholder="Commodity">
<button onclick="addCommodity()">Add Commodity</button><table><thead>
<tr>
<th>Commodity</th>
<th>Action</th>
</tr>
</thead><tbody id="commodityTable"></tbody></table></div></div><script>

let transporters=[]

init()

async function init(){

await loadTransporters()
await loadRoutes()
await loadTrucks()
await loadCommodities()

}

/* ROUTE CODE */

function generateRoute(){

let o=document.getElementById("origin").value.substring(0,4).toUpperCase()
let d=document.getElementById("destination").value.substring(0,4).toUpperCase()

document.getElementById("routeCode").value=o+"-"+d

}

/* ROUTES */

async function loadRoutes(){

const {data}=await supabaseClient.from("routes").select("*")

let html=""

data.forEach(r=>{
html+=`
<tr>
<td>${r.origin}</td>
<td>${r.destination}</td>
<td>${r.route_code}</td>
<td>
<button class="editBtn" onclick="editRoute('${r.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteRoute('${r.id}')">Delete</button>
</td>
</tr>
`
})

document.getElementById("routeTable").innerHTML=html

}

async function addRoute(){

let origin=document.getElementById("origin").value
let destination=document.getElementById("destination").value
let code=document.getElementById("routeCode").value

await supabaseClient.from("routes").insert({
origin:origin,
destination:destination,
route_code:code
})

loadRoutes()

}

async function editRoute(id){

let origin=prompt("Origin")
let destination=prompt("Destination")

let code=origin.substring(0,4).toUpperCase()+"-"+destination.substring(0,4).toUpperCase()

await supabaseClient
.from("routes")
.update({
origin:origin,
destination:destination,
route_code:code
})
.eq("id",id)

loadRoutes()

}

async function deleteRoute(id){

await supabaseClient.from("routes").delete().eq("id",id)

loadRoutes()

}


/* TRANSPORTERS */

async function loadTransporters(){

const {data}=await supabaseClient.from("transporters").select("*")

transporters=data

let dropdown='<option value="">Select Transporter</option>'

let html=""

data.forEach(t=>{

dropdown+=`<option value="${t.id}">${t.transporter_name}</option>`

html+=`
<tr>
<td>${t.transporter_name}</td>
<td>${t.phone||""}</td>
<td>${t.company||""}</td>
<td>${t.PAN||""}</td>
<td>
<button class="editBtn" onclick="editTransporter('${t.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTransporter('${t.id}')">Delete</button>
</td>
</tr>
`
})

document.getElementById("truckTransporter").innerHTML=dropdown
document.getElementById("transporterTable").innerHTML=html

}

async function addTransporter(){

let name=document.getElementById("tName").value
let phone=document.getElementById("tPhone").value
let company=document.getElementById("tCompany").value
let pan=document.getElementById("tPAN").value

await supabaseClient.from("transporters").insert({
transporter_name:name,
phone:phone,
company:company,
PAN:pan
})

loadTransporters()

}

async function editTransporter(id){

let name=prompt("Transporter Name")
let phone=prompt("Phone")
let company=prompt("Company")
let pan=prompt("PAN")

await supabaseClient
.from("transporters")
.update({
transporter_name:name,
phone:phone,
company:company,
PAN:pan
})
.eq("id",id)

loadTransporters()

}

async function deleteTransporter(id){

await supabaseClient.from("transporters").delete().eq("id",id)

loadTransporters()

}


/* TRUCKS */

async function loadTrucks(){

const {data}=await supabaseClient.from("trucks").select("*")

let html=""

data.forEach(t=>{

let transporter=transporters.find(x=>x.id==t.transporter_id)

html+=`
<tr>
<td>${t.truck_number}</td>
<td>${transporter?transporter.transporter_name:""}</td>
<td>
<button class="editBtn" onclick="editTruck('${t.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTruck('${t.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("truckTable").innerHTML=html

}

async function addTruck(){

let number=document.getElementById("truckNumber").value
let transporter=document.getElementById("truckTransporter").value

await supabaseClient.from("trucks").insert({
truck_number:number,
transporter_id:transporter
})

loadTrucks()

}

async function editTruck(id){

let number=prompt("Truck Number")

await supabaseClient
.from("trucks")
.update({truck_number:number})
.eq("id",id)

loadTrucks()

}

async function deleteTruck(id){

await supabaseClient.from("trucks").delete().eq("id",id)

loadTrucks()

}


/* COMMODITIES */

async function loadCommodities(){

const {data}=await supabaseClient.from("commodities").select("*")

let html=""

data.forEach(c=>{
html+=`
<tr>
<td>${c.name}</td>
<td>
<button class="editBtn" onclick="editCommodity('${c.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteCommodity('${c.id}')">Delete</button>
</td>
</tr>
`
})

document.getElementById("commodityTable").innerHTML=html

}

async function addCommodity(){

let name=document.getElementById("commodityName").value

await supabaseClient.from("commodities").insert({name:name})

loadCommodities()

}

async function editCommodity(id){

let name=prompt("Commodity Name")

await supabaseClient
.from("commodities")
.update({name:name})
.eq("id",id)

loadCommodities()

}

async function deleteCommodity(id){

await supabaseClient.from("commodities").delete().eq("id",id)

loadCommodities()

}

</script></body>
