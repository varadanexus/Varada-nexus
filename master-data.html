<!DOCTYPE html>
<html>

<head>

<title>Master Data - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>
<script src="menu-rbac.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select{
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:8px 12px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

h3{
margin-top:0;
}

</style>

</head>

<body>

<script>

/* SUPABASE CLIENT */

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmRhc2UiLCJyZWYiOiJ0aWNzZ2J0eGZoaGlobWFtZWppc3MiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc3MzQyMTkyOSwiZXhwIjoyMDg4OTk3OTI5fQ.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

</script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>

/* STANDARD SIDEBAR */

fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data
await initSidebar()
})

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const authId = session.user.id
const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

/* LOGOUT */

window.logout = async function(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}

</script>

<div class="main">

<h2>Master Data</h2>

<!-- ROUTES -->
<div class="card">

<h3>Add Route</h3>

<input id="routeCode" placeholder="Route Code">

<button onclick="addRoute()">Add Route</button>

</div>

<!-- TRUCKS -->
<div class="card">

<h3>Add Truck</h3>

<input id="truckNo" placeholder="Truck Number">

<select id="transporterSelect"></select>

<button onclick="addTruck()">Add Truck</button>

</div>

<!-- COMMODITIES -->
<div class="card">

<h3>Add Commodity</h3>

<input id="commodityName" placeholder="Commodity Name">

<button onclick="addCommodity()">Add Commodity</button>

</div>

<!-- CLIENTS -->
<div class="card">

<h3>Add Client</h3>

<input id="clientName" placeholder="Client Name">

<button onclick="addClient()">Add Client</button>

</div>

</div>

<script>

/* INIT */

init()

async function init(){

await loadTransporters()

}

/* LOAD TRANSPORTERS */

async function loadTransporters(){

const {data}=await supabaseClient
.from("transporters")
.select("*")

let html='<option value="">Select Transporter</option>'

data?.forEach(t=>{
html+=`<option value="${t.id}">${t.transporter_name}</option>`
})

document.getElementById("transporterSelect").innerHTML=html

}

/* ADD ROUTE */

async function addRoute(){

let val=document.getElementById("routeCode").value

if(!val){
alert("Enter route")
return
}

await supabaseClient.from("routes").insert({
route_code:val
})

alert("Route Added")

document.getElementById("routeCode").value=""

}

/* ADD TRUCK */

async function addTruck(){

let truck=document.getElementById("truckNo").value
let transporter=document.getElementById("transporterSelect").value

if(!truck || !transporter){
alert("Enter truck & transporter")
return
}

await supabaseClient.from("trucks").insert({
truck_number:truck,
transporter_id:transporter
})

alert("Truck Added")

document.getElementById("truckNo").value=""

}

/* ADD COMMODITY */

async function addCommodity(){

let val=document.getElementById("commodityName").value

if(!val){
alert("Enter commodity")
return
}

await supabaseClient.from("commodities").insert({
name:val
})

alert("Commodity Added")

document.getElementById("commodityName").value=""

}

/* ADD CLIENT */

async function addClient(){

let val=document.getElementById("clientName").value

if(!val){
alert("Enter client")
return
}

await supabaseClient.from("clients").insert({
company:val
})

alert("Client Added")

document.getElementById("clientName").value=""

}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
