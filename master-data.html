<script>

/* ================= AUTO GENERATION ================= */

/* ROUTE AUTO CODE */

document.getElementById("origin").addEventListener("input",generateRouteCode)
document.getElementById("destination").addEventListener("input",generateRouteCode)

function generateRouteCode(){
let from=document.getElementById("origin").value
let to=document.getElementById("destination").value

if(from && to){
document.getElementById("routeCode").value =
from.substring(0,4).toUpperCase()+"-"+to.substring(0,4).toUpperCase()
}
}

/* ================= ADD FUNCTIONS ================= */

/* CLIENT */

async function addClient(){

let name=document.getElementById("clientName").value
let company=document.getElementById("clientCompany").value
let phone=document.getElementById("clientPhone").value
let email=document.getElementById("clientEmail").value

if(!company){
alert("Enter client company")
return
}

await supabaseClient.from("clients").insert({
client_name:name,
company:company,
phone:phone,
email:email
})

loadClients()

}

/* TRANSPORTER */

async function addTransporter(){

await supabaseClient.from("transporters").insert({
transporter_name:document.getElementById("tName").value,
phone:document.getElementById("tPhone").value,
company:document.getElementById("tCompany").value,
PAN:document.getElementById("tPAN").value
})

loadTransporters()

}

/* ROUTE */

async function addRoute(){

let origin=document.getElementById("origin").value
let destination=document.getElementById("destination").value
let code=document.getElementById("routeCode").value

if(!origin || !destination){
alert("Enter route details")
return
}

await supabaseClient.from("routes").insert({
origin:origin,
destination:destination,
route_code:code
})

loadRoutes()

}

/* TRUCK */

async function addTruck(){

let number=document.getElementById("truckNumber").value
let transporter=document.getElementById("truckTransporter").value

if(!number || !transporter){
alert("Enter truck and transporter")
return
}

/* AUTO FORMAT */
let formatted = number.toUpperCase().replace(/\s/g,"")

await supabaseClient.from("trucks").insert({
truck_number:formatted,
transporter_id:transporter
})

loadTrucks()

}

/* COMMODITY */

async function addCommodity(){

let name=document.getElementById("commodityName").value

if(!name){
alert("Enter commodity")
return
}

await supabaseClient.from("commodities").insert({
name:name
})

loadCommodities()

}

/* ================= SAVE FUNCTIONS ================= */

async function saveTransporter(btn){

let row=btn.closest("tr")
let id=row.dataset.id
let cells=row.querySelectorAll("td")

await supabaseClient.from("transporters").update({
transporter_name:cells[0].innerText,
phone:cells[1].innerText,
company:cells[2].innerText,
PAN:cells[3].innerText
}).eq("id",id)

alert("Saved")

}

async function saveRoute(btn){

let row=btn.closest("tr")
let id=row.dataset.id
let cells=row.querySelectorAll("td")

let origin=cells[0].innerText
let destination=cells[1].innerText

let code=origin.substring(0,4).toUpperCase()+"-"+destination.substring(0,4).toUpperCase()

await supabaseClient.from("routes").update({
origin:origin,
destination:destination,
route_code:code
}).eq("id",id)

loadRoutes()

}

async function saveCommodity(btn){

let row=btn.closest("tr")
let id=row.dataset.id
let val=row.querySelector("td").innerText

await supabaseClient.from("commodities").update({
name:val
}).eq("id",id)

alert("Saved")

}

/* ================= INIT ================= */

loadClients()
loadTransporters()
loadRoutes()
loadTrucks()
loadCommodities()

</script>
