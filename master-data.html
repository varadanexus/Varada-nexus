</script><div class="main"><h1>Master Data</h1><!-- ROUTES --><div class="card"><h3>Routes</h3><input id="routeCode" placeholder="Route Code">
<button onclick="addRoute()">Add Route</button><input id="routeSearch" placeholder="Search Route" onkeyup="searchRoutes()"><table>
<thead>
<tr>
<th>Route</th>
<th>Action</th>
</tr>
</thead><tbody id="routeTable"></tbody></table><div class="pagination">
<button onclick="prevRoute()">Prev</button>
<button onclick="nextRoute()">Next</button>
<button onclick="routePDF()">Download PDF</button>
</div></div><!-- TRANSPORTERS --><div class="card"><h3>Transporters</h3><input id="tName" placeholder="Name">
<input id="tPhone" placeholder="Contact">
<input id="tCompany" placeholder="Company">
<input id="tPAN" placeholder="PAN"><button onclick="addTransporter()">Add</button>

<input id="transporterSearch" placeholder="Search Transporter" onkeyup="searchTransporters()"><table>
<thead>
<tr>
<th>Name</th>
<th>Contact</th>
<th>Company</th>
<th>PAN</th>
<th>Action</th>
</tr>
</thead><tbody id="transporterTable"></tbody></table><div class="pagination">
<button onclick="prevTransporter()">Prev</button>
<button onclick="nextTransporter()">Next</button>
<button onclick="transporterPDF()">Download PDF</button>
</div></div><!-- TRUCKS --><div class="card"><h3>Trucks</h3><input id="truckNumber" placeholder="Truck Number">
<select id="truckTransporter"></select><button onclick="addTruck()">Add Truck</button>

<input id="truckSearch" placeholder="Search Truck" onkeyup="searchTrucks()"><table><thead>
<tr>
<th>Truck</th>
<th>Transporter</th>
<th>Action</th>
</tr>
</thead><tbody id="truckTable"></tbody></table><div class="pagination">
<button onclick="prevTruck()">Prev</button>
<button onclick="nextTruck()">Next</button>
<button onclick="truckPDF()">Download PDF</button>
</div></div><!-- COMMODITIES --><div class="card"><h3>Commodities</h3><input id="commodityName" placeholder="Commodity">
<button onclick="addCommodity()">Add Commodity</button><input id="commoditySearch" placeholder="Search Commodity" onkeyup="searchCommodities()"><table><thead>
<tr>
<th>Commodity</th>
<th>Action</th>
</tr>
</thead><tbody id="commodityTable"></tbody></table><div class="pagination">
<button onclick="prevCommodity()">Prev</button>
<button onclick="nextCommodity()">Next</button>
<button onclick="commodityPDF()">Download PDF</button>
</div></div></div><script>

let routes=[]
let transporters=[]
let trucks=[]
let commodities=[]

let routePage=1
let transporterPage=1
let truckPage=1
let commodityPage=1

const pageSize=10

init()

async function init(){

await loadTransporters()
await loadRoutes()
await loadTrucks()
await loadCommodities()

}

async function loadRoutes(){

const {data}=await supabaseClient.from("routes").select("*")

routes=data

renderRoutes()

}

function renderRoutes(){

let start=(routePage-1)*pageSize
let page=routes.slice(start,start+pageSize)

let html=""

page.forEach(r=>{
html+=`
<tr>
<td>${r.route_code}</td>
<td>
<button class="editBtn" onclick="editRoute('${r.id}','${r.route_code}')">Edit</button>
<button class="deleteBtn" onclick="deleteRoute('${r.id}')">Delete</button>
</td>
</tr>
`
})

document.getElementById("routeTable").innerHTML=html

}

function searchRoutes(){

let val=document.getElementById("routeSearch").value.toLowerCase()

routes=routes.filter(r=>r.route_code.toLowerCase().includes(val))

routePage=1

renderRoutes()

}

async function addRoute(){

let code=document.getElementById("routeCode").value

await supabaseClient.from("routes").insert({route_code:code})

document.getElementById("routeCode").value=""

loadRoutes()

}

async function deleteRoute(id){

await supabaseClient.from("routes").delete().eq("id",id)

loadRoutes()

}

function nextRoute(){routePage++;renderRoutes()}
function prevRoute(){if(routePage>1)routePage--;renderRoutes()}

function routePDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let rows=[]

routes.forEach(r=>{
rows.push([r.route_code])
})

doc.autoTable({
head:[["Route"]],
body:rows
})

doc.save("routes.pdf")

}



async function loadTransporters(){

const {data}=await supabaseClient.from("transporters").select("*")

transporters=data

let dropdown='<option value="">Select Transporter</option>'

data.forEach(t=>{
dropdown+=`<option value="${t.id}">${t.transporter_name}</option>`
})

document.getElementById("truckTransporter").innerHTML=dropdown

renderTransporters()

}

function renderTransporters(){

let start=(transporterPage-1)*pageSize
let page=transporters.slice(start,start+pageSize)

let html=""

page.forEach(t=>{
html+=`
<tr>
<td>${t.transporter_name}</td>
<td>${t.contact_number||""}</td>
<td>${t.company_name||""}</td>
<td>${t.pan_number||""}</td>
<td>
<button class="editBtn">Edit</button>
<button class="deleteBtn" onclick="deleteTransporter('${t.id}')">Delete</button>
</td>
</tr>
`
})

document.getElementById("transporterTable").innerHTML=html

}

async function addTransporter(){

let name=document.getElementById("tName").value
let phone=document.getElementById("tPhone").value
let company=document.getElementById("tCompany").value
let pan=document.getElementById("tPAN").value

await supabaseClient.from("transporters").insert({

transporter_name:name,
contact_number:phone,
company_name:company,
pan_number:pan

})

loadTransporters()

}

async function deleteTransporter(id){

await supabaseClient.from("transporters").delete().eq("id",id)

loadTransporters()

}

function nextTransporter(){transporterPage++;renderTransporters()}
function prevTransporter(){if(transporterPage>1)transporterPage--;renderTransporters()}



async function loadTrucks(){

const {data}=await supabaseClient.from("trucks").select("*")

trucks=data

renderTrucks()

}

function renderTrucks(){

let start=(truckPage-1)*pageSize
let page=trucks.slice(start,start+pageSize)

let html=""

page.forEach(t=>{

let transporter=transporters.find(x=>x.id==t.transporter_id)

html+=`
<tr>
<td>${t.truck_number}</td>
<td>${transporter?transporter.transporter_name:""}</td>
<td>
<button class="deleteBtn" onclick="deleteTruck('${t.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("truckTable").innerHTML=html

}

async function addTruck(){

let number=document.getElementById("truckNumber").value
let transporter=document.getElementById("truckTransporter").value

await supabaseClient.from("trucks").insert({

truck_number:number,
transporter_id:transporter

})

loadTrucks()

}

async function deleteTruck(id){

await supabaseClient.from("trucks").delete().eq("id",id)

loadTrucks()

}

function nextTruck(){truckPage++;renderTrucks()}
function prevTruck(){if(truckPage>1)truckPage--;renderTrucks()}



async function loadCommodities(){

const {data}=await supabaseClient.from("commodities").select("*")

commodities=data

renderCommodities()

}

function renderCommodities(){

let start=(commodityPage-1)*pageSize
let page=commodities.slice(start,start+pageSize)

let html=""

page.forEach(c=>{
html+=`
<tr>
<td>${c.name}</td>
<td>
<button class="deleteBtn" onclick="deleteCommodity('${c.id}')">Delete</button>
</td>
</tr>
`
})

document.getElementById("commodityTable").innerHTML=html

}

async function addCommodity(){

let name=document.getElementById("commodityName").value

await supabaseClient.from("commodities").insert({name:name})

loadCommodities()

}

async function deleteCommodity(id){

await supabaseClient.from("commodities").delete().eq("id",id)

loadCommodities()

}

function nextCommodity(){commodityPage++;renderCommodities()}
function prevCommodity(){if(commodityPage>1)commodityPage--;renderCommodities()}

</script></body>
</html>
