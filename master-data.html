<!DOCTYPE html><html><head><title>Master Data</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script><style>

</style></head><body><div class="sidebar"><h2 style="padding-left:20px;">Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>

</div><div class="main"><h2>Master Data Management</h2><!-- COMMODITY --><div class="card"><h3>Add Commodity</h3><input id="commodityName" placeholder="Commodity Name"><button onclick="addCommodity()">Save Commodity</button>

<table><thead>
<tr><th>Commodity</th></tr>
</thead><tbody id="commodityTable"></tbody></table></div><!-- ROUTE --><div class="card"><h3>Add Route</h3><input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination"><button onclick="addRoute()">Save Route</button>

<table><thead>
<tr>
<th>Route Code</th>
<th>Origin</th>
<th>Destination</th>
</tr>
</thead><tbody id="routeTable"></tbody></table></div><!-- CLIENT --><div class="card"><h3>Add Client</h3><input id="clientName" placeholder="Client Name">
<input id="clientCompany" placeholder="Company">
<input id="clientPhone" placeholder="Phone">
<input id="clientEmail" placeholder="Email"><button onclick="addClient()">Save Client</button>

<table><thead>
<tr>
<th>Name</th>
<th>Company</th>
<th>Phone</th>
<th>Email</th>
</tr>
</thead><tbody id="clientTable"></tbody></table></div><!-- TRANSPORTER --><div class="card"><h3>Add Transporter / Owner</h3><input id="transporterName" placeholder="Owner Name">
<input id="transporterCompany" placeholder="Company">
<input id="transporterPhone" placeholder="Phone"><button onclick="addTransporter()">Save Transporter</button>

<table><thead>
<tr>
<th>Name</th>
<th>Company</th>
<th>Phone</th>
</tr>
</thead><tbody id="transporterTable"></tbody></table></div><!-- TRUCK --><div class="card"><h3>Add Truck</h3><select id="ownerSelect">
<option value="">Select Owner</option>
</select><input id="truckNumber" placeholder="Truck Number">
<input id="driverName" placeholder="Driver Name">
<input id="driverPhone" placeholder="Driver Phone"><button onclick="addTruck()">Save Truck</button>

<table><thead>
<tr>
<th>Truck ID</th>
<th>Truck Number</th>
<th>Owner</th>
<th>Driver</th>
</tr>
</thead><tbody id="truckTable"></tbody></table></div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

let ownerDropdown

loadCommodities()
loadRoutes()
loadClients()
loadTransporters()
loadOwnersDropdown()
loadTrucks()

/* COMMODITY */

async function addCommodity(){

let name=document.getElementById("commodityName").value.trim().toUpperCase()

if(name===""){
alert("Enter commodity name")
return
}

await supabaseClient.from("commodities").insert([{name:name}])

document.getElementById("commodityName").value=""

loadCommodities()

}

/* ROUTE */

async function addRoute(){

let origin=document.getElementById("origin").value.trim().toUpperCase()
let destination=document.getElementById("destination").value.trim().toUpperCase()

if(origin==="" || destination===""){
alert("Enter origin and destination")
return
}

let routeCode=origin.substring(0,4)+"-"+destination.substring(0,4)

await supabaseClient.from("routes").insert([{
route_code:routeCode,
origin:origin,
destination:destination
}])

document.getElementById("origin").value=""
document.getElementById("destination").value=""

loadRoutes()

}

/* CLIENT */

async function addClient(){

let name=document.getElementById("clientName").value.trim()

if(name===""){
alert("Enter client name")
return
}

await supabaseClient.from("clients").insert([{
client_name:name,
company:document.getElementById("clientCompany").value,
phone:document.getElementById("clientPhone").value,
email:document.getElementById("clientEmail").value
}])

document.getElementById("clientName").value=""
document.getElementById("clientCompany").value=""
document.getElementById("clientPhone").value=""
document.getElementById("clientEmail").value=""

loadClients()

}

/* TRANSPORTER */

async function addTransporter(){

let name=document.getElementById("transporterName").value.trim()

if(name===""){
alert("Enter transporter name")
return
}

await supabaseClient.from("transporters").insert([{
transporter_name:name,
company:document.getElementById("transporterCompany").value,
phone:document.getElementById("transporterPhone").value
}])

document.getElementById("transporterName").value=""
document.getElementById("transporterCompany").value=""
document.getElementById("transporterPhone").value=""

loadTransporters()
loadOwnersDropdown()

}

/* TRUCK */

async function addTruck(){

let owner=document.getElementById("ownerSelect").value
let truckNumber=document.getElementById("truckNumber").value.toUpperCase()
let driver=document.getElementById("driverName").value
let phone=document.getElementById("driverPhone").value

if(owner==="" || truckNumber==="" || driver===""){
alert("Fill all truck details")
return
}

let code=truckNumber.substring(4,6)
let last=truckNumber.slice(-4)

let truckID=code+"-"+last

await supabaseClient.from("trucks").insert([{
truck_id:truckID,
truck_number:truckNumber,
transporter_id:owner,
driver_name:driver,
driver_phone:phone
}])

document.getElementById("truckNumber").value=""
document.getElementById("driverName").value=""
document.getElementById("driverPhone").value=""

if(ownerDropdown){
ownerDropdown.clear()
}

loadTrucks()

}

</script></body>
</html>
