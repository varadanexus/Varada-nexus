<!DOCTYPE html>
<html>

<head>

<title>Master Data</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="menu-rbac.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
margin-bottom:25px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select{
padding:8px;
margin-right:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:8px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-top:5px;
}

.editBtn{background:#5bc0de;}
.deleteBtn{background:#d9534f;}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
}

.searchBox{
margin-top:10px;
margin-bottom:10px;
}

.pagination button{
margin-right:5px;
}

</style>

</head>

<body>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"YOUR_ANON_KEY"
)

async function checkLogin(){
const {data}=await supabaseClient.auth.getSession()
if(!data.session){
window.location.href="login.html"
}
}

checkLogin()

async function logout(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

</script>


<!-- SIDEBAR -->

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
setTimeout(()=>{
if(typeof applyMenuRBAC==="function"){applyMenuRBAC()}
},300)
})
</script>


<div class="main">

<h1>Master Data</h1>


<!-- CLIENTS -->

<div class="card">

<h3>Clients</h3>

<input id="clientName" placeholder="Contact Name">
<input id="clientCompany" placeholder="Company">
<input id="clientPhone" placeholder="Phone">
<input id="clientEmail" placeholder="Email">

<button onclick="addClient()">Add Client</button>

<br>

<input class="searchBox" id="clientSearch" placeholder="Search Client" onkeyup="searchTable('clientTable','clientSearch')">

<table>

<thead>
<tr>
<th>Name</th>
<th>Company</th>
<th>Phone</th>
<th>Email</th>
<th>Action</th>
</tr>
</thead>

<tbody id="clientTable"></tbody>

</table>

<div class="pagination">
<button onclick="prevPage('client')">Prev</button>
<button onclick="nextPage('client')">Next</button>
</div>

</div>


<!-- TRANSPORTERS -->

<div class="card">

<h3>Transporters</h3>

<input id="tName" placeholder="Name">
<input id="tPhone" placeholder="Phone">
<input id="tCompany" placeholder="Company">
<input id="tPAN" placeholder="PAN">

<button onclick="addTransporter()">Add Transporter</button>

<br>

<input class="searchBox" id="transporterSearch" placeholder="Search Transporter" onkeyup="searchTable('transporterTable','transporterSearch')">

<table>

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Company</th>
<th>PAN</th>
<th>Action</th>
</tr>
</thead>

<tbody id="transporterTable"></tbody>

</table>

<div class="pagination">
<button onclick="prevPage('transporter')">Prev</button>
<button onclick="nextPage('transporter')">Next</button>
</div>

</div>


<!-- ROUTES -->

<div class="card">

<h3>Routes</h3>

<input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination">
<input id="routeCode" placeholder="Route Code">

<button onclick="generateRoute()">Generate</button>
<button onclick="addRoute()">Add Route</button>

<br>

<input class="searchBox" id="routeSearch" placeholder="Search Route" onkeyup="searchTable('routeTable','routeSearch')">

<table>

<thead>
<tr>
<th>Origin</th>
<th>Destination</th>
<th>Code</th>
<th>Action</th>
</tr>
</thead>

<tbody id="routeTable"></tbody>

</table>

<div class="pagination">
<button onclick="prevPage('route')">Prev</button>
<button onclick="nextPage('route')">Next</button>
</div>

</div>


<!-- TRUCKS -->

<div class="card">

<h3>Trucks</h3>

<input id="truckNumber" placeholder="Truck Number">
<select id="truckTransporter"></select>

<button onclick="addTruck()">Add Truck</button>

<br>

<input class="searchBox" id="truckSearch" placeholder="Search Truck" onkeyup="searchTable('truckTable','truckSearch')">

<table>

<thead>
<tr>
<th>Truck</th>
<th>Transporter</th>
<th>Action</th>
</tr>
</thead>

<tbody id="truckTable"></tbody>

</table>

<div class="pagination">
<button onclick="prevPage('truck')">Prev</button>
<button onclick="nextPage('truck')">Next</button>
</div>

</div>


<!-- COMMODITIES -->

<div class="card">

<h3>Commodities</h3>

<input id="commodityName" placeholder="Commodity">

<button onclick="addCommodity()">Add Commodity</button>

<br>

<input class="searchBox" id="commoditySearch" placeholder="Search Commodity" onkeyup="searchTable('commodityTable','commoditySearch')">

<table>

<thead>
<tr>
<th>Commodity</th>
<th>Action</th>
</tr>
</thead>

<tbody id="commodityTable"></tbody>

</table>

<div class="pagination">
<button onclick="prevPage('commodity')">Prev</button>
<button onclick="nextPage('commodity')">Next</button>
</div>

</div>

</div>



<script>

/* SEARCH */

function searchTable(tableId,searchId){

let filter=document.getElementById(searchId).value.toLowerCase()
let rows=document.querySelectorAll(`#${tableId} tr`)

rows.forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(filter)?"":"none"
})

}



/* CLIENTS */

async function loadClients(){

const {data}=await supabaseClient
.from("clients")
.select("*")

let html=""

data.forEach(c=>{

html+=`
<tr>
<td>${c.client_name}</td>
<td>${c.company||""}</td>
<td>${c.phone||""}</td>
<td>${c.email||""}</td>

<td>
<button class="editBtn" onclick="editClient('${c.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteClient('${c.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("clientTable").innerHTML=html

}



/* TRANSPORTERS */

async function loadTransporters(){

const {data}=await supabaseClient
.from("transporters")
.select("*")

let html=""
let dropdown=""

data.forEach(t=>{

html+=`
<tr>
<td>${t.transporter_name}</td>
<td>${t.phone||""}</td>
<td>${t.company||""}</td>
<td>${t.PAN||""}</td>

<td>
<button class="editBtn">Edit</button>
<button class="deleteBtn">Delete</button>
</td>
</tr>
`

dropdown+=`<option value="${t.id}">${t.transporter_name}</option>`

})

document.getElementById("transporterTable").innerHTML=html
document.getElementById("truckTransporter").innerHTML=dropdown

}



/* ROUTES */

async function loadRoutes(){

const {data}=await supabaseClient
.from("routes")
.select("*")

let html=""

data.forEach(r=>{

html+=`
<tr>
<td>${r.origin}</td>
<td>${r.destination}</td>
<td>${r.route_code}</td>

<td>
<button class="editBtn">Edit</button>
<button class="deleteBtn">Delete</button>
</td>
</tr>
`

})

document.getElementById("routeTable").innerHTML=html

}



/* TRUCKS */

async function loadTrucks(){

const {data}=await supabaseClient
.from("trucks")
.select(`
id,
truck_number,
transporters(transporter_name)
`)

let html=""

data.forEach(t=>{

html+=`
<tr>
<td>${t.truck_number}</td>
<td>${t.transporters?.transporter_name||""}</td>

<td>
<button class="editBtn">Edit</button>
<button class="deleteBtn">Delete</button>
</td>
</tr>
`

})

document.getElementById("truckTable").innerHTML=html

}



/* COMMODITIES */

async function loadCommodities(){

const {data}=await supabaseClient
.from("commodities")
.select("*")

let html=""

data.forEach(c=>{

html+=`
<tr>
<td>${c.name}</td>

<td>
<button class="editBtn">Edit</button>
<button class="deleteBtn">Delete</button>
</td>
</tr>
`

})

document.getElementById("commodityTable").innerHTML=html

}



/* INIT */

loadClients()
loadTransporters()
loadRoutes()
loadTrucks()
loadCommodities()

</script>

</body>
</html>
