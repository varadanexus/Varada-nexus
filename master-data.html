<!DOCTYPE html><html>
<head><title>Master Data</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

body{margin:0;font-family:Arial;background:#f4f6f9;}

.sidebar{
position:fixed;
width:220px;
height:100%;
background:#1f3c88;
color:white;
padding-top:20px;
}

.sidebar a{

padding:12px 20px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#162d63;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;

border-radius:8px;

}

}

</style></head><body><div class="sidebar"><h2 style="padding-left:20px;">Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>
<a href="rate-entry.html">Rates</a>
<a href="master-data.html">Master Data</a>

</div><div class="main"><h2>Master Data Management</h2><!-- COMMODITY --><div class="card"><h3>Add Commodity</h3><input id="commodityName" placeholder="Commodity Name">
<button class="saveBtn" onclick="addCommodity()">Save Commodity</button><table><thead>
<tr>
<th>Commodity</th>
<th>Action</th>
</tr>
</thead><tbody id="commodityTable"></tbody></table></div><!-- ROUTE --><div class="card"><h3>Add Route</h3><input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination"><button class="saveBtn" onclick="addRoute()">Save Route</button>

<table><thead>
<tr>
<th>Route Code</th>
<th>Origin</th>
<th>Destination</th>
<th>Action</th>
</tr>
</thead><tbody id="routeTable"></tbody></table></div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

init()

async function init(){

loadCommodities()
loadRoutes()

}

/* COMMODITY */

async function addCommodity(){

let name=document.getElementById("commodityName").value.trim()

if(name===""){
alert("Enter commodity name")
return
}

await supabaseClient.from("commodities").insert([{name:name}])

document.getElementById("commodityName").value=""

loadCommodities()

}

async function loadCommodities(){

let {data}=await supabaseClient.from("commodities").select("*")

let html=""

data.forEach(c=>{

html+=`
<tr>

<td>${c.name}</td>

<td>

<button class="editBtn" onclick="editCommodity('${c.id}','${c.name}')">Edit</button>

<button class="deleteBtn" onclick="deleteCommodity('${c.id}')">Delete</button>

</td>

</tr>
`

})

document.getElementById("commodityTable").innerHTML=html

}

async function deleteCommodity(id){

if(!confirm("Delete commodity?"))return

await supabaseClient.from("commodities").delete().eq("id",id)

loadCommodities()

}

async function editCommodity(id,name){

let newName=prompt("Edit Commodity",name)

if(!newName)return

await supabaseClient.from("commodities")
.update({name:newName})
.eq("id",id)

loadCommodities()

}

/* ROUTE */

async function addRoute(){

let origin=document.getElementById("origin").value.trim()
let destination=document.getElementById("destination").value.trim()

if(origin===""||destination===""){
alert("Enter origin and destination")
return
}

let routeCode=origin.substring(0,4).toUpperCase()+"-"+destination.substring(0,4).toUpperCase()

await supabaseClient.from("routes").insert([{

route_code:routeCode,
origin:origin,
destination:destination

}])

document.getElementById("origin").value=""
document.getElementById("destination").value=""

loadRoutes()

}

async function loadRoutes(){

let {data}=await supabaseClient.from("routes").select("*")

let html=""

data.forEach(r=>{

html+=`
<tr>

<td>${r.route_code}</td>
<td>${r.origin}</td>
<td>${r.destination}</td>

<td>

<button class="editBtn" onclick="editRoute('${r.id}','${r.origin}','${r.destination}')">Edit</button>

<button class="deleteBtn" onclick="deleteRoute('${r.id}')">Delete</button>

</td>

</tr>
`

})

document.getElementById("routeTable").innerHTML=html

}

async function deleteRoute(id){

if(!confirm("Delete route?"))return

await supabaseClient.from("routes").delete().eq("id",id)

loadRoutes()

}

async function editRoute(id,origin,destination){

let newOrigin=prompt("Edit Origin",origin)
let newDestination=prompt("Edit Destination",destination)

if(!newOrigin||!newDestination)return

let routeCode=newOrigin.substring(0,4).toUpperCase()+"-"+newDestination.substring(0,4).toUpperCase()

await supabaseClient.from("routes")
.update({
origin:newOrigin,
destination:newDestination,
route_code:routeCode
})
.eq("id",id)

loadRoutes()

}

</script></body>
</html>
