<!DOCTYPE html><html><head><title>Master Data</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script><style>

body{margin:0;font-family:Arial;background:#f4f6f9;}

}

}

}

</style></head><body><div class="sidebar"><h2 style="padding-left:20px;">Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>
<a href="rate-entry.html">Rates</a>

</div><div class="main"><h2>Master Data Management</h2><!-- TRANSPORTER --><div class="card"><h3>Add Transporter / Owner</h3><input id="transporterName" placeholder="Owner Name">
<input id="transporterCompany" placeholder="Company">
<input id="transporterPhone" placeholder="Phone"><button onclick="addTransporter()">Save Transporter</button>

<table><thead>
<tr>
<th>Name</th>
<th>Company</th>
<th>Phone</th>
</tr>
</thead><tbody id="transporterTable"></tbody></table></div><!-- TRUCK --><div class="card"><h3>Add Truck</h3><select id="ownerSelect">
<option value="">Select Owner</option>
</select><input id="truckNumber" placeholder="Truck Number"><input id="driverName" placeholder="Driver Name"><input id="driverPhone" placeholder="Driver Phone"><button onclick="addTruck()">Save Truck</button>

<table><thead>
<tr>
<th>Truck ID</th>
<th>Truck Number</th>
<th>Owner</th>
<th>Driver</th>
</tr>
</thead><tbody id="truckTable"></tbody></table></div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

let ownerDropdown

loadTransporters()
loadOwnersDropdown()
loadTrucks()

/* ADD TRANSPORTER */

async function addTransporter(){

let name=document.getElementById("transporterName").value
let company=document.getElementById("transporterCompany").value
let phone=document.getElementById("transporterPhone").value

await supabaseClient
.from("transporters")
.insert([{
transporter_name:name,
company:company,
phone:phone
}])

document.getElementById("transporterName").value=""
document.getElementById("transporterCompany").value=""
document.getElementById("transporterPhone").value=""

loadTransporters()
loadOwnersDropdown()

}

/* LOAD TRANSPORTERS */

async function loadTransporters(){

let {data}=await supabaseClient
.from("transporters")
.select("*")

let html=""

data.forEach(t=>{
html+=`
<tr>
<td>${t.transporter_name}</td>
<td>${t.company}</td>
<td>${t.phone}</td>
</tr>`
})

document.getElementById("transporterTable").innerHTML=html

}

/* OWNER DROPDOWN */

async function loadOwnersDropdown(){

let {data}=await supabaseClient
.from("transporters")
.select("*")

let select=document.getElementById("ownerSelect")

select.innerHTML='<option value="">Select Owner</option>'

data.forEach(o=>{
let option=document.createElement("option")
option.value=o.id
option.text=o.transporter_name
select.appendChild(option)
})

if(ownerDropdown){
ownerDropdown.destroy()
}

ownerDropdown=new TomSelect("#ownerSelect",{
create:false,
sortField:{field:"text",direction:"asc"},
placeholder:"Search Owner..."
})

}

/* ADD TRUCK */

async function addTruck(){

let owner=document.getElementById("ownerSelect").value
let truckNumber=document.getElementById("truckNumber").value.toUpperCase()
let driver=document.getElementById("driverName").value
let driverPhone=document.getElementById("driverPhone").value

let code=truckNumber.substring(4,6)
let last=truckNumber.slice(-4)

let truckID=code+"-"+last

await supabaseClient
.from("trucks")
.insert([{
truck_id:truckID,
truck_number:truckNumber,
transporter_id:owner,
driver_name:driver,
driver_phone:driverPhone
}])

document.getElementById("truckNumber").value=""
document.getElementById("driverName").value=""
document.getElementById("driverPhone").value=""

loadTrucks()

}

/* LOAD TRUCKS */

async function loadTrucks(){

let {data}=await supabaseClient
.from("trucks")
.select(`
truck_id,
truck_number,
driver_name,
transporters(transporter_name)
`)

let html=""

data.forEach(t=>{
html+=`
<tr>
<td>${t.truck_id}</td>
<td>${t.truck_number}</td>
<td>${t.transporters.transporter_name}</td>
<td>${t.driver_name}</td>
</tr>`
})

document.getElementById("truckTable").innerHTML=html

}

</script></body></html>
