<!DOCTYPE html><html>
<head>
<title>Master Data</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

body{margin:0;font-family:Arial;background:#f4f6f9;}

.sidebar{
position:fixed;
width:220px;
height:100%;
background:#1f3c88;
color:white;
padding-top:20px;
}

.sidebar a{
display:block;
padding:12px 20px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#162d63;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input{
padding:8px;
margin:5px;
width:220px;
}

button{
padding:6px 12px;
background:#1f3c88;

border:none;
cursor:pointer;
}

.deleteBtn{
background:#d9534f;
}

.editBtn{
background:#5bc0de;
}

table{
width:100%;
border-collapse:collapse;

}

th,td{

}

</style></head><body><div class="sidebar"><h2 style="padding-left:20px;">Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>
<a href="rate-entry.html">Rates</a>
<a href="master-data.html">Master Data</a>

</div><div class="main"><h2>Master Data Management</h2><!-- COMMODITY --><div class="card"><h3>Add Commodity</h3><input id="commodityName" placeholder="Commodity Name">
<button onclick="addCommodity()">Save Commodity</button><table><thead>
<tr>
<th>Commodity</th>
<th>Action</th>
</tr>
</thead><tbody id="commodityTable"></tbody></table></div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

loadCommodities()

/* ADD */

async function addCommodity(){

let name=document.getElementById("commodityName").value.trim()

if(name===""){
alert("Enter commodity name")
return
}

await supabaseClient.from("commodities").insert([{name:name}])

document.getElementById("commodityName").value=""

loadCommodities()

}

/* LOAD */

async function loadCommodities(){

let {data}=await supabaseClient.from("commodities").select("*")

let html=""

data.forEach(c=>{

html+=`
<tr>

<td>${c.name}</td>

<td>

<button class="editBtn" onclick="editCommodity('${c.id}','${c.name}')">Edit</button>

<button class="deleteBtn" onclick="deleteCommodity('${c.id}')">Delete</button>

</td>

</tr>
`

})

document.getElementById("commodityTable").innerHTML=html

}

/* DELETE */

async function deleteCommodity(id){

let confirmDelete=confirm("Delete this commodity?")

if(!confirmDelete)return

await supabaseClient.from("commodities").delete().eq("id",id)

loadCommodities()

}

/* EDIT */

async function editCommodity(id,currentName){

let newName=prompt("Edit Commodity Name",currentName)

if(!newName)return

await supabaseClient
.from("commodities")
.update({name:newName})
.eq("id",id)

loadCommodities()

}

</script></body>
</html>
