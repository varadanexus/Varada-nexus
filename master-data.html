<!DOCTYPE html>
<html>

<head>

<title>Master Data</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="menu-rbac.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
margin-bottom:25px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select{
padding:6px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:6px 12px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:4px;
}

.editBtn{background:#5bc0de;}
.deleteBtn{background:#d9534f;}
.saveBtn{background:#5cb85c;}
.cancelBtn{background:#777;}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
}

.searchBox{
margin-top:10px;
margin-bottom:10px;
}

.pagination{
margin-top:10px;
}

</style>

</head>

<body>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"YOUR_ANON_KEY"
)

/* LOGIN */

async function checkLogin(){
const {data}=await supabaseClient.auth.getSession()
if(!data.session){
window.location.href="login.html"
}
}

checkLogin()

async function logout(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

</script>

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
setTimeout(()=>{
if(typeof applyMenuRBAC==="function"){applyMenuRBAC()}
},300)
})
</script>


<div class="main">

<h1>Master Data</h1>

<!-- CLIENTS -->

<div class="card">

<h3>Clients</h3>

<input id="clientName" placeholder="Contact Name">
<input id="clientCompany" placeholder="Company">
<input id="clientPhone" placeholder="Phone">
<input id="clientEmail" placeholder="Email">
<button onclick="addClient()">Add Client</button>

<input class="searchBox" id="clientSearch" placeholder="Search Client" onkeyup="searchTable('clientTable','clientSearch')">

<table>

<thead>
<tr>
<th>Name</th>
<th>Company</th>
<th>Phone</th>
<th>Email</th>
<th>Action</th>
</tr>
</thead>

<tbody id="clientTable"></tbody>

</table>

<div class="pagination">
<button onclick="prevPage('client')">Prev</button>
<button onclick="nextPage('client')">Next</button>
</div>

</div>


<!-- TRANSPORTERS -->

<div class="card">

<h3>Transporters</h3>

<input id="tName" placeholder="Name">
<input id="tPhone" placeholder="Phone">
<input id="tCompany" placeholder="Company">
<input id="tPAN" placeholder="PAN">
<button onclick="addTransporter()">Add Transporter</button>

<input class="searchBox" id="transporterSearch" placeholder="Search Transporter" onkeyup="searchTable('transporterTable','transporterSearch')">

<table>

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Company</th>
<th>PAN</th>
<th>Action</th>
</tr>
</thead>

<tbody id="transporterTable"></tbody>

</table>

</div>


<!-- ROUTES -->

<div class="card">

<h3>Routes</h3>

<input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination">
<input id="routeCode" placeholder="Route Code">
<button onclick="addRoute()">Add Route</button>

<input class="searchBox" id="routeSearch" placeholder="Search Route" onkeyup="searchTable('routeTable','routeSearch')">

<table>

<thead>
<tr>
<th>Origin</th>
<th>Destination</th>
<th>Code</th>
<th>Action</th>
</tr>
</thead>

<tbody id="routeTable"></tbody>

</table>

</div>


<!-- TRUCKS -->

<div class="card">

<h3>Trucks</h3>

<input id="truckNumber" placeholder="Truck Number">
<select id="truckTransporter"></select>
<button onclick="addTruck()">Add Truck</button>

<input class="searchBox" id="truckSearch" placeholder="Search Truck" onkeyup="searchTable('truckTable','truckSearch')">

<table>

<thead>
<tr>
<th>Truck</th>
<th>Transporter</th>
<th>Action</th>
</tr>
</thead>

<tbody id="truckTable"></tbody>

</table>

</div>


<!-- COMMODITIES -->

<div class="card">

<h3>Commodities</h3>

<input id="commodityName" placeholder="Commodity">
<button onclick="addCommodity()">Add Commodity</button>

<input class="searchBox" id="commoditySearch" placeholder="Search Commodity" onkeyup="searchTable('commodityTable','commoditySearch')">

<table>

<thead>
<tr>
<th>Commodity</th>
<th>Action</th>
</tr>
</thead>

<tbody id="commodityTable"></tbody>

</table>

</div>

</div>



<script>

/* SEARCH */

function searchTable(tableId,searchId){

let filter=document.getElementById(searchId).value.toLowerCase()
let rows=document.querySelectorAll(`#${tableId} tr`)

rows.forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(filter)?"":"none"
})

}


/* CLIENTS */

async function loadClients(){

const {data}=await supabaseClient
.from("clients")
.select("*")

let html=""

data.forEach(c=>{

html+=`
<tr data-id="${c.id}">
<td contenteditable="true">${c.client_name}</td>
<td contenteditable="true">${c.company||""}</td>
<td contenteditable="true">${c.phone||""}</td>
<td contenteditable="true">${c.email||""}</td>

<td>
<button class="saveBtn" onclick="saveClient(this)">Save</button>
<button class="deleteBtn" onclick="deleteClient('${c.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("clientTable").innerHTML=html

}


async function saveClient(btn){

let row=btn.closest("tr")
let id=row.dataset.id

let cells=row.querySelectorAll("td")

await supabaseClient
.from("clients")
.update({
client_name:cells[0].innerText,
company:cells[1].innerText,
phone:cells[2].innerText,
email:cells[3].innerText
})
.eq("id",id)

alert("Saved")

}


async function deleteClient(id){

if(!confirm("Delete client?")) return

await supabaseClient
.from("clients")
.delete()
.eq("id",id)

loadClients()

}



/* TRANSPORTERS */

async function loadTransporters(){

const {data}=await supabaseClient
.from("transporters")
.select("*")

let html=""
let dropdown=""

data.forEach(t=>{

html+=`
<tr data-id="${t.id}">
<td contenteditable="true">${t.transporter_name}</td>
<td contenteditable="true">${t.phone||""}</td>
<td contenteditable="true">${t.company||""}</td>
<td contenteditable="true">${t.PAN||""}</td>

<td>
<button class="saveBtn" onclick="saveTransporter(this)">Save</button>
<button class="deleteBtn" onclick="deleteTransporter('${t.id}')">Delete</button>
</td>
</tr>
`

dropdown+=`<option value="${t.id}">${t.transporter_name}</option>`

})

document.getElementById("transporterTable").innerHTML=html
document.getElementById("truckTransporter").innerHTML=dropdown

}


async function saveTransporter(btn){

let row=btn.closest("tr")
let id=row.dataset.id
let cells=row.querySelectorAll("td")

await supabaseClient
.from("transporters")
.update({
transporter_name:cells[0].innerText,
phone:cells[1].innerText,
company:cells[2].innerText,
PAN:cells[3].innerText
})
.eq("id",id)

alert("Saved")

}


async function deleteTransporter(id){

if(!confirm("Delete transporter?")) return

await supabaseClient
.from("transporters")
.delete()
.eq("id",id)

loadTransporters()

}



/* ROUTES */

async function loadRoutes(){

const {data}=await supabaseClient
.from("routes")
.select("*")

let html=""

data.forEach(r=>{

html+=`
<tr data-id="${r.id}">
<td contenteditable="true">${r.origin}</td>
<td contenteditable="true">${r.destination}</td>
<td>${r.route_code}</td>

<td>
<button class="saveBtn" onclick="saveRoute(this)">Save</button>
<button class="deleteBtn" onclick="deleteRoute('${r.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("routeTable").innerHTML=html

}


async function saveRoute(btn){

let row=btn.closest("tr")
let id=row.dataset.id
let cells=row.querySelectorAll("td")

await supabaseClient
.from("routes")
.update({
origin:cells[0].innerText,
destination:cells[1].innerText
})
.eq("id",id)

alert("Saved")

}


async function deleteRoute(id){

if(!confirm("Delete route?")) return

await supabaseClient
.from("routes")
.delete()
.eq("id",id)

loadRoutes()

}



/* TRUCKS */

async function loadTrucks(){

const {data}=await supabaseClient
.from("trucks")
.select(`
id,
truck_number,
transporters(transporter_name)
`)

let html=""

data.forEach(t=>{

html+=`
<tr>
<td>${t.truck_number}</td>
<td>${t.transporters?.transporter_name||""}</td>

<td>
<button class="deleteBtn" onclick="deleteTruck('${t.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("truckTable").innerHTML=html

}


async function deleteTruck(id){

if(!confirm("Delete truck?")) return

await supabaseClient
.from("trucks")
.delete()
.eq("id",id)

loadTrucks()

}



/* COMMODITIES */

async function loadCommodities(){

const {data}=await supabaseClient
.from("commodities")
.select("*")

let html=""

data.forEach(c=>{

html+=`
<tr data-id="${c.id}">
<td contenteditable="true">${c.name}</td>

<td>
<button class="saveBtn" onclick="saveCommodity(this)">Save</button>
<button class="deleteBtn" onclick="deleteCommodity('${c.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("commodityTable").innerHTML=html

}


async function saveCommodity(btn){

let row=btn.closest("tr")
let id=row.dataset.id
let name=row.children[0].innerText

await supabaseClient
.from("commodities")
.update({name:name})
.eq("id",id)

alert("Saved")

}


async function deleteCommodity(id){

if(!confirm("Delete commodity?")) return

await supabaseClient
.from("commodities")
.delete()
.eq("id",id)

loadCommodities()

}



/* INIT */

loadClients()
loadTransporters()
loadRoutes()
loadTrucks()
loadCommodities()

</script>

</body>
</html>
