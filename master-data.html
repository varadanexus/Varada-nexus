<!DOCTYPE html><html><head><title>Master Data</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script><style>

body{

}

.main{

padding:30px;
}

.card{

}

th{
background:#eee;
}

</style></head><body><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
)

checkLogin()

async function checkLogin(){

const {data}=await supabaseClient.auth.getSession()

if(!data.session){
window.location.href="login.html"
}

}

</script><div id="sidebar-container"></div><script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script><div class="main"><h1>Master Data</h1><!-- ROUTES --><div class="card"><h3>Routes</h3><input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination">
<input id="routeCode" placeholder="Route Code" readonly><button onclick="generateRoute()">Generate</button>
<button onclick="addRoute()">Add Route</button>

<br><br>

<input id="routeSearch" placeholder="Search Route" onkeyup="searchRoutes()"><table><thead>
<tr>
<th>Origin</th>
<th>Destination</th>
<th>Code</th>
<th>Action</th>
</tr>
</thead><tbody id="routeTable"></tbody></table><button onclick="prevRoute()">Previous</button>
<button onclick="nextRoute()">Next</button>
<button onclick="downloadRoutePDF()">Download PDF</button>

</div><!-- TRANSPORTERS --><div class="card"><h3>Transporters</h3><input id="tName" placeholder="Name">
<input id="tPhone" placeholder="Phone">
<input id="tCompany" placeholder="Company">
<input id="tPAN" placeholder="PAN"><button onclick="addTransporter()">Add Transporter</button>

<br><br>

<input id="transporterSearch" placeholder="Search Transporter" onkeyup="searchTransporters()"><table><thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Company</th>
<th>PAN</th>
<th>Action</th>
</tr>
</thead><tbody id="transporterTable"></tbody></table><button onclick="prevTransporter()">Previous</button>
<button onclick="nextTransporter()">Next</button>
<button onclick="downloadTransporterPDF()">Download PDF</button>

</div><!-- TRUCKS --><div class="card"><h3>Trucks</h3><input id="truckNumber" placeholder="Truck Number"><select id="truckTransporter"></select>

<button onclick="addTruck()">Add Truck</button>

<br><br>

<input id="truckSearch" placeholder="Search Truck" onkeyup="searchTrucks()"><table><thead>
<tr>
<th>Truck</th>
<th>Transporter</th>
<th>Action</th>
</tr>
</thead><tbody id="truckTable"></tbody></table><button onclick="downloadTruckPDF()">Download PDF</button>

</div><!-- COMMODITIES --><div class="card"><h3>Commodities</h3><input id="commodityName" placeholder="Commodity">
<button onclick="addCommodity()">Add Commodity</button><br><br>

<input id="commoditySearch" placeholder="Search Commodity" onkeyup="searchCommodities()"><table><thead>
<tr>
<th>Commodity</th>
<th>Action</th>
</tr>
</thead><tbody id="commodityTable"></tbody></table><button onclick="downloadCommodityPDF()">Download PDF</button>

</div></div><script>

let routes=[]
let transporters=[]
let trucks=[]
let commodities=[]

let routePage=1
let transporterPage=1

const pageSize=10

init()

async function init(){

await loadTransporters()
await loadRoutes()
await loadTrucks()
await loadCommodities()

}

/* ROUTE CODE */

function generateRoute(){

let o=document.getElementById("origin").value.substring(0,4).toUpperCase()
let d=document.getElementById("destination").value.substring(0,4).toUpperCase()

document.getElementById("routeCode").value=o+"-"+d

}

/* ROUTES */

async function loadRoutes(){

const {data}=await supabaseClient.from("routes").select("*")

routes=data

renderRoutes()

}

function renderRoutes(){

let start=(routePage-1)*pageSize
let page=routes.slice(start,start+pageSize)

let html=""

page.forEach(r=>{
html+=`
<tr>
<td>${r.origin}</td>
<td>${r.destination}</td>
<td>${r.route_code}</td>
<td>
<button class="editBtn" onclick="editRoute('${r.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteRoute('${r.id}')">Delete</button>
</td>
</tr>
`
})

document.getElementById("routeTable").innerHTML=html

}

function searchRoutes(){

let val=document.getElementById("routeSearch").value.toLowerCase()

routes=routes.filter(r=>r.route_code.toLowerCase().includes(val))

renderRoutes()

}

function nextRoute(){routePage++;renderRoutes()}
function prevRoute(){if(routePage>1){routePage--;renderRoutes()}}

/* TRANSPORTERS */

async function loadTransporters(){

const {data}=await supabaseClient.from("transporters").select("*")

transporters=data

renderTransporters()

}

function renderTransporters(){

let start=(transporterPage-1)*pageSize
let page=transporters.slice(start,start+pageSize)

let html=""

page.forEach(t=>{
html+=`
<tr>
<td>${t.transporter_name}</td>
<td>${t.phone||""}</td>
<td>${t.company||""}</td>
<td>${t.PAN||""}</td>
<td>
<button class="editBtn">Edit</button>
<button class="deleteBtn">Delete</button>
</td>
</tr>
`
})

document.getElementById("transporterTable").innerHTML=html

}

function searchTransporters(){

let val=document.getElementById("transporterSearch").value.toLowerCase()

transporters=transporters.filter(t=>t.transporter_name.toLowerCase().includes(val))

renderTransporters()

}

function nextTransporter(){transporterPage++;renderTransporters()}
function prevTransporter(){if(transporterPage>1){transporterPage--;renderTransporters()}}


/* PDF DOWNLOAD */

function downloadRoutePDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let rows=[]

routes.forEach(r=>{
rows.push([r.origin,r.destination,r.route_code])
})

doc.text("Routes",14,15)

doc.autoTable({
head:[["Origin","Destination","Code"]],
body:rows,
startY:20
})

doc.save("routes.pdf")

}

</script></body>
</html>
