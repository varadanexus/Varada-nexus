</script><div class="main"><h1>Master Data</h1><!-- CLIENTS --><div class="card"><h3>Clients</h3><input id="clientName" placeholder="Contact Name">

</div></div><!-- TRANSPORTERS --><div class="card"><h3>Transporters</h3><input id="tName" placeholder="Name">
<input id="tPhone" placeholder="Phone">
<input id="tCompany" placeholder="Company">
<input id="tPAN" placeholder="PAN">
<button onclick="addTransporter()">Add Transporter</button><input class="searchBox" id="transporterSearch" placeholder="Search Transporter" onkeyup="searchTable('transporterTable','transporterSearch')"><table><thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Company</th>

<th>Action</th>
</tr>
</thead><tbody id="transporterTable"></tbody></table></div><!-- ROUTES --><div class="card"><h3>Routes</h3><input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination">
<input id="routeCode" placeholder="Route Code">
<button onclick="addRoute()">Add Route</button><input class="searchBox" id="routeSearch" placeholder="Search Route" onkeyup="searchTable('routeTable','routeSearch')"><table><thead>
<tr>
<th>Origin</th>
<th>Destination</th>
<th>Code</th>
<th>Action</th>
</tr>
</thead><tbody id="routeTable"></tbody></table></div><!-- TRUCKS --><div class="card"><h3>Trucks</h3><input id="truckNumber" placeholder="Truck Number">
<select id="truckTransporter"></select>
<button onclick="addTruck()">Add Truck</button><input class="searchBox" id="truckSearch" placeholder="Search Truck" onkeyup="searchTable('truckTable','truckSearch')"><table><thead>
<tr>
<th>Truck</th>
<th>Transporter</th>
<th>Action</th>
</tr>
</thead><tbody id="truckTable"></tbody></table></div><!-- COMMODITIES --><div class="card"><h3>Commodities</h3><input id="commodityName" placeholder="Commodity">
<button onclick="addCommodity()">Add Commodity</button><input class="searchBox" id="commoditySearch" placeholder="Search Commodity" onkeyup="searchTable('commodityTable','commoditySearch')"><table><thead>
<tr>
<th>Commodity</th>
<th>Action</th>
</tr>
</thead><tbody id="commodityTable"></tbody></table></div></div><script>

/* PAGINATION */

let clientPage=0
const pageSize=10
let clientSearchText=""

/* SEARCH */

function searchTable(tableId,searchId){

let filter=document.getElementById(searchId).value.toLowerCase()
let rows=document.querySelectorAll(`#${tableId} tr`)

rows.forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(filter)?"":"none"
})

}

/* CLIENT SEARCH */

function searchClients(){

clientSearchText=document.getElementById("clientSearch").value
clientPage=0
loadClients()

}

function resetClientSearch(){

document.getElementById("clientSearch").value=""
clientSearchText=""
clientPage=0
loadClients()

}


/* CLIENTS */

async function loadClients(){

let query=supabaseClient
.from("clients")
.select("*")
.range(clientPage*pageSize,clientPage*pageSize+pageSize-1)

if(clientSearchText){

query=supabaseClient
.from("clients")
.select("*")
.ilike("client_name","%"+clientSearchText+"%")
.range(clientPage*pageSize,clientPage*pageSize+pageSize-1)

}

const {data}=await query

let html=""

data.forEach(c=>{

html+=`
<tr data-id="${c.id}">
<td contenteditable="true">${c.client_name}</td>
<td contenteditable="true">${c.company||""}</td>
<td contenteditable="true">${c.phone||""}</td>
<td contenteditable="true">${c.email||""}</td>

<td>
<button class="saveBtn" onclick="saveClient(this)">Save</button>
<button class="deleteBtn" onclick="deleteClient('${c.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("clientTable").innerHTML=html

}

function nextPage(){
clientPage++
loadClients()
}

function prevPage(){

if(clientPage>0){
clientPage--
loadClients()
}

}

async function saveClient(btn){

let row=btn.closest("tr")
let id=row.dataset.id

let cells=row.querySelectorAll("td")

await supabaseClient
.from("clients")
.update({
client_name:cells[0].innerText,
company:cells[1].innerText,
phone:cells[2].innerText,
email:cells[3].innerText
})
.eq("id",id)

alert("Saved")

}

async function deleteClient(id){

if(!confirm("Delete client?")) return

await supabaseClient
.from("clients")
.delete()
.eq("id",id)

loadClients()

}


/* TRANSPORTERS */

async function loadTransporters(){

const {data}=await supabaseClient
.from("transporters")
.select("*")

let html=""
let dropdown=""

data.forEach(t=>{

html+=`
<tr data-id="${t.id}">
<td contenteditable="true">${t.transporter_name}</td>
<td contenteditable="true">${t.phone||""}</td>
<td contenteditable="true">${t.company||""}</td>
<td contenteditable="true">${t.PAN||""}</td>

<td>
<button class="saveBtn" onclick="saveTransporter(this)">Save</button>
<button class="deleteBtn" onclick="deleteTransporter('${t.id}')">Delete</button>
</td>
</tr>
`

dropdown+=`<option value="${t.id}">${t.transporter_name}</option>`

})

document.getElementById("transporterTable").innerHTML=html
document.getElementById("truckTransporter").innerHTML=dropdown

}

async function deleteTransporter(id){

if(!confirm("Delete transporter?")) return

await supabaseClient
.from("transporters")
.delete()
.eq("id",id)

loadTransporters()

}


/* ROUTES */

async function loadRoutes(){

const {data}=await supabaseClient
.from("routes")
.select("*")

let html=""

data.forEach(r=>{

html+=`
<tr data-id="${r.id}">
<td contenteditable="true">${r.origin}</td>
<td contenteditable="true">${r.destination}</td>
<td>${r.route_code}</td>

<td>
<button class="saveBtn" onclick="saveRoute(this)">Save</button>
<button class="deleteBtn" onclick="deleteRoute('${r.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("routeTable").innerHTML=html

}

async function deleteRoute(id){

if(!confirm("Delete route?")) return

await supabaseClient
.from("routes")
.delete()
.eq("id",id)

loadRoutes()

}


/* TRUCKS */

async function loadTrucks(){

const {data}=await supabaseClient
.from("trucks")
.select(`
id,
truck_number,
transporters(transporter_name)
`)

let html=""

data.forEach(t=>{

html+=`
<tr>
<td>${t.truck_number}</td>
<td>${t.transporters?.transporter_name||""}</td>

<td>
<button class="deleteBtn" onclick="deleteTruck('${t.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("truckTable").innerHTML=html

}

async function deleteTruck(id){

if(!confirm("Delete truck?")) return

await supabaseClient
.from("trucks")
.delete()
.eq("id",id)

loadTrucks()

}


/* COMMODITIES */

async function loadCommodities(){

const {data}=await supabaseClient
.from("commodities")
.select("*")

let html=""

data.forEach(c=>{

html+=`
<tr data-id="${c.id}">
<td contenteditable="true">${c.name}</td>

<td>
<button class="saveBtn" onclick="saveCommodity(this)">Save</button>
<button class="deleteBtn" onclick="deleteCommodity('${c.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("commodityTable").innerHTML=html

}

async function deleteCommodity(id){

if(!confirm("Delete commodity?")) return

await supabaseClient
.from("commodities")
.delete()
.eq("id",id)

loadCommodities()

}


/* INIT */

loadClients()
loadTransporters()
loadRoutes()
loadTrucks()
loadCommodities()

</script></body>
</html>
