<!DOCTYPE html>
<html>

<head>

<title>Master Data</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>
<script src="menu-rbac.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}
.card{background:white;padding:20px;border-radius:8px;margin-bottom:20px;}
input,select{padding:6px;border:1px solid #ccc;border-radius:4px;}
button{padding:6px 12px;background:#1f3c88;color:white;border:none;border-radius:4px;}
.deleteBtn{background:#d9534f;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;}
</style>

</head>

<body>

<script>
const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)
</script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data
await initSidebar()
})

async function initSidebar(){
const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

document.getElementById("userName").innerText =
session.user.email.split("@")[0]

window.logout = async ()=>{
await supabaseClient.auth.signOut()
window.location="login.html"
}
}
</script>

<div class="main">

<h1>Master Data</h1>

<!-- CLIENTS -->
<div class="card">
<h3>Clients</h3>

<input id="clientCompany" placeholder="Company">
<input id="clientPhone" placeholder="Phone">
<input id="clientEmail" placeholder="Email">

<button onclick="addClient()">Add Client</button>

<table>
<thead>
<tr><th>Company</th><th>Phone</th><th>Email</th><th>Action</th></tr>
</thead>
<tbody id="clientTable"></tbody>
</table>
</div>

<!-- TRANSPORTERS -->
<div class="card">
<h3>Transporters</h3>

<input id="tName" placeholder="Name">
<input id="tPhone" placeholder="Phone">

<button onclick="addTransporter()">Add</button>

<table>
<thead>
<tr><th>Name</th><th>Phone</th><th>Action</th></tr>
</thead>
<tbody id="transporterTable"></tbody>
</table>
</div>

<!-- ROUTES -->
<div class="card">
<h3>Routes</h3>

<input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination">
<input id="routeCode" placeholder="Auto Code" readonly>

<button onclick="addRoute()">Add Route</button>

<table>
<thead>
<tr><th>Origin</th><th>Destination</th><th>Code</th><th>Action</th></tr>
</thead>
<tbody id="routeTable"></tbody>
</table>
</div>

<!-- TRUCKS -->
<div class="card">
<h3>Trucks</h3>

<input id="truckNumber" placeholder="Truck Number">
<input id="truckId" placeholder="Auto ID" readonly>

<select id="truckTransporter"></select>

<button onclick="addTruck()">Add Truck</button>

<table>
<thead>
<tr><th>Truck</th><th>Transporter</th><th>Action</th></tr>
</thead>
<tbody id="truckTable"></tbody>
</table>
</div>

<!-- COMMODITIES -->
<div class="card">
<h3>Commodities</h3>

<input id="commodityName" placeholder="Commodity">

<button onclick="addCommodity()">Add</button>

<table>
<thead>
<tr><th>Name</th><th>Action</th></tr>
</thead>
<tbody id="commodityTable"></tbody>
</table>
</div>

</div>

<script>

/* ROUTE AUTO */
function generateRoute(){
let o=origin.value.trim()
let d=destination.value.trim()

if(o && d){
routeCode.value =
o.substring(0,4).toUpperCase()+"-"+
d.substring(0,4).toUpperCase()
}else{
routeCode.value=""
}
}
origin.addEventListener("input",generateRoute)
destination.addEventListener("input",generateRoute)

/* TRUCK AUTO */
truckNumber.addEventListener("input",()=>{
let val=truckNumber.value.toUpperCase()
let match=val.match(/[A-Z]{2}\d{4}$/)

if(match){
truckId.value = match[0].replace(/([A-Z]{2})(\d{4})/,"$1-$2")
}else{
truckId.value=""
}
})

/* ADD */

async function addClient(){
await supabaseClient.from("clients").insert({
company:clientCompany.value,
phone:clientPhone.value,
email:clientEmail.value
})
clientCompany.value=""
clientPhone.value=""
clientEmail.value=""
loadClients()
}

async function addTransporter(){
await supabaseClient.from("transporters").insert({
transporter_name:tName.value,
phone:tPhone.value
})
tName.value=""
tPhone.value=""
loadTransporters()
}

async function addRoute(){

let o=origin.value.trim()
let d=destination.value.trim()
let c=routeCode.value.trim()

if(!o || !d){
alert("Enter origin & destination")
return
}

if(!c){
c=o.substring(0,4).toUpperCase()+"-"+d.substring(0,4).toUpperCase()
}

const {error}=await supabaseClient.from("routes")
.insert({origin:o,destination:d,route_code:c})

if(error){
alert(error.message)
return
}

origin.value=""
destination.value=""
routeCode.value=""

loadRoutes()
}

async function addTruck(){
await supabaseClient.from("trucks").insert({
truck_number:truckNumber.value,
transporter_id:truckTransporter.value
})
truckNumber.value=""
truckId.value=""
loadTrucks()
}

async function addCommodity(){
await supabaseClient.from("commodities").insert({
name:commodityName.value
})
commodityName.value=""
loadCommodities()
}

/* LOAD */

async function loadClients(){
const {data}=await supabaseClient.from("clients").select("*")
let html=""
data?.forEach(c=>{
html+=`
<tr>
<td>${c.company}</td>
<td>${c.phone||""}</td>
<td>${c.email||""}</td>
<td><button class="deleteBtn" onclick="deleteClient('${c.id}')">Delete</button></td>
</tr>`
})
clientTable.innerHTML=html
}

async function loadTransporters(){
const {data}=await supabaseClient.from("transporters").select("*")
let html="",dd='<option value="">Select</option>'
data?.forEach(t=>{
html+=`
<tr>
<td>${t.transporter_name}</td>
<td>${t.phone||""}</td>
<td><button class="deleteBtn" onclick="deleteTransporter('${t.id}')">Delete</button></td>
</tr>`
dd+=`<option value="${t.id}">${t.transporter_name}</option>`
})
transporterTable.innerHTML=html
truckTransporter.innerHTML=dd
}

async function loadRoutes(){
const {data}=await supabaseClient.from("routes").select("*")
let html=""
data?.forEach(r=>{
html+=`
<tr>
<td>${r.origin}</td>
<td>${r.destination}</td>
<td>${r.route_code}</td>
<td><button class="deleteBtn" onclick="deleteRoute('${r.id}')">Delete</button></td>
</tr>`
})
routeTable.innerHTML=html
}

async function loadTrucks(){

const {data:trucks}=await supabaseClient.from("trucks").select("*")
const {data:transporters}=await supabaseClient.from("transporters").select("*")

let html=""

trucks?.forEach(t=>{

let name = transporters.find(x=>x.id==t.transporter_id)?.transporter_name || ""

html+=`
<tr>
<td>${t.truck_number}</td>
<td>${name}</td>
<td><button class="deleteBtn" onclick="deleteTruck('${t.id}')">Delete</button></td>
</tr>`
})

truckTable.innerHTML=html
}

async function loadCommodities(){
const {data}=await supabaseClient.from("commodities").select("*")
let html=""
data?.forEach(c=>{
html+=`
<tr>
<td>${c.name}</td>
<td><button class="deleteBtn" onclick="deleteCommodity('${c.id}')">Delete</button></td>
</tr>`
})
commodityTable.innerHTML=html
}

/* DELETE */

async function deleteClient(id){await supabaseClient.from("clients").delete().eq("id",id);loadClients()}
async function deleteTransporter(id){await supabaseClient.from("transporters").delete().eq("id",id);loadTransporters()}
async function deleteRoute(id){await supabaseClient.from("routes").delete().eq("id",id);loadRoutes()}
async function deleteTruck(id){await supabaseClient.from("trucks").delete().eq("id",id);loadTrucks()}
async function deleteCommodity(id){await supabaseClient.from("commodities").delete().eq("id",id);loadCommodities()}

/* INIT */

loadClients()
loadTransporters()
loadRoutes()
loadTrucks()
loadCommodities()

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
