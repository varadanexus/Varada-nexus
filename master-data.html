<script>

/* CLIENTS */

async function loadClients(){

const {data}=await supabaseClient
.from("clients")
.select("*")

let html=""

data.forEach(c=>{

html+=`
<tr>
<td>${c.client_name}</td>
<td>${c.company||""}</td>
<td>${c.phone||""}</td>
<td>${c.email||""}</td>

<td>
<button class="editBtn" onclick="editClient('${c.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteClient('${c.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("clientTable").innerHTML=html

}

async function addClient(){

let name=document.getElementById("clientName").value
let company=document.getElementById("clientCompany").value
let phone=document.getElementById("clientPhone").value
let email=document.getElementById("clientEmail").value

await supabaseClient
.from("clients")
.insert({
client_name:name,
company:company,
phone:phone,
email:email
})

loadClients()

}

async function editClient(id){

const {data}=await supabaseClient
.from("clients")
.select("*")
.eq("id",id)
.single()

let name=prompt("Name",data.client_name)
let company=prompt("Company",data.company)
let phone=prompt("Phone",data.phone)
let email=prompt("Email",data.email)

await supabaseClient
.from("clients")
.update({
client_name:name,
company:company,
phone:phone,
email:email
})
.eq("id",id)

loadClients()

}

async function deleteClient(id){

if(!confirm("Delete client?")) return

await supabaseClient
.from("clients")
.delete()
.eq("id",id)

loadClients()

}



/* TRANSPORTERS */

async function loadTransporters(){

const {data}=await supabaseClient
.from("transporters")
.select("*")

let html=""

data.forEach(t=>{

html+=`
<tr>
<td>${t.transporter_name}</td>
<td>${t.phone||""}</td>
<td>${t.company||""}</td>
<td>${t.PAN||""}</td>

<td>
<button class="editBtn" onclick="editTransporter('${t.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTransporter('${t.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("transporterTable").innerHTML=html

}


/* ROUTES */

async function loadRoutes(){

const {data}=await supabaseClient
.from("routes")
.select("*")

let html=""

data.forEach(r=>{

html+=`
<tr>
<td>${r.origin}</td>
<td>${r.destination}</td>
<td>${r.route_code}</td>

<td>
<button class="editBtn" onclick="editRoute('${r.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteRoute('${r.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("routeTable").innerHTML=html

}



/* TRUCKS */

async function loadTrucks(){

const {data}=await supabaseClient
.from("trucks")
.select("*")

let html=""

data.forEach(t=>{

html+=`
<tr>
<td>${t.truck_number}</td>
<td>${t.transporter_id}</td>

<td>
<button class="deleteBtn" onclick="deleteTruck('${t.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("truckTable").innerHTML=html

}



/* COMMODITIES */

async function loadCommodities(){

const {data}=await supabaseClient
.from("commodities")
.select("*")

let html=""

data.forEach(c=>{

html+=`
<tr>
<td>${c.name}</td>

<td>
<button class="deleteBtn" onclick="deleteCommodity('${c.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("commodityTable").innerHTML=html

}



/* INIT */

loadClients()
loadTransporters()
loadRoutes()
loadTrucks()
loadCommodities()

</script>
