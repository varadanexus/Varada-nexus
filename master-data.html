<!DOCTYPE html><html>
<head>
<title>Master Data</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
padding:8px;
margin:5px;
width:220px;
}

button{
padding:6px 12px;
border:none;
cursor:pointer;
margin:2px;
}

.saveBtn{background:#1f3c88;color:white;}
.editBtn{background:#5bc0de;color:white;}
.deleteBtn{background:#d9534f;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left;
}

.pagination{
margin-top:10px;
}
</style></head><body><div id="sidebar-container"></div><script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script><div class="main"><h2>Master Data Management</h2><!-- COMMODITY --><div class="card">
<h3>Add Commodity</h3><input id="commodityName" placeholder="Commodity Name">
<button class="saveBtn" onclick="addCommodity()">Save</button><input id="commoditySearch" placeholder="Search Commodity" onkeyup="searchTable('commodityTable',this.value)"><table>
<thead>
<tr>
<th>Commodity</th>
<th>Action</th>
</tr>
</thead>
<tbody id="commodityTable"></tbody>
</table><div class="pagination">
<button onclick="prevPage('commodity')">Prev</button>
<span id="commodityPage"></span>
<button onclick="nextPage('commodity')">Next</button>
</div></div><!-- ROUTE --><div class="card"><h3>Add Route</h3><input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination">
<button class="saveBtn" onclick="addRoute()">Save</button><input placeholder="Search Route" onkeyup="searchTable('routeTable',this.value)"><table><thead>
<tr>
<th>Code</th>
<th>Origin</th>
<th>Destination</th>
<th>Action</th>
</tr>
</thead><tbody id="routeTable"></tbody></table><div class="pagination">
<button onclick="prevPage('route')">Prev</button>
<span id="routePage"></span>
<button onclick="nextPage('route')">Next</button>
</div></div><!-- CLIENT --><div class="card"><h3>Add Client</h3><input id="clientName" placeholder="Client Name">
<input id="clientCompany" placeholder="Company">
<input id="clientPhone" placeholder="Phone">
<input id="clientEmail" placeholder="Email"><button class="saveBtn" onclick="addClient()">Save</button>

<input placeholder="Search Client" onkeyup="searchTable('clientTable',this.value)"><table><thead>
<tr>
<th>Name</th>
<th>Company</th>
<th>Phone</th>
<th>Email</th>
<th>Action</th>
</tr>
</thead><tbody id="clientTable"></tbody></table><div class="pagination">
<button onclick="prevPage('client')">Prev</button>
<span id="clientPage"></span>
<button onclick="nextPage('client')">Next</button>
</div></div><!-- TRANSPORTER --><div class="card"><h3>Add Transporter</h3><input id="transporterName" placeholder="Owner Name">
<input id="transporterCompany" placeholder="Company">
<input id="transporterPhone" placeholder="Phone"><button class="saveBtn" onclick="addTransporter()">Save</button>

<input placeholder="Search Transporter" onkeyup="searchTable('transporterTable',this.value)"><table><thead>
<tr>
<th>Name</th>
<th>Company</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead><tbody id="transporterTable"></tbody></table><div class="pagination">
<button onclick="prevPage('transporter')">Prev</button>
<span id="transporterPage"></span>
<button onclick="nextPage('transporter')">Next</button>
</div></div><!-- TRUCK --><div class="card"><h3>Add Truck</h3><select id="ownerSelect">
<option value="">Select Owner</option>
</select><input id="truckNumber" placeholder="Truck Number">
<input id="driverName" placeholder="Driver Name">
<input id="driverPhone" placeholder="Driver Phone"><button class="saveBtn" onclick="addTruck()">Save</button>

<input placeholder="Search Truck" onkeyup="searchTable('truckTable',this.value)"><table><thead>
<tr>
<th>Truck ID</th>
<th>Truck</th>
<th>Owner</th>
<th>Driver</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead><tbody id="truckTable"></tbody></table><div class="pagination">
<button onclick="prevPage('truck')">Prev</button>
<span id="truckPage"></span>
<button onclick="nextPage('truck')">Next</button>
</div></div></div><script>

const supabaseClient=supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

let pageSize=10
let pages={commodity:1,route:1,client:1,transporter:1,truck:1}

window.onload = init


async function init(){

loadCommodities()
loadRoutes()
loadClients()
loadTransporters()
loadOwners()
loadTrucks()

}


function paginate(data,type){

let start=(pages[type]-1)*pageSize
let end=start+pageSize

return data.slice(start,end)

}


function nextPage(type){
pages[type]++
reload(type)
}

function prevPage(type){
if(pages[type]>1)pages[type]--
reload(type)
}

function reload(type){

if(type=="commodity")loadCommodities()
if(type=="route")loadRoutes()
if(type=="client")loadClients()
if(type=="transporter")loadTransporters()
if(type=="truck")loadTrucks()

}


function searchTable(table,input){

let filter=input.toLowerCase()
let rows=document.querySelectorAll(`#${table} tr`)

rows.forEach(r=>{
let txt=r.innerText.toLowerCase()
r.style.display=txt.includes(filter)?"":"none"
})

}



/* COMMODITIES */

async function addCommodity(){

let name=document.getElementById("commodityName").value

await supabaseClient.from("commodities").insert({name})

document.getElementById("commodityName").value=""

loadCommodities()

}


async function loadCommodities(){

let {data}=await supabaseClient.from("commodities").select("*")

let rows=paginate(data,"commodity")

let html=""

rows.forEach(c=>{
html+=`
<tr>
<td>${c.name}</td>
<td>
<button class="editBtn" onclick="editCommodity('${c.id}','${c.name}')">Edit</button>
<button class="deleteBtn" onclick="deleteCommodity('${c.id}')">Delete</button>
</td>
</tr>
`
})

commodityTable.innerHTML=html
commodityPage.innerText="Page "+pages.commodity

}


async function editCommodity(id,name){

let newName=prompt("Edit Commodity",name)

await supabaseClient.from("commodities")
.update({name:newName})
.eq("id",id)

loadCommodities()

}


async function deleteCommodity(id){

if(!confirm("Delete?"))return

await supabaseClient.from("commodities")
.delete()
.eq("id",id)

loadCommodities()

}


/* ROUTES */

async function addRoute(){

let origin=origin.value
let destination=destination.value

let code=origin.substring(0,4).toUpperCase()+"-"+destination.substring(0,4).toUpperCase()

await supabaseClient.from("routes").insert({route_code:code,origin,destination})

loadRoutes()

}


async function loadRoutes(){

let {data}=await supabaseClient.from("routes").select("*")

let rows=paginate(data,"route")

let html=""

rows.forEach(r=>{
html+=`
<tr>
<td>${r.route_code}</td>
<td>${r.origin}</td>
<td>${r.destination}</td>
<td>
<button class="editBtn" onclick="deleteRoute('${r.id}')">Delete</button>
</td>
</tr>
`
})

routeTable.innerHTML=html
routePage.innerText="Page "+pages.route

}


async function deleteRoute(id){

await supabaseClient.from("routes").delete().eq("id",id)

loadRoutes()

}

</script></body>
</html>
