<!DOCTYPE html>
<html>

<head>

<title>Master Data</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>
<script src="menu-rbac.js"></script>

<style>
/* GLOBAL */
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0a0f1c;
color:#e5e7eb;
}

/* MAIN */
.main{
margin-left:220px;
padding:24px;
}

/* HEADINGS */
h1{
margin-bottom:18px;
font-weight:600;
}

h3{
margin-bottom:10px;
font-size:14px;
color:#9ca3af;
}

h4{
margin-top:20px;
margin-bottom:10px;
font-size:13px;
color:#9ca3af;
}

/* CARD */
.card{
background:#111827;
padding:16px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.04);
margin-bottom:16px;
}

/* INPUTS */
input,select{
padding:10px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.08);
background:#0f172a;
color:#e5e7eb;
outline:none;
margin:4px;
font-size:13px;
}

/* BUTTON */
button{
padding:8px 12px;
background:#3b82f6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.2s;
font-size:12px;
}

button:hover{
background:#2563eb;
}

/* BUTTON VARIANTS */
.deleteBtn{
background:#ef4444;
}

.deleteBtn:hover{
background:#dc2626;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:#111827;
border-radius:12px;
overflow:hidden;
margin-top:10px;
}

th{
text-align:left;
font-size:12px;
color:#9ca3af;
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.04);
font-size:13px;
}

tr:hover{
background:#0f172a;
}

/* PAGINATION */
.pagination{
margin-top:10px;
display:flex;
gap:10px;
}

/* POPUP BACKDROP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:2000;
justify-content:center;
align-items:center;
}

/* POPUP BOX */
.popup-content{
background:#111827;
padding:20px;
border-radius:12px;
width:420px;
border:1px solid rgba(255,255,255,0.08);
}

/* POPUP INPUT FULL WIDTH */
.popup-content input,
.popup-content select{
width:100%;
margin-bottom:10px;
}

/* SMALL LABEL TEXT */
small{
color:#6b7280;
}

/* SCROLL FIX (BIG PAGE) */
.card{
overflow-x:auto;
}
</style>

</head>

<body>


<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

await initSidebar()

if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}

/* 🔥 SHOW SIDEBAR ONLY AFTER RBAC */
document.getElementById("sidebar").style.display="block"

})
async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const authId = session.user.id
const email = session.user.email

/* SHOW USER NAME */
document.getElementById("userName").innerText = email.split("@")[0]

/* GET USER ID FROM TABLE */
const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

/* GET ROLE */
const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

/* SHOW ROLE */
if(role){
document.getElementById("userRole").innerText = role.role_name
}

/* APPLY RBAC */
if(typeof applyMenuRBAC==="function"){
applyMenuRBAC()
}

/* LOGOUT */
window.logout = async ()=>{
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}
</script>

<div class="main">

<h1>Master Data</h1>

<!-- CLIENTS -->
<div class="card">
<h3>Clients</h3>
<div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
<input id="clientCompany" placeholder="Company">
<input id="clientPhone" placeholder="Phone">
<input id="clientEmail" placeholder="Email">

<button onclick="addClient()">Add Client</button>
</div>
<table>
<thead>
<tr><th>Company</th><th>Phone</th><th>Email</th><th>Action</th></tr>
</thead>

</table>

<div class="pagination">
<button onclick="prevClient()">Prev</button>
<button onclick="nextClient()">Next</button>
</div>
</div>

<!-- TRANSPORTERS -->
<div class="card">
<h3>🚚 Transporters</h3>

<input id="tPhone" placeholder="Phone">

<!-- ROUTES -->

<h3>📍 Routes</h3>

<input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination">

<tr><th>Origin</th><th>Destination</th><th>Code</th><th>Action</th></tr>
</thead>
<tbody id="routeTable"></tbody>
</table>
</div>

<!-- TRUCKS -->
<div class="card">
<h3>🚛 Trucks</h3>

<input id="truckNumber" placeholder="Truck Number">
<input id="truckId" placeholder="Auto ID" readonly>

<select id="truckTransporter"></select>

<button onclick="addTruck()">Add Truck</button>

<table>
<thead>
<tr>
<th>Truck</th>
<th>Transporter</th>
<th>Action</th>
</tr>
</thead>
<tbody id="truckTable"></tbody>
</table>

<!-- 🔥 ADD BELOW THIS -->

<h4>Assign Agents to Truck</h4>

<select id="mapTruck"></select>
<select id="mapAgent"></select>

<select id="mapType">
  <option value="percentage">Percentage</option>
  <option value="per_mt">Per MT</option>
</select>

<input id="mapValue" placeholder="Commission Value">

<button onclick="addTruckAgent()">Add Mapping</button>

<table>
<thead>
<tr>
<th>Truck</th>
<th>Agent</th>
<th>Type</th>
<th>Value</th>
<th>Action</th>
</tr>
</thead>

<tbody id="truckAgentTable"></tbody>
</table>

  
</div>

<!-- COMMODITIES -->
<div class="card">
<h3>📦 Commodities</h3>

<input id="commodityName" placeholder="Commodity">

<button onclick="addCommodity()">Add</button>

<table>
<thead>
<tr><th>Name</th><th>Action</th></tr>
</thead>
<tbody id="commodityTable"></tbody>
</table>
</div>
  
</div>

<script>

/* PAGINATION */
let clientPage=0

const pageSize=10

/* ROUTE AUTO */
function generateRouteCode(){

let o = document.getElementById("origin").value.trim().toUpperCase()
let d = document.getElementById("destination").value.trim().toUpperCase()

if(o && d){

let oCode = o.split(" ")[0].substring(0,4)
let dCode = d.split(" ")[0].substring(0,4)

document.getElementById("routeCode").value = oCode + "-" + dCode

}else{
document.getElementById("routeCode").value = ""
}

}

/* TRUCK AUTO */
truckNumber.oninput = ()=>{
let val=truckNumber.value.toUpperCase()
let match=val.match(/[A-Z]{2}\d{4}$/)
truckId.value = match ? match[0].replace(/([A-Z]{2})(\d{4})/,"$1-$2") : ""
}

/* ADD */

async function addClient(){
await supabaseClient.from("clients").insert({
company:clientCompany.value,
phone:clientPhone.value,
email:clientEmail.value
})
clientCompany.value=""
clientPhone.value=""
clientEmail.value=""
loadClients()
}

async function addTransporter(){

let name = tName.value.trim()
let phone = tPhone.value.trim()
let gst = document.getElementById("tGST").value.trim()

/* VALIDATION */
if(!name){
alert("Enter transporter name")
return
}

if(phone && !/^[0-9]{10}$/.test(phone)){
alert("Invalid phone")
return
}

if(gst && !/^[0-9A-Z]{15}$/.test(gst)){
alert("Invalid GST")
return
}

/* DUPLICATE CHECK */
const {data:exists} = await supabaseClient
.from("transporters")
.select("*")
.eq("transporter_name",name)

if(exists && exists.length){
alert("Transporter already exists")
return
}

/* 🔥 INSERT WITH ERROR CHECK */
const {error} = await supabaseClient
.from("transporters")
.insert({
transporter_name:name,
phone:phone,
gst_number:document.getElementById("tGST").value,
address:document.getElementById("tAddress").value,
pan:document.getElementById("tPAN").value,
aadhar_number:document.getElementById("tAadhar").value,
bank_name:document.getElementById("tBank").value,
account_number:document.getElementById("tAccount").value,
ifsc_code:document.getElementById("tIFSC").value,
status:document.getElementById("tStatus").value
})

/* 🔥 HANDLE ERROR */
if(error){
console.error(error)
alert("Error: " + error.message)
return
}

/* SUCCESS */
alert("Saved ✅")

/* CLEAR */
tName.value=""
tPhone.value=""
tGST.value=""
tAddress.value=""
tPAN.value=""
tAadhar.value=""
tBank.value=""
tAccount.value=""
tIFSC.value=""
document.getElementById("tStatus").value="Active"

loadTransporters()
}

async function addRoute(){

let originVal = document.getElementById("origin").value.trim()
let destinationVal = document.getElementById("destination").value.trim()
let code = document.getElementById("routeCode").value

if(!originVal || !destinationVal){
alert("Enter both fields")
return
}

await supabaseClient.from("routes").insert({
origin: originVal,
destination: destinationVal,
route_code: code
})

document.getElementById("origin").value=""
document.getElementById("destination").value=""
document.getElementById("routeCode").value=""

loadRoutes()
}

async function addTruck(){

// ✅ 1. Truck number validation
if(!truckNumber.value){
  alert("Enter truck number")
  return
}

// ✅ 2. Transporter validation (ADD HERE)
if(!truckTransporter.value){
  alert("Select transporter")
  return
}

// ✅ 3. DB insert
const {error} = await supabaseClient.from("trucks").insert({
  truck_number: truckNumber.value,
  transporter_id: truckTransporter.value,
})

if(error){
  console.error(error)
  alert("Error adding truck ❌")
  return
}

// ✅ 4. Cleanup
truckNumber.value=""
truckId.value=""

alert("Truck added ✅")

loadTrucks()
await loadTruckAgentDropdowns()
}

async function addCommodity(){
await supabaseClient.from("commodities").insert({
name:commodityName.value
})
commodityName.value=""
loadCommodities()
}
  

  
/* LOAD */

async function loadClients(){

const {data}=await supabaseClient
.from("clients")
.select("*")
.range(clientPage*pageSize,(clientPage+1)*pageSize-1)

let html=""

data?.forEach(c=>{
html+=`
<tr>
<td>${c.company}</td>
<td>${c.phone||""}</td>
<td>${c.email||""}</td>
<td><button class="deleteBtn" onclick="deleteClient('${c.id}')">Delete</button></td>
</tr>`
})

clientTable.innerHTML=html
}

function nextClient(){clientPage++;loadClients()}
function prevClient(){if(clientPage>0){clientPage--;loadClients()}}

async function loadTransporters(){

// 1️⃣ GET ALL TRANSPORTERS
const {data:transporters,error} = await supabaseClient
.from("transporters")
.select("*")
.order("created_at",{ascending:false})

if(error){
console.error(error)
return
}

// 2️⃣ GET TRUCK COUNTS GROUPED
const {data:truckCounts,error:countError} = await supabaseClient
.from("trucks")
.select("transporter_id", { head: false })

if(countError){
console.error(countError)
return
}

// 3️⃣ BUILD COUNT MAP
let countMap = {}

truckCounts.forEach(t=>{
countMap[t.transporter_id] = (countMap[t.transporter_id] || 0) + 1
})

// 4️⃣ RENDER
let html=""
let dd='<option value="">Select Transporter</option>'

transporters.forEach(t=>{

let count = countMap[t.id] || 0

html+=`
<tr>
<td>${t.transporter_name}</td>
<td>${t.phone||""}</td>
<td>${t.gst_number||"-"}</td>
<td>${t.status||"Active"}</td>
<td>${t.created_at?.split("T")[0]}</td>
<td>${count}</td>
<td>
<button onclick="editTransporter('${t.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTransporter('${t.id}')">Delete</button>
</td>
</tr>
`

dd+=`<option value="${t.id}">
${t.transporter_name} (${t.phone||"-"} | ${t.gst_number||"No GST"})
</option>`
})

document.getElementById("transporterTable").innerHTML=html
document.getElementById("truckTransporter").innerHTML=dd

}

/* 🔥 PASTE HERE */
async function loadTruckAgentDropdowns(){

const {data:trucks} = await supabaseClient.from("trucks").select("*")

let tdd = '<option value="">Select Truck</option>'
trucks?.forEach(t=>{
  tdd += `<option value="${t.id}">${t.truck_number}</option>`
})
document.getElementById("mapTruck").innerHTML = tdd

const {data:agents} = await supabaseClient
.from("agents")
.select("id,name")
.eq("is_active", true)

let add = '<option value="">Select Agent</option>'
agents?.forEach(a=>{
  add += `<option value="${a.id}">${a.name}</option>`
})
document.getElementById("mapAgent").innerHTML = add
}


async function addTruckAgent(){

let truck = document.getElementById("mapTruck").value
let agent = document.getElementById("mapAgent").value
let type = document.getElementById("mapType").value
let value = parseFloat(document.getElementById("mapValue").value)

if(!truck || !agent){
  alert("Select truck & agent")
  return
}

if(isNaN(value)){
  alert("Enter valid value")
  return
}

const {data:exists} = await supabaseClient
.from("truck_agents")
.select("*")
.eq("truck_id", truck)
.eq("agent_id", agent)

if(exists && exists.length){
  alert("Mapping already exists")
  return
}

const {error} = await supabaseClient
.from("truck_agents")
.insert({
  truck_id: truck,
  agent_id: agent,
  commission_type: type,
  commission_value: value
})

if(error){
  console.error(error)
  alert("Error saving ❌")
  return
}

alert("Saved ✅")

// 🔥 CLEAR FORM
document.getElementById("mapTruck").value=""
document.getElementById("mapAgent").value=""
document.getElementById("mapType").value="percentage"
document.getElementById("mapValue").value=""

// 🔥 RELOAD
await loadTruckAgentDropdowns()
await loadTruckAgents()
}


async function loadTruckAgents(){

const {data:maps} = await supabaseClient
.from("truck_agents")
.select("*")

const {data:trucks} = await supabaseClient.from("trucks").select("*")
const {data:agents} = await supabaseClient.from("agents").select("*")

let html=""

maps?.forEach(m=>{

let truck = trucks.find(t=>t.id==m.truck_id)?.truck_number || "-"
let agent = agents.find(a=>a.id==m.agent_id)?.name || "-"

html += `
<tr>
<td>${truck}</td>
<td>${agent}</td>
<td>${m.commission_type}</td>
<td>${m.commission_value}</td>
<td>
<button onclick="deleteTruckAgent('${m.id}')">Delete</button>
</td>
</tr>
`
})

document.getElementById("truckAgentTable").innerHTML = html
}


async function deleteTruckAgent(id){

if(!confirm("Delete mapping?")) return

await supabaseClient
.from("truck_agents")
.delete()
.eq("id", id)

alert("Deleted ✅")

loadTruckAgents()
}

  
async function loadRoutes(){
const {data}=await supabaseClient.from("routes").select("*")
let html=""
data?.forEach(r=>{
html+=`
<tr>
<td>${r.origin}</td>
<td>${r.destination}</td>
<td>${r.route_code}</td>
<td><button class="deleteBtn" onclick="deleteRoute('${r.id}')">Delete</button></td>
</tr>`
})
routeTable.innerHTML=html
}


  
async function loadTrucks(){

const {data:trucks} = await supabaseClient.from("trucks").select("*")
const {data:trs} = await supabaseClient.from("transporters").select("*")


let html=""

trucks?.forEach(t=>{

let transporterName = trs.find(x=>x.id==t.transporter_id)?.transporter_name || "-"

html+=`
<tr>
<td>${t.truck_number}</td>
<td>${transporterName}</td>

<td>
<button onclick="editTruck('${t.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTruck('${t.id}')">Delete</button>
</td>
</tr>`
})

truckTable.innerHTML=html
}
async function loadCommodities(){
const {data}=await supabaseClient.from("commodities").select("*")
let html=""
data?.forEach(c=>{
html+=`
<tr>
<td>${c.name}</td>
<td><button class="deleteBtn" onclick="deleteCommodity('${c.id}')">Delete</button></td>
</tr>`
})
commodityTable.innerHTML=html
}

/* DELETE */

async function deleteClient(id){await supabaseClient.from("clients").delete().eq("id",id);loadClients()}
async function deleteTransporter(id){

if(!confirm("Delete transporter?")) return

/* CHECK USAGE */
const {count:truckCount} = await supabaseClient
.from("trucks")
.select("*",{count:"exact",head:true})
.eq("transporter_id",id)

if(truckCount > 0){
alert("Cannot delete: transporter has trucks")
return
}

/* DELETE */
await supabaseClient
.from("transporters")
.delete()
.eq("id",id)

alert("Deleted ✅")

loadTransporters()
}
async function deleteRoute(id){await supabaseClient.from("routes").delete().eq("id",id);loadRoutes()}
async function deleteTruck(id){await supabaseClient.from("trucks").delete().eq("id",id);loadTrucks()}
async function deleteCommodity(id){await supabaseClient.from("commodities").delete().eq("id",id);loadCommodities()}

let editId = null

  let editTruckId = null

async function editTruck(id){

editTruckId = id

const {data:t} = await supabaseClient
.from("trucks")
.select("*")
.eq("id",id)
.single()

/* SET VALUES */
document.getElementById("eTruckNumber").value = t.truck_number || ""

/* LOAD DROPDOWNS */
const {data:trs} = await supabaseClient.from("transporters").select("*")

/* TRANSPORTER DROPDOWN */
let tdd = trs.map(x=>`<option value="${x.id}">${x.transporter_name}</option>`).join("")
document.getElementById("eTruckTransporter").innerHTML = tdd
document.getElementById("eTruckTransporter").value = t.transporter_id


/* SHOW POPUP */
document.getElementById("editTruckPopup").style.display="block"
}

async function updateTruck(){

if(!editTruckId) return

const {error} = await supabaseClient
.from("trucks")
.update({
truck_number: document.getElementById("eTruckNumber").value,
transporter_id: document.getElementById("eTruckTransporter").value
})
.eq("id",editTruckId)

if(error){
console.error(error)
alert("Error updating ❌")
return
}

alert("Truck updated ✅")

closeTruckPopup()
loadTrucks()
}

function closeTruckPopup(){
document.getElementById("editTruckPopup").style.display="none"
editTruckId = null
}
  
async function editTransporter(id){

editId = id

const {data:t} = await supabaseClient
.from("transporters")
.select("*")
.eq("id",id)
.single()

/* FILL FORM */
eName.value = t.transporter_name || ""
ePhone.value = t.phone || ""
eGST.value = t.gst_number || ""
eAddress.value = t.address || ""
ePAN.value = t.pan || ""
eAadhar.value = t.aadhar_number || ""
eBank.value = t.bank_name || ""
eAccount.value = t.account_number || ""
eIFSC.value = t.ifsc_code || ""
eStatus.value = t.status || "Active"

/* SHOW POPUP */
document.getElementById("editPopup").style.display="block"
}

async function updateTransporter(){

if(!editId) return

/* VALIDATION */
if(ePhone.value && !/^[0-9]{10}$/.test(ePhone.value)){
alert("Invalid phone")
return
}

if(eGST.value && !/^[0-9A-Z]{15}$/.test(eGST.value)){
alert("Invalid GST")
return
}


  
/* UPDATE */
await supabaseClient
.from("transporters")
.update({
transporter_name:eName.value,
phone:ePhone.value,
gst_number:eGST.value,
address:eAddress.value,
pan:ePAN.value,
aadhar_number:eAadhar.value,
bank_name:eBank.value,
account_number:eAccount.value,
ifsc_code:eIFSC.value,
status:eStatus.value
})
.eq("id",editId)

alert("Updated ✅")

closePopup()
loadTransporters()
}
function closePopup(){
document.getElementById("editPopup").style.display="none"
editId = null
}
/* INIT */

window.onload=async ()=>{


/* 🔥 FIX EVENT BINDING */
document.getElementById("origin").addEventListener("input", generateRouteCode)
document.getElementById("destination").addEventListener("input", generateRouteCode)

await loadClients()
await loadTransporters()
await loadRoutes()
await loadTrucks()
await loadCommodities()
await loadTruckAgentDropdowns()
await loadTruckAgents()
}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>
<!-- 🔥 EDIT TRANSPORTER POPUP -->

  
<div id="editPopup" class="popup">
  <div class="popup-content">

    <h3>Edit Transporter</h3>

    <input id="eName" placeholder="Name">
    <input id="ePhone" placeholder="Phone">
    <input id="eGST" placeholder="GST">
    <input id="eAddress" placeholder="Address">
    <input id="ePAN" placeholder="PAN">
    <input id="eAadhar" placeholder="Aadhar">

    <input id="eBank" placeholder="Bank Name">
    <input id="eAccount" placeholder="Account Number">
    <input id="eIFSC" placeholder="IFSC">

    <select id="eStatus">
      <option value="Active">Active</option>
      <option value="Inactive">Inactive</option>
    </select>

    <br><br>

    <button onclick="updateTransporter()">Update</button>
