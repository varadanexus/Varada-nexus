<!DOCTYPE html><html><head><title>Master Data</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

</style></head><body><div class="sidebar"><h2 style="padding-left:20px;">Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>

</div><div class="main"><h2>Master Data Management</h2><div class="card"><h3>Add Commodity</h3><input id="commodityName" placeholder="Commodity Name"><button onclick="addCommodity()">Save Commodity</button>

<table><thead>
<tr>
<th>Commodity</th>
</tr>
</thead><tbody id="commodityTable"></tbody></table></div><div class="card"><h3>Add Route</h3><input id="origin" placeholder="Origin"><input id="destination" placeholder="Destination"><button onclick="addRoute()">Save Route</button>

<table><thead>
<tr>
<th>Route Code</th>
<th>Origin</th>
<th>Destination</th>
</tr>
</thead><tbody id="routeTable"></tbody></table></div><div class="card"><h3>Add Client</h3><input id="clientName" placeholder="Client Name"><input id="clientCompany" placeholder="Company"><input id="clientPhone" placeholder="Phone"><input id="clientEmail" placeholder="Email"><button onclick="addClient()">Save Client</button>

<table><thead>
<tr>
<th>Name</th>
<th>Company</th>
<th>Phone</th>
<th>Email</th>
</tr>
</thead><tbody id="clientTable"></tbody></table></div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

loadCommodities()
loadRoutes()
loadClients()

async function addCommodity(){

let name=document.getElementById("commodityName").value

await supabaseClient
.from("commodities")
.insert([{name:name}])

document.getElementById("commodityName").value=""

loadCommodities()

}

async function loadCommodities(){

let {data}=await supabaseClient
.from("commodities")
.select("*")

let html=""

data.forEach(c=>{
html+=`<tr><td>${c.name}</td></tr>`
})

document.getElementById("commodityTable").innerHTML=html

}

async function addRoute(){

let origin=document.getElementById("origin").value.trim()
let destination=document.getElementById("destination").value.trim()

if(!origin || !destination){
alert("Enter Origin and Destination")
return
}

let originCode=origin.substring(0,4).toUpperCase()
let destinationCode=destination.substring(0,4).toUpperCase()

let routeCode=originCode + "-" + destinationCode

await supabaseClient
.from("routes")
.insert([{
route_code:routeCode,
origin:origin,
destination:destination
}])

document.getElementById("origin").value=""
document.getElementById("destination").value=""

alert("Route Created : " + routeCode)

loadRoutes()

}

async function loadRoutes(){

let {data}=await supabaseClient
.from("routes")
.select("*")

let html=""

data.forEach(r=>{
html+=`
<tr>
<td>${r.route_code}</td>
<td>${r.origin}</td>
<td>${r.destination}</td>
</tr>
`
})

document.getElementById("routeTable").innerHTML=html

}

async function addClient(){

let name=document.getElementById("clientName").value
let company=document.getElementById("clientCompany").value
let phone=document.getElementById("clientPhone").value
let email=document.getElementById("clientEmail").value

await supabaseClient
.from("clients")
.insert([{
client_name:name,
company:company,
phone:phone,
email:email
}])

document.getElementById("clientName").value=""
document.getElementById("clientCompany").value=""
document.getElementById("clientPhone").value=""
document.getElementById("clientEmail").value=""

loadClients()

}

async function loadClients(){

let {data}=await supabaseClient
.from("clients")
.select("*")

let html=""

data.forEach(c=>{
html+=`
<tr>
<td>${c.client_name}</td>
<td>${c.company}</td>
<td>${c.phone}</td>
<td>${c.email}</td>
</tr>
`
})

document.getElementById("clientTable").innerHTML=html

}

</script></body></html>
