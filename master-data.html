<!DOCTYPE html>
<html>

<head>

<title>Master Data - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>
<script src="menu-rbac.js"></script>

<style>

body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}
.card{background:white;padding:20px;border-radius:8px;margin-bottom:20px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
input,select{padding:10px;margin:5px;border:1px solid #ccc;border-radius:4px;}
button{padding:8px 12px;background:#1f3c88;color:white;border:none;border-radius:4px;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;}
.deleteBtn{background:#d9534f;}

</style>

</head>

<body>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
)

</script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data
await initSidebar()
})

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

document.getElementById("userName").innerText = session.user.email.split("@")[0]

window.logout = async ()=>{
await supabaseClient.auth.signOut()
window.location="login.html"
}

}
</script>

<div class="main">

<h2>Master Data</h2>

<!-- ROUTES -->
<div class="card">
<h3>Add Route</h3>
<input id="routeCode" placeholder="Route Code">
<button onclick="addRoute()">Add</button>

<table>
<thead><tr><th>Route</th><th>Action</th></tr></thead>
<tbody id="routeTable"></tbody>
</table>
</div>

<!-- TRUCKS -->
<div class="card">
<h3>Add Truck</h3>
<input id="truckNo" placeholder="Truck Number">
<select id="transporterSelect"></select>
<button onclick="addTruck()">Add</button>

<table>
<thead><tr><th>Truck</th><th>Transporter</th><th>Action</th></tr></thead>
<tbody id="truckTable"></tbody>
</table>
</div>

<!-- COMMODITIES -->
<div class="card">
<h3>Add Commodity</h3>
<input id="commodityName" placeholder="Commodity">
<button onclick="addCommodity()">Add</button>

<table>
<thead><tr><th>Name</th><th>Action</th></tr></thead>
<tbody id="commodityTable"></tbody>
</table>
</div>

<!-- CLIENTS -->
<div class="card">
<h3>Add Client</h3>
<input id="clientName" placeholder="Client">
<button onclick="addClient()">Add</button>

<table>
<thead><tr><th>Name</th><th>Action</th></tr></thead>
<tbody id="clientTable"></tbody>
</table>
</div>

</div>

<script>

init()

async function init(){
await loadTransporters()
await loadAll()
}

/* LOAD ALL */

async function loadAll(){
await loadRoutes()
await loadTrucks()
await loadCommodities()
await loadClients()
}

/* TRANSPORTERS */

async function loadTransporters(){

const {data}=await supabaseClient.from("transporters").select("*")

let html='<option value="">Select Transporter</option>'

data?.forEach(t=>{
html+=`<option value="${t.id}">${t.transporter_name}</option>`
})

document.getElementById("transporterSelect").innerHTML=html

}

/* ROUTES */

async function loadRoutes(){

const {data}=await supabaseClient.from("routes").select("*")

let html=""

data?.forEach(r=>{
html+=`
<tr>
<td>${r.route_code}</td>
<td><button class="deleteBtn" onclick="deleteRoute('${r.id}')">Delete</button></td>
</tr>`
})

document.getElementById("routeTable").innerHTML=html

}

async function addRoute(){

let val=document.getElementById("routeCode").value
if(!val) return alert("Enter route")

await supabaseClient.from("routes").insert({route_code:val})
document.getElementById("routeCode").value=""
loadRoutes()

}

async function deleteRoute(id){
await supabaseClient.from("routes").delete().eq("id",id)
loadRoutes()
}

/* TRUCKS */

async function loadTrucks(){

const {data}=await supabaseClient
.from("trucks")
.select("*, transporters(transporter_name)")

let html=""

data?.forEach(t=>{
html+=`
<tr>
<td>${t.truck_number}</td>
<td>${t.transporters?.transporter_name || ""}</td>
<td><button class="deleteBtn" onclick="deleteTruck('${t.id}')">Delete</button></td>
</tr>`
})

document.getElementById("truckTable").innerHTML=html

}

async function addTruck(){

let truck=document.getElementById("truckNo").value
let transporter=document.getElementById("transporterSelect").value

if(!truck || !transporter) return alert("Enter all")

await supabaseClient.from("trucks").insert({
truck_number:truck,
transporter_id:transporter
})

document.getElementById("truckNo").value=""
loadTrucks()

}

async function deleteTruck(id){
await supabaseClient.from("trucks").delete().eq("id",id)
loadTrucks()
}

/* COMMODITIES */

async function loadCommodities(){

const {data}=await supabaseClient.from("commodities").select("*")

let html=""

data?.forEach(c=>{
html+=`
<tr>
<td>${c.name}</td>
<td><button class="deleteBtn" onclick="deleteCommodity('${c.id}')">Delete</button></td>
</tr>`
})

document.getElementById("commodityTable").innerHTML=html

}

async function addCommodity(){

let val=document.getElementById("commodityName").value
if(!val) return alert("Enter")

await supabaseClient.from("commodities").insert({name:val})

document.getElementById("commodityName").value=""
loadCommodities()

}

async function deleteCommodity(id){
await supabaseClient.from("commodities").delete().eq("id",id)
loadCommodities()
}

/* CLIENTS */

async function loadClients(){

const {data}=await supabaseClient.from("clients").select("*")

let html=""

data?.forEach(c=>{
html+=`
<tr>
<td>${c.company}</td>
<td><button class="deleteBtn" onclick="deleteClient('${c.id}')">Delete</button></td>
</tr>`
})

document.getElementById("clientTable").innerHTML=html

}

async function addClient(){

let val=document.getElementById("clientName").value
if(!val) return alert("Enter")

await supabaseClient.from("clients").insert({company:val})

document.getElementById("clientName").value=""
loadClients()

}

async function deleteClient(id){
await supabaseClient.from("clients").delete().eq("id",id)
loadClients()
}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
