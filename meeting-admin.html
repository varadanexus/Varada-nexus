<!DOCTYPE html>
<html>
<head>
<title>Meeting Admin - Varada Nexus</title>

<link rel="icon" type="image/png" sizes="32x32" href="/images/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/logo.png">
  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(-45deg,#020617,#0f172a,#1e3a8a,#020617);
color:white;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:rgba(15,23,42,0.8);
padding:25px;
border-radius:14px;
margin-bottom:20px;
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.12);
color:white;
}

select{
appearance:none;
-webkit-appearance:none;
-moz-appearance:none;
background:rgba(255,255,255,0.12);
color:white;
}

select{
background-image:url("data:image/svg+xml;utf8,<svg fill='white' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
background-repeat:no-repeat;
background-position:right 10px center;
background-size:16px;
}
  
select option{
background:#0f172a;
color:white;
}
  
button{
margin-top:12px;
padding:10px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:white;
cursor:pointer;
font-weight:600;
}

.table{
margin-top:15px;
width:100%;
border-collapse:collapse;
}

.table th, .table td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1);
text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h2>Meeting Admin Panel</h2>

<!-- CREATE MEETING -->
<div class="card">
<h3>Create Meeting</h3>

<input id="title" placeholder="Meeting Title">

<button onclick="createMeeting()">Create Meeting</button>

<p id="meetingInfo"></p>

<button onclick="endMeeting()" 
style="background:#ef4444;margin-top:10px;">
End Meeting
</button>
  
</div>

<!-- ADD USERS -->
<div class="card">
<h3>Generate Credentials</h3>

<select id="meetingSelect" onchange="selectMeeting()">
<option value="">Select Meeting</option>
</select>
  
<input id="meetingId" placeholder="Meeting ID" readonly>
<input id="customUsername" placeholder="Enter Meeting ID / Username">
<select id="role">
<option value="user">User</option>
<option value="admin">Admin</option>
</select>

<button id="genBtn" onclick="generateUser()" disabled>Generate Credential</button>

<table class="table" id="userTable">
<tr>
<th>Username</th>
<th>Password</th>
<th>Role</th>
<th>Status</th>
<th>Action</th>
</tr>
</table>

</div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
);

let currentMeetingId = null;

window.onload = async function(){

await loadMeetings();

let savedId = localStorage.getItem("meeting_id");

if(savedId){
currentMeetingId = savedId;

document.getElementById("meetingId").value = savedId;
document.getElementById("genBtn").disabled = false;
  
document.getElementById("meetingSelect").value = savedId;

await loadCredentials();
}

}
  
/* CREATE MEETING */
async function createMeeting(){

let title = document.getElementById("title").value;

let room = "VN_" + Date.now();

const { data } = await supabaseClient
.from("meetings")
.insert([{ title, room_name: room }])
.select()
.single();

currentMeetingId = data.id;

document.getElementById("meetingInfo").innerText =
"Meeting Created | ID: " + data.id + " | Room: " + room;

document.getElementById("meetingId").value = data.id;
document.getElementById("genBtn").disabled = false;

localStorage.setItem("meeting_id", data.id);
await loadMeetings();
  
}

/* GENERATE USER */
async function generateUser(){

let meetingId = document.getElementById("meetingId").value;
let role = document.getElementById("role").value;

if(!meetingId){
alert("Enter meeting ID");
return;
}

let username = document.getElementById("customUsername").value;

if(!username){
  alert("Enter username / meeting ID");
  return;
}
let password = Math.random().toString(36).substring(2,8);

await supabaseClient.from("credentials").insert([{
meeting_id: meetingId,
username,
password,
role
}]);

let table = document.getElementById("userTable");

await loadCredentials();

}

async function deleteCredential(username, btn){

if(!confirm("Delete this credential?")) return;

const { error } = await supabaseClient
.from("credentials")
.delete()
.eq("username", username);

if(error){
  alert("Error deleting");
  console.error(error);
  return;
}

/* REMOVE ROW FROM UI */
let row = btn.parentElement.parentElement;
row.remove();

}

function copyCredential(username, password){
navigator.clipboard.writeText(
`Username: ${username} | Password: ${password}`
);
alert("Copied to clipboard");
}

async function regeneratePassword(username){

let newPass = Math.random().toString(36).substring(2,8);

const { error } = await supabaseClient
.from("credentials")
.update({ password: newPass })
.eq("username", username);

if(error){
alert("Error updating password");
console.error(error);
return;
}

/* update UI */
document.getElementById("pass-"+username).innerText = newPass;

alert("Password updated");
}

async function toggleActive(username, btn){

let isCurrentlyDisable = btn.innerText === "Disable";

const { error } = await supabaseClient
.from("credentials")
.update({ is_active: !isCurrentlyDisable })
.eq("username", username);

if(error){
alert("Error updating status");
console.error(error);
return;
}

/* UI update */
let statusCell = document.getElementById("status-"+username);

if(isCurrentlyDisable){
btn.innerText = "Enable";
btn.style.background = "#22c55e";
statusCell.innerText = "Inactive";
statusCell.style.color = "#ef4444";
}else{
btn.innerText = "Disable";
btn.style.background = "#f59e0b";
statusCell.innerText = "Active";
statusCell.style.color = "#22c55e";
}

}

async function loadMeetings(){

const { data, error } = await supabaseClient
.from("meetings")
.select("*")
.order("created_at", { ascending: false });

if(error){
console.error(error);
return;
}

let dropdown = document.getElementById("meetingSelect");

dropdown.innerHTML = `<option value="">Select Meeting</option>`;

data.forEach(m => {
dropdown.innerHTML += `
<option value="${m.id}">
${m.title} (${m.status})
</option>
`;
});

}

function selectMeeting(){

let selectedId = document.getElementById("meetingSelect").value;

if(!selectedId) return;

currentMeetingId = selectedId;

document.getElementById("meetingId").value = selectedId;
document.getElementById("genBtn").disabled = false;

localStorage.setItem("meeting_id", selectedId);

loadCredentials();

}
  
async function loadCredentials(){

if(!currentMeetingId) return;

const { data, error } = await supabaseClient
.from("credentials")
.select("*")
.eq("meeting_id", currentMeetingId);

if(error){
console.error(error);
return;
}

let table = document.getElementById("userTable");

/* RESET TABLE */
table.innerHTML = `
<tr>
<th>Username</th>
<th>Password</th>
<th>Role</th>
<th>Status</th>
<th>Action</th>
</tr>
`;

data.forEach(user => {

let row = table.insertRow();

row.innerHTML = `
<td>${user.username}</td>
<td id="pass-${user.username}">${user.password}</td>
<td>${user.role}</td>

<td id="status-${user.username}" style="color:${user.is_active ? '#22c55e' : '#ef4444'};">
${user.is_active ? 'Active' : 'Inactive'}
</td>

<td>

<button onclick="copyCredential('${user.username}','${user.password}')"
style="background:#22c55e;padding:5px 8px;border-radius:6px;margin:2px;">
Copy
</button>

<button onclick="regeneratePassword('${user.username}')"
style="background:#3b82f6;padding:5px 8px;border-radius:6px;margin:2px;">
Reset
</button>

<button onclick="toggleActive('${user.username}', this)"
style="background:${user.is_active ? '#f59e0b' : '#22c55e'};padding:5px 8px;border-radius:6px;margin:2px;">
${user.is_active ? 'Disable' : 'Enable'}
</button>

<button onclick="deleteCredential('${user.username}', this)"
style="background:#ef4444;padding:5px 8px;border-radius:6px;margin:2px;">
Delete
</button>

</td>
`;

});

}

async function endMeeting(){

if(!currentMeetingId){
alert("No meeting selected");
return;
}

if(!confirm("End this meeting? All users will be removed.")) return;

/* 1. DELETE ALL CREDENTIALS */
const { error: deleteError } = await supabaseClient
.from("credentials")
.delete()
.eq("meeting_id", currentMeetingId);

if(deleteError){
alert("Error deleting users");
console.error(deleteError);
return;
}

/* 2. UPDATE MEETING STATUS */
const { data, error: updateError } = await supabaseClient
.from("meetings")
.update({ status: "ended" })
.eq("id", currentMeetingId)
.select();

console.log("UPDATE RESULT:", data, updateError);

if(updateError){
alert("Error updating meeting");
console.error(updateError);
return;
}

/* 3. CLEAR UI */
document.getElementById("userTable").innerHTML = `
<tr>
<th>Username</th>
<th>Password</th>
<th>Role</th>
<th>Status</th>
<th>Action</th>
</tr>
`;

alert("Meeting ended");

/* 4. RESET STATE */
localStorage.removeItem("meeting_id");
currentMeetingId = null;

document.getElementById("meetingId").value = "";
document.getElementById("meetingSelect").value = "";
document.getElementById("genBtn").disabled = true;

/* 5. REFRESH MEETINGS LIST */
await loadMeetings();

}
  
</script>

</body>
</html>
