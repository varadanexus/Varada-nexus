<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Join Meeting - Varada Nexus</title>

<link rel="icon" type="image/png" sizes="32x32" href="/images/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/logo.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ===== SAME GLOBAL STYLE AS LOGIN ===== */
body{
margin:0;
font-family:'Inter',sans-serif;
min-height:100vh;
background:linear-gradient(-45deg,#020617,#0f172a,#1e3a8a,#020617);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ===== HEADER ===== */
header{
position:sticky;
top:0;
z-index:1000;
background:rgba(10,15,30,0.55);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.nav-container{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 20px;
}

.nav-left{
display:flex;
align-items:center;
gap:14px;
}

.logo{
height:48px;
}

.brand-block{
display:flex;
flex-direction:column;
}

.brand-name{
font-size:19px;
font-weight:600;
}

.brand-sub{
font-size:10px;
color:#94a3b8;
}

.nav-links{
display:flex;
gap:28px;
}

.nav-links a{
color:#cbd5f5;
text-decoration:none;
font-size:14px;
}

.nav-links a:hover,
.nav-links a.active{
color:white;
}

/* ===== MAIN ===== */
main{
display:flex;
justify-content:center;
align-items:center;
min-height:calc(100vh - 100px);
padding:40px 20px;
}

/* ===== CARD ===== */
.card{
background:rgba(15,23,42,0.75);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.08);
padding:40px 30px;
border-radius:16px;
width:360px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* ===== INPUTS ===== */
input{
width:100%;
height:44px;
margin-top:12px;
border-radius:8px;
border:none;
padding:0 12px;
background:rgba(255,255,255,0.12);
color:white;
}

input::placeholder{
color:#94a3b8;
}

.field{
position:relative;
width:100%;
height:44px;
margin-bottom:15px;
}

.field input{
box-sizing:border-box;
width:100%;
height:100%;
padding:0 12px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.12);
color:white;
font-size:14px;
}

.field input:focus{
outline:1px solid rgba(99,102,241,0.6);
background:rgba(255,255,255,0.16);
}

.field input::placeholder{
color:#94a3b8;
}

/* 👇 PASSWORD BUTTON */
.show-password{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
font-size:12px;
color:#93c5fd;
cursor:pointer;
}
  
/* ===== BUTTON ===== */
button{
width:100%;
height:44px;
margin-top:15px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:white;
font-weight:600;
cursor:pointer;
}

/* ===== ERROR ===== */
.error{
color:#f87171;
margin-top:10px;
font-size:13px;
}

/* ===== BACK ===== */
.back{
margin-top:15px;
font-size:12px;
color:#94a3b8;
cursor:pointer;
}

.back:hover{
color:white;
}

/* ===== FOOTER ===== */
footer{
text-align:center;
padding:10px;
font-size:13px;
color:#cbd5f5;
}

</style>

</head>

<body>

<!-- ===== NAVBAR ===== -->
<header>
<div class="nav-container">

<div class="nav-left">
<img src="images/logo.png" class="logo">
<div class="brand-block">
<span class="brand-name">Varada Nexus</span>
<span class="brand-sub">Private Limited</span>
</div>
</div>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="founder.html">Founder</a>
<a href="services.html">Services</a>
<a href="team.html">Team</a>
<a href="contact.html">Contact</a>
<a href="login.html">Login</a>
<a href="meeting-login.html" class="active">Join Meeting</a>
</nav>

</div>
</header>

<!-- ===== MAIN ===== -->
<main>

<div class="card">

<h2>Join Meeting</h2>
<p style="font-size:13px;color:#cbd5f5;">Enter your meeting credentials</p>

<div class="field">
  <input id="username" placeholder="Meeting ID">
</div>

<div class="field">
  <input type="password" id="password" placeholder="Password">
  <span class="show-password" onclick="togglePassword()">Show</span>
</div>

<button onclick="loginMeeting()">Join Meeting</button>

<div id="error" class="error"></div>

<div class="back" onclick="window.location.href='login.html'">
← Back to Login
</div>

</div>

</main>

<footer>
© 2025 Varada Nexus Private Limited
</footer>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

window.loginMeeting = async function(){

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

if(!username || !password){
  document.getElementById("error").innerText="Enter credentials";
  return;
}

const { data, error } = await supabaseClient
.from("credentials")
.select("*, meetings(id, room_name, status)")
.eq("username", username)
.eq("password", password)
.eq("is_active", true)
.single();

if(error){
  document.getElementById("error").innerText="Server error";
  return;
}

if(!data){
  document.getElementById("error").innerText="Invalid credentials";
  return;
}

if(!data.meetings){
  document.getElementById("error").innerText="Meeting not found";
  return;
}

if(data.role !== "admin" && data.meetings.status !== "live"){
  document.getElementById("error").innerText="Waiting for admin to start meeting";
  return;
}

window.location.href =
"meeting.html?id=" + data.meetings.id +
"&role=" + data.role +
"&user=" + data.username;

}

function togglePassword(){
  let pass = document.getElementById("password")
  pass.type = pass.type === "password" ? "text" : "password"
}
  
</script>

</body>
</html>
