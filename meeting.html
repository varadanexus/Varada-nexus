<!DOCTYPE html>
<html>
<head>
<title>Meeting</title>
</head>

<body style="margin:0;">

<div id="meet" style="height:100vh;"></div>

<script src="https://8x8.vc/vpaas-magic-cookie-f3041005ff11471ba5dd27a0afb629d5/external_api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const params = new URLSearchParams(window.location.search);

const meetingId = params.get("id");
const role = params.get("role");
const user = params.get("user") || "Guest";

/* SUPABASE */
const supabaseClient = supabase.createClient(
  "https://ticsgbtxfhhihamejiss.supabase.co",
  "YOUR_ANON_KEY"
);

/* GET MEETING */
async function getMeeting(){
  const { data } = await supabaseClient
    .from("meetings")
    .select("*")
    .eq("id", meetingId)
    .single();

  return data;
}

(async () => {

const meeting = await getMeeting();

if(!meeting){
  alert("Meeting not found");
  window.location.href = "login.html";
  return;
}

const room = meeting.room_name;

/* 🔐 JWT (TEMP - replace later with dynamic) */
const JWT = "PASTE_YOUR_JWT_HERE";

/* 🎥 START JITSI */
const api = new JitsiMeetExternalAPI("8x8.vc", {
  roomName: "vpaas-magic-cookie-f3041005ff11471ba5dd27a0afb629d5/" + room,
  parentNode: document.querySelector("#meet"),
  width: "100%",
  height: "100%",
  jwt: JWT,

  configOverwrite: {
    prejoinPageEnabled: false,
    enableWelcomePage: false
  }
});

api.executeCommand("displayName", user);

/* 🔥 ADMIN = START MEETING */
if(role === "admin"){
  api.addEventListener("conferenceJoined", async () => {

    await supabaseClient
      .from("meetings")
      .update({ status: "live" })
      .eq("id", meetingId);

  });
}

})();
</script>

</body>
</html>
