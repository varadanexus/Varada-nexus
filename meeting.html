<!DOCTYPE html>
<html>
<head>
<title>Meeting</title>
</head>

<body style="margin:0;">

<div id="meet" style="height:100vh;"></div>

<script src="https://meet.jit.si/external_api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>

const params = new URLSearchParams(window.location.search);

const room = params.get("room");
const role = params.get("role");
const user = params.get("user") || "Guest";

/* BLOCK IF NO ROOM */
if(!room){
alert("Invalid meeting");
window.location.href = "login.html";
}

/* SUPABASE INIT */
const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
);

/* VALIDATE MEETING */
async function validateMeeting(){

const { data } = await supabaseClient
.from("meetings")
.select("status")
.eq("room_name", room)
.single();

if(!data || data.status === "ended"){
alert("Meeting has ended");
window.location.href = "login.html";
return false;
}

return true;
}

(async () => {

const valid = await validateMeeting();
if(!valid) return;

/* =========================
   ADMIN FLOW
========================= */
if(role === "admin"){

  const api = new JitsiMeetExternalAPI("meet.jit.si", {
    roomName: room,
    width: "100%",
    height: "100%",
    parentNode: document.querySelector("#meet"),

    configOverwrite: {
      startWithAudioMuted: false,
      startWithVideoMuted: false,
      disableDeepLinking: true,
      prejoinPageEnabled: false,
      enableWelcomePage: false
    },

    interfaceConfigOverwrite: {
      SHOW_JITSI_WATERMARK: false,
      SHOW_BRAND_WATERMARK: false,
      SHOW_POWERED_BY: false,
      DEFAULT_BACKGROUND: "#020617"
    }
  });

  api.executeCommand("displayName", user);

  api.addEventListener("conferenceJoined", async () => {

    console.log("✅ ADMIN JOINED → SETTING LIVE");

    await supabaseClient
    .from("meetings")
    .update({ status: "live" })
    .eq("room_name", room);

  });

}

/* =========================
   USER FLOW
========================= */
else{

  document.body.innerHTML = `
  <div style="display:flex;height:100vh;justify-content:center;align-items:center;background:#020617;color:white;font-family:sans-serif;">
    <div style="text-align:center">
      <h2>Waiting for Admin...</h2>
      <p>The meeting will start once the host joins</p>
    </div>
  </div>
  `;

  setInterval(async () => {

    const { data } = await supabaseClient
    .from("meetings")
    .select("status")
    .eq("room_name", room)
    .single();

    if(data && data.status === "live"){
      location.reload();
    }

  }, 3000);

}

})();

</script>


</body>
</html>
