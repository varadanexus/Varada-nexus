<!DOCTYPE html>
<html>
<head>
<title>Meeting</title>
</head>

<body style="margin:0;">

<div id="meet" style="height:100vh;"></div>

<script src="https://meet.jit.si/external_api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const params = new URLSearchParams(window.location.search);

const room = params.get("room");
const role = params.get("role");
const user = params.get("user") || "Guest";

/* ❌ NO ROOM */
if(!room){
  alert("Invalid meeting");
  window.location.href = "login.html";
}

/* ✅ SUPABASE */
const supabaseClient = supabase.createClient(
  "https://ticsgbtxfhhihamejiss.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
);

/* 🔍 CHECK MEETING STATUS */
async function getMeeting(){
  const { data } = await supabaseClient
    .from("meetings")
    .select("*")
    .eq("room_name", room)
    .single();

  return data;
}

(async () => {

const meeting = await getMeeting();

if(!meeting || meeting.status === "ended"){
  alert("Meeting has ended");
  window.location.href = "login.html";
  return;
}

/* ================= ADMIN ================= */
if(role === "admin"){

  const api = new JitsiMeetExternalAPI("meet.jit.si", {
    roomName: room,
    parentNode: document.querySelector("#meet"),
    width: "100%",
    height: "100%",
    configOverwrite: {
      prejoinPageEnabled: false,
      enableWelcomePage: false
    }
  });

  api.executeCommand("displayName", user);

  /* 🔥 ADMIN ENTER = MAKE LIVE */
  api.addEventListener("conferenceJoined", async () => {

    console.log("🔥 ADMIN JOINED");

    const { error } = await supabaseClient
      .from("meetings")
      .update({ status: "live" })
      .eq("room_name", room);

    console.log("UPDATE STATUS:", error ? error : "SUCCESS");

  });

}

/* ================= USER ================= */
else{

  document.body.innerHTML = `
  <div style="display:flex;height:100vh;justify-content:center;align-items:center;background:#020617;color:white;">
    <div style="text-align:center">
      <h2>Waiting for Admin...</h2>
      <p>The meeting will start once the host joins</p>
    </div>
  </div>
  `;

  /* 🔄 CHECK EVERY 3 SEC */
  setInterval(async () => {

    const meeting = await getMeeting();

    if(meeting && meeting.status === "live"){
      location.reload();
    }

  }, 3000);

}

})();
</script>

</body>
</html>
