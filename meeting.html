<!DOCTYPE html>
<html>
<head>
<title>Meeting</title>

<link rel="icon" type="image/png" sizes="32x32" href="/images/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/logo.png">
  
</head>

<body style="margin:0;">

<div id="meet" style="height:100vh;"></div>

<script src="https://8x8.vc/vpaas-magic-cookie-f3041005ff11471ba5dd27a0afb629d5/external_api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const params = new URLSearchParams(window.location.search);

const meetingId = params.get("id");
const role = params.get("role");
const user = params.get("user") || "Guest";

/* SUPABASE */
const supabaseClient = supabase.createClient(
  "https://ticsgbtxfhhihamejiss.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
);

/* GET MEETING */
async function getMeeting(){
  const { data } = await supabaseClient
    .from("meetings")
    .select("*")
    .eq("id", meetingId)
    .single();

  return data;
}

(async () => {

const meeting = await getMeeting();

if(!meeting){
  alert("Meeting not found");
  window.location.href = "login.html";
  return;
}

const room = meeting.room_name;

async function getJWT(){
  const res = await fetch("https://ticsgbtxfhhihamejiss.supabase.co/functions/v1/generate-jwt", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      role: role,
      name: user
    })
  });

  const data = await res.json();
  return data.token;
}
  
/* 🎥 START JITSI */
const key = "jwt_" + user;

if(role === "admin"){
  localStorage.removeItem(key);
}
  
let JWT = localStorage.getItem(key);

if(!JWT){
  JWT = await getJWT();
  localStorage.setItem(key, JWT);
}

const api = new JitsiMeetExternalAPI("8x8.vc", {
  roomName: "vpaas-magic-cookie-f3041005ff11471ba5dd27a0afb629d5/" + room,
  parentNode: document.querySelector("#meet"),
  width: "100%",
  height: "100%",
  jwt: JWT,

  configOverwrite: {
    prejoinPageEnabled: false,
    enableWelcomePage: false
  }
});

api.executeCommand("displayName", user);

/* 🔥 ADMIN = START MEETING */
if(role === "admin"){
  api.addEventListener("videoConferenceJoined", async () => {

    console.log("ADMIN JOINED → SETTING LIVE");

    await supabaseClient
      .from("meetings")
      .update({ status: "live" })
      .eq("id", meetingId);

  });
}

})();
</script>

</body>
</html>
