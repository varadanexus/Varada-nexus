<!DOCTYPE html>
<html>
<head>
<title>Meeting</title>
</head>

<body style="margin:0;">

<div id="meet" style="height:100vh;"></div>

<script src="https://meet.jit.si/external_api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  
<script>

const params = new URLSearchParams(window.location.search);

const room = params.get("room");
const role = params.get("role");
const user = params.get("user") || "Guest";

/* BLOCK IF NO ROOM */
if(!room){
alert("Invalid meeting");
window.location.href = "login.html";
}

/* SUPABASE INIT */
const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
);

/* VALIDATE MEETING */
async function validateMeeting(){

const { data } = await supabaseClient
.from("meetings")
.select("status")
.eq("room_name", room)
.single();

if(!data || data.status !== "active"){
alert("Meeting has ended");
window.location.href = "login.html";
return false;
}

return true;
}

(async () => {

const valid = await validateMeeting();
if(!valid) return;

/* START JITSI */
const api = new JitsiMeetExternalAPI("meet.jit.si", {
roomName: room,
width: "100%",
height: "100%",
parentNode: document.querySelector("#meet"),

configOverwrite: {
startWithAudioMuted: false,
startWithVideoMuted: false,
disableDeepLinking: true,
enableLobby: false,
lobbyModeEnabled: false,
requireDisplayName: false
},

interfaceConfigOverwrite: {
SHOW_JITSI_WATERMARK: false,
SHOW_BRAND_WATERMARK: false,
SHOW_POWERED_BY: false,
DEFAULT_BACKGROUND: "#020617"
}
});

/* SET USER NAME */
api.executeCommand("displayName", user);

/* ADMIN CONTROL */
if(role !== "admin"){
alert("Waiting for admin to start meeting...");
}

})();

</script>

</body>
</html>
