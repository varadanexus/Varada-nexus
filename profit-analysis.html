<div class="main">

<h2>Profit Analysis</h2>

<div class="card">

<table>

<thead>

<tr>
<th>Trip</th>
<th>Route</th>
<th>Client</th>
<th>Weight MT</th>
<th>Expenses</th>
<th>Company Amount</th>
<th>Transporter Amount</th>
<th>Profit</th>
</tr>

</thead>

<tbody id="profitTable"></tbody>

</table>

</div>

</div>


<script>

let trips=[]
let expenses=[]

init()

async function init(){

await loadTrips()
await loadExpenses()
renderProfit()

}


/* LOAD TRIPS */

async function loadTrips(){

const {data}=await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

trips=data || []

}


/* LOAD EXPENSES */

async function loadExpenses(){

const {data}=await supabaseClient
.from("expenses")
.select("*")

expenses=data || []

}


/* CALCULATE PROFIT */

function renderProfit(){

let html=""

trips.forEach(t=>{

let wtMT=(t.weight_kg || 0)/1000

let tripExpenses = expenses
.filter(e => e.trip_id === t.id)
.reduce((sum,e)=> sum + Number(e.amount || 0),0)

let companyAmount = (wtMT*(t.company_rate || 0)) - tripExpenses

let transporterAmount = (wtMT*(t.transporter_rate || 0)) - tripExpenses

let profit = companyAmount - transporterAmount

let profitClass = profit >= 0 ? "profit" : "loss"

html+=`

<tr>

<td>${t.trip_no}</td>
<td>${t.route}</td>
<td>${t.client_name}</td>
<td>${wtMT.toFixed(2)}</td>
<td>₹${tripExpenses.toFixed(2)}</td>
<td>₹${companyAmount.toFixed(2)}</td>
<td>₹${transporterAmount.toFixed(2)}</td>
<td class="${profitClass}">₹${profit.toFixed(2)}</td>

</tr>

`

})

document.getElementById("profitTable").innerHTML=html

}

</script>
<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>
</body>
</html>
