<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

/* WAIT FOR SIDEBAR RENDER */
await new Promise(r => setTimeout(r, 200))

/* LOAD USER + ROLE */
await initSidebar()

/* APPLY RBAC */
if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}
})
async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId=session.user.id
const email=session.user.email

document.getElementById("userName").innerText=email.split("@")[0]

const {data:user}=await supabaseClient
.from("users").select("id").eq("auth_id",authId).single()

if(!user) return

const {data:userRole}=await supabaseClient
.from("user_roles").select("role_id").eq("user_id",user.id).single()

if(!userRole) return

const {data:role}=await supabaseClient
.from("roles").select("role_name").eq("id",userRole.role_id).single()

if(role){
document.getElementById("userRole").innerText=role.role_name
}

if(typeof applyMenuRBAC==="function"){
applyMenuRBAC()
}

window.logout=async()=>{
await supabaseClient.auth.signOut()
window.location="login.html"
}
}
</script>

<div class="main">

<h2>Profit Analysis</h2>

<div class="card">

<table>

<thead>
<tr>
<th>Trip</th>
<th>Route</th>
<th>Client</th>
<th>Weight MT</th>
<th>Expenses</th>
<th>Company Amount</th>
<th>Transporter Amount</th>
<th>Profit</th>
</tr>
</thead>

<tbody id="profitTable"></tbody>

</table>

</div>

</div>

<script>

let trips=[]
let expenses=[]

window.onload = init

async function init(){

try{

const {data:tripData} = await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

const {data:expenseData} = await supabaseClient
.from("expenses")
.select("*")

trips = tripData || []
expenses = expenseData || []

renderProfit()

}catch(err){
console.error("Init Error:",err)
}

}

/* FAST EXPENSE MAP */

function renderProfit(){

let expenseMap={}

expenses.forEach(e=>{
if(!expenseMap[e.trip_id]) expenseMap[e.trip_id]=0
expenseMap[e.trip_id]+=Number(e.amount||0)
})

let html=""

trips.forEach(t=>{

let wtMT = (Number(t.weight_kg)||0)/1000
let tripExpenses = expenseMap[t.id] || 0

let companyRate = Number(t.company_rate)||0
let transporterRate = Number(t.transporter_rate)||0

let companyAmount = (wtMT*companyRate) - tripExpenses
let transporterAmount = (wtMT*transporterRate) - tripExpenses
let profit = companyAmount - transporterAmount

let profitClass = profit >= 0 ? "profit" : "loss"

html+=`
<tr>
<td>${t.trip_no}</td>
<td>${t.route}</td>
<td>${t.client_name}</td>
<td>${wtMT.toFixed(2)}</td>
<td>₹${tripExpenses.toFixed(2)}</td>
<td>₹${companyAmount.toFixed(2)}</td>
<td>₹${transporterAmount.toFixed(2)}</td>
<td class="${profitClass}">₹${profit.toFixed(2)}</td>
</tr>
`

})

document.getElementById("profitTable").innerHTML=html

}

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
