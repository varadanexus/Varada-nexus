<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{

document.getElementById("sidebar-container").innerHTML = data

const sidebar = document.getElementById("sidebar")
if(sidebar) sidebar.style.display="none"

setTimeout(async()=>{

if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}

await initSidebar()
setActiveMenu()

if(sidebar) sidebar.style.display="block"

},200)

})

function setActiveMenu(){

let currentPage = window.location.pathname.split("/").pop()

document.querySelectorAll("#sidebar a").forEach(link=>{

    let page = link.getAttribute("data-page")

    if(page === currentPage){
        link.classList.add("active")
    }

})

}

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const authId = session.user.id
const email = session.user.email

/* SHOW USER NAME */
document.getElementById("userName").innerText = email.split("@")[0]

/* GET USER ID FROM TABLE */
const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

/* GET ROLE */
const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

/* SHOW ROLE */
if(role){
document.getElementById("userRole").innerText = role.role_name
}

/* APPLY RBAC */
if(typeof applyMenuRBAC==="function"){
applyMenuRBAC()
}

/* LOGOUT */
window.logout = async ()=>{
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

}
</script>

<div class="main">

<h2>Rate Entry</h2>

<div class="card">

<h3>Add Rate</h3>

<div class="form-grid">
<select id="commodity"></select>
<select id="route"></select>
<select id="transporter"></select>
<input id="companyRate" placeholder="Company Rate / MT">
<input id="transporterRate" placeholder="Transporter Rate / MT">
</div>

<br>
<button onclick="saveRate()">Save Rate</button>

</div>

<div class="card">

<h3>Search Rates</h3>

<div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
<input id="searchCommodity" placeholder="Commodity">
<input id="searchRoute" placeholder="Route">
<button onclick="searchRates()">Search</button>
<button onclick="clearSearch()">Clear</button>
</div>

</div>

<div class="card">

<h3>Existing Rates</h3>

<table>
<thead>
<tr>
<th>Commodity</th>
<th>Route</th>
<th>Transporter</th>
<th>Company Rate</th>
<th>Transporter Rate</th>
<th>Action</th>
</tr>
</thead>

<tbody id="rateTable"></tbody>

</table>

<div class="pagination">
<button onclick="prevPage()">Prev</button>
<button onclick="nextPage()">Next</button>
</div>

</div>

<div class="card">

<h3>Agent Commission</h3>

<table>
<thead>
<tr>
<th>Agent</th>
<th>Type</th>
<th>Value</th>
<th>Action</th>
</tr>
</thead>

<tbody id="agentRatesTable"></tbody>

</table>

</div>

</div>
  

<script>

let commodities=[],routes=[],transporters=[]
let rates=[],allRates=[]
let page=0,pageSize=10

/* INIT */
window.onload=init

async function init(){
await loadCommodities()
await loadRoutes()
await loadTransporters()
await loadRates()
await loadAgentRates()
}

/* LOADS */

async function loadCommodities(){
const {data}=await supabaseClient.from("commodities").select("*")
commodities=data||[]
commodity.innerHTML='<option value="">Select</option>'+
commodities.map(c=>`<option value="${c.id}">${c.name}</option>`).join("")
}

async function loadRoutes(){
const {data}=await supabaseClient.from("routes").select("*")
routes=data||[]
route.innerHTML='<option value="">Select</option>'+
routes.map(r=>`<option value="${r.id}">${r.route_code}</option>`).join("")
}

async function loadTransporters(){
const {data}=await supabaseClient.from("transporters").select("*")
transporters=data||[]
transporter.innerHTML='<option value="">Select</option>'+
transporters.map(t=>`<option value="${t.id}">${t.transporter_name}</option>`).join("")
}

/* SAVE */

async function saveRate(){

let c=commodity.value
let r=route.value
let t=transporter.value

if(!c||!r||!t){
alert("Select all fields")
return
}

/* DUPLICATE CHECK */

let exists=allRates.find(x=>
x.commodity_id==c &&
x.route_id==r &&
x.transporter_id==t
)

if(exists){
alert("Rate already exists")
return
}

await supabaseClient.from("rates").insert({
commodity_id:c,
route_id:r,
transporter_id:t,
company_rate_per_mt:Number(companyRate.value),
transporter_rate_per_mt:Number(transporterRate.value)
})

/* CLEAR */
companyRate.value=""
transporterRate.value=""

loadRates()
}

/* LOAD RATES */

async function loadRates(){

const {data}=await supabaseClient
.from("rates")
.select("*")
.order("created_at",{ascending:false})

rates=data||[]
allRates=data||[]

renderRates()
}

/* PAGINATION */

function renderRates(){

let start=page*pageSize
let end=start+pageSize

let pageData=rates.slice(start,end)

let html=""

pageData.forEach(r=>{

let c=commodities.find(x=>x.id==r.commodity_id)?.name||""
let rt=routes.find(x=>x.id==r.route_id)?.route_code||""
let t=transporters.find(x=>x.id==r.transporter_id)?.transporter_name||""

html+=`
<tr id="row_${r.id}">
<td>${c}</td>
<td>${rt}</td>
<td>${t}</td>
<td>₹ ${r.company_rate_per_mt}</td>
<td>${r.transporter_rate_per_mt}</td>
<td>
<button class="editBtn" onclick="editRate('${r.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteRate('${r.id}')">Delete</button>
</td>
</tr>`
})

rateTable.innerHTML=html
}

function nextPage(){page++;renderRates()}
function prevPage(){if(page>0){page--;renderRates()}}

/* EDIT */

function editRate(id){

let r=rates.find(x=>x.id==id)
let row=document.getElementById(`row_${id}`)

row.innerHTML=`
<td></td>
<td></td>
<td></td>
<td><input id="c_${id}" value="${r.company_rate_per_mt}"></td>
<td><input id="t_${id}" value="${r.transporter_rate_per_mt}"></td>
<td>
<button class="saveBtn" onclick="updateRate('${id}')">Save</button>
</td>`
}

/* UPDATE */

async function updateRate(id){

await supabaseClient.from("rates").update({
company_rate_per_mt:Number(document.getElementById(`c_${id}`).value),
transporter_rate_per_mt:Number(document.getElementById(`t_${id}`).value)
}).eq("id",id)

loadRates()
}

/* SEARCH */

function searchRates(){

let c=searchCommodity.value.toLowerCase()
let r=searchRoute.value.toLowerCase()

rates=allRates.filter(x=>{

let cn=commodities.find(i=>i.id==x.commodity_id)?.name.toLowerCase()||""
let rn=routes.find(i=>i.id==x.route_id)?.route_code.toLowerCase()||""

return (!c||cn.includes(c)) && (!r||rn.includes(r))
})

page=0
renderRates()
}

function clearSearch(){
searchCommodity.value=""
searchRoute.value=""
rates=allRates
page=0
renderRates()
}

/* DELETE */

async function deleteRate(id){
if(!confirm("Delete?")) return
await supabaseClient.from("rates").delete().eq("id",id)
loadRates()
}

/* ================= AGENT COMMISSION ================= */
async function loadAgentRates(){

const { data: agents, error: aError } = await supabaseClient
.from("agents")
.select("id, name")
.eq("is_active", true)

if(aError){
console.error(aError)
return
}

const { data: commissions, error: cError } = await supabaseClient
.from("agent_commissions")
.select("*")

if(cError){
console.error(cError)
return
}

let html=""

agents.forEach(a=>{

let existing = commissions.find(c=>c.agent_id === a.id)

let type = existing?.commission_type || "percentage"
let value = existing?.commission_value || ""

html += `
<tr>
<td>${a.name}</td>

<td>
<select id="type-${a.id}">
<option value="percentage" ${type==="percentage"?"selected":""}>Percentage</option>
<option value="per_mt" ${type==="per_mt"?"selected":""}>Per MT</option>
</select>
</td>

<td>
<input type="number" id="value-${a.id}" value="${value}">
</td>

<td>
<button onclick="saveAgentRate('${a.id}')">Save</button>
</td>
</tr>
`
})

document.getElementById("agentRatesTable").innerHTML = html
}



async function saveAgentRate(agentId){

let type = document.getElementById("type-"+agentId).value
let value = parseFloat(document.getElementById("value-"+agentId).value)

if(isNaN(value)){
alert("Enter valid value")
return
}

const { error } = await supabaseClient
.from("agent_commissions")
.upsert({
agent_id: agentId,
commission_type: type,
commission_value: value
}, { onConflict: "agent_id" })

if(error){
console.error(error)
alert("Error saving ❌")
return
}

alert("Saved ✅")

/* 🔥 CLEAR INPUT */
document.getElementById("value-"+agentId).value = ""

/* 🔥 OPTIONAL: RESET TYPE TO DEFAULT */
document.getElementById("type-"+agentId).value = "percentage"

/* 🔥 RELOAD TO SHOW SAVED VALUE CLEANLY */
loadAgentRates()
}
  
</script>
