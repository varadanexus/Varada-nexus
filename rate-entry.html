<!DOCTYPE html><html><head><title>Rate Entry</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

select,input{
padding:8px;
margin:5px;
width:200px;
}

button{
padding:8px 15px;
background:#1f3c88;
color:white;
border:none;
cursor:pointer;
}

.editBtn{
background:#5bc0de;
}

.deleteBtn{
background:#d9534f;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

</style></head><body><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

checkLogin()

async function checkLogin(){
const {data}=await supabaseClient.auth.getSession()
if(!data.session){
window.location.href="login.html"
}
}

</script><div id="sidebar-container"></div><script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script><div class="main"><h2>Rate Entry</h2><div class="card"><h3>Add Rate</h3><select id="commodity"></select>

<select id="route"></select>

<input id="companyRate" placeholder="Company Rate / MT"><input id="truckRate" placeholder="Transporter Rate / MT"><button onclick="addRate()">Save Rate</button>

</div><div class="card"><h3>Existing Rates</h3><table><thead>
<tr>
<th>Commodity</th>
<th>Route</th>
<th>Company Rate</th>
<th>Transporter Rate</th>
<th>Action</th>
</tr>
</thead><tbody id="rateTable"></tbody></table></div></div><script>

let commodities=[]
let routes=[]
let rates=[]

init()

async function init(){

await loadCommodities()
await loadRoutes()
await loadRates()

}

/* LOAD COMMODITIES */

async function loadCommodities(){

const {data}=await supabaseClient.from("commodities").select("*")

commodities=data

let html='<option value="">Select Commodity</option>'

data.forEach(c=>{
html+=`<option value="${c.id}">${c.name}</option>`
})

document.getElementById("commodity").innerHTML=html

}

/* LOAD ROUTES */

async function loadRoutes(){

const {data}=await supabaseClient.from("routes").select("*")

routes=data

let html='<option value="">Select Route</option>'

data.forEach(r=>{
html+=`<option value="${r.id}">${r.route_code}</option>`
})

document.getElementById("route").innerHTML=html

}

/* LOAD RATES */

async function loadRates(){

const {data}=await supabaseClient
.from("rates")
.select("*")
.order("created_at",{ascending:false})

rates=data

renderRates()

}

/* RENDER TABLE */

function renderRates(){

let html=""

rates.forEach(r=>{

let commodity=commodities.find(c=>c.id==r.commodity_id)?.name
let route=routes.find(rt=>rt.id==r.route_id)?.route_code

html+=`
<tr>
<td>${commodity}</td>
<td>${route}</td>
<td>${r.company_rate_per_mt}</td>
<td>${r.transporter_rate_per_mt}</td>
<td>
<button class="editBtn" onclick="editRate('${r.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteRate('${r.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("rateTable").innerHTML=html

}

/* ADD RATE */

async function addRate(){

let commodity=document.getElementById("commodity").value
let route=document.getElementById("route").value
let companyRate=document.getElementById("companyRate").value
let truckRate=document.getElementById("truckRate").value

await supabaseClient
.from("rates")
.insert({
commodity_id:commodity,
route_id:route,
company_rate_per_mt:Number(companyRate),
transporter_rate_per_mt:Number(truckRate)
})

document.getElementById("commodity").value=""
document.getElementById("route").value=""
document.getElementById("companyRate").value=""
document.getElementById("truckRate").value=""

loadRates()

}

/* EDIT */

async function editRate(id){

const {data}=await supabaseClient
.from("rates")
.select("*")
.eq("id",id)
.single()

let companyRate=prompt("Edit Company Rate",data.company_rate_per_mt)
let truckRate=prompt("Edit Truck Rate",data.transporter_rate_per_mt)

await supabaseClient
.from("rates")
.update({
company_rate_per_mt:Number(companyRate),
transporter_rate_per_mt:Number(truckRate)
})
.eq("id",id)

loadRates()

}

/* DELETE */

async function deleteRate(id){

if(!confirm("Delete rate?")) return

await supabaseClient
.from("rates")
.delete()
.eq("id",id)

loadRates()

}

</script></body></html>
