<!DOCTYPE html><html>
<head><title>Rate Entry</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

body{margin:0;font-family:Arial;background:#f4f6f9;}

.sidebar{
position:fixed;
width:220px;
height:100%;
background:#1f3c88;
color:white;
padding-top:20px;
}

.sidebar a{
display:block;
padding:12px 20px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#162d63;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
padding:8px;
margin:5px;
width:220px;
}

button{
padding:6px 12px;
border:none;
cursor:pointer;
}

.saveBtn{background:#1f3c88;color:white;}
.deleteBtn{background:#d9534f;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

</style></head><body><div class="sidebar"><h2 style="padding-left:20px;">Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>
<a href="rate-entry.html">Rates</a>
<a href="master-data.html">Master Data</a>

</div><div class="main"><h2>Rate Management</h2><div class="card"><h3>Add Rate</h3><select id="commoditySelect"></select>
<select id="routeSelect"></select>

<input id="companyRate" placeholder="Company Rate / MT">
<input id="transporterRate" placeholder="Transporter Rate / MT"><button class="saveBtn" onclick="addRate()">Save Rate</button>

<table><thead>
<tr>
<th>Commodity</th>
<th>Route</th>
<th>Company Rate</th>
<th>Transporter Rate</th>
<th>Action</th>
</tr>
</thead><tbody id="rateTable"></tbody></table></div></div><script>

const supabaseClient=supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

init()

async function init(){

loadCommodities()
loadRoutes()
loadRates()

}

/* LOAD COMMODITIES */

async function loadCommodities(){

let {data}=await supabaseClient.from("commodities").select("*")

let select=document.getElementById("commoditySelect")

select.innerHTML='<option value="">Select Commodity</option>'

data.forEach(c=>{

let opt=document.createElement("option")
opt.value=c.id
opt.text=c.name

select.appendChild(opt)

})

}

/* LOAD ROUTES */

async function loadRoutes(){

let {data}=await supabaseClient.from("routes").select("*")

let select=document.getElementById("routeSelect")

select.innerHTML='<option value="">Select Route</option>'

data.forEach(r=>{

let opt=document.createElement("option")
opt.value=r.id
opt.text=r.route_code

select.appendChild(opt)

})

}

/* ADD RATE */

async function addRate(){

let commodity=document.getElementById("commoditySelect").value
let route=document.getElementById("routeSelect").value
let company=document.getElementById("companyRate").value
let transporter=document.getElementById("transporterRate").value

if(!commodity||!route)return

await supabaseClient.from("rates").insert({

commodity_id:commodity,
route_id:route,
company_rate:company,
transporter_rate:transporter

})

loadRates()

}

/* LOAD RATES */

async function loadRates(){

let {data}=await supabaseClient
.from("rates")
.select(`
id,
company_rate,
transporter_rate,
commodities(name),
routes(route_code)
`)

let html=""

data.forEach(r=>{

html+=`
<tr>
<td>${r.commodities.name}</td>
<td>${r.routes.route_code}</td>
<td>${r.company_rate}</td>
<td>${r.transporter_rate}</td>
<td>
<button class="deleteBtn" onclick="deleteRate('${r.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("rateTable").innerHTML=html

}

async function deleteRate(id){

await supabaseClient.from("rates").delete().eq("id",id)

loadRates()

}

</script></body>
</html>
