<!DOCTYPE html>
<html>

<head>

<title>Rate Entry - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;

.main{

.card{

.form-grid select,

}

.editBtn{background:#5bc0de;}
.deleteBtn{background:#d9534f;}

table{
width:100%;
border-collapse:collapse;

}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
text-align:left;
}

.search-grid{
display:grid;
grid-template-columns: repeat(3,1fr);
gap:10px;
}

</style>

</head>

<!-- SIDEBAR -->

<div class="main">

<h2>Rate Entry</h2>

<!-- ADD RATE -->

<div class="card">

<h3>Add Rate</h3>

<div class="form-grid">

<select id="commodity"></select>
<select id="route"></select>
<select id="transporter"></select>

<input id="companyRate" placeholder="Company Rate / MT">
<input id="transporterRate" placeholder="Transporter Rate / MT">

</div>

<br>

<button onclick="saveRate()">Save Rate</button>

</div>


<!-- SEARCH -->

<div class="card">

<h3>Search Rates</h3>

<div class="search-grid">

<input id="searchCommodity" placeholder="Search Commodity">
<input id="searchRoute" placeholder="Search Route">

<div>
<button onclick="searchRates()">Search</button>
<button onclick="clearSearch()">Clear</button>
</div>

</div>

</div>


<!-- TABLE -->

<div class="card">

<h3>Existing Rates</h3>

<table>

<thead>
<tr>
<th>Commodity</th>
<th>Route</th>
<th>Transporter</th>
<th>Company Rate</th>
<th>Transporter Rate</th>
<th>Action</th>
</tr>
</thead>

<tbody id="rateTable"></tbody>

</table>

</div>

</div>


<script>

let commodities=[]
let routes=[]
let transporters=[]
let rates=[]
let allRates=[]

init()

async function init(){

await loadCommodities()
await loadRoutes()
await loadTransporters()
await loadRates()

}

/* LOAD COMMODITIES */

async function loadCommodities(){

const {data}=await supabaseClient.from("commodities").select("*")

commodities=data||[]

let html='<option value="">Select Commodity</option>'

commodities.forEach(c=>{
html+=`<option value="${c.id}">${c.name}</option>`
})

document.getElementById("commodity").innerHTML=html

}

/* LOAD ROUTES */

async function loadRoutes(){

const {data}=await supabaseClient.from("routes").select("*")

routes=data||[]

let html='<option value="">Select Route</option>'

routes.forEach(r=>{
html+=`<option value="${r.id}">${r.route_code}</option>`
})

document.getElementById("route").innerHTML=html

}

/* LOAD TRANSPORTERS */

async function loadTransporters(){

const {data}=await supabaseClient.from("transporters").select("*")

transporters=data||[]

let html='<option value="">Select Transporter</option>'

transporters.forEach(t=>{
html+=`<option value="${t.id}">${t.transporter_name}</option>`
})

document.getElementById("transporter").innerHTML=html

}

/* SAVE RATE */

async function saveRate(){

let commodity=document.getElementById("commodity").value
let route=document.getElementById("route").value
let transporter=document.getElementById("transporter").value
let companyRate=document.getElementById("companyRate").value
let transporterRate=document.getElementById("transporterRate").value

await supabaseClient
.from("rates")
.insert({

commodity_id:commodity,
route_id:route,
transporter_id:transporter,
company_rate_per_mt:Number(companyRate),
transporter_rate_per_mt:Number(transporterRate)

})

loadRates()

}

/* LOAD RATES WITH JOIN */

async function loadRates(){

const {data,error}=await supabaseClient
.from("rates")
.select(`
id,
company_rate_per_mt,
transporter_rate_per_mt,
commodities(name),
routes(route_code),
transporters(transporter_name)
`)
.order("created_at",{ascending:false})

if(error){
console.log(error)
return
}

rates=data||[]
allRates=data||[]

renderRates()

}

/* RENDER */

function renderRates(){

let html=""

rates.forEach(r=>{

html+=`
<tr>

<td>${r.commodities?.name || ""}</td>
<td>${r.routes?.route_code || ""}</td>
<td>${r.transporters?.transporter_name || ""}</td>

<td>${r.company_rate_per_mt}</td>
<td>${r.transporter_rate_per_mt}</td>

<td>
<button class="deleteBtn" onclick="deleteRate('${r.id}')">Delete</button>
</td>

</tr>
`

})

document.getElementById("rateTable").innerHTML=html

}

/* SEARCH */

function searchRates(){

let commodity=document.getElementById("searchCommodity").value.toLowerCase()
let route=document.getElementById("searchRoute").value.toLowerCase()

rates=allRates.filter(r=>{

return(
(!commodity || r.commodities?.name.toLowerCase().includes(commodity)) &&
(!route || r.routes?.route_code.toLowerCase().includes(route))
)

})

renderRates()

}

function clearSearch(){

document.getElementById("searchCommodity").value=""
document.getElementById("searchRoute").value=""

rates=allRates

renderRates()

}

/* DELETE */

async function deleteRate(id){

if(!confirm("Delete rate?")) return

await supabaseClient
.from("rates")
.delete()
.eq("id",id)

loadRates()

}

</script>

</body>
</html>
