<!DOCTYPE html><html>
<head><title>Rates - Varada Nexus ERP</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#1f3c88;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#162c66;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
padding:8px;
margin:5px;
width:220px;
}

button{
padding:6px 12px;
border:none;
cursor:pointer;
}

.saveBtn{background:#1f3c88;color:white;}
.editBtn{background:#5bc0de;color:white;}
.deleteBtn{background:#d9534f;color:white;}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

</style></head><body><div class="sidebar"><h2>Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>
<a href="master-data.html">Master Data</a>
<a href="rate-entry.html">Rates</a>

</div><div class="main"><h1>Rate Master</h1><div class="card"><h3>Add Rate</h3><select id="commodity"></select>
<select id="route"></select>
<select id="transporter"></select>

<br><input id="companyRate" placeholder="Company Rate / MT">
<input id="transporterRate" placeholder="Transporter Rate / MT"><br><br>

<button class="saveBtn" onclick="saveRate()">Save Rate</button>

</div><div class="card"><h3>Search Rates</h3><input id="searchCommodity" placeholder="Search Commodity">
<input id="searchOwner" placeholder="Search Owner"><button onclick="loadRates()">Search</button>

<table><thead>
<tr>
<th>Commodity</th>
<th>Route</th>
<th>Owner</th>
<th>Company Rate</th>
<th>Transporter Rate</th>
<th>Action</th>
</tr>
</thead><tbody id="rateTable"></tbody></table></div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

init()

async function init(){

await loadDropdowns()
loadRates()

}

/* DROPDOWNS */

async function loadDropdowns(){

let {data:commodities}=await supabaseClient.from("commodities").select("*")
let {data:routes}=await supabaseClient.from("routes").select("*")
let {data:transporters}=await supabaseClient.from("transporters").select("*")

commodity.innerHTML='<option value="">Commodity</option>'
route.innerHTML='<option value="">Route</option>'
transporter.innerHTML='<option value="">Owner</option>'

commodities.forEach(c=>{
commodity.innerHTML+=`<option value="${c.id}">${c.name}</option>`
})

routes.forEach(r=>{
route.innerHTML+=`<option value="${r.id}">${r.route_code}</option>`
})

transporters.forEach(t=>{
transporter.innerHTML+=`<option value="${t.id}">${t.transporter_name}</option>`
})

}

/* SAVE RATE */

async function saveRate(){

let commodityId=commodity.value
let routeId=route.value
let transporterId=transporter.value

let company=companyRate.value
let transporterValue=transporterRate.value

if(!commodityId || !routeId || !transporterId){
alert("Please select Commodity, Route and Owner")
return
}

const {data:existing}=await supabaseClient
.from("rates")
.select("*")
.eq("commodity_id",commodityId)
.eq("route_id",routeId)
.eq("transporter_id",transporterId)

if(existing.length>0){
alert("Rate already exists")
return
}

await supabaseClient.from("rates").insert({
commodity_id:commodityId,
route_id:routeId,
transporter_id:transporterId,
company_rate_per_mt:company,
transporter_rate_per_mt:transporterValue
})

/* CLEAR INPUTS */

commodity.value=""
route.value=""
transporter.value=""
companyRate.value=""
transporterRate.value=""

loadRates()

}

/* LOAD RATES */

async function loadRates(){

let commoditySearch=document.getElementById("searchCommodity").value.toLowerCase()
let ownerSearch=document.getElementById("searchOwner").value.toLowerCase()

let {data}=await supabaseClient.from("rates").select("*")

let html=""

for(let r of data){

let {data:commodityData}=await supabaseClient
.from("commodities")
.select("name")
.eq("id",r.commodity_id)
.single()

let {data:routeData}=await supabaseClient
.from("routes")
.select("route_code")
.eq("id",r.route_id)
.single()

let {data:ownerData}=await supabaseClient
.from("transporters")
.select("transporter_name")
.eq("id",r.transporter_id)
.single()

let commodityName=commodityData?.name ?? ""
let routeCode=routeData?.route_code ?? ""
let ownerName=ownerData?.transporter_name ?? ""

if(
commodityName.toLowerCase().includes(commoditySearch) &&
ownerName.toLowerCase().includes(ownerSearch)
){

html+=`

<tr>

<td>${commodityName}</td>
<td>${routeCode}</td>
<td>${ownerName}</td>
<td>${r.company_rate_per_mt}</td>
<td>${r.transporter_rate_per_mt}</td>

<td>

<button class="editBtn"
onclick="editRate('${r.id}','${r.company_rate_per_mt}','${r.transporter_rate_per_mt}')">

Edit

</button>

<button class="deleteBtn"
onclick="deleteRate('${r.id}')">

Delete

</button>

</td>

</tr>

`

}

}

document.getElementById("rateTable").innerHTML=html

}

/* DELETE */

async function deleteRate(id){

if(!confirm("Delete rate?")) return

await supabaseClient
.from("rates")
.delete()
.eq("id",id)

loadRates()

}

/* EDIT */

async function editRate(id,company,transporter){

let newCompany=prompt("Company Rate",company)
let newTransporter=prompt("Transporter Rate",transporter)

if(!newCompany || !newTransporter) return

await supabaseClient
.from("rates")
.update({
company_rate_per_mt:newCompany,
transporter_rate_per_mt:newTransporter
})
.eq("id",id)

loadRates()

}

</script></body>
</html>
