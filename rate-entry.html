<!DOCTYPE html><html><head><title>Rate Entry</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

select,input{
padding:8px;
margin:5px;
width:200px;
}

button{
padding:8px 15px;
background:#1f3c88;
color:white;
border:none;
cursor:pointer;
}

.editBtn{background:#5bc0de;}
.deleteBtn{background:#d9534f;}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

</style></head><body><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

checkLogin()

async function checkLogin(){
const {data}=await supabaseClient.auth.getSession()
if(!data.session){
window.location.href="login.html"
}
}

</script><div id="sidebar-container"></div><script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script><div class="main"><h2>Rate Entry</h2><div class="card"><h3>Add Rate</h3><select id="commodity"></select>
<select id="route"></select>
<select id="transporter"></select>

<input id="companyRate" placeholder="Company Rate / MT">
<input id="truckRate" placeholder="Transporter Rate / MT"><button onclick="addRate()">Save Rate</button>

</div><div class="card"><h3>Search Rates</h3><input id="searchCommodity" placeholder="Search Commodity">
<input id="searchRoute" placeholder="Search Route"><button onclick="searchRates()">Search</button>
<button onclick="clearSearch()">Clear</button>

</div><div class="card"><h3>Existing Rates</h3><table><thead>
<tr>
<th>Commodity</th>
<th>Route</th>
<th>Transporter</th>
<th>Company Rate</th>
<th>Transporter Rate</th>
<th>Action</th>
</tr>
</thead><tbody id="rateTable"></tbody></table><br><button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>
<button onclick="downloadPDF()">Download PDF</button>

</div></div><script>

let commodities=[]
let routes=[]
let transporters=[]
let rates=[]
let filteredRates=[]

let page=1
let pageSize=10

init()

async function init(){

await loadCommodities()
await loadRoutes()
await loadTransporters()
await loadRates()

}

/* LOAD COMMODITIES */

async function loadCommodities(){

const {data}=await supabaseClient.from("commodities").select("*")

commodities=data

let html='<option value="">Select Commodity</option>'

data.forEach(c=>{
html+=`<option value="${c.id}">${c.name}</option>`
})

document.getElementById("commodity").innerHTML=html

}

/* LOAD ROUTES */

async function loadRoutes(){

const {data}=await supabaseClient.from("routes").select("*")

routes=data

let html='<option value="">Select Route</option>'

data.forEach(r=>{
html+=`<option value="${r.id}">${r.route_code}</option>`
})

document.getElementById("route").innerHTML=html

}

/* LOAD TRANSPORTERS */

async function loadTransporters(){

const {data}=await supabaseClient.from("transporters").select("*")

transporters=data

let html='<option value="">Select Transporter</option>'

data.forEach(t=>{
html+=`<option value="${t.id}">${t.transporter_name}</option>`
})

document.getElementById("transporter").innerHTML=html

}

/* LOAD RATES */

async function loadRates(){

const {data}=await supabaseClient
.from("rates")
.select("*")
.order("created_at",{ascending:false})

rates=data
filteredRates=data

renderRates()

}

/* RENDER TABLE */

function renderRates(){

let start=(page-1)*pageSize
let end=start+pageSize

let pageRates=filteredRates.slice(start,end)

let html=""

pageRates.forEach(r=>{

let commodity=commodities.find(c=>c.id==r.commodity_id)?.name
let route=routes.find(rt=>rt.id==r.route_id)?.route_code
let transporter=transporters.find(t=>t.id==r.transporter_id)?.transporter_name

html+=`
<tr>
<td>${commodity}</td>
<td>${route}</td>
<td>${transporter}</td>
<td>${r.company_rate_per_mt}</td>
<td>${r.transporter_rate_per_mt}</td>
<td>
<button class="editBtn" onclick="editRate('${r.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteRate('${r.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("rateTable").innerHTML=html

}

/* ADD RATE */

async function addRate(){

let commodity=document.getElementById("commodity").value
let route=document.getElementById("route").value
let transporter=document.getElementById("transporter").value

let companyRate=document.getElementById("companyRate").value
let truckRate=document.getElementById("truckRate").value

await supabaseClient
.from("rates")
.insert({
commodity_id:commodity,
route_id:route,
transporter_id:transporter,
company_rate_per_mt:Number(companyRate),
transporter_rate_per_mt:Number(truckRate)
})

document.getElementById("commodity").value=""
document.getElementById("route").value=""
document.getElementById("transporter").value=""
document.getElementById("companyRate").value=""
document.getElementById("truckRate").value=""

loadRates()

}

/* SEARCH */

function searchRates(){

let commodity=document.getElementById("searchCommodity").value.toLowerCase()
let route=document.getElementById("searchRoute").value.toLowerCase()

filteredRates=rates.filter(r=>{

let commodityName=commodities.find(c=>c.id==r.commodity_id)?.name.toLowerCase()
let routeName=routes.find(rt=>rt.id==r.route_id)?.route_code.toLowerCase()

return(
(!commodity || commodityName.includes(commodity)) &&
(!route || routeName.includes(route))
)

})

page=1
renderRates()

}

function clearSearch(){

document.getElementById("searchCommodity").value=""
document.getElementById("searchRoute").value=""

filteredRates=rates
renderRates()

}

/* PAGINATION */

function nextPage(){
if(page*pageSize<filteredRates.length){
page++
renderRates()
}
}

function prevPage(){
if(page>1){
page--
renderRates()
}
}

/* PDF EXPORT */

function downloadPDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let rows=[]

filteredRates.forEach(r=>{

let commodity=commodities.find(c=>c.id==r.commodity_id)?.name
let route=routes.find(rt=>rt.id==r.route_id)?.route_code
let transporter=transporters.find(t=>t.id==r.transporter_id)?.transporter_name

rows.push([
commodity,
route,
transporter,
r.company_rate_per_mt,
r.transporter_rate_per_mt
])

})

doc.text("Varada Nexus - Rate Sheet",14,15)

doc.autoTable({
head:[["Commodity","Route","Transporter","Company Rate","Transporter Rate"]],
body:rows,
startY:20
})

doc.save("rate-sheet.pdf")

}

/* EDIT */

async function editRate(id){

const {data}=await supabaseClient
.from("rates")
.select("*")
.eq("id",id)
.single()

let companyRate=prompt("Edit Company Rate",data.company_rate_per_mt)
let truckRate=prompt("Edit Truck Rate",data.transporter_rate_per_mt)

await supabaseClient
.from("rates")
.update({
company_rate_per_mt:Number(companyRate),
transporter_rate_per_mt:Number(truckRate)
})
.eq("id",id)

loadRates()

}

/* DELETE */

async function deleteRate(id){

if(!confirm("Delete rate?")) return

await supabaseClient
.from("rates")
.delete()
.eq("id",id)

loadRates()

}

</script></body></html>
