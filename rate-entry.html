<!DOCTYPE html><html>
<head><title>Rates - Varada Nexus ERP</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#1f3c88;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#162c66;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
padding:8px;
margin:5px;
width:220px;
}

button{
padding:6px 12px;
border:none;
cursor:pointer;
}

.saveBtn{background:#1f3c88;color:white;}
.editBtn{background:#5bc0de;color:white;}
.deleteBtn{background:#d9534f;color:white;}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

.searchBox{
margin-bottom:15px;
}

</style></head><body><div class="sidebar"><h2>Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>
<a href="master-data.html">Master Data</a>
<a href="rate-entry.html">Rates</a>

</div><div class="main"><h1>Rate Master</h1><div class="card"><h3>Add Rate</h3><select id="commodity"></select>

<select id="route"></select>

<select id="transporter"></select>

<br><input id="companyRate" placeholder="Company Rate / MT"><input id="transporterRate" placeholder="Transporter Rate / MT"><br><br>

<button class="saveBtn" onclick="saveRate()">Save Rate</button>

</div><div class="card"><h3>Search Rates</h3><input class="searchBox" id="searchCommodity" placeholder="Search Commodity"><input class="searchBox" id="searchTransporter" placeholder="Search Owner"><button onclick="loadRates()">Search</button>

<table><thead>
<tr>
<th>Commodity</th>
<th>Route</th>
<th>Owner</th>
<th>Company Rate</th>
<th>Transporter Rate</th>
<th>Action</th>
</tr>
</thead><tbody id="rateTable"></tbody></table></div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

init()

async function init(){

loadDropdowns()
loadRates()

}

/* LOAD DROPDOWNS */

async function loadDropdowns(){

let {data:commodities}=await supabaseClient.from("commodities").select("*")
let {data:routes}=await supabaseClient.from("routes").select("*")
let {data:transporters}=await supabaseClient.from("transporters").select("*")

commodities.forEach(c=>{
commodity.innerHTML+=`<option value="${c.id}">${c.name}</option>`
})

routes.forEach(r=>{
route.innerHTML+=`<option value="${r.id}">${r.route_code}</option>`
})

transporters.forEach(t=>{
transporter.innerHTML+=`<option value="${t.id}">${t.transporter_name}</option>`
})

}

/* SAVE RATE */

async function saveRate(){

let commodityId=commodity.value
let routeId=route.value
let transporterId=transporter.value

let company=companyRate.value
let transporterRateValue=transporterRate.value

if(!commodityId||!routeId||!transporterId){
alert("Select commodity, route and transporter")
return
}

const {data:existing}=await supabaseClient
.from("rates")
.select("*")
.eq("commodity_id",commodityId)
.eq("route_id",routeId)
.eq("transporter_id",transporterId)

if(existing.length>0){
alert("Rate already exists for this combination")
return
}

await supabaseClient.from("rates").insert({

commodity_id:commodityId,
route_id:routeId,
transporter_id:transporterId,
company_rate_per_mt:company,
transporter_rate_per_mt:transporterRateValue

})

companyRate.value=""
transporterRate.value=""

loadRates()

}

/* LOAD RATES */

async function loadRates(){

let commoditySearch=document.getElementById("searchCommodity").value.toLowerCase()
let transporterSearch=document.getElementById("searchTransporter").value.toLowerCase()

let {data}=await supabaseClient
.from("rates")
.select(`
id,
company_rate_per_mt,
transporter_rate_per_mt,
commodities(name),
routes(route_code),
transporters(transporter_name)
`)

let html=""

data.forEach(r=>{

let commodityName=r.commodities?.name ?? ""
let transporterName=r.transporters?.transporter_name ?? ""

if(
commodityName.toLowerCase().includes(commoditySearch)
&&
transporterName.toLowerCase().includes(transporterSearch)
){

html+=`

<tr>

<td>${commodityName}</td>
<td>${r.routes?.route_code}</td>
<td>${transporterName}</td>
<td>${r.company_rate_per_mt}</td>
<td>${r.transporter_rate_per_mt}</td>

<td>

<button class="editBtn" onclick="editRate('${r.id}','${r.company_rate_per_mt}','${r.transporter_rate_per_mt}')">Edit</button>

<button class="deleteBtn" onclick="deleteRate('${r.id}')">Delete</button>

</td>

</tr>

`

}

})

document.getElementById("rateTable").innerHTML=html

}

/* DELETE RATE */

async function deleteRate(id){

if(!confirm("Delete this rate?")) return

await supabaseClient
.from("rates")
.delete()
.eq("id",id)

loadRates()

}

/* EDIT RATE */

async function editRate(id,company,transporter){

let newCompany=prompt("Edit Company Rate",company)
let newTransporter=prompt("Edit Transporter Rate",transporter)

if(!newCompany||!newTransporter) return

await supabaseClient
.from("rates")
.update({
company_rate_per_mt:newCompany,
transporter_rate_per_mt:newTransporter
})
.eq("id",id)

loadRates()

}

</script></body>
</html>
