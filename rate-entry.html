<!DOCTYPE html><html><head><title>Rate Entry</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/><script src="https://code.jquery.com/jquery-3.6.0.min.js"></script><script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script><style>

body{margin:0;font-family:Arial;background:#f4f6f9;}

position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#1f3c88;

</style></head><body><div class="sidebar"><h2 style="padding-left:20px">Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>
<a href="rate-entry.html">Rates</a>
<a href="master-data.html">Master Data</a>

</div><div class="main"><h2>Rate Entry</h2><div class="card"><h3>Add Rate</h3><select id="commoditySelect" style="width:300px"></select>

<select id="routeSelect" style="width:300px"></select>

<input id="companyRate" placeholder="Company Rate / MT"><input id="transporterRate" placeholder="Transporter Rate / MT"><br><br>

<button onclick="saveRate()">Save Rate</button>

</div><div class="card"><h3>Existing Rates</h3><table><thead>
<tr>
<th>Commodity</th>
<th>Route</th>
<th>Company Rate</th>
<th>Transporter Rate</th>
</tr>
</thead><tbody id="rateTable"></tbody></table></div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

$(document).ready(function(){

loadCommodities()
loadRoutes()
loadRates()

})

async function loadCommodities(){

let {data}=await supabaseClient
.from("commodities")
.select("*")

let options=""

data.forEach(c=>{
options+=`<option value="${c.id}">${c.name}</option>`
})

$("#commoditySelect").html(options)

$("#commoditySelect").select2({
placeholder:"Select Commodity",
allowClear:true
})

}

async function loadRoutes(){

let {data}=await supabaseClient
.from("routes")
.select("*")

let options=""

data.forEach(r=>{
options+=`<option value="${r.id}">${r.route_code} (${r.origin}-${r.destination})</option>`
})

$("#routeSelect").html(options)

$("#routeSelect").select2({
placeholder:"Select Route",
allowClear:true
})

}

async function saveRate(){

let commodity=document.getElementById("commoditySelect").value
let route=document.getElementById("routeSelect").value
let companyRate=document.getElementById("companyRate").value
let transporterRate=document.getElementById("transporterRate").value

await supabaseClient
.from("rates")
.insert([{
commodity_id:commodity,
route_id:route,
company_rate_per_mt:Number(companyRate),
transporter_rate_per_mt:Number(transporterRate)
}])

alert("Rate Saved")

loadRates()

}

async function loadRates(){

let {data}=await supabaseClient
.from("rates")
.select(`
company_rate_per_mt,
transporter_rate_per_mt,
commodities(name),
routes(route_code)
`)

let html=""

data.forEach(r=>{

html+=`
<tr>
<td>${r.commodities.name}</td>
<td>${r.routes.route_code}</td>
<td>${r.company_rate_per_mt}</td>
<td>${r.transporter_rate_per_mt}</td>
</tr>
`

})

document.getElementById("rateTable").innerHTML=html

}

</script></body></html>
