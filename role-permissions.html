<!DOCTYPE html>
<html>

<head>

<title>Role Permissions - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>
<script src="menu-rbac.js"></script>

<style>
/* GLOBAL */
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0a0f1c;
color:#e5e7eb;
}

/* MAIN */
.main{
margin-left:220px;
padding:24px;
}

/* HEADINGS */
h2{
margin-bottom:18px;
font-weight:600;
}

h3{
margin-bottom:10px;
font-size:14px;
color:#9ca3af;
}

/* FORM BOX */
.form-box{
background:#111827;
padding:16px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.04);
margin-bottom:16px;
max-width:400px;
}

/* INPUT */
input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.08);
background:#0f172a;
color:#e5e7eb;
outline:none;
margin-bottom:10px;
font-size:13px;
}

/* BUTTON */
button{
padding:8px 12px;
background:#3b82f6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.2s;
font-size:12px;
}

button:hover{
background:#2563eb;
}

/* SAVE BUTTON */
.save-all{
margin-top:20px;
padding:10px 16px;
}

/* TABLE WRAPPER */
table{
width:100%;
border-collapse:collapse;
background:#111827;
border-radius:12px;
overflow:hidden;
}

/* HEADER */
th{
font-size:12px;
color:#9ca3af;
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* CELLS */
td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.04);
font-size:12px;
vertical-align:top;
}

/* ROLE COLUMN */
.role-name{
text-align:left;
font-weight:600;
color:#e5e7eb;
}

/* CHECKBOX LABEL */
label{
display:block;
margin-bottom:4px;
font-size:11px;
color:#9ca3af;
cursor:pointer;
}

/* CHECKBOX */
input[type="checkbox"]{
margin-right:6px;
cursor:pointer;
}

/* HOVER */
tr:hover{
background:#0f172a;
}

/* SCROLL FIX (IMPORTANT) */
table{
display:block;
overflow:auto;
white-space:nowrap;
}

/* STICKY FIRST COLUMN (VERY USEFUL) */
td:first-child, th:first-child{
position:sticky;
left:0;
background:#111827;
z-index:2;
}

/* RESPONSIVE */
.form-box{
width:100%;
max-width:400px;
}
</style>

</head>

<body>

<script>
const supabaseClient = window.supabaseClient
</script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{

document.getElementById("sidebar-container").innerHTML = data

const sidebar = document.getElementById("sidebar")
if(sidebar) sidebar.style.display="none"

setTimeout(async()=>{

if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}

await initSidebar()
setActiveMenu()

if(sidebar) sidebar.style.display="block"

},200)

})

function setActiveMenu(){

let currentPage = window.location.pathname.split("/").pop()

document.querySelectorAll("#sidebar a").forEach(link=>{

    let page = link.getAttribute("data-page")

    if(page === currentPage){
        link.classList.add("active")
    }

})

}
 
async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId=session.user.id
const email=session.user.email

document.getElementById("userName").innerText=email.split("@")[0]

const {data:user}=await supabaseClient
.from("users").select("id").eq("auth_id",authId).single()

if(!user) return

const {data:userRole}=await supabaseClient
.from("user_roles").select("role_id").eq("user_id",user.id).single()

if(!userRole) return

const {data:role}=await supabaseClient
.from("roles").select("role_name").eq("id",userRole.role_id).single()

if(role){
document.getElementById("userRole").innerText=role.role_name
}

window.logout=async()=>{
await supabaseClient.auth.signOut()
window.location="login.html"
}
}
</script>

<div class="main">

<h2>Role Permissions</h2>

<div class="form-box">

<h3>Create Role</h3>

<input id="roleName" placeholder="Role Name">

<button onclick="createRole()">Create Role</button>

</div>

<table id="permTable"></table>

<button id="saveBtn" class="save-all" onclick="saveAllPermissions()">
Save All Permissions
</button>

</div>

<script>

/* PAGES */

const pages=[
{name:"Dashboard",file:"dashboard.html"},
{name:"Trips",file:"trips.html"},
{name:"Expenses",file:"expenses.html"},
{name:"Client Billing",file:"client-billing.html"},
{name:"GST Billing",file:"client_gst_billing.html"},
{name:"Client Payments",file:"client-payments.html"},
{name:"Client Ledger",file:"client-ledger.html"},
{name:"Master Data",file:"master-data.html"},
{name:"Rates",file:"rate-entry.html"},
{name:"Transporter Payments",file:"admin-payments.html"},
{name:"Transporter Ledger",file:"admin-transporter-ledger.html"},
{name:"Agent Dashboard",file:"agent-dashboard-admin.html"},
{name:"Agent Payments",file:"agent-payments.html"},
{name:"Agent Ledger",file:"agent-ledger.html"},
{name:"Withdraw Approvals",file:"agent-withdraw-approval.html"},
{name:"Agents",file:"agents.html"},
{name:"Users",file:"admin-users.html"},
{name:"Role Permissions",file:"role-permissions.html"},
{name:"System Maintenance",file:"admin-maintenance.html"},
{name:"Profit Analysis",file:"profit-analysis.html"},
{name:"Financial Dashboard",file:"financial-dashboard.html"},
 /* 🔥 TRANSPORTER (USER SIDE) */
{name:"Transporter Dashboard",file:"transporter-dashboard.html"},
{name:"Transporter Trips",file:"transporter-trips.html"},
{name:"Transporter Payments (User)",file:"transporter-payments.html"},
{name:"Transporter Ledger (User)",file:"transporter-ledger.html"},
{name:"Transporter Profit",file:"transporter-profit.html"},

/* 🔥 AGENT (USER SIDE) */
{name:"Agent Dashboard (User)",file:"agent-dashboard.html"},
{name:"Agent Financial Dashboard",file:"agent-financial-dashboard.html"},
{name:"Agent My Ledger",file:"agent-my-ledger.html"},

{name:"Company Ledger",file:"company-ledger.html"},
{name:"GST Filing",file:"gst-filing.html"},
]

const actions=["view","create","edit","delete"]

/* CREATE ROLE */

async function createRole(){

let name = document.getElementById("roleName").value.trim()

if(!name){
alert("Enter role name")
return
}

const { data, error } = await supabaseClient
.from("roles")
.insert({ role_name: name })

if(error){
console.error("FULL ERROR:", error)
alert(error.message)   // 👈 THIS WILL SHOW REAL ISSUE
return
}

alert("Role Created ✅")

document.getElementById("roleName").value = ""

loadPermissions()
}
/* LOAD DATA */

/* LOAD DATA */

async function loadPermissions(){

try{

console.log("Loading permissions...")

const {data:roles,error:rErr}=await supabaseClient.from("roles").select("*")
const {data:perms,error:pErr}=await supabaseClient.from("role_permissions").select("*")

console.log("Roles:",roles)
console.log("Permissions:",perms)

if(rErr || pErr){
console.error("DB Error",rErr,pErr)
alert("Error loading data")
return
}

if(!roles || roles.length===0){
permTable.innerHTML="<tr><td>No Roles Found</td></tr>"
return
}

let html=`<thead><tr><th>Role</th>`

pages.forEach(p=>{
html+=`<th title="Toggle all permissions for this page">
${p.name}
<br>
<input type="checkbox"
onclick="toggleColumn('${p.file}', this.checked)">
</th>`
})

html+=`</tr></thead><tbody>`

roles.forEach(role=>{

html+=`<tr><td class="role-name">${role.role_name}</td>`

pages.forEach(p=>{

html+=`<td style="text-align:left">`

actions.forEach(a=>{

let existing = perms?.find(x =>
String(x.role_id)===String(role.id) &&
x.page_name===p.file &&
(x.action_name || "view")===a
)

html+=`
<label style="
display:flex;
align-items:center;
gap:6px;
margin-bottom:4px;
">
<input type="checkbox"
id="${role.id}_${p.file}_${a}"
${existing && existing.can_access ? "checked":""}>
<span style="
background:#0f172a;
padding:2px 6px;
border-radius:6px;
font-size:10px;
color:#9ca3af;
text-transform:capitalize;
">
${a}
</span>
</label>
`

})

html+=`</td>`
})

html+=`</tr>`
})

html+=`</tbody>`

document.getElementById("permTable").innerHTML = html

console.log("Table rendered ✅")

}catch(err){

console.error("LOAD ERROR:",err)
alert("Error loading permissions")

}

}

/* SAVE (UPSERT SAFE) */

async function saveAllPermissions(){

const btn = document.getElementById("saveBtn")
btn.disabled = true
btn.innerText = "Saving..."

try{

const {data:roles}=await supabaseClient.from("roles").select("*")

let allData=[]

for(let role of roles){
for(let p of pages){
for(let a of actions){

let cb=document.getElementById(`${role.id}_${p.file}_${a}`)
if(!cb) continue

allData.push({
role_id: role.id,
page_name: p.file,
action_name: a,
can_access: cb.checked
})

}}}

const {error} = await supabaseClient
.from("role_permissions")
.upsert(allData,{
onConflict:"role_id,page_name,action_name"
})

if(error){
console.error(error)
alert("Error saving permissions")
return
}

alert("Permissions Saved Successfully 🚀")
loadPermissions()

}catch(err){
console.error(err)
alert("Error saving permissions")
}

btn.disabled = false
btn.innerText = "Save All Permissions"

}

function toggleColumn(page, checked){

document.querySelectorAll(`[id*="_${page}_"]`).forEach(cb=>{
cb.checked = checked
})

}

window.onload=loadPermissions

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
