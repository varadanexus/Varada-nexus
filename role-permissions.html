</style></head><body><div id="sidebar-container"></div><script>

})
</script><div class="main"><h2>Role Permissions</h2><div class="form-box"><h3>Create Role</h3><input id="roleName" placeholder="Role Name"><button onclick="createRole()">Create Role</button>

</div><table id="permTable"></table><button class="save-all" onclick="saveAllPermissions()">
Save All Permissions
</button></div><script>

/* SUPABASE */

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

/* ERP PAGES */

const pages=[

{name:"Dashboard",file:"dashboard.html"},
{name:"Trips",file:"trips.html"},
{name:"Expenses",file:"expenses.html"},
{name:"Master Data",file:"master-data.html"},
{name:"Rates",file:"rate-entry.html"},
{name:"Payments",file:"transporter-payments.html"},
{name:"Users",file:"admin-users.html"},
{name:"Role Permissions",file:"role-permissions.html"},
{name:"Profit Analysis",file:"profit-analysis.html"},
{name:"Transporter Dashboard",file:"transporter-dashboard.html"},
{name:"Transporter Trips",file:"transporter-trips.html"},
{name:"Transporter Ledger",file:"transporter-ledger.html"}

]

/* CREATE ROLE */

async function createRole(){

let name=document.getElementById("roleName").value

if(!name){
alert("Enter role name")
return
}

await supabaseClient
.from("roles")
.insert({role_name:name})

document.getElementById("roleName").value=""

alert("Role Created")

loadPermissions()

}

/* LOAD PERMISSIONS */

async function loadPermissions(){

const {data:roles}=await supabaseClient
.from("roles")
.select("*")

const {data:perms}=await supabaseClient
.from("role_permissions")
.select("*")

let html=""

/* HEADER */

html+=`<thead>
<tr>
<th>Role</th>
`

pages.forEach(p=>{
html+=`<th>${p.name}</th>`
})

html+=`
</tr>
</thead>
<tbody>
`

/* ROWS */

roles.forEach(role=>{

html+=`
<tr>
<td class="role-name">${role.role_name}</td>
`

pages.forEach(p=>{

let existing=perms?.find(x =>
String(x.role_id)===String(role.id) &&
String(x.page_name)===String(p.file)
)

let checked=existing?.can_access ? "checked":""

html+=`
<td>
<input type="checkbox"
id="${role.id}_${p.file}"
${checked}>
</td>
`

})

html+=`</tr>`

})

html+=`</tbody>`

document.getElementById("permTable").innerHTML=html

}

/* SAVE ALL PERMISSIONS */

async function saveAllPermissions(){

const {data:roles}=await supabaseClient
.from("roles")
.select("*")

for(let role of roles){

for(let p of pages){

let checkbox=document.getElementById(role.id+"_"+p.file)

if(!checkbox) continue

let allowed=checkbox.checked

const {data:existing}=await supabaseClient
.from("role_permissions")
.select("*")
.eq("role_id",role.id)
.eq("page_name",p.file)

if(existing && existing.length>0){

await supabaseClient
.from("role_permissions")
.update({can_access:allowed})
.eq("role_id",role.id)
.eq("page_name",p.file)

}else{

await supabaseClient
.from("role_permissions")
.insert({
role_id:role.id,
page_name:p.file,
can_access:allowed
})

}

}

}

alert("All Permissions Saved")

}

/* INIT */

loadPermissions()

</script></body></html>
