<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data

/* WAIT FOR SIDEBAR RENDER */
await new Promise(r => setTimeout(r, 200))

/* LOAD USER + ROLE */
await initSidebar()

/* APPLY RBAC */
if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}
})

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId=session.user.id
const email=session.user.email

document.getElementById("userName").innerText=email.split("@")[0]

const {data:user}=await supabaseClient
.from("users").select("id").eq("auth_id",authId).single()

if(!user) return

const {data:userRole}=await supabaseClient
.from("user_roles").select("role_id").eq("user_id",user.id).single()

if(!userRole) return

const {data:role}=await supabaseClient
.from("roles").select("role_name").eq("id",userRole.role_id).single()

if(role){
document.getElementById("userRole").innerText=role.role_name
}

if(typeof applyMenuRBAC==="function"){
applyMenuRBAC()
}

window.logout=async()=>{
await supabaseClient.auth.signOut()
window.location="login.html"
}
}
</script>

<div class="main">

<h2>Role Permissions</h2>

<div class="form-box">

<h3>Create Role</h3>

<input id="roleName" placeholder="Role Name">

<button onclick="createRole()">Create Role</button>

</div>

<table id="permTable"></table>

<button class="save-all" onclick="saveAllPermissions()">
Save All Permissions
</button>

</div>

<script>

/* ERP PAGES */

const pages=[
{name:"Dashboard",file:"dashboard.html"},
{name:"Trips",file:"trips.html"},
{name:"Expenses",file:"expenses.html"},
{name:"Client Billing",file:"client-billing.html"},
{name:"Client Payments",file:"client-payments.html"},
{name:"Client Ledger",file:"client-ledger.html"},
{name:"Master Data",file:"master-data.html"},
{name:"Rates",file:"rate-entry.html"},
{name:"Transporter Payments",file:"transporter-payments.html"},
{name:"Transporter Ledger",file:"admin-transporter-ledger.html"},
{name:"Users",file:"admin-users.html"},
{name:"Role Permissions",file:"role-permissions.html"},
{name:"System Maintenance",file:"admin-maintenance.html"},
{name:"Profit Analysis",file:"profit-analysis.html"},
{name:"Financial Dashboard",file:"financial-dashboard.html"},
]

/* 🔥 ACTIONS */

const actions=["view","create","edit","delete"]

/* CREATE ROLE */

async function createRole(){

let name=roleName.value.trim()

if(!name){
alert("Enter role name")
return
}

await supabaseClient.from("roles").insert({role_name:name})

roleName.value=""
alert("Role Created")

loadPermissions()
}

/* LOAD PERMISSIONS */

async function loadPermissions(){

const {data:roles}=await supabaseClient.from("roles").select("*")
const {data:perms}=await supabaseClient.from("role_permissions").select("*")

let html=`<thead><tr><th>Role</th>`

pages.forEach(p=>{ html+=`<th>${p.name}</th>` })

html+=`</tr></thead><tbody>`

roles?.forEach(role=>{

html+=`<tr><td class="role-name">${role.role_name}</td>`

pages.forEach(p=>{

html+=`<td style="text-align:left">`

actions.forEach(a=>{

let existing=perms?.find(x=>
String(x.role_id)==String(role.id) &&
x.page_name==p.file &&
(x.action_name || "view")==a
)

html+=`
<label style="display:block">
<input type="checkbox"
id="${role.id}_${p.file}_${a}"
${existing?.can_access?"checked":""}>
 ${a}
</label>
`

})

html+=`</td>`

})

html+=`</tr>`
})

html+=`</tbody>`

permTable.innerHTML=html
}

/* SAVE */

async function saveAllPermissions(){

const {data:roles}=await supabaseClient.from("roles").select("*")

let tasks=[]

for(let role of roles){

for(let p of pages){

for(let a of actions){

let cb=document.getElementById(`${role.id}_${p.file}_${a}`)
if(!cb) continue

let allowed=cb.checked

const {data:existing}=await supabaseClient
.from("role_permissions")
.select("*")
.eq("role_id",role.id)
.eq("page_name",p.file)
.eq("action_name",a)

if(existing && existing.length>0){

tasks.push(
supabaseClient.from("role_permissions")
.update({can_access:allowed})
.eq("role_id",role.id)
.eq("page_name",p.file)
.eq("action_name",a)
)

}else{

tasks.push(
supabaseClient.from("role_permissions")
.insert({
role_id:role.id,
page_name:p.file,
action_name:a,
can_access:allowed
})
)

}

}

}
}

await Promise.all(tasks)

alert("Permissions Saved Successfully")
}

/* INIT */

window.onload=loadPermissions

</script>

<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
