<!DOCTYPE html>
<html>

<head>

<title>Role Permissions - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

h2{
color:#1f3c88;
}

.form-box{
background:white;
padding:20px;
border-radius:6px;
width:400px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
}

</style>

</head>

<body>

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>

<div class="main">

<h2>Role Permissions</h2>

<div class="form-box">

<h3>Create Role</h3>

<input id="roleName" placeholder="Role Name">

<button onclick="createRole()">Create Role</button>

</div>

<table>

<thead>

<tr>
<th>Role</th>
<th>Page</th>
<th>Access</th>
<th>Save</th>
</tr>

</thead>

<tbody id="permTable"></tbody>

</table>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

/* ERP PAGES */

const pages=[

/* ADMIN ERP */

{name:"Dashboard",file:"dashboard.html"},
{name:"Trips",file:"trips.html"},
{name:"Expenses",file:"expenses.html"},
{name:"Master Data",file:"master-data.html"},
{name:"Rates",file:"rate-entry.html"},
{name:"Payments",file:"transporter-payments.html"},
{name:"Users",file:"admin-users.html"},
{name:"Role Permissions",file:"role-permissions.html"},
{name:"Profit Analysis",file:"profit-analysis.html"},

/* TRANSPORTER PORTAL */

{name:"Transporter Dashboard",file:"transporter-dashboard.html"},
{name:"Transporter Trips",file:"transporter-trips.html"},
{name:"Transporter Ledger",file:"transporter-ledger.html"}

]

/* CREATE ROLE */

async function createRole(){

let name=document.getElementById("roleName").value

if(!name) return alert("Enter role name")

await supabaseClient
.from("roles")
.insert({role_name:name})

alert("Role Created")

loadPermissions()

}

/* LOAD PERMISSIONS */

async function loadPermissions(){

const {data:roles}=await supabaseClient
.from("roles")
.select("*")

const {data:perms}=await supabaseClient
.from("role_permissions")
.select("*")

let html=""

/* HEADER */

html+=`<thead><tr><th>Role</th>`

pages.forEach(p=>{
html+=`<th>${p.name}</th>`
})

html+=`<th>Save</th></tr></thead><tbody>`

/* ROWS */

roles.forEach(role=>{

html+=`<tr><td><b>${role.role_name}</b></td>`

pages.forEach(p=>{

let existing=perms?.find(x =>
String(x.role_id)===String(role.id) &&
x.page_name===p.file
)

let checked=existing?.can_access ? "checked" : ""

html+=`
<td style="text-align:center">
<input type="checkbox"
id="${role.id}_${p.file}"
${checked}>
</td>
`

})

html+=`
<td>
<button onclick="saveRole('${role.id}')">
Save
</button>
</td>
</tr>
`

})

html+=`</tbody>`

document.querySelector("table").innerHTML=html

}

/* SAVE ROLE */

async function saveRole(roleId){

for(let p of pages){

let allowed=document.getElementById(roleId+"_"+p.file).checked

const {data:existing}=await supabaseClient
.from("role_permissions")
.select("*")
.eq("role_id",roleId)
.eq("page_name",p.file)

if(existing && existing.length>0){

await supabaseClient
.from("role_permissions")
.update({can_access:allowed})
.eq("role_id",roleId)
.eq("page_name",p.file)

}else{

await supabaseClient
.from("role_permissions")
.insert({
role_id:roleId,
page_name:p.file,
can_access:allowed
})

}

}

alert("Permissions Saved")

}

loadPermissions()

</script>
</body>

</html>
