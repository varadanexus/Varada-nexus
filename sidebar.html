}

.avatar{

background:linear-gradient(135deg,#3b82f6,#2563eb);

}

/* MENU */
.menu-section{
margin-top:15px;
}

.menu-title{

/* LINKS */
.sidebar a{
display:flex;
align-items:center;
gap:12px;
padding:12px 16px;
margin:4px 12px;
border-radius:10px;
color:#cbd5f5;
text-decoration:none;
font-size:14px;
position:relative;
transition:all 0.25s ease;
}

/* ICON */
.sidebar a i{
width:18px;
height:18px;
opacity:0.85;
}

/* HOVER */
.sidebar a:hover{
background:rgba(59,130,246,0.15);
color:white;
transform:translateX(4px);
}

/* ACTIVE */
.sidebar a.active{
background:linear-gradient(90deg,rgba(59,130,246,0.25),transparent);
color:white;
}

/* ANIMATED LEFT BAR */
.sidebar a.active::before{
content:"";
position:absolute;
left:-6px;
top:6px;
bottom:6px;
width:4px;
background:#3b82f6;
border-radius:6px;
animation:slideIn 0.3s ease;
}

@keyframes slideIn{
from{height:0;opacity:0;}
to{height:100%;opacity:1;}
}

/* LOGOUT */
.bottom{
padding:12px;
border-top:1px solid rgba(255,255,255,0.05);
