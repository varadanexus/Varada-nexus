/* ACTIVE PAGE */

function highlightActivePage(){

const currentPage = window.location.pathname.split("/").pop()

document.querySelectorAll(".sidebar a[data-page]").forEach(link=>{
if(link.dataset.page===currentPage){
link.classList.add("active")
}
})

}

/* LOAD USER INFO (FIXED FINAL) */

async function loadUserInfo(){

try{

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session){
document.getElementById("userName").innerText="User"
return
}

const authId = session.user.id
const email = session.user.email

/* NAME */
document.getElementById("userName").innerText = email.split("@")[0]

/* GET USER USING auth_id (IMPORTANT FIX) */

const {data:user,error:userErr} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(userErr || !user){
document.getElementById("userRole").innerText=""
return
}

/* GET ROLE */

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole){
document.getElementById("userRole").innerText=""
return
}

/* GET ROLE NAME */

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

if(role){
document.getElementById("userRole").innerText = role.role_name
}

}catch(err){
console.log("User load error:",err)
}

}

/* SIDEBAR RBAC */

async function applySidebarRBAC(){

try{

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId = session.user.id

const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:permissions} = await supabaseClient
.from("role_permissions")
.select("page_name")
.eq("role_id",userRole.role_id)
.eq("can_access",true)

if(!permissions) return

let allowedPages = permissions.map(p=>p.page_name)

document.querySelectorAll(".sidebar a[data-page]").forEach(link=>{
let page = link.dataset.page
if(!allowedPages.includes(page)){
link.style.display="none"
}
})

}catch(err){
console.log("RBAC error:",err)
}

}

/* LOGOUT */

async function logout(){

await supabaseClient.auth.signOut()

localStorage.clear()
sessionStorage.clear()

window.location.href="login.html"

}

/* INIT */

window.addEventListener("load", async ()=>{

highlightActivePage()

await loadUserInfo()
await applySidebarRBAC()

})

</script>
