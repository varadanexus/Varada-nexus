/* HIGHLIGHT ACTIVE PAGE */

function highlightActivePage(){

const currentPage = window.location.pathname.split("/").pop()

document.querySelectorAll(".sidebar a[data-page]").forEach(link=>{

if(link.getAttribute("data-page")===currentPage){
link.classList.add("active")
}

})

}


/* LOAD USER NAME + ROLE */

async function loadUserInfo(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const authId=session.user.id

/* GET USER */

const {data:user}=await supabaseClient
.from("users")
.select("id,name")
.eq("auth_id",authId)
.single()

if(!user) return

/* GET ROLE */

const {data:userRole}=await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

const {data:role}=await supabaseClient
.from("roles")
.select("role_name")
.eq("id",userRole.role_id)
.single()

document.getElementById("userName").innerText=user.name
document.getElementById("userRole").innerText=role.role_name

}


/* SIDEBAR RBAC */

async function applySidebarRBAC(){

try{

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const authId=session.user.id

const {data:user}=await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

const {data:userRole}=await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)
.single()

if(!userRole) return

let roleId=userRole.role_id

const {data:permissions}=await supabaseClient
.from("role_permissions")
.select("page_name")
.eq("role_id",roleId)
.eq("can_access",true)

if(!permissions) return

const allowedPages=permissions.map(p=>p.page_name)

document.querySelectorAll(".sidebar a[data-page]").forEach(link=>{

const page=link.getAttribute("data-page")

if(!allowedPages.includes(page)){
link.style.display="none"
}

})

}catch(err){

console.log("Sidebar RBAC error:",err)

}

}


/* LOGOUT */

async function logout(){

try{
await supabaseClient.auth.signOut()
}catch(e){
console.log(e)
}

localStorage.clear()
sessionStorage.clear()

window.location.href="login.html"

}


/* INITIALIZE */

window.addEventListener("load", async ()=>{

highlightActivePage()

await applySidebarRBAC()

await loadUserInfo()

})

</script>
