<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leadership – Varada Nexus</title>

<style>

/* 🔥 GLOBAL */
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(-45deg,#020617,#0f172a,#1e3a8a,#020617);
background-size:400% 400%;
animation:bg 12s ease infinite;
position:relative;
overflow-x:hidden;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

body::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle, rgba(59,130,246,0.18), transparent 70%);
top:-150px;
left:50%;
transform:translateX(-50%);
filter:blur(140px);
z-index:-1;
}
  
/* 🔥 NAVBAR */
header{
position:sticky;
top:0;
z-index:1000;
background:rgba(10,15,30,0.55);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.nav-container{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 20px;
}

.nav-left{
display:flex;
align-items:center;
gap:14px;
height:48px;
}

.logo{
height:100%;
max-height:48px;
}

.brand-block{
display:flex;
flex-direction:column;
}

.brand-name{font-size:19px;font-weight:600;}
.brand-sub{font-size:10px;color:#94a3b8;}

.nav-links{display:flex;gap:28px;}

.nav-links a{
color:#cbd5f5;
text-decoration:none;
font-size:14px;
}

.nav-links a:hover,
.nav-links a.active{color:white;}

/* 🔥 PAGE */
.container{
max-width:1200px;
margin:80px auto;
padding:0 20px;
text-align:center;
}

h1{font-size:34px;}
.sub{color:#94a3b8;margin-bottom:70px;}

/* 🔥 ORG */
.org{
display:flex;
flex-direction:column;
align-items:center;
gap:90px;
}

.level{
display:flex;
justify-content:center;
gap:60px;
position:relative;
flex-wrap:wrap;
}

.level::before{
content:"";
position:absolute;
top:-50px;
height:50px;
width:2px;
background:rgba(255,255,255,0.2);
left:50%;
transform:translateX(-50%);
}

.level:first-child::before{display:none;}

.level-line{
position:absolute;
top:-50px;
height:2px;
width:80%;
left:10%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
}

/* 🔥 CARD */
.card{
background:linear-gradient(160deg,rgba(255,255,255,0.05),rgba(15,23,42,0.9));
border:1px solid rgba(255,255,255,0.08);
padding:28px;
border-radius:18px;
width:250px;
cursor:pointer;
transition:0.3s ease;
backdrop-filter:blur(18px);
position:relative;
overflow:hidden;
}

/* HOVER SAFE */
.card:hover{
transform:translateY(-6px);
box-shadow:0 40px 120px rgba(0,0,0,0.9);
}

/* CLICK FIX */
.card:active{
transform:none !important;
}

/* CMD */
.card.cmd{
box-shadow:
0 50px 180px rgba(59,130,246,0.35),
0 0 60px rgba(59,130,246,0.25);
}

/* AVATAR */
.avatar{
width:110px;
height:110px;
border-radius:50%;
margin:auto;
margin-bottom:16px;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#3b82f6,#6366f1);
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT */
.name{font-weight:600;font-size:17px;}
.role{font-size:13px;color:#94a3b8;margin-top:4px;}
.desc{font-size:13px;color:#cbd5f5;margin-top:6px;}

.tags{margin-top:12px;}
.tags span{
display:inline-block;
padding:6px 10px;
margin:4px;
font-size:11px;
background:rgba(59,130,246,0.15);
border-radius:6px;
}

/* 🔥 MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#0f172a;
padding:40px 30px;
border-radius:20px;
width:320px;
text-align:center;
animation:popIn 0.3s ease;
}

@keyframes popIn{
from{opacity:0;transform:scale(0.8);}
to{opacity:1;transform:scale(1);}
}

.modal-avatar{
width:120px;
height:120px;
border-radius:50%;
margin:0 auto 18px;
overflow:hidden;
}

.modal-avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.close{
margin-top:20px;
cursor:pointer;
color:#3b82f6;
}

footer{
text-align:center;
padding:40px;
color:#94a3b8;
}

</style>
</head>

<body>

<header>
<div class="nav-container">

<div class="nav-left">
<img src="images/logo.png" class="logo">
<div class="brand-block">
<span class="brand-name">Varada Nexus</span>
<span class="brand-sub">Private Limited</span>
</div>
</div>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="founder.html">Founder</a>
<a href="services.html">Services</a>
<a href="team.html" class="active">Team</a>
<a href="contact.html">Contact</a>
<a href="login.html">Login</a>
</nav>

</div>
</header>

<div class="container">

<h1>Leadership Team</h1>
<div class="sub">Execution-led leadership across industries</div>

<div class="org">

<!-- KEEP YOUR CARDS SAME (no change needed) -->

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<div class="modal-avatar" id="m-img"></div>

<h3 id="m-name"></h3>
<p id="m-role"></p>
<p id="m-desc"></p>

<div class="close" onclick="closeModal()">Close</div>

</div>
</div>

<script>
function openModal(name, role, desc, img, initials){

// 🔥 CLEAN RESET
document.querySelectorAll(".card").forEach(c=>{
  c.style.transform="none";
});

document.getElementById("modal").style.display="flex";

document.getElementById("m-name").innerText=name;
document.getElementById("m-role").innerText=role;
document.getElementById("m-desc").innerText=desc;

let avatar=document.getElementById("m-img");

if(img){
  avatar.innerHTML=`<img src="${img}" onerror="this.parentElement.innerHTML='${initials || ''}'">`;
}else{
  avatar.innerHTML=initials || '';
}
}

function closeModal(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
