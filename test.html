<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Test</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

.status{
  margin-top:15px;
  font-size:14px;
  color:#94a3b8;
}
</style>

</head>

<body>

<div class="card">
  <h2>WhatsApp API Test</h2>
  <p>Send Trip Update (UTILITY)</p>

  <button onclick="testWhatsApp()">Send Test Message</button>

  <div class="status" id="status"></div>
</div>

<script>
async function testWhatsApp(){

  let status = document.getElementById("status")
  status.innerText = "Sending..."

  try{

    let res = await fetch("https://ticsgbtxfhhihamejiss.supabase.co/functions/v1/send-whatsapp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer YOUR_ANON_KEY",
        "apikey": "YOUR_ANON_KEY"
      },
      body: JSON.stringify({

        // ✅ NEW FORMAT (MULTIPLE USERS)
        phones: ["918125625629"],

        // ✅ YOUR APPROVED TEMPLATE
        template: "trip_update_template",

        // ✅ MATCH YOUR TEMPLATE VARIABLES EXACTLY
        params: [
          "Prudhvi",      // {{1}} name
          "R123",         // {{2}} route id
          "AP09AB1234",   // {{3}} truck number
          "Ramesh",       // {{4}} transporter
          "25.50"         // {{5}} weight in MT
        ]

      })
    })

    let data = await res.json()

    console.log(data)

    if(res.ok){
      status.innerText = "✅ Trip message sent"
    }else{
      status.innerText = "❌ " + (data.error || "Error sending message")
    }

  }catch(err){

    console.error(err)

    status.innerText = "❌ Network error"
  }
}
</script>

</body>
</html>
