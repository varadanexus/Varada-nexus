<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Login Test</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:320px;
}

input, button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:6px;
  border:none;
}

button{
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

.error{
  color:#f87171;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h3>Auto Login</h3>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="error" class="error"></div>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"YOUR-ANON-KEY"
)

async function login(){

let email = document.getElementById("email").value
let password = document.getElementById("password").value

if(!email || !password){
  document.getElementById("error").innerText = "Enter email & password"
  return
}

document.getElementById("error").innerText = ""

/* 🔐 AUTH LOGIN */
const {data,error} = await supabaseClient.auth.signInWithPassword({
  email,password
})

if(error){
  document.getElementById("error").innerText = error.message
  return
}

let authId = data.user.id

/* 🔥 STEP 1: CHECK AGENT (HIGHEST PRIORITY) */
const {data:agent} = await supabaseClient
.from("agents")
.select("id, is_active")
.eq("auth_id", authId)
.maybeSingle()

if(agent){
  if(agent.is_active === false){
    document.getElementById("error").innerText = "Agent inactive"
    return
  }

  window.location.href = "agent-dashboard.html"
  return
}

/* 🔥 STEP 2: CHECK USER + ROLE */
const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id", authId)
.maybeSingle()

if(!user){
  document.getElementById("error").innerText = "User not registered"
  return
}

const {data:userRoles} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id", user.id)

if(!userRoles || userRoles.length === 0){
  document.getElementById("error").innerText = "Role not assigned"
  return
}

let roleId = userRoles[0].role_id

const {data:role} = await supabaseClient
.from("roles")
.select("role_name")
.eq("id", roleId)
.single()

let roleName = (role?.role_name || "").toLowerCase()

/* 🔥 STEP 3: ROUTING */

if(roleName.includes("customer")){
  window.location.href = "transporter-dashboard.html"
  return
}

if(roleName.includes("admin") || roleName.includes("manager")){
  window.location.href = "financial-dashboard.html"
  return
}

/* DEFAULT STAFF */
window.location.href = "dashboard.html"

}

</script>

</body>
</html>
