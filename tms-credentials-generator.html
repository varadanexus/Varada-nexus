<!DOCTYPE html>
<html>
<head>
<title>TMS Credentials Generator - Varada Nexus</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0f1c;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
padding:10px 16px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
margin-top:10px;
}

h2{
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>TMS Credential Generator</h2>

<div class="card">

<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile Number">
<input id="email" placeholder="Email">

<input id="truck" placeholder="Truck Number">
<input id="address" placeholder="Address">
<input id="pan" placeholder="PAN">
<input id="aadhaar" placeholder="Aadhaar">

<h3>Bank Details</h3>

<input id="account" placeholder="Account Number">
<input id="ifsc" placeholder="IFSC">
<input id="bank" placeholder="Bank Name">
<input id="branch" placeholder="Branch">

<h3>Login Credentials</h3>

<input id="username" placeholder="Username (Email)">
<input id="password" placeholder="Password">

<button onclick="generatePDF()">Generate PDF</button>

</div>

<div class="card">
<h3>Email Preview</h3>
<textarea id="emailPreview" style="width:100%;height:200px;"></textarea>
</div>

</div>

<script>

async function generatePDF(){

const { jsPDF } = window.jspdf
let doc = new jsPDF()

// GET VALUES
let name = val("name")
let mobile = val("mobile")
let email = val("email")
let truck = val("truck")
let address = val("address")
let pan = val("pan")
let aadhaar = val("aadhaar")

let account = val("account")
let ifsc = val("ifsc")
let bank = val("bank")
let branch = val("branch")

let username = val("username")
let password = val("password")

let loginURL = "https://www.varadanexus.com/login.html"

// PASSWORD LOGIC
let pdfPassword = mobile || "1234"

// HEADER
doc.setFont("helvetica","bold")
doc.setFontSize(16)
doc.text("VARADA NEXUS PRIVATE LIMITED",105,15,{align:"center"})

doc.setFontSize(10)
doc.text("Transport Management System (TMS)",15,25)

doc.setFont("helvetica","bold")
doc.text("CONFIDENTIAL",15,32)

// SECTION
doc.setFontSize(12)
doc.text("Transport Partner Details",15,45)

doc.setFont("helvetica","normal")
doc.setFontSize(10)

let y = 55

function row(label,value){
doc.text(label,15,y)
doc.text(": "+value,80,y)
y+=7
}

row("Name",name)
row("Mobile",mobile)
row("Email",email)
row("Truck Number",truck)
row("Address",address)
row("PAN",pan)
row("Aadhaar",aadhaar)

y+=5

doc.setFont("helvetica","bold")
doc.text("Bank Details",15,y)
y+=7

doc.setFont("helvetica","normal")

row("Account Number",account)
row("IFSC",ifsc)
row("Bank",bank)
row("Branch",branch)

y+=5

doc.setFont("helvetica","bold")
doc.text("TMS Login Credentials",15,y)
y+=7

doc.setFont("helvetica","normal")

row("Username",username)
row("Password",password)
row("Login URL",loginURL)
row("Login Type","Transporter")

y+=10

doc.setFontSize(9)
doc.text("Access Instructions:",15,y)
y+=6

doc.text("Login using above credentials. Keep them confidential.",15,y)
y+=5

doc.text("Password to open this document: " + pdfPassword,15,y)

y+=10

doc.text("Authorized by",15,y)
y+=5
doc.text("Administration Team",15,y)

// SAVE FILE
let fileName = `${name}_TMS_CREDENTIALS.pdf`
doc.save(fileName)

// EMAIL TEMPLATE
let emailText = `
Subject: Your TMS Login Credentials – Varada Nexus

Dear ${name},

Welcome to Varada Nexus Private Limited.

Please find attached your Transport Management System (TMS) login credentials.

🔐 Important:
• Your login credentials are confidential
• PDF password: ${pdfPassword}

Login here:
${loginURL}

If you face any issues, contact support.

Regards,
Administration Team
Varada Nexus Private Limited
(No Reply)
`

document.getElementById("emailPreview").value = emailText

alert("PDF Generated & Email Draft Ready ✅")

}

function val(id){
return document.getElementById(id).value || "-"
}

</script>

</body>
</html>
