<!DOCTYPE html>
<html>
<head>
<title>TMS Credentials Generator - Varada Nexus</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0f1c;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
padding:10px 16px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
margin-top:10px;
}

h2{
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>TMS Credential Generator</h2>

<div class="card">

<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile Number">
<input id="email" placeholder="Email">

<input id="truck" placeholder="Truck Number">
<input id="address" placeholder="Address">
<input id="pan" placeholder="PAN">
<input id="aadhaar" placeholder="Aadhaar">

<h3>Bank Details</h3>

<input id="account" placeholder="Account Number">
<input id="ifsc" placeholder="IFSC">
<input id="bank" placeholder="Bank Name">
<input id="branch" placeholder="Branch">

<h3>Login Credentials</h3>

<input id="username" placeholder="Username (Email)">
<input id="password" placeholder="Password">

<button onclick="generatePDF()">Generate PDF</button>

</div>

<div class="card">
<h3>Email Preview</h3>
<textarea id="emailPreview" style="width:100%;height:200px;"></textarea>
</div>

</div>

<script>

async function generatePDF(){

const { jsPDF } = window.jspdf
let doc = new jsPDF()

/* 🔷 WATERMARK */
doc.setGState(new doc.GState({opacity:0.05}))
try{
doc.addImage("images/logo.png","PNG",40,80,120,120)
}catch(e){}
doc.setGState(new doc.GState({opacity:1}))

// GET VALUES
let name = val("name")
let mobile = val("mobile")
let email = val("email")
let truck = val("truck")
let address = val("address")
let pan = val("pan")
let aadhaar = val("aadhaar")

let account = val("account")
let ifsc = val("ifsc")
let bank = val("bank")
let branch = val("branch")

let username = val("username")
let password = val("password")

let loginURL = "https://www.varadanexus.com/login.html"


// HEADER
/* 🔷 LOGO */
try{
doc.addImage("images/logo.png","PNG",15,10,25,20)
}catch(e){}

/* 🔷 HEADER TEXT */
doc.setFont("helvetica","bold")
doc.setFontSize(16)
doc.text("VARADA NEXUS PRIVATE LIMITED",105,15,{align:"center"})

doc.setFontSize(10)
doc.text("Transport Management System (TMS)",15,25)

doc.setFont("helvetica","bold")
doc.text("CONFIDENTIAL",15,32)

// SECTION
/* ---------- BOX FUNCTION ---------- */
function drawBox(title, startY, height){
doc.setFont("helvetica","bold")
doc.setFontSize(11)
doc.text(title,15,startY)

doc.rect(15,startY+3,180,height)
return startY + 10
}

function row(label,value,x,y){
doc.setFont("helvetica","bold")
doc.text(label, x, y)

doc.setFont("helvetica","normal")
doc.text(": " + value, x+55, y)
}

/* ---------- TRANSPORT DETAILS ---------- */
let y = 45
y = drawBox("Transport Partner Details", y, 45)

row("Name",name,20,y)
row("Mobile",mobile,20,y+6)
row("Email",email,20,y+12)
row("Truck No",truck,20,y+18)
row("Address",address,20,y+24)
row("PAN",pan,20,y+30)
row("Aadhaar",aadhaar,20,y+36)

/* ---------- BANK ---------- */
y += 55
y = drawBox("Bank Details", y, 28)

row("Account No",account,20,y)
row("IFSC",ifsc,20,y+6)
row("Bank",bank,20,y+12)
row("Branch",branch,20,y+18)

/* ---------- LOGIN ---------- */
y += 35
y = drawBox("TMS Login Credentials", y, 28)

row("Username",username,20,y)
row("Password",password,20,y+6)
row("Login URL",loginURL,20,y+12)
row("Login Type","Transporter",20,y+18)

/* ---------- INSTRUCTIONS ---------- */
y += 35

doc.setFont("helvetica","bold")
doc.text("Access Instructions",15,y)

doc.setFont("helvetica","normal")
doc.setFontSize(9)

doc.text(
"Login using the above credentials and select 'Transporter'. Keep your credentials confidential.",
15,y+6,{maxWidth:180}
)

/* ---------- SIGN ---------- */
y += 25

doc.setFont("helvetica","bold")
doc.text("Authorized by",15,y)

doc.setFont("helvetica","normal")
doc.text("Administration Team",15,y+6)
doc.text("Varada Nexus Private Limited",15,y+12)

/* 🔷 STAMP */
try{
doc.addImage("images/stamp.png","PNG",155,y-25,35,35)
}catch(e){}
  
// SAVE FILE
let fileName = `${name}_TMS_CREDENTIALS.pdf`
doc.setFontSize(8)
doc.text("This is a system generated document. No signature required.",15,285)
doc.save(fileName)

// EMAIL TEMPLATE
let emailText = `
Subject: Your TMS Login Credentials – Varada Nexus

Dear ${name},

Welcome to Varada Nexus Private Limited.

Please find attached your Transport Management System (TMS) login credentials.

🔐 Important:
• Your login credentials are confidential

Login here:
${loginURL}

If you face any issues, contact support.

Regards,
Administration Team
Varada Nexus Private Limited
(No Reply)
`

document.getElementById("emailPreview").value = emailText

alert("PDF Generated & Email Draft Ready ✅")

}

function val(id){
return document.getElementById(id).value || "-"
}

</script>

</body>
</html>
