<!DOCTYPE html><html>
<head><title>Varada Nexus Transport Management System</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>
body{
font-family:Arial;
margin:40px;
}

input,button{
padding:10px;
margin:5px;
}
</style></head><body><h1>Varada Nexus Transport Management System</h1><h2>Add Trip</h2><input id="commodity" placeholder="Commodity">
<input id="weight" placeholder="Weight KG"><button onclick="addTrip()">Add Trip</button>

<h2>Trips</h2><div id="tripList"></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

async function addTrip(){

const commodity=document.getElementById("commodity").value
const weight=document.getElementById("weight").value

await supabaseClient
.from("trips")
.insert([
{
commodity:commodity,
weight_kg:weight
}
])

loadTrips()

}

async function loadTrips(){

const { data } = await supabaseClient
.from("trips")
.select("*")

let html=""

data.forEach(trip=>{
html+=`<p>${trip.commodity} - ${trip.weight_kg} KG</p>`
})

document.getElementById("tripList").innerHTML=html

}

loadTrips()

</script></body>
</html>
