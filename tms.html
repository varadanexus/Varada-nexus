<!DOCTYPE html><html><head><title>Varada Nexus Transport Management</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 12px;
background:#1f3c88;
color:white;
border:none;
cursor:pointer;
}

.trip{
background:white;
padding:15px;
margin-top:10px;
border-radius:5px;
}

</style></head><body><h1>Varada Nexus Transport Management System</h1><h3>Add Trip</h3><input id="route" placeholder="Route">
<input id="truck" placeholder="Truck Number">
<input id="commodity" placeholder="Commodity">
<input id="weight" placeholder="Weight KG"><button onclick="addTrip()">Add Trip</button>

<h3>Trips</h3><div id="tripList"></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

async function generateTripNumber(){

const { data } = await supabaseClient
.from("trips")
.select("trip_no")

let count = data.length + 1

let tripNo = "TRP" + count.toString().padStart(4,'0')

return tripNo

}

async function addTrip(){

const route=document.getElementById("route").value
const truck=document.getElementById("truck").value
const commodity=document.getElementById("commodity").value
const weight=document.getElementById("weight").value

const tripNo = await generateTripNumber()

await supabaseClient
.from("trips")
.insert([{
trip_no:tripNo,
route:route,
truck:truck,
commodity:commodity,
weight_kg:weight,
status:"created"
}])

alert("Trip Created: " + tripNo)

loadTrips()

}

async function loadTrips(){

const { data } = await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

let html=""

data.forEach(trip=>{

html+=`

<div class="trip">

<b>${trip.trip_no}</b><br>
Route: ${trip.route ?? "-"}<br>
Truck: ${trip.truck ?? "-"}<br>
Commodity: ${trip.commodity}<br>
Weight: ${trip.weight_kg} KG<br>
Status: ${trip.status ?? "-"}

</div>

`

})

document.getElementById("tripList").innerHTML=html

}

loadTrips()

</script></body></html>
