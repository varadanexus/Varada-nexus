<!DOCTYPE html><html><head><title>Varada Nexus Transport Management System</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

body{
font-family: Arial;
margin:40px;
background:#f5f5f5;
}

input,button{
padding:10px;
margin:5px;
font-size:14px;
}

button{
background:#1f3c88;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#162c66;
}

.tripCard{
background:white;
padding:12px;
margin-bottom:10px;
border-radius:6px;
box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

</style></head><body><h1>Varada Nexus Transport Management System</h1><h2>Add Trip</h2><input id="route" placeholder="Route ID">
<input id="truck" placeholder="Truck ID">
<input id="commodity" placeholder="Commodity">
<input id="weight" placeholder="Weight KG">
<input id="tripdate" type="date"><button onclick="addTrip()">Add Trip</button>

<h2>Trips</h2><div id="tripList"></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

async function addTrip(){

const route=document.getElementById("route").value
const truck=document.getElementById("truck").value
const commodity=document.getElementById("commodity").value
const weight=document.getElementById("weight").value
const tripdate=document.getElementById("tripdate").value

await supabaseClient
.from("trips")
.insert([
{
route_id: route,
truck_id: truck,
commodity: commodity,
weight_kg: weight,
trip_date: tripdate,
status: "created"
}
])

document.getElementById("route").value=""
document.getElementById("truck").value=""
document.getElementById("commodity").value=""
document.getElementById("weight").value=""
document.getElementById("tripdate").value=""

loadTrips()

}

async function loadTrips(){

const { data } = await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

let html=""

data.forEach(trip=>{

html+=`

<div class="tripCard">

<b>Route:</b> ${trip.route_id ?? "-"}<br>
<b>Truck:</b> ${trip.truck_id ?? "-"}<br>
<b>Commodity:</b> ${trip.commodity}<br>
<b>Weight:</b> ${trip.weight_kg} KG<br>
<b>Date:</b> ${trip.trip_date ?? "-"}<br>
<b>Status:</b> ${trip.status ?? "-"}

</div>

`

})

document.getElementById("tripList").innerHTML=html

}

loadTrips()

</script></body></html>
