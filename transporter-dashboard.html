<!DOCTYPE html>
<html>

<head>
<title>Transporter Dashboard</title>

<link rel="icon" type="image/png" sizes="32x32" href="/images/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/logo.png">
  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}
h2{color:#1f3c88;}

.cards{
display:flex;
gap:20px;
margin-bottom:25px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
min-width:200px;
}

.card h4{margin:0;color:#777;}
.card h2{margin:10px 0;color:#1f3c88;}

.insights{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div id="sidebar-container"></div>

<script>
fetch("transporter-sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>
<script>

async function loadUserInfo(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

/* SHOW SIDEBAR AFTER LOAD */
document.getElementById("sidebar").style.display = "block"

}

setTimeout(loadUserInfo, 300)

</script>
<div class="main">

<h2>Dashboard</h2>

<div class="cards">
<div class="card"><h4>Total Trips</h4><h2 id="totalTrips">0</h2></div>
<div class="card"><h4>Total Freight</h4><h2 id="totalFreight">₹0</h2></div>
<div class="card"><h4>Total Expenses</h4><h2 id="totalExpenses">₹0</h2></div>
<div class="card"><h4>Net Profit</h4><h2 id="totalProfit">₹0</h2></div>
<div class="card"><h4>Total Paid</h4><h2 id="totalPaid">₹0</h2></div>
<div class="card"><h4>Balance</h4><h2 id="balance">₹0</h2></div>
</div>

<div class="insights">
<h3>Insights</h3>
<p><b>Top Route:</b> <span id="topRoute">-</span></p>
<p><b>Top Truck:</b> <span id="topTruck">-</span></p>
<p><b>This Month Profit:</b> ₹ <span id="monthlyProfit">0</span></p>
</div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

init()

async function init(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session){
window.location.href="login.html"
return
}

const authId = session.user.id

/* GET TRANSPORTER */
const {data:transporter} = await supabaseClient
.from("transporters")
.select("id")
.eq("auth_id", authId)
.maybeSingle()

if(!transporter) return

/* GET TRIPS */
const {data:trips} = await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id", transporter.id)

/* GET EXPENSES */
const {data:expenses} = await supabaseClient
.from("expenses")
.select("*")
.in("trip_id", trips.map(t=>t.id))

/* GET PAYMENTS */
/* ✅ GET INVOICES */
const {data:invoices} = await supabaseClient
.from("transporter_invoices")
.select("id")
.eq("transporter_id", transporter.id)

/* EXTRACT IDS */
let invoiceIds = invoices?.map(i=>i.id) || []

/* ✅ GET PAYMENTS USING INVOICE IDS */
let payments = []

if(invoiceIds.length){
  const {data} = await supabaseClient
  .from("transporter_payments")
  .select("*")
  .in("invoice_id", invoiceIds)

  payments = data || []
}

let expenseMap = {}

expenses?.forEach(e=>{
if(!expenseMap[e.trip_id]) expenseMap[e.trip_id]=0
expenseMap[e.trip_id]+=Number(e.amount || 0)
})

/* CALCULATIONS */

let totalTrips = trips.length
let totalFreight = 0
let totalExpenses = 0

let totalPaid = 0

payments?.forEach(p=>{
    totalPaid += Number(p.amount || 0)
})

let routeCount={}
let truckCount={}

let monthlyProfit = 0
let currentMonth = new Date().getMonth()

trips.forEach(t=>{

let weight = (t.weight_kg || 0)/1000
let rate = t.transporter_rate || 0
let freight = weight * rate
let expense = expenseMap[t.id] || 0
let profit = Math.max(freight - expense, 0)

totalFreight += freight
totalExpenses += expense

/* route count */
if(t.route){
    routeCount[t.route] = (routeCount[t.route] || 0) + 1
}

if(t.truck){
    truckCount[t.truck] = (truckCount[t.truck] || 0) + 1
}

/* monthly */
if(t.trip_date){
let m = new Date(t.trip_date).getMonth()
if(m === currentMonth){
monthlyProfit += profit
}
}

})

/* TOP VALUES */

function getTop(obj){
return Object.keys(obj).reduce((a,b)=> obj[a]>obj[b]?a:b,"-")
}

document.getElementById("totalTrips").innerText = totalTrips
document.getElementById("totalFreight").innerText = "₹ "+totalFreight.toFixed(0)
document.getElementById("totalExpenses").innerText = "₹ "+totalExpenses.toFixed(0)
document.getElementById("totalProfit").innerText = "₹ "+(totalFreight-totalExpenses).toFixed(0)

let balance = (totalFreight - totalExpenses) - totalPaid

document.getElementById("totalPaid").innerText = "₹ " + totalPaid.toFixed(0)
document.getElementById("balance").innerText = "₹ " + balance.toFixed(0)

document.getElementById("topRoute").innerText = getTop(routeCount)
document.getElementById("topTruck").innerText = getTop(truckCount)
document.getElementById("monthlyProfit").innerText = monthlyProfit.toFixed(0)

}

</script>
<script>

/* LOAD USER INTO SIDEBAR */
async function loadUserInfo(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session){
window.location.href="login.html"
return
}

const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

document.getElementById("sidebar").style.display = "block"

}

/* LOGOUT FUNCTION (PAGE LEVEL) */
async function logout(){

let confirmLogout = confirm("Are you sure you want to logout?")
if(!confirmLogout) return

await supabaseClient.auth.signOut()

window.location.href = "login.html"

}

/* INIT */
document.addEventListener("DOMContentLoaded", loadUserInfo)

</script>
</body>
</html>
