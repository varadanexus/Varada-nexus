<!DOCTYPE html><html><head><title>Transporter Dashboard</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar h2{
color:white;
text-align:center;
margin-bottom:30px;
}

.main{
margin-left:220px;
padding:30px;
}

.main h2{
color:#1f3c88;
}

.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card-title{
font-size:14px;
color:#666;
}

.card-value{
font-size:26px;
font-weight:bold;
margin-top:8px;
}

.chart-container{
background:white;
margin-top:30px;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style></head><body><div id="sidebar-container"></div><script>
fetch("transporter-sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script><div class="main"><h2>Transporter Dashboard</h2><div class="cards"><div class="card">
<div class="card-title">Total Freight</div>
<div class="card-value" id="totalFreight">₹0</div>
</div><div class="card">
<div class="card-title">Total Expenses</div>
<div class="card-value" id="totalExpenses">₹0</div>
</div><div class="card">
<div class="card-title">Net Earnings</div>
<div class="card-value" id="netEarnings">₹0</div>
</div><div class="card">
<div class="card-title">Total Payments</div>
<div class="card-value" id="totalPayments">₹0</div>
</div><div class="card">
<div class="card-title">Net Profit</div>
<div class="card-value" id="netProfit">₹0</div>
</div></div><div class="chart-container"><h3>Monthly Profit Trend</h3><canvas id="profitChart"></canvas>

</div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

init()

async function init(){

const {data}=await supabaseClient.auth.getSession()

if(!data.session){
window.location.href="login.html"
return
}

let authId=data.session.user.id

/* FIND TRANSPORTER */

const {data:transporter}=await supabaseClient
.from("transporters")
.select("*")
.eq("auth_id",authId)
.single()

let transporterId=transporter.id
let transporterName=transporter.transporter_name

/* GET DATA */

const {data:trips}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporterId)

const {data:expenses}=await supabaseClient
.from("expenses")
.select("*")

const {data:payments}=await supabaseClient
.from("transporter_payments")
.select("*")
.eq("transporter_name",transporterName)

/* CALCULATIONS */

let totalFreight=0
let totalExpenses=0
let totalPayments=0

let monthlyProfit={}

/* FREIGHT */

trips.forEach(t=>{

let rate=t.transporter_rate || 0

let freight=(t.weight_kg/1000)*rate

totalFreight+=freight

let month=new Date(t.trip_date).toLocaleString('default',{month:'short'})

if(!monthlyProfit[month]) monthlyProfit[month]=0

monthlyProfit[month]+=freight

})

/* EXPENSES */

expenses.forEach(e=>{

totalExpenses+=Number(e.amount||0)

let month=new Date(e.created_at).toLocaleString('default',{month:'short'})

if(monthlyProfit[month]) monthlyProfit[month]-=Number(e.amount||0)

})

/* PAYMENTS */

payments.forEach(p=>{

totalPayments+=Number(p.amount||0)

let month=new Date(p.payment_date).toLocaleString('default',{month:'short'})

if(monthlyProfit[month]) monthlyProfit[month]-=Number(p.amount||0)

})

let netEarnings=totalFreight-totalExpenses
let netProfit=netEarnings-totalPayments

/* UPDATE CARDS */

document.getElementById("totalFreight").innerText="₹ "+totalFreight.toFixed(2)
document.getElementById("totalExpenses").innerText="₹ "+totalExpenses.toFixed(2)
document.getElementById("netEarnings").innerText="₹ "+netEarnings.toFixed(2)
document.getElementById("totalPayments").innerText="₹ "+totalPayments.toFixed(2)
document.getElementById("netProfit").innerText="₹ "+netProfit.toFixed(2)

/* GRAPH */

let labels=Object.keys(monthlyProfit)
let values=Object.values(monthlyProfit)

new Chart(document.getElementById("profitChart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Profit",
data:values
}]
},

options:{
responsive:true,
plugins:{
legend:{display:false}
}
}

})

}

async function logout(){

await supabaseClient.auth.signOut()

window.location.href="login.html"

}

</script></body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>

</html>
