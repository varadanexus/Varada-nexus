<!DOCTYPE html><html><head><title>Transporter Dashboard</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* allows sidebar later without breaking UI */

.main{
margin-left:220px;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:10px 18px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:10px;
}

.stat{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

</style></head><body><div class="main"><h2>Transporter Dashboard</h2><div class="cards"><div class="card">
Total Trips
<div class="stat" id="tripCount">0</div>
</div><div class="card">
Total Earnings
<div class="stat" id="earnings">0</div>
</div><div class="card">
Payments Received
<div class="stat" id="payments">0</div>
</div><div class="card">
Balance
<div class="stat" id="balance">0</div>
</div></div><button onclick="window.location.href='transporter-trips.html'">
My Trips
</button><button onclick="window.location.href='transporter-ledger.html'">
Ledger
</button><button onclick="logout()">
Logout
</button></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

init()

async function init(){

const {data}=await supabaseClient.auth.getSession()

if(!data.session){
window.location.href="login.html"
return
}

let authId=data.session.user.id

/* FIND TRANSPORTER */

const {data:transporter}=await supabaseClient
.from("transporters")
.select("*")
.eq("auth_id",authId)
.single()

let transporterId=transporter.id

/* GET TRIPS */

const {data:trips}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporterId)

let earnings=0

if(trips){

for (const t of trips){

let tripEarnings=(t.weight_kg/1000) * (t.transporter_rate || 0)

/* GET EXPENSES */

const {data:tripExpenses}=await supabaseClient
.from("expenses")
.select("*")
.eq("trip_id",t.id)

let expenseTotal=0

if(tripExpenses){
tripExpenses.forEach(e=>{
expenseTotal += Number(e.amount || 0)
})
}

earnings += (tripEarnings - expenseTotal)

}

}

/* GET PAYMENTS */

const {data:payments}=await supabaseClient
.from("transporter_payments")
.select("*")
.eq("transporter_name",transporter.transporter_name)

let paid=0

if(payments){
payments.forEach(p=>{
paid += Number(p.amount || 0)
})
}

document.getElementById("tripCount").innerText = trips ? trips.length : 0

document.getElementById("earnings").innerText =
earnings.toFixed(2)

document.getElementById("payments").innerText =
paid.toFixed(2)

document.getElementById("balance").innerText =
(earnings-paid).toFixed(2)

}

/* LOGOUT */

async function logout(){

await supabaseClient.auth.signOut()

window.location.href="login.html"

}

</script></body>
</html>
