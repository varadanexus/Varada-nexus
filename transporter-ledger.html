<!DOCTYPE html><html><head><title>Transporter Ledger</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* Sidebar layout */

.main{
margin-left:220px;
padding:40px;
}

/* Fix page title only */

.main h2{
color:#1f3c88;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

.credit{
color:green;
font-weight:bold;
}

.debit{
color:red;
font-weight:bold;
}

.balance{
font-weight:bold;
}

</style></head><body><!-- SIDEBAR --><div id="sidebar-container"></div><script>
fetch("transporter-sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script><div class="main"><h2>Transporter Ledger</h2><table><thead>
<tr>
<th>Date</th>
<th>Description</th>
<th>Credit (Earnings)</th>
<th>Debit (Payment)</th>
<th>Balance</th>
</tr>
</thead><tbody id="ledgerTable"></tbody></table></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

init()

async function init(){

const {data}=await supabaseClient.auth.getSession()

if(!data.session){
window.location.href="login.html"
return
}

let authId=data.session.user.id


/* FIND TRANSPORTER */

const {data:transporter,error:transporterError}=await supabaseClient
.from("transporters")
.select("*")
.eq("auth_id",authId)
.single()

if(transporterError){
console.log(transporterError)
return
}

let transporterId=transporter.id
let transporterName=transporter.transporter_name


/* GET TRIPS */

const {data:trips,error:tripError}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporterId)
.order("trip_date",{ascending:true})

if(tripError){
console.log(tripError)
}


/* GET PAYMENTS */

const {data:payments,error:paymentError}=await supabaseClient
.from("transporter_payments")
.select("*")
.eq("transporter_name",transporterName)
.order("payment_date",{ascending:true})

if(paymentError){
console.log(paymentError)
}


/* BUILD LEDGER */

let ledger=[]


/* ADD TRIPS (EARNINGS) */

trips.forEach(t=>{

let earnings=((t.weight_kg || 0)/1000) * (t.transporter_rate || 0)

ledger.push({
date:t.trip_date,
description:"Trip "+(t.trip_no || ""),
credit:earnings,
debit:0
})

})


/* ADD PAYMENTS */

payments.forEach(p=>{

ledger.push({
date:p.payment_date,
description:"Payment "+(p.transaction_id || ""),
credit:0,
debit:Number(p.amount || 0)
})

})


/* SORT BY DATE */

ledger.sort((a,b)=> new Date(a.date)-new Date(b.date))


/* CALCULATE BALANCE */

let balance=0
let html=""

ledger.forEach(l=>{

balance+=l.credit
balance-=l.debit

html+=`
<tr>
<td>${l.date || ""}</td>
<td>${l.description}</td>
<td class="credit">${l.credit ? "₹ "+l.credit.toFixed(2) : ""}</td>
<td class="debit">${l.debit ? "₹ "+l.debit.toFixed(2) : ""}</td>
<td class="balance">₹ ${balance.toFixed(2)}</td>
</tr>
`

})

document.getElementById("ledgerTable").innerHTML=html

}

</script></body>
</html>
