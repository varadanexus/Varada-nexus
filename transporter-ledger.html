<!DOCTYPE html><html><head><title>Transporter Ledger</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:40px;
}

.main h2{
color:#1f3c88;
}

.filters{
margin-bottom:20px;
}

.filters input{
padding:8px;
margin-right:10px;
}

button{
padding:8px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:6px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

.credit{
color:green;
font-weight:bold;
}

.debit{
color:red;
font-weight:bold;
}

.balance{
font-weight:bold;
}

.pagination{
margin-top:15px;
}

</style></head><body><!-- SIDEBAR --><div id="sidebar-container"></div><script>
fetch("transporter-sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script><div class="main"><h2>Transporter Ledger</h2><div class="filters"><input type="date" id="fromDate">
<input type="date" id="toDate"><button onclick="applyFilter()">Search</button>
<button onclick="clearFilter()">Clear</button>
<button onclick="downloadPDF()">Download PDF</button>

</div><table><thead>
<tr>
<th>Date</th>
<th>Description</th>
<th>Credit (Earnings)</th>
<th>Debit (Payment / Expense)</th>
<th>Balance</th>
</tr>
</thead><tbody id="ledgerTable"></tbody></table><div class="pagination">
<button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>
</div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

let fullLedger=[]
let filteredLedger=[]

let page=1
let pageSize=10


init()


async function init(){

const {data}=await supabaseClient.auth.getSession()

if(!data.session){
window.location.href="login.html"
return
}

let authId=data.session.user.id


/* FIND TRANSPORTER */

const {data:transporter}=await supabaseClient
.from("transporters")
.select("*")
.eq("auth_id",authId)
.single()

let transporterId=transporter.id
let transporterName=transporter.transporter_name


/* GET TRIPS */

const {data:trips}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporterId)


/* GET PAYMENTS */

const {data:payments}=await supabaseClient
.from("transporter_payments")
.select("*")
.eq("transporter_name",transporterName)


/* GET EXPENSES */

const {data:expenses}=await supabaseClient
.from("expenses")
.select("*")


/* EXPENSE MAP */

let expenseMap={}

if(expenses){

expenses.forEach(e=>{

if(!expenseMap[e.trip_id]) expenseMap[e.trip_id]=0

expenseMap[e.trip_id]+=Number(e.amount||0)

})

}


/* BUILD LEDGER */

let ledger=[]


trips.forEach(t=>{

let freight=((t.weight_kg||0)/1000)*(t.transporter_rate||0)

let exp=expenseMap[t.id]||0

let net=freight-exp

ledger.push({
date:t.trip_date,
description:"Trip "+(t.trip_no||""),
credit:net,
debit:0
})

if(exp>0){

ledger.push({
date:t.trip_date,
description:"Trip Expense",
credit:0,
debit:exp
})

}

})


payments.forEach(p=>{

ledger.push({
date:p.payment_date,
description:"Payment "+(p.transaction_id||""),
credit:0,
debit:Number(p.amount||0)
})

})


ledger.sort((a,b)=> new Date(a.date)-new Date(b.date))


fullLedger=ledger
filteredLedger=ledger

renderLedger()

}



/* RENDER */

function renderLedger(){

let start=(page-1)*pageSize
let end=start+pageSize

let rows=filteredLedger.slice(start,end)

let balance=0
let html=""

filteredLedger.forEach(l=>{

balance+=l.credit
balance-=l.debit

})

balance=0


rows.forEach(l=>{

balance+=l.credit
balance-=l.debit

html+=`
<tr>
<td>${l.date||""}</td>
<td>${l.description}</td>
<td class="credit">${l.credit? "₹ "+l.credit.toFixed(2):""}</td>
<td class="debit">${l.debit? "₹ "+l.debit.toFixed(2):""}</td>
<td class="balance">₹ ${balance.toFixed(2)}</td>
</tr>
`

})

document.getElementById("ledgerTable").innerHTML=html

}



/* FILTER */

function applyFilter(){

let from=document.getElementById("fromDate").value
let to=document.getElementById("toDate").value

filteredLedger=fullLedger.filter(l=>{

let d=new Date(l.date)

return (!from || d>=new Date(from)) &&
(!to || d<=new Date(to))

})

page=1
renderLedger()

}


function clearFilter(){

filteredLedger=fullLedger

document.getElementById("fromDate").value=""
document.getElementById("toDate").value=""

renderLedger()

}



/* PAGINATION */

function nextPage(){

if(page*pageSize<filteredLedger.length){

page++
renderLedger()

}

}

function prevPage(){

if(page>1){

page--
renderLedger()

}

}



/* PDF */

function downloadPDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let rows=[]

filteredLedger.forEach(l=>{

rows.push([
l.date,
l.description,
l.credit?l.credit.toFixed(2):"",
l.debit?l.debit.toFixed(2):""
])

})

doc.text("Transporter Ledger",14,15)

doc.autoTable({
head:[["Date","Description","Credit","Debit"]],
body:rows,
startY:20
})

doc.save("transporter-ledger.pdf")

}



/* LOGOUT */

async function logout(){

await supabaseClient.auth.signOut()

window.location.href="login.html"

}

</script></body>
</html>
