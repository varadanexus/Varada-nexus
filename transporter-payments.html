<div class="main">

<h2>Transporter Payments</h2>


<div class="card">

<h3>Record Payment</h3>

<select id="tripSelect"></select>

<input id="amount" placeholder="Amount">

<input type="date" id="paymentDate">

<select id="method">
<option value="Cash">Cash</option>
<option value="Bank Transfer">Bank Transfer</option>
<option value="UPI">UPI</option>
</select>

<input id="remarks" placeholder="Remarks">

<button onclick="savePayment()">Save Payment</button>

</div>


<div class="card">

<h3>Payment History</h3>

<table>

<thead>

<tr>
<th>Date</th>
<th>Trip</th>
<th>Transporter</th>
<th>Amount</th>
<th>Method</th>
<th>Remarks</th>
<th>Action</th>
</tr>

</thead>

<tbody id="paymentTable"></tbody>

</table>

</div>

</div>


<script>

let trips=[]
let payments=[]

init()

async function init(){

await loadTrips()
await loadPayments()

}


/* LOAD TRIPS */

async function loadTrips(){

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("status","Completed")

trips=data || []

/* GET TRANSPORTER PAYMENTS */

const {data:paid}=await supabaseClient
.from("transporter_payments")
.select("*")

let paidTrips={}

paid?.forEach(p=>{
if(!paidTrips[p.trip_id]) paidTrips[p.trip_id]=0
paidTrips[p.trip_id]+=Number(p.amount)
})

let html='<option value="">Select Trip</option>'

trips.forEach(t=>{

let payable=(t.transporter_rate || 0) * (t.weight_kg/1000)

let paidAmount=paidTrips[t.id] || 0
let balance=payable-paidAmount

if(balance>0){

html+=`
<option value="${t.id}">
${t.trip_no} | ${t.transporter_name} | Balance ₹${balance}
</option>
`

}

})

document.getElementById("tripSelect").innerHTML=html

}


/* SAVE PAYMENT */

async function savePayment(){

let tripId=document.getElementById("tripSelect").value
let amount=Number(document.getElementById("amount").value)
let date=document.getElementById("paymentDate").value
let method=document.getElementById("method").value
let remarks=document.getElementById("remarks").value

if(!tripId || !amount){
alert("Enter trip and amount")
return
}

let trip=trips.find(t=>t.id==tripId)

await supabaseClient
.from("transporter_payments")
.insert({

trip_id:tripId,
trip_no:trip.trip_no,
transporter_name:trip.transporter_name,
amount:amount,
payment_date:date,
payment_method:method,
remarks:remarks

})

document.getElementById("amount").value=""
document.getElementById("remarks").value=""

await loadTrips()
await loadPayments()

}


/* LOAD PAYMENTS */

async function loadPayments(){

const {data}=await supabaseClient
.from("transporter_payments")
.select("*")
.order("created_at",{ascending:false})

payments=data || []

let html=""

payments.forEach(p=>{

html+=`
<tr>

<td>${p.payment_date || ""}</td>

<td>${p.trip_no}</td>

<td>${p.transporter_name}</td>

<td>₹${p.amount}</td>

<td>${p.payment_method}</td>

<td>${p.remarks || ""}</td>

<td>
<button class="deleteBtn" onclick="deletePayment('${p.id}')">Delete</button>
</td>

</tr>
`

})

document.getElementById("paymentTable").innerHTML=html

}


/* DELETE PAYMENT */

async function deletePayment(id){

if(!confirm("Delete this payment?")) return

await supabaseClient
.from("transporter_payments")
.delete()
.eq("id",id)

await loadTrips()
await loadPayments()

}

</script>

</body>
