}

</style></head><body><div id="sidebar-container"></div><script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

</script><div class="main"><h2>Transporter Payments</h2><div class="card"><h3>Record Payment</h3><select id="transporterSelect"></select>

<button onclick="loadTrips()">Load Trips</button>

<div class="trip-list"><div>
<input type="checkbox" id="selectAll" onclick="toggleAllTrips()"> Select All
</div><div id="tripList"></div></div><input id="amount" placeholder="Total Amount" readonly><input type="date" id="paymentDate"><select id="method"><option value="Cash">Cash</option>
<option value="Bank Transfer">Bank Transfer</option>
<option value="UPI">UPI</option></select><input id="remarks" placeholder="Remarks"><button onclick="savePayment()">Save Payment</button>

</div><div class="card"><h3>Search Payments</h3><select id="searchTransporter"></select>

From
<input type="date" id="fromDate">

To
<input type="date" id="toDate">

<button onclick="searchPayments()">Search</button>
<button onclick="clearSearch()">Clear</button>
<button onclick="downloadPDF()">Download PDF</button>

</div><div class="card"><h3>Payment History</h3><table><thead>
<tr>
<th>Date</th>
<th>Transporter</th>
<th>Trips</th>
<th>Amount</th>
<th>Method</th>
<th>Remarks</th>
<th>Action</th>
</tr>
</thead><tbody id="paymentTable"></tbody></table><br><button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>

</div></div><script>

let transporters=[]
let trips=[]
let payments=[]
let allPayments=[]

let page=1
let pageSize=10


init()


async function init(){

await loadTransporters()
await loadPayments()

}


/* LOAD TRANSPORTERS */

async function loadTransporters(){

const {data}=await supabaseClient
.from("transporters")
.select("id,transporter_name")

transporters=data||[]

let html='<option value="">Select Transporter</option>'
let search='<option value="">All Transporters</option>'

transporters.forEach(t=>{

html+=`<option value="${t.id}">${t.transporter_name}</option>`
search+=`<option value="${t.transporter_name}">${t.transporter_name}</option>`

})

document.getElementById("transporterSelect").innerHTML=html
document.getElementById("searchTransporter").innerHTML=search

}


/* LOAD TRIPS */

async function loadTrips(){

let transporterId=document.getElementById("transporterSelect").value

if(!transporterId){
alert("Select transporter first")
return
}

const {data:tripData,error}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporterId)
.order("trip_no",{ascending:false})

if(error){
console.log(error)
alert("Error loading trips")
return
}

const {data:paymentData}=await supabaseClient
.from("transporter_payments")
.select("trip_no")

let paidTrips=[]

if(paymentData){

paymentData.forEach(p=>{

if(p.trip_no){

p.trip_no.split(",").forEach(t=>{
paidTrips.push(t.trim())
})

}

})

}

trips=(tripData||[]).filter(t=>!paidTrips.includes(t.trip_no))

let html=""

trips.forEach(t=>{

let payable=(t.transporter_rate||0)*(t.weight_kg/1000)

html+=`
<div>
<input type="checkbox" value="${t.id}" onchange="calculateTotal()">
${t.trip_no} | ${t.route||""} | ${t.truck||""} | ₹${payable}
</div>
`

})

if(trips.length===0){
html="<i>No unpaid trips available</i>"
}

document.getElementById("tripList").innerHTML=html

}


/* CALCULATE TOTAL */

function calculateTotal(){

let checked=document.querySelectorAll("#tripList input:checked")

let total=0

checked.forEach(c=>{

let trip=trips.find(t=>t.id==c.value)

let payable=(trip.transporter_rate||0)*(trip.weight_kg/1000)

total+=payable

})

document.getElementById("amount").value=total

}


/* SELECT ALL */

function toggleAllTrips(){

let checked=document.getElementById("selectAll").checked

document.querySelectorAll("#tripList input").forEach(c=>{
c.checked=checked
})

calculateTotal()

}


/* SAVE PAYMENT */

async function savePayment(){

let transporterId=document.getElementById("transporterSelect").value
let transporter=transporters.find(t=>t.id==transporterId)

let amount=document.getElementById("amount").value
let date=document.getElementById("paymentDate").value
let method=document.getElementById("method").value
let remarks=document.getElementById("remarks").value

let checked=document.querySelectorAll("#tripList input:checked")

if(checked.length===0){
alert("Select trips")
return
}

if(!date){
alert("Select payment date")
return
}

let tripNos=[]

checked.forEach(c=>{
let trip=trips.find(t=>t.id==c.value)
tripNos.push(trip.trip_no)
})

const {error}=await supabaseClient
.from("transporter_payments")
.insert({

transporter_name:transporter.transporter_name,
trip_no:tripNos.join(", "),
amount:Number(amount),
payment_date:date,
payment_method:method,
remarks:remarks

})

if(error){
console.log(error)
alert("Error saving payment")
return
}

alert("Payment saved")

loadTrips()
loadPayments()

}


/* LOAD PAYMENTS */

async function loadPayments(){

const {data}=await supabaseClient
.from("transporter_payments")
.select("*")
.order("created_at",{ascending:false})

payments=data||[]
allPayments=data||[]

renderPayments()

}


/* RENDER PAYMENTS */

function renderPayments(){

let start=(page-1)*pageSize
let end=start+pageSize

let pageData=payments.slice(start,end)

let html=""

pageData.forEach(p=>{

html+=`

<tr>

<td>${p.payment_date}</td>
<td>${p.transporter_name}</td>
<td>${p.trip_no}</td>
<td>₹${p.amount}</td>
<td>${p.payment_method}</td>
<td>${p.remarks||""}</td>

<td>
<button class="deleteBtn" onclick="deletePayment('${p.id}')">Delete</button>
</td>

</tr>

`

})

document.getElementById("paymentTable").innerHTML=html

}


/* SEARCH */

function searchPayments(){

let transporter=document.getElementById("searchTransporter").value
let from=document.getElementById("fromDate").value
let to=document.getElementById("toDate").value

payments=allPayments.filter(p=>{

let matchTransporter=!transporter || p.transporter_name===transporter

let matchDate=true

if(from) matchDate=p.payment_date>=from
if(to) matchDate=matchDate && p.payment_date<=to

return matchTransporter && matchDate

})

page=1
renderPayments()

}


/* CLEAR */

function clearSearch(){

payments=allPayments
renderPayments()

}


/* PAGINATION */

function nextPage(){
page++
renderPayments()
}

function prevPage(){
if(page>1) page--
renderPayments()
}


/* DELETE */

async function deletePayment(id){

await supabaseClient
.from("transporter_payments")
.delete()
.eq("id",id)

loadPayments()

}


/* PDF */

function downloadPDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let rows=[]

payments.forEach(p=>{

rows.push([
p.payment_date,
p.transporter_name,
p.trip_no,
p.amount,
p.payment_method,
p.remarks
])

})

doc.autoTable({
head:[["Date","Transporter","Trips","Amount","Method","Remarks"]],
body:rows
})

doc.save("transporter_payments.pdf")

}

</script></body>
</html>
