<!DOCTYPE html><html>
<head><title>Transporter Payments - Varada Nexus ERP</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

select,input{
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

.trip-list{
max-height:220px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
text-align:left;
}

.deleteBtn{
background:#d9534f;
}

</style></head><body><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

</script><div class="main"><h2>Transporter Payments</h2><div class="card"><h3>Record Payment</h3><select id="transporterSelect"></select>

<button onclick="loadTrips()">Load Trips</button>

<div class="trip-list"><div>
<input type="checkbox" id="selectAll" onclick="toggleAllTrips()"> <b>Select All</b>
</div><div id="tripList"></div></div><input id="amount" placeholder="Total Amount" readonly><input type="date" id="paymentDate"><select id="method">
<option value="Cash">Cash</option>
<option value="Bank Transfer">Bank Transfer</option>
<option value="UPI">UPI</option>
</select><input id="remarks" placeholder="Remarks"><button onclick="savePayment()">Save Payment</button>

</div><div class="card"><h3>Payment History</h3><table><thead>
<tr>
<th>Date</th>
<th>Transporter</th>
<th>Trips</th>
<th>Amount</th>
<th>Method</th>
<th>Remarks</th>
<th>Action</th>
</tr>
</thead><tbody id="paymentTable"></tbody></table></div></div><script>

let transporters=[]
let trips=[]
let payments=[]

init()

async function init(){

await loadTransporters()
await loadPayments()

}

/* LOAD TRANSPORTERS */

async function loadTransporters(){

const {data,error}=await supabaseClient
.from("transporters")
.select("id,transporter_name")

console.log("Transporters:",data)

transporters=data||[]

let html='<option value="">Select Transporter</option>'

transporters.forEach(t=>{
html+=`<option value="${t.id}">${t.transporter_name}</option>`
})

document.getElementById("transporterSelect").innerHTML=html

}


/* LOAD TRIPS */

async function loadTrips(){

let transporterId=document.getElementById("transporterSelect").value

console.log("Selected transporter:",transporterId)

if(!transporterId){
alert("Select transporter first")
return
}

const {data,error}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporterId)

console.log("Trips returned:",data)

if(error){
alert("Trip load error")
console.log(error)
return
}

trips=data||[]

let html=""

trips.forEach(t=>{

let payable=(t.transporter_rate||0)*(t.weight_kg/1000)

html+=`
<div>
<input type="checkbox" value="${t.id}" onchange="calculateTotal()">
${t.trip_no} | ${t.route||""} | ${t.truck||""} | ₹${payable}
</div>
`

})

if(trips.length===0){
html="<i>No trips found for this transporter</i>"
}

document.getElementById("tripList").innerHTML=html

}


/* TOTAL */

function calculateTotal(){

let checked=document.querySelectorAll("#tripList input:checked")

let total=0

checked.forEach(c=>{

let trip=trips.find(t=>t.id==c.value)

let payable=(trip.transporter_rate||0)*(trip.weight_kg/1000)

total+=payable

})

document.getElementById("amount").value=total

}


/* SELECT ALL */

function toggleAllTrips(){

let checked=document.getElementById("selectAll").checked

document.querySelectorAll("#tripList input").forEach(c=>{
c.checked=checked
})

calculateTotal()

}


/* SAVE PAYMENT */

async function savePayment(){

let transporterId=document.getElementById("transporterSelect").value
let transporter=transporters.find(t=>t.id==transporterId)

let amount=document.getElementById("amount").value
let date=document.getElementById("paymentDate").value
let method=document.getElementById("method").value
let remarks=document.getElementById("remarks").value

let checked=document.querySelectorAll("#tripList input:checked")

if(checked.length==0){
alert("Select trips")
return
}

let tripNos=[]

checked.forEach(c=>{
let trip=trips.find(t=>t.id==c.value)
tripNos.push(trip.trip_no)
})

await supabaseClient
.from("transporter_payments")
.insert({

transporter_name:transporter.transporter_name,
trip_no:tripNos.join(", "),
amount:Number(amount),
payment_date:date,
payment_method:method,
remarks:remarks

})

alert("Payment saved")

loadPayments()

}


/* LOAD PAYMENTS */

async function loadPayments(){

const {data}=await supabaseClient
.from("transporter_payments")
.select("*")
.order("created_at",{ascending:false})

payments=data||[]

let html=""

payments.forEach(p=>{

html+=`
<tr>
<td>${p.payment_date}</td>
<td>${p.transporter_name}</td>
<td>${p.trip_no}</td>
<td>₹${p.amount}</td>
<td>${p.payment_method}</td>
<td>${p.remarks||""}</td>
<td><button class="deleteBtn" onclick="deletePayment('${p.id}')">Delete</button></td>
</tr>
`

})

document.getElementById("paymentTable").innerHTML=html

}


/* DELETE */

async function deletePayment(id){

if(!confirm("Delete payment?")) return

await supabaseClient
.from("transporter_payments")
.delete()
.eq("id",id)

loadPayments()

}

</script></body>
</html>
