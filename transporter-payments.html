<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("transporter-sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>

<div class="main">

<h2>My Payments</h2>

<div class="card">
<table>
<thead>
<tr>
<th>Date</th>
<th>Trip</th>
<th>Amount</th>
<th>Method</th>
<th>Remarks</th>
</tr>
</thead>

<tbody id="paymentTable"></tbody>

</table>
</div>

</div>

<script>

let payments=[]

init()

async function init(){

/* 🔐 SESSION */
const {data:{session}} = await supabaseClient.auth.getSession()

if(!session){
window.location.href="login.html"
return
}

const authId = session.user.id

console.log("AUTH:", authId)

/* 🔗 GET TRANSPORTER */
const {data:transporter,error:terr} = await supabaseClient
.from("transporters")
.select("id, transporter_name")
.eq("auth_id",authId)
.single()

if(!transporter){
alert("Transporter not linked ❌")
return
}

console.log("TRANSPORTER:", transporter)

/* 💰 GET PAYMENTS (ONLY THIS TRANSPORTER) */
const {data,error} = await supabaseClient
.from("transporter_payments")
.select(`*, trips(trip_no)`)
.eq("transporter_id", transporter.id)
.order("created_at",{ascending:false})

if(error){
console.error(error)
alert("Error loading payments")
return
}

payments=data||[]

if(payments.length===0){
document.getElementById("paymentTable").innerHTML =
"<tr><td colspan='5'>No payments found</td></tr>"
return
}

renderPayments()

}

/* 📊 RENDER */

function renderPayments(){

let html=""

payments.forEach(p=>{

html+=`
<tr>
<td>${p.payment_date || ""}</td>
<td>${p.trips?.trip_no || ""}</td>
<td class="credit">₹ ${Number(p.amount).toFixed(0)}</td>
<td>${p.payment_method || ""}</td>
<td>${p.remarks || ""}</td>
</tr>
`

})

document.getElementById("paymentTable").innerHTML = html

}

</script>

</body>
</html>
