</script><div class="main"><h2>Transporter Payments</h2><div class="card"><h3>Add Payment</h3><select id="transporter"></select>

<input type="number" id="amount" placeholder="Amount"><input id="transactionId" placeholder="Transaction ID"><input type="date" id="paymentDate"><input id="remarks" placeholder="Remarks"><button onclick="addPayment()">Save Payment</button>

</div><div class="card"><h3>Payment History</h3><table><thead><tr>
<th>Date</th>
<th>Transporter</th>
<th>Amount</th>
<th>Transaction ID</th>
<th>Remarks</th>
<th>Action</th>
</tr></thead><tbody id="paymentTable"></tbody></table><br><button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>

</div></div><script>

let transporters=[]
let payments=[]
let page=1
let pageSize=10


init()


async function init(){

await loadTransporters()
await loadPayments()

}


/* LOAD TRANSPORTERS */

async function loadTransporters(){

const {data,error}=await supabaseClient
.from("transporters")
.select("*")

if(error){
alert(error.message)
return
}

transporters=data

let html='<option value="">Select Transporter</option>'

data.forEach(t=>{
html+=`<option value="${t.transporter_name}">
${t.transporter_name}
</option>`
})

document.getElementById("transporter").innerHTML=html

}


/* ADD PAYMENT */

async function addPayment(){

let transporter=document.getElementById("transporter").value
let amount=document.getElementById("amount").value
let transactionId=document.getElementById("transactionId").value
let date=document.getElementById("paymentDate").value
let remarks=document.getElementById("remarks").value

if(!transporter || !amount){
alert("Enter transporter and amount")
return
}

const {error}=await supabaseClient
.from("transporter_payments")
.insert([{

transporter_name:transporter,
amount:Number(amount),
payment_date:date,
transaction_id:transactionId,
remarks:remarks

}])

if(error){
alert(error.message)
return
}

document.getElementById("amount").value=""
document.getElementById("transactionId").value=""
document.getElementById("paymentDate").value=""
document.getElementById("remarks").value=""

loadPayments()

}


/* LOAD PAYMENTS */

async function loadPayments(){

const {data,error}=await supabaseClient
.from("transporter_payments")
.select("*")
.order("payment_date",{ascending:false})

if(error){
alert(error.message)
return
}

payments=data

renderPayments()

}


/* RENDER TABLE */

function renderPayments(){

let start=(page-1)*pageSize
let end=start+pageSize

let pageData=payments.slice(start,end)

let html=""

pageData.forEach(p=>{

html+=`
<tr>
<td>${p.payment_date || ""}</td>
<td>${p.transporter_name}</td>
<td>${p.amount}</td>
<td>${p.transaction_id || ""}</td>
<td>${p.remarks || ""}</td>
<td>
<button class="editBtn" onclick="editPayment('${p.id}')">Edit</button>
<button class="deleteBtn" onclick="deletePayment('${p.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("paymentTable").innerHTML=html

}


/* PAGINATION */

function nextPage(){

if(page*pageSize<payments.length){
page++
renderPayments()
}

}

function prevPage(){

if(page>1){
page--
renderPayments()
}

}


/* DELETE */

async function deletePayment(id){

if(!confirm("Delete payment?")) return

await supabaseClient
.from("transporter_payments")
.delete()
.eq("id",id)

loadPayments()

}


/* EDIT */

async function editPayment(id){

const {data}=await supabaseClient
.from("transporter_payments")
.select("*")
.eq("id",id)
.single()

let amount=prompt("Edit Amount",data.amount)
let txn=prompt("Edit Transaction ID",data.transaction_id)

await supabaseClient
.from("transporter_payments")
.update({
amount:Number(amount),
transaction_id:txn
})
.eq("id",id)

loadPayments()

}

</script></body>
