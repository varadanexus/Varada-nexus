<!DOCTYPE html>
<html>

<head>
<title>My Payments - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

h2{
color:#1f3c88;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

.paid{
color:green;
font-weight:bold;
}

.pending{
color:red;
font-weight:bold;
}

button{
padding:8px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-top:10px;
}

.pagination{
margin-top:15px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("transporter-sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>
<script>

async function loadUserInfo(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session) return

const email = session.user.email

document.getElementById("userName").innerText = email.split("@")[0]

/* SHOW SIDEBAR AFTER LOAD */
document.getElementById("sidebar").style.display = "block"

}

setTimeout(loadUserInfo, 300)

</script>
<div class="main">

<h2>My Payments</h2>

<button onclick="downloadPDF()">Download PDF</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Trip No</th>
<th>Freight</th>
<th>Paid</th>
<th>Balance</th>
<th>Status</th>
</tr>
</thead>
<tbody id="paymentTable"></tbody>
</table>

<div class="pagination">
<button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>
</div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

let fullData=[]
let page=1
let pageSize=10

init()

async function init(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session){
window.location.href="login.html"
return
}

const authId = session.user.id

/* GET TRANSPORTER */
const {data:transporter} = await supabaseClient
.from("transporters")
.select("id")
.eq("auth_id",authId)
.single()

if(!transporter){
alert("Transporter not linked")
return
}

/* GET TRIPS */
const {data:trips} = await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id", transporter.id)

if(!trips || trips.length===0){
document.getElementById("paymentTable").innerHTML =
"<tr><td colspan='6'>No trips found</td></tr>"
return
}

/* GET PAYMENTS */
let tripIds = trips.map(t=>t.id)

const {data:payments} = await supabaseClient
.from("transporter_payments")
.select("*")
.in("trip_id", tripIds)

/* BUILD MAP */
let paymentMap={}

payments.forEach(p=>{
if(!paymentMap[p.trip_id]) paymentMap[p.trip_id]=0
paymentMap[p.trip_id]+=Number(p.amount||0)
})

/* BUILD FINAL DATA */
fullData = trips.map(t=>{

let weightMT = (t.weight_kg||0)/1000
let freight = weightMT * (t.transporter_rate||0)

let paid = paymentMap[t.id] || 0
let balance = freight - paid

return {
date: t.trip_date,
trip_no: t.trip_no,
freight,
paid,
balance,
status: paid >= freight ? "Paid" : "Pending"
}

})

renderTable()

}

/* RENDER */

function renderTable(){

let start=(page-1)*pageSize
let end=start+pageSize

let rows=fullData.slice(start,end)

let html=""

rows.forEach(r=>{

html+=`
<tr>
<td>${r.date||""}</td>
<td>${r.trip_no||""}</td>
<td>₹ ${r.freight.toFixed(0)}</td>
<td>₹ ${r.paid.toFixed(0)}</td>
<td>₹ ${r.balance.toFixed(0)}</td>
<td class="${r.status==='Paid'?'paid':'pending'}">${r.status}</td>
</tr>
`

})

document.getElementById("paymentTable").innerHTML=html

}

/* PAGINATION */

function nextPage(){
if(page*pageSize<fullData.length){
page++
renderTable()
}
}

function prevPage(){
if(page>1){
page--
renderTable()
}
}

/* PDF */

function downloadPDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let rows=[]

fullData.forEach(r=>{
rows.push([
r.date,
r.trip_no,
r.freight.toFixed(0),
r.paid.toFixed(0),
r.balance.toFixed(0),
r.status
])
})

doc.text("My Payments Report",14,15)

doc.autoTable({
head:[["Date","Trip","Freight","Paid","Balance","Status"]],
body:rows,
startY:20
})

doc.save("my-payments.pdf")

}

</script>

</body>
</html>
