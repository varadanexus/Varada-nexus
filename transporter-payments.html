</script><div class="main"><h2>Transporter Payments</h2><div class="card"><h3>Add Payment</h3><select id="transporter"></select>

<input type="number" id="amount" placeholder="Amount"><input type="date" id="paymentDate"><input id="remarks" placeholder="Remarks"><button onclick="addPayment()">Save Payment</button>

</div><div class="card"><h3>Payment History</h3><table><thead><tr>
<th>Date</th>
<th>Transporter</th>
<th>Amount</th>
<th>Remarks</th>
</tr></thead><tbody id="paymentTable"></tbody></table></div></div><script>

let transporters=[]
let payments=[]

init()

async function init(){

await loadTransporters()
await loadPayments()

}

/* LOAD TRANSPORTERS */

async function loadTransporters(){

const {data}=await supabaseClient
.from("transporters")
.select("*")

transporters=data

let html='<option value="">Select Transporter</option>'

data.forEach(t=>{
html+=`<option value="${t.transporter_name}">
${t.transporter_name}
</option>`
})

document.getElementById("transporter").innerHTML=html

}

/* ADD PAYMENT */

async function addPayment(){

let transporter=document.getElementById("transporter").value
let amount=document.getElementById("amount").value
let date=document.getElementById("paymentDate").value
let remarks=document.getElementById("remarks").value

if(!transporter || !amount){
alert("Enter transporter and amount")
return
}

await supabaseClient
.from("transporter_payments")
.insert({

transporter_name:transporter,
amount:Number(amount),
payment_date:date,
remarks:remarks

})

document.getElementById("amount").value=""
document.getElementById("paymentDate").value=""
document.getElementById("remarks").value=""

loadPayments()

}

/* LOAD PAYMENTS */

async function loadPayments(){

const {data}=await supabaseClient
.from("transporter_payments")
.select("*")
.order("payment_date",{ascending:false})

payments=data

let html=""

data.forEach(p=>{

html+=`
<tr>
<td>${p.payment_date || ""}</td>
<td>${p.transporter_name}</td>
<td>${p.amount}</td>
<td>${p.remarks || ""}</td>
</tr>
`

})

document.getElementById("paymentTable").innerHTML=html

}

</script></body></html>
