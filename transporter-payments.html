<!DOCTYPE html>
<html>

<head>
<title>My Payments - Varada Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}

h2{color:#1f3c88;}

.invoice-card{
background:white;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
overflow:hidden;
}

.invoice-header{
padding:15px;
background:#1f3c88;
color:white;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.invoice-body{
display:none;
padding:15px;
}

.trip-row{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

.payment-row{
font-size:13px;
color:#555;
margin-left:15px;
}

.green{color:green;font-weight:bold;}
.red{color:red;font-weight:bold;}
.orange{color:orange;font-weight:bold;}

.balance-box{
background:#fff;
padding:10px;
margin-bottom:15px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div id="sidebar-container"></div>

<script>
fetch("transporter-sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>

<div class="main">

<h2>My Payments (Invoice View)</h2>

<div class="balance-box">
<b>Total Freight:</b> ₹ <span id="totalFreight">0</span> |
<b>Total Paid:</b> ₹ <span id="totalPaid">0</span> |
<b>Balance:</b> ₹ <span id="totalBalance">0</span>
</div>

<div id="invoiceContainer"></div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

init()

async function init(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session){
window.location.href="login.html"
return
}

const authId=session.user.id

/* TRANSPORTER */
const {data:transporter}=await supabaseClient
.from("transporters")
.select("id")
.eq("auth_id",authId)
.single()

/* TRIPS */
const {data:trips}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporter.id)

/* EXPENSES */
const {data:expenses}=await supabaseClient
.from("expenses")
.select("*")

let expenseMap={}
expenses.forEach(e=>{
expenseMap[e.trip_id]=(expenseMap[e.trip_id]||0)+Number(e.amount||0)
})

/* INVOICES */
const {data:invoices}=await supabaseClient
.from("transporter_invoices")
.select("*")
.eq("transporter_id",transporter.id)
.order("created_at",{ascending:false})

/* PAYMENTS */
let invoiceIds=invoices.map(i=>i.id)

const {data:payments}=await supabaseClient
.from("transporter_payments")
.select("*")
.in("invoice_id",invoiceIds)

/* GROUP PAYMENTS */
let paymentMap={}
payments.forEach(p=>{
if(!paymentMap[p.invoice_id]) paymentMap[p.invoice_id]=[]
paymentMap[p.invoice_id].push(p)
})

/* BUILD UI */
let html=""
let runningBalance=0

let totalFreight=0,totalPaid=0

for(let inv of invoices){

let tripIds=(inv.trip_ids||"").split(",")

/* GET TRIPS */
let invTrips=trips.filter(t=>tripIds.includes(String(t.id)))

let invoiceTotal=Number(inv.total_amount||0)
let invoicePaid=Number(inv.paid_amount||0)

totalFreight+=invoiceTotal
totalPaid+=invoicePaid

runningBalance += invoiceTotal
runningBalance -= invoicePaid

html+=`
<div class="invoice-card">

<div class="invoice-header" onclick="toggle('${inv.id}')">
<div>
<b>${inv.invoice_no}</b><br>
Amount: ₹${invoiceTotal.toFixed(0)} |
Paid: ₹${invoicePaid.toFixed(0)} |
Balance: ₹${inv.balance_amount.toFixed(0)}
</div>

<div>
Running Balance: ₹${runningBalance.toFixed(0)}
</div>
</div>

<div class="invoice-body" id="body-${inv.id}">
`

/* TRIPS */
invTrips.forEach(t=>{

let freight=(t.weight_kg/1000)*(t.transporter_rate||0)
let expense=expenseMap[t.id]||0
let net=freight-expense

let ratio = invoiceTotal>0 ? net/invoiceTotal : 0
let paidShare = invoicePaid * ratio

html+=`
<div class="trip-row">
<div>
${t.trip_no} <br>
<span style="font-size:12px;color:#777;">
Freight ₹${freight.toFixed(0)} | Expense ₹${expense.toFixed(0)}
</span>
</div>

<div>
Paid via ${inv.invoice_no}<br>
₹ ${paidShare.toFixed(0)}
</div>
</div>
`

})

/* PAYMENTS */
html+=`<div style="margin-top:10px;"><b>Payments:</b></div>`

;(paymentMap[inv.id]||[]).forEach(p=>{
html+=`
<div class="payment-row">
${p.payment_date} → ₹${p.amount} (${p.payment_method})
</div>
`
})

html+=`</div></div>`
}

document.getElementById("invoiceContainer").innerHTML=html

document.getElementById("totalFreight").innerText=totalFreight.toFixed(0)
document.getElementById("totalPaid").innerText=totalPaid.toFixed(0)
document.getElementById("totalBalance").innerText=(totalFreight-totalPaid).toFixed(0)

}

/* TOGGLE */
function toggle(id){
let el=document.getElementById("body-"+id)
el.style.display = el.style.display==="block"?"none":"block"
}

</script>

</body>
</html>
