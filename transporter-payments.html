<!DOCTYPE html>
<html>

<head>

<title>Transporter Payments - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="menu-rbac.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

select,input{
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

.deleteBtn{
background:#d9534f;
}

.trip-list{
max-height:220px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
text-align:left;
}

</style>

</head>

<body>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"YOUR_SUPABASE_KEY"
)

</script>


<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>


<div class="main">

<h2>Transporter Payments</h2>


<!-- RECORD PAYMENT -->

<div class="card">

<h3>Record Payment</h3>

<select id="transporterSelect"></select>

<button onclick="loadTrips()">Load Trips</button>

<div class="trip-list">

<div>
<input type="checkbox" id="selectAll" onclick="toggleAllTrips()">
<b>Select All</b>
</div>

<div id="tripList"></div>

</div>

<input id="amount" placeholder="Total Amount" readonly>

<input type="date" id="paymentDate">

<select id="method">

<option value="Cash">Cash</option>
<option value="Bank Transfer">Bank Transfer</option>
<option value="UPI">UPI</option>

</select>

<input id="remarks" placeholder="Remarks">

<button onclick="savePayment()">Save Payment</button>

</div>


<!-- SEARCH -->

<div class="card">

<h3>Search Payments</h3>

<select id="searchTransporter"></select>

From
<input type="date" id="fromDate">

To
<input type="date" id="toDate">

<button onclick="searchPayments()">Search</button>
<button onclick="clearSearch()">Clear</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>


<!-- PAYMENT HISTORY -->

<div class="card">

<h3>Payment History</h3>

<table>

<thead>

<tr>
<th>Date</th>
<th>Transporter</th>
<th>Trips</th>
<th>Amount</th>
<th>Method</th>
<th>Remarks</th>
<th>Action</th>
</tr>

</thead>

<tbody id="paymentTable"></tbody>

</table>

</div>

</div>


<script>

let transporters=[]
let trips=[]
let payments=[]
let allPayments=[]
let loggedTransporter=null

init()

async function init(){

await loadTransporters()
await detectTransporterLogin()
await loadPayments()

}


/* Detect transporter login */

function detectTransporterLogin(){

let role=localStorage.getItem("role")
let transporterId=localStorage.getItem("transporter_id")

if(role==="transporter" && transporterId){

loggedTransporter=transporterId

document.getElementById("transporterSelect").value=transporterId
document.getElementById("transporterSelect").disabled=true

}

}


/* Load transporters */

async function loadTransporters(){

const {data}=await supabaseClient
.from("transporters")
.select("*")

transporters=data || []

let html='<option value="">Select Transporter</option>'
let search='<option value="">All Transporters</option>'

transporters.forEach(t=>{

html+=`<option value="${t.id}">${t.transporter_name}</option>`
search+=`<option value="${t.transporter_name}">${t.transporter_name}</option>`

})

document.getElementById("transporterSelect").innerHTML=html
document.getElementById("searchTransporter").innerHTML=search

}


/* Load trips */

async function loadTrips(){

let transporterId=loggedTransporter || document.getElementById("transporterSelect").value

if(!transporterId){
alert("Select transporter")
return
}

const {data:tripData}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporterId)
.eq("status","Completed")
.order("trip_no",{ascending:false})


const {data:paymentData}=await supabaseClient
.from("transporter_payments")
.select("trip_no")


let paidTrips=[]

paymentData.forEach(p=>{

if(p.trip_no){

p.trip_no.split(",").forEach(t=>{
paidTrips.push(t.trim())
})

}

})


trips=tripData.filter(t=>!paidTrips.includes(t.trip_no))


let html=""

trips.forEach(t=>{

let payable=(t.transporter_rate || 0)*(t.weight_kg/1000)

html+=`

<div>

<input type="checkbox" value="${t.id}" onchange="calculateTotal()">

${t.trip_no} | ${t.route} | ${t.truck} | ₹${payable.toFixed(2)}

</div>

`

})


if(trips.length==0){

html="<i>No unpaid trips</i>"

}

document.getElementById("tripList").innerHTML=html

}


/* Calculate total */

function calculateTotal(){

let checked=document.querySelectorAll("#tripList input:checked")

let total=0

checked.forEach(c=>{

let trip=trips.find(t=>t.id==c.value)

let payable=(trip.transporter_rate || 0)*(trip.weight_kg/1000)

total+=payable

})

document.getElementById("amount").value=total.toFixed(2)

}


/* Select all */

function toggleAllTrips(){

let checked=document.getElementById("selectAll").checked

document.querySelectorAll("#tripList input").forEach(c=>{
c.checked=checked
})

calculateTotal()

}


/* Save payment */

async function savePayment(){

let transporterId=loggedTransporter || document.getElementById("transporterSelect").value

let transporter=transporters.find(t=>t.id==transporterId)

let amount=document.getElementById("amount").value
let date=document.getElementById("paymentDate").value
let method=document.getElementById("method").value
let remarks=document.getElementById("remarks").value

let checked=document.querySelectorAll("#tripList input:checked")

if(checked.length==0){

alert("Select trips")
return

}

let tripNos=[]

checked.forEach(c=>{

let trip=trips.find(t=>t.id==c.value)

tripNos.push(trip.trip_no)

})


await supabaseClient
.from("transporter_payments")
.insert({

transporter_name:transporter.transporter_name,
trip_no:tripNos.join(", "),
amount:Number(amount),
payment_date:date,
payment_method:method,
remarks:remarks

})


alert("Payment Saved")

loadTrips()
loadPayments()

}


/* Load payments */

async function loadPayments(){

const {data}=await supabaseClient
.from("transporter_payments")
.select("*")
.order("created_at",{ascending:false})

payments=data || []

if(loggedTransporter){

let transporter=transporters.find(t=>t.id==loggedTransporter)

payments=payments.filter(p=>p.transporter_name===transporter.transporter_name)

}

allPayments=payments

renderPayments()

}


/* Render payments */

function renderPayments(){

let html=""

payments.forEach(p=>{

html+=`

<tr>

<td>${p.payment_date || ""}</td>
<td>${p.transporter_name}</td>
<td>${p.trip_no}</td>
<td>₹${p.amount}</td>
<td>${p.payment_method}</td>
<td>${p.remarks || ""}</td>

<td>
<button class="deleteBtn" onclick="deletePayment('${p.id}')">Delete</button>
</td>

</tr>

`

})

document.getElementById("paymentTable").innerHTML=html

}


/* Search */

function searchPayments(){

let transporter=document.getElementById("searchTransporter").value
let from=document.getElementById("fromDate").value
let to=document.getElementById("toDate").value

payments=allPayments.filter(p=>{

let matchTransporter=!transporter || p.transporter_name===transporter

let matchDate=true

if(from){
matchDate=p.payment_date>=from
}

if(to){
matchDate=matchDate && p.payment_date<=to
}

return matchTransporter && matchDate

})

renderPayments()

}


/* Clear search */

function clearSearch(){

document.getElementById("searchTransporter").value=""
document.getElementById("fromDate").value=""
document.getElementById("toDate").value=""

payments=allPayments

renderPayments()

}


/* Delete payment */

async function deletePayment(id){

if(!confirm("Delete payment?")) return

await supabaseClient
.from("transporter_payments")
.delete()
.eq("id",id)

loadPayments()

}


/* Download PDF */

function downloadPDF(){

const { jsPDF } = window.jspdf
let doc=new jsPDF()

let rows=[]

payments.forEach(p=>{

rows.push([
p.payment_date,
p.transporter_name,
p.trip_no,
p.amount,
p.payment_method,
p.remarks
])

})

doc.autoTable({

head:[["Date","Transporter","Trips","Amount","Method","Remarks"]],
body:rows

})

doc.save("transporter_payments.pdf")

}

</script>

</body>
</html>
