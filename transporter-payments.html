<!DOCTYPE html>
<html>

<head>

<title>Transporter Payments</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="menu-rbac.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
padding:10px;
margin-right:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:8px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-top:5px;
}

.deleteBtn{background:#d9534f;}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

</style>

</head>

<body>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

</script>


<!-- SIDEBAR -->

<div id="sidebar-container"></div>

<script>

fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data

setTimeout(()=>{
if(typeof applyMenuRBAC==="function"){applyMenuRBAC()}
},300)

})

</script>


<div class="main">

<h2>Transporter Payments</h2>


<!-- ADD PAYMENT -->

<div class="card">

<h3>Add Payment</h3>

<select id="transporter"></select>

<input type="number" id="amount" placeholder="Amount">

<input id="transactionId" placeholder="Transaction ID">

<input type="date" id="paymentDate">

<input id="remarks" placeholder="Remarks">

<button onclick="addPayment()">Save Payment</button>

</div>


<!-- SEARCH -->

<div class="card">

<h3>Search Payments</h3>

<select id="searchTransporter"></select>

<input type="date" id="searchDate">

<button onclick="searchPayments()">Search</button>
<button onclick="clearSearch()">Clear</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>


<!-- PAYMENT HISTORY -->

<div class="card">

<h3>Payment History</h3>

<table>

<thead>
<tr>
<th>Date</th>
<th>Transporter</th>
<th>Amount</th>
<th>Transaction ID</th>
<th>Remarks</th>
<th>Action</th>
</tr>
</thead>

<tbody id="paymentTable"></tbody>

</table>

<br>

<button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>

</div>

</div>


<script>

let transporters=[]
let payments=[]
let allPayments=[]
let page=1
let pageSize=10

init()

async function init(){

await loadTransporters()
await loadPayments()

}


/* LOAD TRANSPORTERS */

async function loadTransporters(){

const {data}=await supabaseClient
.from("transporters")
.select("*")

transporters=data||[]

let html='<option value="">Select Transporter</option>'
let search='<option value="">All Transporters</option>'

transporters.forEach(t=>{
html+=`<option value="${t.transporter_name}">${t.transporter_name}</option>`
search+=`<option value="${t.transporter_name}">${t.transporter_name}</option>`
})

document.getElementById("transporter").innerHTML=html
document.getElementById("searchTransporter").innerHTML=search

}


/* ADD PAYMENT */

async function addPayment(){

let transporter=document.getElementById("transporter").value
let amount=document.getElementById("amount").value
let txn=document.getElementById("transactionId").value
let date=document.getElementById("paymentDate").value
let remarks=document.getElementById("remarks").value

await supabaseClient
.from("transporter_payments")
.insert({

transporter_name:transporter,
amount:Number(amount),
transaction_id:txn,
payment_date:date,
remarks:remarks

})

loadPayments()

}


/* LOAD PAYMENTS */

async function loadPayments(){

const {data}=await supabaseClient
.from("transporter_payments")
.select("*")
.order("created_at",{ascending:false})

payments=data||[]
allPayments=data||[]

renderPayments()

}


/* RENDER */

function renderPayments(){

let start=(page-1)*pageSize
let end=start+pageSize

let pageData=payments.slice(start,end)

let html=""

pageData.forEach(p=>{

html+=`
<tr>

<td>${p.payment_date || ""}</td>
<td>${p.transporter_name}</td>
<td>${p.amount}</td>
<td>${p.transaction_id || ""}</td>
<td>${p.remarks || ""}</td>

<td>
<button class="deleteBtn" onclick="deletePayment('${p.id}')">Delete</button>
</td>

</tr>
`

})

document.getElementById("paymentTable").innerHTML=html

}


/* SEARCH */

function searchPayments(){

let transporter=document.getElementById("searchTransporter").value
let date=document.getElementById("searchDate").value

payments=allPayments.filter(p=>{

return(
(!transporter || p.transporter_name===transporter) &&
(!date || p.payment_date===date)
)

})

page=1
renderPayments()

}


function clearSearch(){

document.getElementById("searchTransporter").value=""
document.getElementById("searchDate").value=""

payments=allPayments

renderPayments()

}


/* DELETE */

async function deletePayment(id){

if(!confirm("Delete payment?")) return

await supabaseClient
.from("transporter_payments")
.delete()
.eq("id",id)

loadPayments()

}


/* PAGINATION */

function nextPage(){
page++
renderPayments()
}

function prevPage(){
if(page>1) page--
renderPayments()
}


/* PDF */

function downloadPDF(){

const { jsPDF } = window.jspdf
let doc=new jsPDF()

let rows=[]

payments.forEach(p=>{
rows.push([
p.payment_date,
p.transporter_name,
p.amount,
p.transaction_id,
p.remarks
])
})

doc.autoTable({
head:[["Date","Transporter","Amount","Transaction ID","Remarks"]],
body:rows
})

doc.save("transporter_payments.pdf")

}

</script>

</body>
</html>
