<!DOCTYPE html>
<html>

<head>
<title>Transporter Payments - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

select,input{
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

.trip-list{
max-height:200px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
text-align:left;
}

.deleteBtn{
background:#d9534f;
}
</style>
</head>

<body>

<script>
const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
)
</script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("transporter-sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>

<div class="main">

<h2>Transporter Payments</h2>

<div class="card">
<h3>Record Payment</h3>

<select id="transporterSelect"></select>
<button onclick="loadTrips()">Load Trips</button>

<div class="trip-list">
<div>
<input type="checkbox" id="selectAll" onclick="toggleAllTrips()"> Select All
</div>
<div id="tripList"></div>
</div>

<input id="amount" placeholder="Total Amount" readonly>
<input type="date" id="paymentDate">

<select id="method">
<option value="">Method</option>
<option>Cash</option>
<option>Bank Transfer</option>
<option>UPI</option>
</select>

<input id="remarks" placeholder="Remarks">

<button onclick="savePayment()">Save Payment</button>
</div>

<div class="card">
<h3>Payment History</h3>

<table>
<thead>
<tr>
<th>Date</th>
<th>Transporter</th>
<th>Trip</th>
<th>Amount</th>
<th>Method</th>
<th>Remarks</th>
<th>Action</th>
</tr>
</thead>
<tbody id="paymentTable"></tbody>
</table>

</div>

</div>

<script>

let transporters=[]
let trips=[]
let payments=[]

init()

async function init(){
await loadTransporters()
await loadPayments()
}

async function loadTransporters(){

const {data}=await supabaseClient
.from("transporters")
.select("id,transporter_name")

transporters=data||[]

let html='<option value="">Select Transporter</option>'

transporters.forEach(t=>{
html+=`<option value="${t.id}">${t.transporter_name}</option>`
})

document.getElementById("transporterSelect").innerHTML=html
}

async function loadTrips(){

let transporterId=document.getElementById("transporterSelect").value

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporterId)

trips=data||[]

let html=""

trips.forEach(t=>{
let payable=(t.transporter_rate||0)*(t.weight_kg/1000)

html+=`
<div>
<input type="checkbox" value="${t.id}" onchange="calculateTotal()">
${t.trip_no} | ₹${payable.toFixed(0)}
</div>`
})

document.getElementById("tripList").innerHTML=html
}

function calculateTotal(){

let checked=document.querySelectorAll("#tripList input:checked")
let total=0

checked.forEach(c=>{
let trip=trips.find(t=>t.id==c.value)
total+=(trip.transporter_rate||0)*(trip.weight_kg/1000)
})

document.getElementById("amount").value=total.toFixed(0)
}

function toggleAllTrips(){

let checked=document.getElementById("selectAll").checked

document.querySelectorAll("#tripList input").forEach(c=>{
c.checked=checked
})

calculateTotal()
}

async function savePayment(){

let transporterId=document.getElementById("transporterSelect").value
let transporter=transporters.find(t=>t.id==transporterId)

let date=document.getElementById("paymentDate").value
let method=document.getElementById("method").value
let remarks=document.getElementById("remarks").value

let checked=document.querySelectorAll("#tripList input:checked")

for(const c of checked){

let trip=trips.find(t=>t.id==c.value)

await supabaseClient.from("transporter_payments").insert({
trip_id: trip.id,
transporter_id: transporterId,   // ✅ FIXED
transporter_name: transporter.transporter_name,
amount:(trip.transporter_rate||0)*(trip.weight_kg/1000),
payment_date:date,
payment_method:method,
remarks:remarks
})
}

alert("Payment saved")

loadPayments()
}

async function loadPayments(){

const {data}=await supabaseClient
.from("transporter_payments")
.select(`*,trips(trip_no),transporters(transporter_name)`)
.order("created_at",{ascending:false})

payments=data||[]

renderPayments()
}

function renderPayments(){

let html=""

payments.forEach(p=>{
html+=`
<tr>
<td>${p.payment_date||""}</td>
<td>${p.transporters?.transporter_name || p.transporter_name}</td>
<td>${p.trips?.trip_no||""}</td>
<td>₹${p.amount}</td>
<td>${p.payment_method||""}</td>
<td>${p.remarks||""}</td>
<td><button class="deleteBtn" onclick="deletePayment('${p.id}')">Delete</button></td>
</tr>`
})

document.getElementById("paymentTable").innerHTML=html
}

async function deletePayment(id){
await supabaseClient.from("transporter_payments").delete().eq("id",id)
loadPayments()
}

</script>

</body>
</html>
