<!DOCTYPE html><html><head><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script><title>Trip Profit Analysis</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* Fix sidebar title */

.sidebar h2{
color:white;
text-align:center;
margin-bottom:30px;
}

/* Main layout */

.main{
margin-left:220px;
padding:30px;
}

.main h2{
color:#1f3c88;
}

/* Filters */

.filters{
margin-bottom:15px;
}

select{
padding:8px;
margin-right:10px;
}

/* Buttons */

button{
padding:8px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:6px;
}

/* Table */

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

/* Profit colors */

.profit{
color:green;
font-weight:bold;
}

.loss{
color:red;
font-weight:bold;
}

/* Pagination */

.pagination{
margin-top:10px;
}

</style></head><body><!-- SIDEBAR --><div id="sidebar-container"></div><script>
fetch("transporter-sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script><div class="main"><h2>Trip Profit Analysis</h2><div class="filters"><select id="routeFilter"></select>
<select id="truckFilter"></select>
<select id="commodityFilter"></select>

<button onclick="applyFilters()">Search</button>
<button onclick="clearFilters()">Clear</button>
<button onclick="downloadPDF()">Download PDF</button>

</div><table><thead>
<tr>
<th>Trip No</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Weight</th>
<th>Freight</th>
<th>Expenses</th>
<th>Net Profit</th>
<th>Profit %</th>
</tr>
</thead><tbody id="profitTable"></tbody></table><div class="pagination"><button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>

</div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

let allTrips=[]
let filteredTrips=[]
let expenseMap={}

let page=1
let pageSize=10


init()


async function init(){

const {data}=await supabaseClient.auth.getSession()

if(!data.session){
window.location.href="login.html"
return
}

let authId=data.session.user.id


/* FIND TRANSPORTER */

const {data:transporter}=await supabaseClient
.from("transporters")
.select("*")
.eq("auth_id",authId)
.single()


/* GET TRIPS */

const {data:trips}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporter.id)


/* GET EXPENSES */

const {data:expenses}=await supabaseClient
.from("expenses")
.select("*")


expenses.forEach(e=>{

if(!expenseMap[e.trip_id]) expenseMap[e.trip_id]=0

expenseMap[e.trip_id]+=Number(e.amount||0)

})


allTrips=trips
filteredTrips=trips


buildFilters()
renderTable()

}



/* BUILD FILTER OPTIONS */

function buildFilters(){

let routes=[...new Set(allTrips.map(t=>t.route))]
let trucks=[...new Set(allTrips.map(t=>t.truck))]
let commodities=[...new Set(allTrips.map(t=>t.commodity))]

let routeHTML='<option value="">All Routes</option>'
let truckHTML='<option value="">All Trucks</option>'
let commodityHTML='<option value="">All Commodities</option>'

routes.forEach(r=>routeHTML+=`<option>${r}</option>`)
trucks.forEach(t=>truckHTML+=`<option>${t}</option>`)
commodities.forEach(c=>commodityHTML+=`<option>${c}</option>`)

document.getElementById("routeFilter").innerHTML=routeHTML
document.getElementById("truckFilter").innerHTML=truckHTML
document.getElementById("commodityFilter").innerHTML=commodityHTML

}



/* APPLY FILTERS */

function applyFilters(){

let route=document.getElementById("routeFilter").value
let truck=document.getElementById("truckFilter").value
let commodity=document.getElementById("commodityFilter").value

filteredTrips=allTrips.filter(t=>

(!route || t.route==route) &&
(!truck || t.truck==truck) &&
(!commodity || t.commodity==commodity)

)

page=1

renderTable()

}



/* CLEAR FILTERS */

function clearFilters(){

filteredTrips=allTrips

document.getElementById("routeFilter").value=""
document.getElementById("truckFilter").value=""
document.getElementById("commodityFilter").value=""

renderTable()

}



/* RENDER TABLE */

function renderTable(){

let start=(page-1)*pageSize
let end=start+pageSize

let pageTrips=filteredTrips.slice(start,end)

let html=""

pageTrips.forEach(t=>{

let rate=t.transporter_rate || 0

let freight=(t.weight_kg/1000)*rate

let expenses=expenseMap[t.id] || 0

let profit=freight-expenses

let profitPercent= freight>0 ? ((profit/freight)*100).toFixed(1) : 0

html+=`

<tr>

<td>${t.trip_no}</td>

<td>${t.route}</td>

<td>${t.truck}</td>

<td>${t.commodity}</td>

<td>${t.weight_kg}</td>

<td>₹ ${freight.toFixed(2)}</td>

<td>₹ ${expenses.toFixed(2)}</td>

<td class="${profit>=0?'profit':'loss'}">
₹ ${profit.toFixed(2)}
</td>

<td>${profitPercent}%</td>

</tr>

`

})

document.getElementById("profitTable").innerHTML=html

}



/* PAGINATION */

function nextPage(){

if(page*pageSize<filteredTrips.length){

page++

renderTable()

}

}

function prevPage(){

if(page>1){

page--

renderTable()

}

}



/* DOWNLOAD PDF */

function downloadPDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let rows=[]

filteredTrips.forEach(t=>{

let rate=t.transporter_rate || 0

let freight=(t.weight_kg/1000)*rate

let expenses=expenseMap[t.id] || 0

let profit=freight-expenses

let percent= freight>0 ? ((profit/freight)*100).toFixed(1) : 0

rows.push([
t.trip_no,
t.route,
t.truck,
t.commodity,
t.weight_kg,
freight.toFixed(2),
expenses.toFixed(2),
profit.toFixed(2),
percent+"%"
])

})

doc.text("Trip Profit Analysis",14,15)

doc.autoTable({
head:[["Trip No","Route","Truck","Commodity","Weight","Freight","Expenses","Net Profit","Profit %"]],
body:rows,
startY:20
})

doc.save("trip-profit-report.pdf")

}



/* LOGOUT */

async function logout(){

await supabaseClient.auth.signOut()

window.location.href="login.html"

}

</script>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>
</html>
