<!DOCTYPE html>
<html>

<head>

<title>Transporter Trips</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>
<script src="rbac.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}
.main h2{color:#1f3c88;}
.filters{margin-bottom:15px;}
select{padding:8px;margin-right:10px;}
button{padding:8px 14px;background:#1f3c88;color:white;border:none;border-radius:4px;cursor:pointer;margin-right:6px;}
table{width:100%;border-collapse:collapse;background:white;margin-top:15px;}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left;}
th{background:#eee;}
.pagination{margin-top:10px;}
.message{color:red;margin-top:10px;font-weight:bold;}
</style>

</head>

<body>

<div id="sidebar-container"></div>

<script>
fetch("transporter-sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>

<div class="main">

<h2>My Trips</h2>

<div class="filters">
<select id="routeFilter"></select>
<select id="truckFilter"></select>
<select id="commodityFilter"></select>

<button onclick="applyFilters()">Search</button>
<button onclick="clearFilters()">Clear</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div class="message" id="message"></div>

<table>
<thead>
<tr>
<th>Trip No</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Weight (KG)</th>
<th>Cost / MT</th>
<th>Expenses</th>
<th>Date</th>
<th>Status</th>
<th>Earnings</th>
</tr>
</thead>
<tbody id="tripTable"></tbody>
</table>

<div class="pagination">
<button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>
</div>

</div>

<script>

const supabaseClient = window.supabaseClient

let allTrips=[]
let filteredTrips=[]
let expensesMap={}

let page=1
let pageSize=10

init()

async function init(){

const {data:{session}} = await supabaseClient.auth.getSession()

if(!session){
window.location.href="login.html"
return
}

const authId = session.user.id

console.log("AUTH ID:", authId)

/* 🔥 GET TRANSPORTER */
const {data:transporter, error} = await supabaseClient
.from("transporters")
.select("id, transporter_name")
.eq("auth_id", authId)
.single()

if(error || !transporter){
document.getElementById("message").innerText="Transporter record not found."
console.log("Transporter Error:", error)
return
}

console.log("TRANSPORTER:", transporter)

/* 🔥 STRICT FILTER (NO FALLBACK) */
const {data:trips, error:tripError} = await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id", transporter.id)

if(tripError){
console.log("Trip Error:", tripError)
}

if(!trips || trips.length===0){
document.getElementById("message").innerText="No trips found."
}

allTrips = trips || []
filteredTrips = [...allTrips]

/* EXPENSES */
const {data:expenses} = await supabaseClient
.from("expenses")
.select("*")

if(expenses){
expenses.forEach(e=>{
if(!expensesMap[e.trip_id]) expensesMap[e.trip_id]=0
expensesMap[e.trip_id]+=Number(e.amount || 0)
})
}

buildFilters()
renderTrips()
}

/* FILTERS */

function buildFilters(){

let routes=[...new Set(allTrips.map(t=>t.route))]
let trucks=[...new Set(allTrips.map(t=>t.truck))]
let commodities=[...new Set(allTrips.map(t=>t.commodity))]

document.getElementById("routeFilter").innerHTML =
'<option value="">All Routes</option>' + routes.map(r=>`<option>${r}</option>`).join("")

document.getElementById("truckFilter").innerHTML =
'<option value="">All Trucks</option>' + trucks.map(t=>`<option>${t}</option>`).join("")

document.getElementById("commodityFilter").innerHTML =
'<option value="">All Commodities</option>' + commodities.map(c=>`<option>${c}</option>`).join("")
}

/* FILTER APPLY */

function applyFilters(){

let route=routeFilter.value
let truck=truckFilter.value
let commodity=commodityFilter.value

filteredTrips = allTrips.filter(t=>
(!route || t.route==route) &&
(!truck || t.truck==truck) &&
(!commodity || t.commodity==commodity)
)

page=1
renderTrips()
}

function clearFilters(){
filteredTrips=[...allTrips]
routeFilter.value=""
truckFilter.value=""
commodityFilter.value=""
renderTrips()
}

/* RENDER */

function renderTrips(){

let start=(page-1)*pageSize
let pageTrips=filteredTrips.slice(start,start+pageSize)

let html=""

pageTrips.forEach(t=>{

let rate=t.transporter_rate || 0
let freight=(t.weight_kg/1000)*rate
let expenses=expensesMap[t.id] || 0
let earnings=(freight-expenses).toFixed(2)

html+=`
<tr>
<td onclick="showExpenses('${t.id}','${t.trip_no}')" style="cursor:pointer;color:#1f3c88;font-weight:bold">
${t.trip_no || ""}
</td>
<td>${t.route || ""}</td>
<td>${t.truck || ""}</td>
<td>${t.commodity || ""}</td>
<td>${t.weight_kg || ""}</td>
<td>${rate}</td>
<td>${expenses}</td>
<td>${t.trip_date || ""}</td>
<td>${t.status || ""}</td>
<td>${earnings}</td>
</tr>`
})

tripTable.innerHTML = html
}

/* PAGINATION */

function nextPage(){
if(page*pageSize<filteredTrips.length){page++;renderTrips()}
}

function prevPage(){
if(page>1){page--;renderTrips()}
}

/* PDF */

function downloadPDF(){

const { jsPDF } = window.jspdf
let doc=new jsPDF()

let rows = filteredTrips.map(t=>{
let rate=t.transporter_rate || 0
let freight=(t.weight_kg/1000)*rate
let expenses=expensesMap[t.id] || 0
let earnings=(freight-expenses).toFixed(2)

return [t.trip_no,t.route,t.truck,t.commodity,t.weight_kg,rate,expenses,t.trip_date,t.status,earnings]
})

doc.text("Transporter Trips",14,15)

doc.autoTable({
head:[["Trip No","Route","Truck","Commodity","Weight","Cost/MT","Expenses","Date","Status","Earnings"]],
body:rows,
startY:20
})

doc.save("transporter-trips.pdf")
}

/* EXPENSE POPUP */

async function showExpenses(tripId,tripNo){

expensePopup.style.display="block"
expenseTitle.innerText="Expenses for "+tripNo

const {data}=await supabaseClient.from("expenses").select("*").eq("trip_id",tripId)

let html=""

if(data?.length){
data.forEach(e=>{
html+=`<tr><td>${e.expense_type || "Expense"}</td><td>₹ ${e.amount}</td></tr>`
})
}else{
html="<tr><td colspan='2'>No expenses found</td></tr>"
}

expenseTable.innerHTML=html
}

function closeExpenses(){
expensePopup.style.display="none"
}

async function logout(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

</script>

<script src="global-logout.js"></script>

</body>
</html>
