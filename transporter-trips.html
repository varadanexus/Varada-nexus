<!DOCTYPE html><html><head><title>Transporter Trips</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
margin-left:220px;
padding:30px;
}

.main h2{
color:#1f3c88;
}

.filters{
margin-bottom:15px;
}

select{
padding:8px;
margin-right:10px;
}

button{
padding:8px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:6px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

.pagination{
margin-top:10px;
}

.message{
color:red;
margin-top:10px;
font-weight:bold;
}

</style></head><body><div id="sidebar-container"></div><script>
fetch("transporter-sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script><div class="main"><h2>My Trips</h2><div class="filters"><select id="routeFilter"></select>
<select id="truckFilter"></select>
<select id="commodityFilter"></select>

<button onclick="applyFilters()">Search</button>
<button onclick="clearFilters()">Clear</button>
<button onclick="downloadPDF()">Download PDF</button>

</div><div class="message" id="message"></div><table><thead>
<tr>
<th>Trip No</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Weight (KG)</th>
<th>Cost / MT</th>
<th>Expenses</th>
<th>Date</th>
<th>Status</th>
<th>Earnings</th>
</tr>
</thead><tbody id="tripTable"></tbody></table><div class="pagination"><button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>

</div></div><!-- EXPENSE POPUP --><div id="expensePopup" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
"><div style="
background:white;
width:420px;
margin:120px auto;
padding:20px;
border-radius:6px;
"><h3 id="expenseTitle"></h3><table style="width:100%;border-collapse:collapse"><thead>
<tr>
<th>Expense Type</th>
<th>Amount</th>
</tr>
</thead><tbody id="expenseTable"></tbody></table><br><button onclick="closeExpenses()">Close</button>

</div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

let allTrips=[]
let filteredTrips=[]
let expensesMap={}

let page=1
let pageSize=10

init()

async function init(){

const {data:sessionData}=await supabaseClient.auth.getSession()

if(!sessionData.session){
window.location.href="login.html"
return
}

let authId=sessionData.session.user.id

const {data:transporter}=await supabaseClient
.from("transporters")
.select("*")
.eq("auth_id",authId)
.single()

if(!transporter){
document.getElementById("message").innerText="Transporter record not found."
return
}

let {data:trips}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporter.id)

if(!trips || trips.length==0){

let {data:tripsByName}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_name",transporter.transporter_name)

trips=tripsByName
}

if(!trips || trips.length==0){
document.getElementById("message").innerText="No trips found for this transporter."
}

allTrips=trips || []
filteredTrips=trips || []

const {data:expenses}=await supabaseClient
.from("expenses")
.select("*")

if(expenses){

expenses.forEach(e=>{
if(!expensesMap[e.trip_id]) expensesMap[e.trip_id]=0
expensesMap[e.trip_id]+=Number(e.amount || 0)
})

}

buildFilters()
renderTrips()

}


function buildFilters(){

let routes=[...new Set(allTrips.map(t=>t.route))]
let trucks=[...new Set(allTrips.map(t=>t.truck))]
let commodities=[...new Set(allTrips.map(t=>t.commodity))]

let routeHTML='<option value="">All Routes</option>'
let truckHTML='<option value="">All Trucks</option>'
let commodityHTML='<option value="">All Commodities</option>'

routes.forEach(r=>routeHTML+=`<option>${r}</option>`)
trucks.forEach(t=>truckHTML+=`<option>${t}</option>`)
commodities.forEach(c=>commodityHTML+=`<option>${c}</option>`)

document.getElementById("routeFilter").innerHTML=routeHTML
document.getElementById("truckFilter").innerHTML=truckHTML
document.getElementById("commodityFilter").innerHTML=commodityHTML

}


function applyFilters(){

let route=document.getElementById("routeFilter").value
let truck=document.getElementById("truckFilter").value
let commodity=document.getElementById("commodityFilter").value

filteredTrips=allTrips.filter(t=>
(!route || t.route==route) &&
(!truck || t.truck==truck) &&
(!commodity || t.commodity==commodity)
)

page=1
renderTrips()

}


function clearFilters(){

filteredTrips=allTrips

document.getElementById("routeFilter").value=""
document.getElementById("truckFilter").value=""
document.getElementById("commodityFilter").value=""

renderTrips()

}


function renderTrips(){

let start=(page-1)*pageSize
let end=start+pageSize

let pageTrips=filteredTrips.slice(start,end)

let html=""

pageTrips.forEach(t=>{

let rate=t.transporter_rate || 0
let freight=(t.weight_kg/1000)*rate

let expenses=expensesMap[t.id] || 0

let earnings=(freight-expenses).toFixed(2)

html+=`
<tr>
<td onclick="showExpenses('${t.id}','${t.trip_no}')"
style="cursor:pointer;color:#1f3c88;font-weight:bold">
${t.trip_no || ""}
</td>

<td>${t.route || ""}</td>
<td>${t.truck || ""}</td>
<td>${t.commodity || ""}</td>
<td>${t.weight_kg || ""}</td>
<td>${rate}</td>
<td>${expenses}</td>
<td>${t.trip_date || ""}</td>
<td>${t.status || ""}</td>
<td>${earnings}</td>
</tr>
`

})

document.getElementById("tripTable").innerHTML=html

}


function nextPage(){
if(page*pageSize<filteredTrips.length){
page++
renderTrips()
}
}

function prevPage(){
if(page>1){
page--
renderTrips()
}
}


function downloadPDF(){

const { jsPDF } = window.jspdf
let doc=new jsPDF()

let rows=[]

filteredTrips.forEach(t=>{

let rate=t.transporter_rate || 0
let freight=(t.weight_kg/1000)*rate
let expenses=expensesMap[t.id] || 0
let earnings=(freight-expenses).toFixed(2)

rows.push([
t.trip_no,
t.route,
t.truck,
t.commodity,
t.weight_kg,
rate,
expenses,
t.trip_date,
t.status,
earnings
])

})

doc.text("Transporter Trips",14,15)

doc.autoTable({
head:[["Trip No","Route","Truck","Commodity","Weight","Cost/MT","Expenses","Date","Status","Earnings"]],
body:rows,
startY:20
})

doc.save("transporter-trips.pdf")

}


/* EXPENSE VIEW */

async function showExpenses(tripId,tripNo){

document.getElementById("expensePopup").style.display="block"

document.getElementById("expenseTitle").innerText="Expenses for "+tripNo

const {data}=await supabaseClient
.from("expenses")
.select("*")
.eq("trip_id",tripId)

let html=""

if(data && data.length>0){

data.forEach(e=>{
html+=`
<tr>
<td>${e.expense_type || "Expense"}</td>
<td>₹ ${e.amount}</td>
</tr>
`
})

}else{

html="<tr><td colspan='2'>No expenses found</td></tr>"

}

document.getElementById("expenseTable").innerHTML=html

}

function closeExpenses(){
document.getElementById("expensePopup").style.display="none"
}


async function logout(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

</script></body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="rbac.js"></script>
<script src="menu-rbac.js"></script>

</html>
