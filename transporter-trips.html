<!DOCTYPE html><html><head><title>Transporter Trips</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.main{
padding:40px;
}

h2{
color:#1f3c88;
}

.filters{
margin-bottom:15px;
}

select{
padding:8px;
margin-right:10px;
}

button{
padding:8px 14px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:6px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

.pagination{
margin-top:10px;
}

</style></head><body><div class="main"><h2>My Trips</h2><div class="filters"><select id="routeFilter"></select>
<select id="truckFilter"></select>
<select id="commodityFilter"></select>

<button onclick="applyFilters()">Search</button>
<button onclick="clearFilters()">Clear</button>

<button onclick="downloadPDF()">Download PDF</button>

<button onclick="logout()">Logout</button>

</div><table><thead>
<tr>
<th>Trip No</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Weight (KG)</th>
<th>Cost / MT</th>
<th>Date</th>
<th>Status</th>
<th>Earnings</th>
</tr>
</thead><tbody id="tripTable"></tbody></table><div class="pagination">
<button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>
</div></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

let allTrips=[]
let filteredTrips=[]

let page=1
let pageSize=10

init()


async function init(){

const {data}=await supabaseClient.auth.getSession()

if(!data.session){
window.location.href="login.html"
return
}

let authId=data.session.user.id


const {data:transporter}=await supabaseClient
.from("transporters")
.select("*")
.eq("auth_id",authId)
.single()


let transporterId=transporter.id


const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id",transporterId)
.order("created_at",{ascending:false})


allTrips=data
filteredTrips=data


buildFilters()
renderTrips()

}



function buildFilters(){

let routes=[...new Set(allTrips.map(t=>t.route))]
let trucks=[...new Set(allTrips.map(t=>t.truck))]
let commodities=[...new Set(allTrips.map(t=>t.commodity))]

let routeHTML='<option value="">All Routes</option>'
let truckHTML='<option value="">All Trucks</option>'
let commodityHTML='<option value="">All Commodities</option>'

routes.forEach(r=>routeHTML+=`<option>${r}</option>`)
trucks.forEach(t=>truckHTML+=`<option>${t}</option>`)
commodities.forEach(c=>commodityHTML+=`<option>${c}</option>`)

document.getElementById("routeFilter").innerHTML=routeHTML
document.getElementById("truckFilter").innerHTML=truckHTML
document.getElementById("commodityFilter").innerHTML=commodityHTML

}



function applyFilters(){

let route=document.getElementById("routeFilter").value
let truck=document.getElementById("truckFilter").value
let commodity=document.getElementById("commodityFilter").value

filteredTrips=allTrips.filter(t=>

(!route || t.route==route) &&
(!truck || t.truck==truck) &&
(!commodity || t.commodity==commodity)

)

page=1

renderTrips()

}



function clearFilters(){

filteredTrips=allTrips

document.getElementById("routeFilter").value=""
document.getElementById("truckFilter").value=""
document.getElementById("commodityFilter").value=""

renderTrips()

}



function renderTrips(){

let start=(page-1)*pageSize
let end=start+pageSize

let pageTrips=filteredTrips.slice(start,end)

let html=""

pageTrips.forEach(t=>{

let rate=t.transporter_rate || 0

let earnings=((t.weight_kg/1000) * rate).toFixed(2)

html+=`
<tr>
<td>${t.trip_no || ""}</td>
<td>${t.route || ""}</td>
<td>${t.truck || ""}</td>
<td>${t.commodity || ""}</td>
<td>${t.weight_kg || ""}</td>
<td>${rate}</td>
<td>${t.trip_date || ""}</td>
<td>${t.status || ""}</td>
<td>${earnings}</td>
</tr>
`

})

document.getElementById("tripTable").innerHTML=html

}



function nextPage(){

if(page*pageSize<filteredTrips.length){

page++
renderTrips()

}

}



function prevPage(){

if(page>1){

page--
renderTrips()

}

}



function downloadPDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let rows=[]

filteredTrips.forEach(t=>{

let rate=t.transporter_rate || 0
let earnings=((t.weight_kg/1000)*rate).toFixed(2)

rows.push([
t.trip_no,
t.route,
t.truck,
t.commodity,
t.weight_kg,
rate,
t.trip_date,
t.status,
earnings
])

})

doc.text("Transporter Trips",14,15)

doc.autoTable({
head:[["Trip No","Route","Truck","Commodity","Weight","Cost/MT","Date","Status","Earnings"]],
body:rows,
startY:20
})

doc.save("transporter-trips.pdf")

}



async function logout(){

await supabaseClient.auth.signOut()

window.location.href="login.html"

}

</script></body></html>
