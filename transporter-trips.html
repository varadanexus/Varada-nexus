<!DOCTYPE html>
<html>

<head>
<title>Transporter Trips</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}
h2{color:#1f3c88;}
table{width:100%;border-collapse:collapse;background:white;margin-top:15px;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;}
.message{color:red;margin-top:10px;font-weight:bold;}
button{padding:8px 14px;background:#1f3c88;color:white;border:none;border-radius:4px;margin-top:10px;}
</style>

</head>

<body>

<div id="sidebar-container"></div>

<script>
fetch("transporter-sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})
</script>

<div class="main">

<h2>My Trips</h2>

<div id="message" class="message"></div>

<table>
<thead>
<tr>
<th>Trip No</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Weight</th>
<th>Rate</th>
<th>Date</th>
<th>Status</th>
<th>Earnings</th>
</tr>
</thead>
<tbody id="tripTable"></tbody>
</table>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY3NnYnR4ZmhoaWhhbWVqaXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjE5MjksImV4cCI6MjA4ODk5NzkyOX0.rWgLPUMNnHIouP4ANQYfmzr3jAopfd3AFouoAMhSkmg"
)

init()

async function init(){

/* 🔐 CHECK SESSION */
const {data:{session}} = await supabaseClient.auth.getSession()

if(!session){
window.location.href="login.html"
return
}

const authId = session.user.id

console.log("AUTH ID:", authId)

/* 🔗 GET TRANSPORTER */
const {data:transporter,error:transErr} = await supabaseClient
.from("transporters")
.select("id, transporter_name")
.eq("auth_id", authId)
.single()

console.log("TRANSPORTER:", transporter)

if(transErr || !transporter){
document.getElementById("message").innerText="Transporter not linked ❌"
return
}

/* 🚚 GET TRIPS */
const {data:trips,error:tripErr} = await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id", transporter.id)
.order("created_at",{ascending:false})

console.log("TRIPS:", trips)

if(tripErr){
document.getElementById("message").innerText="Error loading trips ❌"
return
}

if(!trips || trips.length === 0){
document.getElementById("message").innerText="No trips found"
return
}

/* 💰 GET EXPENSES */
const {data:expenses} = await supabaseClient
.from("expenses")
.select("*")

let expenseMap = {}

if(expenses){
expenses.forEach(e=>{
if(!expenseMap[e.trip_id]) expenseMap[e.trip_id]=0
expenseMap[e.trip_id]+=Number(e.amount || 0)
})
}

/* 🎯 RENDER */
let html=""

trips.forEach(t=>{

let rate = t.transporter_rate || 0
let weight = t.weight_kg || 0
let freight = (weight/1000)*rate
let expense = expenseMap[t.id] || 0
let earnings = (freight - expense).toFixed(2)

html += `
<tr>
<td>${t.trip_no || ""}</td>
<td>${t.route || ""}</td>
<td>${t.truck || ""}</td>
<td>${t.commodity || ""}</td>
<td>${weight}</td>
<td>${rate}</td>
<td>${t.trip_date || ""}</td>
<td>${t.status || ""}</td>
<td>${earnings}</td>
</tr>
`
})

document.getElementById("tripTable").innerHTML = html

}

</script>

</body>
</html>
