<!DOCTYPE html>
<html>

<head>

<title>Trip Details</title>

<link rel="icon" type="image/png" sizes="32x32" href="/images/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/logo.png">
  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>
<script src="rbac.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.card{
background:white;
padding:25px;
border-radius:6px;
max-width:600px;
}

button{
padding:10px 15px;
background:#1f3c88;
color:white;
border:none;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>Trip Details</h2>

<div id="tripInfo"></div>

<button id="completeBtn" onclick="markComplete()">Mark Completed</button>

</div>

<script>

/* ✅ USE GLOBAL CLIENT */
const supabaseClient = window.supabaseClient

const urlParams = new URLSearchParams(window.location.search)
const tripId = urlParams.get("id")

/* ================= LOAD ================= */

async function loadTrip(){

const { data, error } = await supabaseClient
.from("trips")
.select("*")
.eq("id",tripId)
.single()

if(error || !data){
document.getElementById("tripInfo").innerHTML = "Trip not found"
return
}

document.getElementById("tripInfo").innerHTML=`

<b>Route:</b> ${data.route ?? "-"} <br><br>
<b>Truck:</b> ${data.truck ?? "-"} <br><br>
<b>Commodity:</b> ${data.commodity ?? "-"} <br><br>
<b>Weight:</b> ${data.weight_kg ?? "-"} KG <br><br>
<b>Status:</b> ${data.status ?? "-"}

`

/* 🔥 RBAC: CONTROL BUTTON */
const canEdit = await checkPermission("trips.html","edit")

if(!canEdit){
document.getElementById("completeBtn").style.display="none"
}

}

loadTrip()

/* ================= UPDATE ================= */

async function markComplete(){

const canEdit = await checkPermission("trips.html","edit")

if(!canEdit){
alert("No permission")
return
}

await supabaseClient
.from("trips")
.update({status:"Completed"})
.eq("id",tripId)

alert("Trip Completed")

location.reload()

}

</script>

<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
