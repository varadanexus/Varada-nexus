<!DOCTYPE html>
<html>

<head>
<title>Trips - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#1f3c88;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#162c66;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
}

input,select{
padding:8px;
margin:5px;
}

button{
padding:6px 12px;
border:none;
cursor:pointer;
background:#1f3c88;
color:white;
}

.editBtn{background:#5bc0de;}
.deleteBtn{background:#d9534f;}

</style>

</head>

<body>

<div class="sidebar">
<h2>Varada Nexus</h2>

<a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>
<a href="master-data.html">Master Data</a>
<a href="rate-entry.html">Rates</a>
</div>


<div class="main">

<h1>Trips</h1>

<div class="card">

<h3>Create Trip</h3>

<select id="route"></select>

<select id="truck"></select>

<select id="commodity"></select>

<input id="weight" placeholder="Weight (KG)">

<input id="tripDate" type="date">

<input id="status" placeholder="Status">

<button onclick="saveTrip()">Save Trip</button>

</div>


<input id="searchTrip" placeholder="Search Trip ID">
<button onclick="searchTrip()">Search</button>


<table>

<thead>
<tr>
<th>Trip ID</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Weight</th>
<th>Company Rate</th>
<th>Transporter Rate</th>
<th>Revenue</th>
<th>Transport Cost</th>
<th>Profit</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tripTable"></tbody>

</table>

</div>


<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

loadTrips()
loadRoutes()
loadTrucks()
loadCommodities()

/* ROUTES */

async function loadRoutes(){

const {data}=await supabaseClient.from("routes").select("*")

let html='<option value="">Select Route</option>'

data.forEach(r=>{
html+=`<option value="${r.route_code}">${r.route_code}</option>`
})

document.getElementById("route").innerHTML=html

}


/* TRUCKS */

async function loadTrucks(){

const {data}=await supabaseClient.from("trucks").select("*")

let html='<option value="">Select Truck</option>'

data.forEach(t=>{
html+=`<option value="${t.truck_number}">${t.truck_number}</option>`
})

document.getElementById("truck").innerHTML=html

}


/* COMMODITIES */

async function loadCommodities(){

const {data}=await supabaseClient.from("commodities").select("*")

let html='<option value="">Select Commodity</option>'

data.forEach(c=>{
html+=`<option value="${c.name}">${c.name}</option>`
})

document.getElementById("commodity").innerHTML=html

}


/* AUTO TRIP NUMBER */

async function generateTripNo(){

const now=new Date()

let year=now.getFullYear().toString().slice(-2)
let month=("0"+(now.getMonth()+1)).slice(-2)

const {data}=await supabaseClient
.from("trips")
.select("trip_no")
.ilike("trip_no","TR"+year+month+"%")

let seq=data.length+1

let seqStr=seq.toString().padStart(4,"0")

return "TR"+year+month+seqStr

}


/* SAVE TRIP */

async function saveTrip(){

let route=document.getElementById("route").value
let truck=document.getElementById("truck").value
let commodity=document.getElementById("commodity").value
let weight=document.getElementById("weight").value
let date=document.getElementById("tripDate").value
let status=document.getElementById("status").value

let mt = weight/1000

const {data:rate}=await supabaseClient
.from("rates")
.select("*")
.eq("route_id",route)
.single()

let companyRate=rate.company_rate_per_mt
let transporterRate=rate.transporter_rate_per_mt

let revenue = companyRate * mt
let transportCost = transporterRate * mt
let profit = revenue - transportCost

let tripNo=await generateTripNo()

await supabaseClient.from("trips").insert({

trip_no:tripNo,
route:route,
truck:truck,
commodity:commodity,
weight_kg:weight,
trip_date:date,
status:status,
company_rate:companyRate,
transporter_rate:transporterRate

})

loadTrips()

}


/* LOAD TRIPS */

async function loadTrips(){

const {data}=await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

let html=""

data.forEach(trip=>{

let mt=trip.weight_kg/1000

let revenue = trip.company_rate * mt
let cost = trip.transporter_rate * mt
let profit = revenue - cost

html+=`

<tr>

<td><b>${trip.trip_no}</b></td>

<td>${trip.route}</td>
<td>${trip.truck}</td>
<td>${trip.commodity}</td>

<td>${trip.weight_kg}</td>

<td>${trip.company_rate}</td>
<td>${trip.transporter_rate}</td>

<td>${revenue.toFixed(0)}</td>
<td>${cost.toFixed(0)}</td>
<td>${profit.toFixed(0)}</td>

<td>${trip.trip_date ?? ""}</td>
<td>${trip.status ?? ""}</td>

<td>
<button class="editBtn" onclick="editTrip('${trip.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTrip('${trip.id}')">Delete</button>
</td>

</tr>

`

})

document.getElementById("tripTable").innerHTML=html

}


/* SEARCH */

async function searchTrip(){

let text=document.getElementById("searchTrip").value

const {data}=await supabaseClient
.from("trips")
.select("*")
.ilike("trip_no","%"+text+"%")

renderTrips(data)

}


/* DELETE */

async function deleteTrip(id){

if(!confirm("Delete trip?")) return

await supabaseClient
.from("trips")
.delete()
.eq("id",id)

loadTrips()

}


/* EDIT */

async function editTrip(id){

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("id",id)
.single()

let weight=prompt("Edit Weight",data.weight_kg)

await supabaseClient
.from("trips")
.update({weight_kg:weight})
.eq("id",id)

loadTrips()

}

</script>

</body>
</html>
