async function loadTrips(){

const {data}=await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

let html=""

data.forEach(t=>{
html+=`
<tr>
<td>${t.trip_no}</td>
<td>${t.route}</td>
<td>${t.truck}</td>
<td>${t.commodity}</td>
<td>${t.weight_kg}</td>
</tr>
`
})

document.getElementById("tripTable").innerHTML=html

}
