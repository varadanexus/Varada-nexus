<!DOCTYPE html>
<html>

<head>

<title>Trips - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>
<script src="rbac.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.main{margin-left:220px;padding:30px;}
.card{background:white;padding:25px;border-radius:8px;margin-bottom:20px;}
.form-grid{display:grid;grid-template-columns: repeat(7,1fr);gap:12px;}
button{padding:8px 14px;background:#1f3c88;color:white;border:none;border-radius:4px;}
.editBtn{background:#5bc0de;}
.deleteBtn{background:#d9534f;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#eee;}
</style>

</head>

<body>

<script>
/* ✅ USE GLOBAL CLIENT */
const supabaseClient = window.supabaseClient
</script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(async data=>{
document.getElementById("sidebar-container").innerHTML=data
await new Promise(r => setTimeout(r, 200))
await initSidebar()

if(typeof applyMenuRBAC==="function"){
await applyMenuRBAC()
}
})

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId=session.user.id
const email=session.user.email

document.getElementById("userName").innerText=email.split("@")[0]

const {data:user}=await supabaseClient
.from("users").select("id").eq("auth_id",authId).single()

if(!user) return

const {data:userRole}=await supabaseClient
.from("user_roles").select("role_id").eq("user_id",user.id).single()

if(!userRole) return

const {data:role}=await supabaseClient
.from("roles").select("role_name").eq("id",userRole.role_id).single()

if(role){
document.getElementById("userRole").innerText=role.role_name
}

window.logout=async()=>{
await supabaseClient.auth.signOut()
window.location="login.html"
}
}
</script>

<div class="main">

<h2>Trips</h2>

<div class="card" id="createCard">

<h3>Create Trip</h3>

<div class="form-grid">
<select id="route"></select>
<select id="truck"></select>
<select id="commodity"></select>
<select id="client"></select>
<input id="weight" placeholder="Weight KG">
<input type="date" id="tripDate">
<select id="status">
<option value="">Status</option>
<option>LOADED</option>
<option>Completed</option>
<option>Pending</option>
</select>
</div>

<br>

<button id="addTripBtn" onclick="saveTrip()">Save Trip</button>

</div>

<table>
<thead>
<tr>
<th>Trip No</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Client</th>
<th>Weight</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tripTable"></tbody>
</table>

</div>

<script>

let routes=[], trucks=[], commodities=[], clients=[], trips=[]

init()

async function init(){
await loadRoutes()
await loadTrucks()
await loadCommodities()
await loadClients()
await loadTrips()

/* 🔥 APPLY RBAC AFTER LOAD */
setTimeout(applyTripsRBAC,500)
}

/* ================= RBAC ================= */

async function applyTripsRBAC(){

const page="trips.html"

/* CREATE */
const canCreate = await checkPermission(page,"create")
if(!canCreate){
document.getElementById("createCard").style.display="none"
}

/* EDIT */
const canEdit = await checkPermission(page,"edit")
if(!canEdit){
document.querySelectorAll(".editBtn").forEach(btn=>{
btn.disabled=true
btn.style.opacity="0.5"
})
}

/* DELETE */
const canDelete = await checkPermission(page,"delete")
if(!canDelete){
document.querySelectorAll(".deleteBtn").forEach(btn=>{
btn.style.display="none"
})
}

}

/* ================= LOADS ================= */

async function loadRoutes(){
const {data}=await supabaseClient.from("routes").select("*")
routes=data||[]
let html='<option value="">Route</option>'
routes.forEach(r=> html+=`<option value="${r.id}">${r.route_code}</option>`)
route.innerHTML=html
}

async function loadTrucks(){
const {data}=await supabaseClient.from("trucks").select("*")
trucks=data||[]
let html='<option value="">Truck</option>'
trucks.forEach(t=> html+=`<option value="${t.id}">${t.truck_number}</option>`)
truck.innerHTML=html
}

async function loadCommodities(){
const {data}=await supabaseClient.from("commodities").select("*")
commodities=data||[]
let html='<option value="">Commodity</option>'
commodities.forEach(c=> html+=`<option value="${c.id}">${c.name}</option>`)
commodity.innerHTML=html
}

async function loadClients(){
const {data}=await supabaseClient.from("clients").select("*")
clients=data||[]
let html='<option value="">Client</option>'
clients.forEach(c=> html+=`<option value="${c.id}">${c.company}</option>`)
client.innerHTML=html
}

/* ================= SAVE ================= */

async function saveTrip(){

const canCreate = await checkPermission("trips.html","create")
if(!canCreate){
alert("No permission to create")
return
}

/* existing logic unchanged */
let routeVal=route.value
let truckVal=truck.value
let commodityVal=commodity.value
let clientVal=client.value

await supabaseClient.from("trips").insert({
route:routes.find(r=>r.id==routeVal)?.route_code,
truck:trucks.find(t=>t.id==truckVal)?.truck_number,
commodity:commodities.find(c=>c.id==commodityVal)?.name,
client_name:clients.find(c=>c.id==clientVal)?.company
})

loadTrips()
}

/* ================= LOAD TABLE ================= */

async function loadTrips(){
const {data}=await supabaseClient.from("trips").select("*").order("created_at",{ascending:false})
trips=data||[]
renderTrips()
}

function renderTrips(){
let html=""
trips.forEach(t=>{
html+=`
<tr>
<td>${t.trip_no||""}</td>
<td>${t.route}</td>
<td>${t.truck}</td>
<td>${t.commodity}</td>
<td>${t.client_name}</td>
<td>${t.weight_kg||""}</td>
<td>${t.trip_date||""}</td>
<td>${t.status||""}</td>
<td>
<button class="editBtn" onclick="editTrip('${t.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTrip('${t.id}')">Delete</button>
</td>
</tr>`
})
tripTable.innerHTML=html
}

</script>

<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
