</style></head><body><script>const supabaseClient = supabase.createClient(

checkLogin()

</script><div id="sidebar-container"></div><script>

</script><div class="main"><h2>Trips</h2><div class="card"><h3>Create Trip</h3><div class="form-grid"><select id="route"></select>
<select id="truck"></select>
<select id="commodity"></select>

<input id="weight" placeholder="Weight KG"><input type="date" id="tripDate"><select id="status">
<option value="">Status</option>
<option>LOADED</option>
<option>Completed</option>
<option>Pending</option>
</select></div><br><button onclick="saveTrip()">Save Trip</button>

</div><div class="card"><input class="searchBox" id="searchTripNo" placeholder="Trip No"><select class="searchBox" id="searchRoute"></select>
<select class="searchBox" id="searchTruck"></select>
<select class="searchBox" id="searchCommodity"></select>

<button onclick="searchTrips()">Search</button>
<button onclick="clearSearch()">Clear</button>

</div><table><thead>
<tr>
<th>Trip No</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Weight</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead><tbody id="tripTable"></tbody></table><br><button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>
<button onclick="downloadPDF()">Download PDF</button>

</div><script>

let routes=[]
let trucks=[]
let commodities=[]
let trips=[]
let allTrips=[]

let page=1
let pageSize=10

init()

async function init(){

await loadRoutes()
await loadTrucks()
await loadCommodities()
await loadTrips()

}

/* ROUTES */

async function loadRoutes(){

const {data}=await supabaseClient.from("routes").select("*")

routes=data

let html='<option value="">Select Route</option>'
let search='<option value="">All Routes</option>'

data.forEach(r=>{
html+=`<option value="${r.id}">${r.route_code}</option>`
search+=`<option value="${r.route_code}">${r.route_code}</option>`
})

document.getElementById("route").innerHTML=html
document.getElementById("searchRoute").innerHTML=search

}

/* TRUCKS */

async function loadTrucks(){

const {data}=await supabaseClient.from("trucks").select("*")

trucks=data

let html='<option value="">Select Truck</option>'
let search='<option value="">All Trucks</option>'

data.forEach(t=>{
html+=`<option value="${t.id}">${t.truck_number}</option>`
search+=`<option value="${t.truck_number}">${t.truck_number}</option>`
})

document.getElementById("truck").innerHTML=html
document.getElementById("searchTruck").innerHTML=search

}

/* COMMODITIES */

async function loadCommodities(){

const {data}=await supabaseClient.from("commodities").select("*")

commodities=data

let html='<option value="">Select Commodity</option>'
let search='<option value="">All Commodities</option>'

data.forEach(c=>{
html+=`<option value="${c.id}">${c.name}</option>`
search+=`<option value="${c.name}">${c.name}</option>`
})

document.getElementById("commodity").innerHTML=html
document.getElementById("searchCommodity").innerHTML=search

}

/* GENERATE TRIP NUMBER */

async function generateTripNo(){

const now=new Date()

let year=now.getFullYear().toString().slice(-2)
let month=("0"+(now.getMonth()+1)).slice(-2)

const {data}=await supabaseClient
.from("trips")
.select("trip_no")
.ilike("trip_no","TR"+year+month+"%")

let seq=data.length+1

return "TR"+year+month+seq.toString().padStart(4,"0")

}

/* SAVE TRIP */

async function saveTrip(){

let routeId=document.getElementById("route").value
let truckId=document.getElementById("truck").value
let commodityId=document.getElementById("commodity").value

let weight=document.getElementById("weight").value
let date=document.getElementById("tripDate").value
let status=document.getElementById("status").value

let route=routes.find(r=>r.id==routeId)?.route_code
let truck=trucks.find(t=>t.id==truckId)?.truck_number
let commodity=commodities.find(c=>c.id==commodityId)?.name

let tripNo=await generateTripNo()

await supabaseClient.from("trips").insert({

trip_no:tripNo,
route:route,
truck:truck,
commodity:commodity,
weight_kg:weight,
trip_date:date,
status:status

})

/* CLEAR FORM */

document.getElementById("route").value=""
document.getElementById("truck").value=""
document.getElementById("commodity").value=""
document.getElementById("weight").value=""
document.getElementById("tripDate").value=""
document.getElementById("status").value=""

/* RELOAD TABLE */

loadTrips()

}

/* LOAD TRIPS */

async function loadTrips(){

const {data}=await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

trips=data
allTrips=data

renderTrips()

}

/* RENDER */

function renderTrips(){

let start=(page-1)*pageSize
let end=start+pageSize

let pageTrips=trips.slice(start,end)

let html=""

pageTrips.forEach(t=>{

html+=`
<tr>
<td>${t.trip_no || ""}</td>
<td>${t.route}</td>
<td>${t.truck}</td>
<td>${t.commodity}</td>
<td>${t.weight_kg}</td>
<td>${t.trip_date || ""}</td>
<td>${t.status || ""}</td>
<td>
<button class="editBtn" onclick="editTrip('${t.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTrip('${t.id}')">Delete</button>
</td>
</tr>
`

})

document.getElementById("tripTable").innerHTML=html

}

/* EDIT */

async function editTrip(id){

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("id",id)
.single()

let weight=prompt("Edit Weight",data.weight_kg)
let status=prompt("Enter Status (LOADED / Completed / Pending)",data.status)

await supabaseClient
.from("trips")
.update({
weight_kg:weight,
status:status
})
.eq("id",id)

loadTrips()

}

/* DELETE */

async function deleteTrip(id){

if(!confirm("Delete Trip?")) return

await supabaseClient.from("trips").delete().eq("id",id)

loadTrips()

}

/* SEARCH */

function searchTrips(){

let tripNo=document.getElementById("searchTripNo").value.toLowerCase()
let route=document.getElementById("searchRoute").value.toLowerCase()
let truck=document.getElementById("searchTruck").value.toLowerCase()
let commodity=document.getElementById("searchCommodity").value.toLowerCase()

trips=allTrips.filter(t=>

(!tripNo || (t.trip_no||"").toLowerCase().includes(tripNo)) &&
(!route || t.route.toLowerCase().includes(route)) &&
(!truck || t.truck.toLowerCase().includes(truck)) &&
(!commodity || t.commodity.toLowerCase().includes(commodity))

)

page=1
renderTrips()

}

function clearSearch(){

document.getElementById("searchTripNo").value=""
document.getElementById("searchRoute").value=""
document.getElementById("searchTruck").value=""
document.getElementById("searchCommodity").value=""

trips=allTrips
renderTrips()

}

/* PAGINATION */

function nextPage(){

if(page*pageSize<trips.length){
page++
renderTrips()
}

}

function prevPage(){

if(page>1){
page--
renderTrips()
}

}

/* PDF DOWNLOAD */

function downloadPDF(){

const { jsPDF } = window.jspdf

let doc = new jsPDF()

let start=(page-1)*pageSize
let end=start+pageSize

let pageTrips=trips.slice(start,end)

let rows=[]

pageTrips.forEach(t=>{
rows.push([
t.trip_no || "",
t.route,
t.truck,
t.commodity,
t.weight_kg,
t.trip_date || "",
t.status || ""
])
})

doc.text("Varada Nexus - Trip Report",14,15)

doc.autoTable({
head:[["Trip No","Route","Truck","Commodity","Weight","Date","Status"]],
body:rows,
startY:20
})

doc.save("trip-report.pdf")

}

/* LOGOUT */

async function logout(){

await supabaseClient.auth.signOut()

window.location.href="login.html"

}

</script></body>
</html>
