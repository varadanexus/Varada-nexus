<!DOCTYPE html>
<html>

<head>

.saveBtn{background:#5cb85c;}

table{width:100%;border-collapse:collapse;background:white;}

th,td{padding:10px;border-bottom:1px solid #ddd;}

th{background:#eee;text-align:left;}

.search-grid{
display:grid;
grid-template-columns: repeat(5,1fr);
gap:10px;
}

</style>
</head>

<body>

<div id="sidebar-container"></div>

<script>

fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data
})

</script>

<div class="main">

<h2>Trips</h2>

<div class="card">

<h3>Create Trip</h3>

<div class="form-grid">

<select id="route"></select>
<select id="truck"></select>
<select id="commodity"></select>
<select id="client"></select>

<input id="weight" placeholder="Weight KG">

<input type="date" id="tripDate">

<select id="status">
<option value="">Status</option>
<option>LOADED</option>
<option>Completed</option>
<option>Pending</option>
</select>

</div>

<br>

<button onclick="saveTrip()">Save Trip</button>

</div>

<div class="card">

<h3>Search Trips</h3>

<div class="search-grid">

<input id="searchTripNo" placeholder="Trip No">

<select id="searchRoute">
<option value="">All Routes</option>
</select>

<select id="searchTruck">
<option value="">All Trucks</option>
</select>

<select id="searchCommodity">
<option value="">All Commodities</option>
</select>

<div>
<button onclick="searchTrips()">Search</button>
<button onclick="clearSearch()">Clear</button>
</div>

</div>

<br>

<button onclick="downloadSearchPDF()">Download Search PDF</button>

</div>

<table>

<thead>

<tr>
<th>Trip No</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Client</th>
<th>Weight</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tripTable"></tbody>

</table>

</div>

<script>

let routes=[]
let trucks=[]
let commodities=[]
let clients=[]
let trips=[]
let allTrips=[]

init()

async function init(){

await loadRoutes()
await loadTrucks()
await loadCommodities()
await loadClients()
await loadTrips()

}

/* TRIP NUMBER GENERATOR */

async function generateTripNumber(){

let today=new Date()

let year=today.getFullYear().toString().slice(-2)
let month=("0"+(today.getMonth()+1)).slice(-2)

let prefix=`TR${year}${month}`

const {data}=await supabaseClient
.from("trips")
.select("trip_no")
.ilike("trip_no",`${prefix}%`)
.order("trip_no",{ascending:false})
.limit(1)

let seq="0001"

if(data && data.length>0){

let last=data[0].trip_no.slice(-4)
seq=(parseInt(last)+1).toString().padStart(4,"0")

}

return prefix+seq

}

async function loadRoutes(){

const {data}=await supabaseClient.from("routes").select("*")
routes=data||[]

let html='<option value="">Route</option>'
let search='<option value="">All Routes</option>'

routes.forEach(r=>{
html+=`<option value="${r.id}">${r.route_code}</option>`
search+=`<option value="${r.route_code}">${r.route_code}</option>`
})

document.getElementById("route").innerHTML=html
document.getElementById("searchRoute").innerHTML=search

}

async function loadTrucks(){

const {data}=await supabaseClient.from("trucks").select("*")
trucks=data||[]

let html='<option value="">Truck</option>'
let search='<option value="">All Trucks</option>'

trucks.forEach(t=>{
html+=`<option value="${t.id}">${t.truck_number}</option>`
search+=`<option value="${t.truck_number}">${t.truck_number}</option>`
})

document.getElementById("truck").innerHTML=html
document.getElementById("searchTruck").innerHTML=search

}

async function loadCommodities(){

const {data}=await supabaseClient.from("commodities").select("*")
commodities=data||[]

let html='<option value="">Commodity</option>'
let search='<option value="">All Commodities</option>'

commodities.forEach(c=>{
html+=`<option value="${c.id}">${c.name}</option>`
search+=`<option value="${c.name}">${c.name}</option>`
})

document.getElementById("commodity").innerHTML=html
document.getElementById("searchCommodity").innerHTML=search

}

async function loadClients(){

const {data}=await supabaseClient.from("clients").select("*")
clients=data||[]

let html='<option value="">Client</option>'

clients.forEach(c=>{
html+=`<option value="${c.id}">${c.company}</option>`
})

document.getElementById("client").innerHTML=html

}

/* SAVE TRIP */

async function saveTrip(){

let route=document.getElementById("route").value
let truck=document.getElementById("truck").value
let commodity=document.getElementById("commodity").value
let client=document.getElementById("client").value
let weight=document.getElementById("weight").value
let date=document.getElementById("tripDate").value
let status=document.getElementById("status").value

let tripNo = await generateTripNumber()

await supabaseClient.from("trips").insert({

trip_no:tripNo,

route:routes.find(r=>r.id==route)?.route_code,
truck:trucks.find(t=>t.id==truck)?.truck_number,
commodity:commodities.find(c=>c.id==commodity)?.name,
client_name:clients.find(c=>c.id==client)?.company,
weight_kg:Number(weight),
trip_date:date,
status:status

})

loadTrips()

}

async function loadTrips(){

const {data}=await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

trips=data
allTrips=data

renderTrips()

}

function renderTrips(){

let html=""

trips.forEach(t=>{

html+=`
<tr id="row_${t.id}">

<td>${t.trip_no}</td>
<td>${t.route}</td>
<td>${t.truck}</td>
<td>${t.commodity}</td>
<td>${t.client_name}</td>
<td>${t.weight_kg}</td>
<td>${t.trip_date}</td>
<td>${t.status}</td>

<td>

<button class="editBtn" onclick="editTrip('${t.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTrip('${t.id}')">Delete</button>

</td>

</tr>
`

})

document.getElementById("tripTable").innerHTML=html

}

function editTrip(id){

let row=document.getElementById("row_"+id)
let t=trips.find(x=>x.id==id)

row.innerHTML=`

<td>${t.trip_no}</td>
<td><input id="route_${id}" value="${t.route}"></td>
<td><input id="truck_${id}" value="${t.truck}"></td>
<td><input id="commodity_${id}" value="${t.commodity}"></td>
<td><input id="client_${id}" value="${t.client_name}"></td>
<td><input id="weight_${id}" value="${t.weight_kg}"></td>
<td><input type="date" id="date_${id}" value="${t.trip_date}"></td>
<td><input id="status_${id}" value="${t.status}"></td>

<td>
<button class="saveBtn" onclick="saveEdit('${id}')">Save</button>
<button class="deleteBtn" onclick="deleteTrip('${id}')">Delete</button>
</td>

`

}

async function saveEdit(id){

await supabaseClient
.from("trips")
.update({

route:document.getElementById("route_"+id).value,
truck:document.getElementById("truck_"+id).value,
commodity:document.getElementById("commodity_"+id).value,
client_name:document.getElementById("client_"+id).value,
weight_kg:Number(document.getElementById("weight_"+id).value),
trip_date:document.getElementById("date_"+id).value,
status:document.getElementById("status_"+id).value

})
.eq("id",id)

loadTrips()

}

async function deleteTrip(id){

if(!confirm("Delete trip?")) return

await supabaseClient.from("trips").delete().eq("id",id)

loadTrips()

}

/* SEARCH */

function searchTrips(){

let trip=document.getElementById("searchTripNo").value.toLowerCase()
let route=document.getElementById("searchRoute").value
let truck=document.getElementById("searchTruck").value
let commodity=document.getElementById("searchCommodity").value

trips=allTrips.filter(t=>

(!trip || t.trip_no.toLowerCase().includes(trip)) &&
(!route || t.route==route) &&
(!truck || t.truck==truck) &&
(!commodity || t.commodity==commodity)

)

renderTrips()

}

function clearSearch(){

trips=allTrips
renderTrips()

}

/* DOWNLOAD SEARCH RESULT */

function downloadSearchPDF(){

const { jsPDF } = window.jspdf
let doc=new jsPDF()

let y=20

doc.text("Trips Report",20,y)
y+=10

trips.forEach(t=>{

doc.text(`${t.trip_no} | ${t.route} | ${t.truck} | ${t.commodity} | ${t.client_name} | ${t.weight_kg}`,20,y)
y+=8

})

doc.save("Trips_Report.pdf")

}

</script>
