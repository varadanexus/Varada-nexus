<!DOCTYPE html>
<html>

<head>

<title>Trips - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session-check.js"></script>
<script src="rbac.js"></script>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0a0f1c;
color:#e5e7eb;
}

.main{
margin-left:220px;
padding:24px;
}

h2{
font-size:20px;
margin-bottom:12px;
}

/* CARD */
.card{
background:#111827;
padding:20px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.04);
margin-bottom:20px;
}

/* FORM GRID */
.form-grid{
display:grid;
grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

/* INPUTS */
input, select{
background:#0f172a;
border:1px solid rgba(255,255,255,0.05);
color:white;
padding:8px;
border-radius:6px;
}

/* BUTTON */
button{
padding:8px 14px;
background:#3b82f6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:#111827;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

th{
color:#9ca3af;
font-size:12px;
}

/* ACTION BUTTONS */
.editBtn{background:#0ea5e9;}
.deleteBtn{background:#ef4444;}
</style>

</head>

<body>


<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{

document.getElementById("sidebar-container").innerHTML = data

const sidebar = document.getElementById("sidebar")
if(sidebar){
    sidebar.style.display = "none"   // 🔥 hide initially
}

setTimeout(async ()=>{

    console.log("🔥 Sidebar injected")

    /* ✅ STEP 1: RBAC FIRST (LIKE OLD SYSTEM) */
    if(typeof applyMenuRBAC === "function"){
        await applyMenuRBAC()
        console.log("✅ RBAC applied")
    }

    /* ✅ STEP 2: USER INIT */
    await initSidebar()
    console.log("✅ User initialized")

    /* ✅ STEP 3: ACTIVE MENU */
    setActiveMenu()
    console.log("✅ Active menu applied")

    /* ✅ STEP 4: ICONS */
    if(window.lucide){
        lucide.createIcons()
    }

    /* ✅ STEP 5: SHOW SIDEBAR */
    if(sidebar){
        sidebar.style.display = "block"
    }

},200)

})

async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId=session.user.id
const email=session.user.email

document.getElementById("userName").innerText=email.split("@")[0]

const {data:user}=await supabaseClient
.from("users").select("id").eq("auth_id",authId).single()

if(!user) return

const {data:userRole}=await supabaseClient
.from("user_roles").select("role_id").eq("user_id",user.id).single()

if(!userRole) return

const {data:role}=await supabaseClient
.from("roles").select("role_name").eq("id",userRole.role_id).single()

if(role){
const roleEl = document.getElementById("userRole")
if(roleEl){
    roleEl.innerText = role.role_name
}
}

window.logout=async()=>{
await supabaseClient.auth.signOut()
window.location="login.html"
}
}
</script>

<div class="main">

<h2>Trips</h2>

<div class="card" id="createCard">

<h3>Create Trip</h3>

<div class="form-grid">
<select id="route"></select>
<select id="truck"></select>
<select id="commodity"></select>
<select id="client"></select>

<input id="weight" placeholder="Weight KG">
<input type="date" id="tripDate">
<select id="status">
<option value="">Status</option>
<option>LOADED</option>
<option>Completed</option>
<option>Pending</option>
</select>

<!-- 🔥 ADD THESE 2 FIELDS -->
<input id="clientRate" placeholder="Client Rate" readonly>
<input id="transporterRate" placeholder="Transporter Rate" readonly>

</div>

<br>

<button id="addTripBtn" onclick="saveTrip()">Save Trip</button>

</div>

<table>
<thead>
<tr>
<th>Trip No</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Client</th>
<th>Weight</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tripTable"></tbody>
</table>

</div>

<script>

let routes=[], trucks=[], commodities=[], clients=[], trips=[]

init()

async function init(){
await loadRoutes()
await loadTrucks()
await loadCommodities()
await loadClients()

const canCreate = await checkPermission("trips.html","create")
if(!canCreate){
document.getElementById("createCard").style.display="none"
}

await loadTrips()
}

/* ================= LOADS ================= */

async function loadRoutes(){
const {data}=await supabaseClient.from("routes").select("*")
routes=data||[]
route.innerHTML='<option value="">Route</option>' +
routes.map(r=>`<option value="${r.id}">${r.route_code}</option>`).join("")
}

async function loadTrucks(){
const {data}=await supabaseClient.from("trucks").select("*")
trucks=data||[]
truck.innerHTML='<option value="">Truck</option>' +
trucks.map(t=>`<option value="${t.id}">${t.truck_number}</option>`).join("")
}

async function loadCommodities(){
const {data}=await supabaseClient.from("commodities").select("*")
commodities=data||[]
commodity.innerHTML='<option value="">Commodity</option>' +
commodities.map(c=>`<option value="${c.id}">${c.name}</option>`).join("")
}

async function loadClients(){
const {data}=await supabaseClient.from("clients").select("*")
clients=data||[]
client.innerHTML='<option value="">Client</option>' +
clients.map(c=>`<option value="${c.id}">${c.company}</option>`).join("")
}

async function fetchRates(){

let routeId = route.value
let truckId = truck.value
let commodityId = commodity.value

if(!routeId || !truckId || !commodityId) return

/* GET TRANSPORTER FROM TRUCK */
let selectedTruck = trucks.find(t=>t.id==truckId)
if(!selectedTruck) return

let transporterId = selectedTruck.transporter_id

/* FETCH FROM RATES TABLE */
const {data,error} = await supabaseClient
.from("rates")
.select("*")
.eq("route_id", routeId)
.eq("transporter_id", transporterId)
.eq("commodity_id", commodityId)
.single()

if(error || !data){
document.getElementById("clientRate").value=""
document.getElementById("transporterRate").value=""
return
}

/* SET VALUES */
document.getElementById("clientRate").value = data.company_rate_per_mt || ""
document.getElementById("transporterRate").value = data.transporter_rate_per_mt || ""
}
  
async function generateTripNo(){

let today = new Date()
let year = String(today.getFullYear()).slice(2)
let month = String(today.getMonth()+1).padStart(2,'0')

let prefix = `TR${year}${month}`

const {data} = await supabaseClient
.from("trips")
.select("trip_no")
.ilike("trip_no", `${prefix}%`)
.order("trip_no",{ascending:false})
.limit(1)

let next = 1

if(data && data.length){
let last = data[0].trip_no
let num = parseInt(last.slice(-3))
next = num + 1
}

return prefix + String(next).padStart(3,'0')
}

route.addEventListener("change", fetchRates)
truck.addEventListener("change", fetchRates)
commodity.addEventListener("change", fetchRates)
  
/* ================= SAVE ================= */

async function saveTrip(){

const canCreate = await checkPermission("trips.html","create")
if(!canCreate){
alert("No permission")
return
}

/* GET VALUES */
let routeId = route.value
let truckId = truck.value
let commodityId = commodity.value
let clientId = client.value

let weightVal = document.getElementById("weight").value
let dateVal = document.getElementById("tripDate").value
let statusVal = document.getElementById("status").value

/* VALIDATION */
if(!routeId || !truckId || !commodityId || !clientId){
alert("Fill all dropdowns")
return
}

/* FETCH RELATED DATA */
let selectedRoute = routes.find(r=>r.id==routeId)
let selectedTruck = trucks.find(t=>t.id==truckId)



let selectedCommodity = commodities.find(c=>c.id==commodityId)
let selectedClient = clients.find(c=>c.id==clientId)
  
/* AUTO TRIP NO */
let tripNo = await generateTripNo()


let weightMT = (parseFloat(weightVal) || 0) / 1000
let companyRate = parseFloat(document.getElementById("clientRate").value) || 0
let transporterRate = parseFloat(document.getElementById("transporterRate").value) || 0

let totalAmount = weightMT * companyRate

const {data:trip, error} = await supabaseClient
.from("trips")
.insert({
trip_no: tripNo,

route: selectedRoute?.route_code,
truck: selectedTruck?.truck_number,
commodity: selectedCommodity?.name,
client_name: selectedClient?.company,
transporter_id: selectedTruck?.transporter_id,

route_id: routeId,
truck_id: truckId,
commodity_id: commodityId,
client_id: clientId,

weight_kg: weightVal,
trip_date: dateVal,
status: statusVal,

company_rate: companyRate,
transporter_rate: transporterRate,

/* NEW FIELDS */
load_mt: weightMT,
rate: companyRate,
total_amount: totalAmount

})
.select()
.single()

if(error){
console.error(error)
alert("Error saving ❌")
return
}

/* 🔥 PASTE HERE — EXACTLY HERE */

const {data:maps} = await supabaseClient
.from("truck_agents")
.select("*")
.eq("truck_id", truckId)

if(!maps || maps.length === 0){
  console.log("No agents mapped to this truck")
}

for(let m of maps){

if(!m.commission_type || !m.commission_value){
  console.error("❌ Invalid agent config:", m)
  continue
}

let commissionAmount = 0

if(m.commission_type === "per_mt"){
commissionAmount = weightMT * m.commission_value
}

if(m.commission_type === "percentage"){
let profit = (companyRate - transporterRate) * weightMT
commissionAmount = (profit * m.commission_value) / 100
}

/* 1️⃣ SAVE MAPPING (UNCHANGED) */
const {error:agentError} = await supabaseClient.from("trip_agents").insert({
trip_id: trip.id,
agent_id: m.agent_id,
commission_type: m.commission_type,
commission_value: m.commission_value,
commission_amount: commissionAmount
})

if(agentError){
console.error("Agent insert error:", agentError)
}

/* 🔥 2️⃣ ADD THIS — LEDGER ENTRY (IMPORTANT) */
const {error:ledgerError} = await supabaseClient
.from("agent_trip_ledger")
.insert({
  agent_id: m.agent_id,
  trip_id: trip.id,
  commission_type: m.commission_type,   // ✅ ADD THIS
  commission_value: m.commission_value, // ✅ ADD THIS
  commission_amount: commissionAmount,
  created_at: new Date().toISOString()
})

if(ledgerError){
  console.error("Ledger insert error:", ledgerError)
}

}
  

alert("Trip Saved ✅")

/* CLEAR FORM */
route.value=""
truck.value=""
commodity.value=""
client.value=""
document.getElementById("weight").value=""
document.getElementById("tripDate").value=""
document.getElementById("status").value=""
document.getElementById("clientRate").value=""
document.getElementById("transporterRate").value=""

/* RELOAD */
loadTrips()
}
/* ================= TABLE ================= */

/* 🔥 FINAL FIXED FUNCTION */
async function loadTrips(){

const { data:{session} } = await supabaseClient.auth.getSession()
if(!session) return

const authId = session.user.id

/* GET USER */
const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

/* GET ROLES */
const {data:userRoles} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)

let roleIds = (userRoles || []).map(r=>r.role_id)

/* GET ROLE NAMES */
const {data:rolesData} = await supabaseClient
.from("roles")
.select("role_name")
.in("id", roleIds)

let roleNames = (rolesData || []).map(r=>r.role_name.toLowerCase())

const isTransporter = roleNames.some(r =>
r.includes("customer") || r.includes("transporter")
)

/* 🚀 FILTER */

if(isTransporter){

const {data:transporter} = await supabaseClient
.from("transporters")
.select("id")
.eq("auth_id", authId)
.single()

if(!transporter){
trips=[]
renderTrips()
return
}

const {data} = await supabaseClient
.from("trips")
.select("*")
.eq("transporter_id", transporter.id)
.order("created_at",{ascending:false})

trips = data || []

}else{

const {data} = await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

trips = data || []

}

await renderTrips()
}

function setActiveMenu(){

    let currentPage = window.location.pathname.split("/").pop()

    document.querySelectorAll("#sidebar a").forEach(link=>{

        let page = link.getAttribute("data-page")

        if(page === currentPage){
            link.classList.add("active")
        }

    })

}
    
/* 🔥 NO FLICKER RBAC */

async function renderTrips(){

const canEdit = await checkPermission("trips.html","edit")
const canDelete = await checkPermission("trips.html","delete")

let html=""

trips.forEach(t=>{
html+=`
<tr id="row_${t.id}">
<td>${t.trip_no||""}</td>
<td>${t.route}</td>
<td>${t.truck}</td>
<td>${t.commodity}</td>
<td>${t.client_name}</td>
<td>${t.weight_kg||""}</td>
<td>${t.trip_date||""}</td>
<td>${t.status||""}</td>
<td>

${canEdit ? `<button class="editBtn" onclick="editTrip('${t.id}')">Edit</button>` : ""}

${canDelete ? `<button class="deleteBtn" onclick="deleteTrip('${t.id}')">Delete</button>` : ""}

</td>
</tr>`
})

tripTable.innerHTML=html
}

/* ================= EDIT ================= */

async function editTrip(id){

const canEdit = await checkPermission("trips.html","edit")
if(!canEdit){
alert("No permission to edit")
return
}

let row = document.getElementById("row_"+id)
let t = trips.find(x=>x.id==id)

row.innerHTML = `
<td>${t.trip_no}</td>
<td><input id="route_${id}" value="${t.route}"></td>
<td><input id="truck_${id}" value="${t.truck}"></td>
<td><input id="commodity_${id}" value="${t.commodity}"></td>
<td><input id="client_${id}" value="${t.client_name}"></td>
<td><input id="weight_${id}" value="${t.weight_kg}"></td>
<td><input id="date_${id}" value="${t.trip_date}"></td>
<td><input id="status_${id}" value="${t.status}"></td>
<td>
<button onclick="updateTrip('${id}')">Save</button>
</td>
`
}

/* ================= DELETE ================= */

async function deleteTrip(id){

const canDelete = await checkPermission("trips.html","delete")
if(!canDelete){
alert("No permission to delete")
return
}

if(!confirm("Delete this trip?")) return

/* 1️⃣ DELETE CHILD TABLES FIRST */
await supabaseClient.from("trip_agents").delete().eq("trip_id", id)

await supabaseClient.from("agent_trip_ledger").delete().eq("trip_id", id)

/* 2️⃣ DELETE MAIN TRIP */
await supabaseClient.from("trips").delete().eq("id",id)

alert("Trip deleted ✅")

loadTrips()

}

function forceActiveMenu(){

    let currentPage = window.location.pathname.split("/").pop()

    document.querySelectorAll("#sidebar a").forEach(link=>{
        let page = link.getAttribute("data-page")
        if(page === currentPage){
            link.classList.add("active")
        }
    })

}
  
/* ================= UPDATE ================= */

async function updateTrip(id){

const canEdit = await checkPermission("trips.html","edit")
if(!canEdit){
alert("No permission to edit")
return
}

let updatedData = {
route: document.getElementById(`route_${id}`).value,
truck: document.getElementById(`truck_${id}`).value,
commodity: document.getElementById(`commodity_${id}`).value,
client_name: document.getElementById(`client_${id}`).value,
weight_kg: document.getElementById(`weight_${id}`).value,
trip_date: document.getElementById(`date_${id}`).value,
status: document.getElementById(`status_${id}`).value
}

const {error} = await supabaseClient
.from("trips")
.update(updatedData)
.eq("id", id)

if(error){
console.error(error)
alert("Error updating trip ❌")
return
}

alert("Trip updated ✅")

loadTrips()
}

</script>

<script src="menu-rbac.js"></script>
<script src="global-logout.js"></script>

</body>
</html>
