<!DOCTYPE html><html><head><title>Trips - Varada Nexus ERP</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#1f3c88;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#162c66;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
padding:8px;
margin:5px;
width:200px;
}

button{
padding:6px 12px;
border:none;
cursor:pointer;
}

.saveBtn{background:#1f3c88;color:white;}
.editBtn{background:#5bc0de;color:white;}
.deleteBtn{background:#d9534f;color:white;}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
}

.resultBox{
font-weight:bold;
margin-top:10px;
}

</style></head><body><div class="sidebar"><h2>Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>
<a href="master-data.html">Master Data</a>
<a href="rate-entry.html">Rates</a>

</div><div class="main"><h1>Trips</h1><div class="card"><h3>Create Trip</h3><select id="commodity"></select>
<select id="route"></select>
<select id="truck"></select>

<br><input id="weightKg" placeholder="Weight (KG)" oninput="calculateAmounts()"><div class="resultBox">
Company Amount: <span id="companyAmount">0</span>
</div><div class="resultBox">
Transporter Amount: <span id="transporterAmount">0</span>
</div><div class="resultBox">
Profit: <span id="profitAmount">0</span>
</div><br><button class="saveBtn" onclick="saveTrip()">Save Trip</button>

</div><div class="card"><h3>Search Trips</h3><input id="searchCommodity" placeholder="Commodity">
<input id="searchRoute" placeholder="Route">
<input id="searchTruck" placeholder="Truck"><button onclick="loadTrips()">Search</button>

</div><table><thead><tr>
<th>Commodity</th>
<th>Route</th>
<th>Truck</th>
<th>Weight KG</th>
<th>Company</th>
<th>Transporter</th>
<th>Profit</th>
<th>Action</th>
</tr></thead><tbody id="tripTable"></tbody></table></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

let companyRate=0
let transporterRate=0

init()

async function init(){

await loadDropdowns()
loadTrips()

}

/* LOAD DROPDOWNS */

async function loadDropdowns(){

let {data:commodities}=await supabaseClient.from("commodities").select("*")
let {data:routes}=await supabaseClient.from("routes").select("*")
let {data:trucks}=await supabaseClient.from("trucks").select("*")

commodity.innerHTML='<option value="">Commodity</option>'
route.innerHTML='<option value="">Route</option>'
truck.innerHTML='<option value="">Truck</option>'

commodities.forEach(c=>{
commodity.innerHTML+=`<option value="${c.id}">${c.name}</option>`
})

routes.forEach(r=>{
route.innerHTML+=`<option value="${r.id}">${r.route_code}</option>`
})

trucks.forEach(t=>{
truck.innerHTML+=`<option value="${t.id}">${t.truck_id}</option>`
})

}

/* FETCH RATE */

async function getRate(){

let commodityId=commodity.value
let routeId=route.value
let truckId=truck.value

if(!commodityId || !routeId || !truckId) return

let {data:truckData}=await supabaseClient
.from("trucks")
.select("transporter_id")
.eq("id",truckId)
.single()

let transporterId=truckData.transporter_id

let {data:rateData}=await supabaseClient
.from("rates")
.select("*")
.eq("commodity_id",commodityId)
.eq("route_id",routeId)
.eq("transporter_id",transporterId)
.single()

if(rateData){

companyRate=rateData.company_rate_per_mt
transporterRate=rateData.transporter_rate_per_mt

}

}

/* CALCULATE */

async function calculateAmounts(){

await getRate()

let kg=document.getElementById("weightKg").value
if(!kg) return

let mt=kg/1000

let company=mt*companyRate
let transporter=mt*transporterRate
let profit=company-transporter

document.getElementById("companyAmount").innerText=Math.round(company)
document.getElementById("transporterAmount").innerText=Math.round(transporter)
document.getElementById("profitAmount").innerText=Math.round(profit)

}

/* SAVE TRIP */

async function saveTrip(){

let commodityId=commodity.value
let routeId=route.value
let truckId=truck.value
let kg=document.getElementById("weightKg").value

let mt=kg/1000

let company=mt*companyRate
let transporter=mt*transporterRate
let profit=company-transporter

await supabaseClient.from("trips").insert({

commodity_id:commodityId,
route_id:routeId,
truck_id:truckId,
weight_kg:kg,
company_amount:company,
transporter_amount:transporter,
profit:profit

})

document.getElementById("weightKg").value=""

loadTrips()

}

/* LOAD TRIPS */

async function loadTrips(){

let commoditySearch=document.getElementById("searchCommodity").value.toLowerCase()
let routeSearch=document.getElementById("searchRoute").value.toLowerCase()
let truckSearch=document.getElementById("searchTruck").value.toLowerCase()

let {data}=await supabaseClient.from("trips").select("*")

let html=""

for(let t of data){

let {data:c}=await supabaseClient.from("commodities").select("name").eq("id",t.commodity_id).single()
let {data:r}=await supabaseClient.from("routes").select("route_code").eq("id",t.route_id).single()
let {data:tr}=await supabaseClient.from("trucks").select("truck_id").eq("id",t.truck_id).single()

let commodity=c?.name ?? ""
let route=r?.route_code ?? ""
let truck=tr?.truck_id ?? ""

if(
commodity.toLowerCase().includes(commoditySearch) &&
route.toLowerCase().includes(routeSearch) &&
truck.toLowerCase().includes(truckSearch)
){

html+=`

<tr>

<td>${commodity}</td>
<td>${route}</td>
<td>${truck}</td>
<td>${t.weight_kg}</td>
<td>${Math.round(t.company_amount)}</td>
<td>${Math.round(t.transporter_amount)}</td>
<td>${Math.round(t.profit)}</td>

<td>

<button class="editBtn" onclick="editTrip('${t.id}','${t.weight_kg}')">Edit</button>

<button class="deleteBtn" onclick="deleteTrip('${t.id}')">Delete</button>

</td>

</tr>

`

}

}

document.getElementById("tripTable").innerHTML=html

}

/* DELETE */

async function deleteTrip(id){

if(!confirm("Delete trip?")) return

await supabaseClient
.from("trips")
.delete()
.eq("id",id)

loadTrips()

}

/* EDIT */

async function editTrip(id,weight){

let newWeight=prompt("Edit Weight (KG)",weight)

if(!newWeight) return

await supabaseClient
.from("trips")
.update({weight_kg:newWeight})
.eq("id",id)

loadTrips()

}

</script></body>
</html>
