<!DOCTYPE html>
<html>
<head>

<title>Trips - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
position:fixed;
width:220px;
height:100%;
background:#1f3c88;
color:white;
padding-top:20px;
}

.sidebar a{
display:block;
padding:12px 20px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#162c66;
}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

input,select{
padding:8px;
margin:5px;
}

button{
padding:6px 12px;
border:none;
cursor:pointer;
background:#1f3c88;
color:white;
}

.editBtn{background:#5bc0de;}
.deleteBtn{background:#d9534f;}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

.pagination button{
margin:5px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2 style="padding-left:20px;">Varada Nexus</h2>

<a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>
<a href="master-data.html">Master Data</a>
<a href="rate-entry.html">Rates</a>

</div>


<div class="main">

<h2>Trips</h2>

<div class="card">

<h3>Create Trip</h3>

<select id="route"></select>
<select id="truck"></select>
<select id="commodity"></select>

<input id="weight" placeholder="Weight (KG)">
<input type="date" id="tripDate">
<input id="status" placeholder="Status">

<button onclick="saveTrip()">Save Trip</button>

</div>


<div class="card">

<input id="searchTrip" placeholder="Search Trip ID">

<select id="filterRoute"></select>
<select id="filterTruck"></select>
<select id="filterCommodity"></select>

<button onclick="applyFilters()">Filter</button>
<button onclick="clearFilters()">Clear</button>

</div>


<table>

<thead>

<tr>

<th>Trip ID</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Weight</th>
<th>Expense</th>
<th>Company Rate</th>
<th>Transporter Rate</th>
<th>Revenue</th>
<th>Transport Cost</th>
<th>Profit</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="tripTable"></tbody>

</table>

<div class="pagination">

<button onclick="prevPage()">Previous</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">Next</button>

</div>

</div>


<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

let routes=[]
let trucks=[]
let commodities=[]
let trips=[]

let currentPage=1
let pageSize=10

init()

async function init(){

await loadRoutes()
await loadTrucks()
await loadCommodities()
await loadTrips()

}

/* ROUTES */

async function loadRoutes(){

const {data}=await supabaseClient.from("routes").select("*")

routes=data

let html='<option value="">Select Route</option>'
let filter='<option value="">All Routes</option>'

data.forEach(r=>{
html+=`<option value="${r.id}">${r.route_code}</option>`
filter+=`<option value="${r.route_code}">${r.route_code}</option>`
})

document.getElementById("route").innerHTML=html
document.getElementById("filterRoute").innerHTML=filter

}

/* TRUCKS */

async function loadTrucks(){

const {data}=await supabaseClient.from("trucks").select("*")

trucks=data

let html='<option value="">Select Truck</option>'
let filter='<option value="">All Trucks</option>'

data.forEach(t=>{
html+=`<option value="${t.id}">${t.truck_number}</option>`
filter+=`<option value="${t.truck_number}">${t.truck_number}</option>`
})

document.getElementById("truck").innerHTML=html
document.getElementById("filterTruck").innerHTML=filter

}

/* COMMODITIES */

async function loadCommodities(){

const {data}=await supabaseClient.from("commodities").select("*")

commodities=data

let html='<option value="">Select Commodity</option>'
let filter='<option value="">All Commodities</option>'

data.forEach(c=>{
html+=`<option value="${c.id}">${c.name}</option>`
filter+=`<option value="${c.name}">${c.name}</option>`
})

document.getElementById("commodity").innerHTML=html
document.getElementById("filterCommodity").innerHTML=filter

}

/* GENERATE TRIP ID */

async function generateTripNo(){

const now=new Date()

let year=now.getFullYear().toString().slice(-2)
let month=("0"+(now.getMonth()+1)).slice(-2)

const {data}=await supabaseClient
.from("trips")
.select("trip_no")
.ilike("trip_no","TR"+year+month+"%")

let seq=data.length+1
let seqStr=seq.toString().padStart(4,"0")

return "TR"+year+month+seqStr

}

/* SAVE TRIP */

async function saveTrip(){

let routeId=document.getElementById("route").value
let truckId=document.getElementById("truck").value
let commodityId=document.getElementById("commodity").value

let weight=document.getElementById("weight").value
let date=document.getElementById("tripDate").value
let status=document.getElementById("status").value

let route=routes.find(r=>r.id==routeId).route_code
let truck=trucks.find(t=>t.id==truckId).truck_number
let commodity=commodities.find(c=>c.id==commodityId).name

let transporterId=trucks.find(t=>t.id==truckId).transporter_id

const {data:rate}=await supabaseClient
.from("rates")
.select("*")
.eq("commodity_id",commodityId)
.eq("route_id",routeId)
.eq("transporter_id",transporterId)
.single()

if(!rate){
alert("Rate not defined")
return
}

let tripNo=await generateTripNo()

await supabaseClient.from("trips").insert({

trip_no:tripNo,
route:route,
truck:truck,
commodity:commodity,
weight_kg:weight,
trip_date:date,
status:status,
company_rate:rate.company_rate_per_mt,
transporter_rate:rate.transporter_rate_per_mt

})

loadTrips()

}

/* LOAD TRIPS */

async function loadTrips(){

const {data}=await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

trips=data

renderTrips()

}

/* RENDER TRIPS */

async function renderTrips(){

const {data:expenses}=await supabaseClient
.from("expenses")
.select("trip,amount")

let expenseMap={}

expenses.forEach(e=>{
if(!expenseMap[e.trip]) expenseMap[e.trip]=0
expenseMap[e.trip]+=Number(e.amount)
})

let start=(currentPage-1)*pageSize
let end=start+pageSize

let pageTrips=trips.slice(start,end)

let html=""

pageTrips.forEach(trip=>{

let mt=trip.weight_kg/1000
let expense=expenseMap[trip.trip_no]||0

let revenue=(trip.company_rate*mt)-expense
let cost=(trip.transporter_rate*mt)-expense
let profit=revenue-cost

html+=`

<tr>

<td><b>${trip.trip_no}</b></td>
<td>${trip.route}</td>
<td>${trip.truck}</td>
<td>${trip.commodity}</td>

<td>${trip.weight_kg}</td>
<td>${expense}</td>

<td>${trip.company_rate}</td>
<td>${trip.transporter_rate}</td>

<td>${revenue.toFixed(0)}</td>
<td>${cost.toFixed(0)}</td>
<td>${profit.toFixed(0)}</td>

<td>${trip.trip_date||""}</td>
<td>${trip.status||""}</td>

<td>

<button class="editBtn" onclick="editTrip('${trip.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTrip('${trip.id}')">Delete</button>

</td>

</tr>

`

})

document.getElementById("tripTable").innerHTML=html

document.getElementById("pageInfo").innerText=
`Page ${currentPage} of ${Math.ceil(trips.length/pageSize)}`

}

/* PAGINATION */

function nextPage(){

if(currentPage*pageSize<trips.length){
currentPage++
renderTrips()
}

}

function prevPage(){

if(currentPage>1){
currentPage--
renderTrips()
}

}

/* FILTER */

function applyFilters(){

let route=document.getElementById("filterRoute").value
let truck=document.getElementById("filterTruck").value
let commodity=document.getElementById("filterCommodity").value
let search=document.getElementById("searchTrip").value.toLowerCase()

let filtered=trips.filter(t=>{

return (
(!route||t.route===route) &&
(!truck||t.truck===truck) &&
(!commodity||t.commodity===commodity) &&
(!search||t.trip_no.toLowerCase().includes(search))
)

})

trips=filtered
currentPage=1
renderTrips()

}

function clearFilters(){

document.getElementById("searchTrip").value=""

loadTrips()

}

/* DELETE */

async function deleteTrip(id){

if(!confirm("Delete Trip?")) return

await supabaseClient.from("trips").delete().eq("id",id)

loadTrips()

}

/* EDIT */

async function editTrip(id){

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("id",id)
.single()

let weight=prompt("Edit Weight",data.weight_kg)

await supabaseClient
.from("trips")
.update({weight_kg:weight})
.eq("id",id)

loadTrips()

}

</script>

</body>
</html>
