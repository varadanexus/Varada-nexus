<!DOCTYPE html><html>
<head>
<title>Trips - Varada Nexus ERP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>
body{margin:0;font-family:Arial;background:#f4f6f9;}

.sidebar{
position:fixed;
left:0;top:0;width:220px;height:100%;
background:#1f3c88;color:white;padding-top:20px;
}

.sidebar a{
display:block;color:white;padding:12px 20px;text-decoration:none;
}

.sidebar a:hover{background:#162c66;}

.main{margin-left:220px;padding:30px;}

.card{
background:white;padding:20px;border-radius:8px;margin-bottom:20px;
}

table{width:100%;border-collapse:collapse;background:white;}

th,td{
padding:10px;border-bottom:1px solid #ddd;text-align:left;
}

th{background:#eee;}

input,select{padding:6px;margin:5px;}

button{
padding:6px 12px;border:none;background:#1f3c88;color:white;cursor:pointer;
}

.editBtn{background:#5bc0de;}
.deleteBtn{background:#d9534f;}

.expenseLink{
background:#1f3c88;color:white;padding:3px 8px;border-radius:4px;text-decoration:none;
}

</style></head><body><div class="sidebar">
<h2 style="padding-left:20px;">Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>
<a href="master-data.html">Master Data</a>
<a href="rate-entry.html">Rates</a>

</div><div class="main"><h2>Trips</h2><div class="card"><input id="searchTrip" placeholder="Search Trip ID">
<button onclick="searchTrips()">Search</button>
<button onclick="loadTrips()">Reset</button></div><table><thead><tr><th>Trip ID</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Weight</th>
<th>Expense</th>
<th>Company Rate</th>
<th>Transporter Rate</th>
<th>Revenue</th>
<th>Transport Cost</th>
<th>Profit</th>
<th>Date</th>
<th>Status</th>
<th>Action</th></tr></thead><tbody id="tripTable"></tbody></table></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

loadTrips()


async function loadTrips(){

const {data:trips}=await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})


const {data:expenses}=await supabaseClient
.from("expenses")
.select("*")


let expenseMap={}

expenses.forEach(e=>{

if(!expenseMap[e.trip_id]) expenseMap[e.trip_id]=0
expenseMap[e.trip_id]+=Number(e.amount)

})


let html=""

trips.forEach(trip=>{

let mt=trip.weight_kg/1000

let expense=expenseMap[trip.id]||0

let revenue=trip.company_rate*mt

let cost=trip.transporter_rate*mt

let profit=revenue-cost-expense


html+=`

<tr>

<td><b>${trip.trip_no}</b></td>

<td>${trip.route}</td>

<td>${trip.truck}</td>

<td>${trip.commodity}</td>

<td>${trip.weight_kg}</td>

<td>
<a class="expenseLink" href="expenses.html?trip=${trip.id}&trip_no=${trip.trip_no}">
${expense}
</a>
</td>

<td>${trip.company_rate}</td>

<td>${trip.transporter_rate}</td>

<td>${revenue.toFixed(0)}</td>

<td>${cost.toFixed(0)}</td>

<td>${profit.toFixed(0)}</td>

<td>${trip.trip_date||""}</td>

<td>${trip.status||""}</td>

<td>

<button class="editBtn" onclick="editTrip('${trip.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTrip('${trip.id}')">Delete</button>

</td>

</tr>

`

})

document.getElementById("tripTable").innerHTML=html

}



async function searchTrips(){

let text=document.getElementById("searchTrip").value

const {data}=await supabaseClient
.from("trips")
.select("*")
.ilike("trip_no","%"+text+"%")

renderTrips(data)

}


function renderTrips(data){

let html=""

data.forEach(trip=>{

html+=`

<tr>

<td>${trip.trip_no}</td>
<td>${trip.route}</td>
<td>${trip.truck}</td>
<td>${trip.commodity}</td>
<td>${trip.weight_kg}</td>

</tr>

`

})

document.getElementById("tripTable").innerHTML=html

}



async function deleteTrip(id){

if(!confirm("Delete Trip?")) return

await supabaseClient
.from("trips")
.delete()
.eq("id",id)

loadTrips()

}



async function editTrip(id){

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("id",id)
.single()

let weight=prompt("Edit Weight",data.weight_kg)

await supabaseClient
.from("trips")
.update({weight_kg:weight})
.eq("id",id)

loadTrips()

}

</script></body>
</html>
