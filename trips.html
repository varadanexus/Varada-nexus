<!DOCTYPE html><html>
<head><title>Trips - Varada Nexus ERP</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
position:fixed;
width:220px;
height:100%;
background:#1f3c88;
color:white;
padding-top:20px;
}

.sidebar a{
display:block;
padding:12px 20px;
color:white;
text-decoration:none;
}

.sidebar a:hover{background:#162c66;}

.main{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns: repeat(6, 1fr);
gap:10px;
}

.form-grid input,
.form-grid select{
padding:8px;
width:100%;
}

button{
padding:8px 14px;
background:#1f3c88;
color:white;
border:none;
cursor:pointer;
}

.editBtn{background:#5bc0de;}
.deleteBtn{background:#d9534f;}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{background:#eee;}

</style></head><body><div class="sidebar"><h2 style="padding-left:20px;">Varada Nexus</h2><a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>
<a href="master-data.html">Master Data</a>
<a href="rate-entry.html">Rates</a>

</div><div class="main"><h2>Trips</h2><div class="card"><h3>Create Trip</h3><div class="form-grid"><select id="route"></select>
<select id="truck"></select>
<select id="commodity"></select>

<input id="weight" placeholder="Weight KG"><input type="date" id="tripDate"><input id="status" placeholder="Status"></div><br><button onclick="saveTrip()">Save Trip</button>

</div><div class="card"><input id="searchTrip" placeholder="Search Trip ID"><button onclick="searchTrip()">Search</button>

</div><table><thead><tr><th>Trip ID</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Weight</th>
<th>Expense</th>
<th>Company Rate</th>
<th>Transporter Rate</th>
<th>Revenue</th>
<th>Transport Cost</th>
<th>Profit</th>
<th>Date</th>
<th>Status</th>
<th>Action</th></tr></thead><tbody id="tripTable"></tbody></table><br><button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>

</div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

let routes=[]
let trucks=[]
let commodities=[]
let trips=[]

let page=1
let pageSize=10



init()

async function init(){

await loadRoutes()
await loadTrucks()
await loadCommodities()
await loadTrips()

}



/* LOAD ROUTES */

async function loadRoutes(){

const {data}=await supabaseClient.from("routes").select("*")

routes=data

let html='<option value="">Select Route</option>'

data.forEach(r=>{
html+=`<option value="${r.id}">${r.route_code}</option>`
})

document.getElementById("route").innerHTML=html

}



/* LOAD TRUCKS */

async function loadTrucks(){

const {data}=await supabaseClient.from("trucks").select("*")

trucks=data

let html='<option value="">Select Truck</option>'

data.forEach(t=>{
html+=`<option value="${t.id}">${t.truck_number}</option>`
})

document.getElementById("truck").innerHTML=html

}



/* LOAD COMMODITIES */

async function loadCommodities(){

const {data}=await supabaseClient.from("commodities").select("*")

commodities=data

let html='<option value="">Select Commodity</option>'

data.forEach(c=>{
html+=`<option value="${c.id}">${c.name}</option>`
})

document.getElementById("commodity").innerHTML=html

}



/* GENERATE TRIP NUMBER */

async function generateTripNo(){

const now=new Date()

let year=now.getFullYear().toString().slice(-2)
let month=("0"+(now.getMonth()+1)).slice(-2)

const {data}=await supabaseClient
.from("trips")
.select("trip_no")
.ilike("trip_no","TR"+year+month+"%")

let seq=data.length+1

return "TR"+year+month+seq.toString().padStart(4,"0")

}



/* SAVE TRIP */

async function saveTrip(){

let routeId=document.getElementById("route").value
let truckId=document.getElementById("truck").value
let commodityId=document.getElementById("commodity").value

let weight=document.getElementById("weight").value
let date=document.getElementById("tripDate").value
let status=document.getElementById("status").value

let route=routes.find(r=>r.id==routeId).route_code
let truck=trucks.find(t=>t.id==truckId).truck_number
let commodity=commodities.find(c=>c.id==commodityId).name

let tripNo=await generateTripNo()

await supabaseClient.from("trips").insert({

trip_no:tripNo,
route:route,
truck:truck,
commodity:commodity,
weight_kg:weight,
trip_date:date,
status:status,
company_rate:200,
transporter_rate:170

})

loadTrips()

}



/* LOAD TRIPS */

async function loadTrips(){

const {data}=await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

trips=data

renderTrips()

}



/* RENDER TRIPS */

async function renderTrips(){

const {data:expenses}=await supabaseClient
.from("expenses")
.select("*")

let expenseMap={}

expenses.forEach(e=>{

if(!expenseMap[e.trip_id]) expenseMap[e.trip_id]=0

expenseMap[e.trip_id]+=Number(e.amount)

})


let start=(page-1)*pageSize
let end=start+pageSize

let pageTrips=trips.slice(start,end)

let html=""

pageTrips.forEach(trip=>{

let mt=trip.weight_kg/1000

let expense=expenseMap[trip.id]||0

let revenue=(trip.company_rate*mt)

let cost=(trip.transporter_rate*mt)

let profit=revenue-cost-expense


html+=`

<tr>

<td><b>${trip.trip_no}</b></td>
<td>${trip.route}</td>
<td>${trip.truck}</td>
<td>${trip.commodity}</td>
<td>${trip.weight_kg}</td>

<td>${expense}</td>

<td>${trip.company_rate}</td>
<td>${trip.transporter_rate}</td>

<td>${revenue.toFixed(0)}</td>
<td>${cost.toFixed(0)}</td>
<td>${profit.toFixed(0)}</td>

<td>${trip.trip_date || ""}</td>
<td>${trip.status || ""}</td>

<td>

<button class="editBtn" onclick="editTrip('${trip.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTrip('${trip.id}')">Delete</button>

</td>

</tr>

`

})

document.getElementById("tripTable").innerHTML=html

}



function nextPage(){

if(page*pageSize<trips.length){

page++
renderTrips()

}

}



function prevPage(){

if(page>1){

page--
renderTrips()

}

}



function searchTrip(){

let text=document.getElementById("searchTrip").value.toLowerCase()

let filtered=trips.filter(t=>t.trip_no.toLowerCase().includes(text))

trips=filtered

renderTrips()

}



/* DELETE */

async function deleteTrip(id){

if(!confirm("Delete Trip?")) return

await supabaseClient.from("trips").delete().eq("id",id)

loadTrips()

}



/* EDIT */

async function editTrip(id){

const {data}=await supabaseClient
.from("trips")
.select("*")
.eq("id",id)
.single()

let weight=prompt("Edit Weight",data.weight_kg)

await supabaseClient
.from("trips")
.update({weight_kg:weight})
.eq("id",id)

loadTrips()

}

</script></body>
</html>
