let editingTrip=null

<!-- SIDEBAR -->

<div id="sidebar-container"></div>

fetch("sidebar.html")

document.getElementById("sidebar-container").innerHTML=data

<div class="main">

<h2>Trips</h2>

<div class="card">

<h3>Create Trip</h3>

<div class="form-grid">

<select id="route"></select>
<select id="truck"></select>
<select id="commodity"></select>
<select id="client"></select>

<input id="weight" placeholder="Weight KG">

<input type="date" id="tripDate">

<select id="status">
<option value="">Status</option>
<option>LOADED</option>
<option>Completed</option>
<option>Pending</option>
</select>

</div>

<br>

<button onclick="saveTrip()">Save Trip</button>

</div>

<div class="card">

<h3>Search Trips</h3>

<div class="search-grid">

<input id="searchTripNo" placeholder="Trip No">

<select id="searchRoute">
<option value="">All Routes</option>
</select>

<select id="searchTruck">
<option value="">All Trucks</option>
</select>

<select id="searchCommodity">
<option value="">All Commodities</option>
</select>

<div>
<button onclick="searchTrips()">Search</button>

<table>

<thead>

<tr>
<th>Trip No</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Client</th>
<th>Weight</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
<th>PDF</th>
</tr>

</thead>

<tbody id="tripTable"></tbody>

</table>

<script>

let routes=[]
let trucks=[]
let commodities=[]
let clients=[]
let trips=[]
let allTrips=[]

init()

async function init(){

await loadRoutes()
await loadTrucks()
await loadCommodities()
await loadClients()
await loadTrips()

}

async function generateTripNumber(){

let today=new Date()

let year=today.getFullYear().toString().slice(-2)
let month=("0"+(today.getMonth()+1)).slice(-2)

let prefix=`TR${year}${month}`

const {data}=await supabaseClient
.from("trips")
.select("trip_no")
.ilike("trip_no",`${prefix}%`)
.order("trip_no",{ascending:false})
.limit(1)

let seq="0001"

if(data.length>0){

let last=data[0].trip_no.slice(-4)
seq=(parseInt(last)+1).toString().padStart(4,"0")

}

return prefix+seq

}

/* LOAD DATA */

async function loadClients(){

const {data}=await supabaseClient.from("clients").select("*")

clients=data||[]

let html='<option value="">Select Client</option>'

clients.forEach(c=>{
html+=`<option value="${c.id}">${c.company}</option>`
})

document.getElementById("client").innerHTML=html

}

async function loadRoutes(){

const {data}=await supabaseClient.from("routes").select("*")

routes=data||[]

let html='<option value="">Route</option>'
let search='<option value="">All Routes</option>'

routes.forEach(r=>{
html+=`<option value="${r.id}">${r.route_code}</option>`
search+=`<option value="${r.route_code}">${r.route_code}</option>`
})

document.getElementById("route").innerHTML=html
document.getElementById("searchRoute").innerHTML=search

}

async function loadTrucks(){

const {data}=await supabaseClient.from("trucks").select("*")

trucks=data||[]

let html='<option value="">Truck</option>'
let search='<option value="">All Trucks</option>'

trucks.forEach(t=>{
html+=`<option value="${t.id}">${t.truck_number}</option>`
search+=`<option value="${t.truck_number}">${t.truck_number}</option>`
})

document.getElementById("truck").innerHTML=html
document.getElementById("searchTruck").innerHTML=search

}

async function loadCommodities(){

const {data}=await supabaseClient.from("commodities").select("*")

commodities=data||[]

let html='<option value="">Commodity</option>'
let search='<option value="">All Commodities</option>'

commodities.forEach(c=>{
html+=`<option value="${c.id}">${c.name}</option>`
search+=`<option value="${c.name}">${c.name}</option>`
})

document.getElementById("commodity").innerHTML=html
document.getElementById("searchCommodity").innerHTML=search

}

/* SAVE OR UPDATE */

async function saveTrip(){

let route=document.getElementById("route").value
let truck=document.getElementById("truck").value
let commodity=document.getElementById("commodity").value
let client=document.getElementById("client").value
let weight=document.getElementById("weight").value
let date=document.getElementById("tripDate").value
let status=document.getElementById("status").value

let tripNo=await generateTripNumber()

let selectedTruck=trucks.find(t=>t.id==truck)
let transporterId=selectedTruck?.transporter_id

const {data:rate}=await supabaseClient
.from("rates")
.select("*")
.eq("commodity_id",commodity)
.eq("route_id",route)
.eq("transporter_id",transporterId)
.limit(1)

let companyRate=0
let transporterRate=0

if(rate && rate.length>0){

companyRate=rate[0].company_rate_per_mt
transporterRate=rate[0].transporter_rate_per_mt

}

if(editingTrip){

await supabaseClient
.from("trips")
.update({

route:routes.find(r=>r.id==route)?.route_code,
truck:trucks.find(t=>t.id==truck)?.truck_number,
commodity:commodities.find(c=>c.id==commodity)?.name,
client_name:clients.find(c=>c.id==client)?.company,
weight_kg:Number(weight),
trip_date:date,
status:status,
company_rate:companyRate,
transporter_rate:transporterRate

})
.eq("id",editingTrip)

editingTrip=null

}else{

await supabaseClient
.from("trips")
.insert({

trip_no:tripNo,
route:routes.find(r=>r.id==route)?.route_code,
truck:trucks.find(t=>t.id==truck)?.truck_number,
commodity:commodities.find(c=>c.id==commodity)?.name,
client_name:clients.find(c=>c.id==client)?.company,
weight_kg:Number(weight),
trip_date:date,
status:status,
company_rate:companyRate,
transporter_rate:transporterRate

})

}

/* CLEAR FORM */

document.getElementById("route").value=""
document.getElementById("truck").value=""
document.getElementById("commodity").value=""
document.getElementById("client").value=""
document.getElementById("weight").value=""
document.getElementById("tripDate").value=""
document.getElementById("status").value=""

loadTrips()

}

async function loadTrips(){

const {data}=await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

trips=data||[]
allTrips=data||[]

renderTrips()

}

function renderTrips(){

let html=""

trips.forEach(t=>{

html+=`
<tr>

<td>${t.trip_no}</td>
<td>${t.route}</td>
<td>${t.truck}</td>
<td>${t.commodity}</td>
<td>${t.client_name||""}</td>
<td>${t.weight_kg}</td>
<td>${t.trip_date||""}</td>
<td>${t.status}</td>

<td>
<button class="editBtn" onclick="editTrip('${t.id}')">Edit</button>
<button class="deleteBtn" onclick="deleteTrip('${t.id}')">Delete</button>
</td>

<td>
<button onclick="downloadTripPDF('${t.id}')">PDF</button>
</td>

</tr>
`

})

document.getElementById("tripTable").innerHTML=html

}

/* EDIT */

function editTrip(id){

let t=trips.find(x=>x.id==id)

document.getElementById("route").value=
routes.find(r=>r.route_code==t.route)?.id

document.getElementById("truck").value=
trucks.find(tr=>tr.truck_number==t.truck)?.id

document.getElementById("commodity").value=
commodities.find(c=>c.name==t.commodity)?.id

document.getElementById("client").value=
clients.find(c=>c.company==t.client_name)?.id

document.getElementById("weight").value=t.weight_kg
document.getElementById("tripDate").value=t.trip_date
document.getElementById("status").value=t.status

editingTrip=id

}

/* DELETE */

async function deleteTrip(id){

if(!confirm("Delete trip?")) return

await supabaseClient
.from("trips")
.delete()
.eq("id",id)

loadTrips()

}

/* PDF */

function downloadTripPDF(id){

const { jsPDF } = window.jspdf

let t=trips.find(x=>x.id==id)

let doc=new jsPDF()

doc.text("Varada Nexus Private Limited",20,20)

doc.text("Trip No: "+t.trip_no,20,40)
doc.text("Route: "+t.route,20,50)
doc.text("Truck: "+t.truck,20,60)
doc.text("Commodity: "+t.commodity,20,70)
doc.text("Client: "+t.client_name,20,80)
doc.text("Weight: "+t.weight_kg+" KG",20,90)
doc.text("Date: "+t.trip_date,20,100)
doc.text("Status: "+t.status,20,110)

doc.save(t.trip_no+".pdf")

}

</script>
