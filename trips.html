</div><div class="main"><h1>Trips</h1><table><thead>
<tr>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Weight</th>
<th>Status</th>
</tr>
</thead><tbody id="tripTable"></tbody></table></div><script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

async function loadTrips(){

const { data } = await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

let html=""

data.forEach(trip=>{

html+=`

<tr>

<td>${trip.route ?? "-"}</td>
<td>${trip.truck ?? "-"}</td>
<td>${trip.commodity}</td>
<td>${trip.weight_kg}</td>
<td>${trip.status ?? "-"}</td>

</tr>

`

})

document.getElementById("tripTable").innerHTML=html

}

loadTrips()

</script></body></html>
