<!DOCTYPE html>
<html>

<head>
<title>Trips - Varada Nexus ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#1f3c88;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#162c66;
}

.main{
margin-left:220px;
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
}

input{
padding:8px;
margin:5px;
}

button{
padding:6px 12px;
background:#1f3c88;
color:white;
border:none;
cursor:pointer;
}

.deleteBtn{
background:#d9534f;
}

.editBtn{
background:#5bc0de;
}

</style>

</head>

<body>

<div class="sidebar">
<h2>Varada Nexus</h2>

<a href="dashboard.html">Dashboard</a>
<a href="trips.html">Trips</a>
<a href="expenses.html">Expenses</a>
<a href="master-data.html">Master Data</a>
<a href="rate-entry.html">Rates</a>

</div>

<div class="main">

<h1>Trips</h1>

<input id="searchTrip" placeholder="Search Trip ID">
<button onclick="searchTrip()">Search</button>

<table>

<thead>

<tr>
<th>Trip ID</th>
<th>Route</th>
<th>Truck</th>
<th>Commodity</th>
<th>Weight</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tripTable"></tbody>

</table>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ticsgbtxfhhihamejiss.supabase.co",
"sb_publishable_RPOioXKgFLT3H9GUt7hPAw_R9bUoGVs"
)

loadTrips()

/* LOAD TRIPS */

async function loadTrips(){

const { data } = await supabaseClient
.from("trips")
.select("*")
.order("created_at",{ascending:false})

renderTrips(data)

}

/* RENDER TABLE */

function renderTrips(data){

let html=""

data.forEach(trip=>{

html+=`

<tr>

<td><b>${trip.trip_no}</b></td>

<td>${trip.route ?? "-"}</td>

<td>${trip.truck ?? "-"}</td>

<td>${trip.commodity}</td>

<td>${trip.weight_kg}</td>

<td>${trip.trip_date ?? "-"}</td>

<td>${trip.status ?? "-"}</td>

<td>

<button class="editBtn" onclick="editTrip('${trip.id}')">Edit</button>

<button class="deleteBtn" onclick="deleteTrip('${trip.id}')">Delete</button>

</td>

</tr>

`

})

document.getElementById("tripTable").innerHTML=html

}

/* SEARCH */

async function searchTrip(){

let text=document.getElementById("searchTrip").value

const { data } = await supabaseClient
.from("trips")
.select("*")
.ilike("trip_no","%"+text+"%")

renderTrips(data)

}

/* DELETE */

async function deleteTrip(id){

if(!confirm("Delete this trip?")) return

await supabaseClient
.from("trips")
.delete()
.eq("id",id)

loadTrips()

}

/* EDIT */

async function editTrip(id){

const { data } = await supabaseClient
.from("trips")
.select("*")
.eq("id",id)
.single()

let weight=prompt("Edit Weight",data.weight_kg)

let status=prompt("Edit Status",data.status)

await supabaseClient
.from("trips")
.update({
weight_kg:weight,
status:status
})
.eq("id",id)

loadTrips()

}

/* AUTO TRIP NUMBER GENERATOR */

async function generateTripNo(){

const now = new Date()

let year = now.getFullYear().toString().slice(-2)
let month = ("0"+(now.getMonth()+1)).slice(-2)

const { data } = await supabaseClient
.from("trips")
.select("trip_no")
.ilike("trip_no","TR"+year+month+"%")

let seq = data.length + 1

let seqStr = seq.toString().padStart(4,"0")

return "TR"+year+month+seqStr

}

</script>

</body>
</html>
