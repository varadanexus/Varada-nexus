/* LOAD ROUTES */

async function loadRoutes(){

const { data } = await supabaseClient
.from("routes")
.select("*")

let html='<option value="">Select Route</option>'

data.forEach(r=>{
html+=`<option value="${r.id}">${r.route_code}</option>`
})

document.getElementById("route").innerHTML=html

}



/* LOAD TRUCKS */

async function loadTrucks(){

const { data } = await supabaseClient
.from("trucks")
.select(`id,truck_number,transporters(transporter_name)`)

let html='<option value="">Select Truck</option>'

data.forEach(t=>{
html+=`<option value="${t.id}" data-owner="${t.transporters?.transporter_name}">
${t.truck_number}
</option>`
})

document.getElementById("truck").innerHTML=html

}



/* LOAD COMMODITIES */

async function loadCommodities(){

const { data } = await supabaseClient
.from("commodities")
.select("*")

let html='<option value="">Select Commodity</option>'

data.forEach(c=>{
html+=`<option value="${c.id}">${c.name}</option>`
})

document.getElementById("commodity").innerHTML=html

}



/* FETCH RATES */

document.getElementById("route").addEventListener("change",fetchRates)
document.getElementById("commodity").addEventListener("change",fetchRates)
document.getElementById("truck").addEventListener("change",fetchRates)


async function fetchRates(){

let route=document.getElementById("route").value
let commodity=document.getElementById("commodity").value
let truck=document.getElementById("truck")

let transporterName=truck.options[truck.selectedIndex]?.dataset.owner

if(!route || !commodity || !transporterName) return


const { data } = await supabaseClient
.from("rates")
.select(`
company_rate_per_mt,
transporter_rate_per_mt,
transporters(transporter_name)
`)
.eq("route_id",route)
.eq("commodity_id",commodity)


if(data.length>0){

let row=data.find(r=>r.transporters.transporter_name==transporterName)

if(row){

companyRate=row.company_rate_per_mt
transporterRate=row.transporter_rate_per_mt

document.getElementById("companyRate").innerText=companyRate
document.getElementById("transporterRate").innerText=transporterRate

calculateAmounts()

}

}

}
