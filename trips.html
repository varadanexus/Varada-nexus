async function initSidebar(){

const {data:{session}} = await supabaseClient.auth.getSession()
if(!session) return

const authId=session.user.id
const email=session.user.email

document.getElementById("userName").innerText=email.split("@")[0]

const {data:user}=await supabaseClient
.from("users").select("id").eq("auth_id",authId).single()

if(!user) return

const {data:userRole}=await supabaseClient
.from("user_roles").select("role_id").eq("user_id",user.id).single()

if(!userRole) return

const {data:role}=await supabaseClient
.from("roles").select("role_name").eq("id",userRole.role_id).single()

if(role){
const roleEl = document.getElementById("userRole")
if(roleEl){
    roleEl.innerText = role.role_name
}
}

window.logout=async()=>{
await supabaseClient.auth.signOut()
window.location="login.html"
}
}

function setActiveMenu(){

    let currentPage = window.location.pathname.split("/").pop()

    document.querySelectorAll("#sidebar a").forEach(link=>{

        let page = link.getAttribute("data-page")

        if(page === currentPage){
            link.classList.add("active")
        }

    })

}

async function fetchRates(){

let routeId = route.value
let truckId = truck.value
let commodityId = commodity.value

if(!routeId || !truckId || !commodityId) return

/* GET TRANSPORTER FROM TRUCK */
let selectedTruck = trucks.find(t=>t.id==truckId)
if(!selectedTruck) return

let transporterId = selectedTruck.transporter_id

/* FETCH FROM RATES TABLE */
const {data,error} = await supabaseClient
.from("rates")
.select("*")
.eq("route_id", routeId)
.eq("transporter_id", transporterId)
.eq("commodity_id", commodityId)
.single()

if(error || !data){
document.getElementById("clientRate").value=""
document.getElementById("transporterRate").value=""
return
}

/* SET VALUES */
document.getElementById("clientRate").value = data.company_rate_per_mt || ""
document.getElementById("transporterRate").value = data.transporter_rate_per_mt || ""
}
  
async function generateTripNo(){

let today = new Date()
let year = String(today.getFullYear()).slice(2)
let month = String(today.getMonth()+1).padStart(2,'0')

let prefix = `TR${year}${month}`

const {data} = await supabaseClient
.from("trips")
.select("trip_no")
.ilike("trip_no", `${prefix}%`)
.order("trip_no",{ascending:false})
.limit(1)

let next = 1

if(data && data.length){
let last = data[0].trip_no
let num = parseInt(last.slice(-3))
next = num + 1
}

return prefix + String(next).padStart(3,'0')
}

/* 🔥 FINAL FIXED FUNCTION */
async function loadTrips(){

const { data:{session} } = await supabaseClient.auth.getSession()
if(!session) return

const authId = session.user.id

/* USER */
const {data:user} = await supabaseClient
.from("users")
.select("id")
.eq("auth_id",authId)
.single()

if(!user) return

/* ROLES */
const {data:userRoles} = await supabaseClient
.from("user_roles")
.select("role_id")
.eq("user_id",user.id)

let roleIds = (userRoles || []).map(r=>r.role_id)

const {data:rolesData} = await supabaseClient
.from("roles")
.select("role_name")
.in("id", roleIds)

let roleNames = (rolesData || []).map(r=>r.role_name.toLowerCase())

const isTransporter = roleNames.some(r =>
r.includes("customer") || r.includes("transporter")
)

/* 🔍 FILTER VALUES */
let routeVal = document.getElementById("searchRoute").value
let truckVal = document.getElementById("searchTruck").value
let dateVal = document.getElementById("searchDate").value

/* 📦 BASE QUERY */
let query = supabaseClient
.from("trips")
.select("*", { count: "exact" })
.order("created_at",{ascending:false})

/* 🔐 ROLE FILTER */
if(isTransporter){

const {data:transporter} = await supabaseClient
.from("transporters")
.select("id")
.eq("auth_id", authId)
.single()

if(!transporter){
renderTrips([])
return
}

query = query.eq("transporter_id", transporter.id)
}

/* 🔎 APPLY FILTERS (DB LEVEL) */
if(routeVal){
query = query.eq("route", routeVal)
}

if(truckVal){
query = query.eq("truck", truckVal)
}

if(dateVal){
query = query.eq("trip_date", dateVal)
}

/* 📄 PAGINATION */
let from = (currentPage - 1) * pageSize
let to = from + pageSize - 1

query = query.range(from, to)

/* 🚀 EXECUTE */
const {data, count, error} = await query

if(error){
console.error(error)
alert("Error loading trips")
return
}

trips = data || []
totalCount = count || 0

renderTrips()
}

function nextPage(){
let totalPages = Math.ceil(totalCount / pageSize)
if(currentPage < totalPages){
  currentPage++
  loadTrips()
}
}

function prevPage(){
if(currentPage > 1){
  currentPage--
  loadTrips()
}
}

function changePageSize(){
pageSize = parseInt(document.getElementById("pageSize").value)
currentPage = 1
loadTrips()
}

function applyFilters(){
currentPage = 1
loadTrips()
}

function resetFilters(){

document.getElementById("searchRoute").value = ""
document.getElementById("searchTruck").value = ""
document.getElementById("searchDate").value = ""

currentPage = 1
loadTrips()
}

/* ================= DELETE ================= */

async function deleteTrip(id){

const canDelete = await checkPermission("trips.html","delete")
if(!canDelete){
alert("No permission to delete")
return
}

if(!confirm("Delete this trip?")) return

/* 1️⃣ DELETE CHILD TABLES FIRST */
await supabaseClient.from("trip_agents").delete().eq("trip_id", id)

await supabaseClient.from("agent_trip_ledger").delete().eq("trip_id", id)

/* 2️⃣ DELETE MAIN TRIP */
await supabaseClient.from("trips").delete().eq("id",id)

alert("Trip deleted ✅")

loadTrips()

}

/* ================= UPDATE ================= */

async function updateTrip(id){

const canEdit = await checkPermission("trips.html","edit")
if(!canEdit){
alert("No permission to edit")
return
}

let updatedData = {
route: document.getElementById(`route_${id}`).value,
truck: document.getElementById(`truck_${id}`).value,
commodity: document.getElementById(`commodity_${id}`).value,
client_name: document.getElementById(`client_${id}`).value,
weight_kg: document.getElementById(`weight_${id}`).value,
trip_date: document.getElementById(`date_${id}`).value,
status: document.getElementById(`status_${id}`).value
}

const {error} = await supabaseClient
.from("trips")
.update(updatedData)
.eq("id", id)

if(error){
console.error(error)
alert("Error updating trip ❌")
return
}

alert("Trip updated ✅")

loadTrips()
}

async function handleFileUpload(event, tripNo) {
  const file = event.target.files[0];
  if (!file) return;

  const docType = document.getElementById(`docType_${tripNo}`).value;

  if(!docType){
    alert("Select document type");
    return;
  }

async function handleBulkUpload(event, tripNo){

const files = event.target.files;
if(!files.length) return;

const docType = document.getElementById(`docType_${tripNo}`).value;

if(!docType){
  alert("Select document type");
  return;
}

for(let file of files){

const tripId = getTripIdByNo(tripNo);
if(!tripId){
  alert("Trip not found ❌");
  return;
}
    
  try{

    const result = await uploadToDrive(file, tripNo);

    await supabaseClient.from("trip_documents").insert({
      trip_id: tripId,
      trip_no: tripNo,
      file_name: `${docType} - ${file.name}`,
      doc_type: docType,
      file_type: file.type,
      file_url: result.fileUrl,
      file_id: result.fileId
    });

  }catch(err){
    console.error("Bulk upload error:", err);
  }
}

alert(`${files.length} files uploaded ✅`);
}
    
async function uploadToDrive(file, tripNo) {
  const reader = new FileReader();

  return new Promise((resolve, reject) => {

    reader.onload = async () => {

      const base64 = reader.result.split(",")[1];

      try {

const response = await fetch(
  "https://ticsgbtxfhhihamejiss.supabase.co/functions/v1/upload-drive",
  {
    method: "POST",
    headers: {
  "Content-Type": "application/json",
  "Authorization": `Bearer ${(await supabaseClient.auth.getSession()).data.session.access_token}`
},
  body: JSON.stringify({
  trip_no: tripNo,   // 🔥 THIS IS THE KEY CHANGE
  file_name: file.name,
  file_base64: base64
})
  }
);

const data = await response.json();

console.log("UPLOAD RESULT:", data);

if (data.success) {
  resolve(data);
} else {
  reject(data.error || "Upload failed");
}

      } catch (err) {
        console.error("UPLOAD ERROR:", err);
        reject(err);
      }

    };

    reader.readAsDataURL(file);
  });
}

async function viewDocs(tripNo){

const {data} = await supabaseClient
.from("trip_documents")
.select("*")
.eq("trip_no", tripNo)

if(!data || data.length === 0){
  alert("No documents")
  return
}

let html = `
<div style="position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:9999;">

<div style="background:#111827;padding:20px;border-radius:12px;width:800px;max-height:85%;overflow:auto;">

<h3 style="margin-bottom:10px;">Documents - ${tripNo}</h3>

<table style="width:100%;">
<tr>
<th>Name</th>
<th>Type</th>
<th>Action</th>
</tr>
`

data.forEach(d=>{

let icon = "📄"
if(d.file_type?.includes("image")) icon="🖼"
if(d.file_type?.includes("pdf")) icon="📕"

html += `
<tr>
<td>${icon} ${d.file_name}</td>
<td>${d.doc_type || ""}</td>
<td>

<button onclick="previewDoc('${d.file_url}','${d.file_type}')">View</button>

<button onclick="renameDoc('${d.id}','${d.file_id}','${d.file_name}','${tripNo}')">Rename</button>

<button onclick="deleteDoc('${d.id}','${d.file_id}','${tripNo}')">Delete</button>

</td>
</tr>
`
})

html += `
</table>

<br>

<button onclick="window.open('https://drive.google.com/drive/folders/1XO7lz1RKuIUnW_tKgMlcaRrPC_Auo8WQ')">
Open Drive Folder
</button>

<button onclick="this.closest('div').parentElement.remove()">Close</button>

</div>
</div>
`

document.body.insertAdjacentHTML("beforeend", html)
}

function previewDoc(url, type){

if(type && type.includes("pdf")){
  let html = `
  <div style="position:fixed;top:0;left:0;width:100%;height:100%;
  background:black;z-index:9999;">

  <iframe src="${url}" style="width:100%;height:100%;"></iframe>

  <button style="position:absolute;top:10px;right:10px;"
  onclick="this.parentElement.remove()">Close</button>

  </div>
  `;

  document.body.insertAdjacentHTML("beforeend", html);
}else{
  window.open(url);
}
}

async function renameDoc(id, fileId, oldName, tripNo){

let newName = prompt("Enter new name:", oldName);
if(!newName) return;

try{

// 🔥 RENAME IN DRIVE
const { data: { session } } = await supabaseClient.auth.getSession();

await fetch("https://ticsgbtxfhhihamejiss.supabase.co/functions/v1/rename-drive", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${session.access_token}`
  },
  body: JSON.stringify({
    file_id: fileId,
    new_name: newName
  })
});


// 🔥 UPDATE DB
await supabaseClient
.from("trip_documents")
.update({ file_name: newName })
.eq("id", id);

alert("Renamed ✅");

}catch(err){
console.error(err);
alert("Rename failed ❌");
}
viewDocs(tripNo);
}

async function deleteDoc(id, fileId, tripNo){

if(!confirm("Delete this file?")) return;

try{

// 🔥 DELETE FROM DRIVE
const { data: { session } } = await supabaseClient.auth.getSession();

await fetch("https://ticsgbtxfhhihamejiss.supabase.co/functions/v1/delete-drive", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${session.access_token}`
  },
  body: JSON.stringify({
    file_id: fileId
  })
});


// 🔥 DELETE FROM DB
await supabaseClient
.from("trip_documents")
.delete()
.eq("id", id);

alert("Deleted ✅");

viewDocs(tripNo);

}catch(err){
console.error(err);
alert("Delete failed ❌");
}
}
